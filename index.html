<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Garber1</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #1f2523;
      --muted: #68746f;
      --line: #dce3df;
      --green: #26735c;
      --green-strong: #145f49;
      --amber: #b76b12;
      --red: #b2473a;
      --blue: #2f6f9f;
      --shadow: 0 24px 70px rgba(31, 37, 35, .10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .55), rgba(255, 255, 255, 0) 36%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: var(--radius);
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, color .16s ease;
    }

    button:hover {
      border-color: #aebbb5;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    button.primary:hover {
      background: var(--green-strong);
      border-color: var(--green-strong);
    }

    button.icon {
      width: 42px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 19px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245, 247, 246, .92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: #e8f0ec;
      border: 1px solid #cedbd5;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .mark svg {
      width: 34px;
      height: 34px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      height: 40px;
    }

    .segmented button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      padding: 0 12px;
      color: var(--muted);
      background: transparent;
    }

    .segmented button.active {
      background: #e5eee9;
      color: var(--green-strong);
    }

    .layout {
      width: min(1180px, calc(100% - 32px));
      margin: 26px auto 36px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 22px;
      align-items: start;
    }

    .study {
      display: grid;
      gap: 16px;
    }

    .progress-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: #e0e7e3;
      overflow: hidden;
      border: 1px solid #d4ddd8;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), #2f6f9f);
      transition: width .22s ease;
    }

    .counter {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .card-inner {
      position: relative;
    }

    .face {
      position: relative;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .face.back {
      display: none;
    }

    .card-inner:not(.flipped) .back,
    .card-inner.flipped .front {
      display: none;
      pointer-events: none;
    }

    .card-inner.flipped .back {
      display: flex;
      pointer-events: auto;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #edf4f0;
      color: var(--green-strong);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .card-body {
      flex: 1;
      display: grid;
      grid-template-rows: auto;
      gap: 18px;
      padding: 28px;
    }

    .question {
      display: grid;
      align-content: center;
      gap: 18px;
      min-height: clamp(150px, 28vh, 260px);
    }

    .question h2 {
      margin: 0;
      font-size: clamp(24px, 4.2vw, 42px);
      line-height: 1.16;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .question .zh {
      color: var(--muted);
      font-size: 20px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .answer-grid {
      display: grid;
      gap: 16px;
    }

    .section {
      border-left: 4px solid #cbd9d2;
      padding: 1px 0 1px 14px;
    }

    .section.answer-de {
      border-color: var(--green);
    }

    .section.answer-zh {
      border-color: var(--blue);
    }

    .section.extra {
      border-color: var(--amber);
    }

    .label {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .section p {
      margin: 0;
      font-size: 17px;
      line-height: 1.62;
      overflow-wrap: anywhere;
    }

    .section p br,
    .zh br {
      content: "";
      display: block;
      margin-top: 6px;
    }

    .math-var {
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      font-style: italic;
      white-space: nowrap;
    }

    .math-var sub,
    .math-var sup,
    .section sup,
    .question sup,
    .zh sup {
      line-height: 0;
    }

    .math-sqrt {
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      white-space: nowrap;
    }

    .source {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 2px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .answer-actions {
      display: flex;
      justify-content: center;
    }

    .answer-actions button {
      min-width: 160px;
    }

    .self-check {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .self-check button {
      min-width: 0;
      min-height: 48px;
      padding-inline: 10px;
      font-weight: 750;
    }

    .choice-unknown {
      color: #fff;
      background: var(--red);
      border-color: var(--red);
    }

    .choice-unsure {
      color: #fff;
      background: #202523;
      border-color: #202523;
    }

    .choice-known {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .mode-switch button.active {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    .side {
      display: grid;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 12px 40px rgba(31, 37, 35, .06);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 40px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    .search:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(38, 115, 92, .14);
    }

    .list {
      max-height: 506px;
      overflow: auto;
      padding: 8px;
    }

    .list-item {
      width: 100%;
      display: grid;
      gap: 6px;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius);
      padding: 10px;
      min-height: auto;
    }

    .list-item:hover,
    .list-item.active {
      transform: none;
      background: #f2f6f4;
      border-color: #d4ddd8;
    }

    .list-title {
      color: var(--ink);
      font-size: 14px;
      line-height: 1.32;
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    .list-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 14px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fbfcfb;
    }

    .stat strong {
      display: block;
      font-size: 23px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 940px) {
      .topbar-inner {
        min-height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .list {
        max-height: 280px;
      }
    }

    @media (max-width: 620px) {
      .topbar-inner,
      .layout {
        width: min(100% - 20px, 1180px);
      }

      .toolbar,
      .segmented {
        width: 100%;
      }

      .segmented button {
        flex: 1;
        padding-inline: 8px;
      }

      .progress-row,
      .controls {
        grid-template-columns: 1fr;
      }

      .card-body {
        padding: 20px;
      }

      .question {
        min-height: 150px;
      }

      .question h2 {
        font-size: 28px;
      }

      .question .zh {
        font-size: 18px;
      }

      .self-check,
      .mode-switch {
        grid-template-columns: 1fr;
      }
    }

    @media (max-height: 560px) {
      .topbar,
      .progress-row {
        display: none;
      }

      .layout {
        margin-top: 0;
        margin-bottom: 16px;
      }

      .card-head {
        padding: 10px 20px;
      }

      .card-body {
        gap: 12px;
        padding: 14px 24px;
      }

      .question {
        gap: 12px;
        min-height: 120px;
      }

      .question h2 {
        font-size: clamp(24px, 3.7vw, 38px);
        line-height: 1.12;
      }

      .question .zh {
        font-size: 18px;
      }

      .answer-grid {
        gap: 10px;
      }

      .section p {
        font-size: 15px;
        line-height: 1.45;
      }

      .source {
        font-size: 12px;
        padding-top: 8px;
      }

      .face.front .controls {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" fill="none" role="img">
              <path d="M10 45h44" stroke="#145f49" stroke-width="3" stroke-linecap="round"/>
              <path d="M17 43l20-23 9 23H17z" fill="#d9e8e1" stroke="#145f49" stroke-width="3" stroke-linejoin="round"/>
              <path d="M37 20c8 4 13 9 15 16" stroke="#2f6f9f" stroke-width="3" stroke-linecap="round"/>
              <path d="M24 43l13-23" stroke="#b76b12" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h1>Garber1</h1>
            <p class="subtitle"><span id="deckCount">0</span> 张 Fertigungstechnik 复习卡</p>
          </div>
        </div>
        <div class="toolbar">
          <div class="segmented" aria-label="语言">
            <button data-lang="de">DE</button>
            <button data-lang="zh">中文</button>
            <button data-lang="both" class="active">双语</button>
          </div>
          <button id="shuffleBtn" class="icon" type="button" title="重开当前模式" aria-label="重开当前模式">↻</button>
          <button id="resetBtn" class="icon" type="button" title="重置进度" aria-label="重置进度">×</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="study" aria-live="polite">
        <div class="progress-row">
          <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
          <div class="counter" id="counter">1 / 1</div>
        </div>

        <div class="flashcard">
          <div class="card-inner" id="cardInner">
            <article class="face front">
              <div class="card-head">
                <span class="pill" id="frontTag">Frage</span>
                <span class="status" id="frontStatus">未复习</span>
              </div>
              <div class="card-body">
                <div class="question">
                  <h2 id="questionDe"></h2>
                  <div class="zh" id="questionZh"></div>
                </div>
                <div class="self-check">
                  <button class="choice-unknown" data-choice="unknown" type="button">不知道</button>
                  <button class="choice-unsure" data-choice="unsure" type="button">不熟练</button>
                  <button class="choice-known" data-choice="known" type="button">知道</button>
                </div>
                <div class="controls">
                  <button id="prevBtn" class="icon" type="button" title="上一张" aria-label="上一张">←</button>
                  <button id="nextBtn" class="icon" type="button" title="下一张" aria-label="下一张">→</button>
                </div>
              </div>
            </article>

            <article class="face back">
              <div class="card-head">
                <span class="pill" id="backTag">Antwort</span>
                <span class="status" id="backStatus">未复习</span>
              </div>
              <div class="card-body">
                <div class="answer-grid" id="answerGrid"></div>
                <div class="answer-actions">
                  <button id="answerNextBtn" class="primary" type="button">下一题</button>
                </div>
              </div>
            </article>
          </div>
        </div>
      </section>

      <aside class="side">
        <section class="panel">
          <div class="panel-head">
            <h2>卡片</h2>
            <span class="counter" id="visibleCount">0</span>
          </div>
          <div class="mode-switch">
            <button data-mode="sequence" class="active" type="button">顺序刷题</button>
            <button data-mode="shuffle" type="button">乱序刷题</button>
            <button data-mode="quiz" type="button">20题测验</button>
            <button data-mode="wrong" type="button">错题库</button>
          </div>
          <div style="padding: 14px; border-bottom: 1px solid var(--line);">
            <input id="searchInput" class="search" type="search" placeholder="搜索题目、答案、出处">
          </div>
          <div class="list" id="cardList"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>进度</h2>
          </div>
          <div class="stats">
            <div class="stat"><strong id="statSeen">0</strong><span>已看过</span></div>
            <div class="stat"><strong id="statGood">0</strong><span>知道</span></div>
            <div class="stat"><strong id="statAgain">0</strong><span>错题库</span></div>
            <div class="stat"><strong id="statLeft">0</strong><span>未完成</span></div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script id="sourceData" type="text/plain">
["Nennen Sie die 6 Hauptgruppen der Fertigungsverfahren nach DIN 8580.","Frage (DE)：Nennen Sie die 6 Hauptgruppen der Fertigungsverfahren nach DIN 8580.\nAntwort (DE)：Urformen; Umformen; Trennen; Fügen; Beschichten; Stoffeigenschaften ändern.\nPrüfungshinweis (txt)：Dozent betont die Übersicht über die Hauptgruppen als Basis; feste Nicht-Prüfungs-Verfahren: Stoßen/Hobeln/Läppen/Räumen.\n中文题目：请写出 DIN 8580 的六大制造主组。\n中文答案：原型成形 Urformen；成形 Umformen；分离/去除 Trennen；连接 Fügen；涂覆 Beschichten；材料性能改变 Stoffeigenschaften ändern。\n出处：FT 1 -  Einführung - Skript.pdf S.4; Prüfungsinhalt.pdf S.1 (Nicht in Prüfung); full.md (Abschnitt: Einteilung DIN 8580, Seitenzahl im md nicht relevant); Garber_2025_10_02.txt (Prüfungshinweise)"]
["Erklären Sie kurz den Unterschied zwischen Urformen, Umformen und Trennen.","Frage (DE)：Erklären Sie kurz den Unterschied zwischen Urformen, Umformen und Trennen.\nAntwort (DE)：Urformen: formloser Stoff → Werkstück, Stoffzusammenhalt wird geschaffen; Umformen: Formänderung durch plastische Verformung, Masse & Stoffzusammenhalt bleiben (Dichte kann sich ändern); Trennen: Formänderung fester Körper, Zusammenhalt im Bearbeitungsbereich aufgehoben, Teilchen/Späne werden abgetrennt → Masse ↓.\n中文题目：简述 Urformen、Umformen、Trennen 的区别。\n中文答案：Urformen：从无定形材料制造工件并建立材料结合；Umformen：在保持材料结合与质量基本不变前提下塑性变形（密度可能变化）；Trennen：在加工区破坏结合并去除颗粒/切屑，使质量减少。\n出处：FT 1 -  Einführung - Skript.pdf S.5–7; full.md (Abschnitte: Urformen/Umformen/Trennen); Garber_2025_10_02.txt (Einführung)"]
["Nennen Sie die Untergruppen des Umformens nach Art der Spannungseinwirkung und je ein Beispiel.","Frage (DE)：Nennen Sie die Untergruppen des Umformens nach Art der Spannungseinwirkung und je ein Beispiel.\nAntwort (DE)：Druckumformen (Walzen); Zugdruckumformen (Tiefziehen); Zugumformen (Längen); Biegeumformen (Abkanten); Schubumformen (Verdrehen, z.B. Feder winden).\nHinweis (DE)：Beim Umformen bleibt die Masse erhalten, Stoffzusammenhalt bleibt; Dichte kann sich ändern.\n中文题目：按“应力方式”列出 Umformen 的子类并各给一例。\n中文答案：压缩成形（Walzen）；拉压复合（Tiefziehen）；拉伸成形（Längen）；弯曲成形（Abkanten）；剪切/扭转成形（Verdrehen，例如绕制弹簧）。\n出处：FT 1 -  Einführung - Skript.pdf S.6; full.md (Abschnitt: Umformen – Spannungseinwirkung)"]
["Nennen Sie wichtige Untergruppen der Hauptgruppe „Trennen“ nach DIN 8580.","Frage (DE)：Nennen Sie wichtige Untergruppen der Hauptgruppe „Trennen“ nach DIN 8580.\nAntwort (DE)：Zerteilen; Spanen mit geometrisch bestimmter Schneide; Spanen mit geometrisch unbestimmter Schneide; Abtragen; Zerlegen; Reinigen; Evakuieren (nicht endgültig definiert).\n中文题目：列出 DIN 8580 中 Trennen 的重要子分组。\n中文答案：分割 Zerteilen；切削 Spanen（几何确定刃/几何不确定刃）；去除 Abtragen；拆解 Zerlegen；清洗 Reinigen；抽空 Evakuieren（标准中说明未最终定义）。\n出处：FT 1 -  Einführung - Skript.pdf S.7 (Definition+Untergruppen) und S.4 (Übersicht); full.md (Abschnitt: Trennen – Untergruppen)"]
["Nennen Sie die Kriteriengruppen bei der Verfahrensauswahl (nach Westkämper/Warnecke).","Frage (DE)：Nennen Sie die Kriteriengruppen bei der Verfahrensauswahl (nach Westkämper/Warnecke).\nAntwort (DE)：produktbezogen; verfahrensbezogen; wirtschaftlich; umwelttechnisch und sozial.\nTypische Beispiele (DE)：produktbezogen=Werkstoff/Qualität/Belastung; verfahrensbezogen=Werkstoffverbrauch/Energie/Automatisierbarkeit; wirtschaftlich=Rentabilität/Investition/Amortisation; Umwelt&sozial=Arbeitssicherheit/Umweltschutz.\n中文题目：按 Westkämper/Warnecke，工艺选择的 kriteriy 分哪四大类？\n中文答案：产品相关；工艺相关；经济性；环境与社会。\n出处：FT 1 -  Einführung - Skript.pdf S.12; full.md (Abschnitt: Kriterien bei der Verfahrensauswahl)"]
["Begründen Sie: Warum hängt die Verfahrenswahl stark von der Stückzahl ab?","Frage (DE)：Begründen Sie: Warum hängt die Verfahrenswahl stark von der Stückzahl ab?\nAntwort (DE)：Serienfertigung: hohe Investition in Werkzeuge/Formen/Automatisierung lohnt sich durch Stückkostendegression (Amortisation); Einzel-/Kleinserie: flexible Verfahren ohne hohe Rüst-/Werkzeugkosten bevorzugt (schnell verfügbar, geringes Risiko).\n中文题目：解释：为什么“产量/件数”会强烈影响工艺选择？\n中文答案：批量生产可以把模具/专用刀具/自动化的高前期投入摊薄（单位成本下降、可回收投资）；单件/小批量更适合无需大投入、换型快的工艺（风险低、启动快）。\n出处：FT 1 -  Einführung - Skript.pdf S.12 (wirtschaftlich: Investition/Amortisation/Stückleistung); full.md (Kriterien Verfahrensauswahl); Garber_2025_10_02.txt (Beispiele/Einordnung, keine feste Page)"]
["Warum ist die Werkstoffausnutzung bei spanenden Verfahren oft schlechter als bei Ur-/Umformen?","Frage (DE)：Warum ist die Werkstoffausnutzung bei spanenden Verfahren oft schlechter als bei Ur-/Umformen?\nAntwort (DE)：Spanen erzeugt Späne/Abtrag → Masseverlust; typische Werkstoffausnutzung deutlich geringer (ca. 40–50%); zusätzlich meist höherer Energiebedarf pro kg; Recycling möglich, aber Aufwand/Energie bleibt.\nZahlen (DE, aus Folie): Gießen ~90%, Sintern ~95%, Fließpressen ~85%, spanende Verfahren ~40–50%.\n中文题目：为什么切削（Spanen）往往比 Ur-/Umformen 的材料利用率更差？\n中文答案：切削会把材料以切屑/去除形式带走，导致工件质量减少；材料利用率通常明显更低（约 40–50%），且单位质量能耗往往更高；切屑虽可回收但仍需要额外能耗与流程成本。\n出处：FT 1 -  Einführung - Skript.pdf S.13 (Werkstoffausnutzung/Energiebedarf); full.md (Energie- und Ressourceneffizienz)"]
["Welche Tendenz gilt allgemein: Umformen vs spanende Verfahren hinsichtlich Genauigkeit (ISO-IT)?","Frage (DE)：Welche Tendenz gilt allgemein: Umformen vs spanende Verfahren hinsichtlich Genauigkeit (ISO-IT)?\nAntwort (DE)：Je kleiner IT, desto genauer (µm-Abweichungen); spanende Verfahren erreichen i.d.R. kleinere IT als Umformen; Schleifen (z.B. Rundschleifen) gehört zu den genauesten spanenden Verfahren; Umformverfahren oft gröbere IT, mit Sondermaßnahmen besser erreichbar.\nHinweis (DE)：In der Folie sind „normal erreichbar“ und „mit Sondermaßnahmen erreichbar“ getrennt dargestellt.\n中文题目：一般趋势：Umformen 与 Spanen 在精度（ISO-IT）上如何比较？\n中文答案：IT 数字越小表示越精确（允许偏差以 µm 给出）；一般切削加工能达到更小的 IT（更高精度），磨削通常最精密；成形加工通常 IT 较大（精度较低），但通过特殊措施可改善。\n出处：FT 1 -  Einführung - Skript.pdf S.14–15 (ISO-Toleranzen, erreichbare IT); full.md (ISO-Toleranzen)"]
["Was bedeuten die Rauheitskennwerte Ra und Rz?","Frage (DE)：Was bedeuten die Rauheitskennwerte Ra und Rz?\nAntwort (DE)：Ra: arithmetischer Mittelwert der Profilordinaten (Beträge) über die Messstrecke; Aussagekraft begrenzt (Spitzen/Täler wirken wenig auf Mittelwert). Rz: gemittelte Rautiefe = Mittelwert der Einzelrautiefen (Höhenunterschiede) über mehrere Einzelmessstrecken.\n中文题目：Ra 与 Rz 各表示什么？\n中文答案：Ra 是轮廓偏差（绝对值）的算术平均值，代表“平均粗糙度”；Rz 是多段采样得到的平均峰谷高度差（平均粗糙深度），对峰谷更敏感。\n出处：FT 1 -  Einführung - Skript.pdf S.16 (DIN EN ISO 4287); full.md (Rauheitskenngrößen); ft1_p17.png (Grafik/Beispiele, falls genutzt)"]
["Was ist die Scherzone/Scherebene und was bedeutet „Spanstauchung (h1 > h)“?","Frage (DE)：Was ist die Scherzone/Scherebene und was bedeutet „Spanstauchung (h1 > h)“?\nAntwort (DE)：Scherzone/Scherebene: Bereich vor der Schneide, in dem das Material bei Erreichen der Grenzschubspannung plastisch abgeschert wird (starke Erwärmung). Spanstauchung: Span wird dicker als ungeschnittener Span (h1 > h); je größer, desto mehr Umformarbeit/Energie nötig (Reibung, Vorstauchung). Ablauf (Stichworte): elastische Verformung → Abscheren → (ggf.) Rissbildung → große Umformung → zusätzliche Energie durch Spanstauchung.\n中文题目：什么是剪切区/剪切面？“切屑压缩（h1>h）”意味着什么？\n中文答案：剪切区/剪切面是刀具前方材料达到临界剪应力后发生强塑性剪切的区域，并伴随强烈发热；切屑压缩 h1>h 表示切屑厚于未切削层，压缩越大需要的变形功/能量越多（摩擦、预压缩等）。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.4; full.md (Spanbildung und Spanstauchung)"]
["Es gilt α + β + γ = 90°. Gegeben: α = 10°, β = 70°. Berechnen Sie γ.","Frage (DE)：Es gilt α + β + γ = 90°. Gegeben: α = 10°, β = 70°. Berechnen Sie γ.\nAntwort (DE)：γ = 90° − α − β = 90° − 10° − 70° = 10°.\nPrüfungshinweis (txt)：Dozent betont: α+β+γ bleibt 90° auch bei negativem γ.\n中文题目：已知 α+β+γ=90°，α=10°、β=70°，求 γ。\n中文答案：γ=10°。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.4–5 (α+β+γ=90°); full.md (Definitionen Schneidkeil); Garber_2025_10_02.txt (Hinweis: auch bei negativem γ gilt die Beziehung)"]
["Skizzieren Sie den Schneidkeil in der Keilmessebene und beschriften Sie: Spanfläche, Freifläche, α, β, γ.","Frage (DE)：Skizzieren Sie den Schneidkeil in der Keilmessebene und beschriften Sie: Spanfläche, Freifläche, α, β, γ.\nAntwort (DE)：Keilmessebene: Seitenansicht auf die Schneide; Spanfläche: Fläche, über die der Span abläuft; Freifläche: Fläche, die der entstehenden Schnittfläche zugekehrt ist (Reibung vermeiden). α = Freiwinkel an der Freifläche; γ = Spanwinkel an der Spanfläche; β = Keilwinkel zwischen Span- und Freifläche; Beziehung: α+β+γ=90°.\n中文题目：在 Keilmessebene 画出刀具楔形，并标注：Spanfläche、Freifläche、α、β、γ。\n中文答案：在楔形测量平面画刀具侧视：切屑流过的面为 Spanfläche，靠近已加工表面且应避免摩擦的面为 Freifläche；α 为后角（在 Freifläche），γ 为前角（在 Spanfläche），β 为楔角（两面之间）；并注明 α+β+γ=90°。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.5 (Winkel) und S.7 (Flächendefinitionen); full.md (Schneidkeil/Flächen); Garber_2025_10_02.txt (häufige Fehler bei Beschriftung)"]
["Wie ist der Spanwinkel γ richtig definiert (häufiger Fehler)?","Frage (DE)：Wie ist der Spanwinkel γ richtig definiert (häufiger Fehler)?\nAntwort (DE)：γ = Winkel zwischen Spanfläche (am Werkzeug) und der Senkrechten in der Keilmessebene; nicht zwischen Spanfläche und dem Span selbst; Spanfläche/Freifläche sind Werkzeugflächen.\n中文题目：γ（前角）的正确定义是什么（常见错误点）？\n中文答案：γ 是在楔形测量平面内，刀具前刀面（Spanfläche）与法线之间的夹角；常见错误是把它当成“前刀面与切屑本身”的夹角。并注意：Spanfläche/Freifläche都是刀具的面。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.5 (Definitionen) und S.7 (Spanfläche=Werkzeugfläche); full.md (Spanwinkel); Garber_2025_10_02.txt (Dozent nennt den typischen Fehler explizit)"]
["Skizzieren Sie einen Schneidkeil mit negativem Spanwinkel (γ < 0) und nennen Sie die Wirkung.","Frage (DE)：Skizzieren Sie einen Schneidkeil mit negativem Spanwinkel (γ < 0) und nennen Sie die Wirkung.\nAntwort (DE)：Skizze: γ < 0 (Spanfläche gegen die Senkrechte „zurückgeneigt“), α+β+γ=90° bleibt gültig; Wirkung: Schneidkeil stabiler/robuster; begünstigt Reißspäne; ermöglicht Schruppbearbeitung; Nachteile: Schnittkräfte, Antriebsleistung und Wärmeentwicklung ↑.\n中文题目：画出 γ<0 的负前角刀具楔形，并说明影响。\n中文答案：负前角表示前刀面相对法线“向后倾”；仍满足 α+β+γ=90°。优点：刃口楔角更“厚”更稳定，适合粗加工，易形成裂断切屑；缺点：切削力、所需功率与发热上升。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.11 (kleiner/negativer Spanwinkel) und S.9 (Reißspan-Bedingungen); full.md (Wahl der Keilwinkel); Garber_2025_10_02.txt (Skizze/γ<0 wird betont)"]
["Begründen Sie den Zielkonflikt: großer Spanwinkel vs kleiner/negativer Spanwinkel.","Frage (DE)：Begründen Sie den Zielkonflikt: großer Spanwinkel vs kleiner/negativer Spanwinkel.\nAntwort (DE)：Großer γ: begünstigt Fließspäne, gute Oberfläche, geringere Schnittkräfte, höhere Schnittgeschwindigkeiten möglich; aber Schneidkeil schwächer, Verschleiß ↑, Wärmeabfuhr aus der Schneide schlechter. Kleiner/negativer γ: stabilisiert Schneidkeil, Standzeit ↑, Schruppen möglich; aber Schnittkräfte/Antriebsleistung/Wärmeentwicklung ↑, Oberfläche tendenziell schlechter (Reißspan).\n中文题目：解释：大前角 vs 小/负前角的矛盾权衡。\n中文答案：大前角有利于形成流动切屑、表面更好、切削力更小、可用更高切削速度，但刀具楔形变薄、磨损增大、刃口散热变差；小/负前角使刃口更稳、寿命更长、适合粗加工，但切削力/功率/发热增加，且更可能出现裂断切屑导致表面变差。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.11 (Wahl der Keilwinkel) sowie S.9–10 (Spanformen/Oberfläche); full.md (Wahl der Keilwinkel)"]
["Nennen Sie Werkzeugebene, Keilmessebene und Arbeitsebene und was man darin betrachtet.","Frage (DE)：Nennen Sie Werkzeugebene, Keilmessebene und Arbeitsebene und was man darin betrachtet.\nAntwort (DE)：Werkzeugebene: Ebene durch Schneidenpunkt, senkrecht zur Schnittrichtung (Blick von oben auf das Werkzeug). Keilmessebene: senkrecht zur Schneidebene, Blick von der Seite; dort werden α, β, γ am Keil gemessen. Arbeitsebene: gedachte Ebene mit Schnittrichtung und Vorschubrichtung (Bewegungsbezug). Kontext: Schneidebene enthält Hauptschneide und Schnittrichtung (liegt nahe Werkstückoberfläche unter dem Schnitt).\n中文题目：说出 Werkzeugebene、Keilmessebene、Arbeitsebene，并说明各自看什么。\n中文答案：Werkzeugebene：通过切削点且垂直于切削方向，用于从上往下看刀具；Keilmessebene：侧视刀具楔形，用来测 α/β/γ；Arbeitsebene：包含切削方向与进给方向的工作平面，用于描述运动关系。（补充：Schneidebene 含主切削刃与切削方向。）\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.8; full.md (Bezugssysteme)"]
["Verfahrenswahl: Schmieden/Umformen-Kette vs Gießen – welcher Vorteil/Nachteil?","Frage (DE)：Verfahrenswahl: Schmieden/Umformen-Kette vs Gießen – welcher Vorteil/Nachteil?\nAntwort (DE)：Schmieden/Umformen-Kette: i.d.R. höhere Qualität/Festigkeit, aber mehr Prozessschritte → Aufwand/Kosten/Termine ↑. Gießen-Kette: weniger Schritte → oft günstiger/schneller, aber ggf. schlechtere Eigenschaften/Genauigkeit → häufig Nachbearbeitung (Fräsen/Schleifen) nötig.\n中文题目：工艺选择：锻造/成形链 vs 铸造链，各自优缺点？\n中文答案：成形/锻造链通常能得到更高的强度与质量，但工序更多导致成本、时间与组织难度上升；铸造链更短通常更便宜更快，但性能/精度可能较差，往往需要后续机加工与磨削来达到要求。\n出处：FT 1 -  Einführung - Skript.pdf S.11 (Verfahrenskette-Vergleich) und S.12 (Kriterien); full.md (Verfahrenskette); Garber_2025_10_02.txt (Diskussion Qualität vs Kosten)"]
["Was passiert bei spröden Werkstoffen bzw. bei kleinen/negativen Spanwinkeln und niedriger Schnittgeschwindigkeit – welche Spanform entsteht typischerweise und welche Oberfläche?","Frage (DE)：Was passiert bei spröden Werkstoffen bzw. bei kleinen/negativen Spanwinkeln und niedriger Schnittgeschwindigkeit – welche Spanform entsteht typischerweise und welche Oberfläche?\nAntwort (DE)：Typisch Reiß- oder Bröckelspan: Spanteile reißen ab, kaum Umformung; Bedingungen: spröde Werkstoffe (z.B. Guss, Bronze, Messing) oder bei zähen Werkstoffen bei niedriger v_c (bis 10 m/min) und kleinem bis negativem γ; Folgen: raue Oberfläche; geringe Schnittkräfte (wenig Umformarbeit).\n中文题目：脆性材料或“小/负前角 + 低切削速度”时，通常形成哪种切屑？表面如何？\n中文答案：通常形成裂断/崩碎切屑（Reiß-/Bröckelspan）：切屑块撕裂断开、塑性变形很小；典型在脆性材料（如铸铁、青铜、黄铜），或韧性材料在低切削速度（约≤10 m/min）且小到负前角时也会出现；表面更粗糙，但切削力相对较小。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.9 (Reiß-/Bröckelspan) und S.11 (klein/negativ γ); full.md (Reißspan); Garber_2025_10_02.txt (Dozent erwähnt spröde Werkstoffe → Bruchspan)"]
["Nennen Sie die drei Spanformen und ordnen Sie typische Merkmale sowie Schnittgeschwindigkeiten zu.","Frage (DE)：Nennen Sie die drei Spanformen und ordnen Sie typische Merkmale sowie Schnittgeschwindigkeiten zu.\nAntwort (DE)：Reißspan/Bröckelspan: Spanteile reißen ab, geringe Umformarbeit/Schnittkräfte, raue Oberfläche, spröde Werkstoffe bzw. bei zähen Werkstoffen niedrige vc bis ca. 10 m/min und kleiner/negativer γ；Scherspan/Lamellenspan: duktiler Werkstoff, vc ca. 20–80 m/min, größerer γ, lamellenartig, Lamellen können wieder verschweißen；Fließspan: kontinuierlicher Span, vc > ca. 80 m/min, großer γ, beste Oberfläche, beim Drehen/Bohren wegen langer Späne oft unerwünscht.\n中文题目：列出三种切屑形态，并说明典型特征与大致切削速度范围。\n中文答案：撕裂屑/崩碎屑：切屑几乎不塑性变形就断裂，变形功和切削力小，表面粗糙；常见于脆性材料，也可在低切速（约≤10 m/min）和小/负前角时出现在韧性材料中。剪切屑/层片屑：韧性材料，切速约20–80 m/min且前角增大时出现，呈层片状，层片可能再焊合。流屑：连续流动，切速>约80 m/min、大前角，表面质量最好，但在车削/钻削中长屑常不希望出现。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.9–11；full.md, Abschnitt 2.1 Spanformen；Garber_2025_10_09.txt（老师强调Spanformen为必会点）。"]
["Begründen Sie: Warum begünstigt ein großer Spanwinkel γ Fließspäne und gute Oberflächen?","Frage (DE)：Begründen Sie: Warum begünstigt ein großer Spanwinkel γ Fließspäne und gute Oberflächen?\nAntwort (DE)：großer γ → Spanablauf leichter, keine/geringere Lamellenbildung → Fließspan；Schnittkräfte ↓ → Oberfläche besser；nur sinnvoll v. a. bei weichen Werkstoffen；Nachteile: Schneidkeil schlanker, Verschleiß ↑, Wärmeabfuhr aus der Schneide schlechter, Standzeit kann sinken.\n中文题目：解释：为什么大前角γ更容易形成流屑并获得更好表面？\n中文答案：γ大时切屑更容易沿前刀面流走，层片形成减少或消失，因此更容易形成流屑；切削力下降，表面质量变好。适用上主要用于软材料。代价是刀楔变薄弱，磨损增加，刀尖散热变差，刀具寿命可能降低。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.11–12；full.md, Abschnitt 2.1 Wahl der Keilwinkel；Garber_2025_10_09.txt（课堂强调γ对Spanform/Oberfläche的影响）。"]
["Skizzieren/benennen Sie: Freiwinkel α, Keilwinkel β, Spanwinkel γ. Welche Beziehung gilt?","Frage (DE)：Skizzieren/benennen Sie: Freiwinkel α, Keilwinkel β, Spanwinkel γ. Welche Beziehung gilt?\nAntwort (DE)：Skizze in der Keilmessebene；α = Freiwinkel zwischen Freifläche und erzeugter Schnittfläche/Werkstückoberfläche；β = Keilwinkel des Schneidkeils；γ = Spanwinkel zwischen Spanfläche und Bezugslinie；Spanfläche = Fläche, über die der Span abläuft；Freifläche = Fläche zur entstehenden Schnittfläche；Beziehung: α + β + γ = 90°.\n中文题目：画/写出后角α、楔角β、前角γ，并给出关系式。\n中文答案：应在楔角测量平面画图。α为后角，位于后刀面与已加工表面/切削表面之间；β为刀楔角；γ为前角，描述前刀面倾角；前刀面是切屑流过的面，后刀面朝向生成的切削表面。关系式：α + β + γ = 90°。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.6–8；full.md, Abschnitt 2.1 Definitionen des Schneidkeils/Flächen；Garber_2025_10_09.txt（课堂强调角度定义和关系）。"]
["Verfahrenswahl: Für hohe Zerspanleistung (Schruppen) – eher großer oder kleiner/negativer γ? Begründen.","Frage (DE)：Verfahrenswahl: Für hohe Zerspanleistung (Schruppen) – eher großer oder kleiner/negativer γ? Begründen.\nAntwort (DE)：kleiner oder negativer γ；Begründung: stabilerer Schneidkeil, größerer beanspruchbarer Querschnitt, höhere Standzeit, geeignet für Werkstoffe hoher Festigkeit und Schruppbearbeitung；ermöglicht hohe Schnittgeschwindigkeiten/Bearbeitungszeit ↓, aber Schnittkräfte ↑, Antriebsleistung ↑, Wärmeentwicklung ↑, Oberfläche tendenziell schlechter/Reißspan begünstigt.\n中文题目：工艺选择：为了高去除率粗加工（Schruppen），γ应选大还是小/负？说明理由。\n中文答案：应选小前角或负前角。理由：刀楔更稳定、承载截面更大、刀具寿命更高，适合高强度材料和粗加工；可承受较高切削速度、缩短加工时间。缺点是切削力、驱动功率和热量上升，表面质量趋差，并更容易形成撕裂屑。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.12；full.md, Abschnitt 2.1 Wahl der Keilwinkel；Garber_2025_10_09.txt（课堂强调Schruppen/Schlichten与γ选择）。"]
["Was ist die Zustellbewegung?","Frage (DE)：Was ist die Zustellbewegung?\nAntwort (DE)：Nebenbewegung beim Zerspanen；legt die Zustellung fest und bestimmt die Spandicke；Abgrenzung: Anstellbewegung = Positionieren vor Prozess, Nachstellbewegung = Ausgleich von Werkzeugverschleiß, Vorschub = kontinuierliche/mehrmalige Spanabnahme.\n中文题目：什么是Zustellbewegung（切入/进刀运动）？\n中文答案：Zustellbewegung属于切削中的辅运动，用来设定切入量并决定切屑厚度。区分：Anstellbewegung是加工前定位；Nachstellbewegung是补偿刀具磨损；Vorschub是实现连续或多次切屑去除的进给运动。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.16；full.md, Abschnitt 2.1 Haupt- und Nebenbewegungen；Garber_2025_10_09.txt（课堂讲过运动定义）。"]
["Definieren Sie Freiflächenverschleiß und VB. Nennen Sie typische zulässige VB-Werte beim Drehen.","Frage (DE)：Definieren Sie Freiflächenverschleiß und VB. Nennen Sie typische zulässige VB-Werte beim Drehen.\nAntwort (DE)：Freiflächenverschleiß: Verschleiß an der Freifläche/Haupt- und Nebenschneide, hauptsächlich durch Reibung；VB = Verschleißmarkenbreite, sichtbare Breite der Verschleißmarke；SV = Schneidenversatz, notwendige Nachstellung für gleiches Maß；zulässige VB-Werte Drehen: Schruppdrehen große Werkstücke 1,0–1,5 mm, Schruppdrehen kleine Werkstücke 0,8–1,0 mm, Feinbearbeitung 0,1–0,2 mm, Schlichtdrehen 0,2–0,3 mm.\n中文题目：定义后刀面磨损和VB，并给出车削时典型允许VB值。\n中文答案：后刀面磨损是主切削刃和副切削刃附近后刀面因摩擦产生的磨损；VB是可见磨损带宽。SV是为达到未磨损刀具相同尺寸而必须补偿的刀尖后退量。车削允许VB参考值：粗车大工件1.0–1.5 mm，粗车小工件0.8–1.0 mm，精加工0.1–0.2 mm，光车0.2–0.3 mm。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24；full.md, Abschnitt 2.2 Freiflächenverschleiß；Garber_2025_10_09.txt（课堂强调VB/SV与换刀判据）。"]
["Berechnen Sie den Schneidenversatz: α = 6°, γ = 10°, VB = 0,30 mm.","Frage (DE)：Berechnen Sie den Schneidenversatz: α = 6°, γ = 10°, VB = 0,30 mm.\nAntwort (DE)：Formel: SV = VB · tan(α) / [1 − tan(α) · tan(γ)]；Einsetzen: tan6° = 0,1051, tan10° = 0,1763；SV = 0,30 mm · 0,1051 / (1 − 0,1051·0,1763) = 0,0315 / 0,9815 mm ≈ 0,032 mm；Einheit mm；Achtung: Winkel in Grad, γ im Nenner nicht mit β verwechseln.\n中文题目：计算刀尖后退量：α=6°，γ=10°，VB=0.30 mm。\n中文答案：公式：SV = VB·tan(α) / [1 − tan(α)·tan(γ)]。代入：tan6°=0.1051，tan10°=0.1763，SV = 0.30·0.1051/(1−0.1051·0.1763) ≈ 0.032 mm。单位为mm；注意角度用度，分母中是γ，不要误写成β。\n出处：Formelblatt Fertigungstechnik.pdf, S.1；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24（SV/VB定义）；full.md, Formelblatt + Abschnitt 2.2 Freiflächenverschleiß；Garber_2025_10_09.txt（课堂推导并强调公式要会）。"]
["Warum ist der Schneidenversatz SV wichtiger als nur VB?","Frage (DE)：Warum ist der Schneidenversatz SV wichtiger als nur VB?\nAntwort (DE)：VB beschreibt nur die sichtbare Verschleißmarke；SV beschreibt die wirksame Lageänderung der Schneide；SV führt direkt zu Maßabweichung/Formabweichung am Werkstück；Bewertung gegen Toleranz: z. B. SV 0,03 mm ist bei 0,1 mm Toleranz evtl. zulässig, bei 20 µm nicht；zunehmender Freiflächenverschleiß verschlechtert außerdem Oberfläche durch Reiben, höhere Kräfte/Temperatur.\n中文题目：为什么刀尖后退量SV比只看VB更重要？\n中文答案：VB只描述看得见的磨损带宽；SV描述有效切削刃位置的实际变化，直接导致工件尺寸偏差和形状误差。换刀/补偿时应把SV与公差比较，例如SV=0.03 mm对0.1 mm公差可能还能接受，对20 µm公差就不可接受。后刀面磨损继续增加还会因摩擦增强导致表面变差、力和温度上升。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24；Formelblatt Fertigungstechnik.pdf, S.1；full.md, Abschnitt 2.2 Freiflächenverschleiß；Garber_2025_10_09.txt（课堂强调SV比只看VB更贴近尺寸精度/公差）。"]
["Nennen Sie Bedingungen, Folgen und Gegenmaßnahmen der Aufbauschneidenbildung.","Frage (DE)：Nennen Sie Bedingungen, Folgen und Gegenmaßnahmen der Aufbauschneidenbildung.\nAntwort (DE)：Bedingungen: hoher Druck + hohe Temperatur vor der Schneide, mittlere Schnittgeschwindigkeiten, starke Abhängigkeit von Materialpaarung；besonders kritisch: Stahl + HSS；an keramischen Schneidstoffen keine/kaum Aufbauschneiden；Ablauf/Folgen: Aufschweißung vor Schneide, fließender Span reißt Aufbauschneide ab, Schneidstoffteile werden mitgerissen, Schneidenoberfläche rau, Werkstückoberfläche schlechter, Verschleiß ↑；Gegenmaßnahmen: geeigneter Schneidstoff/Beschichtung, Schnittgeschwindigkeit aus gefährdetem Bereich wählen, KSS/Temperaturführung, glatte Spanfläche.\n中文题目：列出积屑瘤形成的条件、后果和对策。\n中文答案：条件：刀尖前方高压高温、中等切削速度，且强烈依赖工件-刀具材料配对；钢+高速钢尤其容易，陶瓷刀具基本不形成积屑瘤。过程/后果：材料在刀尖前焊附形成积屑瘤，流动切屑又把它撕下并带走刀具材料，使刀面粗糙、工件表面变差、磨损增加。对策：选合适刀具材料/涂层，避开危险切速区，使用冷却润滑和合理温度控制，保持光滑前刀面。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.20；full.md, Abschnitt 2.2 Aufbauschneidenbildung；Garber_2025_10_09.txt（课堂强调中等速度、高温和材料配对）。"]
["Was ist Diffusionsverschleiß und wie kann man ihn reduzieren?","Frage (DE)：Was ist Diffusionsverschleiß und wie kann man ihn reduzieren?\nAntwort (DE)：Diffusionsverschleiß: bei hohen Temperaturen verlassen Atome feste Gitterplätze；Atomaustausch zwischen Schneidstoff und Span/Werkstoff；Schneidstoff verändert sich und wird weicher；bei Hartmetall typisch: Auskolkung auf der Spanfläche, wo höchste Temperaturen entstehen；Beispiele: Kobalt-Diffusion aus Hartmetall, Auflösen/Mitnehmen von Carbiden, Eisen-/Kohlenstoffdiffusion；Reduktion: Temperatur senken, vc senken, wirksame Kühlung/KSS, diffusionsbeständigen Schneidstoff wählen, Beschichtung als Diffusionsschutz.\n中文题目：什么是扩散磨损？如何降低？\n中文答案：扩散磨损是在高温下原子离开晶格位置，刀具材料与切屑/工件之间发生原子交换，使刀具材料成分改变并变软。硬质合金中典型表现是前刀面高温区域形成月牙洼；可涉及钴扩散、碳化物溶解并被切屑带走、铁/碳向硬质合金扩散。降低方法：降温、降低切削速度、有效冷却润滑、选择抗扩散刀具材料、使用阻挡扩散的涂层。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.22；full.md, Abschnitt 2.2 Diffusionsverschleiß；Garber_2025_10_09.txt（课堂强调高温/约>1000°C量级和降温对策）。"]
["Nennen Sie Maßnahmen zur Verringerung des Reibungsverschleißes.","Frage (DE)：Nennen Sie Maßnahmen zur Verringerung des Reibungsverschleißes.\nAntwort (DE)：Schnittgeschwindigkeit vc verringern → Temperatur ↓；Kühlschmierstoff einsetzen → kühlen + schmieren；harte/glatte Beschichtungen → Reibung und Abrieb ↓；ggf. Spanwinkel vergrößern/Spanablauf verbessern → Reibung auf der Spanfläche ↓；Prinzip: Reibung unter hohem Druck an Spanfläche und Freifläche reduzieren.\n中文题目：列举降低摩擦磨损的措施。\n中文答案：降低切削速度以降低温度；使用冷却润滑液，兼具冷却和润滑作用；采用硬且光滑的涂层，降低摩擦和磨粒磨损；必要时增大前角/改善切屑流动，以降低前刀面摩擦。核心原则是减少前刀面和后刀面在高压接触下的摩擦。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.19；full.md, Abschnitt 2.2 Reibungsverschleiß + Prüfungsbeispiel；Garber_2025_10_09.txt（课堂强调vc、KSS、Beschichtung）。"]
["Gegeben: KT = 0,12 mm, KM = 0,30 mm. Bestimmen Sie K und beurteilen Sie die Zulässigkeit.","Frage (DE)：Gegeben: KT = 0,12 mm, KM = 0,30 mm. Bestimmen Sie K und beurteilen Sie die Zulässigkeit.\nAntwort (DE)：Formel: K = KT/KM；Einsetzen: K = 0,12 mm / 0,30 mm = 0,40；Grenzwert: K ≤ 0,4；Beurteilung: gerade noch zulässig/Grenzfall；Zusatz: Kolkverschleiß = muldenförmige Aushöhlung der Spanfläche hinter der Schneide, verursacht durch Reibung + Diffusion；ändert Spanablaufrichtung und γ, schwächt bei kleinem β die Schneide；Abhilfe: Beschichtung zur Verringerung der Spanflächenreibung.\n中文题目：已知KT=0.12 mm，KM=0.30 mm，求K并判断是否允许。\n中文答案：公式：K=KT/KM。代入：K=0.12/0.30=0.40。极限为K≤0.4，所以刚好允许/处于边界。补充：月牙洼磨损是前刀面靠近切削刃后的凹坑，由摩擦和扩散共同造成，会改变切屑流向和前角γ；在小楔角β时会削弱刀刃。对策是用涂层降低前刀面摩擦。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.26；Formelblatt Fertigungstechnik.pdf, S.1；full.md, Abschnitt 2.2 Kolkverschleiß；Garber_2025_10_09.txt（课堂强调K=KT/KM和Grenzwert 0,4）。"]
["Nennen Sie typische Ursachen für Absplittern/Bruch der Schneidkante.","Frage (DE)：Nennen Sie typische Ursachen für Absplittern/Bruch der Schneidkante.\nAntwort (DE)：zu hohe Spannungen/Überlast；übermäßige Vibration/Rattern；fortgeschrittener Verschleiß；harte Einschlüsse/Verunreinigungen im Werkstoff, z. B. Carbide, Sand；zu kleiner Keilwinkel bzw. zu schwache Schneidkante, besonders bei HM-Werkzeugen；Abhilfe: Keilwinkel vergrößern, Span- und Freiflächenfase anbringen, Schwingungen/Spanquerschnitt reduzieren, Werkstoff/Prozess prüfen.\n中文题目：列举刀刃崩刃/断裂的典型原因。\n中文答案：过高应力或过载；强振动/颤振；磨损严重；工件中有硬质夹杂或污染物，如碳化物、砂粒；楔角太小导致切削刃太弱，硬质合金刀具尤其敏感。对策：增大楔角，加前刀面/后刀面倒棱，降低振动和切屑截面，检查材料与工艺条件。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.23；FT 3 - Drehen - Skript.pdf, S.17；full.md, Abschnitt 2.2 Verformung/Absplittern + Drehen Fehler am Werkzeug；Garber_2025_10_09.txt（课堂讲过断裂/崩刃原因）。"]
["Welche Formel müssen Sie für die Prüfung auswendig können (Kienzle) und welche Größen brauchen Sie dafür?","Frage (DE)：Welche Formel müssen Sie für die Prüfung auswendig können (Kienzle) und welche Größen brauchen Sie dafür?\nAntwort (DE)：Prüfungsform der Kienzle-Formel: F_c = k_c1,1 · b · h_0 · K_v · K_ver · K_γ · K_sch · (h/h_0)^(1−m_c). Gleichwertig: F_c = k_c1,1 · b · h · K_v · K_ver · K_γ · K_sch · (h/h_0)^(−m_c). Größen: b Spanungsbreite [mm], h Spanungsdicke [mm], h_0 = 1 mm, k_c1,1 Hauptwert der spezifischen Schnittkraft [MPa = N/mm²], 1−m_c Tabellenwert, K_v Schnittgeschwindigkeit, K_ver Verschleiß, K_γ Spanwinkel, K_sch Schneidstoff. Vorgehen: b,h aus Geometrie bestimmen → Tabellenwerte wählen → Korrekturfaktoren einsetzen → Einheit N. Merkhilfe/Prüfungsfalle: Tabellen geben meist 1−m_c an, deshalb die sichere Rechenform mit b·h_0·(h/h_0)^(1−m_c) verwenden.\n中文题目：期末必须背的 Kienzle 公式是哪条？需要哪些量？\n中文答案：考试推荐写法：F_c = k_c1,1 · b · h_0 · K_v · K_ver · K_γ · K_sch · (h/h_0)^(1−m_c)。等价写法：F_c = k_c1,1 · b · h · K_v · K_ver · K_γ · K_sch · (h/h_0)^(−m_c)。b=切屑宽度[mm]，h=切屑厚度[mm]，h_0=1 mm，k_c1,1=主值[N/mm²]，1−m_c=表中给出的指数，K_v/K_ver/K_γ/K_sch 分别修正切削速度/磨损/前角/刀具材料。步骤：先由几何算 b,h，再查表和修正，最终单位 N。常见陷阱：表里通常给 1−m_c，不要把指数写错。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.23–25；full.md：Kienzle/往届题“vollständige Kienzle-Formel”；Garber_2025_10_16.txt：老师强调 Kienzle 为必须背的考试公式。"]
["Nennen und erklären Sie kurz Fc, Ff, Fp. Warum ist Fp kritisch?","Frage (DE)：Nennen und erklären Sie kurz Fc, Ff, Fp. Warum ist Fp kritisch?\nAntwort (DE)：F_c Schnittkraft: wirkt gegen Schnittbewegung, wichtigste Größe für Schnittleistung P_c = F_c · v_c. F_f Vorschubkraft: wirkt gegen Vorschubrichtung. F_p Passivkraft: drückt Drehmeißel/Werkstück seitlich weg, keine aktive Bewegung in dieser Richtung. Kritisch: Durchbiegung dünner/langer Werkstücke, Maßfehler, Formfehler; z.B. Werkstück in der Mitte dicker bei zu großer Passivkraft. Ergänzung: F_a = √(F_c²+F_f²), F = √(F_c²+F_f²+F_p²).\n中文题目：列出并解释 Fc、Ff、Fp。为什么 Fp 很关键？\n中文答案：F_c=切削力，反切削运动方向，是计算切削功率 P_c=F_c·v_c 的核心量。F_f=进给力，反进给方向。F_p=被动力/径向力，把刀具或工件侧向推开；该方向没有主动运动。关键原因：细长轴会挠曲，导致尺寸和形状误差，例如中间变粗。补充公式：F_a=√(F_c²+F_f²)，总力 F=√(F_c²+F_f²+F_p²)。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.20；FT 3 - Drehen - Skript.pdf S.16（Passivkraft 过大导致工件误差）；full.md：2.6 Zerspankraft。"]
["Wie beeinflusst der Einstellwinkel \\(\\kappa\\) die Passivkraft-Komponente?","Frage (DE)：Wie beeinflusst der Einstellwinkel \\(\\kappa\\) die Passivkraft-Komponente?\nAntwort (DE)：Auf die Schneide wirkt eine Normalkraft F_N. Zerlegung hängt von κ ab: κ=90° → F_p=0, F_f=F_N; κ=60° → F_p=0,5·F_N, F_f=0,87·F_N; κ=45° → F_p=0,71·F_N, F_f=0,71·F_N. Regel: κ kleiner → F_p-Anteil größer → stärkere seitliche Verformung/Maßfehler. Zusätzlich: Mit kleinerem κ wird der Span breiter und dünner; b steigt, h sinkt.\n中文题目：主偏角 κ 如何影响被动力分量？\n中文答案：刀刃受法向力 F_N，按 κ 分解到 F_p 和 F_f。κ=90° 时 F_p=0；κ=60° 时 F_p=0.5F_N；κ=45° 时 F_p=0.71F_N。规律：κ 越小，被动力分量越大，越容易造成侧向变形和尺寸误差。同时 κ 变小会使切屑变宽变薄：b 增大、h 减小。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.21–22；full.md：2.6 Zerspankraft/Einstellwinkel。"]
["Leiten/Nennen Sie b, h und A beim Längsdrehen in Abhängigkeit von \\(a_p, f, \\kappa\\).","Frage (DE)：Leiten/Nennen Sie b, h und A beim Längsdrehen in Abhängigkeit von \\(a_p, f, \\kappa\\).\nAntwort (DE)：Spanungsbreite: b = a_p / sinκ. Spanungsdicke: h = f · sinκ. Spanungsquerschnitt: A = b · h = a_p · f. Einheiten: a_p, f, b, h in mm; A in mm². Prüfungsfalle: A bleibt bei gleichem a_p und f unabhängig von κ; κ verändert aber die Aufteilung in b und h. κ kleiner → b größer, h kleiner; κ größer → b kleiner, h größer.\n中文题目：推/写出车削 b、h、A 与 a_p、f、κ 的关系。\n中文答案：切屑宽度 b = a_p/sinκ；切屑厚度 h = f·sinκ；切屑截面积 A=b·h=a_p·f。单位：a_p、f、b、h 用 mm，A 用 mm²。考试陷阱：在 a_p 和 f 不变时 A 与 κ 无关，但 κ 会改变 b/h；κ 越小，切屑越宽越薄；κ 越大，切屑越窄越厚。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.22；Formelblatt Fertigungstechnik.pdf S.1；full.md：Drehen/Spangeometrie；Garber_2025_10_16.txt：板书推导 b,h,A。"]
["Warum hängt die spezifische Schnittkraft \\(k_c\\) fast nicht von b, sondern vor allem von h ab? (Kronenberg)","Frage (DE)：Warum hängt die spezifische Schnittkraft \\(k_c\\) fast nicht von b, sondern vor allem von h ab? (Kronenberg)\nAntwort (DE)：Definition: k_c = F_c/A = F_c/(b·h). Empirischer Befund: k_c hängt fast nicht von Spanungsbreite b ab, sondern stark von Spanungsdicke h. Kleine h → größere spezifische Schnittkraft, mehr Einfluss von Schneidenradius/Reibung/Vorstauchung; größere h → k_c kleiner. Doppelt-logarithmische Darstellung k_c(h) ergibt die Kronenberg-Gerade. Hauptwert: k_c1,1 bei b=1 mm und h=1 mm. Prüfungsfolge: Bei konstantem A=a_p·f kann ein größerer κ h erhöhen und dadurch F_c senken.\n中文题目：为什么 k_c 几乎不随 b 变、主要随 h 变？\n中文答案：定义：k_c=F_c/A=F_c/(b·h)。实验规律：k_c 几乎不受切屑宽度 b 影响，而强烈受切屑厚度 h 影响。h 小时，比切削力更大，刀刃圆角、摩擦、预压缩影响更明显；h 大时 k_c 下降。双对数图中 k_c(h) 近似为 Kronenberg 直线。k_c1,1 是 b=1 mm、h=1 mm 时的主值。考试推论：A 不变时，增大 κ 会增大 h，从而倾向降低 F_c。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.23–24；full.md：2.6 Zerspankraft/Kronenberg；Garber_2025_10_16.txt：老师讲解 Kronenberg 逻辑。"]
["Was ist \\(h_0\\) und warum steht \\(h/h_0\\) in der Formel?","Frage (DE)：Was ist \\(h_0\\) und warum steht \\(h/h_0\\) in der Formel?\nAntwort (DE)：h_0 = 1 mm, Referenz-Spanungsdicke. Zweck: h/h_0 ist einheitslos; Potenz (h/h_0)^(1−m_c) bzw. (h/h_0)^(−m_c) ist nur mit dimensionsloser Basis sauber. Zusammenhang: k_c1,1 ist auf b=1 mm und h=1 mm bezogen. Prüfungsfalle: h_0 nicht berechnen, nicht weglassen, immer als 1 mm einsetzen; Tabellenwert ist meist 1−m_c.\n中文题目：h_0 是多少？为什么用 h/h_0？\n中文答案：h_0=1 mm，是参考切屑厚度。作用：h/h_0 变成无量纲，幂函数才合理。k_c1,1 本来就是以 b=1 mm、h=1 mm 为基准定义的。考试陷阱：h_0 不需要计算，不能省略，固定代 1 mm；表中通常给 1−m_c。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.23–25；full.md：Kienzle 公式/往届题；Garber_2025_10_16.txt：老师强调 h_0=1 mm。"]
["Aufgabe a) Längsrunddrehen: \\(\\kappa=60^\\circ\\), \\(f=0{,}5\\,\\text{mm}\\), \\(a_p=4\\,\\text{mm}\\), Werkstoff S355J2. Berechnen Sie \\(F_c\\) ohne Korrekturfaktoren.","Frage (DE)：Aufgabe a) Längsrunddrehen: \\(\\kappa=60^\\circ\\), \\(f=0{,}5\\,\\text{mm}\\), \\(a_p=4\\,\\text{mm}\\), Werkstoff S355J2. Berechnen Sie \\(F_c\\) ohne Korrekturfaktoren.\nAntwort (DE)：Geometrie: b = a_p/sinκ = 4/sin60° = 4,619 mm; h = f·sinκ = 0,5·sin60° = 0,433 mm; A = a_p·f = 2,0 mm². Tabelle S355J2: k_c1,1 = 1499 MPa = 1499 N/mm²; 1−m_c = 0,71; h_0=1 mm. Ohne Korrekturfaktoren: F_c = k_c1,1 · b · h_0 · (h/h_0)^(1−m_c) = 1499·4,619·1·(0,433/1)^0,71 = 3821,6 N ≈ 3,82 kN. Punkte: Einheiten sauber, MPa=N/mm², h_0=1 mm, exponent 0,71.\n中文题目：题 a：κ=60°，f=0.5 mm，a_p=4 mm，材料 S355J2。忽略修正系数，求 F_c。\n中文答案：几何：b=4/sin60°=4.619 mm；h=0.5·sin60°=0.433 mm；A=2.0 mm²。查表 S355J2：k_c1,1=1499 MPa=1499 N/mm²；1−m_c=0.71；h_0=1 mm。忽略修正：F_c=1499·4.619·1·(0.433/1)^0.71=3821.6 N≈3.82 kN。得分点：单位、h_0=1 mm、指数 0.71。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.25–26；full.md：Kienzle 计算往届题；Garber_2025_10_16.txt 与板书结果 F_c≈3822 N。"]
["Aufgabe b) Wird \\(F_c\\) größer oder kleiner bei \\(\\kappa=80^\\circ\\) (ohne Rechnung begründen)?","Frage (DE)：Aufgabe b) Wird \\(F_c\\) größer oder kleiner bei \\(\\kappa=80^\\circ\\) (ohne Rechnung begründen)?\nAntwort (DE)：F_c wird kleiner. Begründung: A = a_p·f bleibt gleich; κ↑ von 60° auf 80° → h=f·sinκ steigt (0,433 → 0,492 mm), b=a_p/sinκ sinkt (4,619 → 4,062 mm). Weil k_c vor allem von h abhängt und bei größerem h kleiner wird, sinkt F_c. Kontrollrechnung: F_c(80°) ≈ 3682 N < 3822 N. Zusatz: Gleichzeitig sinkt die Passivkraft-Komponente gegenüber kleinerem κ.\n中文题目：题 b：κ 改为 80°，F_c 变大还是变小？先不算，先解释。\n中文答案：F_c 变小。理由：A=a_p·f 不变；κ 从 60° 增到 80° 时，h=f·sinκ 增大（0.433→0.492 mm），b=a_p/sinκ 减小（4.619→4.062 mm）。因为 k_c 主要受 h 影响，h 变大时 k_c 下降，所以 F_c 下降。校核计算：F_c(80°)≈3682 N，小于 3822 N。补充：κ 增大时被动力分量也会下降。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.21–23, S.26；full.md：Drehen/Spangeometrie 与 Kienzle 题型；Garber_2025_10_16.txt：老师强调“先判断再计算”。"]
["Aufgabe c) \\(\\kappa=80^\\circ\\): Wie ändert sich \\(F_c\\) bei stark verschlissenem Werkzeug, \\(v_c=120\\,\\text{m/min}\\), \\(\\gamma=12^\\circ\\)?","Frage (DE)：Aufgabe c) \\(\\kappa=80^\\circ\\): Wie ändert sich \\(F_c\\) bei stark verschlissenem Werkzeug, \\(v_c=120\\,\\text{m/min}\\), \\(\\gamma=12^\\circ\\)?\nAntwort (DE)：Aus b) ohne Korrekturen: F_c0(κ=80°) ≈ 3682 N. K_v = 1−0,0003·v = 1−0,0003·120 = 0,964. Für Stahl: γ_0=6°, K_γ = 1−(γ−γ_0)/100 = 1−(12−6)/100 = 0,94. Stark verschlissen: K_ver = 1,3…1,5; bei Rechnung mit 1,5: F_c = 3682·0,964·1,5·0,94·K_sch. Falls Schneidstoff nicht extra gegeben: K_sch=1,0 für Vollhartmetall/keine zusätzliche Korrektur. Ergebnis: F_c ≈ 5004 N ≈ 5,00 kN; mit K_ver=1,3 wären es ≈4337 N. Kernaussage: Verschleiß erhöht F_c deutlich; höhere Geschwindigkeit und größerer positiver Spanwinkel senken hier über K_v und K_γ.\n中文题目：题 c：κ=80°，强磨损、v_c=120 m/min、γ=12° 时，F_c 如何变化？\n中文答案：b) 的基础值 F_c0≈3682 N。K_v=1−0.0003·120=0.964。钢材 γ_0=6°，K_γ=1−(12−6)/100=0.94。强磨损 K_ver=1.3…1.5；取 1.5 时：F_c=3682·0.964·1.5·0.94·K_sch。若刀具材料未另外指定，按 Vollhartmetall/不额外修正取 K_sch=1.0。结果 F_c≈5004 N≈5.00 kN；若 K_ver=1.3，则≈4337 N。核心：磨损显著增大切削力；速度项和更大的正前角在这里会降低修正值。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.24–26；full.md：Kienzle 公式与修正系数；Garber_2025_10_16.txt：老师讲 Korrekturfaktoren/板书计算。"]
["Nennen Sie die wichtigsten Anforderungen an Schneidstoffe.","Frage (DE)：Nennen Sie die wichtigsten Anforderungen an Schneidstoffe.\nAntwort (DE)：Härte deutlich größer als Werkstoff; Warmhärte/Warmfestigkeit auch bei hoher Temperatur, entscheidend für hohe Schnittgeschwindigkeit; Verschleißfestigkeit; gute Wärmeleitfähigkeit, Wärmeabfluss ins Werkzeug; Zähigkeit/Bruchfestigkeit gegen hohe/schlagartige Belastungen; Thermoschockbeständigkeit, kein Abplatzen bei plötzlicher Temperaturänderung/KSS; chemische Stabilität gegenüber Schmierstoff, Sauerstoff, Span/Werkstoff. Merksatz: Härte/Warmhärte ↔ hohe v_c, Zähigkeit/Festigkeit ↔ hohe Zerspankraft/stoßartige Belastung; Zielkonflikt Härte vs. Zähigkeit.\n中文题目：列出刀具材料的主要要求。\n中文答案：硬度明显高于工件；高温下仍保持硬度/强度（热硬性/热强度，决定高切削速度能力）；耐磨性；良好导热性，把热从刃口导入刀具；韧性/抗断裂，能承受高负荷或冲击；抗热冲击，避免因切削液接触热刃口导致涂层剥落；化学稳定性，抗切削液、氧气、切屑/工件材料影响。记忆：硬度/热硬性对应高 v_c，韧性/强度对应高切削力/冲击载荷；硬度和韧性常有矛盾。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.4, S.7；full.md：2.3 Schneidstoffe；Garber_2025_10_16.txt：老师讲 Schneidstoff-Anforderungen 与 Warmhärte。"]
["Wo liegen HSS, Hartmetall, Keramik, CBN/PKD/Diamant im Diagramm Härte↔Zähigkeit?","Frage (DE)：Wo liegen HSS, Hartmetall, Keramik, CBN/PKD/Diamant im Diagramm Härte↔Zähigkeit?\nAntwort (DE)：Achsen: Härte/Warmfestigkeit → Schnittgeschwindigkeit nach rechts; Zähigkeit/Festigkeit → zulässige Zerspankraft nach oben. HSS: links/oben, hohe Zähigkeit/Festigkeit, geringe Härte, bis ca. 600 °C, geringe v_c. Hartmetall: mittig bis rechts, härter als HSS, weniger zäh, bis ca. 1000 °C; W-Hartmetall/Feinstkorn/beschichtet liegen weiter rechts. Keramik: rechts/unten, sehr hart/warmfest bis ca. 2000 °C, aber spröde, kleine Spanquerschnitte/geringe Schläge. CBN/PKD/Diamant: ganz rechts, superhart, sehr geringe Zähigkeit; CBN für harte Eisenwerkstoffe, PKD/Diamant eher für NE-Werkstoffe/abrasive Werkstoffe. Prüfungsaufgabe: qualitative Lage skizzieren, keine Zahlenliste nötig.\n中文题目：在“硬度-韧性”图上，HSS、硬质合金、陶瓷、CBN/PKD/金刚石在哪里？\n中文答案：坐标轴：向右=硬度/热强度增加、可用切削速度提高；向上=韧性/强度增加、可承受更大切削力。HSS：左上，韧性/强度高但硬度低，约到 600°C，低 v_c。硬质合金：中间到右侧，比 HSS 硬但韧性低，约到 1000°C；细晶/涂层硬质合金更靠右。陶瓷：右下，非常硬且热硬性高，约到 2000°C，但脆，适合小切屑/低冲击。CBN/PKD/金刚石：最右侧超硬区，韧性很低；CBN 用于硬铁基材料，PKD/金刚石更多用于非铁金属/磨蚀性材料。考试要求：能定性画位置，不是背颜色/数值。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.5, S.7；full.md：往届题“Skizzieren Sie ... Schneidstoffe”；Garber_2025_10_16.txt：老师强调该图会考位置。"]
["Warum beschichtet man Zerspanwerkzeuge? (Aufgaben)","Frage (DE)：Warum beschichtet man Zerspanwerkzeuge? (Aufgaben)\nAntwort (DE)：Aufgaben der Beschichtung: Reibung verringern; Verschleißschutz; Schutz vor Diffusion; Schutz vor thermischer Belastung; Schutz vor Korrosion. Aufbau: harte Carbide/Nitride/Oxide, Monolayer oder Multilayer; Substrate: HSS, Hartmetall, Keramik. Wirklogik: glatte/harte Schicht → weniger Spanflächenreibung und Kolkverschleiß; thermische/chemische Barriere → höhere Standzeit bzw. höhere mögliche v_c. Prüfungs-Hinweis aus Vorlesung: Aufgaben/Prinzip verstehen; konkrete Schichtbeispiele/Farben nicht auswendig.\n中文题目：为什么要给刀具涂层？主要作用是什么？\n中文答案：涂层作用：降低摩擦；抗磨损；防扩散；防热负荷；防腐蚀。结构：多为硬质碳化物/氮化物/氧化物，可单层或多层；基体可为 HSS、硬质合金、陶瓷。机理：硬且光滑的涂层减少前刀面摩擦和月牙洼磨损；热/化学屏障提高刀具寿命或允许更高 v_c。听课提示：要理解作用和原理；具体涂层例子和颜色不要求死背。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.8, S.15；full.md：2.4 Beschichtungen；Garber_2025_10_16.txt：老师说明涂层例子/颜色不作为背诵重点。"]
["Vergleichen Sie CVD und PVD in 4 Punkten.","Frage (DE)：Vergleichen Sie CVD und PVD in 4 Punkten.\nAntwort (DE)：CVD: Chemical Vapour Deposition; 800–1100 °C; chemische Reaktion zwischen Grundwerkstoff und Gas; gasförmige Zufuhr; gleichmäßiger Auftrag auf alle Flächen im Gas; nicht für HSS wegen hoher Temperatur; Schichten nicht beliebig kombinierbar, vor allem Monolayer. PVD: Physical Vapour Deposition; <650 °C; feste Targets verdampft/ionisiert/beschleunigt, physikalischer Auftrag durch Teilchenaufprall; für HSS geeignet; Sichtlinienverfahren, geneigte/verdeckte Flächen dünner/kaum beschichtet, Werkzeuge rotieren; Kombination verschiedener Schichten möglich, Multilayer. Prüfungsfalle: PVD = niedriger Temperatur + Sichtlinie + Multilayer; CVD = hohe Temperatur + gleichmäßige Gasbeschichtung + nicht HSS.\n中文题目：用 4 点对比 CVD 与 PVD。\n中文答案：CVD：化学气相沉积；800–1100°C；基体与气体发生化学反应；气态供给；处在气体中的表面涂覆较均匀；因温度高不适合 HSS；涂层不易任意组合，多为单层。PVD：物理气相沉积；<650°C；固体靶材蒸发/电离/加速后撞击沉积；适合 HSS；视线法，倾斜或遮挡表面涂层薄/难镀，工件需旋转；可组合多种层，适合多层。考试陷阱：PVD=低温+视线法+多层；CVD=高温+气体均匀包覆+不适合 HSS。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.9–10；full.md：2.4 Beschichtungen/CVD/PVD；Garber_2025_10_16.txt：老师讲 CVD/PVD 区别。"]
["Nennen Sie die 3 Hauptaufgaben von Kühlschmierstoffen.","Frage (DE)：Nennen Sie die 3 Hauptaufgaben von Kühlschmierstoffen.\nAntwort (DE)：Drei Hauptaufgaben: 1) Wärme abführen/kühlen, Wärme aus Reibung und Verformung abtransportieren; 2) Reibung vermindern/schmieren, Werkzeug-Werkstück- und Span-Werkzeug-Kontakt verbessern; 3) Spänetransport unterstützen/Späne wegspülen. Ergänzung Anforderungen: ungiftig, geruchfrei, hautverträglich, alterungsbeständig, druckfest, entsorgbar, kältebeständig. Arten: nicht wassermischbar = meist Mineralöle mit Additiven; wassermischbar = Wasser-Öl-Emulsion/Lösung, z.B. Bohrmilch 2–5 % Öl in Wasser.\n中文题目：列出切削液的 3 个核心任务。\n中文答案：三大任务：1）带走热量/冷却，把摩擦和变形产生的热带走；2）降低摩擦/润滑，改善工件-刀具和切屑-刀具接触；3）帮助排屑/冲走切屑。补充要求：无毒、无臭、亲肤、耐老化、耐压、易处理、耐低温。类型：非水混合型=多为加添加剂的矿物油；水混合型=水-油乳化液/溶液，如 Bohrmilch 为 2–5% 油+水。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.17–18；full.md：2.5 Kühlschmierstoffe；Garber_2025_10_16.txt：老师重复强调 KSS 三项任务。"]
["Was kühlt besser, was schmiert besser – Wasser oder Öl (KSS)?","Frage (DE)：Was kühlt besser, was schmiert besser – Wasser oder Öl (KSS)?\nAntwort (DE)：Wasser/Wasseranteil: bessere Kühlwirkung, hohe Wärmekapazität, geeignet bei wärmeempfindlichen Prozessen/Werkstoffen. Öl: bessere Schmierwirkung, geringere Reibung, aber kleinere Wärmekapazität. Emulsion: typ. 2–5 % Öl in Wasser (beim Schleifen 2–6 % Öl und 94–98 % Wasser), Kompromiss: gute Kühlung durch Wasser + etwas Schmierung durch Öl. Standzeitlogik: bei niedriger v_c eher Schmierung wichtig, bei hoher v_c eher Kühlung wichtig. Prüfungsfalle: nicht „Öl kühlt besser“ schreiben; Öl schmiert besser.\n中文题目：水和油：哪个更擅长冷却？哪个更擅长润滑？\n中文答案：水/水基部分：冷却更好，热容量高，适合热敏过程或材料。油：润滑更好，摩擦更低，但热容量较小。乳化液：常见 2–5% 油在水中（磨削中常见 2–6% 油、94–98% 水），是水的冷却和油的润滑之间的折中。刀具寿命逻辑：低切削速度下润滑更重要，高切削速度下冷却更重要。考试陷阱：不要写“油冷却更好”；油主要是润滑好。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.17–18；FT 8 - Schleifen - Skript.pdf S.15；full.md：Kühlschmierstoffe/Schmierstoffe；Garber_2025_10_16.txt：老师口头强调水冷却、油润滑及乳化比例。"]
["Nennen Sie den Zusammenhang zwischen Vorschub *f*, Schneidenradius *R* und Rillentiefe *h* beim Längsrunddrehen.","Frage (DE)：Nennen Sie den Zusammenhang zwischen Vorschub *f*, Schneidenradius *R* und Rillentiefe *h* beim Längsrunddrehen.\nAntwort (DE)：- Längsrunddrehen erzeugt eine rillige Oberfläche; Rillentiefe hängt von Werkzeuggeometrie und Vorschub ab.\n- Geometrie der Schneidenecke: R² = (f/2)² + (R - h)².\n- Umgestellt: h = R - √(R² - (f/2)²).\n- Tendenz: f größer → h größer; R größer → h kleiner; Einheit konsequent gleich wählen.\n中文题目：请写出纵向外圆车削中进给 f、刀尖半径 R 与沟纹深度/理论表面波纹深度 h 的关系。\n中文答案：- 纵向外圆车削会产生沟纹表面；沟纹深度由刀尖几何和进给决定。\n- 几何关系：R² = (f/2)² + (R - h)²。\n- 变形：h = R - √(R² - (f/2)²)。\n- 趋势：f 越大，h 越大；R 越大，h 越小；单位必须统一。\n出处：FT 3 - Drehen - Skript.pdf S.13, S.15；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"Drehen / Rillentiefe beim Längsrunddrehen\"；Garber_2025_10_23.txt（老师强调 Rillentiefe–Vorschub–Schneidenradius 为考试必须会的关系）。"]
["Berechnen Sie den maximal zulässigen Vorschub *f*, wenn *R* und *h* vorgegeben sind.","Frage (DE)：Berechnen Sie den maximal zulässigen Vorschub *f*, wenn *R* und *h* vorgegeben sind.\nAntwort (DE)：- Ausgangsgleichung: R² = (f/2)² + (R - h)².\n- Umstellen: (f/2)² = R² - (R - h)² = 2Rh - h².\n- Ergebnis: f = √(8Rh - 4h²) = 2√(2Rh - h²).\n- Für h << R näherungsweise: f ≈ √(8Rh).\n- Prüfungsfalle: h in µm zuerst in mm umrechnen, wenn R in mm gegeben ist.\n中文题目：已知刀尖半径 R 和允许沟纹深度 h，计算最大允许进给 f。\n中文答案：- 从 R² = (f/2)² + (R - h)² 出发。\n- 得 (f/2)² = 2Rh - h²。\n- 所以 f = √(8Rh - 4h²) = 2√(2Rh - h²)。\n- 当 h 远小于 R 时，可近似 f ≈ √(8Rh)。\n- 考试陷阱：若 R 用 mm，h=µm 必须先换成 mm，否则根号/数量级会错。\n出处：Formelblatt Fertigungstechnik.pdf S.1；FT 3 - Drehen - Skript.pdf S.13, S.15, S.23；full.md Abschnitt \"Formelblatt Fertigungstechnik / Drehen\"；Garber_2025_10_23.txt（老师强调单位统一，µm↔mm 是常见错误）。"]
["Gefordert ist \\(h=4\\,\\mu m\\), Werkzeugradius \\(R=2\\,mm\\). Welcher Vorschub *f* ist erforderlich?","Frage (DE)：Gefordert ist \\(h=4\\,\\mu m\\), Werkzeugradius \\(R=2\\,mm\\). Welcher Vorschub *f* ist erforderlich?\nAntwort (DE)：- Umrechnung: h = 4 µm = 0,004 mm; R = 2 mm.\n- Formel: f = √(8Rh - 4h²).\n- Einsetzen: f = √(8·2·0,004 - 4·0,004²) mm/U.\n- Ergebnis: f = √(0,063936) ≈ 0,253 mm/U.\n- Kontrolle: Einheit mm/U; negativer/unsinniger Wurzelwert deutet fast immer auf Einheitenfehler hin.\n中文题目：要求 h=4 µm，刀尖半径 R=2 mm，求所需进给 f。\n中文答案：- 先换算：h=4 µm=0.004 mm，R=2 mm。\n- 使用 f=√(8Rh-4h²)。\n- 代入：f=√(8·2·0.004-4·0.004²) mm/转。\n- 结果：f≈0.253 mm/转。\n- 自检：单位为 mm/转；若根号内出现负值或数量级离谱，通常是 µm 没换成 mm。\n出处：FT 3 - Drehen - Skript.pdf S.23 Aufgabe 1b；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"Aufgaben zum Drehen / Aufgabe 1b\"；Garber_2025_10_23.txt（老师用此例强调 µm→mm）。"]
["Warum nimmt man nicht immer einen großen Schneidenradius *R*, obwohl dadurch die Rillentiefe kleiner wird?","Frage (DE)：Warum nimmt man nicht immer einen großen Schneidenradius *R*, obwohl dadurch die Rillentiefe kleiner wird?\nAntwort (DE)：- Ja: größeres R reduziert bei gleichem f die theoretische Rillentiefe.\n- Aber: große Schneidenecke kann kleine Radien, scharfe Ecken, Schultern/Bünde und enge Konturen nicht erreichen.\n- Große R kann höhere Kontaktlänge/Prozesskräfte begünstigen; bei filigranen Stellen Risiko für Maß-/Formprobleme.\n- Praxis: Flächen mit großem R schlichten, Ecken/Schultern mit kleinerem R oder Werkzeugwechsel bearbeiten.\n- Alternative zur Oberflächenverbesserung: Vorschub f verringern; konstruktiv möglichst Radien vorsehen.\n中文题目：既然较大的刀尖半径 R 能减小沟纹深度，为什么不总是用大 R？\n中文答案：- 同样进给下，R 越大理论沟纹深度确实越小。\n- 但大刀尖圆弧加工不到小圆角、尖角、台肩/挡肩和狭窄轮廓。\n- 大 R 还可能增加接触长度和工艺力，对细长/薄弱部位造成尺寸或形状问题。\n- 实际做法：大平面用大 R 精车，角落/台肩换小 R 刀具。\n- 也可通过降低进给 f 改善表面；设计上能留圆角就留圆角。\n出处：FT 3 - Drehen - Skript.pdf S.13, S.15, S.16；Drehverfahren.pdf Abschnitt \"Längs-Runddrehen / Profildrehen\"（页码未定位）；full.md Abschnitt \"Drehen / Genauigkeit und Oberfläche\"；Garber_2025_10_23.txt（老师口头强调大 R 与尖角/换刀/降 f 的取舍）。"]
["Wie kann man den Zusammenhang zwischen *f*, *R* und *h* ohne Rechnung nutzen?","Frage (DE)：Wie kann man den Zusammenhang zwischen *f*, *R* und *h* ohne Rechnung nutzen?\nAntwort (DE)：- Nutzung von Kennlinien/Diagrammen, z.B. Werkzeughersteller-Diagramm für Rt/Rillentiefe.\n- Vorgehen 1: gegeben R und f → Rillentiefe/Rt ablesen.\n- Vorgehen 2: gefordert h bzw. Rt und gegeben R → zulässigen Vorschub f ablesen.\n- Trend merken: f ↑ → h/Rt ↑; R ↑ → h/Rt ↓.\n- Achtung: Diagramme oft in µm; Formelrechnung häufig in mm → Einheiten prüfen.\n中文题目：不通过计算，如何使用 f、R、h 的关系？\n中文答案：- 可用刀具厂商的特性曲线/图表读取 Rt 或沟纹深度。\n- 方法1：已知 R 和 f，读出 h/Rt。\n- 方法2：已知要求 h/Rt 和 R，反读允许进给 f。\n- 趋势必须记住：f 增大则 h/Rt 增大；R 增大则 h/Rt 减小。\n- 注意：图表常用 µm，公式计算常用 mm，单位要核对。\n出处：FT 3 - Drehen - Skript.pdf S.15；full.md Abschnitt \"3.2 Genauigkeit beim Drehen / Rillentiefe\"；Garber_2025_10_23.txt（老师说明可用图表/曲线判断关系）。"]
["Geben Sie die „Mitternachtsformel“ für die Schnittgeschwindigkeit an und erläutern Sie die Einheit.","Frage (DE)：Geben Sie die „Mitternachtsformel“ für die Schnittgeschwindigkeit an und erläutern Sie die Einheit.\nAntwort (DE)：- Grundformel: vc = π·n·d.\n- Bei d in m und n in min⁻¹: vc in m/min.\n- Bei d in mm und n in min⁻¹: vc = π·d·n / 1000 in m/min.\n- Umgestellt: n = 1000·vc /(π·d), wenn d in mm und vc in m/min.\n- Beim Drehen: wirksamer Durchmesser d einsetzen; beim Plandrehen ändert sich d während der Bearbeitung.\n中文题目：写出切削速度公式，并说明单位如何处理。\n中文答案：- 基本式：vc = π·n·d。\n- d 用 m、n 用 min⁻¹ 时，vc 得 m/min。\n- d 用 mm、n 用 min⁻¹ 时，vc = π·d·n/1000，单位 m/min。\n- 反求转速：n = 1000·vc/(π·d)。\n- 车削要用有效直径 d；端面车削时 d 会随位置变化。\n出处：FT 3 - Drehen - Skript.pdf S.22；Drehverfahren.pdf Abschnitt \"Quer-Plandrehen\"（页码未定位）；full.md Abschnitt \"Zusammenhänge zwischen Schnittgrößen\"；Garber_2025_10_23.txt（老师强调 m/min、mm/min、min/s 的单位自检）。"]
["Wie hängen Schnittkraft *Fc*, Drehmoment *M* und Leistung *Pc* zusammen? Nennen Sie einen typischen Fehler.","Frage (DE)：Wie hängen Schnittkraft *Fc*, Drehmoment *M* und Leistung *Pc* zusammen? Nennen Sie einen typischen Fehler.\nAntwort (DE)：- Leistung: Pc = Fc·vc = M·ω = M·2π·n.\n- Drehmoment beim Drehen: M = Fc·d/2.\n- Einheiten: Fc in N, d in m → M in Nm; vc in m/s → Pc in W.\n- Wenn vc in m/min: Pc[W] = Fc·vc/60; Pc[kW] = Fc·vc/(60·1000).\n- Typischer Fehler: Durchmesser d als Hebelarm verwenden; richtig ist Radius d/2. Zweiter Fehler: m/min nicht in m/s umrechnen.\n中文题目：Fc、M、Pc 之间如何关联？常见错误是什么？\n中文答案：- 功率：Pc = Fc·vc = M·ω = M·2π·n。\n- 车削扭矩：M = Fc·d/2。\n- 单位：Fc 用 N、d 用 m，则 M 为 Nm；vc 用 m/s，则 Pc 为 W。\n- 若 vc 用 m/min：Pc[W]=Fc·vc/60；Pc[kW]=Fc·vc/(60·1000)。\n- 常见错误：把直径 d 当力臂；正确力臂是半径 d/2。另一个常错是 m/min 没换成 m/s。\n出处：FT 3 - Drehen - Skript.pdf S.22；full.md Abschnitt \"Zusammenhänge zwischen Schnittgrößen\"；Garber_2025_10_23.txt（老师特别强调 Drehmoment 的力臂是 d/2）。"]
["Geben Sie die Formel für die Hauptzeit *th* beim Drehen an und erklären Sie kurz die Bedeutung von \\(n\\cdot f\\).","Frage (DE)：Geben Sie die Formel für die Hauptzeit *th* beim Drehen an und erklären Sie kurz die Bedeutung von \\(n\\cdot f\\).\nAntwort (DE)：- Hauptzeit allgemein: th = L·i /(n·f) = Lges /(n·f).\n- L = Vorschublänge je Durchgang; i = Anzahl der Bearbeitungsdurchgänge.\n- n·f = Vorschubgeschwindigkeit vf: Weg pro Zeit, z.B. mm/min.\n- Einheit: L in mm, f in mm/U, n in min⁻¹ → th in min.\n- Bei mehreren Abschnitten: Lges = Σ(LAbschnitt·iAbschnitt), nicht blind nur eine Länge verwenden.\n- Zusatz Gewindedrehen: th = L·i·g /(n·p), wenn Vorschub der Gewindesteigung p entspricht.\n中文题目：写出车削主时间 th 的公式，并解释 n·f 的意义。\n中文答案：- 主时间：th = L·i/(n·f) = Lges/(n·f)。\n- L 是每刀进给长度；i 是加工走刀次数。\n- n·f 是进给速度 vf，即单位时间走过的路程，例如 mm/min。\n- 单位：L 用 mm，f 用 mm/转，n 用 min⁻¹，则 th 为 min。\n- 多段加工时：Lges=Σ(每段长度×该段走刀次数)，不能只套一个长度。\n- 补充：螺纹车削时 th=L·i·g/(n·p)。\n出处：FT 3 - Drehen - Skript.pdf S.22；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"Hauptzeit beim Drehen\"；Garber_2025_10_23.txt（老师说明主时间题可能考，考试会给公式/数据但要会代入）。"]
["Was gehört in die Vorschublänge *L* bei der Hauptzeitberechnung? Wann gibt es keinen Überlaufweg?","Frage (DE)：Was gehört in die Vorschublänge *L* bei der Hauptzeitberechnung? Wann gibt es keinen Überlaufweg?\nAntwort (DE)：- Beim Längsdrehen: L = l + la + lu.\n- l = Werkstück-/Bearbeitungslänge; la = Anlaufweg/Anfahrweg; lu = Überlaufweg.\n- Beim Plandrehen: L = d/2 + la + lu.\n- Kein Überlaufweg bei Werkstücken mit Bund/Schulter/Anschlag, sonst würde das Werkzeug in den Bund fahren und das Bauteil beschädigen.\n- Prüfungsstrategie: Skizze lesen; für jeden Abschnitt separat entscheiden, ob Anlauf und Überlauf sinnvoll sind.\n中文题目：主时间计算中的进给长度 L 包括什么？什么时候没有越程 lu？\n中文答案：- 纵向车削：L = l + la + lu。\n- l 为加工长度，la 为引入/接近长度，lu 为越程长度。\n- 端面车削：L = d/2 + la + lu。\n- 有台阶/挡肩/止挡时没有越程，否则刀具会切入台阶并损坏零件。\n- 考试策略：看图逐段判断，每段是否需要引入和越程不能机械套用。\n出处：FT 3 - Drehen - Skript.pdf S.19, S.22, S.23；full.md Abschnitt \"Anfahrweg und Überlaufweg\"；Garber_2025_10_23.txt（老师强调 Bund/台阶处不能取 Überlauf）。"]
["Rohling Ø80 mm → Ziel Ø60 (L=120mm) und Ø30 (L=60mm), max. Zustellung \\(a_p=5mm\\), \\(n=400\\,min^{-1}\\), \\(f=0{,}5\\,mm/U\\), Anlauf+Überlauf je 5 mm. Berechnen Sie *th*.","Frage (DE)：Rohling Ø80 mm → Ziel Ø60 (L=120mm) und Ø30 (L=60mm), max. Zustellung \\(a_p=5mm\\), \\(n=400\\,min^{-1}\\), \\(f=0{,}5\\,mm/U\\), Anlauf+Überlauf je 5 mm. Berechnen Sie *th*.\nAntwort (DE)：- Wichtig: Zustellung ap ist radial, nicht im Durchmesser.\n- Ø80 → Ø60: Radius 40 → 30, Δr=10 mm; bei ap=5 mm → i1=2 Durchgänge.\n- Ø60 → Ø30: Radius 30 → 15, Δr=15 mm; bei ap=5 mm → i2=3 Durchgänge.\n- Länge Abschnitt Ø60: L1 = 120 + 5 + 5 = 130 mm.\n- Länge Abschnitt Ø30: L2 = 60 + 5 = 65 mm, kein Überlauf am Bund.\n- Gesamtweg: Lges = 2·130 + 3·65 = 455 mm.\n- Vorschubgeschwindigkeit: n·f = 400·0,5 = 200 mm/min.\n- Hauptzeit: th = 455/200 = 2,275 min ≈ 136,5 s.\n- Nur Hauptzeit Schruppen; Nebenzeiten nicht enthalten.\n中文题目：毛坯 Ø80，加工到 Ø60（长120mm）和 Ø30（长60mm），最大切深 ap=5mm，n=400 min⁻¹，f=0.5 mm/转，引入/越程各 5mm，求主时间 th。\n中文答案：- 关键：ap 是半径方向，不是直径方向。\n- Ø80→Ø60：半径 40→30，减少 10mm，ap=5mm，所以 2 刀。\n- Ø60→Ø30：半径 30→15，减少 15mm，所以 3 刀。\n- Ø60 段长度：L1=120+5+5=130mm。\n- Ø30 段长度：L2=60+5=65mm，台肩处无越程。\n- 总进给路程：Lges=2·130+3·65=455mm。\n- 进给速度：n·f=400·0.5=200mm/min。\n- 主时间：th=455/200=2.275min≈136.5s。\n- 这里只算粗车主时间，不含辅助时间。\n出处：FT 3 - Drehen - Skript.pdf S.19, S.22, S.23；full.md Abschnitt \"Aufgaben zum Drehen / Aufgabe 1\"；Garber_2025_10_23.txt（老师强调 ap 为半径向，Ø80→Ø60 是 2 刀不是 4 刀；总路程 455mm）。"]
["Unterscheiden Sie Hauptzeit und Nebenzeit. Was ist „Eilgang“?","Frage (DE)：Unterscheiden Sie Hauptzeit und Nebenzeit. Was ist „Eilgang“?\nAntwort (DE)：- Hauptzeit: Zeit, in der tatsächlich zerspant wird; Spanbildung/Bearbeitung, in der Skizze H.\n- Nebenzeit: nicht spanende Zeiten innerhalb des Zyklus, z.B. Werkstückwechsel und -spannung, Spindel beschleunigen, Kühlschmierstoff einschalten, Werkzeugwechsel.\n- Bewegungsbeispiele Nebenzeit: Anfahren im Eilgang, Zustellen, Abheben, Rücklauf im Eilgang.\n- Eilgang: schnelle nichtschneidende Verfahrbewegung der Maschine; dient zum Positionieren/Rückfahren, nicht zur Bearbeitung.\n- Zykluszeit Serienfertigung: Summe aus Hauptzeiten und Nebenzeiten.\n中文题目：区分主时间和辅助时间；Eilgang（快速移动）是什么？\n中文答案：- 主时间：真正切削、产生切屑的时间，图中标 H。\n- 辅助时间：循环中不切削的时间，如换件/夹紧、主轴加速、开冷却液、换刀。\n- 辅助运动例子：快速接近、进刀定位、抬刀、快速返回。\n- Eilgang 是机床非切削快速移动，用于定位或返回，不用于加工。\n- 批量生产循环时间=各工序主时间+辅助时间。\n出处：FT 3 - Drehen - Skript.pdf S.20, S.21；full.md Abschnitt \"Zykluszeit und Nebenzeiten\"；Garber_2025_10_23.txt（老师讲 Zykluszeit/Nebenzeit 和空走 Eilgang）。"]
["Geben Sie die Kienzle-Gleichung zur Schnittkraftberechnung an (mit Tabellenwerten).","Frage (DE)：Geben Sie die Kienzle-Gleichung zur Schnittkraftberechnung an (mit Tabellenwerten).\nAntwort (DE)：- Spanungsquerschnitt: A = ap·f = b·h.\n- Geometrie beim Drehen: h = f·sinκ; b = ap/sinκ.\n- Spezifische Schnittkraft: kc = Fc/A = Fc/(b·h).\n- Kienzle ohne Korrekturfaktoren: Fc = kc1.1·b·h0·(h/h0)^(1-mc) = kc1.1·b·h·(h/h0)^(-mc), meist h0 = 1 mm.\n- Mit Korrekturfaktoren: Fc = kc1.1·b·h0·Kv·Kver·Kγ·Ksch·(h/h0)^(1-mc).\n- Tabellenwerte: kc1.1 und 1-mc bzw. mc aus Werkstofftabelle; Einheiten N/mm² und mm → Ergebnis N.\n- Korrekturfaktoren: Kv Schnittgeschwindigkeit, Kver Werkzeugverschleiß, Kγ Spanwinkel, Ksch Schneidstoff.\n- Rechenablauf: h,b bestimmen → Werkstoffwerte ablesen → Korrekturfaktoren nur anwenden, wenn gefordert → Einheit prüfen.\n中文题目：写出 Kienzle 切削力计算公式（含表格参数）。\n中文答案：- 切削截面积：A=ap·f=b·h。\n- 车削几何：h=f·sinκ；b=ap/sinκ。\n- 比切削力：kc=Fc/A=Fc/(b·h)。\n- 无修正系数：Fc=kc1.1·b·h0·(h/h0)^(1-mc)=kc1.1·b·h·(h/h0)^(-mc)，通常 h0=1mm。\n- 含修正系数：Fc=kc1.1·b·h0·Kv·Kver·Kγ·Ksch·(h/h0)^(1-mc)。\n- 表格读取 kc1.1 和 1-mc/或 mc；N/mm² 与 mm 相乘，结果为 N。\n- 修正系数含义：Kv 切削速度，Kver 刀具磨损，Kγ 前角，Ksch 刀具材料。\n- 解题步骤：先算 h、b → 查材料表 → 只在题目要求时加修正系数 → 检查单位。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.22-S.26；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"Prüfungsaufgabe Kienzle / Schnittkraftberechnung\"；Garber_2025_10_23.txt（老师明确说 Schnittkraftbestimmung/Kienzle 经常/一定会考）。"]
["Nennen Sie den Unterschied zwischen Bohren ins Volle und Aufbohren und begründen Sie, warum Aufbohren genauer ist.", "Frage (DE)：Nennen Sie den Unterschied zwischen Bohren ins Volle und Aufbohren und begründen Sie, warum Aufbohren genauer ist.\nAntwort (DE)：- Bohren ins Volle: Rundbohren ohne Vorbohrung, Werkzeug startet im Vollmaterial.\n- Aufbohren: vorhandene Bohrung wird auf größeren Durchmesser vergrößert.\n- Begründung: beim Bohren ins Volle gilt an der Drehachse v_c → 0; dort schneidet der Bohrer kaum, sondern drückt/verdrängt Material; Querschneide/Bohrermitte erzeugt hohe Vorschub- bzw. Axialkraft.\n- Folge: schlechtere Maßgenauigkeit und Oberfläche; Aufbohren vermeidet den kritischen Zentrumsschnitt weitgehend → geringere Kräfte, bessere IT/Rz.\n中文题目：说明“实心钻孔”和“扩孔”的区别，并解释为什么扩孔更精确。\n中文答案：- 实心钻孔：无预孔，直接在实料中钻出圆柱内表面。\n- 扩孔：已有孔，再把孔扩大。\n- 原因：钻头中心处切削速度 v_c 接近0，中心/横刃不是有效切削而是挤压材料，轴向力很大。\n- 结果：实心钻孔表面和尺寸精度较差；扩孔时中心问题减弱，所以更容易得到较好精度和表面。\n出处：Garber_2025_10_30.txt（老师讲 Bohren/Aufbohren 与中心速度为0的机制）；FT 4 - Bohren - Skript.pdf S.5；full.md Abschnitt \"4.1 Einleitung - Erreichbare Genauigkeiten - Vollbohren und Aufbohren"]
["Nennen Sie erreichbare ISO-Toleranz (IT) und Rautiefe Rz für Vollbohren, Aufbohren, Senken und Reiben.", "Frage (DE)：Nennen Sie erreichbare ISO-Toleranz (IT) und Rautiefe Rz für Vollbohren, Aufbohren, Senken und Reiben.\nAntwort (DE)：- Bohren ins Volle: IT 12, Rz ≈ 40 µm.\n- Aufbohren: IT 10, Rz ≈ 4 µm.\n- Senken: IT 9, Rz ≈ 8 µm.\n- Reiben: IT 6, Rz ≈ 2 µm.\n- Prüfungsfalle: Rz ist Rautiefe in µm, nicht Ra; Zahlen als erreichbare Richtwerte aus der Tabelle lernen.\n中文题目：列出实心钻孔、扩孔、沉孔、铰孔可达到的 ISO 公差等级 IT 与粗糙度 Rz。\n中文答案：- 实心钻孔：IT12，Rz≈40 µm。\n- 扩孔：IT10，Rz≈4 µm。\n- 沉孔：IT9，Rz≈8 µm。\n- 铰孔：IT6，Rz≈2 µm。\n- 易错点：这里是 Rz（µm），不是 Ra。\n出处：Garber_2025_10_30.txt（老师围绕 Bohrverfahren 表格讲解）；FT 4 - Bohren - Skript.pdf S.5；full.md Abschnitt \"Erreichbare Genauigkeiten - Vollbohren und Aufbohren"]
["Begründen Sie die schlechtere Oberfläche/Genauigkeit beim Bohren ins Volle.", "Frage (DE)：Begründen Sie die schlechtere Oberfläche/Genauigkeit beim Bohren ins Volle.\nAntwort (DE)：- v_c = π·d·n; lokal am Bohrerzentrum ist der wirksame Durchmesser d = 0, daher v_c = 0.\n- In der Mitte kein sauberer Schnitt; Querschneide drückt/verdrängt Material.\n- Deutlich höhere Vorschub-/Axialkräfte als beim Aufbohren.\n- Folgen: größere Bohrungsabweichung, schlechtere Oberfläche/Rautiefe, geringere Genauigkeit.\n- Wichtig: nicht die Drehzahl n ist Null, sondern die Schnittgeschwindigkeit auf der Drehachse.\n中文题目：解释为什么实心钻孔的表面质量和精度较差。\n中文答案：- 公式 v_c = π·d·n，在钻头中心局部直径 d=0，所以中心切削速度为0。\n- 中心/横刃处不能真正切削，主要挤压材料。\n- 进给力/轴向力比扩孔大得多。\n- 结果：孔偏差更大、表面粗糙度更差、精度更低。\n- 易错点：不是转速 n 为0，而是旋转轴线处的切削速度为0。\n出处：Garber_2025_10_30.txt（老师强调 Bohren ins Volle 的中心不切削问题）；FT 4 - Bohren - Skript.pdf S.5；FT 3 - Drehen - Skript.pdf S.22（v_c = π·n·d）；full.md Abschnitt \"4.1 Einleitung"]
["Skizzieren/benennen Sie am Spiralbohrer: Hauptschneiden, Spanfläche, Freifläche und Querschneide.", "Frage (DE)：Skizzieren/benennen Sie am Spiralbohrer: Hauptschneiden, Spanfläche, Freifläche und Querschneide.\nAntwort (DE)：- Zwei Hauptschneiden: gegenüberliegend an der Bohrerspitze; erzeugen den Hauptschnitt.\n- Spanfläche: Fläche/Spannutseite, über die der Span abläuft; Spannuten dienen auch Span- und KSS-Abfuhr.\n- Freifläche: Fläche hinter der Schneide, der erzeugten Schnittfläche zugekehrt; bildet Freiwinkel und verhindert Reiben.\n- Querschneide: Verbindung der Hauptschneiden im Zentrum; kritisch, weil v_c ≈ 0, daher eher Drücken als Schneiden.\n- Skizzenpunkte: Spitze, beide Hauptschneiden, zentrale Querschneide, Spannut/Spanfläche, Freifläche eindeutig beschriften.\n中文题目：在麻花钻上画出/标出：主切削刃、前刀面、后刀面和横刃。\n中文答案：- 两条主切削刃：位于钻尖，两侧相对。\n- 前刀面：切屑沿其流出的表面；在麻花钻上与螺旋排屑槽相关。\n- 后刀面：在切削刃后方、面对已加工表面，形成后角，避免摩擦。\n- 横刃：中心连接两主刃的位置；因中心 v_c≈0，主要挤压而非切削。\n- 作图评分点：必须清楚标出钻尖、两主刃、中心横刃、排屑槽/前刀面、后刀面。\n出处：Garber_2025_10_30.txt（老师让识别 Bohrergeometrie）；FT 4 - Bohren - Skript.pdf S.6-S.8, S.10-S.11；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.6-S.8（Spanfläche/Freifläche 定义）；full.md Abschnitt \"4.2 Bohrwerkzeuge - Spiral- oder Wendelbohrer / Geometrie"]
["Warum braucht der Spiralbohrer einen Kompromiss zwischen Kern und Spannut?", "Frage (DE)：Warum braucht der Spiralbohrer einen Kompromiss zwischen Kern und Spannut?\nAntwort (DE)：- Kern: massive zylindrische Mitte; bestimmt Stabilität, Bruchsicherheit und nutzbares Drehmoment.\n- Großer Kern: stabiler Bohrer, höheres Drehmoment möglich; aber kleinere Spannuten → schlechtere Span- und Kühlschmierstoffabfuhr.\n- Große Spannut: bessere Spanabfuhr/KSS-Zufuhr; aber kleinerer Kern → schwächerer Bohrer, geringere Steifigkeit.\n- Kompromiss: Stabilität/Drehmoment gegen Spanraum/Spantransport.\n中文题目：为什么麻花钻的钻芯和排屑槽必须折中设计？\n中文答案：- 钻芯：钻头中间的实体圆柱部分，决定稳定性、抗折断能力和可承受扭矩。\n- 钻芯大：更稳定、能传递更大扭矩；但排屑槽小，排屑和冷却润滑变差。\n- 排屑槽大：排屑/KSS 更好；但钻芯变小，钻头变弱。\n- 核心评分点：稳定性/扭矩 vs 排屑空间/排屑能力。\n出处：Garber_2025_10_30.txt（老师讲 Kern-Spannut 折中）；FT 4 - Bohren - Skript.pdf S.10；full.md Abschnitt \"4.2 Bohrwerkzeuge - Aufbau des Spiralbohrers"]
["Welche Funktion hat der Spitzenwinkel, und warum ist er ein Kompromiss?", "Frage (DE)：Welche Funktion hat der Spitzenwinkel, und warum ist er ein Kompromiss?\nAntwort (DE)：- Spitzenwinkel beeinflusst Zentrierverhalten und Bohrungsgrund.\n- Kleiner Spitzenwinkel: bessere Zentrierung/Führung in der Bohrung; aber am Bohrungsgrund bleibt ein größerer nicht vollständig ausgebohrter Kegelbereich.\n- Größerer/stumpferer Spitzenwinkel: kürzerer Spitzenbereich und stabilere Spitze; aber schlechtere Selbstzentrierung, höhere Gefahr des Verlaufens.\n- Kompromiss: Zentrierung/Führung gegen nutzbare Bohrungstiefe/Bohrungsgrund und Stabilität.\n中文题目：顶角的作用是什么？为什么它是一个折中？\n中文答案：- 顶角影响钻头定心、导向和孔底形状。\n- 顶角小：定心/导向更好；但孔底会留下更大的未完全钻出的锥形区域。\n- 顶角大/钝：尖端区域短、稳定性较好；但自定心较差，容易跑偏。\n- 核心评分点：定心/导向 vs 孔底有效形状/稳定性。\n出处：Garber_2025_10_30.txt（老师讲 Spitzenwinkel 的折中）；FT 4 - Bohren - Skript.pdf S.10；full.md Abschnitt \"Aufbau des Spiralbohrers - Spitzenwinkel"]
["Nennen Sie Vorteile und typische Einsatzgrenzen von Wendeplattenbohrern.", "Frage (DE)：Nennen Sie Vorteile und typische Einsatzgrenzen von Wendeplattenbohrern.\nAntwort (DE)：- Vorteile: ab ca. Ø 12 mm kosteneffizient; schneller Austausch verschlissener Schneiden; Wendeschneidplatten für Hauptschneiden, in Ausnahmefällen auch für Querschneide.\n- Typischer Einsatz: Aufbohren bzw. größere Durchmesser/Serien, weil Schneidenwechsel schnell und wirtschaftlich ist.\n- Einsatzgrenze: Vollbohren nur, wenn die Plattengeometrie auch den Zentrumsschnitt/Querschneidenbereich abdeckt; sonst bleibt Zentrum kritisch.\n- Merksatz: Hauptvorteil = wirtschaftlicher Schneidenwechsel; Hauptgrenze = Zentrumsschnitt/kleine Durchmesser.\n中文题目：列出可转位钻的优点和典型适用限制。\n中文答案：- 优点：约 Ø12 mm 起经济性好；磨损刀片可快速更换；刀片用于主切削刃，特殊情况下也可用于横刃。\n- 典型用途：扩孔或较大直径/批量加工，因为换刃快、成本低。\n- 限制：只有刀片布置能覆盖中心切削/横刃区域时才适合实心钻孔；否则中心仍是问题。\n- 记忆点：优势=快速经济换刃；限制=中心切削和小直径。\n出处：Garber_2025_10_30.txt（老师讲 Wendeplattenbohrer 是否能 Vollbohren 的判断）；FT 4 - Bohren - Skript.pdf S.13；full.md Abschnitt \"4.2 Bohrwerkzeuge - Wendeplattenbohrer"]
["Wozu dient Senken, und welche Senker-Typen gibt es?", "Frage (DE)：Wozu dient Senken, und welche Senker-Typen gibt es?\nAntwort (DE)：- Zweck: Erzeugen von Planflächen senkrecht zur Drehachse oder Kegelflächen symmetrisch zur Drehachse; oft kombiniert mit Bohrungen.\n- Typische Anwendungen: Schraubenkopfsenkungen, Planansenken/Planeinsenken, Fasen/Kanten, Profilsenken.\n- Typen: Spitzsenker, Zapfsenker mit Führungszapfen, Formsenker/Profilsenker.\n- Schneidstoffe: hauptsächlich HSS; Hartmetall vor allem in Großserienfertigung.\n中文题目：沉孔/锪孔的目的是什么？有哪些沉孔刀类型？\n中文答案：- 目的：加工垂直于旋转轴线的平面或与旋转轴对称的锥面，常与孔加工结合。\n- 应用：螺钉头沉孔、平面锪孔/沉台、倒角、成形沉孔。\n- 类型：尖沉头刀、带导向柱的柱形沉头刀、成形/轮廓沉头刀。\n- 刀具材料：主要 HSS，大批量时可用硬质合金。\n出处：Garber_2025_10_30.txt（老师讲 Senken 分类和用途）；FT 4 - Bohren - Skript.pdf S.14；05_FT_Bohrverfahren.pdf Thema \"Plansenken / Profilbohren\"；full.md Abschnitt \"Bohrverfahren - Senken / Senkwerkzeuge"]
