["Warum kann man Glas/Keramik nicht „normal“ fräsen, und wie hilft Ultraschall-angeregtes Fräsen?","Frage (DE)：Warum kann man Glas/Keramik nicht „normal“ fräsen, und wie hilft Ultraschall-angeregtes Fräsen?\nAntwort (DE)：Glas/Keramik sind spröde: normales Fräsen führt zu Splittern/Ausbrechen. Ultraschallanregung trägt kleinste Partikel ab statt normale Späne zu bilden; geeignet für kleine Teile, z.B. Zahnkronen, nicht wirtschaftlich für große Teile.\n中文题目：为什么玻璃、陶瓷不能用常规方式铣？超声振动铣如何解决？\n中文答案：玻璃、陶瓷很脆，常规铣削会崩裂。超声振动使材料以微小颗粒方式去除，而不是形成普通切屑；适合牙冠等小件，不适合大件。\n出处：FT 5 - Fräsen - Skript.pdf, S.11; full.md, Abschnitt Glas/Keramik fräsen; Garber_2025_11_13.txt, Stichwort Ultraschall/Zahnkronen"]
["Definieren Sie *Rattern* und unterscheiden Sie fremderregte vs. selbsterregte Schwingung.","Frage (DE)：Definieren Sie *Rattern* und unterscheiden Sie fremderregte vs. selbsterregte Schwingung.\nAntwort (DE)：Rattern = selbsterregte instabile Schwingung beim Drehen/Fräsen. Fremderregt: äußere/periodische Anregung nahe Eigenfrequenz. Selbsterregt: Instabilität durch Zerspanprozess und Rückkopplung, ohne äußere periodische Anregung; schadet Oberfläche, Werkzeug, Maschine.\n中文题目：定义颤振，并区分受迫振动与自激振动。\n中文答案：颤振是车削、铣削中的自激不稳定振动。受迫振动来自外部或周期激励，接近固有频率。自激振动由切削过程和反馈不稳定引起，不需要外部周期激励；会损害表面、刀具和机床。\n出处：FT 5 - Fräsen - Skript.pdf, S.12; full.md, Abschnitt 5.5 Rattern Grundlagen; Garber_2025_11_13.txt, Stichwort selbsterregt/fremderregt"]
["Wie ermittelt man experimentell die *Grenzspantiefe* (ap) beim Rattern?","Frage (DE)：Wie ermittelt man experimentell die *Grenzspantiefe* (ap) beim Rattern?\nAntwort (DE)：Testschnitt mit schrittweise steigendem a_p; Schwingamplitude messen. Grenzspantiefe = a_p, ab dem Amplitude/Rattern schlagartig stark zunimmt.\n中文题目：如何通过试切确定颤振的临界切深 ap？\n中文答案：通过试切逐步增大 a_p，并测量振动幅值。临界切深就是从该 a_p 开始振幅或颤振突然明显增大的切深。\n出处：FT 5 - Fräsen - Skript.pdf, S.13; full.md, Abschnitt Ermittlung der Grenzspantiefe; Garber_2025_11_13.txt, Stichwort Testschnitt/Grenzspantiefe"]
["Warum sinkt beim HSC die spezifische Schnittkraft, aber die Leistung an der Schneide steigt dennoch oft?","Frage (DE)：Warum sinkt beim HSC die spezifische Schnittkraft, aber die Leistung an der Schneide steigt dennoch oft?\nAntwort (DE)：kc bzw. F_S sinkt bei v_S steigend; Leistung P=F_S*v_S. Wegen stark steigendem v_S kann P trotz kleinerer Kraft steigen.\n中文题目：为什么HSC中比切削力下降，但刀刃功率却常常仍会上升？\n中文答案：kc 或切削力 F_S 会随着切削速度 v_S 增大而下降；但功率 P=F_S·v_S。由于 v_S 大幅增大，即使力变小，功率仍可能上升。\n出处：FT 5 - Fräsen - Skript.pdf, S.14; full.md, Abschnitt 5.6 High Speed Cutting Grundlagen; Garber_2025_11_13.txt, Stichwort P=F·v"]
["Was macht man in der Praxis beim HSC, um Werkzeugverschleiß zu beherrschen?","Frage (DE)：Was macht man in der Praxis beim HSC, um Werkzeugverschleiß zu beherrschen?\nAntwort (DE)：Spanendicke/Zustellung reduzieren; mehrere schnelle Bahnen statt tiefer Schnitt; stabile, gewuchtete Werkzeuge und passende Spindel. Bei großem Zerspanvolumen ggf. HPC statt extremes HSC.\n中文题目：实际HSC中如何控制刀具磨损？\n中文答案：减小切屑厚度或切深；采用多条快速刀路，而不是一次深切；使用稳定、动平衡好的刀具和合适主轴。若要求很大的单位时间切除体积，必要时用 HPC，而不是极端 HSC。\n出处：FT 5 - Fräsen - Skript.pdf, S.15 und S.20; full.md, Abschnitt HSC Vorteile und Nachteile und HPC; Garber_2025_11_13.txt, Stichwort Verschleiß, Spanendicke und mehrere Bahnen"]
["Nennen Sie typische HSC-Anwendungen und Maschinenanforderungen.","Frage (DE)：Nennen Sie typische HSC-Anwendungen und Maschinenanforderungen.\nAntwort (DE)：Anwendungen: Aluminium-Integralbauteile (Zeitspanvolumen) und Formenbau-Schlichten (Oberfläche/Genauigkeit). Anforderungen: hohe Spindelleistung, n bis ca. 30000 min^-1, Vorschub >20-30 m/min, gute Dynamik/Wuchtgüte.\n中文题目：列出HSC典型应用与机床要求。\n中文答案：应用：铝整体件，用于提高单位时间切除体积；模具制造中的精加工，用于获得好的表面和精度。机床要求：高主轴功率，转速 n 可到约 30000 min^-1，进给速度大于 20–30 m/min，良好的动态性能和动平衡质量。\n出处：FT 5 - Fräsen - Skript.pdf, S.15, S.17–18; full.md, Abschnitt HSC Vorteile und Anwendung Integralbauteile/Schlichtbearbeitung; Garber_2025_11_13.txt, Stichwort HSC Anwendungen"]
["Warum ist beim HSC ein erhöhter Abschirmungsbedarf notwendig?","Frage (DE)：Warum ist beim HSC ein erhöhter Abschirmungsbedarf notwendig?\nAntwort (DE)：extreme Drehzahlen und hohe Umfangsgeschwindigkeiten; kleinste Bruchstücke und Späne können sehr hohe Fluggeschwindigkeiten erreichen; Gefahr für Bediener/Maschinenraum; deshalb geschlossener Arbeitsraum, stabile Abschirmung, geprüfte und gewuchtete Werkzeuge.\n中文题目：为什么HSC需要更强的防护、屏蔽？\n中文答案：由于转速和圆周速度极高，极小的断片和切屑也可能达到很高的飞出速度，会危及操作者和机床空间。因此需要封闭工作区、稳定防护，并使用经过检验和动平衡的刀具。\n出处：FT 5 - Fräsen - Skript.pdf, S.19; full.md, Abschnitt HSC Sicherheit; Garber_2025_11_13.txt, Stichwort Sicherheit, Wikipedia und Übertreibung"]
["Vergleichen Sie *HPC* mit *HSC* (Ziel, Parameter, Ergebnisoberfläche).","Frage (DE)：Vergleichen Sie *HPC* mit *HSC* (Ziel, Parameter, Ergebnisoberfläche).\nAntwort (DE)：HSC: sehr hohe v_S, kleine Spanungsdicke/Zustellung, gute Oberfläche, Schlichten; Grenze Verschleiß. HPC: max. Zeitspanvolumen, v_S niedriger, f_z/Vorschub hoch, viele Schneiden; hohe Kräfte, schlechte Oberfläche.\n中文题目：对比HPC与HSC（目标、参数、表面结果）。\n中文答案：HSC：非常高的 v_S，小切屑厚度或小切深，表面好，常用于精加工；限制是刀具磨损。HPC：目标是最大单位时间切除体积，v_S 较低，f_z 或进给高，刀刃数多；切削力大，表面较差。\n出处：FT 5 - Fräsen - Skript.pdf, S.20; full.md, Abschnitt 5.7 High Performance Cutting; Garber_2025_11_13.txt, Stichwort HPC vs HSC"]
["Warum ist Hartfräsen problematisch, und welche Schneidstoffe werden verwendet? Warum ist Diamant bei Stahl kritisch?","Frage (DE)：Warum ist Hartfräsen problematisch, und welche Schneidstoffe werden verwendet? Warum ist Diamant bei Stahl kritisch?\nAntwort (DE)：Problem: harter Stahl kaum plastisch verformbar, Riss-/Segmentspanbildung, hohe Temperatur/Kräfte. Schneidstoffe: Keramik, CBN, PKD/PCD. Diamant/PKD bei Stahl kritisch: C-Diffusion/chemischer Verschleiß in Eisen.\n中文题目：为什么硬铣困难？常用哪些刀具材料？为什么金刚石在钢上很危险？\n中文答案：问题：硬钢几乎不能塑性变形，容易形成裂纹屑或分段屑，温度和力都高。刀具材料：陶瓷、CBN、PKD/PCD。金刚石或 PKD 加工钢时很关键，因为碳会向铁中扩散，产生化学磨损。\n出处：FT 5 - Fräsen - Skript.pdf, S.21; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.22 (Diffusionsverschleiß); full.md, Abschnitt Hartfräsen und Diffusionsverschleiß; Garber_2025_11_13.txt, Stichwort Diamant, Stahl und Diffusion"]
["Was bedeutet „Schleifen = Spanen mit geometrisch (theoretisch) unbestimmter Schneide“?","Frage (DE)：Was bedeutet „Schleifen = Spanen mit geometrisch (theoretisch) unbestimmter Schneide“?\nAntwort (DE)：Schleifen: Spanen mit sehr vielen Körnern, deren Schneiden geometrisch nicht eindeutig bestimmt sind; Kornform, Spanwinkel und Eingriff zufällig.\n中文题目：“磨削=几何（理论）不确定刃切削”是什么意思？\n中文答案：磨削：用大量磨粒进行切削，这些磨粒的切削刃几何形状并不明确；磨粒形状、前角和参与切削是随机的。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.4；full.md Abschnitt # 8 Schleifen; 8.1 Schleifverfahren Kennzeichen"]
["Warum ist Innenrundschleifen kritisch?","Frage (DE)：Warum ist Innenrundschleifen kritisch?\nAntwort (DE)：Innenrundschleifen kritisch wegen großer Kontaktlänge, schlechter KSS-/Spanabfuhr, kleiner Scheibe und geringer Steifigkeit → Wärme/Schleifbrand/Verstopfen.\n中文题目：为什么内圆磨削是关键、容易出问题的工艺？\n中文答案：内圆磨削关键/困难：接触长度大，KSS/排屑差，砂轮小且刚性低 → 发热、磨削烧伤、堵塞。\n出处：Garber_2025_11_20.txt（老师强调 Innenrundschleifen 要记住和 critical）；FT 8 - Schleifen - Skript.pdf S.5；full.md Abschnitt # 8.1 Schleifverfahren Innenrundschleifen"]
["Was ist „Ausfeuern“ und warum macht man das am Ende?","Frage (DE)：Was ist „Ausfeuern“ und warum macht man das am Ende?\nAntwort (DE)：Ausfeuern: ohne Zustellung bis Endmaß weiterschleifen, bis keine Funken mehr entstehen. Zweck: elastische Verformung/Restabtrag abbauen, Oberfläche und Maß verbessern.\n中文题目：什么是Ausfeuern（空磨、走火），为什么在最后做？\n中文答案：Ausfeuern 指达到最终尺寸后不再进刀，继续磨削，直到不再产生火花。目的：消除弹性变形和剩余去除量，改善最终尺寸和表面。\n出处：Garber_2025_11_20.txt；课堂照片 IMG_20251120_124128.jpg（老师手写 und das Endmaß）；FT 8 - Schleifen - Skript.pdf S.6、S.9；full.md Abschnitt # 8.1 Schleifverfahren Ausfeuern"]
["Warum ist beim (Umfangs-)Längsschleifen ein Überlauf notwendig?","Frage (DE)：Warum ist beim (Umfangs-)Längsschleifen ein Überlauf notwendig?\nAntwort (DE)：Überlauf sorgt dafür, dass die Schleifscheibe auch an den Enden vollständig schleift; ohne Überlauf bleiben Randbereiche unterbearbeitet/nicht maßhaltig.\n中文题目：为什么（周边）纵向磨削必须有超程？\n中文答案：超程保证砂轮在工件端部也能完全磨削；没有超程时，边缘区域会欠加工/尺寸不合格。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.6；full.md Abschnitt # 8.1 Schleifverfahren Umfangs-Längsschleifen"]
["Was ist Schleifbrand? Nennen Sie typische Ursachen und Abhilfe.","Frage (DE)：Was ist Schleifbrand? Nennen Sie typische Ursachen und Abhilfe.\nAntwort (DE)：Schleifbrand = thermische Oberflächenschädigung. Folgen: Umhärtung, Eigenspannungen, Mikrorisse. Ursachen: v_c zu hoch, f zu klein, stumpfe Scheibe/Abrichter, schlechte KSS-Zufuhr. Abhilfe: v_c senken, f erhöhen, abrichten, KSS richtig zuführen.\n中文题目：什么是磨削烧伤？列出典型原因和对策。\n中文答案：磨削烧伤是热引起的表面损伤。后果：重新硬化、残余应力、微裂纹。原因：v_c 过高，f 过小，砂轮或修整器钝，KSS 供给差。对策：降低 v_c，提高 f，修整砂轮，正确供给 KSS。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.11、S.15；full.md Abschnitt # 8.1 Schleifverfahren Verfahrensgrenzen; # 8.1 Schmierstoffe"]
["Was passiert, wenn man vc erhöht, vf aber gleich lässt?","Frage (DE)：Was passiert, wenn man vc erhöht, vf aber gleich lässt?\nAntwort (DE)：v_c steigt, v_f gleich: Spangröße/Spanquerschnitt sinkt, Kräfte sinken, Rauheit sinkt -> bessere Oberfläche. Grenze: Reiben/Furchen statt Schneiden, Temperatur/Schleifbrand.\n中文题目：如果提高vc但vf保持不变，会发生什么？\n中文答案：当 v_c 增大而 v_f 不变时，单颗磨粒的切屑尺寸或切屑截面减小，力下降，粗糙度下降，表面变好。限制：可能从切削变成摩擦或犁削，温度升高并产生磨削烧伤。\n出处：Garber_2025_11_20.txt；课堂照片 IMG_20251120_122733.jpg、IMG_20251120_123036.jpg（vc hoch, Furchen, Leistung und Temperatur）；FT 8 - Schleifen - Skript.pdf S.4、S.11、S.14、S.30–31；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen; # 8.5 Einflussgrössen"]
["Was bedeutet der Härtegrad A…Z bei Schleifscheiben?","Frage (DE)：Was bedeutet der Härtegrad A…Z bei Schleifscheiben?\nAntwort (DE)：Härtegrad A...Z = Bindungsstärke, nicht Kornhärte. Hart: Korn bricht spät aus, Standzeit hoch, Schnittigkeit klein, Wärme hoch. Weich: Selbstschärfung, mehr Verschleiß/Rautiefe.\n中文题目：砂轮硬度A…Z表示什么？\n中文答案：砂轮硬度 A...Z 表示结合强度，不是磨粒硬度。硬砂轮：磨粒较晚脱落，寿命高，但切削性小、发热高。软砂轮：自锐性好，但磨损和粗糙度更大。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.23、S.29–31；full.md Abschnitt # 8.3 Schleifmittel und Schleifscheiben Härtegrad; # 8.4 Abrichten"]
["Nennen Sie die Aufgaben von Poren in der Schleifscheibe.","Frage (DE)：Nennen Sie die Aufgaben von Poren in der Schleifscheibe.\nAntwort (DE)：Spanraum; KSS-Transport in die Zone; zu viele Poren → weniger Bindemittel → Kornhalt schlechter (Kompromiss).\n中文题目：砂轮中气孔的作用是什么？\n中文答案：作用：容屑空间；把 KSS 输送到磨削区；气孔过多 → 结合剂减少 → 磨粒保持性变差（折中）。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.22、S.31；full.md Abschnitt # 8.3 Schleifkörpergefüge"]
["Nennen Sie typische Schleifmittel und ordnen Sie sie grob zu.","Frage (DE)：Nennen Sie typische Schleifmittel und ordnen Sie sie grob zu.\nAntwort (DE)：Korund: Stähle. SiC: Guss, NE-Metalle, Keramik/harte spröde Werkstoffe. CBN: gehärtete Stähle. Diamant: Hartmetall, Keramik, Glas, NE-Werkstoffe.\n中文题目：列出典型磨料并粗略说明适用对象。\n中文答案：刚玉：用于钢。SiC：用于铸铁、有色金属、陶瓷或硬脆材料。CBN：用于淬硬钢。金刚石：用于硬质合金、陶瓷、玻璃和有色材料。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.17–18、S.21；full.md Abschnitt # 8.3 Schleifmittel; Einsatz der Körnungen"]
["Vergleichen Sie Qualitätsschleifen und Hochleistungsschleifen (Trends).","Frage (DE)：Vergleichen Sie Qualitätsschleifen und Hochleistungsschleifen (Trends).\nAntwort (DE)：Qualitätsschleifen: v_c hoch, v_f gleich -> Spangröße/Kräfte/Rauheit sinken, Zeit gleich. Hochleistungsschleifen: v_c und v_f hoch -> Zeit sinkt, Leistung steigt, Rauheit etwa gleich.\n中文题目：比较质量磨削和高性能磨削的趋势。\n中文答案：质量磨削：v_c 高、v_f 不变，因此切屑尺寸、力和粗糙度下降，加工时间不变。高性能磨削：v_c 和 v_f 都高，因此时间下降、功率上升，粗糙度大致不变。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.12、S.14；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen"]
["Skizzieren Sie qualitativ, warum die Kontaktlänge beim Innenrundschleifen größer ist und was die Folge ist.","Frage (DE)：Skizzieren Sie qualitativ, warum die Kontaktlänge beim Innenrundschleifen größer ist und was die Folge ist.\nAntwort (DE)：Beim Innenrundschleifen ist Kontaktlänge größer als beim Außenrundschleifen → längere Späne, mehr Wärme, schlechtere KSS-/Spanabfuhr, Schleifbrandgefahr.\n中文题目：定性画图说明为什么内圆磨接触长度更大，以及后果是什么。\n中文答案：内圆磨削的接触长度比外圆磨削更大 → 切屑更长、热量更多、KSS/排屑更差，有磨削烧伤风险。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.5–6；full.md Abschnitt # 8.1 Innenrundschleifen; Umfangs-Längsschleifen"]
["Skizzieren Sie Seiten-Planschleifen vs Umfangs-Planschleifen und nennen Sie die Abhilfe.","Frage (DE)：Skizzieren Sie Seiten-Planschleifen vs Umfangs-Planschleifen und nennen Sie die Abhilfe.\nAntwort (DE)：Seiten-Planschleifen: große Kontaktfläche, kleine Spankammer, hohe Wärme. Umfangs-Planschleifen: kürzerer Kontakt, bessere Span-/KSS-Abfuhr. Abhilfe bei Seite: Spindelsturz.\n中文题目：画出端面平面磨和周边平面磨，并说明改进措施。\n中文答案：侧面平面磨：接触面积大，容屑空间小，热量高。周边平面磨：接触更短，排屑/KSS 更好。侧面磨的对策：主轴倾斜。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.7–8；full.md Abschnitt # 8.1 Schleifverfahren Planschleifen"]
["Gegeben Dw = 50 mm. Bestimmen Sie den zulässigen Ds-Bereich.","Frage (DE)：Gegeben Dw = 50 mm. Bestimmen Sie den zulässigen Ds-Bereich.\nAntwort (DE)：Ds = 0,6…0,8·Dw = 0,6…0,8·50 mm = 30…40 mm.\n中文题目：已知Dw=50mm，求允许的砂轮直径Ds范围。\n中文答案：Ds = 0.6…0.8·Dw = 0.6…0.8·50 mm = 30…40 mm。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.5；full.md Abschnitt # 8.1 Innenrundschleifen"]
["Schleifscheibenbreite b = 30 mm. Wie groß ist der Überlauf (Richtwert)?","Frage (DE)：Schleifscheibenbreite b = 30 mm. Wie groß ist der Überlauf (Richtwert)?\nAntwort (DE)：Überlauf ≈ 1/3·b ≈ 1/3·30 mm = 10 mm.\n中文题目：砂轮宽度b=30mm，超程经验值约为多少？\n中文答案：超程 ≈ 1/3·b ≈ 1/3·30 mm = 10 mm。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.6；full.md Abschnitt # 8.1 Umfangs-Längsschleifen"]
["Sie sollen entweder die Oberfläche verbessern oder die Hauptzeit verkürzen. Welches Konzept wählen Sie und warum?","Frage (DE)：Sie sollen entweder die Oberfläche verbessern oder die Hauptzeit verkürzen. Welches Konzept wählen Sie und warum?\nAntwort (DE)：Oberfläche verbessern: Qualitätsschleifen (v_c hoch, v_f gleich) → Rauheit/Kräfte sinken. Hauptzeit verkürzen: Hochleistungsschleifen (v_c und v_f hoch) → Zeit sinkt, Leistung steigt.\n中文题目：如果目标分别是改善表面或缩短主时间，应选择哪种磨削理念？为什么？\n中文答案：改善表面：质量磨削（v_c 高、v_f 不变）→ 粗糙度/力降低。缩短主时间：高性能磨削（v_c 和 v_f 都高）→ 时间降低、功率上升。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.11–12、S.14–15；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen; Verfahrensgrenzen"]
["Skizzieren Sie die Fließkurve kf(φ) für Kaltumformung. Wo beginnt sie und warum nicht bei 0?","Frage (DE)：Skizzieren Sie die Fließkurve kf(φ) für Kaltumformung. Wo beginnt sie und warum nicht bei 0?\nAntwort (DE)：Achsen: k_f über φ. Start etwa bei R_e/R_p0,2, nicht bei 0: darunter nur elastisch, keine bleibende Umformung. Bei Kaltumformung steigt k_f wegen Verfestigung.\n中文题目：画冷成形的流动曲线 kf(φ)。它从哪里开始？为什么不是从0开始？\n中文答案：坐标轴：k_f 关于 φ。起点约在 R_e/R_p0,2，不在 0：低于该点只有弹性变形，没有永久成形。冷成形时 k_f 因硬化而上升。\n出处：11 - Grundlagen Umformen - Skript.pdf S.12；full.md：11.2 Fließspannung und Umformgrad/Kaltumformung；Garber_2025_11_27.txt（老师说明 Prüfung 中要画、起点不能画成0）"]
["Geben Sie die Näherungsformel der Fließkurve an und nennen Sie den Nachteil bei φ=0.","Frage (DE)：Geben Sie die Näherungsformel der Fließkurve an und nennen Sie den Nachteil bei φ=0.\nAntwort (DE)：Kaltumformung: k_f = k_f1 · φ^n; k_f1 = Materialkonstante bei φ=1; n = Verfestigungskoeffizient. Nachteil bei φ=0: Formel ergibt k_f=0, physikalisch beginnt plastische Umformung erst bei R_e/R_p0,2.\n中文题目：写出流动曲线的经验公式，并说明 φ=0 的缺陷。\n中文答案：冷成形近似公式：k_f = k_f1 · φ^n。k_f1 是 φ=1 时的材料常数；n 是硬化指数。φ=0 时的缺点：公式给出 k_f=0，但物理上塑性成形只有到 R_e/R_p0,2 才开始。\n出处：11 - Grundlagen Umformen - Skript.pdf S.12–13；Formelblatt Fertigungstechnik.pdf（Umformende Verfahren）；full.md：11.2 Rechnen mit der Fließspannung；Garber_2025_11_27.txt（老师强调 φ=0 的陷阱）"]
["Warum ist der Härtegrad einer Diamantschleifscheibe oft höher als bei Korundscheiben?","Frage (DE)：Warum ist der Härtegrad einer Diamantschleifscheibe oft höher als bei Korundscheiben?\nAntwort (DE)：Härtegrad = Bindungsstärke. Diamantkörner teuer/sehr hart -> sollen lange gehalten werden, daher oft hoher Härtegrad. Korund oft weicher wegen Selbstschärfung.\n中文题目：为什么金刚石砂轮的硬度等级往往比刚玉砂轮更高？\n中文答案：硬度等级表示结合强度。金刚石磨粒昂贵且很硬，应被较长时间保持住，所以常用较高硬度等级。刚玉砂轮为了自锐，往往选得较软。\n出处：FT 8 - Schleifen - Skript.pdf S.23、S.26；full.md：8.3 Schleifmittel und Schleifscheiben/Härtegrad；Garber_2025_11_27.txt（老师提示 Das könnte eine Prüfungsfrage sein）"]
["Was ist Abrichten und wozu dient es?","Frage (DE)：Was ist Abrichten und wozu dient es?\nAntwort (DE)：Abrichten = Formen + Schärfen. Formen: Profil/Rundlauf/Geometrie. Schärfen: stumpfe Körner/Bindung entfernen, Topographie herstellen. Zweck: Formgenauigkeit, Rundlauf, stabile Schleifqualität.\n中文题目：什么是砂轮修整（Abrichten），它的目的是什么？\n中文答案：修整 Abrichten = 整形 + 修锐。整形：恢复轮廓、圆跳动和几何形状。修锐：去除钝化磨粒或结合剂，重新形成表面形貌。目的：保证形状精度、圆跳动和稳定磨削质量。\n出处：FT 8 - Schleifen - Skript.pdf S.29；full.md：8.4 Abrichten；Garber_2025_11_27.txt（老师讲 Abrichten 用于高精度、系列稳定加工）"]
["Einteilung nach DIN 8582: Nennen Sie die Umform-Hauptgruppen und je ein Beispiel.","Frage (DE)：Einteilung nach DIN 8582: Nennen Sie die Umform-Hauptgruppen und je ein Beispiel.\nAntwort (DE)：Druckumformen: Walzen/Gesenkformen/Durchdrücken. Zug-Druck: Tiefziehen/Durchziehen. Zugumformen: Längen/Weiten. Biegeumformen: Biegen. Schubumformen: Verschieben/Verdrehen.\n中文题目：按 DIN 8582：写出变形加工的主分类，并各举1例。\n中文答案：压缩成形：轧制、模锻、压过（Durchdrücken）。拉压复合成形：深拉、拉过（Durchziehen）。拉伸成形：拉长、扩径。弯曲成形：弯曲。剪切成形：错移、扭转。\n出处：11 - Grundlagen Umformen - Skript.pdf S.5；full.md：11.1 Einteilung der Verfahren nach DIN 8582；Garber_2025_11_27.txt（本节从 DIN 8580 过渡到 Umformen 分类）"]
["Welche Kennwerte lesen Sie im Spannungs–Dehnungs–Diagramm ab (mind. 5)?","Frage (DE)：Welche Kennwerte lesen Sie im Spannungs–Dehnungs–Diagramm ab (mind. 5)?\nAntwort (DE)：E-Modul, Rp0,2 (oder Re), Rm, Ag (Gleichmaßdehnung), A (Bruchdehnung).\n中文题目：应力-应变图能读出哪些关键参数（至少5个）？\n中文答案：E 模量、R_p0,2（或 R_e）、R_m、A_g（均匀延伸率）、A（断后伸长率）。\n出处：11 - Grundlagen Umformen - Skript.pdf S.7、S.11；full.md：11.2 Das Spannungs-Dehnungs-Diagramm und Definitionen；Garber_2025_11_27.txt 与课堂照片 IMG_20251127_131357（老师手写 E, Rp0,2, Rm, Ag, A）"]
["Definieren Sie den Umformgrad φ und nennen Sie den Vorteil der logarithmischen Definition.","Frage (DE)：Definieren Sie den Umformgrad φ und nennen Sie den Vorteil der logarithmischen Definition.\nAntwort (DE)：φ = ln(l1/l0) = ln(A0/A1). Vorteil: Umformgrade addieren sich bei mehreren Umformschritten (log-additiv).\n中文题目：定义变形度 φ，并说明为什么用对数定义。\n中文答案：φ = ln(l1/l0) = ln(A0/A1)。优点：多步成形时变形程度可相加（对数可加）。\n出处：11 - Grundlagen Umformen - Skript.pdf S.11、S.19–21；Formelblatt Fertigungstechnik.pdf（Umformgrad）；full.md：11.3 Volumenkonstanz und Additivität der Formänderung；Garber_2025_11_27.txt（老师用 100%+100%≠300% 说明对数变形可相加）"]
["Berechnen Sie den Umformgrad: l0=50 mm → l1=100 mm.","Frage (DE)：Berechnen Sie den Umformgrad: l0=50 mm → l1=100 mm.\nAntwort (DE)：φ = ln(100/50)=ln 2 ≈ 0,693.\n中文题目：计算变形度：长度 50 mm 拉到 100 mm。\n中文答案：φ = ln(100/50)=ln 2 ≈ 0.693。\n出处：11 - Grundlagen Umformen - Skript.pdf S.11、S.21；Formelblatt Fertigungstechnik.pdf（Umformgrad）；full.md：11.3 Additivität der Formänderung；Garber_2025_11_27.txt（课堂板书用长度倍增解释）"]
["Definieren Sie Honen.","Frage (DE)：Definieren Sie Honen.\nAntwort (DE)：Honen = Feinstschleifen mit geometrisch unbestimmter Schneide; Honsteine mit gebundenen Körnern. Anwendung: Bohrungen. Ziel: Maß-, Form- und Oberflächenverbesserung.\n中文题目：给出珩磨（Honen）的定义。\n中文答案：珩磨是几何不确定刃的精细磨削；珩磨石带有结合磨粒。应用：孔加工。目标：改善尺寸、形状和表面。\n出处：FT 9 - Honen.pdf S.2–3；full.md：9 Honen: Definition Honen；Garber_2025_11_27.txt（老师讲 Honen 接在 Schleifen 后，属于几何不确定刃精加工）"]
["Nennen Sie den Aufbau einer Honahle und wie die Zustellung erfolgt.","Frage (DE)：Nennen Sie den Aufbau einer Honahle und wie die Zustellung erfolgt.\nAntwort (DE)：Honahle: Honleisten/Honsteine, Steinhalter, Kardangelenk, Zustellstange/-kolben, Expansionskonus. Zustellung radial, hydraulisch oder mechanisch über Expansionskonus.\n中文题目：珩磨头（Honahle）主要结构是什么？径向进给如何实现？\n中文答案：珩磨头由珩磨条/珩磨石、珩磨石支架、万向节、进给杆或进给活塞、扩张锥组成。进给为径向进给，可通过液压或机械方式经扩张锥实现。\n出处：FT 9 - Honen.pdf S.4；full.md：9 Honen/Honahlen；Garber_2025_11_27.txt（老师讲 Honwerkzeuge 与径向 Zustellung）"]
["Welche Oberflächenstruktur erzeugt Honen und wozu dient sie bei Zylinderlaufflächen?","Frage (DE)：Welche Oberflächenstruktur erzeugt Honen und wozu dient sie bei Zylinderlaufflächen?\nAntwort (DE)：Honen erzeugt Kreuzschliff. Dient als Öltaschenstruktur: Schmierfilm bleibt, Reibung/Verschleiß sinken.\n中文题目：珩磨会产生什么表面纹理？在缸孔、缸套上它的作用是什么？\n中文答案：珩磨产生交叉磨纹。作为储油袋结构：润滑膜保留，摩擦/磨损降低。\n出处：FT 9 - Honen.pdf S.5–6；full.md：9 Honen, Struktur einer gehonten Oberfläche und Anwendungen；Garber_2025_11_27.txt（老师强调 Zylinderlaufflächen 与 Öl-Speicherung）"]
["Welche Fehler einer Bohrung können durch Honen korrigiert werden (mind. 3)?","Frage (DE)：Welche Fehler einer Bohrung können durch Honen korrigiert werden (mind. 3)?\nAntwort (DE)：Korrigierbar: Krümmung, Welligkeit, Konizität, Tonnenform, Unrundheit, Untermaß. Nicht korrigierbar: grobe Lage-/Positionsfehler.\n中文题目：珩磨能纠正哪些孔的误差（至少3个）？\n中文答案：可修正：弯曲、波纹、锥度、桶形、失圆、欠尺寸。不可修正：严重的位置/方位误差。\n出处：FT 9 - Honen.pdf S.7；full.md：9 Honen/Erreichbare Genauigkeit und Rauheit；Garber_2025_11_27.txt（老师讲可通过 Honen 改善 Maß, Form und Oberfläche）"]
["Welche Fehler kann Honen nicht korrigieren und warum?","Frage (DE)：Welche Fehler kann Honen nicht korrigieren und warum?\nAntwort (DE)：Nicht korrigierbar: Übermaß, Positions-/Lagefehler, Schrägstellung/Achsneigung. Grund: Honen trägt nur Material ab und folgt der vorhandenen Bohrungsachse.\n中文题目：珩磨不能纠正哪些误差？为什么？\n中文答案：不能修正：孔过大、位置/方位误差、倾斜或轴线倾斜。原因：珩磨只去除材料，并沿已有孔轴线工作。\n出处：FT 9 - Honen.pdf S.7（仅列可修正误差，反向对照）；课件未定位到：课堂板书、口头补充；full.md：9 Honen/Erreichbare Genauigkeit und Rauheit；Garber_2025_11_27.txt 与课堂照片 IMG_20251127_123226（Durch Honen nicht korrigierbar: Übermaß, Position, Schrägstellung und Lagetoleranzen）"]
["Was kommt in der Prüfung *sicher* dran?","Frage (DE)：Was kommt in der Prüfung *sicher* dran?\nAntwort (DE)：Sicher: Schneidkeil/Spanwinkel, Kienzle mit b und h, Umformgrad/Additivität, Tiefziehen/Verfahrensfenster, Schleifen/Schleifbrand; Formeln anwenden können.\n中文题目：期末确定会考什么？\n中文答案：确定会考：切削楔/前角、Kienzle 中 b 和 h、变形程度/加和性、深拉/工艺窗口、磨削/磨削烧伤；要会应用公式。\n出处：Garber_2025_12_04.txt（考试范围口头说明）；Prüfungsinhalt.pdf S.1；full.md Abschnitt „Themen für die Prüfung Fertigungstechnik“."]
["Skizzieren Sie die Fließkurve und erklären Sie den Startpunkt.","Frage (DE)：Skizzieren Sie die Fließkurve und erklären Sie den Startpunkt.\nAntwort (DE)：Fließkurve: k_f über φ; bei Kaltumformung steigend durch Verfestigung. Start nahe R_e/R_p0,2, nicht bei 0, weil darunter nur elastische Verformung.\n中文题目：画出流动曲线并解释起点。\n中文答案：流动曲线：k_f 关于 φ；冷成形时由于硬化而上升。起点接近 R_e/R_p0,2，不在 0，因为低于该点只有弹性变形。\n出处：Garber_2025_12_04.txt（老师强调 Fließkurve und Skizze）；11 - Grundlagen Umformen - Skript.pdf S.11–12；full.md Abschnitt „11.2 Fließspannung und Umformgrad; Kaltumformung“."]
["Wie lautet die Fließkurven-Gleichung und warum gilt sie nicht bei ϕ=0?","Frage (DE)：Wie lautet die Fließkurven-Gleichung und warum gilt sie nicht bei ϕ=0?\nAntwort (DE)：Fließkurve: k_f = k_f1 · φ^n. Bei φ = 0 ergibt die Näherung formal 0; physikalisch beginnt plastische Umformung erst bei R_e/R_p0,2.\n中文题目：流动曲线公式是什么？为什么 ϕ=0 时不能直接用？\n中文答案：流动曲线：k_f = k_f1 · φ^n。φ=0 时该近似形式上给出 0；物理上塑性成形只有到 R_e/R_p0,2 才开始。\n出处：Garber_2025_12_04.txt（老师强调 ϕ=0 不能套公式、起始用 Re）；11 - Grundlagen Umformen - Skript.pdf S.12–13；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Fließspannung beim Kaltumformen“."]
["Definieren Sie Umformgrad ϕ und erklären Sie ϕ ≠ ε.","Frage (DE)：Definieren Sie Umformgrad ϕ und erklären Sie ϕ ≠ ε.\nAntwort (DE)：φ = logarithmische Formänderung: φ = ln(l_1/l_0) bzw. über Flächen. Sie ist additiv. ε = Δl/l_0 ist technische Dehnung und nicht additiv.\n中文题目：定义变形程度 ϕ，并说明它为什么不等于工程应变 ε。\n中文答案：φ = 对数形状变化：φ = ln(l_1/l_0)，也可通过面积计算。它可相加。ε = Δl/l_0 是工程应变，不可相加。\n出处：Garber_2025_12_04.txt（老师强调 ϕ 不是 Dehnung）；11 - Grundlagen Umformen - Skript.pdf S.11, S.19, S.21；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Definitionen; Volumenkonstanz“."]
["Was gilt für das Vorzeichen des Umformgrades?","Frage (DE)：Was gilt für das Vorzeichen des Umformgrades?\nAntwort (DE)：Vorzeichen hängt von Richtung ab: Verlängerung φ_l > 0, Verkürzung/Stauchen φ_h < 0. Für Umformarbeit nutzt man den Betrag |φ|.\n中文题目：变形程度 ϕ 的正负号如何判断？\n中文答案：符号取决于方向：伸长 φ_l > 0，缩短/镦粗 φ_h < 0。计算成形功时用 |φ|。\n出处：Garber_2025_12_04.txt（板书、老师强调正负号）；11 - Grundlagen Umformen - Skript.pdf S.19–20；full.md Abschnitt „Volumenkonstanz beim Umformen“."]
["Begründen Sie: ϕl + ϕb + ϕh = 0.","Frage (DE)：Begründen Sie: ϕl + ϕb + ϕh = 0.\nAntwort (DE)：Volumenkonstanz: φ_l + φ_b + φ_h = ln(l_1/l_0) + ln(b_1/b_0) + ln(h_1/h_0) = ln(V_1/V_0) = ln1 = 0.\n中文题目：证明 ϕl+ϕb+ϕh=0。\n中文答案：体积守恒：φ_l + φ_b + φ_h = ln(l_1/l_0) + ln(b_1/b_0) + ln(h_1/h_0) = ln(V_1/V_0) = ln1 = 0。\n出处：Garber_2025_12_04.txt（老师板书推导）；11 - Grundlagen Umformen - Skript.pdf S.19–20；full.md Abschnitt „Volumenkonstanz beim Umformen“."]
["Additivität: Ein Draht wird zweimal nacheinander mit ϕ=1 umgeformt. Wie groß ist ϕgesamt?","Frage (DE)：Additivität: Ein Draht wird zweimal nacheinander mit ϕ=1 umgeformt. Wie groß ist ϕgesamt?\nAntwort (DE)：Logarithmische Umformgrade addieren sich: φ_ges = φ_1 + φ_2 = 1 + 1 = 2. Nicht mit technischen Dehnungen ε addieren.\n中文题目：加和性：一根线材连续两次变形，每次 ϕ=1，总 ϕ 是多少？\n中文答案：对数变形程度相加：φ_ges = φ_1 + φ_2 = 1 + 1 = 2。不要与工程应变 ε 混加。\n出处：Garber_2025_12_04.txt（老师说几乎每次考试都问、重点强调 Additivität）；11 - Grundlagen Umformen - Skript.pdf S.21；full.md Abschnitt „Additivität der Formänderung“."]
["Zeigen Sie den Zusammenhang zwischen Flächen-Umformgrad und Hauptumformgrad beim Stauchen.","Frage (DE)：Zeigen Sie den Zusammenhang zwischen Flächen-Umformgrad und Hauptumformgrad beim Stauchen.\nAntwort (DE)：ϕA = ln(A1/A0) = ln(b1/b0)+ln(l1/l0)=ϕb+ϕl = -ϕh.\n中文题目：说明镦粗时面积变形程度与主变形程度的关系。\n中文答案：ϕA = ln(A1/A0) = ln(b1/b0)+ln(l1/l0)=ϕb+ϕl = -ϕh。\n出处：Garber_2025_12_04.txt（老师板书推导，并说明脚本中不一定直接写）；11 - Grundlagen Umformen - Skript.pdf S.19–20；12 - Fließpressen - Skript.pdf S.14；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitte „Volumenkonstanz“ und „Spannungszustand beim Kaltfließpressen“."]
["Was ist die ideelle Umformkraft beim Stauchen?","Frage (DE)：Was ist die ideelle Umformkraft beim Stauchen?\nAntwort (DE)：Fid = A · kf; nur Werkstoffumformung, ohne Reibungskräfte.\n中文题目：镦粗时理想成形力是什么？\n中文答案：F_id = A · k_f；只考虑材料变形，不含摩擦力。\n出处：Garber_2025_12_04.txt（老师强调 Anfang/Ende 力算法）；11 - Grundlagen Umformen - Skript.pdf S.22, S.25；full.md Abschnitt „Umformkraft und Umformarbeit beim Stauchen“."]
["Begründen Sie: Für Kraft nicht mit kfm rechnen, für Arbeit schon.","Frage (DE)：Begründen Sie: Für Kraft nicht mit kfm rechnen, für Arbeit schon.\nAntwort (DE)：Kraft: Momentanzustand/max. Endkraft maßgebend ⇒ F_E = A_E · k_fe, nicht k_fm. Arbeit: Integral über Prozess ⇒ k_fm als Mittelwert zulässig; W_id = V · k_fm · |φ|.\n中文题目：为什么力不能用平均流动应力 kfm，但功可以用？\n中文答案：力：瞬时状态/最大末端力为准 ⇒ F_E = A_E · k_fe，不能用 k_fm。功：对全过程积分 ⇒ 可用平均流动应力 k_fm；W_id = V · k_fm · |φ|。\n出处：Garber_2025_12_04.txt（老师明确强调该陷阱）；11 - Grundlagen Umformen - Skript.pdf S.13, S.22；full.md Abschnitte „Rechnen mit der Fließspannung“ und „Umformkraft und Umformarbeit“."]
["Wie lautet die ideelle Umformarbeit und warum steht |ϕ|?","Frage (DE)：Wie lautet die ideelle Umformarbeit und warum steht |ϕ|?\nAntwort (DE)：W_id = V · k_fm · |φ|. Betrag, weil Arbeit immer positiv ist, auch wenn ein Umformgrad je nach Richtung negativ notiert wird.\n中文题目：理想成形功公式是什么？为什么要写 |ϕ|？\n中文答案：W_id = V · k_fm · |φ|。取绝对值，因为功始终为正，即使某个变形程度按方向记为负。\n出处：Garber_2025_12_04.txt（老师强调能量取绝对值、只算变形体积）；11 - Grundlagen Umformen - Skript.pdf S.22–23；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Umformenergie“."]
["Was ist die spezifische Umformarbeit wd und wann ist sie vorteilhaft?","Frage (DE)：Was ist die spezifische Umformarbeit wd und wann ist sie vorteilhaft?\nAntwort (DE)：w_d = spezifische Umformarbeit = W/V. Vorteilhaft, wenn nur das umgeformte Volumen zählt; dann W = w_d · V_u.\n中文题目：什么是比成形功 wd？什么时候更有利？\n中文答案：w_d = 比成形功 = W/V。当只考虑被成形体积时有利；此时 W = w_d · V_u。\n出处：Garber_2025_12_04.txt（老师提示有 wd 曲线优先用）；11 - Grundlagen Umformen - Skript.pdf S.23, S.26；full.md Abschnitt „Spezifische Umformarbeit“."]
["Berechnen Sie die erforderliche Rohlinglänge (D0=12 mm, Kopf: D=18 mm, hk=10 mm, Schaft=50 mm).","Frage (DE)：Berechnen Sie die erforderliche Rohlinglänge (D0=12 mm, Kopf: D=18 mm, hk=10 mm, Schaft=50 mm).\nAntwort (DE)：- Volumenkonstanz (nur Kopf): π·(6²)·Lk = π·(9²)·10 ⇒ Lk = 10·(9²/6²)=22,5 mm\n- Lges = 50 + 22,5 = 72,5 mm\n中文题目：求所需毛坯长度（D0=12 mm，头部 D=18 mm，高 10 mm，杆部 50 mm）。\n中文答案：- 体积守恒（只算头部）：π·(6²)·Lk = π·(9²)·10 ⇒ Lk = 10·(9²/6²)=22.5 mm\n- Lges = 50 + 22.5 = 72.5 mm\n出处：Garber_2025_12_04.txt（老师板书 Bolzen 例题、强调 nur umgeformtes Volumen）；11 - Grundlagen Umformen - Skript.pdf S.25–26；full.md Abschnitt „Aufgaben Grundlagen Umformen; Berechnung mit spezifischer Umformarbeit“."]
["Bestimmen Sie den Hauptumformgrad ϕh.","Frage (DE)：Bestimmen Sie den Hauptumformgrad ϕh.\nAntwort (DE)：Nur umgeformter Teil: h0=22,5 mm → h1=10 mm ⇒ ϕh = ln(10/22,5) = -0,81 (alternativ über Fläche: ln(A1/A0)=+0,81).\n中文题目：求主变形程度 ϕh。\n中文答案：只看被变形部分：h0=22.5 mm → h1=10 mm ⇒ φ_h = ln(10/22.5) = -0.81（也可用面积：ln(A1/A0)=+0.81）。\n出处：Garber_2025_12_04.txt（老师板书 ϕ=ln(10/22,5) 与面积法）；11 - Grundlagen Umformen - Skript.pdf S.19–20, S.25–26；12 - Fließpressen - Skript.pdf S.14；full.md Abschnitt „Volumenkonstanz; Aufgaben Grundlagen Umformen“."]
["Berechnen Sie F0 und FE.","Frage (DE)：Berechnen Sie F0 und FE.\nAntwort (DE)：- Anfang: F0 = A0·Re, A0=π·6² ⇒ F0≈29,4 kN\n- Ende: FE = AE·kfe, AE=π·9²; kfe = kf1·|ϕ|^n ⇒ FE≈180 kN\n中文题目：计算起始成形力 F0 和末端成形力 FE。\n中文答案：- 起始：F0 = A0·Re，A0=π·6² ⇒ F0≈29.4 kN\n- 末端：FE = AE·kfe，AE=π·9²；kfe = kf1·|φ|^n ⇒ FE≈180 kN\n出处：Garber_2025_12_04.txt（老师板书 F0≈29,4 kN、FE≈180 kN）；11 - Grundlagen Umformen - Skript.pdf S.12–13, S.22, S.25；full.md Abschnitt „Rechnen mit der Fließspannung; Aufgaben Grundlagen Umformen“."]
["Berechnen Sie die gesamte ideelle Umformarbeit Wid.","Frage (DE)：Berechnen Sie die gesamte ideelle Umformarbeit Wid.\nAntwort (DE)：- kfm=(Re+kfe)/2\n- V = π·9²·10 mm³ (nur Kopf!)\n- Wid = V · kfm · |ϕ| ⇒ ≈ 0,996 kJ (≈ 996 J)\n中文题目：计算总理想成形功 Wid。\n中文答案：- kfm=(Re+kfe)/2\n- V = π·9²·10 mm³（只算头部！）\n- Wid = V · kfm · |ϕ| ⇒ ≈ 0.996 kJ（≈996 J）\n出处：Garber_2025_12_04.txt（老师板书 Wid≈996 J、强调 nur umgeformtes Volumen）；11 - Grundlagen Umformen - Skript.pdf S.22–26；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Umformarbeit; Berechnung mit spezifischer Umformarbeit“."]
["Nennen Sie Schmierstoffe und begründen Sie die Wahl für Kalt- vs. Warmumformung.","Frage (DE)：Nennen Sie Schmierstoffe und begründen Sie die Wahl für Kalt- vs. Warmumformung.\nAntwort (DE)：Kaltumformung: Öle, Phosphate/Seifen, feste Schmierstoffe → Reibung/Werkzeuglast senken. Warmumformung: Graphit/Glas, temperaturbeständig.\n中文题目：列举润滑剂，并说明冷成形与热成形的选择理由。\n中文答案：冷成形：油、磷化/皂化层、固体润滑剂 → 降低摩擦和工具负载。热成形：石墨/玻璃，耐高温。\n出处：Garber_2025_12_04.txt（老师举 Öl, Seife, Emulsion und Graphit 并解释冷热区别）；11 - Grundlagen Umformen - Skript.pdf S.24；13 - Schmieden - Skript.pdf S.10；full.md Abschnitte „Tribologie“ und „Trennmittel“."]
["Wovon hängt das Formänderungsvermögen bei Stählen ab?","Frage (DE)：Wovon hängt das Formänderungsvermögen bei Stählen ab?\nAntwort (DE)：Abhängig von: chemischer Zusammensetzung (C, P, Legierung), Gefüge (Korngröße, Perlitanteil/-verteilung) und Wärmebehandlung. Günstig: feinkörnig, ferritisch, weichgeglüht.\n中文题目：钢的成形能力取决于哪些因素？\n中文答案：取决于：化学成分（C、P、合金元素）、组织（晶粒大小、珠光体比例/分布）和热处理。有利：细晶、铁素体、软退火。\n出处：Garber_2025_12_04.txt（老师提到材料、成形能力因素）；11 - Grundlagen Umformen - Skript.pdf S.18；full.md Abschnitt „Formänderungsvermögen“."]
["Ein Stab ist 1 m lang. Wie lang ist er nach Umformgrad ϕ=1?","Frage (DE)：Ein Stab ist 1 m lang. Wie lang ist er nach Umformgrad ϕ=1?\nAntwort (DE)：ϕ = ln(l1/l0)=1 ⇒ l1/l0=e^1=e≈2,718; Bei l0=1 m: l1≈2,718 m.\n中文题目：一根 1 m 长的杆，变形程度 ϕ=1 后长度是多少？\n中文答案：由 ϕ=ln(l1/l0)=1 得 l1/l0=e^1=e≈2.718。若 l0=1 m，则 l1≈2.718 m。\n出处：Garber_2025_12_04.txt（老师口头举例 1 m → e m）；11 - Grundlagen Umformen - Skript.pdf S.11；full.md Abschnitt „Definitionen; Umformgrad“."]
["Warum darf man bei der Umformarbeit nur das *umgeformte Volumen* \\(V_u\\) verwenden?","Frage (DE)：Warum darf man bei der Umformarbeit nur das *umgeformte Volumen* \\(V_u\\) verwenden?\nAntwort (DE)：Nur V_u verwenden, weil nur dieser Werkstoff plastisch umgeformt wird; nicht umgeformtes Volumen leistet keine Umformarbeit. W = w_d · V_u.\n中文题目：为什么算成形功只能使用“实际发生变形的体积”\\(V_u\\)？\n中文答案：只使用 V_u，因为只有这部分材料发生塑性变形；未变形体积不产生变形功。W = w_d · V_u。\n出处：11 - Grundlagen Umformen - Skript.pdf, S.22–23（Umformarbeit/spezifische Umformarbeit）；12 - Fließpressen - Skript.pdf, S.20（Aufgabe Fließpressen）；full.md, Abschnitte „11.3 Volumenkonstanz, Umformkraft, Umformarbeit“ und „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书：老师强调 „nur umgeformtes Volumen“、未变形部分不计。"]
["Wie bestimmen Sie die ideelle Umformarbeit \\(W_{id}\\) mit der spezifischen Umformarbeit \\(w_d\\)?","Frage (DE)：Wie bestimmen Sie die ideelle Umformarbeit \\(W_{id}\\) mit der spezifischen Umformarbeit \\(w_d\\)?\nAntwort (DE)：Mit spezifischer Umformarbeit: W_id = w_d · V_u. w_d in N/mm² und V in mm³ ergibt Nmm; 1 Nmm = 10^-3 J.\n中文题目：如何用比成形功 \\(w_d\\) 求理想成形功 \\(W_{id}\\)？\n中文答案：用比成形功：W_id = w_d · V_u。w_d 单位 N/mm²，V 单位 mm³，得到 Nmm；1 Nmm = 10^-3 J。\n出处：11 - Grundlagen Umformen - Skript.pdf, S.23 und S.26（spezifische Umformarbeit \\(w_d\\)）；12 - Fließpressen - Skript.pdf, S.20；full.md, Abschnitt „Berechnung mit spezifischer Umformarbeit“；Garber_2025_12_11.txt; 板书：课堂按 \\(\\varphi\nightarrow w_d\nightarrow V\nightarrow W\\) 演算并强调单位。"]
["Warum wird der Umformgrad beim Fließpressen über Flächen berechnet und wie lautet die Formel?","Frage (DE)：Warum wird der Umformgrad beim Fließpressen über Flächen berechnet und wie lautet die Formel?\nAntwort (DE)：Beim Fließpressen ist die Länge schwer bestimmbar, der Querschnitt aber bekannt. Daher:\n\\[\n\\varphi=\\ln(A_1/A_0)\n\\]\nbzw. positiver Betrag; bei Topfteilen Ringfläche.\n中文题目：为什么 Fließpressen 的变形程度用面积计算？公式是什么？\n中文答案：流压时长度难以确定，但截面积已知。因此：\n\\[\n\\varphi=\\ln(A_1/A_0)\n\\]\n或取正的绝对值；杯形件使用环形面积。\n出处：12 - Fließpressen - Skript.pdf, S.14（Umformgrad über Flächen）；Formelblatt Fertigungstechnik.pdf（Umformgrad \\(\\ln(A_1/A_0)\\)）；full.md, Abschnitt „Spannungszustand beim Kaltfließpressen“；Garber_2025_12_11.txt; 板书：老师强调面积法比长度法稳。"]
["Vorwärtsfließpressen: \\(D_0=40\\,mm\\), \\(D_1=20\\,mm\\). Wie groß ist \\(\\varphi\\)?","Frage (DE)：Vorwärtsfließpressen: \\(D_0=40\\,mm\\), \\(D_1=20\\,mm\\). Wie groß ist \\(\\varphi\\)?\nAntwort (DE)：φ = ln(A_0/A_1) = ln((π/4 · 40²)/(π/4 · 20²)) = ln(4) ≈ 1,386.\n中文题目：前向流压：\\(D_0=40\\,mm\\)、\\(D_1=20\\,mm\\)，\\(\\varphi\\) 等于多少？\n中文答案：φ = ln(A_0/A_1) = ln((π/4 · 40²)/(π/4 · 20²)) = ln(4) ≈ 1.386。\n出处：12 - Fließpressen - Skript.pdf, S.20（Aufgabe Fließpressen；原题图）；full.md, Abschnitt „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书照片：课堂更正 \\(D_0=40\\,mm\\)，并算出 \\(\\ln4=1{,}386\\)。"]
["Wie berücksichtigen Sie \\(\\eta=0{,}5\\) bei der Umformarbeit?","Frage (DE)：Wie berücksichtigen Sie \\(\\eta=0{,}5\\) bei der Umformarbeit?\nAntwort (DE)：Bei η = 0,5: reale Arbeit/Energie = ideelle Arbeit / η = 2 · W_id. η steht im Nenner, nicht multiplizieren.\n中文题目：η=0.5 时在成形功计算中如何处理？\n中文答案：η = 0.5 时：实际功/能量 = 理想功 / η = 2 · W_id。η 在分母，不要相乘。\n出处：12 - Fließpressen - Skript.pdf, S.20（η=0,5）；11 - Grundlagen Umformen - Skript.pdf, S.22–23；full.md, Abschnitt „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书：老师讲 \\(W_{ges}=2\\cdot W_{id}\\)，并提醒 \\(Nmm\nightarrow J\\)。"]
["Nennen Sie die drei Varianten des „Durchdrückens“.","Frage (DE)：Nennen Sie die drei Varianten des „Durchdrückens“.\nAntwort (DE)：Verjüngen – Fließpressen – Strangpressen.\n中文题目：请列举 Durchdrücken 的三种变体。\n中文答案：缩径（Verjüngen）；流压（Fließpressen）；挤压（Strangpressen）。\n出处：12 - Fließpressen - Skript.pdf, S.4（Verfahren des Durchdrückens）；full.md, Abschnitt „12.1 Grundlagen / Verfahren des Durchdrückens“；Garber_2025_12_11.txt：课堂按 Verjüngen–Fließpressen–Strangpressen 分类讲解。"]
["Was passiert, wenn die Formänderung beim Verjüngen zu groß wird?","Frage (DE)：Was passiert, wenn die Formänderung beim Verjüngen zu groß wird?\nAntwort (DE)：Zu großer Umformgrad überschreitet Formänderungsvermögen → Risse/Bruch; deshalb mehrere Stufen oder Zwischenglühen nötig.\n中文题目：如果 Verjüngen 的变形量过大，会发生什么？\n中文答案：变形程度过大时会超过材料成形能力 → 裂纹/断裂；因此需要多级成形或中间退火。\n出处：12 - Fließpressen - Skript.pdf, S.4（Verjüngen: geringe Formänderung, Werkstück muss nicht geführt werden；Fließpressen als stärker geführtes Durchdrücken）；full.md, Abschnitt „Verjüngen und Fließpressen“；Garber_2025_12_11.txt：老师口头解释变形过大时会侧向变形。"]
["Definieren Sie Vorwärts- und Rückwärtsfließpressen.","Frage (DE)：Definieren Sie Vorwärts- und Rückwärtsfließpressen.\nAntwort (DE)：Vorwärts: Materialfluss gleich Stempelbewegung; Rückwärts: Materialfluss entgegen Stempelbewegung (Becherbildung typisch).\n中文题目：定义前向流压和后向流压。\n中文答案：前向：材料流动方向与冲头运动方向相同；后向：材料流动方向与冲头运动方向相反（典型为杯形件）。\n出处：12 - Fließpressen - Skript.pdf, S.5–8（Verfahrensübersicht, Vorwärts-/Rückwärts-Fließpressen）；full.md, Abschnitt „12.2 Fließpressen“；Garber_2025_12_11.txt：课堂用方向区分 Vorwärts und Rückwärts。"]
["Nennen Sie Varianten des Rückwärts-Fließpressens.","Frage (DE)：Nennen Sie Varianten des Rückwärts-Fließpressens.\nAntwort (DE)：Voll-Rückwärts; Napf-Rückwärts; Hohl-Rückwärts.\n中文题目：列举后向流压的变体。\n中文答案：后向流压变体：实心后向流压、杯形后向流压、空心后向流压。\n出处：12 - Fließpressen - Skript.pdf, S.5 und S.8（Rückwärts-Fließpressen）；full.md, Abschnitt „Rückwärts-Fließpressen“；Garber_2025_12_11.txt：课堂点名这些 Rückwärts 变体。"]
["Was ist Querfließpressen?","Frage (DE)：Was ist Querfließpressen?\nAntwort (DE)：Material fließt quer zur Hauptstempelrichtung; typisch für seitliche Ansätze/Anschlüsse.\n中文题目：什么是横向流压？\n中文答案：材料横向于主冲头方向流动；典型用于侧向凸台/连接部。\n出处：12 - Fließpressen - Skript.pdf, S.5 und S.10（Quer-Fließpressen）；full.md, Abschnitt „Voll-QuerFließpressen“；Garber_2025_12_11.txt：课堂用 seitlicher Anschluss und 侧向结构解释。"]
["Warum sind beim Kaltfließpressen Werkzeugbelastung und Verschleiß so hoch?","Frage (DE)：Warum sind beim Kaltfließpressen Werkzeugbelastung und Verschleiß so hoch?\nAntwort (DE)：Kaltfließpressen hat hohe Umformgrade und Reibung bei Raumtemperatur; Fließspannung steigt durch Verfestigung → hohe Werkzeugkräfte und Verschleiß.\n中文题目：为什么冷流压时模具载荷和磨损很高？\n中文答案：冷流压在室温下有高变形程度和高摩擦；流动应力因加工硬化而升高 → 工具力和磨损高。\n出处：12 - Fließpressen - Skript.pdf, S.14–15（Spannungszustand, Werkzeugbelastung/Verschleiß）；full.md, Abschnitte „Spannungszustand beim Kaltfließpressen“ und „Anforderungen an die Werkzeuge“；Garber_2025_12_11.txt：课堂强调径向力导致摩擦和磨损。"]
["Nennen Sie Anforderungen an Fließpress-Werkzeuge.","Frage (DE)：Nennen Sie Anforderungen an Fließpress-Werkzeuge.\nAntwort (DE)：Warmfestigkeit und Warmzähigkeit; Warmrissunempfindlichkeit; Temperaturwechselbeständigkeit.\n中文题目：请列举流压模具的要求。\n中文答案：流压工具要求：热强度和热韧性；对热裂纹不敏感；耐温度交变。\n出处：12 - Fließpressen - Skript.pdf, S.15（Fließpress-Werkzeuge）；full.md, Abschnitt „Anforderungen an die Werkzeuge“；Garber_2025_12_11.txt：课堂将工具限制与最大变形程度联系起来。"]
["Was ist Strangpressen und welche Werkstoffe dominieren?","Frage (DE)：Was ist Strangpressen und welche Werkstoffe dominieren?\nAntwort (DE)：Durchdrücken eines aufgeheizten Blockes durch Matrize; ca. 80% Al, 10% Cu, 10% Fe.\n中文题目：什么是 Strangpressen？主要材料是什么？\n中文答案：把加热坯块通过凹模挤出；约 80% 铝，10% 铜，10% 铁。\n出处：12 - Fließpressen - Skript.pdf, S.4 und S.16（Strangpressen, Werkstoffe）；full.md, Abschnitt „Anwendung: Strangpressen“；Garber_2025_12_11.txt：课堂说明 Strangpressen 用于长型材、主要是铝。"]
["Begründen Sie das „Verfahrensfenster“ beim Strangpressen.","Frage (DE)：Begründen Sie das „Verfahrensfenster“ beim Strangpressen.\nAntwort (DE)：Verfahrensfenster: zu kalt -> Fließspannung/Presskraft zu hoch; zu heiß -> Schmelzbeginn/lokale Überhitzung. Zulässig zwischen Presskraft- und Schmelzgrenze, abhängig von T und A0/A1.\n中文题目：解释 Strangpressen 的“工艺窗口”。\n中文答案：工艺窗口：温度太低时流动应力/压力过高；温度太高时会开始熔化或局部过热。允许范围位于压力极限和熔化极限之间，并取决于温度 T 和面积比 A0/A1。\n出处：12 - Fließpressen - Skript.pdf, S.17（Verfahrensgrenzen und Verfahrensfenster）；full.md, Abschnitt „12.3 Strangpressen / Verfahrensgrenzen“；Garber_2025_12_11.txt：课堂强调高压下可能出现 Schmelzbeginn。"]
["Nennen Sie die zwei Hauptvarianten des Schmiedens.","Frage (DE)：Nennen Sie die zwei Hauptvarianten des Schmiedens.\nAntwort (DE)：Freiformschmieden; Gesenk(form)schmieden.\n中文题目：请列举锻造的两大主要类型。\n中文答案：自由锻；模锻/型模锻。\n出处：13 - Schmieden - Skript.pdf, S.4（Einteilung nach Werkzeugen）；full.md, Abschnitt „13.1 Einteilung der Schmiedeverfahren / Nach Werkzeugen“；Garber_2025_12_11.txt：课堂在 Schmieden 入门处点名 Freiform und Gesenk。"]
["Unterschied offenes vs geschlossenes Gesenk (Stichworte)?","Frage (DE)：Unterschied offenes vs geschlossenes Gesenk (Stichworte)?\nAntwort (DE)：Offenes Gesenk: geringer seitlicher Widerstand, Kavitäten evtl. unvollständig. Gratspalt: Widerstand/Druck hoch, Füllung besser; Nachteil Kraft, Verschleiß, Grat/Materialverlust. Geschlossen: kein Grat, aber Rohlingmasse sehr genau.\n中文题目：开式模、带飞边槽模和闭式模有什么区别？\n中文答案：开式模：侧向阻力小，型腔可能填不满。飞边槽：阻力和压力高，填充更好；缺点是力大、磨损大、有飞边和材料损失。闭式模：无飞边，但毛坯质量必须非常精确。\n出处：13 - Schmieden - Skript.pdf, S.15–16（Einteilung der Gesenke）；full.md, Abschnitt „13.4 Gesenkformschmieden / Einteilung der Gesenke“；Garber_2025_12_11.txt：课堂在 Schmieden 入门后对 Gesenk 进行了对位补全。"]
["Nennen Sie die Kienzle-Gleichung zur Schnittkraft und die Bedeutung der Größen.","Frage (DE)：Nennen Sie die Kienzle-Gleichung zur Schnittkraft und die Bedeutung der Größen.\nAntwort (DE)：Kienzle: Fc=kc*A=kc*b*h; A=b*h=ap*f; h=f*sin(kappa); b=ap/sin(kappa). kc=kc1.1*(h/h0)^(-mc), h0=1 mm; auch Fc=kc1.1*b*h0*(h/h0)^(1-mc). Korrekturen: Kv, Kver, Kgamma, Ksch.\n中文题目：写出Kienzle切削力公式，并说明各量含义。\n中文答案：Kienzle：Fc=kc·A=kc·b·h；A=b·h=ap·f；h=f·sin(kappa)；b=ap/sin(kappa)。kc=kc1.1·(h/h0)^(-mc)，h0=1 mm；也可写 Fc=kc1.1·b·h0·(h/h0)^(1-mc)。修正因子：Kv、Kver、Kgamma、Ksch。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf，S.23–25；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Kienzle/往届题4）；Garber_2025_12_18.txt（老师板书：Schnittkraft und Kienzle，auswendig）"]
["Wie lautet die Beziehung zwischen Schnittgeschwindigkeit, Drehzahl und Durchmesser beim Drehen?","Frage (DE)：Wie lautet die Beziehung zwischen Schnittgeschwindigkeit, Drehzahl und Durchmesser beim Drehen?\nAntwort (DE)：(v_c = \\pi \\cdot d \\cdot n) (mit (d) in m, (n) in 1/s bzw. 1/min passend umrechnen)\n中文题目：车削中切削速度、转速和直径的关系式是什么？\n中文答案：v_c = π · d · n（d 用 m，n 用 1/s 或 1/min 时要相应换算）。\n出处：FT 3 - Drehen - Skript.pdf，S.22；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Drehen：Zusammenhänge zwischen Schnittgrößen）；Garber_2025_12_18.txt（老师板书：v = n · π · d，auswendig）"]
["Wie wird die Umformenergie und Umformarbeit näherungsweise berechnet?","Frage (DE)：Wie wird die Umformenergie und Umformarbeit näherungsweise berechnet?\nAntwort (DE)：Näherung: W_id = V · k_fm · |φ|; real mit Wirkungsgrad: W = W_id/η. V = umgeformtes Volumen, k_fm = mittlere Fließspannung.\n中文题目：成形能量、成形功如何近似计算？\n中文答案：近似：W_id = V · k_fm · |φ|；实际考虑效率：W = W_id/η。V 为变形体积，k_fm 为平均流动应力。\n出处：11 - Grundlagen Umformen - Skript.pdf，S.22–23；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Umformende Verfahren：Umformenergie）；Garber_2025_12_18.txt（老师板书：Umformkraft und Umformenergie，optional）"]
["Definieren Sie Tiefziehen.","Frage (DE)：Definieren Sie Tiefziehen.\nAntwort (DE)：Zug-Druck-Umformen eines Blechzuschnitts zu Hohlkörpern ohne beabsichtigte Änderung der Blechdicke.\n中文题目：给出深拉的定义。\n中文答案：深拉是把板料拉压成形为空心件，且不刻意改变板厚。\n出处：14 - Tiefziehen - Skript.pdf，S.3；full.md（14.1 Tiefziehen：Definition）；Garber_2025_12_18.txt（老师讲Tiefziehen定义和分类）"]
["Beschreiben Sie den Ablauf des Tiefziehprozesses (mit Werkzeugen).","Frage (DE)：Beschreiben Sie den Ablauf des Tiefziehprozesses (mit Werkzeugen).\nAntwort (DE)：Tiefziehen = Zug-Druck-Umformen eines Blechzuschnitts zu einem Hohlkörper ohne beabsichtigte Blechdickenänderung. Ablauf: Platine/Ronde einlegen, Niederhalter schließt, Niederhalterkraft, Stempel zieht durch Ziehring.\n中文题目：说明工具深拉的工艺流程。\n中文答案：深拉 = 把板料通过拉-压复合成形成空心件，且不刻意改变板厚。流程：放入板坯/圆片，压边圈闭合，施加压边力，冲头通过拉深环拉深。\n出处：14 - Tiefziehen - Skript.pdf，S.5–7；full.md（14.1 Ablauf des Tiefziehprozesses；14.2 Phase 1/2）；Garber_2025_12_18.txt（老师强调：Den frage ich ab）"]
["Warum braucht man einen Niederhalter beim Tiefziehen?","Frage (DE)：Warum braucht man einen Niederhalter beim Tiefziehen?\nAntwort (DE)：Niederhalter verhindert Falten im Flansch und steuert Materialfluss. Zu klein → Falten; zu groß → Nachfließen behindert, Rissgefahr.\n中文题目：为什么深拉需要压边圈？\n中文答案：压边圈防止法兰起皱并控制材料流动。太小 → 起皱；太大 → 补流受阻，有开裂风险。\n出处：14 - Tiefziehen - Skript.pdf，S.7–8、S.12–13；full.md（Faltenbildung ohne Niederhalter；Verfahrensgrenzen）；Garber_2025_12_18.txt（老师讲Niederhalter：zu klein Falten，zu groß Riss）"]
["Was passiert bei zu kleiner bzw. zu großer Niederhalterkraft?","Frage (DE)：Was passiert bei zu kleiner bzw. zu großer Niederhalterkraft?\nAntwort (DE)：Zu klein: Falten/Wellen im Flansch. Zu groß: Nachfließen behindert, Reibung/Ziehkraft steigt → Riss bzw. Bodenreißer.\n中文题目：压边力过小或过大会发生什么？\n中文答案：太小：法兰起皱/波纹。太大：补流受阻，摩擦/拉深力升高 → 裂纹或底裂。\n出处：14 - Tiefziehen - Skript.pdf，S.12–13；full.md（14.3 Verfahrensgrenzen；Verfahrensfenster）；Garber_2025_12_18.txt（老师强调压边力过小、过大后果）"]
["Wo liegt die charakteristische Schwachstelle eines tiefgezogenen Bauteils und warum?","Frage (DE)：Wo liegt die charakteristische Schwachstelle eines tiefgezogenen Bauteils und warum?\nAntwort (DE)：Schwachstelle am Boden-/Stempelradius. Dort wird die Ziehkraft über die Zarge übertragen; bei hoher Zugspannung/Verfestigung entsteht Bodenreißer.\n中文题目：深拉件的典型薄弱区在哪里？为什么？\n中文答案：薄弱点在底部/冲头圆角。拉深力通过筒壁传递；拉应力/硬化过高时产生底裂。\n出处：14 - Tiefziehen - Skript.pdf，S.6、S.12–13；full.md（14.2 Phase 1：charakteristische Schwachstelle；往届题14：Am Rand des Bodens）；Garber_2025_12_18.txt（老师强调深拉件Schwachstelle）"]
["Skizzieren und erläutern Sie das Verfahrensfenster der Niederhalterkraft über dem Ziehverhältnis β.","Frage (DE)：Skizzieren und erläutern Sie das Verfahrensfenster der Niederhalterkraft über dem Ziehverhältnis β.\nAntwort (DE)：Diagramm: x=Ziehverhältnis β, y=Niederhalterkraft. Unten Faltenbildung, oben Bodenreißer/Riss, dazwischen Fenster. Mit β steigend: Mindest-F_N steigt, max. F_N sinkt; bei β_max Fenster zu.\n中文题目：画出并解释压边力随拉深比β变化的工艺窗口。\n中文答案：图：x 轴为拉深比 β，y 轴为压边力。下方为起皱，上方为底裂/裂纹，中间为工艺窗口。随着 β 增大，最小 F_N 上升，最大 F_N 下降；到 β_max 时窗口关闭。\n出处：14 - Tiefziehen - Skript.pdf，S.12–13；full.md（14.3 Verfahrensfenster für die Niederhalterkraft；往届题14）；Garber_2025_12_18.txt（老师板书并解释上支下降、下支上升）"]
["Was ist „Zunder“ und welche Probleme verursacht er beim Schmieden?","Frage (DE)：Was ist „Zunder“ und welche Probleme verursacht er beim Schmieden?\nAntwort (DE)：Zunder = Oxidschicht auf heißem Stahl. Probleme: schlechte Oberfläche, harte Oxide werden eingearbeitet, Werkzeugverschleiß hoch, Materialverlust bis ca. 3%.\n中文题目：什么是锻造中的氧化皮？它会造成哪些问题？\n中文答案：氧化皮是热钢表面的氧化层。问题：表面差，硬氧化物会被压入工件，工具磨损高，材料损失可达约 3%。\n出处：13 - Schmieden - Skript.pdf，S.5、S.9；full.md（13.2 Grundlagen des Schmiedens：Zunderbildung）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_123338、IMG_20251218_123519（Zunderbildung）"]
["Nennen Sie Maßnahmen gegen Verzunderung.","Frage (DE)：Nennen Sie Maßnahmen gegen Verzunderung.\nAntwort (DE)：- kurze Warmzeiten (z.B. induktiv)\n- geringere Umformtemperaturen (begrenzt)\n- Beschichtung der Rohlinge vor dem Erwärmen\n- Schutzgas (aufwändig, selten).\n中文题目：列举减轻锻造氧化皮、氧化损失的措施。\n中文答案：- 短加热时间（如感应加热）\n- 较低成形温度（受限）\n- 加热前给毛坯涂层\n- 保护气氛（复杂，少见）\n出处：13 - Schmieden - Skript.pdf，S.9；full.md（Zunderbildung；往届题17/15：Maßnahmen gegen Verzunderung）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_123338、IMG_20251218_123519（老师高亮kurze Warmzeiten und Beschichtung）"]
["Warum füllt ein Gesenk mit Gratspalt Kavitäten besser als ein offenes Gesenk?","Frage (DE)：Warum füllt ein Gesenk mit Gratspalt Kavitäten besser als ein offenes Gesenk?\nAntwort (DE)：Offenes Gesenk: geringer seitlicher Fließwiderstand, fehlender Gegendruck → Material fließt seitlich weg, Kavitäten ggf. nicht gefüllt.\n中文题目：为什么带飞边槽的模锻比开放模更容易充满型腔？\n中文答案：开式模：侧向流动阻力小，缺少反压力，材料向侧面流走，型腔可能填不满。\n出处：13 - Schmieden - Skript.pdf，S.15；full.md（13.4 Gesenkformschmieden：Offenes Gesenk / Gesenk mit Gratspalt）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_124841（老师板书Spalten）"]
["Nennen Sie Nachteile eines Gesenks mit Gratspalt.","Frage (DE)：Nennen Sie Nachteile eines Gesenks mit Gratspalt.\nAntwort (DE)：- höhere Kraft → mehr Werkzeugverschleiß\n- Grat abtrennen = zusätzlicher Arbeitsschritt\n- Materialverlust durch Grat\n中文题目：列举带飞边槽模锻的缺点。\n中文答案：- 更高力 → 更多工具磨损\n- 去飞边 = 额外工序\n- 飞边造成材料损失\n出处：13 - Schmieden - Skript.pdf，S.15；full.md（Gesenk mit Gratspalt：Nachteile）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_124841"]
["Was bedeutet Kalibrieren beim Schmieden und warum erreicht man hohe Genauigkeit?","Frage (DE)：Was bedeutet Kalibrieren beim Schmieden und warum erreicht man hohe Genauigkeit?\nAntwort (DE)：Kalibrieren = kaltes Nachformen nach Warmumformung. Geringe Umformgrade, endkonturnah; keine Wärmeausdehnung/Schrumpfung/Zunder -> hohe Oberfläche und Maßgenauigkeit, bis ca. IT8.\n中文题目：锻造中的校准（Kalibrieren）是什么意思？为什么精度高？\n中文答案：校准是热成形后的冷态后成形。变形量小，接近最终轮廓；没有热膨胀、收缩和氧化皮，所以表面和尺寸精度高，可达约 IT8。\n出处：13 - Schmieden - Skript.pdf，S.5、S.18、S.22；full.md（Kaltschmieden：Prägen und Kalibrieren；Stadienfolge；Toleranzen）；Garber_2025_12_18.txt; 课堂照片IMG_20251219_125050（老师板书Kalibrieren）"]
["Warum sind Hinterschneidungen problematisch, und wozu dient die Aushebeschräge?","Frage (DE)：Warum sind Hinterschneidungen problematisch, und wozu dient die Aushebeschräge?\nAntwort (DE)：Hinterschneidungen verhindern Entformen/Ausheben aus dem Gesenk. Aushebeschräge ermöglicht Entformen und reduziert Werkzeug-/Werkstückschäden.\n中文题目：为什么倒扣对模锻不利？脱模斜度有什么作用？\n中文答案：倒扣会阻止工件从模具中脱模/顶出。脱模斜度使脱模成为可能，并减少工具/工件损伤。\n出处：13 - Schmieden - Skript.pdf，S.22–23；full.md（Konstruktive Randbedingungen：keine Hinterschneidungen，Aushebeschrägen；Geteilte Gesenke）；Garber_2025_12_18.txt; 课堂照片IMG_20251219_125132（Hinterschneidung und Aushebeschräge）"]
["Warum ist Tiefziehen ein Zug-Druck-Umformen?","Frage (DE)：Warum ist Tiefziehen ein Zug-Druck-Umformen?\nAntwort (DE)：Im Flansch herrschen tangentiale Druckspannungen, in der Zarge Zugspannungen; Kombination aus Zug und Druck formt das Blech zum Napf.\n中文题目：为什么深拉属于拉-压复合成形？\n中文答案：法兰区有切向压应力，筒壁有拉应力；拉和压的组合把板料成形为杯形件。\n出处：14 - Tiefziehen - Skript.pdf，S.3、S.7–8；full.md（Definition；Phase 2：radial gestreckt/tangential gestaucht；Faltenbildung）；Garber_2025_12_18.txt（老师讲Tiefziehen受力与Faltenbildung）"]
["Geben Sie die Kienzle-Schnittkraftformel für \\(F_c\\) an.","Frage (DE)：Geben Sie die Kienzle-Schnittkraftformel für \\(F_c\\) an.\nAntwort (DE)：(F_c = K_{c1,1}\\cdot b \\cdot h \\cdot (\\frac{h}{h_0})^{-m_c}\\cdot k_{ver}\\cdot k_v\\cdot k_{sch}\\cdot k_\\gamma) (Formvarianten äquivalent).\n中文题目：写出 Kienzle 切削力公式 \\(F_c\\)。\n中文答案：F_c = k_c1,1·b·h·(h/h0)^(-m_c)·k_ver·k_v·k_sch·k_γ（等价形式也可）。\n出处：Garber_2026_01_08.txt（课堂强调：期末会有 Schnittkraft 计算）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.23–25；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Formelblatt und Kienzle）"]
["Was ist \\(h_0\\) und warum ist \\(h_0 = 1\\,\\text{mm}\\)?","Frage (DE)：Was ist \\(h_0\\) und warum ist \\(h_0 = 1\\,\\text{mm}\\)?\nAntwort (DE)：h_0 = Bezugs-Spanungsdicke in Kienzle; normiert auf 1 mm, damit (h/h_0) dimensionslos ist und k_c1,1 tabellierbar bleibt.\n中文题目：\\(h_0\\) 是什么？为什么取 1 mm？\n中文答案：h_0 是 Kienzle 中的参考切屑厚度；标准化为 1 mm，使 (h/h_0) 无量纲，并使 k_c1,1 可列表化。\n出处：Garber_2026_01_08.txt（板书：h0 = 1 mm!）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.23–24；full.md（Formelblatt Fertigungstechnik）"]
["Wofür stehen \\(k_{ver}, k_v, k_{sch}, k_\\gamma\\)?","Frage (DE)：Wofür stehen \\(k_{ver}, k_v, k_{sch}, k_\\gamma\\)?\nAntwort (DE)：(k_{ver}): Verschleiß；(k_v): Schnittgeschwindigkeit；(k_{sch}): Schneidstoff；(k_\\gamma): Spanwinkel.\n中文题目：四个修正因子分别表示什么？\n中文答案：k_ver 表示磨损；k_v 表示切削速度；k_sch 表示刀具材料；k_γ 表示前角。\n出处：Garber_2026_01_08.txt（板书列出四个 k 因子）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.24–25；full.md（Kienzle/公式表）"]
["Skizzieren Sie den Rechenweg zur Berechnung von \\(F_c\\) (Punkteschema).","Frage (DE)：Skizzieren Sie den Rechenweg zur Berechnung von \\(F_c\\) (Punkteschema).\nAntwort (DE)：1) f, a_p, κ bestimmen; 2) h = f · sinκ, b = a_p/sinκ, A = b · h; 3) k_c1,1 und 1-m_c aus Tabelle; 4) Kienzle einsetzen; 5) Korrekturfaktoren/Einheit N.\n中文题目：写出计算 \\(F_c\\) 的标准步骤。\n中文答案：1）确定 f、a_p、κ；2）h=f·sinκ，b=a_p/sinκ，A=b·h；3）从表中查 k_c1,1 和 1-m_c；4）代入 Kienzle；5）修正因子/单位 N。\n出处：Garber_2026_01_08.txt（课堂例题：Schnittkraft 至少会算一次，板书含 Drehmoment）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.21–26；FT 3 - Drehen - Skript.pdf, S.22–24；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Drehen und Kienzle）"]
["Was bedeutet „Additivität des Umformgrades“?","Frage (DE)：Was bedeutet „Additivität des Umformgrades“?\nAntwort (DE)：Logarithmische Umformgrade sind additiv: φ_ges = φ_1 + φ_2 + ...; gilt für mehrere Umformschritte, nicht für technische Dehnung ε.\n中文题目：“变形程度可加性”是什么意思？\n中文答案：对数形变或变形程度可以相加：ϕges=ϕ1+ϕ2+...；适用于连续的多个成形步骤；工程应变 ε 不能简单相加。\n出处：Garber_2026_01_08.txt（板书：Additivität des Umformgrades）；11 - Grundlagen Umformen - Skript.pdf, S.21；full.md（Additivität der Formänderung）"]
["Berechnen Sie \\(\\varphi_{ges}\\) für \\(\\varphi_1=0{,}6\\) und \\(\\varphi_2=0{,}3\\).","Frage (DE)：Berechnen Sie \\(\\varphi_{ges}\\) für \\(\\varphi_1=0{,}6\\) und \\(\\varphi_2=0{,}3\\).\nAntwort (DE)：(\\varphi_{ges}=0{,}6+0{,}3=0{,}9).\n中文题目：若 \\(\\varphi_1=0.6\\)、\\(\\varphi_2=0.3\\)，求总变形程度。\n中文答案：φ_ges = 0.6 + 0.3 = 0.9。\n出处：Garber_2026_01_08.txt（课堂、往届题第10题口径）；11 - Grundlagen Umformen - Skript.pdf, S.21；full.md（Prüfungsaufgabe/Umformgrad）"]
["Warum ist \\(\\beta_{ges}\\) ohne Zwischen-Glühen begrenzt?","Frage (DE)：Warum ist \\(\\beta_{ges}\\) ohne Zwischen-Glühen begrenzt?\nAntwort (DE)：Jeder Zug verfestigt das Blech; Umformbarkeit sinkt, Ziehkraft/Zargenspannung steigt → Gefahr Bodenreißer. Zwischenglühen baut Verfestigung ab.\n中文题目：为什么不进行中间退火时总深拉比有限？\n中文答案：每次拉深都会使板料硬化；成形能力下降，拉深力/筒壁应力上升 → 底裂风险。中间退火消除硬化。\n出处：Garber_2026_01_08.txt（课堂说明 ohne Glühen 的限制）；14 - Tiefziehen - Skript.pdf, S.11–13；11 - Grundlagen Umformen - Skript.pdf, S.12、S.18；full.md（Tiefziehen/Umformen）"]
["Begründen Sie, warum das Verfahrensfenster „dreieckig“ verläuft.","Frage (DE)：Begründen Sie, warum das Verfahrensfenster „dreieckig“ verläuft.\nAntwort (DE)：Mit beta steigend: Ziehkraft/Umformarbeit steigt, zulässige Zusatzkraft sinkt; zugleich braucht man mehr Niederhalterkraft gegen Falten. Untere Grenze Falten, obere Bodenreißer -> dreieckiges Fenster.\n中文题目：解释为什么压边力工艺窗口呈“三角形”。\n中文答案：随着 beta 增大，拉深力/成形功上升，可允许的附加力下降；同时为了防止起皱，需要更大的压边力。下边界是起皱，上边界是底部撕裂，因此形成三角形窗口。\n出处：Garber_2026_01_08.txt（课堂解释三角形窗口）；14 - Tiefziehen - Skript.pdf, S.13；full.md（Verfahrensfenster für die Niederhalterkraft）"]
["Nennen Sie die vier Anteile der Ziehkraft \\(F_Z\\).","Frage (DE)：Nennen Sie die vier Anteile der Ziehkraft \\(F_Z\\).\nAntwort (DE)：(F_Z = F_{id} + F_{RR} + F_{RN} + F_B).\n中文题目：写出拉深力 \\(F_Z\\) 的四个组成。\n中文答案：F_Z = F_id + F_RR + F_RN + F_B。\n出处：Garber_2026_01_08.txt（Tiefziehen 复习口径）；14 - Tiefziehen - Skript.pdf, S.14；full.md（14.3 Ziehkraft）"]
["Was sind die Folgen einer zu kleinen bzw. zu großen Ziehringrundung \\(R_R\\)?","Frage (DE)：Was sind die Folgen einer zu kleinen bzw. zu großen Ziehringrundung \\(R_R\\)?\nAntwort (DE)：zu klein → zusätzliche Dehnung/Bruchgefahr；zu groß → Niederhalter wirkt schlechter → Faltenbildung.\n中文题目：拉深环圆角 \\(R_R\\) 太小或太大会怎样？\n中文答案：太小 → 额外拉伸/断裂风险；太大 → 压边圈作用变差 → 起皱。\n出处：Garber_2026_01_08.txt（课堂、板书：Ziehringrundung）；14 - Tiefziehen - Skript.pdf, S.15；full.md（14.3 Ziehringrundung）"]
["Warum ist Gegenlauffräsen hinsichtlich Verschleiß und Oberfläche oft ungünstig?","Frage (DE)：Warum ist Gegenlauffräsen hinsichtlich Verschleiß und Oberfläche oft ungünstig?\nAntwort (DE)：Zahn gleitet, bevor die Spanbildung einsetzt. Dadurch hoher Freiflächenverschleiß und schlechtere Oberfläche.\n中文题目：为什么逆铣在磨损和表面质量方面通常不利？\n中文答案：刀齿在切屑形成开始前先滑擦。因此后刀面磨损更高，表面质量更差。\n出处：Garber_2026_01_08.txt（课堂问：Warum Gegenlauffräsen ungünstig）；FT 5 - Fräsen - Skript.pdf, S.5；Fräsverfahren.pdf, Abschnitt Gleich- und Gegenlauf；full.md（5.2 Besonderheiten beim Fräsen）"]
["Begründen Sie die Spanwinkelwahl für Schlichten vs. Schruppen.","Frage (DE)：Begründen Sie die Spanwinkelwahl für Schlichten vs. Schruppen.\nAntwort (DE)：Schlichten: großer/positiver γ → leichter Spanfluss, gute Oberfläche. Schruppen: kleiner/negativer γ → stabiler Keil für hohe Kräfte, aber mehr Wärme.\n中文题目：说明精加工和粗加工时前角如何选择，并给出理由。\n中文答案：精加工：大/正 γ → 切屑流动更容易，表面好。粗加工：小/负 γ → 刀楔稳定，可承受高力，但热更多。\n出处：Garber_2026_01_08.txt（课堂：Schlichten und Schruppen 的 Spanwinkel 选择）；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.10–13；full.md（Wahl der Keilwinkel）"]
["Welcher Schneidstoff eignet sich für gehärteten Stahl (z.B. HRC ~65) und warum?","Frage (DE)：Welcher Schneidstoff eignet sich für gehärteten Stahl (z.B. HRC ~65) und warum?\nAntwort (DE)：Für gehärteten Stahl: CBN, ggf. Keramik. Grund: hohe Warmhärte/Verschleißfestigkeit. Diamant/PKD bei Stahl kritisch wegen Diffusion/Reaktion mit Fe.\n中文题目：加工淬硬钢（如 HRC≈65）应选什么刀具材料？为什么？\n中文答案：淬硬钢：CBN，必要时陶瓷。原因：高热硬性/耐磨性。金刚石/PKD 加工钢时因与 Fe 扩散/反应而关键。\n出处：Garber_2026_01_08.txt（课堂：Hartbearbeitung und Schneidstoff）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.4–7；FT 5 - Fräsen - Skript.pdf, S.21；full.md（Schneidstoffe/Hartfräsen）"]
["Was beeinflusst Freiflächenverschleiß stärker: Oberfläche oder Maßhaltigkeit? Begründen.","Frage (DE)：Was beeinflusst Freiflächenverschleiß stärker: Oberfläche oder Maßhaltigkeit? Begründen.\nAntwort (DE)：Stärker: Maßhaltigkeit. Freiflächenverschleiß -> VB und Schneidenversatz SV; ohne Nachstellen Maßfehler. Oberfläche kann schlechter werden, ist aber zweitrangig.\n中文题目：后刀面磨损更影响表面还是尺寸精度？说明原因。\n中文答案：更强影响尺寸精度。后刀面磨损会导致 VB 和刀尖后退量 SV；如果不补偿/不重新调整，就会产生尺寸误差。表面也可能变差，但属于次要影响。\n出处：Garber_2026_01_08.txt（往届题第3题、课堂强调）；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Freiflächenverschleiß/Prüfungsaufgabe）"]
["Wie berechnen Sie den Umformgrad beim Rückwärtsfließpressen über Flächenverhältnis?","Frage (DE)：Wie berechnen Sie den Umformgrad beim Rückwärtsfließpressen über Flächenverhältnis?\nAntwort (DE)：Rückwärtsfließpressen über Flächen: phi=|ln(A1/A0)| bzw. positiv ln(A0/A1). Beim Napf: A0=pi*D0^2/4, A1=pi*(D0^2-Di^2)/4 als Ringquerschnitt.\n中文题目：后向挤压如何用面积比计算变形程度 \\(\\varphi\\)？\n中文答案：后向流压用面积计算：phi=|ln(A1/A0)|，或写成正值 ln(A0/A1)。杯形件：A0=pi·D0²/4，A1=pi·(D0²-Di²)/4，即环形截面。\n出处：Garber_2026_01_08.txt（板书：Napf-Rückwärtsfließpressen，面积比，负号取正值）；12 - Fließpressen - Skript.pdf, S.14–15；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（12.2 Fließpressen und Prüfungsaufgabe）"]
["Verfahrenswahl: Kranhaken – warum Schmieden?","Frage (DE)：Verfahrenswahl: Kranhaken – warum Schmieden?\nAntwort (DE)：Schmieden wegen hoher Festigkeit/Zähigkeit und günstigem Faserverlauf; Kranhaken ist sicherheitsrelevant und dynamisch belastet.\n中文题目：工艺选择：起重钩为什么应选锻造？\n中文答案：选择锻造是因为强度/韧性高且纤维流线有利；起重钩是安全相关件并承受动态载荷。\n出处：Garber_2026_01_08.txt（往届题第11题、课堂口径）；13 - Schmieden - Skript.pdf, S.20–22；full.md（13.5 Faserverlauf und Prüfungsaufgabe）"]
["Berechnen Sie die Hauptzeit \\(T_h\\) beim Drehen (Formel + Einheitenhinweise).","Frage (DE)：Berechnen Sie die Hauptzeit \\(T_h\\) beim Drehen (Formel + Einheitenhinweise).\nAntwort (DE)：\\(T_h=L\\cdot i/(n\\cdot f)\\); \\(L\\): Vorschublänge inkl. Anlaufweg und Überlaufweg, beim Plandrehen \\(L=d/2+l_a+l_u\\); \\(i\\): Durchgänge; \\(f\\): mm/U.\n中文题目：车削主时间 \\(T_h\\) 怎么算？单位如何避免出错？\n中文答案：Th=L·i/(n·f)。L 是进给长度，包括起刀路程和超程；端面车削时 L=d/2+la+lu。i 是走刀次数；f 的单位为 mm/U。\n出处：Garber_2026_01_08.txt（板书例题：L=8 m、f=2 mm、单位陷阱）；FT 3 - Drehen - Skript.pdf, S.19、S.22；Drehverfahren.pdf（Hauptzeit/Definitionen）；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（3.4 Hauptzeit）"]
["Warum ist beim Innenrundschleifen eine „zu große“ Schleifscheibe kritisch?","Frage (DE)：Warum ist beim Innenrundschleifen eine „zu große“ Schleifscheibe kritisch?\nAntwort (DE)：Innenrundschleifen: große Kontaktlänge, lange Späne, Porenverstopfung, KSS-Zugang schlecht, Temperatur/Schleifbrandgefahr hoch. Scheibe kleiner wählen: Ds ca. 0,6...0,8 DWS.\n中文题目：内圆磨时砂轮过大为什么危险？\n中文答案：内圆磨：接触长度大、切屑长、砂轮气孔易堵塞，冷却润滑液进入困难，温度和磨削烧伤风险高。应选择较小砂轮：D_s 约为 0.6...0.8 D_WS。\n出处：Garber_2026_01_08.txt（往届题第7题、课堂说明）；FT 8 - Schleifen - Skript.pdf, S.5；07_Vorbereitung_Schleifen.pdf, Schleifverfahren/Innenrundschleifen；full.md（8.1 Innenrundschleifen）"]
["Ein Werkstück wird in zwei Schritten umgeformt. Schritt 1: φ1, Schritt 2: φ2. Wie groß ist der Gesamt-Umformgrad φ_ges?","Frage (DE)：Ein Werkstück wird in zwei Schritten umgeformt. Schritt 1: φ1, Schritt 2: φ2. Wie groß ist der Gesamt-Umformgrad φ_ges?\nAntwort (DE)：φ_ges = φ_1 + φ_2; gilt für logarithmische Umformgrade. Nicht multiplizieren und nicht technische Dehnung ε addieren.\n中文题目：工件分两步成形：第1步 φ1，第2步 φ2，总变形程度 φ_ges 多大？\n中文答案：φ_ges = φ_1 + φ_2；适用于对数变形程度。不要相乘，也不要把工程应变 ε 相加。\n出处：Garber_2026_01_15.txt（老师强调：geschenkter Punkt/kommt praktisch immer）; 11 - Grundlagen Umformen - Skript.pdf S.21 Additivität der Formänderung; full.md: Additivität der Formänderung"]
["Beschreiben Sie die Berechnung der Schnittkraft nach Kienzle ohne Korrekturfaktoren. Welche Zwischengrößen sind punktrelevant?","Frage (DE)：Beschreiben Sie die Berechnung der Schnittkraft nach Kienzle ohne Korrekturfaktoren. Welche Zwischengrößen sind punktrelevant?\nAntwort (DE)：1) f=v_f/n; 2) A=a_p*f=b*h; 3) h=f*sin(kappa), b=a_p/sin(kappa); 4) k_c1.1 und 1-m_c aus Tabelle; 5) F_c=k_c1.1*b*h0*(h/h0)^(1-m_c), h0=1 mm. Punkte: b, h, Werkstoffzeile, Einheit N.\n中文题目：说明不用修正系数时如何按 Kienzle 计算切削力；哪些中间量是给分点？\n中文答案：1）f=v_f/n；2）A=a_p·f=b·h；3）h=f·sin(kappa)，b=a_p/sin(kappa)；4）从表中查 k_c1.1 和 1-m_c；5）F_c=k_c1.1·b·h0·(h/h0)^(1-m_c)，h0=1 mm。给分点：b、h、材料表行、单位 N。\n出处：Garber_2026_01_15.txt（老师强调 b/h 是给分点）; FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.22–26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Drehen Spangeometrie + Kienzle-Formel"]
["Nennen Sie die Spanformen (Fließspan, Scherspan und Reißspan) und ordnen Sie eine typische Oberflächenqualität zu.","Frage (DE)：Nennen Sie die Spanformen (Fließspan, Scherspan und Reißspan) und ordnen Sie eine typische Oberflächenqualität zu.\nAntwort (DE)：Reißspan/Bröckelspan: spröde Werkstoffe/niedrige v_c, raue Oberfläche. Scherspan/Lamellenspan: duktil, mittlere v_c, mittlere Oberfläche. Fließspan: hohe v_c, großer gamma, beste Oberfläche, aber lange Späne.\n中文题目：列出流屑、剪切屑、崩碎屑，并说明典型表面质量。\n中文答案：撕裂屑/崩碎屑：脆性材料或低 v_c，表面粗糙。剪切屑/层状屑：延性材料、中等 v_c，中等表面。流屑：高 v_c、大 gamma，表面最好，但切屑长。\n出处：Garber_2026_01_15.txt; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.10–13; full.md: Spanformen"]
["Wie berechnen Sie die Hauptzeit t_h beim Drehen? Was ist bei Anfahrweg und Überlaufweg zu beachten?","Frage (DE)：Wie berechnen Sie die Hauptzeit t_h beim Drehen? Was ist bei Anfahrweg und Überlaufweg zu beachten?\nAntwort (DE)：Standard: t_h = L·i/(n·f); Gewindedrehen: t_h = L·i·g/(n·p); L = l + l_a + l_u; beim Plandrehen l = d/2; bei Werkstück ohne Bund Anfahrweg und Überlaufweg berücksichtigen.\n中文题目：车削主时间 t_h 如何计算？进刀、超程需要注意什么？\n中文答案：标准公式：t_h=L·i/(n·f)。螺纹车削：t_h=L·i·g/(n·p)。L=l+la+lu；端面车削时 l=d/2；无台肩工件要考虑起刀路程和超程。\n出处：Garber_2026_01_15.txt; FT 3 - Drehen - Skript.pdf S.19, S.22; Formelblatt Fertigungstechnik.pdf S.1; full.md: Hauptzeit beim Drehen/Anfahrweg und Überlaufweg"]
["Beim Schlichten ist eine Rillentiefe t zulässig. Gegeben Eckenradius Rε. Wie bestimmen Sie den maximalen Vorschub f?","Frage (DE)：Beim Schlichten ist eine Rillentiefe t zulässig. Gegeben Eckenradius Rε. Wie bestimmen Sie den maximalen Vorschub f?\nAntwort (DE)：Rillentiefe-Geometrie: t = Rε − sqrt(Rε² − (f/2)²); umgestellt: f = sqrt(8·Rε·t − 4·t²) = 2·sqrt(2·Rε·t − t²); Näherung bei t << Rε: t ≈ f²/(8·Rε); Einheitenfalle: t z.B. 0,03 mm einsetzen, nicht 30 µm als 30 mm.\n中文题目：精加工允许沟纹深度 t，已知刀尖圆角半径 Rε，如何求最大进给 f？\n中文答案：沟纹深度几何：t=Rε−sqrt(Rε²−(f/2)²)。变形得 f=sqrt(8·Rε·t−4·t²)=2·sqrt(2·Rε·t−t²)。当 t<<Rε 时近似 t≈f²/(8·Rε)。单位陷阱：例如 t=0.03 mm，不要把 30 µm 当成 30 mm。\n出处：Garber_2026_01_15.txt（老师说明公式在 Formelsammlung）; FT 3 - Drehen - Skript.pdf S.13–15; Formelblatt Fertigungstechnik.pdf S.1; full.md: Rillentiefe beim Längsrunddrehen"]
["Gegeben v_c und Durchmesser d. Wie berechnen Sie die Drehzahl n?","Frage (DE)：Gegeben v_c und Durchmesser d. Wie berechnen Sie die Drehzahl n?\nAntwort (DE)：v_c = π·d·n / 1000 ⇒ n = 1000·v_c /(π·d) (d in mm, v_c in m/min).\n中文题目：已知切削速度 v_c 和直径 d，如何计算转速 n？\n中文答案：v_c = π·d·n / 1000 ⇒ n = 1000·v_c /(π·d)（d 用 mm，v_c 用 m/min）。\n出处：Garber_2026_01_15.txt; FT 3 - Drehen - Skript.pdf S.18, S.22; Drehverfahren.pdf Quer-Plandrehen; full.md: Zusammenhänge zwischen Schnittgrößen"]
["Was ist Kolkverschleiß und wie wirkt er sich auf Genauigkeit und Oberfläche aus?","Frage (DE)：Was ist Kolkverschleiß und wie wirkt er sich auf Genauigkeit und Oberfläche aus?\nAntwort (DE)：Kolkverschleiß = Mulde auf Spanfläche hinter Schneide; Ursache Reibung + Diffusion bei hoher T. Wirkung: Spanablauf/Spanwinkel verändert, Schneide geschwächt, Bruchgefahr; Maßhaltigkeit weniger direkt als bei Freiflächenverschleiß.\n中文题目：什么是月牙洼磨损？它对尺寸精度和表面有什么影响？\n中文答案：月牙洼磨损是在刃口后方前刀面上的凹坑；原因是高温下的摩擦和扩散。影响：改变切屑流动和前角，使切削刃变弱并增加断裂风险；对尺寸精度的直接影响小于后刀面磨损。\n出处：Garber_2026_01_15.txt（老师问到影响精度口径）; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Kolkverschleiß"]
["Ordnen Sie HSS, Hartmetall, Keramik, CBN und PKD qualitativ nach Schnittgeschwindigkeit und Zähigkeit.","Frage (DE)：Ordnen Sie HSS, Hartmetall, Keramik, CBN und PKD qualitativ nach Schnittgeschwindigkeit und Zähigkeit.\nAntwort (DE)：Schnittgeschwindigkeit/Warmhärte: HSS < Hartmetall < Keramik < CBN/PKD. Zähigkeit umgekehrt: HSS hoch, Keramik spröde. Hohe Warmhärte erlaubt hohe v_c; Zähigkeit wichtig bei Stoß/Rattern/unterbrochenem Schnitt.\n中文题目：定性排列 HSS、硬质合金、陶瓷、CBN、PKD 的切削速度能力与韧性。\n中文答案：切削速度/热硬性：HSS < 硬质合金 < 陶瓷 < CBN/PKD。韧性大致相反：HSS 高，陶瓷脆。高热硬性允许高 v_c；韧性在冲击、颤振和断续切削中很重要。\n出处：Garber_2026_01_15.txt; FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.4–7; full.md: Schneidstoffe Härte und Festigkeit/Warmhärte"]
["Was bedeutet Rattern und was ist die Grenzspanntiefe?","Frage (DE)：Was bedeutet Rattern und was ist die Grenzspanntiefe?\nAntwort (DE)：Rattern = selbsterregte instabile Schwingung beim Drehen/Fräsen. Grenzspantiefe = ap, ab dem im Testschnitt schlagartig große Amplituden auftreten; darunter stabil, darüber instabil. Abhilfe: ap/Spanquerschnitt senken, Steifigkeit/Dämpfung erhöhen.\n中文题目：什么是颤振 Rattern？什么是临界切深（题干写 Grenzspanntiefe，课件写 Grenzspantiefe）？\n中文答案：颤振是车削/铣削中的自激不稳定振动。临界切深是试切中从某个 ap 开始振幅突然变大的切深；低于它稳定，高于它不稳定。对策：降低 ap/切屑截面，提高刚度/阻尼。\n出处：Garber_2026_01_15.txt; FT 5 - Fräsen - Skript.pdf S.12–13; full.md: Rattern/Ermittlung der Grenzspantiefe"]
["Begründen Sie, warum Umfangsplanschleifen gegenüber Seitenplanschleifen oft Vorteile hat.","Frage (DE)：Begründen Sie, warum Umfangsplanschleifen gegenüber Seitenplanschleifen oft Vorteile hat.\nAntwort (DE)：Umfangs-Planschleifen besser: kurze Kontaktzeit, kurze Späne, geringere Wärme, bessere KSS-/Spanabfuhr, Selbstreinigung durch Fliehkraft. Seiten-Planschleifen: kleine Spankammer, hoher Druck/Wärme; Abhilfe Spindelsturz.\n中文题目：说明为什么周边平面磨（Umfangsplanschleifen）通常比侧面平面磨（Seitenplanschleifen）有优势。\n中文答案：周边平面磨更好：接触时间短，切屑短，热量低，KSS 和排屑更好，离心力有自清洁作用。侧面平面磨：容屑空间小，压力和热量高；对策是主轴倾斜。\n出处：Garber_2026_01_15.txt; FT 8 - Schleifen - Skript.pdf S.7–8; 07_Vorbereitung_Schleifen.pdf S.3–5; full.md: Planschleifen/Umfangs-Planschleifen"]
["Erklären Sie das Verfahrensfenster der Niederhalterkraft beim Tiefziehen (zu klein/zu groß).","Frage (DE)：Erklären Sie das Verfahrensfenster der Niederhalterkraft beim Tiefziehen (zu klein/zu groß).\nAntwort (DE)：Verfahrensfenster: y=F_NH, x=beta. Zu klein -> Falten im Flansch. Zu groß -> Nachfließen behindert, Zugspannung/Stempelkraft hoch -> Bodenreißer. Fenster dazwischen; bei beta_max geschlossen.\n中文题目：解释深拉压边力的工艺窗口：压边力太小、太大分别会怎样？\n中文答案：工艺窗口：y 轴为 F_NH，x 轴为 beta。压边力太小会在法兰起皱；太大则阻碍材料补流，使拉应力/冲头力升高并导致底部撕裂。两者之间是窗口；到 beta_max 时窗口关闭。\n出处：Garber_2026_01_15.txt; 14 - Tiefziehen - Skript.pdf S.6, S.12–13; full.md: Verfahrensfenster für die Niederhalterkraft/Der Tiefziehvorgang Phase 1"]
["Wann ist hydromechanisches Tiefziehen sinnvoll?","Frage (DE)：Wann ist hydromechanisches Tiefziehen sinnvoll?\nAntwort (DE)：Hydromechanisches Tiefziehen: für komplizierte Formen/schwierige Materialnachführung. Öl/Wirkmedium stützt Blech und verteilt Druck; beta bis ca. 2,4. Voraussetzung: Abdichtung; Nachteil Anlagen-/Dichtaufwand.\n中文题目：什么时候适合使用液压辅助深拉？\n中文答案：液压辅助深拉适用于复杂形状或材料补流困难的零件。油/作用介质支撑板料并分布压力；beta 可到约 2.4。前提是密封；缺点是设备和密封成本高。\n出处：Garber_2026_01_15.txt; 14 - Tiefziehen - Skript.pdf S.20; full.md: Hydromechanisches Tiefziehen"]
["Skizzieren und beschreiben Sie eine Fließkurve und geben Sie die Näherungsformel an.","Frage (DE)：Skizzieren und beschreiben Sie eine Fließkurve und geben Sie die Näherungsformel an.\nAntwort (DE)：Fließkurve: k_f über phi_h, bei Kaltumformung steigend wegen Verfestigung; Start etwa Re. Näherung: k_f=k_f1*phi^n. Für Arbeit oft k_fm=(k_f0+k_fe)/2.\n中文题目：画出、描述冷成形流动曲线，并写出近似公式。\n中文答案：流动曲线：纵轴 k_f，横轴 phi_h；冷成形时因加工硬化而上升，起点约在 Re。近似公式：k_f=k_f1·phi^n。计算功时常用 k_fm=(k_f0+k_fe)/2。\n出处：Garber_2026_01_15.txt; 11 - Grundlagen Umformen - Skript.pdf S.12–14; full.md: Kaltumformung/Rechnen mit der Fließspannung/Warmumformung"]
["Wie berechnen Sie die Umformarbeit (Energie) aus spezifischer Umformarbeit? Achten Sie auf Einheiten.","Frage (DE)：Wie berechnen Sie die Umformarbeit (Energie) aus spezifischer Umformarbeit? Achten Sie auf Einheiten.\nAntwort (DE)：- W = w_d · V\n- N/mm² · mm³ = N·mm → J (1 N·mm = 10⁻³ J)\n- ggf. Wirkungsgrad: W_real = W/η.\n中文题目：如何用比成形功 w_d 计算成形能量？注意单位。\n中文答案：- W = w_d · V\n- N/mm² · mm³ = N·mm → J（1 N·mm = 10^-3 J）\n- 必要时考虑效率：W_real = W/η。\n出处：Garber_2026_01_15.txt; 11 - Grundlagen Umformen - Skript.pdf S.22–23, S.26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Umformkraft und Umformarbeit/Spezifische Umformarbeit"]
["Nennen Sie Maßnahmen zur Verringerung der Zunderbildung beim Schmieden.","Frage (DE)：Nennen Sie Maßnahmen zur Verringerung der Zunderbildung beim Schmieden.\nAntwort (DE)：- kurze Warmzeiten (z.B. induktiv)\n- geringere Umformtemperaturen (begrenzt)\n- Beschichtung der Rohlinge vor dem Erwärmen\n- Schutzgas (aufwändig, selten).\n中文题目：列举减少锻造氧化皮形成的措施。\n中文答案：- 短加热时间（如感应加热）\n- 较低成形温度（受限）\n- 加热前给毛坯涂层\n- 保护气氛（复杂，少见）\n出处：Garber_2026_01_15.txt; 13 - Schmieden - Skript.pdf S.9; full.md: Zunderbildung"]
["Was sind Prägen und Kalibrieren (im Kontext Kaltschmieden) und warum nutzt man sie?","Frage (DE)：Was sind Prägen und Kalibrieren (im Kontext Kaltschmieden) und warum nutzt man sie?\nAntwort (DE)：Prägen: Kaltschmieden kleiner Formänderung für Kontur/Relief/Oberfläche, z.B. Münze. Kalibrieren = kaltes Nachformen nach Warmumformung. Geringe Umformgrade, endkonturnah; keine Wärmeausdehnung/Schrumpfung/Zunder -> hohe Oberfläche und Maßgenauigkeit, bis ca. IT8. Nachteil: hohe Kräfte.\n中文题目：什么是压印 Prägen 和校准 Kalibrieren？为什么使用它们？\n中文答案：压印：小变形冷锻，用于轮廓、浮雕或表面，例如硬币。校准：热成形后的冷态后成形。变形量小，接近最终轮廓；没有热膨胀、收缩和氧化皮，所以表面和尺寸精度高，可达约 IT8。缺点：力很高。\n出处：Garber_2026_01_15.txt; 13 - Schmieden - Skript.pdf S.5, S.18, S.22; full.md: Nach Temperatur/Stadienfolge/Randbedingungen und Kostenverteilung"]
["Begründen Sie die Verfahrenswahl „Schmieden + Nachbearbeitung“ vs. „komplett Drehen“.","Frage (DE)：Begründen Sie die Verfahrenswahl „Schmieden + Nachbearbeitung“ vs. „komplett Drehen“.\nAntwort (DE)：Schmieden + Nachbearbeitung: Serie, hohe Festigkeit/dynamische Last; Faserverlauf günstig, Materialverlust/Spanvolumen/Zeit klein. Nachteile: Gesenk/Presse/Rüstkosten. Komplett Drehen: flexibel für Einzelteile, aber mehr Späne, längere Zeit, Faser unterbrochen.\n中文题目：说明为什么选择“锻造+后加工”或“完全车削”。\n中文答案：锻造 + 后加工：适合批量、高强度/动态载荷；纤维流线有利，材料损失、切屑体积和时间小。缺点：模具、压力机和换装成本高。完全车削：适合单件，灵活，但切屑多、时间长、纤维被切断。\n出处：Garber_2026_01_15.txt; FT 1 -  Einführung - Skript.pdf S.16–17; 13 - Schmieden - Skript.pdf S.20–22; full.md: Kriterien bei der Verfahrensauswahl/Faserverlauf/Charakteristika des Schmiedens"]
["Nennen Sie Formen der Fertigungsorganisation.","Frage (DE)：Nennen Sie Formen der Fertigungsorganisation.\nAntwort (DE)：Werkstattfertigung; Fließfertigung; Fertigungssegmentierung; Fertigungsinsel.\n中文题目：列出生产组织形式。\n中文答案：车间式生产；流水线生产；生产分段；生产岛。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Werkstattfertigung vs. Fließfertigung?","Frage (DE)：Werkstattfertigung vs. Fließfertigung?\nAntwort (DE)：Werkstattfertigung: flexibel, aber viele Transporte/Zwischenlager. Fließfertigung: schnell und kostengünstig, aber unflexibel.\n中文题目：比较车间式生产和流水线生产。\n中文答案：车间式生产灵活，但运输和中间库存多。流水线生产快、成本低，但不灵活。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Was ist eine Fertigungsinsel?","Frage (DE)：Was ist eine Fertigungsinsel?\nAntwort (DE)：Kleine selbständige Einheit; mehrere Verfahren/Maschinen vor Ort; wenig Transport; Mitarbeiter flexibel und selbstorganisiert.\n中文题目：什么是生产岛？\n中文答案：小型自主生产单元；多种工艺/机器集中在现场；运输少；员工灵活并自组织。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Vorteil einer Fertigungsinsel?","Frage (DE)：Vorteil einer Fertigungsinsel?\nAntwort (DE)：Flexibler bei neuen Produkten/Varianten; kürzere Wege; weniger Logistik.\n中文题目：生产岛有什么优点？\n中文答案：面对新产品或变型更灵活；路径更短；物流更少。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Problem der variantenreichen Serienproduktion?","Frage (DE)：Problem der variantenreichen Serienproduktion?\nAntwort (DE)：Unterschiedliche Bauteile müssen optimal durch die Fertigung geschleust werden; Ziel: maximale Produktivität und Auslastung.\n中文题目：多品种系列生产的问题是什么？\n中文答案：不同零件必须以最优方式通过生产流程；目标是最大化生产率和设备/人员利用率。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Was ist Läppen?","Frage (DE)：Was ist Läppen?\nAntwort (DE)：Feinstschleifverfahren mit losem Korn; Läppkorn in Paste/Flüssigkeit; Werkstück und Läppscheibe gleiten aufeinander.\n中文题目：什么是 Läppen / 研磨？\n中文答案：一种使用游离磨粒的精密磨削/超精加工方法；磨粒在研磨膏/研磨液中，工件和研磨盘相互滑动。\n出处：用户新增：Läppen 卡组"]
["Wie ist Läppen nach DIN eingeordnet?","Frage (DE)：Wie ist Läppen nach DIN eingeordnet?\nAntwort (DE)：Spanen mit geometrisch unbestimmter Schneide.\n中文题目：Läppen 按 DIN 怎么分类？\n中文答案：属于“几何形状不确定切削刃的切削加工”。\n出处：用户新增：Läppen 卡组"]
["Worin unterscheidet sich Läppen vom Schleifen?","Frage (DE)：Worin unterscheidet sich Läppen vom Schleifen?\nAntwort (DE)：Schleifen: gebundenes Korn. Läppen: loses Korn in Läpppaste/Läppflüssigkeit.\n中文题目：Läppen 和 Schleifen 有什么区别？\n中文答案：磨削：磨粒是固定的。研磨：磨粒是游离的，存在于研磨膏/研磨液中。\n出处：用户新增：Läppen 卡组"]
["Was ist die wichtigste Anwendung des Läppens?","Frage (DE)：Was ist die wichtigste Anwendung des Läppens?\nAntwort (DE)：Sehr feine, gas- und flüssigkeitsdichte Flächen; z.B. Dichtungsscheiben, Gleitringdichtungen.\n中文题目：Läppen 最重要的应用是什么？\n中文答案：制造非常精细、气密和液密的表面；例如密封片、机械密封面。\n出处：用户新增：Läppen 卡组"]
["Warum sind geläppte Flächen gasdicht?","Frage (DE)：Warum sind geläppte Flächen gasdicht?\nAntwort (DE)：Keine gerichteten Riefen; ungerichtete Bewegung erzeugt Kraterspuren statt Gleichlaufspuren.\n中文题目：为什么研磨后的表面可以气密？\n中文答案：没有方向性的沟槽；无方向运动产生小凹坑痕迹，而不是单方向磨痕。\n出处：用户新增：Läppen 卡组"]
["Welche Geometrien werden typischerweise geläppt?","Frage (DE)：Welche Geometrien werden typischerweise geläppt?\nAntwort (DE)：Vor allem plane Flächen; auch Rundläppen möglich. Freiformflächen sind ungeeignet.\n中文题目：通常适合研磨哪些几何形状？\n中文答案：主要是平面；也可以圆面研磨。自由曲面不适合。\n出处：用户新增：Läppen 卡组"]
["Wie funktioniert Planläppen grob?","Frage (DE)：Wie funktioniert Planläppen grob?\nAntwort (DE)：Werkstücke liegen lose im Werkstückhalter auf Läppscheibe; Läpppaste wird zugegeben; Druck von oben; Scheibe treibt Relativbewegung an.\n中文题目：平面研磨大致如何工作？\n中文答案：工件松放在工件夹持器中并置于研磨盘上；加入研磨膏；上方加压；研磨盘带动相对运动。\n出处：用户新增：Läppen 卡组"]
["Welche Vorteile hat Läppen?","Frage (DE)：Welche Vorteile hat Läppen?\nAntwort (DE)：Sehr hohe Maß- und Oberflächenqualität; geringe Kräfte; kaum Wärme; dünne/kleine Werkstücke möglich.\n中文题目：Läppen 有哪些优点？\n中文答案：尺寸精度和表面质量很高；力小；几乎无热影响；可加工薄小工件。\n出处：用户新增：Läppen 卡组"]
["Welche Nachteile hat Läppen?","Frage (DE)：Welche Nachteile hat Läppen?\nAntwort (DE)：Teuer, langsam, geringer Abtrag; hoher Kornverbrauch; starke Verschmutzung; Läppschlamm als Sondermüll.\n中文题目：Läppen 有哪些缺点？\n中文答案：昂贵、慢、去除量小；磨粒消耗大；污染严重；研磨泥需作为特殊废弃物处理。\n出处：用户新增：Läppen 卡组"]
["Was ist Kragenziehen / Lochaufweiten?","Frage (DE)：Was ist Kragenziehen / Lochaufweiten?\nAntwort (DE)：Ein gelochtes Blech wird mit einem Stempel aufgeweitet. Das Loch wird größer und am Lochrand entsteht ein Kragen.\n中文题目：什么是 Kragenziehen / Lochaufweiten（翻孔/扩孔成形）？\n中文答案：带孔板料用冲头扩开。孔变大，并且在孔边形成凸缘/翻边。\n出处：用户新增：Kragenziehen / Lochaufweiten"]
["Was ist beim Kragenziehen kritisch und wozu dient der Kragen?","Frage (DE)：Was ist beim Kragenziehen kritisch und wozu dient der Kragen?\nAntwort (DE)：Kritisch ist der Lochrand wegen hoher Zugdehnung und möglicher Rissbildung. Der Kragen dient zur Versteifung, Montage oder ggf. zum Gewindeschneiden.\n中文题目：Kragenziehen 的关键风险是什么？凸缘有什么作用？\n中文答案：关键在孔边，因为那里拉伸变形很大，可能产生裂纹。凸缘用于加强、安装，必要时也可用于攻螺纹。\n出处：用户新增：Kragenziehen / Lochaufweiten"]
