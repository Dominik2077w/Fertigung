    function parseDeck(text, deckId, deckLabel, removedLegacyNumbers = []) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map((line, index) => {
          const pair = parsePair(line, index);
          const sections = splitSections(pair[1] || "");
          const extras = Object.entries(sections)
            .filter(([key]) => !["Frage (DE)", "Antwort (DE)", "中文题目", "中文答案", "出处", "????", "??"].includes(key))
            .map(([key, value]) => ({ label: key, value }));
    
          const legacyNumber = legacyCardNumber(index, removedLegacyNumbers);
          const hoffmannCode = deckId === "hoffmann" ? ((pair[0] || "").match(/^([ABC]\d{2})/) || [])[1] : "";
          const vogeleiCode = deckId === "vogelei" ? ((pair[0] || "").match(/^([A-D]\d{2})/) || [])[1] : "";
    
          return {
            id: `${deckId}-card-${legacyNumber}`,
            number: legacyNumber,
            deckIndex: index + 1,
            deckId,
            deckLabel,
            displayNumber: hoffmannCode || vogeleiCode || String(index + 1),
            front: pretty(pair[0] || ""),
            questionDe: pretty(sections["Frage (DE)"] || pair[0] || ""),
            answerDe: pretty(sections["Antwort (DE)"] || ""),
            questionZh: pretty(sections["中文题目"] || sections["????"] || ""),
            answerZh: pretty(sections["中文答案"] || sections["????"] || ""),
            source: pretty(sections["出处"] || sections["??"] || ""),
            extras: extras.map(extra => ({ label: extra.label, value: pretty(extra.value) })),
            family: deckId === "hoffmann"
              ? inferHoffmannFamily(pair[0] || "")
              : (deckId === "vogelei" ? inferVogeleiFamily(pair[0] || "") : inferFamily(pair[0] || pair[1] || ""))
          };
        });
    }
    
    function parsePair(line, index) {
      try {
        return JSON.parse(line);
      } catch (jsonError) {
        const loose = line.match(/^\["([\s\S]*?)",\s*"([\s\S]*)"\]$/);
        if (loose) {
          return [decodeLooseString(loose[1]), decodeLooseString(loose[2])];
        }
        console.error("卡片解析失败", index + 1, jsonError, line);
        return [`Karte ${index + 1}`, line];
      }
    }
    
    function decodeLooseString(value) {
      return String(value)
        .replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
        .replace(/\\n/g, "\n")
        .replace(/\\r/g, "\r")
        .replace(/\\"/g, "\"");
    }
    
    function legacyCardNumber(index, removedLegacyNumbers = []) {
      let number = index + 1;
      removedLegacyNumbers.forEach(removed => {
        if (number >= removed) number += 1;
      });
      return number;
    }
    
    function splitSections(text) {
      const sections = {};
      let current = "";
      text.replace(/\\n/g, "\n").split(/\r?\n/).forEach(rawLine => {
        const line = rawLine.trim();
        if (!line) return;
        const match = line.match(/^(.+?)[\uFF1A:](.*)$/u);
        if (match && isSectionLabel(match[1].trim())) {
          current = match[1].trim();
          sections[current] = match[2].trim();
        } else if (current) {
          sections[current] += `\n${line}`;
        }
      });
      return sections;
    }
    
    function isSectionLabel(label) {
      return [
        "Frage (DE)",
        "Antwort (DE)",
        "中文题目",
        "中文答案",
        "出处",
        "Prüfungshinweis (txt)",
        "Hinweis (DE)",
        "Typische Beispiele (DE)",
        "Zahlen (DE, aus Folie)"
        , "对应 PPT 草图 / Zugehoerige PPT-Skizze"
      ].includes(label);
    }
    
    function inferHoffmannFamily(title) {
      const code = String(title || "").match(/^([ABC])\d{2}/);
      return code ? `Hoffmann ${code[1]}` : "Hoffmann";
    }
    
    function inferVogeleiFamily(title) {
      const code = String(title || "").match(/^([A-D])\d{2}/);
      return code ? `Vogelei ${code[1]}` : "Vogelei";
    }
    
    function inferFamily(text) {
      if (/Läppen|geläppt|Läpp/i.test(text)) {
        return "FT10";
      }
      if (/Honen|Honahle|Honleisten|Honsteine|Kreuzschliff|Ziehschleifen/i.test(text)) {
        return "FT9";
      }
      if (/Schleifen|Schleif|Schleifscheibe|Schleifbrand|Ausfeuern|Innenrund|Planschleifen|Korn|Korund|CBN|Diamant|Poren|Härtegrad/i.test(text)) {
        return "FT8";
      }
      if (/Tiefziehen|Niederhalter|Ziehverh|Ziehkraft|Bodenrei|Faltenbildung/i.test(text)) {
        return "FT14";
      }
      if (/Schmieden|Gesenkschmieden|Prägen|Presskraft|Grat/i.test(text)) {
        return "FT13";
      }
      if (/Fließpressen|Umformgrad|Umformkraft|Umformarbeit|Fließspannung/i.test(text)) {
        return "FT12";
      }
      if (/Umformen|umformende|Serienfertigung|Werkstoffzusammenhalt|Umformverfahren/i.test(text)) {
        return "FT11";
      }
      if (/Schruppen|Schlichten|Fräsen|Bahnabstand|CAM|Simulation|Kugel|Torusfräser/i.test(text)) {
        return "FT5";
      }
      if (/Bohren|Bohr|Aufbohren|Vollbohren|Senken|Reiben|Spiralbohrer|Wendeplattenbohrer|Spitzenwinkel|Spannut|Querschneide|Punch|Tap|Werkzeugaufnahme|Schrumpffutter|Dehnspann|Spannschraube|Zahnvorschub/i.test(text)) {
        return "FT4";
      }
      if (/Dreh|Rohling|Längs|Plandrehen|Rillentiefe|Schneidenradius|Hauptzeit|Kienzle|Schnittkraft|Drehmoment|Zustell|Vorschublänge|Eilgang/i.test(text)) {
        return "FT3";
      }
      if (/Scher|Span|Schneid|Werkzeug|Keil|Schnittgeschwindigkeit|Rauheit|Ra|Rz|Zerspan|Verschleiß|Aufbau|Diffusion|Kolk|VB|SV|KT|KM|α|β|γ/i.test(text)) {
        return "FT2";
      }
      return "FT1";
    }
    
    function pretty(text) {
      return String(text)
        .replace(/\\\((.*?)\\\)/g, "$1")
        .replace(/[^\S\r\n]+/g, " ")
        .replace(/[ \t]*\n[ \t]*/g, "\n")
        .trim();
    }
    
    function bindEvents() {
      el.deckSwitchBtn.addEventListener("click", showDeckChooser);
      document.querySelectorAll("[data-deck-choice]").forEach(button => {
        button.addEventListener("click", () => selectDeck(button.dataset.deckChoice));
      });
      el.prevBtn.addEventListener("click", () => move(-1));
      el.nextBtn.addEventListener("click", () => move(1));
      el.answerNextBtn.addEventListener("click", advanceAfterAnswer);
      el.shuffleBtn.addEventListener("click", restartCurrentMode);
      el.resetBtn.addEventListener("click", resetProgress);
      el.searchInput.addEventListener("input", event => {
        state.query = event.target.value.trim().toLowerCase();
        renderList();
      });
      document.querySelectorAll("[data-lang]").forEach(button => {
        button.addEventListener("click", () => {
          state.lang = button.dataset.lang;
          document.querySelectorAll("[data-lang]").forEach(item => item.classList.toggle("active", item === button));
          render();
        });
      });
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => answerCard(button.dataset.choice));
      });
      window.addEventListener("keydown", event => {
        if (!state.deckId) return;
        if (event.target.matches("input, textarea, select, [contenteditable='true']")) return;
        if (event.target.closest("button") && (event.key === " " || event.key === "Enter")) return;
        if (event.key === "ArrowRight") {
          event.preventDefault();
          goForwardByKeyboard();
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          move(-1);
        } else if (event.key === " " || event.key === "Enter") {
          event.preventDefault();
          goForwardByKeyboard();
        } else if (event.key === "1") {
          event.preventDefault();
          answerByKeyboard("unknown");
        } else if (event.key === "2") {
          event.preventDefault();
          answerByKeyboard("unsure");
        } else if (event.key === "3") {
          event.preventDefault();
          answerByKeyboard("known");
        }
      });
    }
    
    function goForwardByKeyboard() {
      if (!currentCard()) return;
      if (state.flipped) {
        advanceAfterAnswer();
      }
    }
    
    function answerByKeyboard(choice) {
      if (!currentCard() || state.flipped) return;
      answerCard(choice);
    }
    
    function buildOrder(mode) {
      const allCards = state.cards.map((card, index) => ({ card, index }));
      const base = allCards
        .filter(({ card }) => mode !== "wrong" || isWrongActive(card))
        .map(({ index }) => index);
    
      if (mode === "shuffle") return shuffledCopy(base);
      if (mode === "quiz") return shuffledCopy(base).slice(0, Math.min(QUIZ_SIZE, base.length));
      return base;
    }
    
    function shuffledCopy(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }
    
    function modeTag(card) {
      if (state.mode === "wrong") return "错题库";
      const label = STUDY_MODES[state.mode] || "刷题";
      return `${label} · ${card.deckLabel} · ${card.family}`;
    }
    
    function restartTitle() {
      return ({
        sequence: "重开顺序刷题",
        shuffle: "重新乱序",
        quiz: "重新抽取20题",
        wrong: "刷新错题库"
      })[state.mode] || "重开当前模式";
    }
    
    function isWrongActive(card) {
      const record = state.progress[card.id] || {};
      return (record.wrongCount || 0) > 0 && record.rating !== "known";
    }
    
    function currentCard() {
      if (!state.order.length) return null;
      return state.cards[state.order[state.index]];
    }
    
    function originalCardLabel(card) {
      if (card.deckId !== "garber") return card.displayNumber || `${card.deckLabel} ${card.deckIndex}`;
      return `原题 ${card.deckIndex || card.number || ""}`.trim();
    }
    
    function isRepeatOccurrence(queueIndex, absoluteIndex) {
      if (typeof queueIndex !== "number" || typeof absoluteIndex !== "number") return false;
      return state.order.findIndex(item => item === absoluteIndex) !== queueIndex;
    }
    
    function repeatLabel(queueIndex, absoluteIndex) {
      return isRepeatOccurrence(queueIndex, absoluteIndex) ? " · 复现" : "";
    }
    
    function render() {
      if (!state.deckId) {
        renderDeckChooser();
        return;
      }
      const card = currentCard();
      if (!card) {
        renderEmptyState();
        return;
      }
      const deck = currentDeck();
      const currentAbsoluteIndex = state.order[state.index];
      const originalLabel = originalCardLabel(card);
      const repeatSuffix = repeatLabel(state.index, currentAbsoluteIndex);
      const record = state.progress[card.id] || {};
      el.deckName.textContent = deck.label;
      el.deckCount.textContent = state.cards.length;
      el.counter.textContent = `${originalLabel}${repeatSuffix}`;
      el.progressBar.style.width = `${((state.index + 1) / state.order.length) * 100}%`;
      el.frontTag.textContent = `${modeTag(card)} · Frage`;
      el.backTag.textContent = `${modeTag(card)} · Antwort`;
      el.frontStatus.textContent = `${statusText(record.rating)} · ${originalLabel}${repeatSuffix}`;
      el.backStatus.textContent = `${statusText(record.rating)} · ${originalLabel}${repeatSuffix}`;
      el.answerNextBtn.disabled = false;
      el.prevBtn.disabled = state.order.length <= 1;
      el.nextBtn.disabled = state.order.length <= 1;
      el.shuffleBtn.title = restartTitle();
      el.shuffleBtn.setAttribute("aria-label", el.shuffleBtn.title);
      el.resetBtn.title = "重置当前卡组进度";
      el.resetBtn.setAttribute("aria-label", el.resetBtn.title);
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.disabled = false;
      });
    
      el.questionDe.innerHTML = renderRichText(card.questionDe || card.front);
      el.questionZh.innerHTML = renderRichText(card.questionZh);
      el.questionDe.classList.toggle("hidden", state.lang === "zh");
      el.questionZh.classList.toggle("hidden", state.lang === "de" || !card.questionZh);
    
      renderAnswer(card);
      el.cardInner.classList.toggle("flipped", state.flipped);
      renderModeButtons();
      renderList();
      renderStats();
    }
    
    function renderEmptyState() {
      const deck = currentDeck();
      el.deckName.textContent = deck ? deck.label : "选择卡组";
      el.deckCount.textContent = state.cards.length;
      el.counter.textContent = "0 / 0";
      el.progressBar.style.width = "0%";
      const emptyLabel = STUDY_MODES[state.mode] || "刷题";
      el.frontTag.textContent = `${emptyLabel} · Frage`;
      el.backTag.textContent = `${emptyLabel} · Antwort`;
      el.frontStatus.textContent = "无卡片";
      el.backStatus.textContent = "无卡片";
      el.questionDe.innerHTML = renderRichText(state.mode === "wrong" ? "错题库为空" : "没有卡片");
      el.questionZh.innerHTML = renderRichText(state.mode === "wrong" ? "在当前卡组刷题时点击“不知道”后，这里会出现错题。" : "");
      el.questionDe.classList.remove("hidden");
      el.questionZh.classList.toggle("hidden", !el.questionZh.textContent);
      el.answerGrid.innerHTML = "";
      el.cardInner.classList.remove("flipped");
      el.answerNextBtn.disabled = true;
      el.prevBtn.disabled = true;
      el.nextBtn.disabled = true;
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.disabled = true;
      });
      renderModeButtons();
      renderList();
      renderStats();
    }
    
    function renderAnswer(card) {
      el.answerGrid.innerHTML = "";
      if (state.lang !== "zh" && card.answerDe) {
        el.answerGrid.appendChild(section("Antwort (DE)", card.answerDe, "answer-de"));
      }
      if (state.lang !== "de" && card.answerZh) {
        el.answerGrid.appendChild(section("中文答案", card.answerZh, "answer-zh"));
      }
      card.extras.forEach(extra => {
        el.answerGrid.appendChild(section(extra.label, extra.value, "extra"));
      });
      if (card.source) {
        const source = document.createElement("div");
        source.className = "source";
        source.innerHTML = renderRichText(`出处：${card.source}`);
        el.answerGrid.appendChild(source);
      }
    }
    
    function section(label, value, className) {
      const wrap = document.createElement("div");
      wrap.className = `section ${className || ""}`;
      const title = document.createElement("p");
      title.className = "label";
      title.textContent = label;
      const body = document.createElement("p");
      body.innerHTML = renderRichText(value);
      wrap.append(title, body);
      return wrap;
    }
    
    function renderRichText(value) {
      const normalized = normalizeFormulaText(value);
      const images = [];
      const textWithTokens = normalized.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
        const index = images.length;
        images.push({ alt, src: src.trim() });
        return `@@FVIMG${index}@@`;
      });
      let html = formatFormulaHtml(escapeHtml(textWithTokens)).replace(/\n/g, "<br>");
      images.forEach((image, index) => {
        const tag = `<img class="answer-image" src="${escapeHtml(image.src)}" alt="${escapeHtml(image.alt)}" loading="lazy" decoding="async">`;
        html = html.replace(`@@FVIMG${index}@@`, tag);
      });
      return html;
    }
    
    function normalizeFormulaText(value) {
      return String(value || "")
        .replace(/\*\*([^*]+)\*\*/g, "$1")
        .replace(/\*([^*]+)\*/g, "$1")
        .replace(/\\\[(.*?)\\\]/gs, "$1")
        .replace(/\\\((.*?)\\\)/g, "$1")
        .replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, "($1)/($2)")
        .replace(/\\sqrt\{([^{}]+)\}/g, "√($1)")
        .replace(/\\text\{([^}]*)\}/g, "$1")
        .replace(/\\kappa/g, "κ")
        .replace(/\\gamma/g, "γ")
        .replace(/\\alpha/g, "α")
        .replace(/\\beta/g, "β")
        .replace(/\\sigma/g, "σ")
        .replace(/\\epsilon/g, "ε")
        .replace(/\\eta/g, "η")
        .replace(/\\varphi/g, "φ")
        .replace(/\\phi/g, "φ")
        .replace(/ϕ/g, "φ")
        .replace(/\\Delta/g, "Δ")
        .replace(/\\omega/g, "ω")
        .replace(/\\pi/g, "π")
        .replace(/\\mu/g, "µ")
        .replace(/\\cdot/g, "·")
        .replace(/\\times/g, "×")
        .replace(/\\to/g, "→")
        .replace(/\\Rightarrow/g, "⇒")
        .replace(/\\approx/g, "≈")
        .replace(/\\leq?/g, "≤")
        .replace(/\\geq?/g, "≥")
        .replace(/\\sin/g, "sin")
        .replace(/\^\s*\\circ/g, "°")
        .replace(/\\,/g, " ")
        .replace(/[^\S\r\n]+/g, " ")
        .replace(/[ \t]*\n[ \t]*/g, "\n")
        .trim();
    }
    
    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    
    function formatFormulaHtml(html) {
      let output = html;
    
      output = output.replace(/\^\(([^()<>]{1,60})\)/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);
      output = output.replace(/\^\{([^{}<>]{1,60})\}/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);
      output = output.replace(/\^([0-9+\-−.,A-Za-zα-ωΑ-Ω]{1,12})/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);
    
      output = output.replace(/\bkc1[,.]1\b/gi, () => mathVar("k", "c1,1"));
      output = output.replace(/\b([A-Za-zα-ωΑ-Ω])_([A-Za-z0-9α-ωΑ-Ω,.\-−]{1,12})\b/g, (_, base, sub) => mathVar(base, sub));
      output = output.replace(/φ_?(gesamt|max|[hlbA]|0-2|0-1|1-2)/g, (_, sub) => mathVar("φ", sub));
      output = output.replace(/\bβ_?(ges|[0-9]+)\b/g, (_, sub) => mathVar("β", sub));
      output = output.replace(/\bσ_?Z\b/g, () => mathVar("σ", "Z"));
      output = output.replace(/\b(F|P)_?([cfpa])\b/g, (_, base, sub) => mathVar(base, sub));
      output = output.replace(/\bF_?(Z|id|RR|RN|B|S)\b/g, (_, sub) => mathVar("F", sub));
      output = output.replace(/\bF_?(0|E)\b/g, (_, sub) => mathVar("F", sub));
      output = output.replace(/\bW_?id\b/g, () => mathVar("W", "id"));
      output = output.replace(/\bw_?d\b/g, () => mathVar("w", "d"));
      output = output.replace(/\bv_?c\b/g, () => mathVar("v", "c"));
      output = output.replace(/\bv_?f\b/g, () => mathVar("v", "f"));
      output = output.replace(/\bv_?S\b/g, () => mathVar("v", "S"));
      output = output.replace(/\bk_?c\b/g, () => mathVar("k", "c"));
      output = output.replace(/\bkf(0|1|e|m)\b/g, (_, sub) => mathVar("k", `f${sub}`));
      output = output.replace(/\bk_?(f|fm)\b/g, (_, sub) => mathVar("k", sub));
      output = output.replace(/\bK_?(ver|sch|gamma|γ|v)\b/g, (_, sub) => mathVar("K", sub === "gamma" ? "γ" : sub));
      output = output.replace(/\bR_?m\b/g, () => mathVar("R", "m"));
      output = output.replace(/\bD_?(WS|s|w)\b/g, (_, sub) => mathVar("D", sub));
      output = output.replace(/\bAl2O3\b/g, 'Al<sub>2</sub>O<sub>3</sub>');
      output = output.replace(/\b(A|S|l|b|h|D|L)_?(0|1|E|k|g)\b/g, (_, base, sub) => mathVar(base, sub));
      output = output.replace(/\bR_?(e|p0,2)\b/g, (_, sub) => mathVar("R", sub));
      output = output.replace(/\bh_?0\b/g, () => mathVar("h", "0"));
      output = output.replace(/\bs_?0\b/g, () => mathVar("s", "0"));
      output = output.replace(/\bd_?Z\b/g, () => mathVar("d", "Z"));
      output = output.replace(/\ba_?p\b/g, () => mathVar("a", "p"));
      output = output.replace(/\bm_?c\b/g, () => mathVar("m", "c"));
      output = output.replace(/\bt_?h\b/g, () => mathVar("t", "h"));
      output = output.replace(/\bT_?H\b/g, () => mathVar("T", "H"));
      output = output.replace(/\bf_?z\b/g, () => mathVar("f", "z"));
      output = output.replace(/\bR_?(a|z|t)\b/g, (_, sub) => mathVar("R", sub));
      output = output.replace(/\bL_?(ges|Abschnitt)\b/g, (_, sub) => mathVar("L", sub));
      output = output.replace(/\bl_?([au])\b/g, (_, sub) => mathVar("l", sub));
      output = output.replace(/√\(([^()<>]{1,80})\)/g, (_, radicand) => `<span class="math-sqrt">√(${radicand})</span>`);
    
      return output;
    }
    
    function mathVar(base, subscript) {
      return `<span class="math-var">${base}<sub>${subscript}</sub></span>`;
    }
    
    function renderList() {
      const baseOrder = state.order;
      const items = baseOrder
        .map((absoluteIndex, queueIndex) => ({ card: state.cards[absoluteIndex], absoluteIndex, queueIndex }))
        .filter(({ card }) => Boolean(card))
        .filter(({ card }) => {
          if (!state.query) return true;
          return [card.front, card.questionDe, card.questionZh, card.answerDe, card.answerZh, card.source]
            .join(" ")
            .toLowerCase()
            .includes(state.query);
        });
    
      el.visibleCount.textContent = `${items.length} / ${baseOrder.length}`;
      el.cardList.innerHTML = "";
      items.forEach(({ card, absoluteIndex, queueIndex }) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `list-item ${queueIndex === state.index ? "active" : ""}`;
        button.addEventListener("click", () => {
          state.index = queueIndex >= 0 ? queueIndex : 0;
          state.flipped = false;
          state.pendingChoice = null;
          render();
        });
    
        const title = document.createElement("div");
        title.className = "list-title";
        title.innerHTML = renderRichText(card.deckId === "hoffmann" ? card.front : card.questionDe);
    
        const meta = document.createElement("div");
        meta.className = "list-meta";
        const left = document.createElement("span");
        left.textContent = `${originalCardLabel(card)} · ${card.family}${repeatLabel(queueIndex, absoluteIndex)}`;
        const right = document.createElement("span");
        const record = state.progress[card.id] || {};
        right.textContent = `${statusText(record.rating)}${record.wrongCount ? ` · 错${record.wrongCount}` : ""}`;
        meta.append(left, right);
        button.append(title, meta);
        el.cardList.appendChild(button);
      });
    }
    
    function renderStats() {
      const records = state.cards.map(card => state.progress[card.id]).filter(Boolean);
      const seen = records.length;
      const good = records.filter(record => record.rating === "known").length;
      const again = state.cards.filter(card => isWrongActive(card)).length;
      el.statSeen.textContent = seen;
      el.statGood.textContent = good;
      el.statAgain.textContent = again;
      el.statLeft.textContent = Math.max(state.cards.length - good, 0);
    }
    
    function move(delta) {
      if (!state.order.length) return;
      state.pendingChoice = null;
      state.index = (state.index + delta + state.order.length) % state.order.length;
      state.flipped = false;
      render();
    }
    
    function restartCurrentMode() {
      state.order = buildOrder(state.mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }
    
    function answerCard(choice) {
      if (!VALID_CHOICES.has(choice)) return;
      const card = currentCard();
      if (!card) return;
      const previous = state.progress[card.id] || {};
      state.progress[card.id] = {
        ...previous,
        rating: choice,
        wrongCount: choice === "unknown" ? (previous.wrongCount || 0) + 1 : (previous.wrongCount || 0),
        reviews: (previous.reviews || 0) + 1,
        updatedAt: new Date().toISOString()
      };
      if (choice === "known") {
        state.progress[card.id].knownAt = new Date().toISOString();
      }
      saveProgress();
      state.pendingChoice = choice;
      state.flipped = true;
      render();
    }
    
    function advanceAfterAnswer() {
      const choice = state.pendingChoice;
      const currentAbsoluteIndex = state.order[state.index];
      state.pendingChoice = null;
    
      if (choice === "unsure") {
        scheduleRepeatLater(currentAbsoluteIndex);
      }
    
      if (state.mode === "wrong" && choice === "known") {
        removeCurrentAndFutureRepeats(currentAbsoluteIndex);
        if (state.index >= state.order.length) state.index = 0;
        state.flipped = false;
        render();
        return;
      }
    
      if (choice === "known") {
        removeFutureRepeats(currentAbsoluteIndex);
      }
    
      const finishedRound = state.index >= state.order.length - 1;
      if (state.mode !== "wrong" && finishedRound) {
        continueAfterRound();
        return;
      }
    
      move(1);
    }
    
    function continueAfterRound() {
      const wrongOrder = buildOrder("wrong");
      state.flipped = false;
      state.pendingChoice = null;
    
      if (wrongOrder.length) {
        state.mode = "wrong";
        state.order = wrongOrder;
        state.index = 0;
        render();
        return;
      }
    
      state.order = buildOrder(state.mode);
      state.index = 0;
      render();
    }
    
    function scheduleRepeatLater(absoluteIndex) {
      if (typeof absoluteIndex !== "number") return;
      removeFutureRepeats(absoluteIndex);
      const minInsert = Math.min(state.index + 2, state.order.length);
      const insertAt = minInsert + Math.floor(Math.random() * (state.order.length - minInsert + 1));
      state.order.splice(insertAt, 0, absoluteIndex);
    }
    
    function removeFutureRepeats(absoluteIndex) {
      for (let i = state.order.length - 1; i > state.index; i--) {
        if (state.order[i] === absoluteIndex) {
          state.order.splice(i, 1);
        }
      }
    }
    
    function removeCurrentAndFutureRepeats(absoluteIndex) {
      for (let i = state.order.length - 1; i >= state.index; i--) {
        if (state.order[i] === absoluteIndex) {
          state.order.splice(i, 1);
        }
      }
    }
    
    function setMode(mode) {
      if (!Object.prototype.hasOwnProperty.call(STUDY_MODES, mode)) return;
      state.mode = mode;
      state.order = buildOrder(mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }
    
    function renderModeButtons() {
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === state.mode);
      });
    }
    
    function statusText(rating) {
      return ({
        unknown: "不知道",
        unsure: "不熟练",
        known: "知道"
      })[rating] || "未复习";
    }
    
    function loadProgress() {
      let progress = {};
      try {
        progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        progress = {};
      }
    
      try {
        const oldGarber = JSON.parse(localStorage.getItem(OLD_GARBER_STORAGE_KEY)) || {};
        let migrated = false;
        Object.entries(oldGarber).forEach(([key, value]) => {
          if (key.startsWith("card-") && !progress[`garber-${key}`]) {
            progress[`garber-${key}`] = value;
            migrated = true;
          }
        });
        if (migrated) localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      } catch {
        // Keep new progress if old progress cannot be read.
      }
      return progress;
    }
    
    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }
    
    function resetProgress() {
      if (!state.deckId) return;
      const prefix = `${state.deckId}-`;
      Object.keys(state.progress).forEach(key => {
        if (key.startsWith(prefix)) delete state.progress[key];
      });
      saveProgress();
      state.order = buildOrder(state.mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }
  </script>
</body>
</html>
