["A01 / Gießen/Erstarren: 4 Diagramme zum Erstarren","Frage (DE)：Skizzieren Sie die 4 Diagramme zum Erstarren metallischer Schmelzen (t-T und T-v jeweils für reines Metall\nund Legierung) und erläutern Sie die Schwindungsanteile.\nAntwort (DE)：Welche 4 Diagramme?\n- t-T: Abkühlkurve reines Metall\n- t-T: Abkühlkurve Legierung\n- T-v: Volumenschwindung / spezifisches Volumen v bei reinem Metall\n- T-v: Volumenschwindung / spezifisches Volumen v bei Legierungen\nKernaussagen:\n- Beim Abkühlen kommt es zu Volumenkontraktion.\n- Schwindungsanteile: Flüssigkontraktion, Erstarrungskontraktion, Festkörperkontraktion.\n- Lunkerung entsteht aus der Summe dieser Kontraktionen, wenn Volumendefizit nicht kompensiert wird.\n中文题目：画出金属熔体凝固的4张经典图（纯金属/合金各一张 t-T 冷却曲线 + T-v 比体积收缩曲线），并说明收缩/缩孔来源。\n中文答案：4张图：纯金属 t-T、合金 t-T、纯金属 T-v、合金 T-v。\n收缩来源：液态收缩、凝固收缩、固态收缩。总缩孔倾向 = 三者之和；若没有冒口/补缩补偿，就会形成缩孔/空洞。\n出处：Zusammenfassung_Hoffmann.pdf, S.2-3, Kap. 1.3 Erstarrung metallischer Schmelzen; t-T/T-v Schaubilder und\nVolumenschwindung."]
["A02 / Kunststoffe: PVT/VT amorph vs. teilkristallin","Frage (DE)：Skizzieren und erklären Sie ein v-T bzw. p-v-T-Diagramm beim Abkühlen aus der Schmelze für amorphe und\nteilkristalline Thermoplaste. Markieren Sie Tg bzw. TK/Tm und begründen Sie den Unterschied in der\nVolumenschwindung ΔV.\nAntwort (DE)：- Amorph: Beim Abkühlen sinkt das spezifische Volumen v kontinuierlich; wichtiger Übergang ist Tg\n(Glasübergang). Insgesamt geringere Volumenschwindung ΔV.\n- Teilkristallin: Zusätzlich zur Abkühlkontraktion kommt Kristallisation hinzu. Geordnete/dichtere\nBereiche führen zu deutlich höherer ΔV; höhere Kristallinität bedeutet höhere Schwindung.\n- Voraussetzung der Kristallisation: Unterkühlung der Schmelze.\n- p-v-T-Bezug: Das p-v-T-Verhalten bei Abkühlung ist wichtig, weil es Schwindung, Maßhaltigkeit und Verzug\nbeeinflusst.\n中文题目：画并解释热塑性塑料从熔体冷却时的 v-T（或 p-v-T）图：无定形与半结晶材料，标出 Tg 与 TK/Tm，并说明体积收缩\nΔV 差异。\n中文答案：无定形：v 随温度下降较连续地降低，关键是玻璃化温度 Tg，总体 ΔV 较小。\n半结晶：冷却过程中发生结晶，结构更致密，体积收缩明显更大；结晶度越高，收缩越大。结晶需要过冷。p-v-T 行为用\n于解释尺寸变化、翘曲和收缩补偿。\n出处：Zusammenfassung_Hoffmann.pdf, S.17-19, Kap. 3.1-3.2 Strukturbildung/Erstarrung von Thermoplasten; 2.3\nUrformverfahren für Kunststoffe (Teil 1), Folien 7-8, 38-40; Teil 2, Folie 88."]
["A03 / Kunststoffe: Schwindung ΔV und Folgen","Frage (DE)：Erklären Sie anhand des p-v-T-Verhaltens die Volumenschwindung ΔV beim Abkühlen eines amorphen vs.\nteilkristallinen Thermoplasten. Warum ist ΔV bei teilkristallinen größer und welche Folgen ergeben sich\n(Anisotropie, Eigenspannungen, Verzug)?\nAntwort (DE)：- Teilkristalline Thermoplaste: höhere Kristallinität -> größere Volumenschwindung ΔV.\n- Amorphe Thermoplaste: geringe Kristallinität -> geringere ΔV.\n- Kristallisation benötigt Unterkühlung.\n- Schnelles Abkühlen → eingefrorene Orientierung → Anisotropie. Unterschiedliche Kristallinität bzw. Sekundärkristallisation → Eigenspannungen, Nachschwindung und Verzug.\n中文题目：解释无定形和半结晶热塑性塑料冷却时的 ΔV 差异，以及快速冷却对各向异性、残余应力和翘曲的影响。\n中文答案：半结晶材料因结晶形成更致密结构，所以 ΔV 更大；无定形材料结晶度低，ΔV 更小。结晶要过冷。快速冷却会冻结分子取向，导致各向异性；不同结晶度或二次结晶会造成内应力、继续收缩和翘曲。\n出处：Zusammenfassung_Hoffmann.pdf, S.18, Abschnitt Erstarrung von Thermoplasten; S.20, Abschnitt\nOrientierung/Anisotropie/Eigenspannungen."]
["A04 / Fließ-/Viskositätskurven: newtonsch, dilatant, strukturviskos","Frage (DE)：Zeichnen und erläutern Sie Fließ-/Viskositätskurven für newtonsch, dilatant und strukturviskos. Erklären\nSie, welches Fließverhalten Kunststoffschmelzen typischerweise zeigen und was das für\nDruckbedarf/Durchsatz bedeutet.\nAntwort (DE)：Rheologie: beschreibt Fließeigenschaften; η: innerer Fließwiderstand.\nNewtonsch: η konstant; τ ∝ γ̇.\nStrukturviskos: η ↓ mit steigender γ̇.\nDilatant: η ↑ mit steigender γ̇.\nKunststoffschmelzen: strukturviskos → höherer Durchsatz bei unterproportional steigendem Druck.\nEinflussgrößen: Temperatur, Druck, Füllstoffe, Molmasse/Kettenlänge, Weichmacher, Schergeschwindigkeit.\n中文题目：画并解释牛顿型、剪切增稠、剪切变稀的流动/黏度曲线；说明塑料熔体通常表现为什么行为以及对压力/通过量的意义。\n中文答案：流变学描述流动性质；η 是内部流动阻力。牛顿型：η 恒定，τ 与 γ̇ 成正比。结构黏性：γ̇ 升高时 η 下降。剪切增稠：γ̇ 升高时 η 上升。塑料熔体通常为结构黏性，因此更高 Durchsatz 只需要低于比例增长的压力。影响因素：温度、压力、填料、分子量/链长、增塑剂、剪切速率。\n出处：Zusammenfassung_Hoffmann.pdf, S.21-22, Kap. 3.3 Fließverhalten; 2.3 Urformverfahren für Kunststoffe (Teil 1),\nFolien 21-24."]
["A05 / Viskosität - Fließ-/Formfüllungsvermögen - Durchsatz","Frage (DE)：Erklären Sie Fließ- und Formfüllungsvermögen (Einflussgrößen) und den Zusammenhang zwischen Viskosität η\nund Durchsatz.\nAntwort (DE)：Fließvermögen: Lauflänge der Schmelze in definiertem Kanal, z. B. Spiralprobe nach Sipp.\nFormfüllungsvermögen: Formfüllungsgrad eines definierten Querschnitts.\nEinflüsse Metall: η/Zähigkeit, Gießtemperatur, Wärmeinhalt/Kristallisationswärme, Zusammensetzung, Druckhöhe/Strömung, Erstarrungsintervall, Formtemperatur/Wärmeleitfähigkeit, Benetzbarkeit/Schlichte.\nKunststoffschmelze: η↓ → Fließfähigkeit/Durchsatz↑ bzw. Druckbedarf↓. Molmasse/Kettenlänge↑ → η↑ → Durchsatz↓. Thermoplaste meist strukturviskos.\n中文题目：解释金属/塑料加工中的流动能力、充型能力、影响因素，以及黏度与产量/通过量的关系。\n中文答案：流动能力是熔体在规定通道中的流动长度，例如 Sipp 螺旋试样。充型能力是规定截面的充型程度。金属中的影响因素包括 η/黏性、浇注温度、热含量/结晶热、成分、压力高度/流动、凝固区间、模具温度/导热性、润湿性/涂料。塑料熔体中：η 越低，流动性和通过量越高，所需压力越低；分子量/链长越高，η 越高，通过量越低。热塑性塑料通常呈结构黏性。\n出处：2.1 Gießen (Grundlagen).txt, Folien 26-27; Zusammenfassung_Hoffmann.pdf, S.1 und S.23; 2.3 Urformverfahren für\nKunststoffe (Teil 1), Folien 19-21."]
["A06 / Exogene vs. endogene Erstarrung","Frage (DE)：Was ist exogene bzw. endogene Erstarrung? Nennen Sie wichtigste Merkmale und Folgen für Nachfließen/Lunker.\nAntwort (DE)：- Endogen (ungerichtet): Kristallformen Globulite/Sphärolithe; eher glatte/ebene Erstarrungsfront; günstig\nfür Nachfließen der Schmelze und wirkt Lunkerbildung entgegen.\n- Exogen (gerichtet): Stängelkristalle/Dendriten; raue/unebene Erstarrungsfront; Nachfließen der\nRestschmelze wird behindert, Lunkerbildung wird begünstigt.\n- Im Gussteil können Mischtypen auftreten, z. B. endogen - exogen - endogen über den Querschnitt.\n中文题目：什么是外生/内生凝固？列出特征，并说明对补缩/缩孔的影响。\n中文答案：内生凝固：非定向，常见球状晶，凝固前沿更平滑，有利于金属液继续补流，减少缩孔。外生凝固：定向，常见柱状晶/树\n枝晶，前沿粗糙不平，剩余熔体补流受阻，更容易形成缩孔。截面上可出现混合凝固类型。\n出处：2.1 Gießen (Grundlagen).txt, Folien 53-55, Abschnitt Erstarrungstypen."]
["A07 / Verfahren: Prozessablauf als allgemeine Schritte","Frage (DE)：Beschreiben Sie den Prozessablauf eines genannten Verfahrens (Prozessschritte). Ordnen Sie das Verfahren\nnach Form und Modell ein.\nAntwort (DE)：Antwortstruktur:\n1. Einteilung: Form (verlorene Form oder Dauerform) und Modell (Dauermodell oder verlorenes Modell).\n2. Form-/Kernvorbereitung: Form herstellen, Kerne herstellen/einlegen.\n3. Form schließen/aufbauen: Einguss, Speiser, Filter falls vorhanden.\n4. Füllen: Gießen/Schießen/Druck, ggf. Entlüften/Vakuum.\n5. Erstarren: Speisen oder Nachdruck.\n6. Entformen: Form öffnen/zerstören, Bauteil entnehmen.\n7. Nacharbeit: Anguss/Speiser abtrennen, Entkernen, Reinigen/Putzen, ggf. Bearbeitung.\nVerfahren üben: Sandguss, Feinguss, Lost Foam, Vollformgießen, Kokillenguss, Niederdruckkokillenguss,\nDruckguss, Schleuderguss, Spritzgießen-Zyklus.\n中文题目：给定一种工艺，按步骤写流程，并按模具/模型分类。\n中文答案：通用步骤：先分类（一次性/永久模具；永久/消失模型），再写制模制芯、合箱/装配、充型、凝固/补缩、脱模、后处理。\n要能套用到砂型、精密铸造、消失模、金属型、低压金属型、压铸、离心铸造和注塑循环。\n出处：Schwerpunkte der Prüfung FERT.pdf, S.1; Zusammenfassung_Hoffmann.pdf, Kap. 2.4 Verfahrensbeschreibung/Prozessablauf\nund Kap. 3.5 Spritzgießen."]
["A08 / Verfahren: Einteilung nach Form und Modell","Frage (DE)：Wie werden Gießverfahren nach Form und Modell eingeteilt? Nennen Sie die Klassen und ordnen Sie wichtige\nVerfahren zu.\nAntwort (DE)：- Form: verlorene Form (wird zerstört) vs. Dauerform/Kokille (wiederverwendbar).\n- Modell: Dauermodell (wird entnommen und wiederverwendet) vs. verlorenes Modell (wird\nausgeschmolzen/vergast).\nZuordnung:\n- Sandguss: verlorene Form + Dauermodell.\n- Feinguss: verlorene Form + verlorenes Modell (Wachs).\n- Lost Foam / Vollform: verlorene Form + verlorenes Modell (EPS/Schaum).\n- Kokillenguss, Niederdruckkokillenguss, Druckguss, Schleuderguss: Dauerform, i.d.R. kein separates Modell.\n中文题目：铸造工艺如何按模具与模型分类？写出分类原则并归类主要工艺。\n中文答案：模具：一次性模具 vs 永久模具（金属型）。模型：永久模型 vs 消失模型。砂型铸造是一次性模具+永久模型；精密铸造\n是一次性模具+蜡模型；Lost Foam/全模是一次性模具+泡沫消失模型；金属型、低压金属型、压铸、离心铸造属于永久模\n具。\n出处：Schwerpunkte der Prüfung FERT.pdf, S.1; Zusammenfassung_Hoffmann.pdf, Kap. 2.4 Verfahrensbeschreibung/Prozessablauf."]
["A09 / Keimbildung homogen/heterogen und Gefüge","Frage (DE)：Erklären Sie homogene und heterogene Keimbildung und den Einfluss auf das Gefüge. Welche Diagramme gehören\ndazu (Funktion von ΔT/Unterkühlung)?\nAntwort (DE)：Grundkette: Unterkühlung ΔT -> Keimbildung -> Kristallwachstum -> Primärgefüge/Korngröße.\n- Homogene Keimbildung: Schmelze bildet arteigene Keime; Unterkühlung erforderlich; ΔT beeinflusst\nKeimzahl NKZ und Kristallisationsgeschwindigkeit vKG. NKZ groß -> feines Primärkorn.\n- Heterogene Keimbildung: Keime an Oberflächen oder durch Impfmittel/Fremdkeime; geringere\nAktivierungsenergie, mehr Keime, feineres Gefüge.\nDiagramme: NKZ = f(ΔT) und vKG = f(ΔT).\n中文题目：解释均匀/异质形核及其对组织的影响，并说明对应的过冷度图。\n中文答案：核心链：过冷 -> 形核 -> 晶体长大 -> 初生组织。均匀形核由熔体自身形成晶核，需要过冷。异质形核依靠模壁/夹杂/\n接种剂，活化能更低，晶核更多，组织更细。要会 NKZ-ΔT 和 vKG-ΔT 两张图。\n出处：Zusammenfassung_Hoffmann.pdf, S.4; 2.1 Gießen (Grundlagen).txt, Folien 43-51."]
["A10 / Kristallisationszonen / Stängelkristalle vs. globular","Frage (DE)：Beschreiben Sie Kristallisationszonen im Gussteil und vergleichen Sie Stängelkristalle mit globularen\nKristallen.\nAntwort (DE)：Kristallisationszonen:\n- Randzone an Formwand: starke Unterkühlung -> feines Korn.\n- Übergangszone: säulenförmige Stängelkristalle/Dendriten bei gerichteter Wärmeabfuhr.\n- Kernzone: Keimanreicherung, eher endogene/globulare Kristallisation.\nStängelkristalle: entstehen bei gerichteter Wärmeabführung, anisotrop, ungünstige Querfestigkeit,\nmöglichst vermeiden.\nGlobulare Kristalle: wachsen eher gleichmäßig in alle Richtungen, günstiger für Festigkeit/Zähigkeit und\nhomogenere Eigenschaften.\n中文题目：描述铸件截面凝固分区，并比较柱状晶/树枝晶与球状等轴晶。\n中文答案：表层靠模壁强过冷、晶粒细；过渡区因定向散热形成柱状晶/树枝晶；中心区晶核富集，趋向等轴/球状晶。柱状晶方向性\n强、各向异性，横向性能差；球状/等轴晶更均匀，强韧性更好。\n出处：Zusammenfassung_Hoffmann.pdf, S.5; 2.1 Gießen (Grundlagen).txt, Folien 53-55."]
["A11 / Speiser & Lunker + Heuver’sche Kreismethode","Frage (DE)：Erklären Sie Lunker und Speiser und beschreiben Sie die Heuver’sche Kreismethode. Warum verschiebt man\ndas thermische Zentrum in den Speiser?\nAntwort (DE)：- Lunker: Hohlräume/Vertiefungen durch Schwindung beim Erstarren; entstehen im thermischen Zentrum, wo die\nletzte Schmelze erstarrt.\n- Speiser: Reservevolumen zum Nachspeisen der Erstarrungsschwindung; Ziel ist, das thermische Zentrum in\nden Speiser zu verschieben, damit der Lunker im Speiser liegt.\n- Heuver’sche Kreismethode: Querschnitt soll zum Speiser hin kontinuierlich größer werden. Von kleinster\nWanddicke aus werden berührende eingeschriebene Kreise Richtung Speiser konstruiert; Flächen/Querschnitte\nwachsen mit Heuversfaktor kH.\n- Speiser liegt am dicksten Querschnitt und muss zuletzt erstarren; Speiser kann isoliert oder exotherm\nbeheizt werden.\n中文题目：解释缩孔、冒口和 Heuver 圆法；为什么把热中心移到冒口里？\n中文答案：缩孔是凝固收缩导致的空洞，常在最后凝固的热中心。冒口是补缩储液体，目标是让缩孔发生在冒口而不是铸件中。\nHeuver圆法通过向冒口方向逐级增大截面/壁厚来引导定向凝固；冒口放在最大截面并最后凝固，可用保温或放热材料延迟\n凝固。\n出处：Zusammenfassung_Hoffmann.pdf, S.5-6; 2.1 Gießen (Grundlagen).txt, Folien 62-63."]
["A12 / GJS vs. GJL","Frage (DE)：Worin unterscheiden sich Gusseisen mit Lamellengraphit (GJL) und Gusseisen mit Kugelgraphit (GJS)? Nennen\nSie Eigenschaften und Konstruktionshinweise.\nAntwort (DE)：- GJL: Graphit als Lamellen -> starke Kerbwirkung/Spannungsspitzen; geringe Zugfestigkeit und sehr geringe\nBruchdehnung, spröde. Besser auf Druck beanspruchen; Druckfestigkeit typ. 3-4 mal Zugfestigkeit. Vorteile:\ngute Gießeigenschaften, billig, gut zerspanbar, hohe Dämpfung.\n- GJS: Graphit als Kugeln/Sphärolithe -> geringere Kerbwirkung; bessere Zugfestigkeit, Zähigkeit und\ndynamische Eigenschaften. Herstellung durch Magnesiumzugabe. Nachteile ggü. GJL: geringere\nDämpfung/Wärmeleitfähigkeit, teurer.\n中文题目：球铁GJS和灰铁GJL的区别、性能和设计提示。\n中文答案：GJL为片状石墨，缺口效应强，抗拉和延伸率低，脆，设计上尽量承压；优点是便宜、铸造性好、易切削、阻尼高。GJS为\n球状石墨，通过镁球化，缺口效应小，抗拉、韧性和动态性能更好，但阻尼/导热较低、成本更高。\n出处：Zusammenfassung_Hoffmann.pdf, S.8-9; 2.1 Gießen (Grundlagen).txt, Folien 85-87."]
["A13 / Extrusion: Dreizonenschnecke vs. Nutbuchsenextruder","Frage (DE)：Vergleichen Sie Dreizonenschnecke und Nutbuchsenextruder hinsichtlich Druckaufbau, Förderverhalten, Vor-\nund Nachteilen. Skizzieren Sie typische Druckverläufe.\nAntwort (DE)：Dreizonenschnecke:\n- Druckaufbau durch abnehmendes freies Volumen, Reibung und Schmelzbildung.\n- Schleppströmung fördert nach vorne; Druckströmung wirkt entgegen.\n- Durchsatz hängt stark vom Werkzeug-Gegendruck ab; bei Drehzahlsteigerung wächst Druckströmung,\nPumpwirkungsgrad sinkt.\nNutbuchsenextruder:\n- Ziel: hohe, möglichst gegendruckunabhängige Durchsätze.\n- Nut erhöht Druck; Druckmaximum schon in der Einzugszone.\n- Druckströmung und Schleppströmung gleichgerichtet; bei steigendem Druck steigt Durchsatz.\n- Vorteile: hoher/robuster Durchsatz. Nachteile: Nutkühlung/Wartung, schlechtere Homogenisierung,\nMischteile nötig.\n中文题目：比较三段螺杆与带槽套挤出机：压力建立、输送行为、优缺点，并能画图。\n中文答案：三段螺杆：拖曳流向前、压差流向后，受模头背压影响大；转速提高时回流增强，效率下降。带槽套：进料区槽使压力快\n速建立，拖曳流和压差流同向，产量对背压更不敏感；但槽要冷却、均化较差，需要混合/剪切元件。\n出处：Zusammenfassung_Hoffmann.pdf, S.23-25, Kap. 3.4 Extrusion; Zusammenfassung_Hoffmann.txt, Abschnitt 3.4."]
["A14 / Typische Gießfehler","Frage (DE)：Nennen und erläutern Sie typische Gießfehler (Ursachen/Erkennung/Abhilfe).\nAntwort (DE)：Typische Gießfehler:\n- Lunker: Hohlräume/Vertiefungen durch Schwindung; Abhilfe: Speiser, Heuver, kontrollierte Erstarrung.\n- Warmrisse/Kaltrisse: Risse durch Erstarrungs-/Abkühlspannungen; Warmrisse zwischen Liquidus/Solidus,\nKaltrisse später.\n- Nichtausfüllen/Mißlauf: unvollständige Formfüllung durch unzureichendes Fließ-/Formfüllungsvermögen.\n- Kaltschweißung/Kaltverschweißung: zwei Schmelzströme treffen zu kalt zusammen.\n- Seigerungen: Entmischung/ungleiche Zusammensetzung.\n- Form-/Kernfehler: Kernversatz, Teilungsversatz, Sand-/Schlackeeinschlüsse, Schülpen/Rattenschwänze,\nAnbrennen.\n中文题目：列举并解释典型铸造缺陷及原因/对策。\n中文答案：典型缺陷：缩孔（凝固收缩）、热裂/冷裂（凝固/冷却应力）、充型不足、冷隔/冷焊、偏析、型芯或砂型相关缺陷（芯偏、\n分型错位、夹砂夹渣、鼠尾、粘砂等）。对策包括冒口/定向凝固、合理温度与浇注、改进型砂/排气/浇道。\n出处：Zusammenfassung_Hoffmann.pdf, S.7, Kap. 1.5 Typische Gießfehler; Zusammenfassung_Hoffmann.txt, Kap. 1.5; 2.1 Gießen\n(Grundlagen).txt, Folie 80 Fehlerzusammenstellung."]
["A15 / Schwerkraftguss + Gießsystem + Speiser","Frage (DE)：Erklären Sie Schwerkraftguss sowie Aufbau und Funktion von Gießsystem und Speiser.\nAntwort (DE)：Schwerkraftguss:\n- Formfüllung unter Ausnutzung der Schwerkraft, fallend von oben oder steigend von unten.\nGießsystem Aufbau:\n- Gießtrichter/Eingusstümpel -> Einlauf -> Querlauf/Schlackenlauf -> Zulauf/Anschnitt -> Formhohlraum.\n- Querschnittsregel: A_Einlauf > A_Querlauf > A_Zulauf.\nFunktion/Anforderungen:\n- definierte Füllzeit, geringe Geschwindigkeit, turbulenzarm, ausreichender hydrostatischer Druck,\nAbscheidung von Verunreinigungen, keine Erosion, kein Luftansaugen.\nSpeiser:\n- Reservevolumen zum Nachspeisen der Erstarrungsschwindung; thermisches Zentrum soll in den Speiser\nwandern; Speiser muss zuletzt erstarren.\n中文题目：解释重力铸造、浇注系统结构/功能和冒口。\n中文答案：重力铸造依靠重力充型，可上浇或底注。浇注系统由浇口杯、直浇道、横浇道/渣道、内浇口进入型腔；截面通常直浇道>\n横浇道>内浇口。功能是平稳、低湍流、按时充型并分离夹杂。冒口是补缩储液体，让热中心转到冒口并最后凝固。\n出处：Zusammenfassung_Hoffmann.pdf, S.1-2, Kap. 1.2 Schwerkraftguss/Gießsystem; S.6 Speiser; 2.1 Gießen (Grundlagen).txt,\nFolien 30-32."]
["A16 / Feingießen: Prozessschritte","Frage (DE)：Nennen Sie die Prozessschritte des Feingießens (stichpunktartig).\nAntwort (DE)：1. Wachsmodelle herstellen.\n2. Modelltraube montieren.\n3. Modelltraube in keramischen Schlicker tauchen.\n4. Feinkörniges feuerfestes Material in mehreren Schichten aufbringen.\n5. Modellwachs im Dampfautoklaven ausschmelzen.\n6. Keramikform brennen/sintern.\n7. Schmelze in vorgeheizte Form (ca. 900-1200 °C) gießen.\n8. Erstarren zum Gussteil.\n9. Form schnell zerstören/ausschlagen, um Schwindungsrisse zu vermeiden.\nZusätzlich möglich: von Gießtraube trennen, strahlen/nachbearbeiten.\n中文题目：按点列出精密铸造/熔模铸造的流程步骤。\n中文答案：制作蜡模；组装模型树；浸陶瓷浆；多层覆耐火材料成壳；蒸汽高压釜脱蜡；陶壳焙烧；向预热陶壳浇注；凝固；快速破\n壳取件以避免收缩裂纹；必要时切除浇注树并后处理。\n出处：Zusammenfassung_Hoffmann.pdf, Kap. 2.4.2 Feinguss; 2.1 Gießen (Verfahren).txt, Folie 85\nFeingießen-Verfahrensschritte."]
["A17 / Sandguss - Handformen","Frage (DE)：Beschreiben Sie den Prozessablauf beim Sandguss - Handformen (manuell).\nAntwort (DE)：1. Modellunterteil in Formkasten einformen, Modellsand und Hinterfüllsand einfüllen, verdichten,\nabstreifen.\n2. Formkasten wenden, obere Modellhälfte auflegen, Oberkasten einformen, abstreifen.\n3. Formkasten öffnen.\n4. Modell entnehmen.\n5. Eingusstrichter formen und Kern fertigen.\n6. Kern einlegen und ausblasen.\n7. Gießen und erstarren lassen; Formkasten beschweren/verklemmen.\n8. Formkasten leeren, Kreislaufmaterial entfernen (Speiser, Einguss).\n中文题目：说明手工砂型铸造流程。\n中文答案：下模型造型、填砂压实刮平；翻箱并做上箱；开箱；起模；做浇口和砂芯；下芯并清理；浇注凝固；落砂并去除浇冒口等\n循环料。\n出处：Zusammenfassung_Hoffmann.pdf, S.12, Kap. 2.4.1 Sandguss: Handformen."]
["A18 / Sandguss - Maschinenformen","Frage (DE)：Beschreiben Sie den Prozessablauf beim Sandguss - Maschinenformen (halbautomatisch).\nAntwort (DE)：1. Formkästen laufen im Kreis auf Transportsystem.\n2. Modellplatten werden von unten an Formkästen gefahren.\n3. Speiser/Filter einlegen.\n4. Füllrahmen aufsetzen, Formsand einfüllen.\n5. Verdichten, z. B. Luftimpulsverfahren.\n6. Überschüssigen Sand abstreifen.\n7. Modellplatte ausfahren.\n8. Formkästen wenden.\n9. Kern einlegen, Eingusstrichter bohren, ggf. Gießhilfen einlegen.\n10. Oberkasten wenden und aufsetzen.\n11. Abgießen.\n12. Erstarren, Entformen/Entleeren.\n13. Kühlen und fördern.\n14. Kreislaufmaterial abtrennen.\n中文题目：说明机器造型砂型线的流程。\n中文答案：砂箱循环输送；模型板顶入；放冒口/过滤器；填砂；压实；刮砂；抽出模型板；翻箱；下芯和钻浇口；合箱；浇注；凝固\n落砂；冷却输送；切除/回收浇冒口。\n出处：Zusammenfassung_Hoffmann.pdf, S.12, Kap. 2.4.1 Sandguss: Maschinenformen."]
["A19 / Lost-Foam: Prozessablauf","Frage (DE)：Nennen Sie den Prozessablauf des Lost-Foam-Gießverfahrens.\nAntwort (DE)：1. Vorexpandieren.\n2. Modellherstellung aus EPS.\n3. Anordnung zu Gießtrauben.\n4. Schlichten mit keramischer Schlichte.\n5. Trocknung.\n6. Einbettung in bindemittelfreien Sand.\n7. Vibration/Verdichtung.\n8. Gießen: EPS vergast, Schmelze verdrängt das Modell.\n9. Ausschütteln und Abschrecken.\n10. Reinigen.\n11. Putzen.\n12. Bearbeitung.\n中文题目：列出 Lost-Foam/消失模铸造流程。\n中文答案：预发泡；制作EPS泡沫模型；组装模型树；涂陶瓷涂料；干燥；埋入无粘结剂砂；振动压实；浇注时泡沫气化、金属液取代\n；落砂/淬冷；清理；打磨清砂；后加工。\n出处：Zusammenfassung_Hoffmann.pdf, S.13, Kap. 2.4.3 Lost Foam."]
["A20 / Kokillenguss (Schwerkraft): Prozessablauf","Frage (DE)：Beschreiben Sie den Prozessablauf beim Kokillendruckguss / Kokillenguss unter Schwerkraft.\nAntwort (DE)：1. Kokille geöffnet.\n2. Kokille geschlossen.\n3. Formfüllung und Erstarrung.\n4. Gussteilentnahme.\n中文题目：说明金属型重力铸造流程。\n中文答案：开模；闭合金属型；金属液充型并凝固；取出铸件。\n出处：Zusammenfassung_Hoffmann.pdf, S.14, Kap. 2.4.5 Kokillendruckguss (Schwerkraft)."]
["A21 / Niederdruckkokillenguss: Prozessablauf","Frage (DE)：Beschreiben Sie den Prozessablauf beim Niederdruckkokillenguss.\nAntwort (DE)：1. Kokille geöffnet, Ofen drucklos.\n2. Kokille schließt.\n3. Druckbeaufschlagung mit ca. 0,2-0,5 bar, Schmelze steigt und füllt Form.\n4. Kokille geöffnet; Gussteil erstarrt; Ofen drucklos; Auswerfer betätigt.\n5. Gussteil entnehmen.\n中文题目：说明低压金属型铸造流程。\n中文答案：金属型打开、炉子无压；金属型闭合；施加0.2-0.5 bar低压，金属液上升充型；开模、铸件已凝固，炉子回无压，顶出；\n取件。\n出处：Zusammenfassung_Hoffmann.pdf, S.14, Kap. 2.4.6 Niederdruckkokillenguss."]
["A22 / Druckguss: Gießtakt/Prozessablauf","Frage (DE)：Nennen Sie den Gießtakt/Prozessablauf beim Druckguss.\nAntwort (DE)：1. Form schließen.\n2. Kerne einfahren.\n3. Entlüften oder Vakuum.\n4. Schießen.\n5. Halten und Nachdrücken.\n6. Kerne ausfahren.\n7. Form öffnen.\n8. Gussstück ausfahren.\n中文题目：列出压铸循环步骤。\n中文答案：合模；进芯；排气或抽真空；高速压射充型；保持和保压补缩；退芯；开模；顶出/取出铸件。\n出处：Zusammenfassung_Hoffmann.pdf, S.15, Kap. 2.4.7 Druckguss - Verfahren."]
["A23 / Schleuderguss: Prozessablauf","Frage (DE)：Beschreiben Sie den Prozessablauf beim Schleuderguss (Zentrifugalguss).\nAntwort (DE)：1. Flüssiges Metall in schnell rotierende Kokille gießen.\n2. Zentrifugalkraft erzeugt hohen Druck (ca. 30 mal Schwerkraftguss).\n3. Metall wird an Kokillenwand gepresst.\n4. Von der Wand aus setzt gerichtete Erstarrung ein.\n中文题目：说明离心铸造流程。\n中文答案：金属液浇入高速旋转的金属型；离心力产生高压力；金属液被压向型壁；从型壁开始定向凝固。\n出处：Zusammenfassung_Hoffmann.pdf, S.16, Kap. 2.4.8 Schleuderguss."]
["B01 / Spritzgießen: Zyklus + Werkzeugfunktionen","Frage (DE)：Spritzgießen: Beschreiben Sie den Zyklus (Phasen) und nennen Sie die Aufgaben/Funktionen des Werkzeuges.\nAntwort (DE)：Zyklus:\n1. Plastifizieren: Dosieren/Fördern der Schmelze unter Staudruck und Drehzahl.\n2. Einspritzen: Formfüllung; Anspritzpunkt beeinflusst Bindenähte/Faserorientierung.\n3. Umschalten: von Einspritzdruck auf Nachdruck, z. B. weg-/zeit-/druckabhängig.\n4. Abkühlen und Nachdrücken: Volumenschwindung kompensieren bis Siegelzeit.\n5. Entformen.\nWerkzeugfunktionen: Schmelze aufnehmen/verteilen; Formteil ausformen, abkühlen, entformen; Kräfte\naufnehmen; Bewegungen übertragen; Werkzeugteile führen.\n中文题目：描述注塑循环阶段和模具任务。\n中文答案：阶段：塑化、注射充模、切换到保压、冷却+保压补缩、脱模。模具任务：接收并分配熔体、成形冷却脱模、承受锁模/注\n射力、传递运动、导向模具部件。\n出处：Zusammenfassung_Hoffmann.pdf, S.26-27, Kap. 3.5 Spritzgießen."]
["B02 / Bindenaht + Dieseleffekt","Frage (DE)：Erklären Sie Bindenaht und Dieseleffekt beim Spritzgießen (Entstehung, Auswirkungen, Vermeidung).\nAntwort (DE)：Bindenaht:\n- Entsteht, wenn Schmelze um ein Hindernis fließt und zwei Schmelzfronten wieder zusammentreffen.\n- Schwachstelle; bei glasfaserverstärkten Kunststoffen oft nur ca. 50-60% Festigkeit.\n- Lage über Anschnitt beeinflussen, in gering belastete Bereiche legen.\nDieseleffekt:\n- Luft kann nicht entweichen, wird komprimiert, Temperatur steigt, Kunststoff verbrennt.\n- Typisch am Ende des Einspritzvorgangs.\n- Vermeidung: Entlüftungskanäle am Füllende.\n中文题目：解释注塑中的熔接痕和柴油效应。\n中文答案：熔接痕是两股熔体绕过障碍后汇合形成的弱点，玻纤增强材料强度可大幅下降；通过浇口位置控制到低应力区域。柴油效\n应是型腔空气排不出，被压缩升温，导致塑料烧焦；应在充模末端设置排气。\n出处：Zusammenfassung_Hoffmann.pdf, S.27, Kap. 3.5 Spritzgießen - Bindenaht und Dieseleffekt; Schwerpunkte der Prüfung\nFERT.pdf, S.1."]
["B03 / Eigenspannungen: Entstehung und Verteilung","Frage (DE)：Erklären Sie Eigenspannungen: Entstehung, typische Spannungsverteilung über den Querschnitt und Folgen.\nWie kann man sie reduzieren?\nAntwort (DE)：- Eigenspannungen sind Spannungen im Bauteil ohne äußere Kräfte/Momente.\n- Ursachen: Schwindung bei Abkühlung, Entformungsprozesse, Montageprozesse.\n- Beim Abkühlen erstarrt/kristallisiert das Bauteil von außen nach innen: außen Druckeigenspannungen,\ninnen Zugeigenspannungen.\n- Merksatz: Zuerst erstarrt = Druck; plastischer Kern = Zug.\n- Folgen: Überlagerung mit Betriebsspannungen, Verzug, Verformung bei Bearbeitung.\n- Reduktion: Tempern unterhalb TK (Kunststoffe), Spannungsarmglühen (Metalle).\n中文题目：解释残余应力的成因、外压内拉分布口诀、后果与降低方法。\n中文答案：残余应力是在无外力时内部存在的应力。冷却收缩、脱模和装配会产生残余应力。外层先凝固/结晶，所以外层压应力，芯\n部仍塑性/熔融，形成拉应力。口诀：先冻结=压，塑性芯=拉。后果是翘曲、加工变形和与工作载荷叠加。\n出处：Zusammenfassung_Hoffmann.pdf, S.20, Abschnitt Eigenspannungen; Schwerpunkte der Prüfung FERT.pdf, S.1."]
["B04 / Eigenspannungen: Tempern als Gegenmaßnahme","Frage (DE)：Welche Maßnahmen gibt es, um Eigenspannungen in Kunststoffbauteilen zu reduzieren? Erklären Sie Tempern.\nAntwort (DE)：- Eigenspannungen können Verzug und Verformung verursachen.\n- Reduktion bei Kunststoffen: Tempern, also Wärmebehandlung unterhalb der Kristallitschmelztemperatur TK.\n- Ziel: Mobilität erhöhen, innere Spannungen abbauen/reduzieren.\n- Bei Metallen: Spannungsarmglühen.\n- Hinweis: Bei Polymeren können sich Eigenspannungen auch mit der Zeit vermindern; sie werden reduziert,\naber nicht notwendigerweise vollständig eliminiert.\n中文题目：如何降低塑料件中的残余应力？解释 Tempern。\n中文答案：塑料可通过在低于晶体熔融温度 TK 的温区进行退火/回火来降低残余应力，使分子链有一定运动能力并释放内应力。金属\n对应为去应力退火。聚合物残余应力也可能随时间减小，但通常不能保证完全消除。\n出处：Zusammenfassung_Hoffmann.pdf, S.20, Abschnitt Eigenspannungen; 2.3 Urformverfahren für Kunststoffe (Teil 2),\nEigenspannungen."]
["B05 / Formsand: Anforderungen","Frage (DE)：Welche Anforderungen muss Formsand (Formstoff für verlorene Formen) erfüllen?\nAntwort (DE)：Anforderungen:\n1. Detailgetreue Abbildung der Modellkonturen.\n2. Widerstand gegen Transport, metallostatischen Druck und Erosion durch Schmelze.\n3. Temperaturbeständigkeit.\n4. Inert gegenüber Schmelze, ggf. Schlichte.\n5. Gasdurchlässigkeit.\n6. Gute Zerfallseigenschaften nach dem Gießen.\n7. Schadstoffarmut.\n中文题目：型砂需要满足哪些要求？\n中文答案：能精确复制模型轮廓；有足够强度抗运输、金属静压力和冲刷；耐高温；对金属液惰性（可用涂料）；透气；浇后易崩解\n；污染/有害物少。\n出处：Zusammenfassung_Hoffmann.pdf, S.11, Kap. 2.3 Anforderungen an Formstoffe; 2.1 Gießen (Verfahren).txt, Folie 21."]
["B06 / Form- & Kernherstellung / Anforderungen an Formstoffe","Frage (DE)：Beschreiben Sie Form- und Kernherstellung und nennen Sie Anforderungen an Formstoffe: Sand, Kerne und\nDauerformen.\nAntwort (DE)：Form- und Kernherstellung:\n- Physikalische Bindung (tongebundene Formstoffe) und chemische Bindung.\n- Verlorene Formen: Nassgussformverfahren, Kaltharzverfahren/Furanharz, Feingießen; zusätzlich\nVerdichtungsformverfahren und Vakuumformverfahren.\n- Verlorene Kerne: Cold-Box, Hot-Box, meist Kernschießmaschine.\nAnforderungen:\n- Sand: detailgetreu, widerstandsfähig, temperaturbeständig, inert, gasdurchlässig, guter Zerfall,\nschadstoffarm.\n- Kerne: maßgenau, temperaturbeständig, erosionsbeständig, formbeständig, entfernbar/Kernzerfall; für\nInnenkonturen und Hinterschneidungen.\n- Dauerformen: warmfeste Stähle, lange Haltbarkeit, hohe Maßgenauigkeit, hohe Oberflächengüte.\n中文题目：说明造型与制芯方法，并写出型砂、砂芯、永久模的要求。\n中文答案：造型/制芯有物理和化学粘结。一次性砂型包括湿砂、冷硬树脂、精密铸造等；砂芯可用Cold-Box/Hot-Box和射芯机。型砂\n要求透气、耐温、抗冲刷、易崩解；砂芯要求更高精度、耐温、可清除；永久模用热作钢，要求寿命、精度和表面质量。\n出处：Zusammenfassung_Hoffmann.pdf, S.10-11, Kap. 2.2-2.3; 2.1 Gießen (Verfahren).txt, Folien 23-41."]
["B07 / Coldbox vs. Hotbox","Frage (DE)：Vergleichen Sie Cold-Box und Hot-Box Verfahren zur Kernherstellung (Aushärtungsprinzip, Temperatur des\nKernkastens, Ablauf).\nAntwort (DE)：- Beide dienen zur Herstellung verlorener Kerne.\n- Cold-Box: Kernkasten kalt; chemische Reaktion wird durch gasförmigen Katalysator (z. B. Amin) ausgelöst.\nAblauf: Kernkasten schließen, Sand schießen/entlüften, begasen, öffnen. Aushärtezeit wenige Sekunden.\n- Hot-Box: Kernkasten heiß; Formstoff mit organischem/flüssigem Resolharzbinder wird in heißen Kernkasten\ngeschossen und temperaturgesteuert verfestigt.\n中文题目：比较 Cold-Box 与 Hot-Box 制芯。\n中文答案：Cold-Box 用冷芯盒，通过气态催化剂（如胺气）引发固化，速度快；流程为射砂、排气、熏气、开盒取芯。Hot-Box 用加\n热芯盒，含树脂粘结剂的砂射入热芯盒后靠温度固化。\n出处：Zusammenfassung_Hoffmann.pdf/.txt, Kap. 2.2 Form- und Kernherstellung; 2.1 Gießen (Verfahren).txt, Folien 29-41."]
["B08 / Druckguss: Kaltkammer vs. Warmkammer","Frage (DE)：Druckguss: Vergleichen Sie Kaltkammer- und Warmkammer-Druckguss (Schmelzbereitstellung, Aufbau, geeignete\nLegierungen, Begründung).\nAntwort (DE)：- Grundprinzip: Schmelze wird mittels Kolben aus der Gießkammer unter hohem Druck in die Form gepresst;\nNachspeisung durch Druck.\n- Kaltkammer: Schmelze wird je Schuss aus Dosierofen in Gießkammer gefüllt. Geeignet für Al-, Mg-,\nCu-Legierungen. Separate Gießkammer mit Kolben.\n- Warmkammer: Schmelze befindet sich im angeflanschten Warmhalteofen/Tiegel; geeignet für Mg-, Sn-,\nZn-Legierungen, wenn sie Stahlwarmhaltetiegel nicht stark angreifen.\n- Unterschiedsgrund: Gießtemperatur und chemischer Angriff der Schmelze auf Maschine/Tiegel.\n中文题目：比较冷室压铸和热室压铸。\n中文答案：压铸通过柱塞高压把熔体压入模具。冷室：每次从炉中把金属液倒入压射室，适合铝、镁、铜合金。热室：熔体在与机器\n相连的保温炉中，适合镁、锡、锌等对系统侵蚀较小的合金。两者区别主要来自浇注温度和化学侵蚀。\n出处：Zusammenfassung_Hoffmann.pdf, S.15, Kap. 2.4.7 Druckguss; 2.1 Gießen (Verfahren).txt, Folien 147-165."]
["B09 / Lost-Foam: Vorteile","Frage (DE)：Lost-Foam / Vollformguss: Nennen und erläutern Sie Vorteile gegenüber Sand- und Kokillenguss.\nAntwort (DE)：Kurzprinzip: EPS-Modell wird nicht entnommen, sondern beim Gießen vergast; keramische Schlichte,\nbinderfreier Formsand, Verdichtung durch Vibration.\nVorteile:\n1. geringere Gesamtkosten pro Gussstück.\n2. Reduzierung des Gussgewichts.\n3. höhere Produktivität.\n4. weniger/keine Nachbearbeitung.\n5. Integration komplexer Ausführungen, z. B. vorgegossene Löcher.\n6. geringere Wandstärken möglich.\n7. reduzierte Entformschrägen.\n8. Sandwiederverwendung 95-99%, umweltfreundlich.\n中文题目：列举 Lost-Foam 的优点。\n中文答案：Lost-Foam 的EPS泡沫模型不取出，浇注时气化，金属液取代模型。优点：成本低、重量可降低、生产率高、后处理少、可\n集成复杂结构、壁厚更小、拔模斜度更小、砂可高比例回收。\n出处：Zusammenfassung_Hoffmann.pdf, Kap. 2.4.3 Lost Foam Gießverfahren; Zusammenfassung_Hoffmann.txt, Abschnitt 2.4.3."]
["B10 / Gattierung","Frage (DE)：Was versteht man unter Gattierung beim Schmelzen/Gießen?\nAntwort (DE)：Gattierung bedeutet Festlegen bzw. Berechnen der Einsatzstoffe und ihrer Massenanteile (z. B.\nSchrott/Rücklauf, Roheisen, Legierungs- und Korrekturzusätze), um die geforderte chemische Zusammensetzung\nund Qualität der Schmelze zu erreichen.\n中文题目：熔炼/铸造中的 Gattierung 是什么？\n中文答案：Gattierung 是装炉配料：确定炉料种类及比例，例如废料/回炉料、生铁、合金和校正添加物，使熔体达到目标化学成分\n和质量。\n出处：2.1 Gießen (Grundlagen).txt, Folie 20, Abschnitt Schmelzen/Gattierung."]
["B11 / Hinterschneidung/Unterschneidung + Schieber","Frage (DE)：Was versteht man unter einer Hinterschneidung/Unterschneidung und wie löst man das Entformen im\nSpritzgießen?\nAntwort (DE)：- Hinterschneidung: Geometrie, die beim Entformen in Hauptöffnungsrichtung mechanisch hakt; Bauteil kann\nnicht einfach gerade aus der Form gezogen werden.\n- Konstruktionsregel: Hinterschneidungen sind kritisch und sollen möglichst vermieden werden.\n- Lösungen: Schieber/seitliche Werkzeugbewegung, Kernzug/beweglicher Kern, konstruktiv ändern oder Bauteil\nteilen.\n中文题目：什么是倒扣，注塑中如何脱模？\n中文答案：倒扣是在主开模方向上会卡住的结构，零件不能直接脱出。原则上应避免。无法避免时可用滑块/侧抽芯、活动型芯，或通\n过改结构/分件消除倒扣。\n出处：2.3 Urformverfahren für Kunststoffe (Teil 2).txt, Folien 161, 166; Zusammenfassung_Hoffmann.pdf, S.11."]
["B12 / Isotrop vs. anisotrop","Frage (DE)：Was bedeutet isotrop bzw. anisotrop im Kontext Werkstoff-/Bauteileigenschaften?\nAntwort (DE)：- Isotrop: physikalische und mechanische Eigenschaften sind richtungsunabhängig oder nahezu\nrichtungsunabhängig.\n- Anisotrop: Eigenschaften sind stark richtungsabhängig, z. B. Festigkeit, Elastizitätsmodul,\nBruchverhalten.\n- Ursachen bei Kunststoffen: eingefrorene Molekülorientierungen im Prozess, hohe Schergeschwindigkeiten,\nschnelles Abkühlen, Füllstofforientierungen (z. B. Glasfasern).\n中文题目：各向同性和各向异性是什么意思？\n中文答案：各向同性是性能基本不随方向变化；各向异性是性能强烈依赖方向，表现为强度、弹性和断裂行为随方向变化。塑料中常\n由加工中被冻结的分子取向和纤维/填料取向导致。\n出处：Zusammenfassung_Hoffmann.pdf, S.20; 2.1 Gießen (Grundlagen).txt, Folie 54; 2.3 Urformverfahren für Kunststoffe\n(Teil 1), Folie 30."]
["B13 / Orientierungen / Anisotropie","Frage (DE)：Erklären Sie Orientierungen und den Zusammenhang zur Anisotropie (Ursachen im Prozess, Folgen wie\nSchwindung/Verzug).\nAntwort (DE)：- Orientierung: Ausrichtung von Makromolekülen oder Füll-/Verstärkungsstoffen in Fließrichtung.\n- Entstehung durch Fließen/Scheren; schnelles Abkühlen friert Orientierungen ein.\n- Begünstigt durch hohe Schergeschwindigkeiten, niedrige Werkzeugtemperatur, hohe Abkühlgeschwindigkeit\nund niedrige Schmelzetemperatur.\n- Anisotropie ist Folge von Orientierungen: Eigenschaften sind richtungsabhängig.\n- Folgen: unterschiedliche Schwindung, Schrumpfkräfte, Deformationen, Verzug; über Bauteilwand\nunterschiedliche Eigenschaften.\n中文题目：解释取向与各向异性的关系、工艺原因和后果。\n中文答案：取向是分子链/纤维沿流动方向排列。流动和剪切产生取向，快速冷却会将其冻结。高剪切、高冷却速率和低熔体温度会加\n强取向。取向导致各向异性，进一步导致不同方向收缩、翘曲和壁厚方向性能差异。\n出处：Zusammenfassung_Hoffmann.pdf, S.18 und S.20; 2.3 Urformverfahren für Kunststoffe (Teil 1), Folie 40; Teil 2, Folie\n82."]
["B14 / Materialausnutzung MA","Frage (DE)：Wie wird die Materialausnutzung MA (Gussteilausbringung) beim Gießen berechnet? Rechnen Sie ein Beispiel\nohne Taschenrechner.\nAntwort (DE)：Formel:\nMA = M_G / (M_G + M_GS + M_S) * 100%\nM_G = Gussteilmasse, M_GS = Masse Gießsystem, M_S = Masse Speisersystem.\nRechenweg: Einheiten vereinheitlichen, M_G für mehrere Teile aufsummieren, Speiser/Gießsystem addieren,\nBruch vereinfachen.\nBeispiel: 2 Bauteile à 20 kg, je ein Speiser 2500 g, Gießsystem 5 kg.\nM_G = 40 kg, M_S = 5 kg, M_GS = 5 kg, Gesamt = 50 kg -> MA = 40/50 = 80%.\n中文题目：材料利用率 MA 怎么计算？给出无计算器快算例子。\n中文答案：公式：MA = 铸件质量 / (铸件质量 + 浇注系统质量 + 冒口系统质量) * 100%。例：两个20 kg铸件，两个2.5 kg冒口，\n5 kg浇注系统，总质量50 kg，铸件40 kg，MA=80%。\n出处：2.1 Gießen (Grundlagen).txt, Folien 65-66, Abschnitt Materialausnutzung."]
["B15 / Strukturmodelle und Eigenschaften","Frage (DE)：Erklären Sie Strukturmodelle von Kunststoffen (amorph, teilkristallin, TPE, Duroplast) und leiten Sie\ntypische Eigenschaften sowie Tg/TK ab.\nAntwort (DE)：- Kristallinität: Anteil kristalliner/geordneter Bereiche. Amorph = ungeordnet.\n- Tg: Glasübergangstemperatur der amorphen Phase.\n- Amorph: keine geordneten Bereiche, freies Volumen, Ketten verschlauft; geringere Dichte, oft zäher und\ntransparent; kennzeichnend Tg.\n- Teilkristallin: kristalline + amorphe Anteile, höhere Dichte, höhere Festigkeit/Steifigkeit, eher opak;\nTg und TK/TM.\n- TPE: thermoplastisches Elastomer mit Gummielastizität, Verarbeitung weit oberhalb Tg.\n- Duroplast: keine Schmelzverarbeitung wie Thermoplast.\n中文题目：解释塑料结构模型和典型性能。\n中文答案：结晶度是有序晶区比例；无定形为无序。无定形材料密度较低、常透明、主要看Tg。半结晶材料有晶区和无定形区，密度\n和强度/刚度更高，通常不透明，既有Tg也有TK/TM。TPE有橡胶弹性；热固性塑料不能像热塑性塑料那样熔融加工。\n出处：Zusammenfassung_Hoffmann.pdf, S.17, Kap. 3.1 Strukturmodelle und Eigenschaften; 2.3 Urformverfahren für Kunststoffe\n(Teil 1), Folien 5-9.\nFERTIGUNG - Hoffmann Ergänzungs-QA Cards\nC01-C05 | 补充 QA：以 Hoffmann 录音为第一参照，Schwerpunkte/QA 为第二参照。每张卡后附对应 PPT 或 Zusammenfassung 截图。"]
["C01 / Spritzgießen: Werkzeuginnendruck- und QS-Parameter","Frage (DE)：Erklären Sie Werkzeuginnendruck- und QS-Parameter beim Spritzgießen. Warum ist der Werkzeuginnendruck prozess-\nund qualitätsrelevant?\nAntwort (DE)：- Beim Umschalten wird vom Einspritzdruck auf einen niedrigeren Nachdruck gewechselt, z. B. weg-, zeit-,\nhydraulikdruck- oder werkzeuginnendruckabhängig.\n- Wird der Volumenstrom bis zum Ende des Einspritzvorgangs aufrechterhalten, steigt der Werkzeuginnendruck stark an.\n- Zu hoher Werkzeuginnendruck führt zur Gefahr der Überspritzung bzw. Gratbildung.\n- QS/Traceability: Der Werkzeuginnendruck kann mit Sensoren zu 100% überwacht werden.\n- Zusätzlich hängt die benötigte Zuhaltekraft von mittlerem Werkzeuginnendruck und projizierter Formteilfläche ab.\n中文题目：说明注塑中的模腔/模具内压力和质量监控参数。为什么 Werkzeuginnendruck 对工艺和质量重要？\n中文答案：- 切换阶段可按行程、时间、液压压力或模具内压力从注射压力切换到较低保压。\n- 如果充模末端仍保持体积流量，模具内压力会急剧上升。\n- 压力过高会导致过充、飞边/毛边。\n- 质量监控可用传感器 100% 监控 Werkzeuginnendruck，实现 Traceability。\n- 锁模力也与平均模具内压力和投影面积有关。\n出处：Schwerpunkte S.1; 2.3 Urformverfahren für Kunststoffe (Teil 2), S.89/S.105; Zusammenfassung_Hoffmann S.27.\n截图 / Screenshot: PPT Teil 2, S.89 - Umschalten werkzeuginnendruckabhängig\n截图 / Screenshot: PPT Teil 2, S.105 - mittlerer Werkzeuginnendruck / QS"]
["C02 / Spritzgießen: Zykluszeit und Einwirkungsgrößen","Frage (DE)：Wie wird die Zykluszeit bzw. Kühlzeit beim Spritzgießen abgeschätzt und welche Größen beeinflussen sie?\nAntwort (DE)：- Die Zykluszeit wird stark durch die Kühlzeit bestimmt; als Merksatz gilt t = 2 * s².\n- Beispiel: s = 1 mm -> t = 2 s; s = 2 mm -> t = 8 s; s = 4 mm -> t = 32 s.\n- Eine Verdopplung der Wandstärke erhöht die Kühlzeit etwa auf das Vierfache.\n- Einflussgrößen: Wandstärke, Kühlkanäle, Werkzeugmaterial, Kunststoffmaterial, Schmelztemperatur und\nWerkzeugtemperatur.\n- Wandstärke, Schmelztemperatur und Werkzeugtemperatur nach oben verlängern die Kühlzeit; wirksame Kühlkanäle\nverkürzen sie.\n中文题目：注塑周期时间/冷却时间如何估算？哪些因素影响它？\n中文答案：- 周期时间很大程度由冷却时间决定，可用口诀 t = 2 * s² 估算。\n- 例：壁厚 1 mm -> 2 s；2 mm -> 8 s；4 mm -> 32 s。\n- 壁厚翻倍，冷却时间约变为 4 倍。\n- 影响因素包括壁厚、冷却水道、模具材料、塑料材料、熔体温度、模具温度。\n- 壁厚、熔体温度、模具温度升高会延长冷却时间；有效冷却通道会缩短冷却时间。\n出处：Schwerpunkte S.1; 2.3 Urformverfahren für Kunststoffe (Teil 2), S.139 Übungsfragen; Zusammenfassung_Hoffmann S.28.\n截图 / Screenshot: Zusammenfassung_Hoffmann, S.28 - Zykluszeit und Einwirkungsgrößen\n截图 / Screenshot: PPT Teil 2, S.139 - Übungsfrage zur Zykluszeit"]
["C03 / Rheologie: Hooke, Newton und Memory-Effekt","Frage (DE)：Erklären Sie die Analogie zwischen Hookeschem und Newtonschem Gesetz. Was bedeutet viskoelastisches Stoffverhalten\nbzw. Memory-Effekt bei Kunststoffschmelzen?\nAntwort (DE)：- Hookesches Gesetz: Elastische Festkörper zeigen Spannung proportional zur Dehnung; Materialkonstante ist der\nE-Modul.\n- Newtonsches Gesetz: Newtonsche Flüssigkeiten/Gase zeigen Scherspannung proportional zur Schergeschwindigkeit;\ndie Viskosität η ist konstant.\n- Analogie: Eine Belastungsgröße wird über eine Materialkonstante mit einer Verformungs- bzw. Fließantwort verknüpft.\n- Kunststoffschmelzen sind nicht ideal newtonsch, sondern häufig viskoelastisch und strukturviskos.\n- Memory-Effekt: Molekülketten werden beim Fließen aus dem Knäuelzustand orientiert und streben später wieder in den\nKnäuelzustand zurück.\n中文题目：说明 Hooke 定律和 Newton 定律的类比；塑料熔体的黏弹性/记忆效应是什么意思？\n中文答案：- Hooke：弹性固体中应力与应变成正比，材料常数是 E 模量。\n- Newton：牛顿流体中剪应力与剪切速率成正比，黏度 η 为常数。\n- 类比点：都用材料常数把“作用量”和“响应量”联系起来。\n- 塑料熔体通常不是理想牛顿流体，而是黏弹性并常呈结构黏性。\n- Memory-Effekt：分子链在流动中被拉出/取向，之后有回到线团状态的倾向。\n出处：Schwerpunkte S.1; 2.3 Urformverfahren für Kunststoffe (Teil 1), S.27; Fertigung_Hoffmann_2026-05-13 2168s; Zusammenfassung_Hoffmann\nS.21.\n截图 / Screenshot: Zusammenfassung_Hoffmann, S.21 - Hooke/Newton\n截图 / Screenshot: PPT Teil 1, S.27 - viskoelastisch / Rückerinnerung"]
["C04 / Rheologie: strukturviskos, hochviskos und niedrigviskos","Frage (DE)：Erläutern Sie strukturviskoses Fließverhalten einschließlich hochviskoser und niedrigviskoser Kurven. Welche\nProzessfolgen ergeben sich?\nAntwort (DE)：- Strukturviskos bedeutet: Mit steigender Schergeschwindigkeit sinkt die Viskosität η (shear-thinning).\n- Eine hochviskose Kurve liegt im η-γ-Diagramm oberhalb einer niedrigviskosen Kurve; bei gleicher Schergeschwindigkeit\nist η höher.\n- Kunststoffschmelzen sind in der Regel strukturviskos; höhere Durchsätze benötigen daher unterproportional mehr\nDruck.\n- Einflussgrößen: Molmasse/Kettenlänge, Druck, Füllstoffe, Weichmacher, Temperatur und\nSchergeschwindigkeitsbereich.\n- Molmasse/Kettenlänge nach oben erhöht η; Temperatur oder geeignete Prozesswahl können η senken und den\nDurchsatz erleichtern.\n中文题目：说明结构黏性流动，包括高黏/低黏曲线，以及它对工艺的影响。\n中文答案：- 结构黏性指剪切速率升高时黏度下降，也叫 shear-thinning。\n- 高黏曲线在 η-γ 图中位于低黏曲线之上；同一剪切速率下黏度更高。\n- 塑料熔体通常呈结构黏性，所以提高产量时压力需求不是线性等比例增加。\n- 影响因素包括分子量/链长、压力、填料、增塑剂、温度和剪切速率范围。\n- 链长/分子量升高使黏度升高；温度升高或选择合适工艺可降低流动阻力。\n出处：Schwerpunkte S.1; 2.3 Urformverfahren für Kunststoffe (Teil 1), S.21/S.24/S.26; Zusammenfassung_Hoffmann S.22.\n截图 / Screenshot: PPT Teil 1, S.21 - strukturviskos / shear-thinning\n截图 / Screenshot: PPT Teil 1, S.24 - Einflussgrößen auf das Fließverhalten"]
["C05 / Kunststoffe: Nukleierung und Kristallisation","Frage (DE)：Erklären Sie Nukleierung und Kristallisation bei teilkristallinen Thermoplasten. Warum kristallisieren Kunststoffe nie zu\n100%?\nAntwort (DE)：- Kristallisation benötigt Unterkühlung der Schmelze; erst dann können Keime wachsen.\n- Nukleierung bedeutet gezielte Beeinflussung des Kristallgefüges durch geeignete Kristallisationskeime/Fremdkeime.\n- Mehr Keime führen zu feinerem Gefüge und Kristallisation bei höheren Temperaturen; das kann die Zykluszeit\nverkürzen.\n- Polymere kristallisieren nie zu 100% wegen Kettenenden, Verschlaufungen, Rückfaltungen und interlamellaren Ketten.\n- Drei Stufen: Keimbildung, primäre Kristallisation im Werkzeug, sekundäre Kristallisation in der Lagerung.\n中文题目：说明半结晶热塑性塑料中的成核和结晶；为什么塑料不能 100% 结晶？\n中文答案：- 结晶需要熔体过冷；过冷后晶核才能生长。\n- Nukleierung 是通过加入合适晶核/异质晶核来控制结晶组织。\n- 晶核越多，组织越细，并可在较高温度结晶，从而缩短周期时间。\n- 聚合物因链端、缠结、链折返和层间链，不能达到 100% 结晶。\n- 结晶过程可分为成核、模具内一次结晶、储存过程中的二次结晶。\n出处：Schwerpunkte S.1; 2.3 Urformverfahren für Kunststoffe (Teil 1), S.35/S.40; 2.3 Teil 2, S.139 Übungsfragen; Zusammenfassung_Hoffmann\nS.17-S.19.\n截图 / Screenshot: PPT Teil 1, S.35 - Nukleierung / nie 100% / primär-sekundär\n截图 / Screenshot: PPT Teil 1, S.40 - Unterkühlung, Morphologie, Schwindung/Verzug"]
["C06 / Kunststoffe: MFR/MVR-Schmelzindex","Frage (DE)：Was messen MFR und MVR, und wofuer nutzt man den Schmelzindex?\nAntwort (DE)：MFR (Melt Flow Rate) bzw. Schmelzindex gibt an, welche Masse einer Kunststoffschmelze in 10 min bei definierter Temperatur und Pruefkraft durch eine Normduese fliesst. MVR ist die entsprechende Volumenfliessrate; mit der Dichte kann zwischen Volumen und Masse umgerechnet werden.\nZweck: Fließfaehigkeit und Verarbeitbarkeit des Polymeres pruefen, Materialcharge und Lieferantenspezifikation kontrollieren, grobe Auswahl fuer den Verarbeitungsprozess.\nWichtig: MFR ist nur eine Einpunktmessung und ersetzt keine vollstaendige Viskositaetskurve. Beispiel: MFR 190/21,6 = 5 g/10 min.\n中文题目：MFR/MVR 测什么？Schmelzindex 有什么用途？\n中文答案：MFR/熔体质量流动速率表示在规定温度和试验力下，10 分钟内有多少熔体通过标准口模；MVR 是体积流动率，知道密度后可换算质量流动率。\n用途：检查聚合物流动性和加工适用性，验证材料批次/供应商规格，并粗略选择加工工艺窗口。\n注意：MFR 只是单点测量，不能替代完整黏度曲线。例：MFR 190/21,6 = 5 g/10 min。\n出处：neue/2.3 Urformverfahren für Kunststoffe (Teil 1) .pdf S.17-18, S.28；hoffmann（labor）(1).m4a"]
["C07 / Spritzgiessen: Nachdruck, plastische Seele und Siegelzeit","Frage (DE)：Warum ist der Nachdruck beim Spritzgiessen nur bis zur Siegelzeit wirksam?\nAntwort (DE)：Nach der Formfuellung wird vom hohen Einspritzdruck auf einen niedrigeren Nachdruck umgeschaltet. Der Nachdruck soll die Volumenschwindung der abkuehlenden Schmelze ausgleichen.\nWirksam ist er nur, solange ueber Anguss und plastische Seele noch Schmelze in die Kavitaet nachfliessen kann. Ist die Siegelzeit erreicht, friert der Anguss bzw. der Fliessweg ein; danach kann kein Material mehr nachgeschoben werden.\nFolgen fuer die Bauteilqualitaet: Nachdruck und Siegelzeit beeinflussen Schwindung, Verzug, Eigenspannungen und Einfallstellen. Zu spaetes oder falsches Umschalten kann Ueberspritzung bzw. Gratbildung beguenstigen.\n中文题目：为什么注塑中的保压只在 Siegelzeit 之前有效？\n中文答案：模腔充满后，机器从较高的注射压力切换到较低的保压压力。保压的作用是补偿冷却收缩造成的体积损失。\n只有当浇口和所谓的“塑性芯/ plastische Seele”还没有冻结，熔体还能继续补入模腔时，保压才有效。到达 Siegelzeit 后流道封住，再加压也推不进材料。\n它会影响收缩、翘曲、内应力和凹陷；切换点或压力设置不当还可能导致飞边/过充。\n出处：neue/2.3 Urformverfahren für Kunststoffe (Teil 2).pdf S.89；hoffmann6-24（1）.m4a"]
["C08 / Spritzgiessen: Dosieren, Staudruck und Degradation","Frage (DE)：Welche Rolle spielen Staudruck und Schneckendrehzahl beim Plastifizieren/Dosieren?\nAntwort (DE)：Beim Plastifizieren und Dosieren foerdert die Schnecke die Kunststoffschmelze unter Staudruck nach vorne und bereitet die naechste Schussmenge vor.\nEine hoehere Schneckendrehzahl und hoeherer Staudruck verbessern meist die Homogenitaet der Schmelze. Gleichzeitig steigt aber die thermische und mechanische Belastung; bei zu starker Beanspruchung droht Degradation des Polymeres.\nPruefungsgedanke: Nicht nur schneller dosieren, sondern Homogenitaet, Temperaturbelastung und Materialschonung gegeneinander abwaegen.\n中文题目：注塑塑化/计量时，背压和螺杆转速有什么作用？\n中文答案：塑化计量阶段，螺杆在背压下输送和均化熔体，并准备下一次注射量。\n提高螺杆转速和背压通常能改善熔体均匀性，但也会增加热负荷和剪切负荷；过高时可能导致聚合物降解。\n考试要点：不能只追求快，还要在均化、温度负荷和材料保护之间平衡。\n出处：neue/2.3 Urformverfahren für Kunststoffe (Teil 2).pdf S.89；hoffmann6-24（1）.m4a"]

["A09 Reibschweissen / 摩擦焊","Frage (DE)：Beschreiben Sie Reibschweissen und Reibruehrschweissen im Vergleich.\nAntwort (DE)：Rotationsreibschweissen: Relativbewegung erzeugt Reibwaerme; danach Stauchdruck -> Verbindung.\nAblauf: Einspannen -> Relativbewegung -> Reibwaerme -> Plastifizieren -> Stopp/Ausrichten -> Stauchdruck -> Wulst.\nKriterien: mechanische Energie, meist kein Zusatz/Schutzgas, gut fuer rotationssymmetrische Teile.\nReibruehrschweissen: rotierendes Werkzeug plastifiziert und verruehrt den Werkstoff entlang der Naht, typisch Aluminiumbleche.\nAnwendung: Ventile, Wellen, Turbolader, Stahl-Al Gelenkwellen, Al-Blechstrukturen.\nVorteile: reproduzierbar, kurze Zeit, Mischverbindungen moeglich, keine klassische Schmelzbadproblematik.\nNachteile: Geometrie eingeschraenkt, Wulst/Laengenkuerzung, hohe Investition.\nWirtschaftlichkeit: sehr gut fuer Serien von Wellen/Ventilen oder Al-Strukturen.\n中文题目：说明摩擦焊，并和搅拌摩擦焊对比。\n中文答案：旋转摩擦焊：相对运动产生摩擦热，然后施加顶锻压力形成连接。\n流程：装夹 -> 相对运动 -> 摩擦升温 -> 塑化 -> 停止/定位 -> 顶锻 -> 飞边。\n判据：机械能供能，通常无填充/保护气，适合回转对称件。\n搅拌摩擦焊：旋转工具沿焊缝使材料塑化并搅拌，典型用于铝板。\n应用：阀、轴、涡轮件、钢铝传动轴、铝板结构。\n优点：重复性好、节拍短、可做异种材料，避免典型熔池问题。\n缺点：几何受限，有飞边/长度缩短，设备投资高。\n经济性：轴/阀类或铝结构批量生产时优势明显。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![A09 Reibschweissen / 摩擦焊](assets/vogelei/schweissen_2_p86_rotationsreibschweissen_prinzip.png)\n\n![A09 Reibschweissen / 摩擦焊](assets/vogelei/schweissen_2_p93_ruehrreibschweissen_ablauf.png)\n出处：Vogelei_ChatGPT_Answers_Compilation.pdf 回答4 + FT_Skript_2"]
["A10 Loeten / 钎焊","Frage (DE)：Beschreiben Sie Loeten. Wodurch unterscheidet es sich vom Schweissen?\nAntwort (DE)：Definition: Der Grundwerkstoff schmilzt nicht; das Lot schmilzt, benetzt die Oberflaeche und fuellt den Spalt durch Kapillarwirkung.\nAblauf: Reinigen -> Flussmittel/Schutzgas -> Fuegespalt -> Erwaermen -> Lot schmilzt/Benetzung -> Erstarren.\nKriterien: Temperaturklasse; Lot und Flussmittel; Spaltbreite und Benetzung entscheidend.\nAnwendung: Waermetauscher Rohr-Lamellen, Hartmetallschneiden auf Traeger, dichte kleine Verbindungen.\nVorteile: geringe Verformung, Mischverbindungen, dichte Naehte moeglich, niedrigere Temperatur als Schweißen.\nNachteile: Festigkeit/Temperaturbestaendigkeit begrenzt; Spalt und Oberflaeche kritisch.\nWirtschaftlichkeit: gut bei vielen kleinen Fuegestellen in Serie, z.B. Ofenloeten.\n中文题目：说明钎焊，并和焊接区分。\n中文答案：定义：母材不熔化；钎料熔化、润湿表面，并通过毛细作用填充间隙。\n流程：清洁 -> 助焊剂/保护气 -> 留钎缝 -> 加热 -> 钎料熔化/润湿 -> 凝固。\n判据：温度等级、钎料和助焊剂、间隙宽度和润湿性关键。\n应用：换热器管-翅片、硬质合金刀头钎焊、小型密封连接。\n优点：变形小、适合异种材料、可密封、温度低于焊接。\n缺点：强度/耐温有限；间隙和表面非常关键。\n经济性：很多小连接点的批量生产中划算，例如炉钎焊。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![A10 Loeten / 钎焊](assets/vogelei/fuegen_p11_loetspalt_kapillarwirkung.png)\n\n![A10 Loeten / 钎焊](assets/vogelei/fuegen_p12_bindemechanismen_hart_weichloeten.png)\n\n![A10 Loeten / 钎焊](assets/vogelei/fuegen_p13_loeten_benetzung.png)\n出处：Vogelei_ChatGPT_Answers_Compilation.pdf 回答4 + FT_Skript_3"]
["A11 Kleben / 胶接","Frage (DE)：Beschreiben Sie Kleben. Worauf muss man bei der Konstruktion achten?\nAntwort (DE)：Definition: Fuegen durch eine Klebschicht mit Adhaesion an den Oberflaechen und Kohaesion im Klebstoff.\nAblauf: Reinigen -> Oberflaechenvorbereitung -> Klebstoffauftrag -> Klebschichtdicke einstellen -> Fuegen/Ueberlappen -> Aushaerten.\nKriterien: Scher/Druck guenstig, Schaelung vermeiden; Reinigung und Klebschichtdicke entscheidend; Aushaertezeit beachten.\nAnwendung: Karosserie-Klebnaht Dachhaut/Seitenteil, doppelseitiges Klebeband fuer Boden/Teppich, Mischbau.\nVorteile: gleichmaessige Spannungsverteilung, kaum Waermeeintrag, grosse Flaechen und Mischwerkstoffe moeglich.\nNachteile: Oberflaeche kritisch, ZfP eingeschraenkt, Aushaertezeit, Alterung/Medien beachten.\nWirtschaftlichkeit: sinnvoll, wenn Verzug/Nacharbeit teuer waere oder automatisiertes Dosieren moeglich ist.\n中文题目：说明胶接。结构设计时要注意什么？\n中文答案：定义：通过胶层连接，强度来自表面附着力和胶层内聚力。\n流程：清洁 -> 表面处理 -> 涂胶 -> 控制胶层厚度 -> 装配/搭接 -> 固化。\n判据：剪切/压缩有利，避免剥离；清洁和胶层厚度关键；要考虑固化时间。\n应用：车身顶盖/侧围结构胶、地板/地毯双面胶带、异种材料结构。\n优点：应力分布均匀、几乎无热输入、适合大面积和异种材料。\n缺点：表面要求高，无损检测受限，需要固化，老化/介质影响要考虑。\n经济性：当可避免热变形/返工或能自动点胶时有优势。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![A11 Kleben / 胶接](assets/vogelei/fuegen_p58_kleben_bindemechanismen_grenzschichten.png)\n\n![A11 Kleben / 胶接](assets/vogelei/fuegen_p50_kleben_belastungsarten_schael_zug_scher.png)\n出处：Vogelei_ChatGPT_Answers_Compilation.pdf 回答4 + FT_Skript_3"]
["A12 Klebegerechte Konstruktion / 胶接结构优化","Frage (DE)：Eine Klebung wird auf Schaelung belastet. Wie verbessern Sie die Konstruktion?\nAntwort (DE)：Grundsatz: Schaelbelastung vermeiden, Scher- oder Druckbelastung erzeugen.\nMassnahmen: Flaeche vergroessern, Ueberlappung/Huelse/Scarf/Step-lap nutzen, Kanten entlasten, Bauteil steifer machen.\nBei zwei Al-Rundmaterialien axial: nicht nur stumpf auf der Stirnflaeche kleben; besser Huelse oder Zapfen/Ueberlappung, damit die Klebflaeche groesser wird.\nBegruendung: Schaelung konzentriert Spannung an einer Kante; Scherung verteilt Last ueber die Flaeche.\nZusatz: Klebschichtdicke definieren und Oberflaeche reinigen/aktivieren.\n中文题目：胶接受剥离载荷时，如何改进结构？\n中文答案：总原则：避免剥离载荷，尽量让胶层承受剪切或压缩。\n措施：增大面积，采用搭接/套筒/斜接/阶梯搭接，减小边缘应力，提高构件刚度。\n两根铝圆棒轴向连接时：不要只在小端面上对接胶接；更好用套筒或轴/榫搭接来增大胶接面积。\n理由：剥离会把应力集中在边缘；剪切能把载荷分布到面积上。\n补充：控制胶层厚度，并清洁/活化表面。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![A12 Klebegerechte Konstruktion / 胶接结构优化](assets/vogelei/fuegen_p52_klebegerecht_gestalten_schaelen.png)\n\n![A12 Klebegerechte Konstruktion / 胶接结构优化](assets/vogelei/fuegen_p53_klebegerecht_gestalten_scherzug.png)\n\n![A12 Klebegerechte Konstruktion / 胶接结构优化](assets/vogelei/notes_ppt_kleben_zwei_al_rundmaterialien_axial.png)\n出处：Vogelei_ChatGPT_Answers_Compilation.pdf 回答7/10 + FT_Skript_3"]
["A13 Schraubenverbindung / 螺栓连接","Frage (DE)：Beschreiben Sie Schrauben als Fuegeverfahren.\nAntwort (DE)：Kategorie: mechanisches Fuegen, loesbar.\nDefinition: Loesbare Verbindung ueber Gewinde; Kraftschluss ueber Vorspannung.\nAblauf: Bohren/Gewinde -> Schraube einsetzen -> Anziehen -> Vorspannkraft -> Sicherung gegen Losdrehen.\nKriterien: loesbar; punktuelle Kraft; Drehmoment und Vorspannung qualitaetskritisch.\nAnwendung: Getriebegehaeuse-Deckel, Rohrflansch, Baugruppen mit Servicebedarf.\nVorteile: demontierbar, keine Waermeeinflusszone, gut fuer Reparatur/Wartung.\nNachteile: Zusatzteile, Montageaufwand, Lockerungsrisiko, Bohrungen schwaechen Bauteil.\nWirtschaftlichkeit: sinnvoll, wenn Service/Demontage einen Wert hat.\n中文题目：说明螺栓/螺钉连接。\n中文答案：类别：机械连接，可拆。\n定义：通过螺纹形成可拆连接，主要靠预紧力传递载荷。\n流程：钻孔/攻丝 -> 放入螺钉 -> 拧紧 -> 建立预紧力 -> 防松。\n判据：可拆；点状载荷；扭矩和预紧力决定质量。\n应用：变速箱壳体盖、管道法兰、需要维修的组件。\n优点：可拆卸、无热影响区、适合维修维护。\n缺点：需要附加件，装配耗时，有松动风险，孔会削弱零件。\n经济性：需要维护拆装时划算。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：_无对应 PPT 草图 / Keine passende PPT-Skizze gefunden._\n出处：Vogelei_ChatGPT_Answers_Compilation.pdf 回答4"]
["A14 Stanznieten / 自冲铆","Frage (DE)：Beschreiben Sie Stanznieten und nennen Sie typische Anwendungen.\nAntwort (DE)：Kategorie: mechanisches Fuegen, Umformfuegen.\nDefinition: Ein Niet stanzt ohne Vorloch durch das obere Blech und wird im unteren Blech umgeformt.\nAblauf: Ueberlappen -> Positionieren -> Stempel setzt Niet -> Durchsetzen/Umformen -> Schliesskopf -> Qualitaetscheck.\nKriterien: Formschluss/Umformen; Niet als Zusatzteil; gut automatisierbar.\nAnwendung: Karosserie Alu-Stahl-Ueberlappungen, Batterie-Gehaeuse, Mischbau.\nVorteile: keine WEZ, gut fuer beschichtete Bleche und Mischbau, schnell.\nNachteile: Nietkosten/Gewicht, punktfoermig, Dichtheit extra noetig.\nWirtschaftlichkeit: gut fuer Grossserie-Blechbau, wenn Schweissen problematisch ist.\n中文题目：说明自冲铆，并写典型应用。\n中文答案：类别：机械连接，成形连接。\n定义：铆钉无需预孔穿透上板，并在下板中成形锁住。\n流程：搭接 -> 定位 -> 冲头压入铆钉 -> 穿刺/成形 -> 形成锁头 -> 质量检查。\n判据：形状锁合/成形；需要铆钉；易自动化。\n应用：车身铝-钢搭接、电池包壳体、异种材料结构。\n优点：无热影响区，适合涂层板和异种材料，速度快。\n缺点：铆钉成本和重量，点状连接，密封需额外处理。\n经济性：当焊接有问题时，适合薄板大批量生产。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：_无对应 PPT 草图 / Keine passende PPT-Skizze gefunden._\n出处：Vogelei_ChatGPT_Answers_Compilation.pdf 回答4"]
["A15 Definition Schweißen / 焊接定义","Frage (DE)：Definieren Sie den Begriff Schweißen.\nAntwort (DE)：Schweissen ist das unloesbare Verbinden von Bauteilen unter Anwendung von Waerme oder Druck, mit oder ohne Schweisszusatzwerkstoff.\nWichtig: Es ist stoffschluessig; bei Schmelzschweissen wird Grundwerkstoff lokal aufgeschmolzen, bei Press-/Festkoerperverfahren kann die Verbindung ohne grossflaechiges Schmelzen entstehen.\n中文题目：定义 Schweißen（焊接）。\n中文答案：焊接是通过热或压力使零件形成不可拆连接，可使用或不使用焊接填充材料。\n重点：它属于材料结合；熔化焊中母材局部熔化，压力/固相类工艺可在不大面积熔化的情况下连接。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![A15 Definition Schweißen / 焊接定义](assets/vogelei/schweissen_1_p50_lichtbogenhandschweissen_aufbau_detail.png)\n出处：Fertigungstechnologie_Fragestellungen zur Vorlesung.pdf 明确题 + 旧PDF定义"]
["A16 Titan mit Aluminium verbinden / 钛和铝连接","Frage (DE)：Nennen Sie zwei Fuegeverfahren, die geeignet sind, Titan mit Aluminium mit guter Qualitaet zu verbinden.\nAntwort (DE)：Geeignete Verfahren: Kleben und mechanisches Fuegen, z.B. Schrauben, Nieten, Stanznieten oder andere form-/kraftschluessige Verfahren.\nBegruendung: Ti-Al-Schmelzschweissen ist wegen unterschiedlicher thermischer Eigenschaften und sproeder intermetallischer Phasen kritisch.\nKleben vermeidet Aufschmelzen, verteilt Spannung und ist gut fuer Mischbau.\nMechanisches Fuegen vermeidet eine gemeinsame Schmelze und ist reparatur-/kombinationsfreundlich.\n中文题目：说出两种适合高质量连接钛和铝的连接工艺。\n中文答案：合适工艺：胶接和机械连接，例如螺栓、铆接、自冲铆或其他形状/力配合连接。\n理由：Ti-Al 熔焊因热物性差异和脆性金属间化合物而困难。\n胶接避免熔化，能分散应力，适合异种材料结构。\n机械连接不形成共同熔池，也更利于维修或组合连接。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![A16 Titan mit Aluminium verbinden / 钛和铝连接](assets/vogelei/notes_ppt_pruefung_widerstandspunkt_ti_al.png)\n\n![A16 Titan mit Aluminium verbinden / 钛和铝连接](assets/vogelei/notes_ppt_kleben_zwei_al_rundmaterialien_axial.png)\n出处：Fertigungstechnologie_Fragestellungen zur Vorlesung.pdf 明确题 + 旧PDF综合题"]
["A17 Fuegeverfahren vergleichen / 连接工艺比较","Frage (DE)：Vergleichen Sie Fuegeverfahren anhand der Matrix-Kriterien.\nAntwort (DE)：Kriterien: Festigkeit, Qualitaet/Reproduzierbarkeit, Werkstoffvielfalt, Reparierbarkeit, Stumpfstoss-Eignung, flaechenhafte Fuegestelle, Dichtigkeit, Temperatur/Verzug, Prozessdauer, Kosten/Nutzen bei Einzelteil und Massenfertigung.\nBeispiel: Schweissen ist oft fest, aber thermisch kritisch und schwer loesbar. Kleben ist gut fuer Flaeche/Mischbau/Dichtigkeit, aber Oberflaeche und Aushaerten sind kritisch. Schrauben ist loesbar, aber punktuell und mit Zusatzteilen. Stanznieten ist schnell fuer Mischblech, aber punktfoermig und nicht automatisch dicht.\n中文题目：按对比表标准比较连接工艺。\n中文答案：比较标准：强度、质量/重复性、材料适用性、可修复性、对接适用性、大面积连接、密封性、温度/变形、工艺时间、单件和批量的成本收益。\n例子：焊接通常强度高，但热影响明显且难拆；胶接适合大面积/异种材料/密封，但表面和固化关键；螺栓可拆但点状且需附加件；自冲铆适合异种薄板快速连接，但点状且不自带密封。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![A17 Fuegeverfahren vergleichen / 连接工艺比较](assets/vogelei/notes_ppt_fuegeverfahren_vergleich_matrix.png)\n出处：Vogelei_ChatGPT_Answers_Compilation.pdf 对比表 + 最后资料第7页"]
["B01 Additive Fertigung / 3D-Druck 基本原理","Frage (DE)：Was ist Additive Fertigung / 3D-Druck, und wie laeuft der allgemeine Prozess ab?\nAntwort (DE)：3D-Druck ist der gebraeuchliche Name; technisch: additive oder generative Fertigung.\nKernprinzip: aufgestapelte 2D-Technik. Ein 3D-Modell wird in 2D-Schichten geschnitten.\nAblauf: CAD/Scan -> Slicing -> schichtweiser Aufbau -> Entnahme -> Nacharbeit/Qualitaetspruefung.\nMaterialformen: Pulver, Filament/Draht, Fluessigharz, Binder/Materialstrahl.\nTypische Anwendungen: Rapid Prototyping, Tooling, Repair/Ersatzteile.\n中文题目：什么是增材制造/3D 打印？通用流程是什么？\n中文答案：3D 打印是常用名称；工程上称增材制造/生成式制造。\n核心原理：堆叠二维。3D 模型被切成很多 2D 层。\n流程：CAD/扫描 -> 切片 -> 逐层制造 -> 取件 -> 后处理/质量检查。\n材料形态：粉末、丝材/线材、液态树脂、粘结剂/材料喷射。\n典型应用：快速原型、工装、修复/备件。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![B01 Additive Fertigung / 3D-Druck 基本原理](assets/vogelei/trennen_3d_p09_fdm_strangablageverfahren.png)\n\n![B01 Additive Fertigung / 3D-Druck 基本原理](assets/vogelei/trennen_3d_p12_stereolithographie_sla.png)\n\n![B01 Additive Fertigung / 3D-Druck 基本原理](assets/vogelei/trennen_3d_p13_lasersintern_slm_sls.png)\n出处：3D_Druck_Additive_Fertigung_对话回答汇总.pdf 回答5"]
["B02 3D-Druck: Wirtschaftlichkeit und Grenzen / 经济性与限制","Frage (DE)：Wann ist 3D-Druck wirtschaftlich sinnvoll, und wann nicht?\nAntwort (DE)：Sinnvoll: kleine Stueckzahlen, komplexe Geometrie, Innenkanaele, Individualisierung, Prototyping, Tooling, Repair.\nNicht sinnvoll: Millionenstueckzahlen einfacher Geometrie, wenn Spritzguss/Umformen/Zerspanen pro Teil viel schneller und billiger ist.\nWichtig: Das zweite Teil dauert fast so lange wie das erste; Zeit/Kosten skalieren oft nahezu linear.\nQualitaetsgrenze: Porositaeten, Anbindeschwaechen und Restwahrscheinlichkeit; fuer sicherheitskritische Klasse-1-Teile nur mit Prozessueberwachung/Validierung.\n中文题目：什么时候 3D 打印经济，什么时候不经济？\n中文答案：适合：小批量、复杂几何、内部通道、个性化、原型、工装、修复。\n不适合：几百万件简单几何，因为注塑/成形/切削的单件速度和成本更优。\n重点：第二件通常和第一件耗时差不多；时间/成本常接近线性增长。\n质量限制：孔隙、结合弱、残余失效概率；安全关键件必须有过程监控和验证。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![B02 3D-Druck: Wirtschaftlichkeit und Grenzen / 经济性与限制](assets/vogelei/trennen_3d_p09_fdm_strangablageverfahren.png)\n\n![B02 3D-Druck: Wirtschaftlichkeit und Grenzen / 经济性与限制](assets/vogelei/trennen_3d_p13_lasersintern_slm_sls.png)\n出处：3D_Druck_Additive_Fertigung_对话回答汇总.pdf 回答2/5"]
["B03 SLA / Stereolithographie / 光固化","Frage (DE)：Beschreiben Sie SLA als Lieblingsverfahren mit Anwendung und Wirtschaftlichkeit.\nAntwort (DE)：Definition: SLA ist Additive Fertigung durch schichtweises Aushaerten eines fluessigen Kunststoffs.\nAblauf: Harzbad -> Laser scannt Oberflaeche -> Schicht haertet aus -> Plattform/Bauteil sinkt ab -> Harz wird egalisiert -> naechste Schicht.\nMechanismus: kein Schmelzen, sondern lokales Aushaerten durch Licht.\nAnwendung: Rapid Prototyping, Tooling, z.B. Spritzguss-Formhaelften oder Anschauungs-/Urmodelle.\nVorteile: feine Details, gute Oberflaeche, schnell vom CAD zum realen Teil.\nNachteile: Bauzeit, Material/Nachhaerten/Reinigung, nicht fuer grosse Serien.\nWirtschaftlichkeit: kleine Stueckzahlen/Prototypen; bei Millionen Stueck wegen Zeit/Kosten ausschliessen.\n中文题目：把 SLA 作为主攻工艺说明：原理、应用、经济性。\n中文答案：定义：SLA 是通过逐层固化液态塑料/树脂的增材制造。\n流程：树脂槽 -> 激光扫描表面 -> 一层固化 -> 平台/零件下沉 -> 树脂整平 -> 下一层。\n机理：不是熔化，而是光照区域局部固化。\n应用：快速原型、工装，例如注塑模具半边、展示模型/母模。\n优点：细节好、表面质量高、能快速从 CAD 得到实物。\n缺点：制造时间、材料/后固化/清洗问题，不适合大批量。\n经济性：适合小批量/原型；百万级产量因时间和成本应排除。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![B03 SLA / Stereolithographie / 光固化](assets/vogelei/trennen_3d_p12_stereolithographie_sla.png)\n出处：3D_Druck_Additive_Fertigung_对话回答汇总.pdf 回答6 + FT_Skript_4"]
["B04 FDM / Strangablageverfahren / 熔融沉积","Frage (DE)：Beschreiben Sie FDM / Strangablageverfahren.\nAntwort (DE)：Definition: Kunststoffdraht/Filament wird in einer Duese aufgeschmolzen und als Strang abgelegt.\nAblauf: Filament foerdern -> in der Duese schmelzen -> XY-Bahn ablegen -> Schicht erstarrt -> Z-Achse weiter.\nAnwendung: Greifer, Adapter, einfache Vorrichtungen, schnelle Ersatzteile, Prototypen.\nVorteile: guenstig, verbreitet, schnell fuer einfache Prototypen, Materialwechsel einfach.\nNachteile: sichtbare Schichten, anisotrope Festigkeit, Stuetzstrukturen bei Ueberhaengen, begrenzte Genauigkeit/Oberflaeche.\nWirtschaftlichkeit: Quick-Fix und kleine Stueckzahl; Grossserie zu langsam.\n中文题目：说明 FDM/丝材挤出堆叠。\n中文答案：定义：塑料丝材在喷嘴中熔化，然后以熔丝形式沉积。\n流程：送料 -> 喷嘴熔化 -> 按 XY 路径铺放 -> 层冷却凝固 -> Z 方向继续。\n应用：夹爪、适配件、简单工装、快速备件、原型。\n优点：便宜、普及、简单原型速度快、材料更换容易。\n缺点：层纹明显、强度各向异性、悬垂常需支撑、精度/表面有限。\n经济性：适合救急和小批量；大批量太慢。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![B04 FDM / Strangablageverfahren / 熔融沉积](assets/vogelei/trennen_3d_p09_fdm_strangablageverfahren.png)\n出处：3D_Druck_Additive_Fertigung_对话回答汇总.pdf 回答5 + FT_Skript_4"]
["B05 Pulverbett SLS/SLM / 粉床工艺","Frage (DE)：Beschreiben Sie Pulverbettverfahren und nennen Sie den Vorteil bei Ueberhaengen.\nAntwort (DE)：Definition: Eine Pulverschicht wird aufgetragen; Laser oder Elektronenstrahl verbindet nur die Bauteilkontur.\nAblauf: Pulver auftragen -> Energiequelle schmilzt/sintert selektiv -> Plattform sinkt -> neue Schicht -> Entpulvern/Nacharbeit.\nSLS: Sintern. SLM: vollstaendiges Schmelzen, besonders fuer dichte Metallbauteile.\nVorteil Ueberhang: unverschmolzenes Pulver stuetzt die Geometrie.\nAnwendung: komplexe Metallteile, Implantate z.B. Hueftgelenk, Innenkanaele.\nNachteile: Pulverhandling, hohe Anlagekosten, Eigenspannungen, Oberflaechen-/Waermebehandlung.\n中文题目：说明粉床工艺，并解释为什么对悬垂结构有利。\n中文答案：定义：先铺一层粉末，激光或电子束只连接零件截面区域。\n流程：铺粉 -> 能量束选择性熔化/烧结 -> 平台下降 -> 新层 -> 去粉/后处理。\nSLS：烧结。SLM：完全熔化，尤其用于致密金属件。\n悬垂优势：未熔粉末能支撑几何结构。\n应用：复杂金属件、植入物如髋关节、内部通道。\n缺点：粉末处理、设备成本高、残余应力、需要表面/热处理。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![B05 Pulverbett SLS/SLM / 粉床工艺](assets/vogelei/trennen_3d_p13_lasersintern_slm_sls.png)\n出处：3D_Druck_Additive_Fertigung_对话回答汇总.pdf 回答2/5 + FT_Skript_4"]
["B06 Binder Jetting / 3DP / 粘结剂喷射","Frage (DE)：Beschreiben Sie Binder Jetting / 3DP.\nAntwort (DE)：Definition: Pulver wird nicht voll aufgeschmolzen, sondern lokal mit fluessigem Binder verklebt.\nAblauf: Pulver auftragen -> Druckkopf spritzt Binder -> Pulver verklebt lokal -> neue Schicht -> Trocknen/Sintern/Infiltration.\nAnwendung: Guss-Sandkerne/Giesskerne, Formen, Bauteile mit anschliessender Nachbehandlung.\nVorteile: schnell, geringe thermische Belastung, grosse Bauvolumina moeglich.\nNachteile: Gruenteil schwach, Porositaet/Schrumpfung, Festigkeit stark von Nachprozess abhaengig.\nWirtschaftlichkeit: gut fuer komplexe Kerne/Formen und kleine bis mittlere Serien, wenn klassische Kerne teuer sind.\n中文题目：说明 Binder Jetting/3DP。\n中文答案：定义：粉末不是完全熔化，而是用液态粘结剂局部粘住。\n流程：铺粉 -> 喷头喷粘结剂 -> 局部粘结 -> 新层 -> 干燥/烧结/渗透。\n应用：铸造砂芯/型芯、模具、需要后处理的零件。\n优点：速度快、热负荷低、可做较大成形空间。\n缺点：绿坯强度低，有孔隙/收缩，最终强度依赖后处理。\n经济性：复杂砂芯/模具、小到中批量且传统制芯昂贵时合适。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![B06 Binder Jetting / 3DP / 粘结剂喷射](assets/vogelei/trennen_3d_p11_binder_druck_3dp.png)\n出处：3D_Druck_Additive_Fertigung_对话回答汇总.pdf 回答5 + FT_Skript_4"]
["B07 DED / Laserauftragschweissen / 激光熔覆增材","Frage (DE)：Beschreiben Sie DED / Laserauftragschweissen als additives Verfahren.\nAntwort (DE)：Definition: Laser erzeugt ein lokales Schmelzbad; Pulver oder Draht wird zugefuehrt und schichtweise aufgetragen.\nAblauf: Laser fokussieren -> Schmelzbad -> Pulver/Draht zufuehren -> Raupe bilden -> Schichten aufbauen -> Nachbearbeiten.\nAnwendung: Repair, z.B. Turbinenschaufel Material wieder aufbauen; Funktionsschichten/Verschleissschutz.\nVorteile: Reparatur teurer Teile, lokale Materialzugabe, grosse Metallstrukturen moeglich.\nNachteile: geringere Genauigkeit/Oberflaeche als Pulverbett, Waermeeinfluss, Nachbearbeitung noetig.\nWirtschaftlichkeit: gut, wenn Reparatur billiger als Neuteil ist.\n中文题目：说明 DED/激光熔覆作为增材制造。\n中文答案：定义：激光形成局部熔池，粉末或丝材送入并逐层堆积。\n流程：激光聚焦 -> 熔池 -> 送粉/送丝 -> 形成焊道 -> 多层堆积 -> 后加工。\n应用：修复，例如补回涡轮叶片缺失材料；功能层/耐磨层。\n优点：可修复昂贵零件、局部加材、可做较大金属结构。\n缺点：精度/表面低于粉床，有热影响，需要后加工。\n经济性：当修复比换新件便宜时很有优势。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![B07 DED / Laserauftragschweissen / 激光熔覆增材](assets/vogelei/trennen_3d_p15_3d_laser_auftragsschweissen.png)\n出处：3D_Druck_Additive_Fertigung_对话回答汇总.pdf 回答1 + FT_Skript_4"]
["B08 SLA vs FDM vs Pulver / 三类3D工艺对比","Frage (DE)：Vergleichen Sie SLA, FDM und Pulverbett.\nAntwort (DE)：SLA: fluessiges Harz + Laserhaertung; gut fuer Details/Oberflaeche/Modelle.\nFDM: Filament schmelzen und Strang ablegen; guenstig und einfach, aber Schichten/Anisotropie.\nPulverbett: Pulver selektiv sintern/schmelzen; gut fuer komplexe Geometrien und Ueberhaenge.\nWirtschaftlich: alle eher bei kleinen Stueckzahlen, komplexer Geometrie oder Prototyping; nicht fuer Millionen einfacher Teile.\n中文题目：比较 SLA、FDM 和粉床工艺。\n中文答案：SLA：液态树脂 + 激光固化；适合细节、表面和模型。\nFDM：熔化丝材并铺放熔丝；便宜简单，但层纹和各向异性明显。\n粉床：粉末选择性烧结/熔化；适合复杂几何和悬垂结构。\n经济性：三者都更适合小批量、复杂几何或原型；不适合几百万简单件。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![B08 SLA vs FDM vs Pulver / 三类3D工艺对比](assets/vogelei/trennen_3d_p12_stereolithographie_sla.png)\n\n![B08 SLA vs FDM vs Pulver / 三类3D工艺对比](assets/vogelei/trennen_3d_p09_fdm_strangablageverfahren.png)\n\n![B08 SLA vs FDM vs Pulver / 三类3D工艺对比](assets/vogelei/trennen_3d_p13_lasersintern_slm_sls.png)\n出处：3D_Druck_Additive_Fertigung_对话回答汇总.pdf 回答6"]
["C01 Trennen mit einem Strahl / 束流切割总览","Frage (DE)：Welche Strahltrennverfahren wurden behandelt, und wie unterscheiden sie sich?\nAntwort (DE)：Verfahren: autogenes Brennschneiden, Plasmaschneiden, Laserstrahlschneiden, Wasserstrahlschneiden, Drahterodieren.\nUnterscheidung nach Wirkprinzip: Oxidation, Plasma-Schmelzen, Laserenergie, mechanische Erosion durch Wasser/Abrasiv, elektrische Funkenerosion.\nAuswahlkriterien: Werkstoff, Blechdicke, Genauigkeit, Waermeeinfluss, Schnittfuge, Geschwindigkeit, Kosten.\nAnwendungslogik: Laser fuer praezise automatisierte Konturen; Wasserstrahl fuer waermeempfindliche/viele Werkstoffe; Plasma fuer leitfaehige Metalle mittlerer Dicke; Autogen fuer dicke oxidierbare Staehle.\n中文题目：本学期讲到哪些束流切割？怎么区分？\n中文答案：工艺：氧燃气切割、等离子切割、激光切割、水射流切割、线切割电火花。\n按机理区分：氧化反应、等离子熔化、激光能量、水/磨料机械冲蚀、电火花蚀除。\n选择标准：材料、板厚、精度、热影响、切缝、速度、成本。\n应用逻辑：激光适合精密自动化轮廓；水射流适合热敏/多种材料；等离子适合中等厚度导电金属；氧燃气适合厚的可氧化钢。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![C01 Trennen mit einem Strahl / 束流切割总览](assets/vogelei/trennen_3d_p22_trennen_mit_einem_strahl.png)\n\n![C01 Trennen mit einem Strahl / 束流切割总览](assets/vogelei/trennen_3d_p23_mechanisches_schneiden_vergleich.png)\n出处：本学期最后课录音 + FT_Skript_4"]
["C02 Autogenes Brennschneiden / 氧燃气切割","Frage (DE)：Beschreiben Sie autogenes Brennschneiden.\nAntwort (DE)：Prinzip: Stahl wird mit Brennflamme auf Zuendtemperatur erwaermt; Schneidsauerstoff oxidiert Eisen exotherm, Oxide werden aus der Fuge geblasen.\nAblauf: Vorwaermen -> Sauerstoffstrahl -> Oxidation -> Schlacke/Oxide austreiben -> Schnittfuge entsteht.\nAnwendung: dicke unlegierte/niedriglegierte Stahlbleche.\nVorteile: grosse Dicken, einfache Technik, niedrige Kosten.\nNachteile: nur fuer oxidierbare Werkstoffe, grosse WEZ, geringere Genauigkeit, Nacharbeit der Kante.\nWichtig: Nicht 'Flamme schmilzt einfach Metall' schreiben; die Oxidationsreaktion ist entscheidend.\n中文题目：说明氧燃气切割。\n中文答案：原理：先用火焰把钢加热到着火温度；切割氧使铁发生放热氧化，氧化物被吹出切缝。\n流程：预热 -> 氧气射流 -> 氧化 -> 吹出氧化物/熔渣 -> 形成切缝。\n应用：厚的非合金/低合金钢板。\n优点：可切很厚、设备简单、成本低。\n缺点：只适合可氧化材料，热影响区大，精度较低，边缘需后处理。\n重点：不要写成“火焰简单熔化金属”；关键是氧化反应。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![C02 Autogenes Brennschneiden / 氧燃气切割](assets/vogelei/trennen_3d_p27_autogenes_brennschneiden.png)\n出处：本学期最后课录音 + FT_Skript_4"]
["C03 Plasmaschneiden / 等离子切割","Frage (DE)：Beschreiben Sie Plasmaschneiden.\nAntwort (DE)：Prinzip: Ein Lichtbogen ionisiert Gas zu Plasma; der eingeschnuerte Plasmastrahl schmilzt das Material, Plasmagas treibt die Schmelze aus.\nAnwendung: elektrisch leitfaehige Werkstoffe, Stahl, Edelstahl, Aluminium; mittlere bis groessere Dicken.\nVorteile: schneller und flexibler als autogen bei vielen Metallen; fuer Al/Edelstahl besser als Brennschneiden.\nNachteile: thermischer Einfluss, Schnittfuge/Genauigkeit schlechter als Laser, Laerm/Strahlung.\nWirtschaftlichkeit: robuste Produktivloesung fuer Metallbleche, wenn Laserqualitaet nicht noetig ist.\n中文题目：说明等离子切割。\n中文答案：原理：电弧把气体电离成等离子体；收缩的等离子射流熔化材料，等离子气把熔体吹出。\n应用：导电材料，如钢、不锈钢、铝；中等到较大厚度。\n优点：对很多金属比氧燃气更快更灵活；切铝/不锈钢比氧燃气合适。\n缺点：有热影响，切缝/精度低于激光，有噪声和辐射。\n经济性：当不需要激光级精度时，是金属板材的高效方案。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![C03 Plasmaschneiden / 等离子切割](assets/vogelei/trennen_3d_p33_plasmaschneiden.png)\n出处：本学期最后课录音 + FT_Skript_4"]
["C04 Laserstrahlschneiden / 激光切割","Frage (DE)：Beschreiben Sie Laserstrahlschneiden und grenzen Sie es vom Laserstrahlschweissen ab.\nAntwort (DE)：Prinzip: Fokussierter Laser bringt Energie punktuell ein; Material wird geschmolzen/verdampft/oxidiert und durch Schneidgas aus der Fuge entfernt.\nUnterschied zum Schweissen: Beim Schneiden soll Material entfernt und eine Fuge erzeugt werden; beim Schweissen soll Material verbunden werden.\nAnwendung: praezise Blechzuschnitte, komplexe Konturen, automatisierte Fertigung.\nVorteile: hohe Genauigkeit, schmale Schnittfuge, hohe Geschwindigkeit, gut automatisierbar.\nNachteile: hohe Anlagenkosten, Material/Reflexion und Dicke begrenzen, thermischer Einfluss.\nWirtschaftlichkeit: gut bei komplexen Konturen und Serien, wenn hohe Auslastung der Anlage gegeben ist.\n中文题目：说明激光切割，并和激光焊区分。\n中文答案：原理：聚焦激光把能量集中输入；材料熔化/汽化/氧化，并由切割气体从切缝中排出。\n和焊接区别：切割是去除材料并形成切缝；焊接是连接材料。\n应用：精密板材切割、复杂轮廓、自动化生产。\n优点：精度高、切缝窄、速度快、易自动化。\n缺点：设备成本高，受材料反射率和厚度限制，有热影响。\n经济性：复杂轮廓和批量、设备利用率高时划算。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![C04 Laserstrahlschneiden / 激光切割](assets/vogelei/trennen_3d_p39_laserstrahlschneiden.png)\n出处：本学期最后课录音 + FT_Skript_4"]
["C05 Wasserstrahlschneiden / 水射流切割","Frage (DE)：Wann waehlt man Wasserstrahlschneiden?\nAntwort (DE)：Prinzip: Wasser mit sehr hohem Druck tritt aus einer Duese aus; bei harten Werkstoffen wird Abrasivmittel zugemischt. Trennung durch mechanische Erosion.\nAnwendung: temperaturempfindliche Werkstoffe, Stein/Granit, Glas, Keramik, Verbunde, Metalle ohne WEZ.\nVorteile: kaltes Verfahren, kaum Gefuegeveraenderung, sehr breite Werkstoffvielfalt.\nNachteile: langsamer, Abrasiv-/Wasserkosten, Schlamm/Entsorgung, Schnitt kann konisch werden.\nWirtschaftlichkeit: sehr flexibel fuer wechselnde Materialien und Einzelteile; bei extrem hohen Stueckzahlen oft langsamer/teurer.\n中文题目：什么时候选择水射流切割？\n中文答案：原理：超高压水从喷嘴喷出；加工硬材料时加入磨料。靠机械冲蚀完成切割。\n应用：热敏材料、石材/花岗岩、玻璃、陶瓷、复合材料、希望无热影响的金属。\n优点：冷加工，几乎不改变组织，材料适用范围很广。\n缺点：较慢，磨料/水成本，有污泥处理，切口可能有锥度。\n经济性：适合材料变化多和单件/小批量；超大批量时常较慢或较贵。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![C05 Wasserstrahlschneiden / 水射流切割](assets/vogelei/trennen_3d_p48_abrasiv_wasserstrahlschneiden.png)\n出处：本学期最后课录音 + FT_Skript_4"]
["C06 Drahterodieren / 线切割电火花","Frage (DE)：Beschreiben Sie Drahterodieren.\nAntwort (DE)：Prinzip: Ein duenn gespannter Draht dient als Elektrode; Funkenentladungen im Dielektrikum erodieren elektrisch leitfaehiges Material.\nAblauf: Draht fuehren -> Spannung anlegen -> Funken -> lokales Schmelzen/Verdampfen -> Spuelen -> Kontur entsteht.\nAnwendung: Werkzeugbau, Matrizen, harte leitfaehige Werkstoffe, sehr praezise Innen-/Aussenkonturen.\nVorteile: sehr hohe Genauigkeit, kaum mechanische Kraft, Haerte des Werkstoffs weniger kritisch.\nNachteile: nur leitfaehige Werkstoffe, langsam, teure Anlage.\nWirtschaftlichkeit: Spezialverfahren fuer Praezisionskonturen, nicht fuer einfache schnelle Massenschnitte.\n中文题目：说明线切割电火花。\n中文答案：原理：细金属丝作为电极；在介质中发生火花放电，蚀除导电材料。\n流程：导丝 -> 加电压 -> 火花 -> 局部熔化/汽化 -> 冲洗 -> 形成轮廓。\n应用：模具制造、冲模、硬质导电材料、精密内外轮廓。\n优点：精度很高，机械力很小，材料硬度影响较小。\n缺点：只能加工导电材料，速度慢，设备昂贵。\n经济性：适合精密特殊轮廓，不适合简单快速大批量切割。\n对应 PPT 草图 / Zugehoerige PPT-Skizze：![C06 Drahterodieren / 线切割电火花](assets/vogelei/trennen_3d_p55_drahterodieren.png)\n出处：本学期最后课录音 + FT_Skript_4"]
["A18 Wellenloeten / Leiterplatten-Schwallloeten / 波峰焊","Frage (DE)：Wie funktioniert Schwall- bzw. Wellenloeten bei Leiterplatten?\nAntwort (DE)：Beim Wellenloeten werden elektronische Bauteile auf bzw. durch die Leiterplatte gesteckt und die Loetseite der Leiterplatte ueber eine Lotwelle gefuehrt.\nTypischer Ablauf: Flussmittel auftragen, vorwaermen, Kontakt mit der Lotwelle, Benetzung der metallischen Pads/Leiterbahnen, Erstarren des Lotes. Das Lot benetzt vor allem saubere metallische Flaechen; Lack bzw. nichtmetallische Bereiche werden nicht benetzt.\nDas Flussmittel entfernt Oxide und verhindert neue Oxidation, damit ein kleiner Benetzungswinkel und eine tragfaehige Loetverbindung entstehen. Bei Durchkontaktierungen kann das Lot durch Kapillarwirkung in die Bohrung steigen.\n中文题目：电路板波峰焊的过程是什么？\n中文答案：波峰焊中，电子元件先插装到电路板上，电路板的焊接面从熔融焊料波峰上方通过。\n典型步骤：涂覆助焊剂、预热、接触焊料波峰、焊料润湿金属焊盘/导线、冷却凝固。焊料主要润湿干净的金属表面，阻焊漆或非金属区域不会被润湿。\n助焊剂用于去除氧化层并防止再次氧化，从而形成较小润湿角和可靠焊点；通孔中焊料可通过毛细作用上升。\n出处：neue/FT_Skript_3_Fügen_unlocked.pdf S.13, S.15, S.26-27；vogelei6-12(1).m4a"]
["C07 Trennen: mechanisches Schneiden vs. Strahltrennen / 机械剪切与束流切割","Frage (DE)：Wann ist Strahltrennen gegenueber Lochen/Stanzen bzw. mechanischem Schneiden vorteilhaft?\nAntwort (DE)：Mechanisches Schneiden wie Ausschneiden, Lochen, Abschneiden oder Einschneiden arbeitet mit Schneidwerkzeug, Schneidspalt und Schnittkraft. Es ist bei passenden Stueckzahlen sehr produktiv, braucht aber werkzeuggebundene Geometrien.\nStrahltrennen nutzt dagegen einen programmierbaren punkt- oder linienfoermigen Wirkbereich. Vorteile sind hohe Flexibilitaet bei Konturen, geringe Werkzeugbindung, schnelle Geometrieaenderung und Eignung fuer viele Materialien bzw. Dickenbereiche.\nAuswahlkriterien: Stueckzahl, Werkzeugkosten, Material, Dicke, geforderte Schnittkante, Parallelitaet der Schnittflaechen, Waermeeinfluss, Schnittgeschwindigkeit und Nacharbeit.\n中文题目：什么时候束流切割比冲孔/冲裁等机械剪切更合适？\n中文答案：机械剪切依靠剪切工具、剪切间隙和剪切力，适合稳定几何和较高批量，但形状强依赖专用模具。\n束流切割使用可编程的点状或线状作用区，轮廓灵活、几何修改快、模具依赖低，适合多品种、小批量或复杂轮廓。\n选择时看批量、模具成本、材料和厚度、切边质量、切面平行度、热影响、切割速度和后处理需求。\n出处：neue/FT_Skript_4_3D_Trennen_unlocked.pdf S.23, S.48-50；vogelei6-12(1).m4a"]
["C08 Wasserstrahlschneiden: Druck, Abrasiv und Schnittqualitaet / 水射流切割","Frage (DE)：Welche Kerndaten und Vor-/Nachteile hat das Wasserstrahlschneiden?\nAntwort (DE)：Beim Wasserstrahlschneiden wird Wasser mit sehr hohem Druck, in der Vorlesung bis etwa 6000 bar, durch eine Duese beschleunigt. Die Austrittsgeschwindigkeit kann bis ca. 1000 m/s liegen. Fuer harte Werkstoffe kann ein Abrasivmittel zugemischt werden.\nVorteile: nahezu beliebige Richtungen, flexible Konturen, roboterintegrierbar, geeignet fuer viele Materialien wie Kunststoffe, Schaeume, Holz und Metalle; Schnittkantengenauigkeit kann unter 1/10 mm liegen.\nNachteile: nasse Schnittkanten, hohe Investitionskosten, hohe Geraeuschbelastung bis etwa 120 dB; oft ist Schneiden unter Wasser oder mit Schallschutz sinnvoll.\n中文题目：水射流切割的关键参数、优点和缺点是什么？\n中文答案：水射流切割用极高压力的水通过喷嘴形成高速射流，课件中给到最高约 6000 bar，出口速度可达约 1000 m/s。切硬材料时可加入磨料。\n优点：方向和轮廓灵活，可集成机器人，适合塑料、泡沫、木材、金属等多种材料；切边精度可小于 0.1 mm。\n缺点：切边会湿，设备投资高，噪声可达约 120 dB，因此常需要水下切割或隔音措施。\n出处：neue/FT_Skript_4_3D_Trennen_unlocked.pdf S.48-50；vogelei6-12(1).m4a"]
["D01 Automation nach Stueckzahl / 按批量选择自动化程度","Frage (DE)：Wie haengt der sinnvolle Automationsgrad von der Stueckzahl ab?\nAntwort (DE)：Mit steigender Stueckzahl lohnt sich ein hoeherer Automationsgrad, weil Investitionskosten ueber mehr Teile verteilt werden. Bei kleinen Stueckzahlen ist flexible, manuelle oder teilautomatisierte Arbeit oft wirtschaftlicher.\nBei mittleren Stueckzahlen werden programmierbare Loesungen wie Roboter attraktiv. Bei sehr grossen Stueckzahlen koennen fest programmierte oder speziell ausgelegte Anlagen schneller und wirtschaftlicher sein.\nMerke: Automation ist nicht automatisch besser; entscheidend sind Stueckzahl, Flexibilitaet, Taktzeit, Umruestaufwand und Investitionskosten.\n中文题目：为什么自动化程度要按批量选择？\n中文答案：批量越大，自动化投资越容易分摊到单件成本中，因此更高自动化程度更划算。小批量时，人工、半自动或灵活方案往往更经济。\n中等批量时，可编程机器人开始有吸引力；超大批量时，固定程序或专用自动线通常更快、更便宜。\n记忆点：自动化不是越高越好，要同时看批量、柔性、节拍、换型成本和投资。\n出处：neue/FT_Skript_5_Automation_unlocked.pdf S.2；vogelei6-12(1).m4a, vogelei6-19.m4a"]
["D02 Handhabungsgeraete: Manipulator, Einlegegeraet, Roboter / 搬运设备分类","Frage (DE)：Wie werden Handhabungsgeraete in der Automation unterschieden?\nAntwort (DE)：Handhabungsgeraete lassen sich nach Steuerungsart unterscheiden: manuell gesteuert, maschinell gesteuert, fest programmiert oder frei programmierbar.\nEin Manipulator ist typischerweise manuell gefuehrt oder direkt bedient. Ein Einlegegeraet bzw. eine feste Handhabungseinrichtung ist maschinell gesteuert und meist fest programmiert. Ein Roboter, zum Beispiel Pick-and-Place, ist frei programmierbar und dadurch flexibler.\nPruefungslogik: Je freier programmierbar, desto flexibler bei Varianten; je spezieller/fester programmiert, desto hoeher kann bei grossen Serien die Geschwindigkeit und Wirtschaftlichkeit sein.\n中文题目：自动化中的搬运设备如何分类？\n中文答案：搬运设备可按控制方式分为人工控制、机器控制、固定程序控制和自由可编程控制。\nManipulator 通常由人直接引导或操作；Einlegegerät/固定搬运装置通常是机器控制且固定程序；Robot（如 Pick-and-Place）可自由编程，因此柔性更高。\n考试逻辑：自由可编程越强，越适合多变产品；专用和固定程序越强，越适合大批量高速生产。\n出处：neue/FT_Skript_5_Automation_unlocked.pdf S.4；vogelei6-12(1).m4a, vogelei6-19.m4a"]
["D03 Industrieroboter: Aufbau und Kinematik / 工业机器人组成","Frage (DE)：Aus welchen Hauptbestandteilen besteht ein Industrieroboter?\nAntwort (DE)：Ein Industrieroboter ist eine universelle, programmierbare Maschine zur Handhabung, Montage oder Bearbeitung von Werkstuecken.\nHauptbestandteile sind Manipulator bzw. Roboterarm, Steuerung, Effektoren wie Werkzeug oder Greifer und Sensorik. Die Kinematik beschreibt die Achsstruktur, zum Beispiel RRR mit drei rotatorischen Hauptachsen.\nWichtig: Erst der passende Effektor macht den Roboter zur Prozessmaschine, etwa Greifer fuer Pick-and-Place oder Brenner/Werkzeug fuer Schweissen und Bearbeitung.\n中文题目：工业机器人由哪些主要部分组成？\n中文答案：工业机器人是用于搬运、装配或加工工件的通用可编程机器。\n主要组成包括机械手/机器人臂、控制系统、末端执行器（工具或夹爪）和传感器。运动学描述其轴结构，例如 RRR 表示三个主要旋转轴。\n重点：机器人本体只是运动平台，配合正确的末端执行器后，才成为具体工艺设备，如夹爪用于搬运，焊枪/工具用于焊接或加工。\n出处：neue/FT_Skript_5_Automation_unlocked.pdf S.5；vogelei6-19.m4a"]
["D04 Robotereinsatz beim Schutzgasschweissen / 机器人保护气焊应用","Frage (DE)：Warum wird Schutzgasschweissen haeufig mit Robotern automatisiert?\nAntwort (DE)：Beim Schutzgasschweissen muss das Werkzeug entlang einer definierten Bahn mit geeigneter Orientierung, Geschwindigkeit und Abstand gefuehrt werden. Ein Roboter kann diese Bewegung reproduzierbar und mit gleichbleibender Prozessfuehrung ausfuehren.\nDafuer muessen Bahn, Posen, Werkzeugbezugspunkt bzw. TCP und Prozessparameter programmiert werden. Der Effektor ist hier nicht ein Greifer, sondern das Schweisswerkzeug.\nEinordnung: Das Beispiel zeigt, dass Roboter nicht nur fuer Handhabung, sondern auch fuer Bearbeitung und Fuegeprozesse eingesetzt werden koennen.\n中文题目：为什么保护气焊常用机器人自动化？\n中文答案：保护气焊要求焊枪沿规定轨迹，以合适姿态、速度和距离运动。机器人可以重复、稳定地执行这类运动，从而保持过程一致性。\n需要编程轨迹、位姿、工具中心点 TCP 和工艺参数；此时末端执行器不是夹爪，而是焊接工具。\n归类：这个例子说明机器人不仅能搬运，也能用于加工和连接工艺。\n出处：neue/FT_Skript_5_Automation_unlocked.pdf S.5, S.7；vogelei6-19.m4a"]

              <script>
    const STORAGE_KEY = "fv-progress-v1";

    const VALID_CHOICES = new Set(["unknown", "unsure", "known"]);

    const state = {

    const el = {

    function initializeDecks() {

    function currentDeck() {

    function renderDeckChooser() {

    function selectDeck(deckId) {
      const deck = state.decks[deckId];
      if (!deck) return;
      state.deckId = deckId;
      state.cards = deck.cards;
      state.order = buildOrder(state.mode);
      state.index = 0;

      state.pendingChoice = null;

    function showDeckChooser() {
      state.deckId = null;
      state.cards = [];
      state.order = [];

      state.flipped = false;
