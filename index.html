["Was verbessert Reiben - und was kann Reiben nicht verbessern? (Nennen Sie auch typische Reibzugabe.)", "Frage (DE)：Was verbessert Reiben - und was kann Reiben nicht verbessern? (Nennen Sie auch typische Reibzugabe.)\nAntwort (DE)：- Reiben: Aufbohren mit vielschneidiger Reibahle; vorgebohrte Bohrung wird auf Passungsmaß gebracht.\n- Verbessert: Maß-/Passgenauigkeit (typisch IT6-IT7), Oberfläche/Oberflächengüte, Formqualität.\n- Typische Reibzugabe: prüfungsnah 0,1-0,5 mm; Schnittgeschwindigkeit ca. halb so groß wie beim Bohren; ein Durchgang.\n- Kann nicht verbessern: Lagegenauigkeit/Position der Bohrung; eine falsch liegende Bohrung wird durch Reiben nicht korrekt positioniert.\n中文题目：铰孔能改善什么？不能改善什么？并说明典型铰余量。\n中文答案：- 铰孔：用多刃铰刀对预钻孔进行扩孔，使孔达到配合尺寸。\n- 能改善：尺寸/配合精度（典型 IT6-IT7）、表面质量、形状质量。\n- 典型铰余量：考试按 0.1-0.5 mm；切削速度约为钻孔的一半；通常一次通过。\n- 不能改善：孔的位置精度/位置度；孔钻偏了，铰孔不能把位置纠正回来。\n出处：Garber_2025_10_30.txt（老师强调 Reiben 能改善与不能改善的边界）；FT 4 - Bohren - Skript.pdf S.15；05_FT_Bohrverfahren.pdf Abschnitt \"Reiben\"；full.md Abschnitt \"Reiben"]
["Vergleichen Sie Spannschraube, Schrumpffutter und (Hydro-)Dehnspannfutter (Präzision/Handhabung).", "Frage (DE)：Vergleichen Sie Spannschraube, Schrumpffutter und (Hydro-)Dehnspannfutter (Präzision/Handhabung).\nAntwort (DE)：- Spannschraube: einfach/günstig, schnelle Befestigung; einseitige Klemmung → geringere Rundlaufgenauigkeit/Präzision, für hohe Genauigkeit ungünstig.\n- Schrumpffutter: Aufnahme induktiv erwärmen, kalten Werkzeugschaft einsetzen, nach Abkühlen kraftschlüssig gespannt; Präzision sehr gut, Drehmomentübertragung sehr gut, Zugänglichkeit sehr gut; Handhabung nur akzeptabel, weil Aufheizen/Abkühlen/Gerät nötig.\n- (Hydro-)Dehnspannfutter: Betätigungsschraube drückt Öl in Kammer, dünnwandige Aufnahme klemmt Werkzeug; sehr gute Rundlaufgenauigkeit, sehr gute Dämpfung, Handhabung sehr gut; teuer/aufwändig, aber für präzise/dynamisch kritische Bearbeitung gut.\n- Vergleichstabelle: Hydro-Dehnspannfutter und Schrumpffutter jeweils Präzision \"sehr gut\"; Kraftspannfutter \"gut\"; Spannzangenfutter \"akzeptabel\".\n中文题目：比较侧向紧固螺钉刀柄、热缩刀柄和液压胀紧刀柄（精度/操作）。\n中文答案：- 侧向紧固螺钉：简单便宜、装夹快；单侧夹紧导致跳动/精度较差，不适合高精度。\n- 热缩刀柄：感应加热刀柄→插入冷刀柄→冷却后力锁合；精度很高、扭矩传递好、可达性好；但需加热/冷却设备，操作性一般。\n- 液压胀紧刀柄：螺钉压油腔，使薄壁夹套夹紧刀具；跳动精度和阻尼很好，操作方便；成本/结构较高，适合高精度和易振加工。\n- 表格记忆：液压胀紧和热缩精度都是“sehr gut”。\n出处：Garber_2025_10_30.txt（老师讲 Werkzeugaufnahme 对精度影响）；FT 4 - Bohren - Skript.pdf S.20-S.23；full.md Abschnitt \"Futter mit Spannschraube und Schrumpffutter / (Hydro-) Dehnspannfutter / Vergleich von Werkzeugaufnahmen"]
["Definieren Sie Zahnvorschub f_z und geben Sie den Zusammenhang zu f an. Was sagt f_z physikalisch aus?", "Frage (DE)：Definieren Sie Zahnvorschub f_z und geben Sie den Zusammenhang zu f an. Was sagt f_z physikalisch aus?\nAntwort (DE)：- Zusammenhang: f = f_z·z, mit z = Schneidenzahl.\n- f_z: Zahnvorschub, Vorschub pro Zahn/Schneide, Einheit typ. mm/Zahn.\n- f: Vorschub pro Umdrehung, Einheit typ. mm/U.\n- Physikalische Bedeutung: Belastung bzw. Spanabnahme pro Schneide; wichtig für Hauptzeit und Werkzeugbelastung.\n- Prüfungsfalle: f_z nicht direkt in T_H = (L·i)/(n·f) einsetzen; zuerst mit z zu f umrechnen. Vorschubgeschwindigkeit wäre v_f = n·f.\n中文题目：定义齿进给 f_z，写出它与 f 的关系，并说明物理意义。\n中文答案：- 关系：f = f_z·z，z 为刃数。\n- f_z：每齿/每刃进给，单位通常 mm/Zahn。\n- f：每转进给，单位通常 mm/U。\n- 物理意义：每个切削刃承担的进给量/负载，影响切屑厚度、主时间和刀具负荷。\n- 易错点：主时间公式 T_H = (L·i)/(n·f) 里用的是 f，不能直接把 f_z 代进去；要先乘刃数。\n出处：Garber_2025_10_30.txt（老师强调 Zahnvorschub 与 Gesamtvorschub 的区别）；Formelblatt Fertigungstechnik.pdf S.1；FT 4 - Bohren - Skript.pdf S.30；full.md Abschnitt \"Formelblatt Fertigungstechnik - Vollbohren / Aufbohren"]
["Berechnen Sie Drehzahl n, Vorschub f, Hauptzeit T_H und Kosten bei 100 €/h. Gegeben: i=300, d=12 mm, L=50 mm, v_c=150 m/min, f_z=0,1 mm, z=2.", "Frage (DE)：Berechnen Sie Drehzahl n, Vorschub f, Hauptzeit T_H und Kosten bei 100 €/h. Gegeben: i=300, d=12 mm, L=50 mm, v_c=150 m/min, f_z=0,1 mm, z=2.\nAntwort (DE)：- Drehzahl: d=12 mm=0,012 m; v_c = π·d·n ⇒ n = 150/(π·0,012) = 3978,9 min^(-1) ≈ 3980 min^(-1).\n- Vorschub pro Umdrehung: f = f_z·z = 0,1·2 = 0,2 mm/U.\n- Gesamtweg: L·i = 50 mm·300 = 15000 mm.\n- Hauptzeit: T_H = (L·i)/(n·f) = 15000/(3978,9·0,2) = 18,85 min ≈ 18,8 min.\n- Kosten: 18,85/60·100 = 31,4 € → ca. 31 €.\n- Prüfungsfallen: Durchmesser in m für v_c verwenden; f_z erst zu f umrechnen; nur Hauptzeit, Nebenzeiten vernachlässigt; Einheiten sauber angeben.\n中文题目：计算转速 n、每转进给 f、主时间 T_H 和 100 €/h 下的成本。\n中文答案：- 转速：d=12mm=0.012m，n=150/(π·0.012)=3978.9 min^(-1)≈3980 min^(-1)。\n- 每转进给：f=f_z·z=0.1·2=0.2 mm/U。\n- 总进给路程：L·i=50mm·300=15000mm。\n- 主时间：T_H=15000/(3978.9·0.2)=18.85min≈18.8min。\n- 成本：18.85/60·100=31.4€，约 31€。\n- 易错点：计算 v_c 时直径用 m；先把 f_z 乘刃数变成 f；这里只算主时间，不算辅助时间。\n出处：Garber_2025_10_30.txt（老师明确此类 Hauptzeit/Kosten 计算是考试口径并强调只算 Hauptzeit）；FT 4 - Bohren - Skript.pdf S.30；FT 3 - Drehen - Skript.pdf S.22；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"4.4 Hauptzeitberechnung"]
["Begründen Sie, warum die Kosten aus T_H bei Einzelteilen stark unterschätzt werden.", "Frage (DE)：Begründen Sie, warum die Kosten aus T_H bei Einzelteilen stark unterschätzt werden.\nAntwort (DE)：- T_H ist nur die Zeit, in der tatsächlich zerspant wird.\n- Nicht enthalten: Rüsten, Werkstück ein-/ausspannen, Positionieren/Anfahren, Zustellen/Abheben/Rücklauf, Werkzeugwechsel, KSS einschalten, Messen/Prüfen, Reinigen, Handling/Logistik, Programmieren.\n- Bei Einzelteilen/Kleinserien sind Neben- und Rüstzeiten oft größer als die reine Hauptzeit.\n- Maschinenstundensatz bildet nur maschinenabhängige Kosten pro Laufzeit ab; reale Fertigungskosten enthalten zusätzlich variable Kosten, Bedienerlohn, Werkzeuge, Energie/Medien usw.\n- Ergebnis: Kosten = T_H·Stundensatz liefert nur eine Untergrenze/vereinfachte Prüfungsrechnung.\n中文题目：说明为什么用主时间 T_H 算单件成本会严重低估。\n中文答案：- T_H 只表示真正切削的时间。\n- 不包含：装夹、找正、定位/快进、进刀/退刀、回程、换刀、开冷却、测量检验、清理、搬运物流、编程等。\n- 单件/小批量时，辅助时间和准备时间往往比主切削时间还大。\n- 机床小时费率只是按机床运行时间分摊的一部分成本；真实成本还包括人工、刀具、能源、介质等。\n- 所以 Kosten=T_H·Stundensatz 只是考试中的简化下限。\n出处：Garber_2025_10_30.txt（老师口头强调只算 Hauptzeit 会低估真实成本）；FT 3 - Drehen - Skript.pdf S.20-S.21；FT 4 - Bohren - Skript.pdf S.30；full.md Abschnitt \"3.4 Hauptzeit und Fertigungskosten / 4.4 Hauptzeitberechnung"]
["Erklären Sie das Punch-Tap-Verfahren (Ablauf) und nennen Sie Vor-/Nachteile sowie geeignete Werkstoffe.", "Frage (DE)：Erklären Sie das Punch-Tap-Verfahren (Ablauf) und nennen Sie Vor-/Nachteile sowie geeignete Werkstoffe.\nAntwort (DE)：- Bezeichnung: Punch-Tap-Verfahren / Helikal-Gewindeformen.\n- Ablauf 1: Werkzeug hat unten zwei Schneiden; beim Punch/Eintauchen mit leichter Drehung werden zwei spiralförmige Nuten in die Bohrung geräumt.\n- Ablauf 2: Gewindeschneiden tauchen durch diese Nuten ohne Schnittbewegung ein.\n- Ablauf 3: Werkzeug wird um 1/2 Umdrehung gedreht; dadurch wird das gesamte Gewinde fertig geschnitten/geformt.\n- Ablauf 4: Schneiden stehen wieder in den gegenüberliegenden Nuten; Werkzeug kann ohne Schnittbewegung herausgezogen werden.\n- Vorteile: sehr schnell, kurze Hauptzeit, kein vollständiges Ausdrehen wie beim klassischen Gewindebohren.\n- Nachteile: Gewinde besitzt zwei Nuten/Unterbrechungen; Tragfähigkeit in der Praxis nur wenig eingeschränkt, aber als Einschränkung nennen.\n- Werkstoffe: geeignet vor allem gut umformbare/duktile Werkstoffe; spröde oder sehr harte Werkstoffe ungünstig.\n中文题目：解释 Punch-Tap/螺旋螺纹成形工艺的流程，并列出优缺点和适用材料。\n中文答案：- 名称：Punch-Tap 或 Helikal-Gewindeformen。\n- 步骤1：刀具底部有两条切削刃；冲入/进入孔时伴随轻微旋转，在孔壁形成两条螺旋槽。\n- 步骤2：螺纹切削刃通过这些槽进入孔内，不需要正常切削进入。\n- 步骤3：刀具转半圈，完成整个螺纹的切削/成形。\n- 步骤4：切削刃又回到相对的槽内，因此可无切削运动拔出。\n- 优点：速度非常快，主时间短，不像经典攻丝那样必须完整旋出。\n- 缺点：螺纹上有两条槽/中断；实际承载能力通常只小幅降低，但仍是限制。\n- 材料：适合塑性/延展性好的材料；脆性或很硬的材料不适合。\n出处：Garber_2025_10_30.txt（老师讲 Punch-Tap 流程、速度和材料限制）；FT 4 - Bohren - Skript.pdf S.31；full.md Abschnitt \"4.5 Neues Verfahren: Punch Tap"]
  </script>

  <script>
    const STORAGE_KEY = "garber1-progress-v2";
    const REMOVED_LEGACY_NUMBERS = [18, 19, 21];
    const QUIZ_SIZE = 20;
    const STUDY_MODES = {
      sequence: "顺序刷题",
      shuffle: "乱序刷题",
      quiz: "20题测验",
      wrong: "错题库"
    };
    const VALID_CHOICES = new Set(["unknown", "unsure", "known"]);
    const raw = document.getElementById("sourceData").textContent.trim();

    const state = {
      cards: parseDeck(raw),
      order: [],
      index: 0,
      flipped: false,
      pendingChoice: null,
      mode: "sequence",
      lang: "both",
      progress: loadProgress(),
      query: ""
    };

    const el = {
      deckCount: document.getElementById("deckCount"),
      counter: document.getElementById("counter"),
      progressBar: document.getElementById("progressBar"),
      cardInner: document.getElementById("cardInner"),
      questionDe: document.getElementById("questionDe"),
      questionZh: document.getElementById("questionZh"),
      answerGrid: document.getElementById("answerGrid"),
      frontStatus: document.getElementById("frontStatus"),
      backStatus: document.getElementById("backStatus"),
      frontTag: document.getElementById("frontTag"),
      backTag: document.getElementById("backTag"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      answerNextBtn: document.getElementById("answerNextBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      resetBtn: document.getElementById("resetBtn"),
      searchInput: document.getElementById("searchInput"),
      cardList: document.getElementById("cardList"),
      visibleCount: document.getElementById("visibleCount"),
      statSeen: document.getElementById("statSeen"),
      statGood: document.getElementById("statGood"),
      statAgain: document.getElementById("statAgain"),
      statLeft: document.getElementById("statLeft")
    };

    state.order = buildOrder(state.mode);
    bindEvents();
    render();

    function parseDeck(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map((line, index) => {
          const pair = parsePair(line, index);
          const sections = splitSections(pair[1] || "");
          const extras = Object.entries(sections)
            .filter(([key]) => !["Frage (DE)", "Antwort (DE)", "中文题目", "中文答案", "出处", "????", "??"].includes(key))
            .map(([key, value]) => ({ label: key, value }));

          const legacyNumber = legacyCardNumber(index);

          return {
            id: `card-${legacyNumber}`,
            number: index + 1,
            front: pretty(pair[0] || ""),
            questionDe: pretty(sections["Frage (DE)"] || pair[0] || ""),
            answerDe: pretty(sections["Antwort (DE)"] || ""),
            questionZh: pretty(sections["中文题目"] || sections["????"] || ""),
            answerZh: pretty(sections["中文答案"] || sections["????"] || ""),
            source: pretty(sections["出处"] || sections["??"] || ""),
            extras: extras.map(extra => ({ label: extra.label, value: pretty(extra.value) })),
            family: inferFamily(pair[0] || pair[1] || "")
          };
        });
    }

    function parsePair(line, index) {
      try {
        return JSON.parse(line);
      } catch (jsonError) {
        const loose = line.match(/^\["([\s\S]*?)",\s*"([\s\S]*)"\]$/);
        if (loose) {
          return [decodeLooseString(loose[1]), decodeLooseString(loose[2])];
        }
        console.error("??????", index + 1, jsonError, line);
        return [`Karte ${index + 1}`, line];
      }
    }

    function decodeLooseString(value) {
      return String(value)
        .replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
        .replace(/\\n/g, "\n")
        .replace(/\\r/g, "\r")
        .replace(/\\"/g, "\"");
    }

    function legacyCardNumber(index) {
      let number = index + 1;
      REMOVED_LEGACY_NUMBERS.forEach(removed => {
        if (number >= removed) number += 1;
      });
      return number;
    }

    function splitSections(text) {
      const sections = {};
      let current = "";
      text.replace(/\\n/g, "\n").split(/\r?\n/).forEach(rawLine => {
        const line = rawLine.trim();
        if (!line) return;
        const match = line.match(/^(.+?)\uFF1A(.*)$/u);
        if (match && isSectionLabel(match[1].trim())) {
          current = match[1].trim();
          sections[current] = match[2].trim();
        } else if (current) {
          sections[current] += `\n${line}`;
        }
      });
      return sections;
    }

    function isSectionLabel(label) {
      return [
        "Frage (DE)",
        "Antwort (DE)",
        "中文题目",
        "中文答案",
        "出处",
        "Prüfungshinweis (txt)",
        "Hinweis (DE)",
        "Typische Beispiele (DE)",
        "Zahlen (DE, aus Folie)"
      ].includes(label);
    }

    function inferFamily(text) {
      if (/Bohren|Bohr|Aufbohren|Vollbohren|Senken|Reiben|Spiralbohrer|Wendeplattenbohrer|Spitzenwinkel|Spannut|Querschneide|Punch|Tap|Werkzeugaufnahme|Schrumpffutter|Dehnspann|Spannschraube|Zahnvorschub/i.test(text)) {
        return "FT4";
      }
      if (/Dreh|Rohling|Längs|Plandrehen|Rillentiefe|Schneidenradius|Hauptzeit|Kienzle|Schnittkraft|Drehmoment|Zustell|Vorschublänge|Eilgang/i.test(text)) {
        return "FT3";
      }
      if (/Scher|Span|Schneid|Werkzeug|Keil|Schnittgeschwindigkeit|Rauheit|Ra|Rz|Zerspan|Verschleiß|Aufbau|Diffusion|Kolk|VB|SV|KT|KM|α|β|γ/i.test(text)) {
        return "FT2";
      }
      return "FT1";
    }

    function pretty(text) {
      return String(text)
        .replace(/\\\((.*?)\\\)/g, "$1")
        .replace(/[^\S\r\n]+/g, " ")
        .replace(/[ \t]*\n[ \t]*/g, "\n")
        .trim();
    }

    function bindEvents() {
      el.prevBtn.addEventListener("click", () => move(-1));
      el.nextBtn.addEventListener("click", () => move(1));
      el.answerNextBtn.addEventListener("click", advanceAfterAnswer);
      el.shuffleBtn.addEventListener("click", restartCurrentMode);
      el.resetBtn.addEventListener("click", resetProgress);
      el.searchInput.addEventListener("input", event => {
        state.query = event.target.value.trim().toLowerCase();
        renderList();
      });
      document.querySelectorAll("[data-lang]").forEach(button => {
        button.addEventListener("click", () => {
          state.lang = button.dataset.lang;
          document.querySelectorAll("[data-lang]").forEach(item => item.classList.toggle("active", item === button));
          render();
        });
      });
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => answerCard(button.dataset.choice));
      });
      window.addEventListener("keydown", event => {
        if (event.target.matches("input")) return;
        if (event.key === "ArrowRight") {
          move(1);
        } else if (event.key === "ArrowLeft") {
          move(-1);
        }
      });
    }

    function buildOrder(mode) {
      const allCards = state.cards.map((card, index) => ({ card, index }));
      const base = allCards
        .filter(({ card }) => mode !== "wrong" || isWrongActive(card))
        .map(({ index }) => index);

      if (mode === "shuffle") return shuffledCopy(base);
      if (mode === "quiz") return shuffledCopy(base).slice(0, Math.min(QUIZ_SIZE, base.length));
      return base;
    }

    function shuffledCopy(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function modeTag(card) {
      if (state.mode === "wrong") return "错题库";
      const label = STUDY_MODES[state.mode] || "刷题";
      return `${label} · ${card.family}`;
    }

    function restartTitle() {
      return ({
        sequence: "重开顺序刷题",
        shuffle: "重新乱序",
        quiz: "重新抽取20题",
        wrong: "刷新错题库"
      })[state.mode] || "重开当前模式";
    }

    function isWrongActive(card) {
      const record = state.progress[card.id] || {};
      return (record.wrongCount || 0) > 0 && record.rating !== "known";
    }

    function currentCard() {
      if (!state.order.length) return null;
      return state.cards[state.order[state.index]];
    }

    function render() {
      const card = currentCard();
      if (!card) {
        renderEmptyState();
        return;
      }
      const record = state.progress[card.id] || {};
      el.deckCount.textContent = state.cards.length;
      el.counter.textContent = `${state.index + 1} / ${state.order.length}`;
      el.progressBar.style.width = `${((state.index + 1) / state.order.length) * 100}%`;
      el.frontTag.textContent = `${modeTag(card)} · Frage`;
      el.backTag.textContent = `${modeTag(card)} · Antwort`;
      el.frontStatus.textContent = statusText(record.rating);
      el.backStatus.textContent = statusText(record.rating);
      el.answerNextBtn.disabled = false;
      el.prevBtn.disabled = state.order.length <= 1;
      el.nextBtn.disabled = state.order.length <= 1;
      el.shuffleBtn.title = restartTitle();
      el.shuffleBtn.setAttribute("aria-label", el.shuffleBtn.title);
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.disabled = false;
      });

      el.questionDe.innerHTML = renderRichText(card.questionDe || card.front);
      el.questionZh.innerHTML = renderRichText(card.questionZh);
      el.questionDe.classList.toggle("hidden", state.lang === "zh");
      el.questionZh.classList.toggle("hidden", state.lang === "de" || !card.questionZh);

      renderAnswer(card);
      el.cardInner.classList.toggle("flipped", state.flipped);
      renderModeButtons();
      renderList();
      renderStats();
    }

    function renderEmptyState() {
      el.deckCount.textContent = state.cards.length;
      el.counter.textContent = "0 / 0";
      el.progressBar.style.width = "0%";
      const emptyLabel = STUDY_MODES[state.mode] || "刷题";
      el.frontTag.textContent = `${emptyLabel} · Frage`;
      el.backTag.textContent = `${emptyLabel} · Antwort`;
      el.frontStatus.textContent = "无卡片";
      el.backStatus.textContent = "无卡片";
      el.questionDe.innerHTML = renderRichText(state.mode === "wrong" ? "错题库为空" : "没有卡片");
      el.questionZh.innerHTML = renderRichText(state.mode === "wrong" ? "在刷题时点击“不知道”后，这里会出现错题。" : "");
      el.questionDe.classList.remove("hidden");
      el.questionZh.classList.toggle("hidden", !el.questionZh.textContent);
      el.answerGrid.innerHTML = "";
      el.cardInner.classList.remove("flipped");
      el.answerNextBtn.disabled = true;
      el.prevBtn.disabled = true;
      el.nextBtn.disabled = true;
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.disabled = true;
      });
      renderModeButtons();
      renderList();
      renderStats();
    }

    function renderAnswer(card) {
      el.answerGrid.innerHTML = "";
      if (state.lang !== "zh" && card.answerDe) {
        el.answerGrid.appendChild(section("Antwort (DE)", card.answerDe, "answer-de"));
      }
      if (state.lang !== "de" && card.answerZh) {
        el.answerGrid.appendChild(section("中文答案", card.answerZh, "answer-zh"));
      }
      card.extras.forEach(extra => {
        el.answerGrid.appendChild(section(extra.label, extra.value, "extra"));
      });
      if (card.source) {
        const source = document.createElement("div");
        source.className = "source";
        source.innerHTML = renderRichText(`出处：${card.source}`);
        el.answerGrid.appendChild(source);
      }
    }

    function section(label, value, className) {
      const wrap = document.createElement("div");
      wrap.className = `section ${className || ""}`;
      const title = document.createElement("p");
      title.className = "label";
      title.textContent = label;
      const body = document.createElement("p");
      body.innerHTML = renderRichText(value);
      wrap.append(title, body);
      return wrap;
    }

    function renderRichText(value) {
      const normalized = normalizeFormulaText(value);
      return formatFormulaHtml(escapeHtml(normalized)).replace(/\n/g, "<br>");
    }

    function normalizeFormulaText(value) {
      return String(value || "")
        .replace(/\\\((.*?)\\\)/g, "$1")
        .replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, "($1)/($2)")
        .replace(/\\sqrt\{([^{}]+)\}/g, "√($1)")
        .replace(/\\text\{([^}]*)\}/g, "$1")
        .replace(/\\kappa/g, "κ")
        .replace(/\\gamma/g, "γ")
        .replace(/\\alpha/g, "α")
        .replace(/\\beta/g, "β")
        .replace(/\\Delta/g, "Δ")
        .replace(/\\omega/g, "ω")
        .replace(/\\pi/g, "π")
        .replace(/\\mu/g, "µ")
        .replace(/\\cdot/g, "·")
        .replace(/\\times/g, "×")
        .replace(/\\to/g, "→")
        .replace(/\\Rightarrow/g, "⇒")
        .replace(/\\approx/g, "≈")
        .replace(/\\leq?/g, "≤")
        .replace(/\\geq?/g, "≥")
        .replace(/\\sin/g, "sin")
        .replace(/\^\s*\\circ/g, "°")
        .replace(/\\,/g, " ")
        .replace(/[^\S\r\n]+/g, " ")
        .replace(/[ \t]*\n[ \t]*/g, "\n")
        .trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatFormulaHtml(html) {
      let output = html;

      output = output.replace(/\^\(([^()<>]{1,60})\)/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);
      output = output.replace(/\^\{([^{}<>]{1,60})\}/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);
      output = output.replace(/\^([0-9+\-−.,A-Za-zα-ωΑ-Ω]{1,12})/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);

      output = output.replace(/\bkc1[,.]1\b/gi, () => mathVar("k", "c1,1"));
      output = output.replace(/\b([A-Za-zα-ωΑ-Ω])_([A-Za-z0-9α-ωΑ-Ω,.\-−]{1,12})\b/g, (_, base, sub) => mathVar(base, sub));
      output = output.replace(/\b(F|P)_?([cfpa])\b/g, (_, base, sub) => mathVar(base, sub));
      output = output.replace(/\bv_?c\b/g, () => mathVar("v", "c"));
      output = output.replace(/\bv_?f\b/g, () => mathVar("v", "f"));
      output = output.replace(/\bk_?c\b/g, () => mathVar("k", "c"));
      output = output.replace(/\bK_?(ver|sch|gamma|γ|v)\b/g, (_, sub) => mathVar("K", sub === "gamma" ? "γ" : sub));
      output = output.replace(/\bh_?0\b/g, () => mathVar("h", "0"));
      output = output.replace(/\ba_?p\b/g, () => mathVar("a", "p"));
      output = output.replace(/\bm_?c\b/g, () => mathVar("m", "c"));
      output = output.replace(/\bt_?h\b/g, () => mathVar("t", "h"));
      output = output.replace(/\bT_?H\b/g, () => mathVar("T", "H"));
      output = output.replace(/\bf_?z\b/g, () => mathVar("f", "z"));
      output = output.replace(/\bR_?(a|z|t)\b/g, (_, sub) => mathVar("R", sub));
      output = output.replace(/\bL_?(ges|Abschnitt)\b/g, (_, sub) => mathVar("L", sub));
      output = output.replace(/\bl_?([au])\b/g, (_, sub) => mathVar("l", sub));
      output = output.replace(/√\(([^()<>]{1,80})\)/g, (_, radicand) => `<span class="math-sqrt">√(${radicand})</span>`);

      return output;
    }

    function mathVar(base, subscript) {
      return `<span class="math-var">${base}<sub>${subscript}</sub></span>`;
    }

    function renderList() {
      const activeCard = currentCard();
      const baseOrder = state.order;
      const items = baseOrder
        .map((absoluteIndex, queueIndex) => ({ card: state.cards[absoluteIndex], absoluteIndex, queueIndex }))
        .filter(({ card }) => Boolean(card))
        .filter(({ card }) => {
          if (!state.query) return true;
          return [card.questionDe, card.questionZh, card.answerDe, card.answerZh, card.source]
            .join(" ")
            .toLowerCase()
            .includes(state.query);
        });

      el.visibleCount.textContent = `${items.length} / ${baseOrder.length}`;
      el.cardList.innerHTML = "";
      items.forEach(({ card, queueIndex }) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `list-item ${queueIndex === state.index ? "active" : ""}`;
        button.addEventListener("click", () => {
          state.index = queueIndex >= 0 ? queueIndex : 0;
          state.flipped = false;
          state.pendingChoice = null;
          render();
        });

        const title = document.createElement("div");
        title.className = "list-title";
        title.innerHTML = renderRichText(card.questionDe);

        const meta = document.createElement("div");
        meta.className = "list-meta";
        const left = document.createElement("span");
        left.textContent = `队列 ${queueIndex + 1} · ${card.family}`;
        const right = document.createElement("span");
        const record = state.progress[card.id] || {};
        right.textContent = `${statusText(record.rating)}${record.wrongCount ? ` · 错${record.wrongCount}` : ""}`;
        meta.append(left, right);
        button.append(title, meta);
        el.cardList.appendChild(button);
      });
    }

    function renderStats() {
      const records = state.cards.map(card => state.progress[card.id]).filter(Boolean);
      const seen = records.length;
      const good = records.filter(record => record.rating === "known").length;
      const again = state.cards.filter(card => isWrongActive(card)).length;
      el.statSeen.textContent = seen;
      el.statGood.textContent = good;
      el.statAgain.textContent = again;
      el.statLeft.textContent = Math.max(state.cards.length - good, 0);
    }

    function move(delta) {
      if (!state.order.length) return;
      state.pendingChoice = null;
      state.index = (state.index + delta + state.order.length) % state.order.length;
      state.flipped = false;
      render();
    }

    function restartCurrentMode() {
      state.order = buildOrder(state.mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }

    function answerCard(choice) {
      if (!VALID_CHOICES.has(choice)) return;
      const card = currentCard();
      if (!card) return;
      const previous = state.progress[card.id] || {};
      state.progress[card.id] = {
        ...previous,
        rating: choice,
        wrongCount: choice === "unknown" ? (previous.wrongCount || 0) + 1 : (previous.wrongCount || 0),
        reviews: (previous.reviews || 0) + 1,
        updatedAt: new Date().toISOString()
      };
      if (choice === "known") {
        state.progress[card.id].knownAt = new Date().toISOString();
      }
      saveProgress();
      state.pendingChoice = choice;
      state.flipped = true;
      render();
    }

    function advanceAfterAnswer() {
      const choice = state.pendingChoice;
      const currentAbsoluteIndex = state.order[state.index];
      state.pendingChoice = null;

      if (choice === "unsure") {
        scheduleRepeatLater(currentAbsoluteIndex);
      }

      if (state.mode === "wrong" && choice === "known") {
        removeCurrentAndFutureRepeats(currentAbsoluteIndex);
        if (state.index >= state.order.length) state.index = 0;
        state.flipped = false;
        render();
        return;
      }

      if (choice === "known") {
        removeFutureRepeats(currentAbsoluteIndex);
      }

      const finishedRound = state.index >= state.order.length - 1;
      if (state.mode !== "wrong" && finishedRound) {
        continueAfterRound();
        return;
      }

      move(1);
    }

    function continueAfterRound() {
      const wrongOrder = buildOrder("wrong");
      state.flipped = false;
      state.pendingChoice = null;

      if (wrongOrder.length) {
        state.mode = "wrong";
        state.order = wrongOrder;
        state.index = 0;
        render();
        return;
      }

      state.order = buildOrder(state.mode);
      state.index = 0;
      render();
    }

    function scheduleRepeatLater(absoluteIndex) {
      if (typeof absoluteIndex !== "number") return;
      removeFutureRepeats(absoluteIndex);
      const minInsert = Math.min(state.index + 2, state.order.length);
      const insertAt = minInsert + Math.floor(Math.random() * (state.order.length - minInsert + 1));
      state.order.splice(insertAt, 0, absoluteIndex);
    }

    function removeFutureRepeats(absoluteIndex) {
      for (let i = state.order.length - 1; i > state.index; i--) {
        if (state.order[i] === absoluteIndex) {
          state.order.splice(i, 1);
        }
      }
    }

    function removeCurrentAndFutureRepeats(absoluteIndex) {
      for (let i = state.order.length - 1; i >= state.index; i--) {
        if (state.order[i] === absoluteIndex) {
          state.order.splice(i, 1);
        }
      }
    }

    function setMode(mode) {
      if (!Object.prototype.hasOwnProperty.call(STUDY_MODES, mode)) return;
      state.mode = mode;
      state.order = buildOrder(mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }

    function renderModeButtons() {
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === state.mode);
      });
    }

    function statusText(rating) {
      return ({
        unknown: "不知道",
        unsure: "不熟练",
        known: "知道"
      })[rating] || "未复习";
    }

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function resetProgress() {
      state.progress = {};
      localStorage.removeItem(STORAGE_KEY);
      state.order = buildOrder(state.mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }
  </script>
</body>
</html>
