["Skizzieren und erläutern Sie das Verfahrensfenster der Niederhalterkraft über dem Ziehverhältnis β.", "Frage (DE)：Skizzieren und erläutern Sie das Verfahrensfenster der Niederhalterkraft über dem Ziehverhältnis β.\nAntwort (DE)：Diagramm: x=Ziehverhaeltnis beta, y=Niederhalterkraft. Unten Faltenbildung, oben Bodenreisser/Riss, dazwischen Fenster. Mit beta steigend: Mindest-F_N steigt, max. F_N sinkt; bei beta_max Fenster zu.\n中文题目：画出并解释压边力随拉深比β变化的工艺窗口。\n中文答案：横轴β，纵轴压边力FN；下边界是起皱，上边界是底部撕裂、开裂，中间是可加工窗口；β越大，起皱倾向越强，因此最低压边力上升。\n出处：14 - Tiefziehen - Skript.pdf，S.12–13；full.md（14.3 Verfahrensfenster für die Niederhalterkraft；往届题14）；Garber_2025_12_18.txt（老师板书并解释上支下降、下支上升）"]
["Definieren Sie das Ziehverhältnis im Erstzug und nennen Sie typische Grenzwerte.", "Frage (DE)：Definieren Sie das Ziehverhältnis im Erstzug und nennen Sie typische Grenzwerte.\nAntwort (DE)：Erstzug: β1 = d0/d1; d0 = Rondendurchmesser, d1 = Ziehteildurchmesser nach Erstzug; Typische Grenzwerte: β1,max ≈ 2; Weiterzug: β2 = d1/d2, max. ≈ 1,6; Gesamt-Ziehverhältnis βges = β1 · β2 · … · βn, ohne Glühen max. ≈ 6,5.\n中文题目：定义首道拉深比并给出典型极限值。\n中文答案：首拉拉深比β1=d0/d1，其中d0为圆片直径，d1为首拉后工件直径；典型极限：首拉β1最大约2。\n出处：14 - Tiefziehen - Skript.pdf，S.11；Formelblatt Fertigungstechnik.pdf，S.1；full.md（14.2 Tiefziehen – Ziehverhältnis）；Garber_2025_12_18.txt（老师讲β越大越难，β≈2典型极限）"]
["Was ist „Zunder“ und welche Probleme verursacht er beim Schmieden?", "Frage (DE)：Was ist „Zunder“ und welche Probleme verursacht er beim Schmieden?\nAntwort (DE)：Zunder = Oxidschicht auf heissem Stahl. Probleme: schlechte Oberfläche, harte Oxide werden eingearbeitet, Werkzeugverschleiss hoch, Materialverlust bis ca. 3%.\n中文题目：什么是锻造中的氧化皮？它会造成哪些问题？\n中文答案：氧化皮是热钢表面与氧反应形成的氧化层；问题：硬质铁氧化物可能被压入材料，导致表面质量差。\n出处：13 - Schmieden - Skript.pdf，S.5、S.9；full.md（13.2 Grundlagen des Schmiedens：Zunderbildung）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_123338、IMG_20251218_123519（Zunderbildung）"]
["Nennen Sie Maßnahmen gegen Verzunderung.", "Frage (DE)：Nennen Sie Maßnahmen gegen Verzunderung.\nAntwort (DE)：Kurze Warmzeiten, z.B. induktives Erwärmen; geringere Umformtemperaturen, nur begrenzt umsetzbar; Beschichtung der Rohlinge vor dem Erwärmen.\n中文题目：列举减轻锻造氧化皮、氧化损失的措施。\n中文答案：缩短高温停留时间，例如感应加热；降低成形温度，但实施受限。\n出处：13 - Schmieden - Skript.pdf，S.9；full.md（Zunderbildung；往届题17/15：Maßnahmen gegen Verzunderung）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_123338、IMG_20251218_123519（老师高亮kurze Warmzeiten und Beschichtung）"]
["Warum füllt ein Gesenk mit Gratspalt Kavitäten besser als ein offenes Gesenk?", "Frage (DE)：Warum füllt ein Gesenk mit Gratspalt Kavitäten besser als ein offenes Gesenk?\nAntwort (DE)：Offenes Gesenk: geringer seitlicher Fließwiderstand, fehlender Gegendruck → Material fließt seitlich weg, Kavitäten ggf. nicht gefüllt.\n中文题目：为什么带飞边槽的模锻比开放模更容易充满型腔？\n中文答案：开放模侧向流动阻力小，缺少反压，材料容易向侧面流走，型腔可能填不满；带飞边槽时，飞边槽提高侧向流动阻力，使材料内部压力升高，材料被压入型腔，因此充型更好。\n出处：13 - Schmieden - Skript.pdf，S.15；full.md（13.4 Gesenkformschmieden：Offenes Gesenk / Gesenk mit Gratspalt）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_124841（老师板书Spalten）"]
["Nennen Sie Nachteile eines Gesenks mit Gratspalt.", "Frage (DE)：Nennen Sie Nachteile eines Gesenks mit Gratspalt.\nAntwort (DE)：Höhere Kraft auf Gesenke → höherer Werkzeugverschleiß; Abtrennen des Grats = zusätzlicher Arbeitsschritt; Materialverlust durch Grat; dadurch trotz besserer Formfüllung wirtschaftlicher/technischer Nachteil.\n中文题目：列举带飞边槽模锻的缺点。\n中文答案：模具受力更高，工具磨损增加；飞边需要额外切除工序；飞边造成材料损失；因此它虽然改善充型，但带来成本、磨损和材料利用率问题。\n出处：13 - Schmieden - Skript.pdf，S.15；full.md（Gesenk mit Gratspalt：Nachteile）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_124841"]
["Was bedeutet Kalibrieren beim Schmieden und warum erreicht man hohe Genauigkeit?", "Frage (DE)：Was bedeutet Kalibrieren beim Schmieden und warum erreicht man hohe Genauigkeit?\nAntwort (DE)：Kalibrieren = kaltes Nachformen nach Warmumformung. Geringe Umformgrade, endkonturnah; keine Wärmeausdehnung/Schrumpfung/Zunder -> hohe Oberfläche und Maßgenauigkeit, bis ca. IT8.\n中文题目：锻造中的校准（Kalibrieren）是什么意思？为什么精度高？\n中文答案：校准是室温下的冷锻、定尺寸精整，常用于热锻后的后处理；特点是变形量很小，坯件接近最终轮廓。\n出处：13 - Schmieden - Skript.pdf，S.5、S.18、S.22；full.md（Kaltschmieden：Prägen und Kalibrieren；Stadienfolge；Toleranzen）；Garber_2025_12_18.txt; 课堂照片IMG_20251219_125050（老师板书Kalibrieren）"]
["Warum sind Hinterschneidungen problematisch, und wozu dient die Aushebeschräge?", "Frage (DE)：Warum sind Hinterschneidungen problematisch, und wozu dient die Aushebeschräge?\nAntwort (DE)：Hinterschneidungen erschweren Entformen, brauchen geteilte/bewegliche Gesenke -> teuer/komplex. Aushebeschraege erleichtert Auswerfen, verhindert Klemmen und Werkzeugbelastung.\n中文题目：为什么倒扣对模锻不利？脱模斜度有什么作用？\n中文答案：倒扣会使工件难以从简单模具中脱出，通常需要分体、活动模具，导致工具成本和复杂度上升；设计规则是尽量避免倒扣。\n出处：13 - Schmieden - Skript.pdf，S.22–23；full.md（Konstruktive Randbedingungen：keine Hinterschneidungen，Aushebeschrägen；Geteilte Gesenke）；Garber_2025_12_18.txt; 课堂照片IMG_20251219_125132（Hinterschneidung und Aushebeschräge）"]
["Warum ist Tiefziehen ein Zug-Druck-Umformen?", "Frage (DE)：Warum ist Tiefziehen ein Zug-Druck-Umformen?\nAntwort (DE)：Zug: Stempelkraft wird ueber Boden/Zarge als Zugspannung uebertragen. Druck: Flansch fliesst nach innen auf kleineren Umfang -> tangentiale Druckspannungen; ohne Niederhalter Falten.\n中文题目：为什么深拉属于拉-压复合成形？\n中文答案：拉应力来自冲头力通过底部、筒壁传到法兰成形区，筒壁主要承受拉力；压应力来自法兰材料从大直径向小直径流动，切向被压缩，若没有压边圈会起皱。\n出处：14 - Tiefziehen - Skript.pdf，S.3、S.7–8；full.md（Definition；Phase 2：radial gestreckt/tangential gestaucht；Faltenbildung）；Garber_2025_12_18.txt（老师讲Tiefziehen受力与Faltenbildung）"]
["Geben Sie die Kienzle-Schnittkraftformel für \\(F_c\\) an.", "Frage (DE)：Geben Sie die Kienzle-Schnittkraftformel für \\(F_c\\) an.\nAntwort (DE)：\\(F_c = k_{c1,1}\\cdot b\\cdot h\\cdot (h/h_0)^{-m_c}\\cdot k_v\\cdot k_{ver}\\cdot k_\\gamma\\cdot k_{sch}\\). Äquivalent: \\(F_c = k_{c1,1}\\cdot b\\cdot h_0\\cdot (h/h_0)^{1-m_c}\\cdot k_v\\cdot k_{ver}\\cdot k_\\gamma\\cdot k_{sch}\\); \\(b,h,h_0\\) in mm; \\(k_{c1,1}\\) in N/mm²; Ergebnis in N.\n中文题目：写出 Kienzle 切削力公式 \\(F_c\\)。\n中文答案：\\(F_c=k_{c1,1} b h (h/h_0)^{-m_c}\\) 再乘 \\(k_v,k_{ver},k_\\gamma,k_{sch}\\)；也可写成 \\(k_{c1,1} b h_0 (h/h_0)^{1-m_c}\\) 的等价形式。\n出处：Garber_2026_01_08.txt（课堂强调：期末会有 Schnittkraft 计算）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.23–25；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Formelblatt und Kienzle）"]
["Was ist \\(h_0\\) und warum ist \\(h_0 = 1\\,\\text{mm}\\)?", "Frage (DE)：Was ist \\(h_0\\) und warum ist \\(h_0 = 1\\,\\text{mm}\\)?\nAntwort (DE)：\\(h_0\\): Bezugs-Spanungsdicke/Referenzdicke der Kienzle-Gerade; \\(h_0=1\\,\\mathrm{mm}\\), weil \\(k_{c1,1}\\) für \\(b=1\\,\\mathrm{mm}\\) und \\(h=1\\,\\mathrm{mm}\\) definiert ist; \\((h/h_0)\\) muss dimensionslos sein.\n中文题目：\\(h_0\\) 是什么？为什么取 1 mm？\n中文答案：\\(h_0\\) 是 Kienzle 公式中的参考切屑厚度、参考厚度。\n出处：Garber_2026_01_08.txt（板书：h0 = 1 mm!）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.23–24；full.md（Formelblatt Fertigungstechnik）"]
["Wofür stehen \\(k_{ver}, k_v, k_{sch}, k_\\gamma\\)?", "Frage (DE)：Wofür stehen \\(k_{ver}, k_v, k_{sch}, k_\\gamma\\)?\nAntwort (DE)：k_ver: Verschleißzustand; k_v: Schnittgeschwindigkeit; k_sch: Schneidstoff; k_gamma: Spanwinkel. Alle sind Korrekturfaktoren der Kienzle-Schnittkraft.\n中文题目：四个修正因子分别表示什么？\n中文答案：\\(k_{ver}\\)：刀具磨损状态；\\(k_v\\)：切削速度影响；\\(k_{sch}\\)：刀具材料影响。\n出处：Garber_2026_01_08.txt（板书列出四个 k 因子）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.24–25；full.md（Kienzle/公式表）"]
["Skizzieren Sie den Rechenweg zur Berechnung von \\(F_c\\) (Punkteschema).", "Frage (DE)：Skizzieren Sie den Rechenweg zur Berechnung von \\(F_c\\) (Punkteschema).\nAntwort (DE)：1) Geometrie bestimmen: \\(A=a_p f=b h\\), \\(h=f\\sin\\kappa\\), \\(b=a_p/\\sin\\kappa\\); 2) Tabelle: \\(k_{c1,1}\\) und \\(1-m_c\\) bzw. \\(m_c\\); 3) \\(h_0=1\\,\\mathrm{mm}\\), alle Längen in mm; 4) Kienzle-Formel einsetzen; 5) Korrekturfaktoren anwenden.\n中文题目：写出计算 \\(F_c\\) 的标准步骤。\n中文答案：先由几何关系求 \\(h=f\\sin\\kappa\\)、\\(b=a_p/\\sin\\kappa\\)，查表得 \\(k_{c1,1}\\) 与 \\(m_c\\) 或 \\(1-m_c\\)，取 \\(h_0=1\\) mm，统一单位为 mm，再代入 Kienzle 公式并乘修正因子，结果写 N 或 kN。\n出处：Garber_2026_01_08.txt（课堂例题：Schnittkraft 至少会算一次，板书含 Drehmoment）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.21–26；FT 3 - Drehen - Skript.pdf, S.22–24；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Drehen und Kienzle）"]
["Was bedeutet „Additivität des Umformgrades“?", "Frage (DE)：Was bedeutet „Additivität des Umformgrades“?\nAntwort (DE)：Logarithmische Formänderungen beziehungsweise Umformgrade sind additiv: \\(\\varphi_{ges}=\\varphi_1+\\varphi_2+\\dots\\); Gilt für aufeinanderfolgende Umformschritte; technische Dehnungen \\(\\varepsilon\\) sind nicht einfach additiv.\n中文题目：“变形程度可加性”是什么意思？\n中文答案：对数变形/Umformgrad 可以相加：多道次总变形 \\(\\varphi_{ges}=\\varphi_1+\\varphi_2+\\dots\\)。\n出处：Garber_2026_01_08.txt（板书：Additivität des Umformgrades）；11 - Grundlagen Umformen - Skript.pdf, S.21；full.md（Additivität der Formänderung）"]
["Berechnen Sie \\(\\varphi_{ges}\\) für \\(\\varphi_1=0{,}6\\) und \\(\\varphi_2=0{,}3\\).", "Frage (DE)：Berechnen Sie \\(\\varphi_{ges}\\) für \\(\\varphi_1=0{,}6\\) und \\(\\varphi_2=0{,}3\\).\nAntwort (DE)：\\(\\varphi_{ges}=\\varphi_1+\\varphi_2=0{,}6+0{,}3=0{,}9\\); Keine Einheit; nicht multiplizieren.\n中文题目：若 \\(\\varphi_1=0.6\\)、\\(\\varphi_2=0.3\\)，求总变形程度。\n中文答案：\\(\\varphi_{ges}=0.6+0.3=0.9\\)；Umformgrad 是无量纲量；这里按对数变形的可加性相加，不要相乘。\n出处：Garber_2026_01_08.txt（课堂、往届题第10题口径）；11 - Grundlagen Umformen - Skript.pdf, S.21；full.md（Prüfungsaufgabe/Umformgrad）"]
["Definieren Sie das Ziehverhältnis \\(\\beta\\) und nennen Sie typische Grenzwerte.", "Frage (DE)：Definieren Sie das Ziehverhältnis \\(\\beta\\) und nennen Sie typische Grenzwerte.\nAntwort (DE)：Erstzug: \\(\\beta_1=d_0/d_1\\), maximal ca. 2; Weiterzug: \\(\\beta_2=d_1/d_2\\), maximal ca. 1,6; Gesamt: \\(\\beta_{ges}=\\beta_1\\cdot\\beta_2\\cdot...\\cdot\\beta_n\\), ohne Glühen maximal ca. 6,5.\n中文题目：定义深拉比 \\(\\beta\\)，并写出典型极限。\n中文答案：首拉深拉比 \\(\\beta_1=d_0/d_1\\)，最大约 2；继续拉深 \\(\\beta_2=d_1/d_2\\)，最大约 1.6。\n出处：Garber_2026_01_08.txt（课堂提到深拉比极限）；14 - Tiefziehen - Skript.pdf, S.11；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Tiefziehen – Ziehverhältnis）"]
["Warum ist \\(\\beta_{ges}\\) ohne Zwischen-Glühen begrenzt?", "Frage (DE)：Warum ist \\(\\beta_{ges}\\) ohne Zwischen-Glühen begrenzt?\nAntwort (DE)：Kaltverfestigung nimmt mit jedem Zug zu, Umformbarkeit nimmt ab; Zarge muss Stempelkraft übertragen, Gefahr von Bodenreißer beziehungsweise Riss; Zwischen- bzw. Rekristallisationsglühen baut Verfestigung ab und erhöht die weitere Umformbarkeit.\n中文题目：为什么不进行中间退火时总深拉比有限？\n中文答案：每次拉深都会产生冷作硬化，材料继续成形能力下降；壁部、筒壁还要传递冲压力，变形过大时会出现底裂或撕裂；中间再结晶退火能降低硬化、恢复塑性，所以可继续拉深。\n出处：Garber_2026_01_08.txt（课堂说明 ohne Glühen 的限制）；14 - Tiefziehen - Skript.pdf, S.11–13；11 - Grundlagen Umformen - Skript.pdf, S.12、S.18；full.md（Tiefziehen/Umformen）"]
["Begründen Sie, warum das Verfahrensfenster „dreieckig“ verläuft.", "Frage (DE)：Begründen Sie, warum das Verfahrensfenster „dreieckig“ verläuft.\nAntwort (DE)：Mit beta steigend: Ziehkraft/Umformarbeit steigt, zulaessige Zusatzkraft sinkt; zugleich braucht man mehr Niederhalterkraft gegen Falten. Untere Grenze Falten, obere Bodenreisser -> dreieckiges Fenster.\n中文题目：解释为什么压边力工艺窗口呈“三角形”。\n中文答案：深拉比越大，所需变形功和拉深力越大，筒壁可承受的安全余量越小；同时为了防止法兰起皱又需要更高压边力。\n出处：Garber_2026_01_08.txt（课堂解释三角形窗口）；14 - Tiefziehen - Skript.pdf, S.13；full.md（Verfahrensfenster für die Niederhalterkraft）"]
["Nennen Sie die vier Anteile der Ziehkraft \\(F_Z\\).", "Frage (DE)：Nennen Sie die vier Anteile der Ziehkraft \\(F_Z\\).\nAntwort (DE)：F_Z=F_id+F_RR+F_RN+F_B. F_id: ideelle Umformkraft; F_RR: Reibung an Ziehringrundung; F_RN: Reibung Ziehring/Niederhalter; F_B: Biegen/Rueckbiegen.\n中文题目：写出拉深力 \\(F_Z\\) 的四个组成。\n中文答案：\\(F_Z\\) 由四部分组成：理想变形力 \\(F_{id}\\)、拉深圆角处摩擦 \\(F_{RR}\\)、压边区、拉深环与压边圈之间摩擦 \\(F_{RN}\\)、绕圆角弯曲、反弯所需力 \\(F_B\\)。\n出处：Garber_2026_01_08.txt（Tiefziehen 复习口径）；14 - Tiefziehen - Skript.pdf, S.14；full.md（14.3 Ziehkraft）"]
["Was sind die Folgen einer zu kleinen bzw. zu großen Ziehkantenrundung \\(R_R\\)?", "Frage (DE)：Was sind die Folgen einer zu kleinen bzw. zu großen Ziehkantenrundung \\(R_R\\)?\nAntwort (DE)：Zu klein: zusätzliche Dehnung/Biegung am Blech, höhere Kraft, Riss- bzw. Bruchgefahr; Zu groß: Niederhalter wirkt am Ende des Zuges schlechter, Flansch kann ausweichen, Faltenbildung; Bei kleinen Ziehtiefen kann \\(R_R\\) kleiner gewählt werden.\n中文题目：模具拉深圆角 \\(R_R\\) 太小或太大会怎样？\n中文答案：圆角太小会使板料受到额外拉伸、弯曲，力增大，容易开裂；圆角太大时拉深末期压边作用变差，法兰区容易起皱；小拉深深度时可选较小圆角。\n出处：Garber_2026_01_08.txt（课堂、板书：Ziehkantenrundung）；14 - Tiefziehen - Skript.pdf, S.15；full.md（14.3 Ziehkantenrundung）"]
["Warum ist Gegenlauffräsen hinsichtlich Verschleiß und Oberfläche oft ungünstig?", "Frage (DE)：Warum ist Gegenlauffräsen hinsichtlich Verschleiß und Oberfläche oft ungünstig?\nAntwort (DE)：Spandicke beginnt bei 0; Zahn gleitet zuerst über die Oberfläche, bevor Spanbildung einsetzt; Reiben und Drücken statt Schneiden → hoher Freiflächenverschleiß, höhere Wärme, schlechtere Oberfläche; Vorteil nur bei spielbehafteten Vorschubachsen.\n中文题目：为什么逆铣在磨损和表面质量方面通常不利？\n中文答案：逆铣时切屑厚度从 0 开始，刀齿先在表面滑擦，之后才真正切削；因此产生摩擦、挤压、温度上升、后刀面磨损增加，表面质量变差；它的典型适用点只是有间隙的进给轴。\n出处：Garber_2026_01_08.txt（课堂问：Warum Gegenlauffräsen ungünstig）；FT 5 - Fräsen - Skript.pdf, S.5；Fräsverfahren.pdf, Abschnitt Gleich- und Gegenlauf；full.md（5.2 Besonderheiten beim Fräsen）"]
["Begründen Sie die Spanwinkelwahl für Schlichten vs. Schruppen.", "Frage (DE)：Begründen Sie die Spanwinkelwahl für Schlichten vs. Schruppen.\nAntwort (DE)：Schlichten: großer positiver gamma -> Fliessspan, kleine Kräfte, gute Oberfläche, aber schwacher Keil. Schruppen: kleiner/negativer gamma -> stabiler Keil, hohe Kräfte/Standzeit, eher Reissspan.\n中文题目：说明精加工和粗加工时前角如何选择，并给出理由。\n中文答案：精加工选较大正前角：有利于连续切屑、降低切削力、表面更好，但刀楔更弱、磨损和散热不利；粗加工选小前角或负前角：刀楔更稳定，能承受大力并提高寿命。\n出处：Garber_2026_01_08.txt（课堂：Schlichten und Schruppen 的 Spanwinkel 选择）；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.10–13；full.md（Wahl der Keilwinkel）"]
["Welcher Schneidstoff eignet sich für gehärteten Stahl (z.B. HRC ~65) und warum?", "Frage (DE)：Welcher Schneidstoff eignet sich für gehärteten Stahl (z.B. HRC ~65) und warum?\nAntwort (DE)：Geeignet: CBN, ggf. Keramik für gehärteten Stahl/Hartbearbeitung. Grund: hohe Härte, Warmhärte, Verschleißbestaendigkeit. PKD/Diamant bei Stahl kritisch wegen C-Diffusion/chemischem Verschleiß.\n中文题目：加工淬硬钢（如 HRC≈65）应选什么刀具材料？为什么？\n中文答案：考试中优先写 CBN，必要时可写陶瓷用于硬加工；理由是硬度、热硬性和耐磨性高，能承受硬加工中的高温和高力。\n出处：Garber_2026_01_08.txt（课堂：Hartbearbeitung und Schneidstoff）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.4–7；FT 5 - Fräsen - Skript.pdf, S.21；full.md（Schneidstoffe/Hartfräsen）"]
["Was beeinflusst Freiflächenverschleiß stärker: Oberfläche oder Maßhaltigkeit? Begründen.", "Frage (DE)：Was beeinflusst Freiflächenverschleiß stärker: Oberfläche oder Maßhaltigkeit? Begründen.\nAntwort (DE)：Staerker: Maßhaltigkeit. Freiflaechenverschleiss -> VB und Schneidenversatz SV; ohne Nachstellen Maßfehler. Oberfläche kann schlechter werden, ist aber zweitrangig.\n中文题目：后刀面磨损更影响表面还是尺寸精度？说明原因。\n中文答案：更主要影响尺寸精度；后刀面磨损形成磨损带 \\(VB\\)，导致切削刃等效位置偏移 \\(SV\\)，不补偿就会产生尺寸误差。\n出处：Garber_2026_01_08.txt（往届题第3题、课堂强调）；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Freiflächenverschleiß/Prüfungsaufgabe）"]
["Wie berechnen Sie den Umformgrad beim Rückwärtsfließpressen über Flächenverhältnis?", "Frage (DE)：Wie berechnen Sie den Umformgrad beim Rückwärtsfließpressen über Flächenverhältnis?\nAntwort (DE)：Rueckwaertsfliesspressen ueber Flächen: phi=|ln(A1/A0)| bzw. positiv ln(A0/A1). Beim Napf: A0=pi*D0^2/4, A1=pi*(D0^2-Di^2)/4 als Ringquerschnitt.\n中文题目：后向挤压如何用面积比计算变形程度 \\(\\varphi\\)？\n中文答案：挤压中用面积比而不是难算的长度比：\\(\\varphi=|\\ln(A_1/A_0)|\\)，当截面积变小可写成正值 \\(\\ln(A_0/A_1)\\)；杯形后向挤压中，初始截面 \\(A_0=\\pi D_0^2/4\\)，杯壁环形截面 \\(A_1=\\pi(D_0^2-D_i^2)/4\\)。\n出处：Garber_2026_01_08.txt（板书：Napf-Rückwärtsfließpressen，面积比，负号取正值）；12 - Fließpressen - Skript.pdf, S.14–15；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（12.2 Fließpressen und Prüfungsaufgabe）"]
["Verfahrenswahl: Kranhaken – warum Schmieden?", "Frage (DE)：Verfahrenswahl: Kranhaken – warum Schmieden?\nAntwort (DE)：Kranhaken schmieden: sicherheitsrelevant, hohe Festigkeit/Zähigkeit, günstiger Faserverlauf entlang Belastung, bessere dynamische Beanspruchung, weniger Gussfehler/Poren. Bei Serie: Gesenkschmieden + Nachbearbeitung.\n中文题目：工艺选择：起重钩为什么应选锻造？\n中文答案：起重钩是安全关键件，应选锻造而不是铸造：锻造件强度和韧性高，纤维流线可沿实际载荷方向布置，抗动态载荷好，且避免铸造孔隙等缺陷；大批量时可用模锻，之后再精加工。\n出处：Garber_2026_01_08.txt（往届题第11题、课堂口径）；13 - Schmieden - Skript.pdf, S.20–22；full.md（13.5 Faserverlauf und Prüfungsaufgabe）"]
["Berechnen Sie die Hauptzeit \\(T_h\\) beim Drehen (Formel + Einheitenhinweise).", "Frage (DE)：Berechnen Sie die Hauptzeit \\(T_h\\) beim Drehen (Formel + Einheitenhinweise).\nAntwort (DE)：\\(T_h=L\\cdot i/(n\\cdot f)\\); \\(L\\): Vorschublänge inkl; Anlaufweg und Überlaufweg, beim Plandrehen \\(L=d/2+l_a+l_u\\); \\(i\\): Durchgänge; \\(f\\): mm/U.\n中文题目：车削主时间 \\(T_h\\) 怎么算？单位如何避免出错？\n中文答案：\\(T_h=L i/(n f)\\)；\\(L\\) 是进给长度，要加起刀、越程；端面车削时常用 \\(L=d/2+l_a+l_u\\)。\n出处：Garber_2026_01_08.txt（板书例题：L=8 m、f=2 mm、单位陷阱）；FT 3 - Drehen - Skript.pdf, S.19、S.22；Drehverfahren.pdf（Hauptzeit/Definitionen）；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（3.4 Hauptzeit）"]
["Warum ist beim Innenrundschleifen eine „zu große“ Schleifscheibe kritisch?", "Frage (DE)：Warum ist beim Innenrundschleifen eine „zu große“ Schleifscheibe kritisch?\nAntwort (DE)：Zu große Schleifscheibe -> Kontaktlaenge gross, lange Späne, Poren verstopfen, KSS schlecht, Temperatur/Schleifbrand hoch. Richtwert: D_s=0,6...0,8 D_WS.\n中文题目：内圆磨时砂轮过大为什么危险？\n中文答案：砂轮直径过大时接触弧、接触长度过长，会形成长切屑并堵塞气孔，冷却液难进入、切屑和热量难排出，导致温度升高和磨削烧伤、热损伤。\n出处：Garber_2026_01_08.txt（往届题第7题、课堂说明）；FT 8 - Schleifen - Skript.pdf, S.5；07_Vorbereitung_Schleifen.pdf, Schleifverfahren/Innenrundschleifen；full.md（8.1 Innenrundschleifen）"]
["Ein Werkstück wird in zwei Schritten umgeformt. Schritt 1: φ1, Schritt 2: φ2. Wie groß ist der Gesamt-Umformgrad φ_ges?", "Frage (DE)：Ein Werkstück wird in zwei Schritten umgeformt. Schritt 1: φ1, Schritt 2: φ2. Wie groß ist der Gesamt-Umformgrad φ_ges?\nAntwort (DE)：φ_ges = φ1 + φ2; gilt für logarithmische Umformgrade beziehungsweise Formänderungen; normale Dehnungen ε sind nicht additiv.\n中文题目：工件分两步成形：第1步 φ1，第2步 φ2，总变形程度 φ_ges 多大？\n中文答案：φ_ges = φ1 + φ2；这里可加的是对数变形程度、真实应变 φ；普通工程应变 ε 不可直接相加。\n出处：Garber_2026_01_15.txt（老师强调：geschenkter Punkt/kommt praktisch immer）; 11 - Grundlagen Umformen - Skript.pdf S.21 Additivität der Formänderung; full.md: Additivität der Formänderung"]
["Beschreiben Sie die Berechnung der Schnittkraft nach Kienzle ohne Korrekturfaktoren. Welche Zwischengrößen sind punktrelevant?", "Frage (DE)：Beschreiben Sie die Berechnung der Schnittkraft nach Kienzle ohne Korrekturfaktoren. Welche Zwischengrößen sind punktrelevant?\nAntwort (DE)：1) f=v_f/n; 2) A=a_p*f=b*h; 3) h=f*sin(kappa), b=a_p/sin(kappa); 4) k_c1.1 und 1-m_c aus Tabelle; 5) F_c=k_c1.1*b*h0*(h/h0)^(1-m_c), h0=1 mm. Punkte: b, h, Werkstoffzeile, Einheit N.\n中文题目：说明不用修正系数时如何按 Kienzle 计算切削力；哪些中间量是给分点？\n中文答案：步骤：f=v_f/n；A=a_p·f=b·h；h=f·sinκ，b=a_p/sinκ；查k_c1.1和1−m_c；代入F_c=k_c1.1·b·h0·(h/h0)^(1−m_c)。给分点：b、h、材料表行、单位N。\n出处：Garber_2026_01_15.txt（老师强调 b/h 是给分点）; FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.22–26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Drehen Spangeometrie + Kienzle-Formel"]
["Skizzieren Sie den Schneidkeil und benennen Sie Spanfläche und Freifläche sowie γ, β, α.", "Frage (DE)：Skizzieren Sie den Schneidkeil und benennen Sie Spanfläche und Freifläche sowie γ, β, α.\nAntwort (DE)：Skizze in Keilmessebene; Spanfläche = Fläche, über die der Span abläuft; Freifläche = Fläche zur entstehenden Schnittfläche; γ bzw. γ_o = Spanwinkel; β bzw. β_o = Keilwinkel; α bzw. α_o = Freiwinkel; α + β + γ = 90°; Schneidenradius r_β optional markieren.\n中文题目：画出刀具楔形，并标注前刀面、后刀面以及 γ、β、α。\n中文答案：在楔形测量平面画图：Spanfläche 是切屑流过的面；Freifläche 是朝向已加工、形成表面的面。\n出处：Garber_2026_01_15.txt（老师要求能快速画）; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.6–8; full.md: Definitionen des Schneidkeils"]
["Nennen Sie die Spanformen (Fließspan, Scherspan und Reißspan) und ordnen Sie eine typische Oberflächenqualität zu.", "Frage (DE)：Nennen Sie die Spanformen (Fließspan, Scherspan und Reißspan) und ordnen Sie eine typische Oberflächenqualität zu.\nAntwort (DE)：Reissspan/Broeckelspan: spröde Werkstoffe/niedrige v_c, raue Oberfläche. Scherspan/Lamellenspan: duktil, mittlere v_c, mittlere Oberfläche. Fliessspan: hohe v_c, großer gamma, beste Oberfläche, aber lange Späne.\n中文题目：列出流屑、剪切屑、崩碎屑，并说明典型表面质量。\n中文答案：Reißspan/Bröckelspan：脆性材料或低切削速度、小或负前角，表面粗糙；Scherspan：延性材料、中等切削速度，片层状，表面中等。\n出处：Garber_2026_01_15.txt; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.10–13; full.md: Spanformen"]
["Nennen Sie drei Maßnahmen zur Verringerung des Reibungsverschleißes.", "Frage (DE)：Nennen Sie drei Maßnahmen zur Verringerung des Reibungsverschleißes.\nAntwort (DE)：Maßnahmen: KSS einsetzen; harte/glatte Beschichtung; v_c senken bzw. Temperatur senken; geeignete Schneidengeometrie/Spanwinkel. Ziel: Reibung und Temperatur an Span-/Freiflaeche senken.\n中文题目：写出三条降低刀具摩擦磨损的方法。\n中文答案：使用冷却润滑液；使用硬且光滑的涂层。\n出处：Garber_2026_01_15.txt; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.19; full.md: Reibungsverschleiß"]
["Wie berechnen Sie die Hauptzeit t_h beim Drehen? Was ist bei Anfahrweg und Überlaufweg zu beachten?", "Frage (DE)：Wie berechnen Sie die Hauptzeit t_h beim Drehen? Was ist bei Anfahrweg und Überlaufweg zu beachten?\nAntwort (DE)：Standard: t_h = L·i/(n·f); Gewindedrehen: t_h = L·i·g/(n·p); L = l + l_a + l_u; beim Plandrehen l = d/2; bei Werkstück ohne Bund Anfahrweg und Überlaufweg berücksichtigen.\n中文题目：车削主时间 t_h 如何计算？进刀、超程需要注意什么？\n中文答案：普通车削：t_h=L·i/(n·f)；螺纹车削：t_h=L·i·g/(n·p)；总进给长度 L=l+l_a+l_u；端面车削时 l=d/2。\n出处：Garber_2026_01_15.txt; FT 3 - Drehen - Skript.pdf S.19, S.22; Formelblatt Fertigungstechnik.pdf S.1; full.md: Hauptzeit beim Drehen/Anfahrweg und Überlaufweg"]
["Beim Schlichten ist eine Rillentiefe t zulässig. Gegeben Eckenradius Rε. Wie bestimmen Sie den maximalen Vorschub f?", "Frage (DE)：Beim Schlichten ist eine Rillentiefe t zulässig. Gegeben Eckenradius Rε. Wie bestimmen Sie den maximalen Vorschub f?\nAntwort (DE)：Rillentiefe-Geometrie: t = Rε − sqrt(Rε² − (f/2)²); umgestellt: f = sqrt(8·Rε·t − 4·t²) = 2·sqrt(2·Rε·t − t²); Näherung bei t << Rε: t ≈ f²/(8·Rε); Einheitenfalle: t z.B. 0,03 mm einsetzen, nicht 30 µm als 30 mm.\n中文题目：精加工允许沟纹深度 t，已知刀尖圆角半径 Rε，如何求最大进给 f？\n中文答案：使用表面沟纹几何：t=Rε−sqrt(Rε²−(f/2)²)，解得 f=sqrt(8Rεt−4t²)；当 t 远小于 Rε 时可近似 t≈f²/(8Rε)。\n出处：Garber_2026_01_15.txt（老师说明公式在 Formelsammlung）; FT 3 - Drehen - Skript.pdf S.13–15; Formelblatt Fertigungstechnik.pdf S.1; full.md: Rillentiefe beim Längsrunddrehen"]
["Gegeben v_c und Durchmesser d. Wie berechnen Sie die Drehzahl n?", "Frage (DE)：Gegeben v_c und Durchmesser d. Wie berechnen Sie die Drehzahl n?\nAntwort (DE)：v_c = π·d·n; bei d in mm und v_c in m/min: v_c = π·d·n/1000 ⇒ n = 1000·v_c/(π·d); Ergebnis in min^-1; Beim Quer-/Plandrehen ändert sich d während des Prozesses: konstante n → v_c nimmt zur Mitte ab; konstante v_c nur bis Maximaldrehzahl möglich.\n中文题目：已知切削速度 v_c 和直径 d，如何计算转速 n？\n中文答案：若 d 用 mm、v_c 用 m/min，则 v_c=πdn/1000，所以 n=1000v_c/(πd)，单位 min^-1；端面、径向车削时直径不断变化：若转速恒定，越靠近中心 v_c 越小；恒切削速度控制也受最大转速限制。\n出处：Garber_2026_01_15.txt; FT 3 - Drehen - Skript.pdf S.18, S.22; Drehverfahren.pdf Quer-Plandrehen; full.md: Zusammenhänge zwischen Schnittgrößen"]
["Was ist Kolkverschleiß und wie wirkt er sich auf Genauigkeit und Oberfläche aus?", "Frage (DE)：Was ist Kolkverschleiß und wie wirkt er sich auf Genauigkeit und Oberfläche aus?\nAntwort (DE)：Kolkverschleiss = Mulde auf Spanfläche hinter Schneide; Ursache Reibung + Diffusion bei hoher T. Wirkung: Spanablauf/Spanwinkel veraendert, Schneide geschwaecht, Bruchgefahr; Maßhaltigkeit weniger direkt als bei Freiflaechenverschleiss.\n中文题目：什么是月牙洼磨损？它对尺寸精度和表面有什么影响？\n中文答案：月牙洼磨损是在前刀面、刃口后方形成的凹坑，主要由高温下的摩擦和扩散共同造成；用 K=K_T/K_M 评价，极限约 K=0.4。\n出处：Garber_2026_01_15.txt（老师问到影响精度口径）; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Kolkverschleiß"]
["Ordnen Sie HSS, Hartmetall, Keramik, CBN und PKD qualitativ nach Schnittgeschwindigkeit und Zähigkeit.", "Frage (DE)：Ordnen Sie HSS, Hartmetall, Keramik, CBN und PKD qualitativ nach Schnittgeschwindigkeit und Zähigkeit.\nAntwort (DE)：Schnittgeschwindigkeit/Warmhärte: HSS < Hartmetall < Keramik < CBN/PKD. Zähigkeit umgekehrt: HSS hoch, Keramik spröde. Hohe Warmhärte erlaubt hohe v_c; Zähigkeit wichtig bei Stoss/Rattern/unterbrochenem Schnitt.\n中文题目：定性排列 HSS、硬质合金、陶瓷、CBN、PKD 的切削速度能力与韧性。\n中文答案：硬度、热硬性、可用切削速度总体升高：HSS < 硬质合金 < 陶瓷 < CBN/PKD；韧性、抗冲击能力大致相反：HSS 较高，硬质合金较好，陶瓷较脆，CBN/PKD 极硬但用于特定工况。\n出处：Garber_2026_01_15.txt; FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.4–7; full.md: Schneidstoffe Härte und Festigkeit/Warmhärte"]
["Was bedeutet Rattern und was ist die Grenzspanntiefe?", "Frage (DE)：Was bedeutet Rattern und was ist die Grenzspanntiefe?\nAntwort (DE)：Rattern = selbsterregte instabile Schwingung beim Drehen/Fräsen. Grenzspantiefe = ap, ab dem im Testschnitt schlagartig große Amplituden auftreten; darunter stabil, darueber instabil. Abhilfe: ap/Spanquerschnitt senken, Steifigkeit/Dämpfung erhöhen.\n中文题目：什么是颤振 Rattern？什么是临界切深（题干写 Grenzspanntiefe，课件写 Grenzspantiefe）？\n中文答案：Rattern 是车削、铣削中必须避免的强烈振动，主要不是外部激励，而是切削过程失稳导致的自激振动；课件标准术语为 Grenzspantiefe：在逐渐增大切深的试切中，达到该切深后振幅会突然变大。\n出处：Garber_2026_01_15.txt; FT 5 - Fräsen - Skript.pdf S.12–13; full.md: Rattern/Ermittlung der Grenzspantiefe"]
["Begründen Sie, warum Umfangsplanschleifen gegenüber Seitenplanschleifen oft Vorteile hat.", "Frage (DE)：Begründen Sie, warum Umfangsplanschleifen gegenüber Seitenplanschleifen oft Vorteile hat.\nAntwort (DE)：Umfangs-Planschleifen besser: kurze Kontaktzeit, kurze Späne, geringere Wärme, bessere KSS-/Spanabfuhr, Selbstreinigung durch Fliehkraft. Seiten-Planschleifen: kleine Spankammer, hoher Druck/Wärme; Abhilfe Spindelsturz.\n中文题目：说明为什么周边平面磨（Umfangsplanschleifen）通常比侧面平面磨（Seitenplanschleifen）有优势。\n中文答案：周边平面磨接触时间短、切屑短、热负荷低、冷却液和排屑更好，砂轮还能靠离心力自清洁；侧面平面磨的容屑空间小、磨削压力高、热负荷高，因此质量较差。\n出处：Garber_2026_01_15.txt; FT 8 - Schleifen - Skript.pdf S.7–8; 07_Vorbereitung_Schleifen.pdf S.3–5; full.md: Planschleifen/Umfangs-Planschleifen"]
["Was versteht man unter Qualitätsschleifen und Hochgeschwindigkeitsschleifen und warum verbessert es die Oberfläche?", "Frage (DE)：Was versteht man unter Qualitätsschleifen und Hochgeschwindigkeitsschleifen und warum verbessert es die Oberfläche?\nAntwort (DE)：Qualitaetsschleifen: v_c hoch, v_f gleich -> Spangroesse/Kräfte/Rauheit sinken, Zeit gleich. Hochleistungsschleifen: v_c und v_f hoch -> Zeit sinkt, Leistung steigt, Rauheit etwa gleich.\n中文题目：什么是质量磨削、高速磨削，为什么表面会更好？\n中文答案：质量磨削是提高磨削速度 v_c、进给 v_f 基本不变的磨削方式：单颗磨粒切屑尺寸减小，力降低，功率和加工时间大致不变，粗糙度下降，所以表面更好。\n出处：Garber_2026_01_15.txt; FT 8 - Schleifen - Skript.pdf S.12–14; full.md: Qualitäts- und Hochleistungsschleifen"]
["Erklären Sie das Verfahrensfenster der Niederhalterkraft beim Tiefziehen (zu klein/zu groß).", "Frage (DE)：Erklären Sie das Verfahrensfenster der Niederhalterkraft beim Tiefziehen (zu klein/zu groß).\nAntwort (DE)：Verfahrensfenster: y=F_NH, x=beta. Zu klein -> Falten im Flansch. Zu gross -> Nachfliessen behindert, Zugspannung/Stempelkraft hoch -> Bodenreisser. Fenster dazwischen; bei beta_max geschlossen.\n中文题目：解释深拉压边力的工艺窗口：压边力太小、太大分别会怎样？\n中文答案：图中纵轴为压边力，横轴为拉深比 β；压边力太小：法兰区起皱、波纹；压边力太大：材料难以流入，冲头力和筒壁拉应力升高，可能在典型薄弱处发生底部撕裂。\n出处：Garber_2026_01_15.txt; 14 - Tiefziehen - Skript.pdf S.6, S.12–13; full.md: Verfahrensfenster für die Niederhalterkraft/Der Tiefziehvorgang Phase 1"]
["Wann ist hydromechanisches Tiefziehen sinnvoll?", "Frage (DE)：Wann ist hydromechanisches Tiefziehen sinnvoll?\nAntwort (DE)：Hydromechanisches Tiefziehen: für komplizierte Formen/schwierige Materialnachfuehrung. Oel/Wirkmedium stuetzt Blech und verteilt Druck; beta bis ca. 2,4. Voraussetzung: Abdichtung; Nachteil Anlagen-/Dichtaufwand.\n中文题目：什么时候适合使用液压辅助深拉？\n中文答案：适用于复杂形状、材料流动困难或局部过度拉伸风险较高的件；压力介质（如油）支撑板料、分布压力并辅助成形，可达到约 2.4 的拉深比。\n出处：Garber_2026_01_15.txt; 14 - Tiefziehen - Skript.pdf S.20; full.md: Hydromechanisches Tiefziehen"]
["Skizzieren und beschreiben Sie eine Fließkurve und geben Sie die Näherungsformel an.", "Frage (DE)：Skizzieren und beschreiben Sie eine Fließkurve und geben Sie die Näherungsformel an.\nAntwort (DE)：Fliesskurve: k_f ueber phi_h, bei Kaltumformung steigend wegen Verfestigung; Start etwa Re. Naeherung: k_f=k_f1*phi^n. Fuer Arbeit oft k_fm=(k_f0+k_fe)/2.\n中文题目：画出、描述冷成形流动曲线，并写出近似公式。\n中文答案：冷成形中由于冷作硬化，流动应力 k_f 随主变形程度 φ_h 增大而上升；图像起点可按 Re 附近理解，不要把公式在 φ=0 机械代入成 0。\n出处：Garber_2026_01_15.txt; 11 - Grundlagen Umformen - Skript.pdf S.12–14; full.md: Kaltumformung/Rechnen mit der Fließspannung/Warmumformung"]
["Wie berechnen Sie die Umformarbeit (Energie) aus spezifischer Umformarbeit? Achten Sie auf Einheiten.", "Frage (DE)：Wie berechnen Sie die Umformarbeit (Energie) aus spezifischer Umformarbeit? Achten Sie auf Einheiten.\nAntwort (DE)：Mit spezifischer Umformarbeit w_d: W = w_d·V; alternativ ideal: W_id = V·k_fm·φ; mit Wirkungsgrad η: W_real = W_id/η bzw. W/η; Einheiten: w_d oder k_f in N/mm², V in mm³ ⇒ N·mm; 1 N·mm = 10^-3 J.\n中文题目：如何用比成形功 w_d 计算成形能量？注意单位。\n中文答案：若给出比成形功 w_d，则 W=w_d·V；若用理想公式，则 W_id=V·k_fm·φ；若给效率 η，则实际能量 W_real=W_id/η。\n出处：Garber_2026_01_15.txt; 11 - Grundlagen Umformen - Skript.pdf S.22–23, S.26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Umformkraft und Umformarbeit/Spezifische Umformarbeit"]
["Nennen Sie Maßnahmen zur Verringerung der Zunderbildung beim Schmieden.", "Frage (DE)：Nennen Sie Maßnahmen zur Verringerung der Zunderbildung beim Schmieden.\nAntwort (DE)：Zunder verringern: kurze Warmzeiten/induktiv erwärmen; niedrigere Temperatur soweit moeglich; Rohlinge beschichten; Schutzgas. Ziel: Oxidation, Oberflächenfehler, Verschleiß und Materialverlust senken.\n中文题目：列举减少锻造氧化皮形成的措施。\n中文答案：缩短热态停留时间（如感应加热）；尽量降低成形温度（受限）。\n出处：Garber_2026_01_15.txt; 13 - Schmieden - Skript.pdf S.9; full.md: Zunderbildung"]
["Was sind Prägen und Kalibrieren (im Kontext Kaltschmieden) und warum nutzt man sie?", "Frage (DE)：Was sind Prägen und Kalibrieren (im Kontext Kaltschmieden) und warum nutzt man sie?\nAntwort (DE)：Praegen: Kaltschmieden kleiner Formaenderung für Kontur/Relief/Oberfläche, z.B. Münze. Kalibrieren: kalt massgenau nachdruecken. Nutzen: Genauigkeit/Oberfläche hoch, keine Zunder/Schwindung; Nachteil hohe Kräfte.\n中文题目：什么是压印 Prägen 和校准 Kalibrieren？为什么使用它们？\n中文答案：Prägen 是冷锻中小变形压出轮廓、浮雕、表面细节的工序，如硬币；Kalibrieren 是热成形、锻造后再冷态压准尺寸。\n出处：Garber_2026_01_15.txt; 13 - Schmieden - Skript.pdf S.5, S.18, S.22; full.md: Nach Temperatur/Stadienfolge/Randbedingungen und Kostenverteilung"]
["Begründen Sie die Verfahrenswahl „Schmieden + Nachbearbeitung“ vs. „komplett Drehen“.", "Frage (DE)：Begründen Sie die Verfahrenswahl „Schmieden + Nachbearbeitung“ vs. „komplett Drehen“.\nAntwort (DE)：Schmieden + Nachbearbeitung: Serie, hohe Festigkeit/dynamische Last; Faserverlauf günstig, Materialverlust/Spanvolumen/Zeit klein. Nachteile: Gesenk/Presse/Ruestkosten. Komplett Drehen: flexibel für Einzelteile, aber mehr Späne, längere Zeit, Faser unterbrochen.\n中文题目：说明为什么选择“锻造+后加工”或“完全车削”。\n中文答案：锻造+后加工：适合批量、高强度/动载；纤维流线好，材料损失/切屑/时间少。缺点：模具/压力机/换装成本。完全车削：小批量灵活，但切屑多、时间长、纤维被切断。\n出处：Garber_2026_01_15.txt; FT 1 -  Einführung - Skript.pdf S.16–17; 13 - Schmieden - Skript.pdf S.20–22; full.md: Kriterien bei der Verfahrensauswahl/Faserverlauf/Charakteristika des Schmiedens"]
  </script>

  <script>
    const STORAGE_KEY = "garber1-progress-v2";
    const REMOVED_LEGACY_NUMBERS = [18, 19, 21];
    const QUIZ_SIZE = 20;
    const STUDY_MODES = {
      sequence: "顺序刷题",
      shuffle: "乱序刷题",
      quiz: "20题测验",
      wrong: "错题库"
    };
    const VALID_CHOICES = new Set(["unknown", "unsure", "known"]);
    const raw = document.getElementById("sourceData").textContent.trim();

    const state = {
      cards: parseDeck(raw),
      order: [],
      index: 0,
      flipped: false,
      pendingChoice: null,
      mode: "sequence",
      lang: "both",
      progress: loadProgress(),
      query: ""
    };

    const el = {
      deckCount: document.getElementById("deckCount"),
      counter: document.getElementById("counter"),
      progressBar: document.getElementById("progressBar"),
      cardInner: document.getElementById("cardInner"),
      questionDe: document.getElementById("questionDe"),
      questionZh: document.getElementById("questionZh"),
      answerGrid: document.getElementById("answerGrid"),
      frontStatus: document.getElementById("frontStatus"),
      backStatus: document.getElementById("backStatus"),
      frontTag: document.getElementById("frontTag"),
      backTag: document.getElementById("backTag"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      answerNextBtn: document.getElementById("answerNextBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      resetBtn: document.getElementById("resetBtn"),
      searchInput: document.getElementById("searchInput"),
      cardList: document.getElementById("cardList"),
      visibleCount: document.getElementById("visibleCount"),
      statSeen: document.getElementById("statSeen"),
      statGood: document.getElementById("statGood"),
      statAgain: document.getElementById("statAgain"),
      statLeft: document.getElementById("statLeft")
    };

    state.order = buildOrder(state.mode);
    bindEvents();
    render();

    function parseDeck(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map((line, index) => {
          const pair = parsePair(line, index);
          const sections = splitSections(pair[1] || "");
          const extras = Object.entries(sections)
            .filter(([key]) => !["Frage (DE)", "Antwort (DE)", "中文题目", "中文答案", "出处", "????", "??"].includes(key))
            .map(([key, value]) => ({ label: key, value }));

          const legacyNumber = legacyCardNumber(index);

          return {
            id: `card-${legacyNumber}`,
            number: legacyNumber,
            deckIndex: index + 1,
            front: pretty(pair[0] || ""),
            questionDe: pretty(sections["Frage (DE)"] || pair[0] || ""),
            answerDe: pretty(sections["Antwort (DE)"] || ""),
            questionZh: pretty(sections["中文题目"] || sections["????"] || ""),
            answerZh: pretty(sections["中文答案"] || sections["????"] || ""),
            source: pretty(sections["出处"] || sections["??"] || ""),
            extras: extras.map(extra => ({ label: extra.label, value: pretty(extra.value) })),
            family: inferFamily(pair[0] || pair[1] || "")
          };
        });
    }

    function parsePair(line, index) {
      try {
        return JSON.parse(line);
      } catch (jsonError) {
        const loose = line.match(/^\["([\s\S]*?)",\s*"([\s\S]*)"\]$/);
        if (loose) {
          return [decodeLooseString(loose[1]), decodeLooseString(loose[2])];
        }
        console.error("??????", index + 1, jsonError, line);
        return [`Karte ${index + 1}`, line];
      }
    }

    function decodeLooseString(value) {
      return String(value)
        .replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
        .replace(/\\n/g, "\n")
        .replace(/\\r/g, "\r")
        .replace(/\\"/g, "\"");
    }

    function legacyCardNumber(index) {
      let number = index + 1;
      REMOVED_LEGACY_NUMBERS.forEach(removed => {
        if (number >= removed) number += 1;
      });
      return number;
    }

    function splitSections(text) {
      const sections = {};
      let current = "";
      text.replace(/\\n/g, "\n").split(/\r?\n/).forEach(rawLine => {
        const line = rawLine.trim();
        if (!line) return;
        const match = line.match(/^(.+?)[\uFF1A:](.*)$/u);
        if (match && isSectionLabel(match[1].trim())) {
          current = match[1].trim();
          sections[current] = match[2].trim();
        } else if (current) {
          sections[current] += `\n${line}`;
        }
      });
      return sections;
    }

    function isSectionLabel(label) {
      return [
        "Frage (DE)",
        "Antwort (DE)",
        "中文题目",
        "中文答案",
        "出处",
        "Prüfungshinweis (txt)",
        "Hinweis (DE)",
        "Typische Beispiele (DE)",
        "Zahlen (DE, aus Folie)"
      ].includes(label);
    }

    function inferFamily(text) {
      if (/Honen|Honahle|Honleisten|Honsteine|Kreuzschliff|Ziehschleifen/i.test(text)) {
        return "FT9";
      }
      if (/Schleifen|Schleif|Schleifscheibe|Schleifbrand|Ausfeuern|Innenrund|Planschleifen|Korn|Korund|CBN|Diamant|Poren|Härtegrad/i.test(text)) {
        return "FT8";
      }
      if (/Tiefziehen|Niederhalter|Ziehverh|Ziehkraft|Bodenrei|Faltenbildung/i.test(text)) {
        return "FT14";
      }
      if (/Schmieden|Gesenkschmieden|Prägen|Presskraft|Grat/i.test(text)) {
        return "FT13";
      }
      if (/Fließpressen|Umformgrad|Umformkraft|Umformarbeit|Fließspannung/i.test(text)) {
        return "FT12";
      }
      if (/Umformen|umformende|Serienfertigung|Werkstoffzusammenhalt|Umformverfahren/i.test(text)) {
        return "FT11";
      }
      if (/Schruppen|Schlichten|Fräsen|Bahnabstand|CAM|Simulation|Kugel|Torusfräser/i.test(text)) {
        return "FT5";
      }
      if (/Bohren|Bohr|Aufbohren|Vollbohren|Senken|Reiben|Spiralbohrer|Wendeplattenbohrer|Spitzenwinkel|Spannut|Querschneide|Punch|Tap|Werkzeugaufnahme|Schrumpffutter|Dehnspann|Spannschraube|Zahnvorschub/i.test(text)) {
        return "FT4";
      }
      if (/Dreh|Rohling|Längs|Plandrehen|Rillentiefe|Schneidenradius|Hauptzeit|Kienzle|Schnittkraft|Drehmoment|Zustell|Vorschublänge|Eilgang/i.test(text)) {
        return "FT3";
      }
      if (/Scher|Span|Schneid|Werkzeug|Keil|Schnittgeschwindigkeit|Rauheit|Ra|Rz|Zerspan|Verschleiß|Aufbau|Diffusion|Kolk|VB|SV|KT|KM|α|β|γ/i.test(text)) {
        return "FT2";
      }
      return "FT1";
    }

    function pretty(text) {
      return String(text)
        .replace(/\\\((.*?)\\\)/g, "$1")
        .replace(/[^\S\r\n]+/g, " ")
        .replace(/[ \t]*\n[ \t]*/g, "\n")
        .trim();
    }

    function bindEvents() {
      el.prevBtn.addEventListener("click", () => move(-1));
      el.nextBtn.addEventListener("click", () => move(1));
      el.answerNextBtn.addEventListener("click", advanceAfterAnswer);
      el.shuffleBtn.addEventListener("click", restartCurrentMode);
      el.resetBtn.addEventListener("click", resetProgress);
      el.searchInput.addEventListener("input", event => {
        state.query = event.target.value.trim().toLowerCase();
        renderList();
      });
      document.querySelectorAll("[data-lang]").forEach(button => {
        button.addEventListener("click", () => {
          state.lang = button.dataset.lang;
          document.querySelectorAll("[data-lang]").forEach(item => item.classList.toggle("active", item === button));
          render();
        });
      });
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => answerCard(button.dataset.choice));
      });
      window.addEventListener("keydown", event => {
        if (event.target.matches("input, textarea, select, [contenteditable='true']")) return;
        if (event.target.closest("button") && (event.key === " " || event.key === "Enter")) return;
        if (event.key === "ArrowRight") {
          event.preventDefault();
          goForwardByKeyboard();
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          move(-1);
        } else if (event.key === " " || event.key === "Enter") {
          event.preventDefault();
          goForwardByKeyboard();
        } else if (event.key === "1") {
          event.preventDefault();
          answerByKeyboard("unknown");
        } else if (event.key === "2") {
          event.preventDefault();
          answerByKeyboard("unsure");
        } else if (event.key === "3") {
          event.preventDefault();
          answerByKeyboard("known");
        }
      });
    }

    function goForwardByKeyboard() {
      if (!currentCard()) return;
      if (state.flipped) {
        advanceAfterAnswer();
      }
    }

    function answerByKeyboard(choice) {
      if (!currentCard() || state.flipped) return;
      answerCard(choice);
    }

    function buildOrder(mode) {
      const allCards = state.cards.map((card, index) => ({ card, index }));
      const base = allCards
        .filter(({ card }) => mode !== "wrong" || isWrongActive(card))
        .map(({ index }) => index);

      if (mode === "shuffle") return shuffledCopy(base);
      if (mode === "quiz") return shuffledCopy(base).slice(0, Math.min(QUIZ_SIZE, base.length));
      return base;
    }

    function shuffledCopy(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function modeTag(card) {
      if (state.mode === "wrong") return "错题库";
      const label = STUDY_MODES[state.mode] || "刷题";
      return `${label} · ${card.family}`;
    }

    function restartTitle() {
      return ({
        sequence: "重开顺序刷题",
        shuffle: "重新乱序",
        quiz: "重新抽取20题",
        wrong: "刷新错题库"
      })[state.mode] || "重开当前模式";
    }

    function isWrongActive(card) {
      const record = state.progress[card.id] || {};
      return (record.wrongCount || 0) > 0 && record.rating !== "known";
    }

    function currentCard() {
      if (!state.order.length) return null;
      return state.cards[state.order[state.index]];
    }

    function originalCardLabel(card) {
      return `原题 ${card.deckIndex || card.number || ""}`.trim();
    }

    function isRepeatOccurrence(queueIndex, absoluteIndex) {
      if (typeof queueIndex !== "number" || typeof absoluteIndex !== "number") return false;
      return state.order.findIndex(item => item === absoluteIndex) !== queueIndex;
    }

    function repeatLabel(queueIndex, absoluteIndex) {
      return isRepeatOccurrence(queueIndex, absoluteIndex) ? " · 复现" : "";
    }

    function render() {
      const card = currentCard();
      if (!card) {
        renderEmptyState();
        return;
      }
      const currentAbsoluteIndex = state.order[state.index];
      const originalLabel = originalCardLabel(card);
      const repeatSuffix = repeatLabel(state.index, currentAbsoluteIndex);
      const record = state.progress[card.id] || {};
      el.deckCount.textContent = state.cards.length;
      el.counter.textContent = `${originalLabel}${repeatSuffix}`;
      el.progressBar.style.width = `${((state.index + 1) / state.order.length) * 100}%`;
      el.frontTag.textContent = `${modeTag(card)} · Frage`;
      el.backTag.textContent = `${modeTag(card)} · Antwort`;
      el.frontStatus.textContent = `${statusText(record.rating)} · ${originalLabel}${repeatSuffix}`;
      el.backStatus.textContent = `${statusText(record.rating)} · ${originalLabel}${repeatSuffix}`;
      el.answerNextBtn.disabled = false;
      el.prevBtn.disabled = state.order.length <= 1;
      el.nextBtn.disabled = state.order.length <= 1;
      el.shuffleBtn.title = restartTitle();
      el.shuffleBtn.setAttribute("aria-label", el.shuffleBtn.title);
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.disabled = false;
      });

      el.questionDe.innerHTML = renderRichText(card.questionDe || card.front);
      el.questionZh.innerHTML = renderRichText(card.questionZh);
      el.questionDe.classList.toggle("hidden", state.lang === "zh");
      el.questionZh.classList.toggle("hidden", state.lang === "de" || !card.questionZh);

      renderAnswer(card);
      el.cardInner.classList.toggle("flipped", state.flipped);
      renderModeButtons();
      renderList();
      renderStats();
    }

    function renderEmptyState() {
      el.deckCount.textContent = state.cards.length;
      el.counter.textContent = "0 / 0";
      el.progressBar.style.width = "0%";
      const emptyLabel = STUDY_MODES[state.mode] || "刷题";
      el.frontTag.textContent = `${emptyLabel} · Frage`;
      el.backTag.textContent = `${emptyLabel} · Antwort`;
      el.frontStatus.textContent = "无卡片";
      el.backStatus.textContent = "无卡片";
      el.questionDe.innerHTML = renderRichText(state.mode === "wrong" ? "错题库为空" : "没有卡片");
      el.questionZh.innerHTML = renderRichText(state.mode === "wrong" ? "在刷题时点击“不知道”后，这里会出现错题。" : "");
      el.questionDe.classList.remove("hidden");
      el.questionZh.classList.toggle("hidden", !el.questionZh.textContent);
      el.answerGrid.innerHTML = "";
      el.cardInner.classList.remove("flipped");
      el.answerNextBtn.disabled = true;
      el.prevBtn.disabled = true;
      el.nextBtn.disabled = true;
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.disabled = true;
      });
      renderModeButtons();
      renderList();
      renderStats();
    }

    function renderAnswer(card) {
      el.answerGrid.innerHTML = "";
      if (state.lang !== "zh" && card.answerDe) {
        el.answerGrid.appendChild(section("Antwort (DE)", card.answerDe, "answer-de"));
      }
      if (state.lang !== "de" && card.answerZh) {
        el.answerGrid.appendChild(section("中文答案", card.answerZh, "answer-zh"));
      }
      card.extras.forEach(extra => {
        el.answerGrid.appendChild(section(extra.label, extra.value, "extra"));
      });
      if (card.source) {
        const source = document.createElement("div");
        source.className = "source";
        source.innerHTML = renderRichText(`出处：${card.source}`);
        el.answerGrid.appendChild(source);
      }
    }

    function section(label, value, className) {
      const wrap = document.createElement("div");
      wrap.className = `section ${className || ""}`;
      const title = document.createElement("p");
      title.className = "label";
      title.textContent = label;
      const body = document.createElement("p");
      body.innerHTML = renderRichText(value);
      wrap.append(title, body);
      return wrap;
    }

    function renderRichText(value) {
      const normalized = normalizeFormulaText(value);
      return formatFormulaHtml(escapeHtml(normalized)).replace(/\n/g, "<br>");
    }

    function normalizeFormulaText(value) {
      return String(value || "")
        .replace(/\*\*([^*]+)\*\*/g, "$1")
        .replace(/\*([^*]+)\*/g, "$1")
        .replace(/\\\((.*?)\\\)/g, "$1")
        .replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, "($1)/($2)")
        .replace(/\\sqrt\{([^{}]+)\}/g, "√($1)")
        .replace(/\\text\{([^}]*)\}/g, "$1")
        .replace(/\\kappa/g, "κ")
        .replace(/\\gamma/g, "γ")
        .replace(/\\alpha/g, "α")
        .replace(/\\beta/g, "β")
        .replace(/\\sigma/g, "σ")
        .replace(/\\epsilon/g, "ε")
        .replace(/\\varphi/g, "φ")
        .replace(/\\phi/g, "φ")
        .replace(/ϕ/g, "φ")
        .replace(/\\Delta/g, "Δ")
        .replace(/\\omega/g, "ω")
        .replace(/\\pi/g, "π")
        .replace(/\\mu/g, "µ")
        .replace(/\\cdot/g, "·")
        .replace(/\\times/g, "×")
        .replace(/\\to/g, "→")
        .replace(/\\Rightarrow/g, "⇒")
        .replace(/\\approx/g, "≈")
        .replace(/\\leq?/g, "≤")
        .replace(/\\geq?/g, "≥")
        .replace(/\\sin/g, "sin")
        .replace(/\^\s*\\circ/g, "°")
        .replace(/\\,/g, " ")
        .replace(/[^\S\r\n]+/g, " ")
        .replace(/[ \t]*\n[ \t]*/g, "\n")
        .trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatFormulaHtml(html) {
      let output = html;

      output = output.replace(/\^\(([^()<>]{1,60})\)/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);
      output = output.replace(/\^\{([^{}<>]{1,60})\}/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);
      output = output.replace(/\^([0-9+\-−.,A-Za-zα-ωΑ-Ω]{1,12})/g, (_, exponent) => `<sup>${formatFormulaHtml(exponent)}</sup>`);

      output = output.replace(/\bkc1[,.]1\b/gi, () => mathVar("k", "c1,1"));
      output = output.replace(/\b([A-Za-zα-ωΑ-Ω])_([A-Za-z0-9α-ωΑ-Ω,.\-−]{1,12})\b/g, (_, base, sub) => mathVar(base, sub));
      output = output.replace(/φ_?(gesamt|max|[hlbA]|0-2|0-1|1-2)/g, (_, sub) => mathVar("φ", sub));
      output = output.replace(/\bβ_?(ges|[0-9]+)\b/g, (_, sub) => mathVar("β", sub));
      output = output.replace(/\bσ_?Z\b/g, () => mathVar("σ", "Z"));
      output = output.replace(/\b(F|P)_?([cfpa])\b/g, (_, base, sub) => mathVar(base, sub));
      output = output.replace(/\bF_?(Z|id|RR|RN|B|S)\b/g, (_, sub) => mathVar("F", sub));
      output = output.replace(/\bF_?(0|E)\b/g, (_, sub) => mathVar("F", sub));
      output = output.replace(/\bW_?id\b/g, () => mathVar("W", "id"));
      output = output.replace(/\bw_?d\b/g, () => mathVar("w", "d"));
      output = output.replace(/\bv_?c\b/g, () => mathVar("v", "c"));
      output = output.replace(/\bv_?f\b/g, () => mathVar("v", "f"));
      output = output.replace(/\bv_?S\b/g, () => mathVar("v", "S"));
      output = output.replace(/\bk_?c\b/g, () => mathVar("k", "c"));
      output = output.replace(/\bkf(0|1|e|m)\b/g, (_, sub) => mathVar("k", `f${sub}`));
      output = output.replace(/\bk_?(f|fm)\b/g, (_, sub) => mathVar("k", sub));
      output = output.replace(/\bK_?(ver|sch|gamma|γ|v)\b/g, (_, sub) => mathVar("K", sub === "gamma" ? "γ" : sub));
      output = output.replace(/\bR_?m\b/g, () => mathVar("R", "m"));
      output = output.replace(/\bD_?(WS|s|w)\b/g, (_, sub) => mathVar("D", sub));
      output = output.replace(/\bAl2O3\b/g, 'Al<sub>2</sub>O<sub>3</sub>');
      output = output.replace(/\b(A|S|l|b|h|D|L)_?(0|1|E|k|g)\b/g, (_, base, sub) => mathVar(base, sub));
      output = output.replace(/\bR_?(e|p0,2)\b/g, (_, sub) => mathVar("R", sub));
      output = output.replace(/\bh_?0\b/g, () => mathVar("h", "0"));
      output = output.replace(/\bs_?0\b/g, () => mathVar("s", "0"));
      output = output.replace(/\bd_?Z\b/g, () => mathVar("d", "Z"));
      output = output.replace(/\ba_?p\b/g, () => mathVar("a", "p"));
      output = output.replace(/\bm_?c\b/g, () => mathVar("m", "c"));
      output = output.replace(/\bt_?h\b/g, () => mathVar("t", "h"));
      output = output.replace(/\bT_?H\b/g, () => mathVar("T", "H"));
      output = output.replace(/\bf_?z\b/g, () => mathVar("f", "z"));
      output = output.replace(/\bR_?(a|z|t)\b/g, (_, sub) => mathVar("R", sub));
      output = output.replace(/\bL_?(ges|Abschnitt)\b/g, (_, sub) => mathVar("L", sub));
      output = output.replace(/\bl_?([au])\b/g, (_, sub) => mathVar("l", sub));
      output = output.replace(/√\(([^()<>]{1,80})\)/g, (_, radicand) => `<span class="math-sqrt">√(${radicand})</span>`);

      return output;
    }

    function mathVar(base, subscript) {
      return `<span class="math-var">${base}<sub>${subscript}</sub></span>`;
    }

    function renderList() {
      const activeCard = currentCard();
      const baseOrder = state.order;
      const items = baseOrder
        .map((absoluteIndex, queueIndex) => ({ card: state.cards[absoluteIndex], absoluteIndex, queueIndex }))
        .filter(({ card }) => Boolean(card))
        .filter(({ card }) => {
          if (!state.query) return true;
          return [card.questionDe, card.questionZh, card.answerDe, card.answerZh, card.source]
            .join(" ")
            .toLowerCase()
            .includes(state.query);
        });

      el.visibleCount.textContent = `${items.length} / ${baseOrder.length}`;
      el.cardList.innerHTML = "";
      items.forEach(({ card, absoluteIndex, queueIndex }) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `list-item ${queueIndex === state.index ? "active" : ""}`;
        button.addEventListener("click", () => {
          state.index = queueIndex >= 0 ? queueIndex : 0;
          state.flipped = false;
          state.pendingChoice = null;
          render();
        });

        const title = document.createElement("div");
        title.className = "list-title";
        title.innerHTML = renderRichText(card.questionDe);

        const meta = document.createElement("div");
        meta.className = "list-meta";
        const left = document.createElement("span");
        left.textContent = `${originalCardLabel(card)} · ${card.family}${repeatLabel(queueIndex, absoluteIndex)}`;
        const right = document.createElement("span");
        const record = state.progress[card.id] || {};
        right.textContent = `${statusText(record.rating)}${record.wrongCount ? ` · 错${record.wrongCount}` : ""}`;
        meta.append(left, right);
        button.append(title, meta);
        el.cardList.appendChild(button);
      });
    }

    function renderStats() {
      const records = state.cards.map(card => state.progress[card.id]).filter(Boolean);
      const seen = records.length;
      const good = records.filter(record => record.rating === "known").length;
      const again = state.cards.filter(card => isWrongActive(card)).length;
      el.statSeen.textContent = seen;
      el.statGood.textContent = good;
      el.statAgain.textContent = again;
      el.statLeft.textContent = Math.max(state.cards.length - good, 0);
    }

    function move(delta) {
      if (!state.order.length) return;
      state.pendingChoice = null;
      state.index = (state.index + delta + state.order.length) % state.order.length;
      state.flipped = false;
      render();
    }

    function restartCurrentMode() {
      state.order = buildOrder(state.mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }

    function answerCard(choice) {
      if (!VALID_CHOICES.has(choice)) return;
      const card = currentCard();
      if (!card) return;
      const previous = state.progress[card.id] || {};
      state.progress[card.id] = {
        ...previous,
        rating: choice,
        wrongCount: choice === "unknown" ? (previous.wrongCount || 0) + 1 : (previous.wrongCount || 0),
        reviews: (previous.reviews || 0) + 1,
        updatedAt: new Date().toISOString()
      };
      if (choice === "known") {
        state.progress[card.id].knownAt = new Date().toISOString();
      }
      saveProgress();
      state.pendingChoice = choice;
      state.flipped = true;
      render();
    }

    function advanceAfterAnswer() {
      const choice = state.pendingChoice;
      const currentAbsoluteIndex = state.order[state.index];
      state.pendingChoice = null;

      if (choice === "unsure") {
        scheduleRepeatLater(currentAbsoluteIndex);
      }

      if (state.mode === "wrong" && choice === "known") {
        removeCurrentAndFutureRepeats(currentAbsoluteIndex);
        if (state.index >= state.order.length) state.index = 0;
        state.flipped = false;
        render();
        return;
      }

      if (choice === "known") {
        removeFutureRepeats(currentAbsoluteIndex);
      }

      const finishedRound = state.index >= state.order.length - 1;
      if (state.mode !== "wrong" && finishedRound) {
        continueAfterRound();
        return;
      }

      move(1);
    }

    function continueAfterRound() {
      const wrongOrder = buildOrder("wrong");
      state.flipped = false;
      state.pendingChoice = null;

      if (wrongOrder.length) {
        state.mode = "wrong";
        state.order = wrongOrder;
        state.index = 0;
        render();
        return;
      }

      state.order = buildOrder(state.mode);
      state.index = 0;
      render();
    }

    function scheduleRepeatLater(absoluteIndex) {
      if (typeof absoluteIndex !== "number") return;
      removeFutureRepeats(absoluteIndex);
      const minInsert = Math.min(state.index + 2, state.order.length);
      const insertAt = minInsert + Math.floor(Math.random() * (state.order.length - minInsert + 1));
      state.order.splice(insertAt, 0, absoluteIndex);
    }

    function removeFutureRepeats(absoluteIndex) {
      for (let i = state.order.length - 1; i > state.index; i--) {
        if (state.order[i] === absoluteIndex) {
          state.order.splice(i, 1);
        }
      }
    }

    function removeCurrentAndFutureRepeats(absoluteIndex) {
      for (let i = state.order.length - 1; i >= state.index; i--) {
        if (state.order[i] === absoluteIndex) {
          state.order.splice(i, 1);
        }
      }
    }

    function setMode(mode) {
      if (!Object.prototype.hasOwnProperty.call(STUDY_MODES, mode)) return;
      state.mode = mode;
      state.order = buildOrder(mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }

    function renderModeButtons() {
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === state.mode);
      });
    }

    function statusText(rating) {
      return ({
        unknown: "不知道",
        unsure: "不熟练",
        known: "知道"
      })[rating] || "未复习";
    }

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function resetProgress() {
      state.progress = {};
      localStorage.removeItem(STORAGE_KEY);
      state.order = buildOrder(state.mode);
      state.index = 0;
      state.flipped = false;
      state.pendingChoice = null;
      render();
    }
  </script>
</body>
</html>
