["Was verbessert Reiben - und was kann Reiben nicht verbessern? (Nennen Sie auch typische Reibzugabe.)", "Frage (DE)：Was verbessert Reiben - und was kann Reiben nicht verbessern? (Nennen Sie auch typische Reibzugabe.)\nAntwort (DE)：- Reiben: Aufbohren mit vielschneidiger Reibahle; vorgebohrte Bohrung wird auf Passungsmaß gebracht.\n- Verbessert: Maßgenauigkeit und Passgenauigkeit (typisch IT6-IT7), Oberfläche und Oberflächengüte, Formqualität.\n- Typische Reibzugabe: prüfungsnah 0,1-0,5 mm; Schnittgeschwindigkeit ca. halb so groß wie beim Bohren; ein Durchgang.\n- Kann nicht verbessern: Lagegenauigkeit und Position der Bohrung; eine falsch liegende Bohrung wird durch Reiben nicht korrekt positioniert.\n中文题目：铰孔能改善什么？不能改善什么？并说明典型铰余量。\n中文答案：- 铰孔：用多刃铰刀对预钻孔进行扩孔，使孔达到配合尺寸。\n- 能改善：尺寸、配合精度（典型 IT6-IT7）、表面质量、形状质量。\n- 典型铰余量：考试按 0.1-0.5 mm；切削速度约为钻孔的一半；通常一次通过。\n- 不能改善：孔的位置精度、位置度；孔钻偏了，铰孔不能把位置纠正回来。\n出处：Garber_2025_10_30.txt（老师强调 Reiben 能改善与不能改善的边界）；FT 4 - Bohren - Skript.pdf S.15；05_FT_Bohrverfahren.pdf Abschnitt \"Reiben\"；full.md Abschnitt \"Reiben"]
["Vergleichen Sie Spannschraube, Schrumpffutter und (Hydro-)Dehnspannfutter (Präzision und Handhabung).", "Frage (DE)：Vergleichen Sie Spannschraube, Schrumpffutter und (Hydro-)Dehnspannfutter (Präzision und Handhabung).\nAntwort (DE)：- Spannschraube: einfach und günstig, schnelle Befestigung; einseitige Klemmung → geringere Rundlaufgenauigkeit und Präzision, für hohe Genauigkeit ungünstig.\n- Schrumpffutter: Aufnahme induktiv erwärmen, kalten Werkzeugschaft einsetzen, nach Abkühlen kraftschlüssig gespannt; Präzision sehr gut, Drehmomentübertragung sehr gut, Zugänglichkeit sehr gut; Handhabung nur akzeptabel, weil Aufheizen, Abkühlen und Gerät nötig.\n- (Hydro-)Dehnspannfutter: Betätigungsschraube drückt Öl in Kammer, dünnwandige Aufnahme klemmt Werkzeug; sehr gute Rundlaufgenauigkeit, sehr gute Dämpfung, Handhabung sehr gut; teuer und aufwändig, aber für präzise und dynamisch kritische Bearbeitung gut.\n- Vergleichstabelle: Hydro-Dehnspannfutter und Schrumpffutter jeweils Präzision \"sehr gut\"; Kraftspannfutter \"gut\"; Spannzangenfutter \"akzeptabel\".\n中文题目：比较侧向紧固螺钉刀柄、热缩刀柄和液压胀紧刀柄（精度、操作）。\n中文答案：- 侧向紧固螺钉：简单便宜、装夹快；单侧夹紧导致跳动、精度较差，不适合高精度。\n- 热缩刀柄：感应加热刀柄→插入冷刀柄→冷却后力锁合；精度很高、扭矩传递好、可达性好；但需加热、冷却设备，操作性一般。\n- 液压胀紧刀柄：螺钉压油腔，使薄壁夹套夹紧刀具；跳动精度和阻尼很好，操作方便；成本、结构较高，适合高精度和易振加工。\n- 表格记忆：液压胀紧和热缩精度都是“sehr gut”。\n出处：Garber_2025_10_30.txt（老师讲 Werkzeugaufnahme 对精度影响）；FT 4 - Bohren - Skript.pdf S.20-S.23；full.md Abschnitt \"Futter mit Spannschraube und Schrumpffutter; (Hydro-) Dehnspannfutter; Vergleich von Werkzeugaufnahmen"]
["Definieren Sie Zahnvorschub f_z und geben Sie den Zusammenhang zu f an. Was sagt f_z physikalisch aus?", "Frage (DE)：Definieren Sie Zahnvorschub f_z und geben Sie den Zusammenhang zu f an. Was sagt f_z physikalisch aus?\nAntwort (DE)：- Zusammenhang: f = f_z·z, mit z = Schneidenzahl.\n- f_z: Zahnvorschub, Vorschub pro Zahn/Schneide, Einheit typ. mm/Zahn.\n- f: Vorschub pro Umdrehung, Einheit typ. mm/U.\n- Physikalische Bedeutung: Belastung bzw. Spanabnahme pro Schneide; wichtig für Hauptzeit und Werkzeugbelastung.\n- Prüfungsfalle: f_z nicht direkt in T_H = (L·i)/(n·f) einsetzen; zuerst mit z zu f umrechnen. Vorschubgeschwindigkeit wäre v_f = n·f.\n中文题目：定义齿进给 f_z，写出它与 f 的关系，并说明物理意义。\n中文答案：- 关系：f = f_z·z，z 为刃数。\n- f_z：每齿、每刃进给，单位通常 mm/Zahn。\n- f：每转进给，单位通常 mm/U。\n- 物理意义：每个切削刃承担的进给量、负载，影响切屑厚度、主时间和刀具负荷。\n- 易错点：主时间公式 T_H = (L·i)/(n·f) 里用的是 f，不能直接把 f_z 代进去；要先乘刃数。\n出处：Garber_2025_10_30.txt（老师强调 Zahnvorschub 与 Gesamtvorschub 的区别）；Formelblatt Fertigungstechnik.pdf S.1；FT 4 - Bohren - Skript.pdf S.30；full.md Abschnitt \"Formelblatt Fertigungstechnik - Vollbohren; Aufbohren"]
["Berechnen Sie Drehzahl n, Vorschub f, Hauptzeit T_H und Kosten bei 100 €/h. Gegeben: i=300, d=12 mm, L=50 mm, v_c=150 m/min, f_z=0,1 mm, z=2.", "Frage (DE)：Berechnen Sie Drehzahl n, Vorschub f, Hauptzeit T_H und Kosten bei 100 €/h. Gegeben: i=300, d=12 mm, L=50 mm, v_c=150 m/min, f_z=0,1 mm, z=2.\nAntwort (DE)：- Drehzahl: d=12 mm=0,012 m; v_c = π·d·n ⇒ n = 150/(π·0,012) = 3978,9 min^(-1) ≈ 3980 min^(-1).\n- Vorschub pro Umdrehung: f = f_z·z = 0,1·2 = 0,2 mm/U.\n- Gesamtweg: L·i = 50 mm·300 = 15000 mm.\n- Hauptzeit: T_H = (L·i)/(n·f) = 15000/(3978,9·0,2) = 18,85 min ≈ 18,8 min.\n- Kosten: 18,85/60·100 = 31,4 € → ca. 31 €.\n- Prüfungsfallen: Durchmesser in m für v_c verwenden; f_z erst zu f umrechnen; nur Hauptzeit, Nebenzeiten vernachlässigt; Einheiten sauber angeben.\n中文题目：计算转速 n、每转进给 f、主时间 T_H 和 100 €/h 下的成本。\n中文答案：- 转速：d=12mm=0.012m，n=150/(π·0.012)=3978.9 min^(-1)≈3980 min^(-1)。\n- 每转进给：f=f_z·z=0.1·2=0.2 mm/U。\n- 总进给路程：L·i=50mm·300=15000mm。\n- 主时间：T_H=15000/(3978.9·0.2)=18.85min≈18.8min。\n- 成本：18.85/60·100=31.4€，约 31€。\n- 易错点：计算 v_c 时直径用 m；先把 f_z 乘刃数变成 f；这里只算主时间，不算辅助时间。\n出处：Garber_2025_10_30.txt（老师明确此类 Hauptzeit und Kosten 计算是考试口径并强调只算 Hauptzeit）；FT 4 - Bohren - Skript.pdf S.30；FT 3 - Drehen - Skript.pdf S.22；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"4.4 Hauptzeitberechnung"]
["Begründen Sie, warum die Kosten aus T_H bei Einzelteilen stark unterschätzt werden.", "Frage (DE)：Begründen Sie, warum die Kosten aus T_H bei Einzelteilen stark unterschätzt werden.\nAntwort (DE)：- T_H ist nur die Zeit, in der tatsächlich zerspant wird.\n- Nicht enthalten: Rüsten, Werkstück ein-/ausspannen, Positionieren und Anfahren, Zustellen, Abheben und Rücklauf, Werkzeugwechsel, KSS einschalten, Messen und Prüfen, Reinigen, Handling und Logistik, Programmieren.\n- Bei Einzelteilen/Kleinserien sind Neben- und Rüstzeiten oft größer als die reine Hauptzeit.\n- Maschinenstundensatz bildet nur maschinenabhängige Kosten pro Laufzeit ab; reale Fertigungskosten enthalten zusätzlich variable Kosten, Bedienerlohn, Werkzeuge, Energie und Medien usw.\n- Ergebnis: Kosten = T_H·Stundensatz liefert nur eine Untergrenze/vereinfachte Prüfungsrechnung.\n中文题目：说明为什么用主时间 T_H 算单件成本会严重低估。\n中文答案：- T_H 只表示真正切削的时间。\n- 不包含：装夹、找正、定位、快进、进刀、退刀、回程、换刀、开冷却、测量检验、清理、搬运物流、编程等。\n- 单件、小批量时，辅助时间和准备时间往往比主切削时间还大。\n- 机床小时费率只是按机床运行时间分摊的一部分成本；真实成本还包括人工、刀具、能源、介质等。\n- 所以 Kosten=T_H·Stundensatz 只是考试中的简化下限。\n出处：Garber_2025_10_30.txt（老师口头强调只算 Hauptzeit 会低估真实成本）；FT 3 - Drehen - Skript.pdf S.20-S.21；FT 4 - Bohren - Skript.pdf S.30；full.md Abschnitt \"3.4 Hauptzeit und Fertigungskosten; 4.4 Hauptzeitberechnung"]
["Erklären Sie das Punch-Tap-Verfahren (Ablauf) und nennen Sie Vorteile und Nachteile sowie geeignete Werkstoffe.", "Frage (DE)：Erklären Sie das Punch-Tap-Verfahren (Ablauf) und nennen Sie Vorteile und Nachteile sowie geeignete Werkstoffe.\nAntwort (DE)：- Bezeichnung: Punch-Tap-Verfahren / Helikal-Gewindeformen.\n- Ablauf 1: Werkzeug hat unten zwei Schneiden; beim Punch/Eintauchen mit leichter Drehung werden zwei spiralförmige Nuten in die Bohrung geräumt.\n- Ablauf 2: Gewindeschneiden tauchen durch diese Nuten ohne Schnittbewegung ein.\n- Ablauf 3: Werkzeug wird um 1/2 Umdrehung gedreht; dadurch wird das gesamte Gewinde fertig geschnitten/geformt.\n- Ablauf 4: Schneiden stehen wieder in den gegenüberliegenden Nuten; Werkzeug kann ohne Schnittbewegung herausgezogen werden.\n- Vorteile: sehr schnell, kurze Hauptzeit, kein vollständiges Ausdrehen wie beim klassischen Gewindebohren.\n- Nachteile: Gewinde besitzt zwei Nuten und Unterbrechungen; Tragfähigkeit in der Praxis nur wenig eingeschränkt, aber als Einschränkung nennen.\n- Werkstoffe: geeignet vor allem gut umformbare/duktile Werkstoffe; spröde oder sehr harte Werkstoffe ungünstig.\n中文题目：解释 Punch-Tap 和螺旋螺纹成形工艺的流程，并列出优缺点和适用材料。\n中文答案：- 名称：Punch-Tap 或 Helikal-Gewindeformen。\n- 步骤1：刀具底部有两条切削刃；冲入、进入孔时伴随轻微旋转，在孔壁形成两条螺旋槽。\n- 步骤2：螺纹切削刃通过这些槽进入孔内，不需要正常切削进入。\n- 步骤3：刀具转半圈，完成整个螺纹的切削、成形。\n- 步骤4：切削刃又回到相对的槽内，因此可无切削运动拔出。\n- 优点：速度非常快，主时间短，不像经典攻丝那样必须完整旋出。\n- 缺点：螺纹上有两条槽、中断；实际承载能力通常只小幅降低，但仍是限制。\n- 材料：适合塑性、延展性好的材料；脆性或很硬的材料不适合。\n出处：Garber_2025_10_30.txt（老师讲 Punch-Tap 流程、速度和材料限制）；FT 4 - Bohren - Skript.pdf S.31；full.md Abschnitt \"4.5 Neues Verfahren: Punch Tap"]
["Warum sind umformende Verfahren besonders für die Serienfertigung geeignet?", "Frage (DE)：Warum sind umformende Verfahren besonders für die Serienfertigung geeignet?\nAntwort (DE)：sehr kurze Stückzeiten und Sekundentakt, hohe Mengenleistung; hohe Werkstoffausnutzung; gute mechanische Eigenschaften durch ununterbrochenen Faser-/Werkstoffzusammenhalt; hohe Maß- und Formgenauigkeit innerhalb bestimmter Toleranzen; Nachteil beziehungsweise Prüfungspunkt: teure und aufwändige Werkzeuge, lohnt sich v. a. bei großen Stückzahlen.\n中文题目：为什么成形工艺特别适合批量生产？\n中文答案：单件时间很短、可秒级生产，产量高；材料利用率高；由于材料连续变形，机械性能好；在一定范围内尺寸和形状精度好；但模具、工具昂贵，所以主要适合大批量。\n出处：11 - Grundlagen Umformen - Skript.pdf S.4-S.6；full.md 11.1 Umformende Verfahren；Garber_2025_11_06.txt（老师口头强调秒级节拍、系列生产）"]
["Nennen Sie Definition und grundlegenden Ablauf des Tiefziehens.", "Frage (DE)：Nennen Sie Definition und grundlegenden Ablauf des Tiefziehens.\nAntwort (DE)：Definition: Zug-Druck-Umformen eines Blechzuschnitts zu einem Hohlkörper bzw. Hohlkörper zu kleinerem Umfang, ohne beabsichtigte Veränderung der Blechdicke; Ablauf: 1 Ronde/Platine einlegen, 2 Niederhalter auf Ronde/Ziehring schließen, 3 Niederhalterkraft aufbringen, 4 Stempel fährt und formt; Werkzeuge: Ziehstempel, Ziehring, Niederhalter.\n中文题目：请给出深拉的定义与基本步骤。\n中文答案：定义：把板料通过拉-压复合应力成形为空心件，或把空心件成形为更小周长的空心件，通常不刻意改变板厚。步骤：放入圆片、板坯→压边圈压住圆片和拉深环→施加压边力→冲头运动完成成形。工具关键词：拉深冲头、拉深环、压边圈。\n出处：14 - Tiefziehen - Skript.pdf S.3, S.5；full.md 14.1 Tiefziehen；Garber_2025_11_06.txt（老师明确把Tiefziehen列为考试内容）"]
["Was passiert, wenn die Niederhalterkraft beim Tiefziehen zu klein oder zu groß ist?", "Frage (DE)：Was passiert, wenn die Niederhalterkraft beim Tiefziehen zu klein oder zu groß ist?\nAntwort (DE)：zu klein: Flansch wird tangential gestaucht, zu wenig Niederhalterwirkung → Faltenbildung; zu groß: Werkstoff kann schlechter nachfließen → Stempelkraft und Ziehkraft steigt → Zugspannung in der Zarge zu hoch → Reißen beziehungsweise Bodenreißer; wichtig: Verfahrensfenster zwischen Faltenbildung und Bodenreißer.\n中文题目：深拉时压边力太小或太大会发生什么？\n中文答案：压边力太小：法兰区受切向压缩但压不住，出现起皱、波纹。压边力太大：材料难以继续流入，冲头力、拉深力升高，筒壁拉应力过大，导致撕裂或底裂。考试关键词：存在一个工艺窗口，太小起皱，太大底裂。\n出处：14 - Tiefziehen - Skript.pdf S.12-S.13；full.md 14.3 Verfahrensgrenzen/Verfahrensfenster；Garber_2025_11_06.txt（老师口头强调卡住、力太大、Bodenreißer 和裂）"]
["Begründen Sie kurz: Warum kommt es zu Faltenbildung bzw. Bodenreißer beim Tiefziehen?", "Frage (DE)：Begründen Sie kurz: Warum kommt es zu Faltenbildung bzw. Bodenreißer beim Tiefziehen?\nAntwort (DE)：Faltenbildung: Flansch fließt nach innen auf kleineren Durchmesser → tangentiale Druckspannungen/Stauchung; bei zu geringer Niederhalterkraft wird diese Stauchung instabil; Bodenreißer: Ziehkraft wird über die Zarge übertragen, Zarge steht auf Zug; wenn σZ = FZ/(dZ·π·s0) ≥ Rm bzw. Materialfluss blockiert → Reißen am Boden-/Stempelradius, charakteristische Schwachstelle.\n中文题目：简要解释：为什么会起皱或出现底裂（Bodenreißer）？\n中文答案：起皱：法兰区向内流动到更小直径，产生切向压应力和压缩；如果压边不足，法兰区失稳起皱。底裂：拉深力通过筒壁传递，筒壁只受拉；当筒壁应力超过抗拉强度或材料流动受阻时，在底部、冲头圆角附近的薄弱区撕裂。\n出处：14 - Tiefziehen - Skript.pdf S.6-S.8, S.12-S.13；full.md 14.2-14.3；Garber_2025_11_06.txt（老师口头强调失败机制）"]
["Definieren Sie das Ziehverhältnis β im Erstzug und im Weiterzug (inkl. typische Grenzwerte).", "Frage (DE)：Definieren Sie das Ziehverhältnis β im Erstzug und im Weiterzug (inkl. typische Grenzwerte).\nAntwort (DE)：Erstzug: β1 = d0/d1, maximal ca. 2; Weiterzug: β2 = d1/d2, maximal ca. 1,6; Gesamt-Ziehverhältnis: βges = β1·β2·β3·…·βn, ohne Glühen maximal ca. 6,5; d0 = Rondendurchmesser, d1 und d2 = Durchmesser nach den jeweiligen Zugstufen.\n中文题目：定义首次拉深与再拉深的拉深比 β（含典型上限）。\n中文答案：首次拉深：β1=d0/d1，最大约2。再拉深：β2=d1/d2，最大约1.6。总拉深比：βges=β1·β2·β3·…·βn，不退火时最大约6.5。d0 是圆片直径，d1 和 d2 是各拉深阶段后的直径。\n出处：14 - Tiefziehen - Skript.pdf S.11；Formelblatt Fertigungstechnik.pdf（Tiefziehen Ziehverhältnis）；full.md 14.2 Tiefziehen - Ziehverhältnis"]
["Nennen Sie die Anteile der Ziehkraft FZ und eine typische Näherungsformel.", "Frage (DE)：Nennen Sie die Anteile der Ziehkraft FZ und eine typische Näherungsformel.\nAntwort (DE)：Anteile: FZ = Fid + FRR + FRN + FB; Fid = ideelle Umformkraft; FRR = Reibkraft an der Ziehringrundung; FRN = Reibkraft zwischen Ziehring und Niederhalter; FB = Biegung um die Ziehringrundung; Näherung: FZ = U·s·Rm·n; U = Umfang des Ziehstempels, s = Blechdicke, Rm = Zugfestigkeit, n = Korrekturfaktor abhängig vom Ziehverhältnis; Einflussgrößen: Ziehwerkstoff, Schmierstoff, Werkzeuggeometrie, Umformparameter.\n中文题目：写出拉深力 FZ 的组成与一个常用近似公式。\n中文答案：组成：FZ=理想成形力+拉深环圆角摩擦力+拉深环与压边圈之间摩擦力+绕圆角弯曲所需力。常用近似公式：FZ=U·s·Rm·n，其中 U 为冲头周长，s 为板厚，Rm 为抗拉强度，n 为随拉深比变化的修正系数。影响因素：材料、润滑、工具几何、工艺参数。\n出处：14 - Tiefziehen - Skript.pdf S.14；full.md 14.3 Ziehkraft；Formelblatt Fertigungstechnik.pdf（Umformende Verfahren und Tiefziehen）"]
["Erklären Sie das Grundprinzip des Fließpressens: Wohin fließt das Material beim Pressen?", "Frage (DE)：Erklären Sie das Grundprinzip des Fließpressens: Wohin fließt das Material beim Pressen?\nAntwort (DE)：Grundprinzip: Werkstück liegt zwischen Werkzeugteilen und wird mit Stempel durch Düse, Bohrung oder Spalt gedrückt; radiale und axiale Druckspannungen bringen den Werkstoff zum Fließen; wegen annähernder Volumenkonstanz fließt Material in freie bzw. weniger widerständige Bereiche der Form; Richtung je nach Verfahren: Vorwärts-, Rückwärts- oder Quer-Fließpressen; hohe Umformgrade möglich, aber Werkzeugbelastung und Verschleiß begrenzt.\n中文题目：解释流压基本原理：压下去后材料往哪里流？\n中文答案：基本原理：工件被夹在工具部件之间，用冲头通过孔、模口或间隙挤压；径向和轴向压应力使材料发生塑性流动。由于体积近似不变，材料会流向模具中自由空间或阻力较小的区域；根据模具约束不同，可分为正向、反向或横向流压。可达到很大变形量，但受工具载荷和磨损限制。\n出处：12 - Fließpressen - Skript.pdf S.5, S.12, S.15；11 - Grundlagen Umformen - Skript.pdf S.19-S.20；full.md 12.2 Fließpressen；Garber_2025_11_06.txt（老师口头示意材料被压后向可流方向长出来、秒级）"]
["Wie wird der Umformgrad φ beim Fließpressen typischerweise bestimmt?", "Frage (DE)：Wie wird der Umformgrad φ beim Fließpressen typischerweise bestimmt?\nAntwort (DE)：typisch über Querschnittsflächen, nicht über schwer bestimmbare Längen; Skriptformel: φ = ln(A1/A0); in Rechenaufgaben häufig positiven Betrag verwenden: |ln(A1/A0)| bzw. |ln(A0/A1)| je nach Definition von Anfangsfläche und Endfläche; wichtig: logarithmischer Umformgrad ist additiv bei mehreren Umformschritten.\n中文题目：流压时通常如何定义、计算变形程度 φ？\n中文答案：通常用截面积计算，而不是用难以确定的长度。课件公式写作 φ=ln(A1/A0)；做计算题时通常取正的变形量大小，即按题目约定取绝对值。注意：多个成形步骤的对数变形量可以相加。\n出处：12 - Fließpressen - Skript.pdf S.14-S.15；11 - Grundlagen Umformen - Skript.pdf S.20-S.21；Formelblatt Fertigungstechnik.pdf（Umformgrad）；full.md 12.2 Spannungszustand beim Kaltfließpressen"]
["Geben Sie eine einfache Beziehung für ideelle Umformkraft und ideelle Umformarbeit an.", "Frage (DE)：Geben Sie eine einfache Beziehung für ideelle Umformkraft und ideelle Umformarbeit an.\nAntwort (DE)：ideelle Umformkraft: Fid = A·kf (ohne Reibung); ideelle Umformarbeit: Wid = V·kfm·φ; A = aktuelle Querschnittsfläche, kf = Fließspannung, V = Werkstückvolumen, kfm = mittlere Fließspannung, φ = logarithmischer Umformgrad; gilt ideell, reale Prozesse benötigen Zusatzanteile für Reibung/Wirkungsgrad.\n中文题目：写出理想成形力与理想成形功的最基本关系。\n中文答案：理想成形力：Fid=A·kf（不含摩擦）。理想成形功：Wid=V·kfm·φ。A 为当前截面积，kf 为流动应力，V 为体积，kfm 为平均流动应力，φ 为对数变形量。实际过程还要考虑摩擦或效率。\n出处：11 - Grundlagen Umformen - Skript.pdf S.22-S.23；Formelblatt Fertigungstechnik.pdf（Umformenergie）；full.md 11.3 Umformkraft und Umformarbeit"]
["Warum entsteht beim Gesenkschmieden ein Grat und was sind die Nachteile?", "Frage (DE)：Warum entsteht beim Gesenkschmieden ein Grat und was sind die Nachteile?\nAntwort (DE)：Grat und Gratspalt: erhöht den Fließwiderstand zur Seite → Druck im Material steigt → Kavitäten werden besser gefüllt; Nachteile: höhere Kraft auf die Gesenke → höherer Werkzeugverschleiß; Abtrennen/Entgraten als zusätzlicher Arbeitsschritt; Materialverlust durch Grat; Hinweis: geschlossenes Gesenk vermeidet Grat, verlangt aber sehr genaue Rohteilmasse und hohe Werkzeuganforderungen.\n中文题目：模锻为什么会产生飞边（Grat），缺点是什么？\n中文答案：飞边、飞边槽的作用：提高材料向侧面流出的阻力，使内部压力升高，从而更好填满型腔。缺点：模具受力更大、磨损更高；后续必须去飞边；飞边造成材料损失。补充：闭式模具可避免飞边，但对坯料质量精度和模具要求很高。\n出处：13 - Schmieden - Skript.pdf S.15-S.16；full.md 13.4 Gesenkformschmieden；Garber_2025_11_06.txt（老师展示边上流出再切掉）"]
["Begründen Sie: Warum braucht Prägen trotz kleinem Hub sehr hohe Kräfte?", "Frage (DE)：Begründen Sie: Warum braucht Prägen trotz kleinem Hub sehr hohe Kräfte?\nAntwort (DE)：Prägen = typische Kaltschmiede-Anwendung; kleine Hubwege, aber sehr hohe Flächenpressung nötig, damit feine Konturen vollständig abgebildet werden; Kontaktfläche und Detailgeometrie erzeugt hohe lokale Spannungen; Werkstoff wird kaltverfestigt; Stempel/Werkzeug sehr hart und aufwändig; Praxispunkt aus Labor: Presskraft kann nahe Maximalpresskraft liegen.\n中文题目：解释：为什么压印、压币行程很小但需要很大的力？\n中文答案：压印属于典型冷锻应用。虽然行程很小，但要把细小轮廓完整压出来，需要极高面压；细节几何和接触区域导致局部应力很高，材料冷作硬化，冲头和模具必须很硬且制作复杂。实验室口头重点：可能接近压力机最大压力。\n出处：13 - Schmieden - Skript.pdf S.5（Kaltschmieden: Prägen und Kalibrieren, hohe Kräfte）；full.md 13.1 Nach Temperatur；Garber_2025_11_06.txt（Prägen/Presskraft口头补充，页码未定位）"]
["Rechnen Sie grob um: 1000 kN entsprechen etwa wie vielen Tonnen Gewichtskraft?", "Frage (DE)：Rechnen Sie grob um: 1000 kN entsprechen etwa wie vielen Tonnen Gewichtskraft?\nAntwort (DE)：1000 kN = 1 000 000 N; m = F/g ≈ 1 000 000/9,81 ≈ 101 900 kg ≈ 102 t; grobe Daumenregel: 10 kN ≈ 1 t Gewichtskraft, daher 1000 kN ≈ 100 t.\n中文题目：粗略换算：1000 kN 约等于多少吨的重量力？\n中文答案：1000 kN=1,000,000 N；用 m=F/g 估算，约 101,900 kg，即约102吨。课堂粗略规则：10 kN≈1吨力，所以1000 kN≈100吨力。\n出处：Garber_2025_11_06.txt（Presskraft单位换算口头强调）；课件未定位到，主题关键词：Presskraft, kN und t"]
["Nennen Sie den Unterschied zwischen Schruppen und Schlichten und den Einfluss des Bahnabstands auf Oberfläche und Zeit.", "Frage (DE)：Nennen Sie den Unterschied zwischen Schruppen und Schlichten und den Einfluss des Bahnabstands auf Oberfläche und Zeit.\nAntwort (DE)：Schruppen beziehungsweise Leistungszerspanung: hoher Materialabtrag, hohe Zerspankräfte, hohe Maschinensteifigkeit/Spindelleistung nötig; Schlichten: kleine Zustellung/kleines Schlichtaufmaß (<1 mm), Ziel gute Oberfläche und Genauigkeit; Formenbau: sehr enge Bahnabstände 0,1-1 mm, Kugel- oder Torusfräser, oft 5-Achs-Bearbeitung; kleiner Bahnabstand → bessere Oberfläche, aber sehr lange Bearbeitungszeit/teuer.\n中文题目：说出粗加工与精加工的区别，并说明走刀间距对表面与时间的影响。\n中文答案：粗加工：追求高去除率，切削力大，需要高刚性和高主轴功率。精加工：小余量、小切深，目标是好表面和高精度。模具制造中走刀间距常为0.1-1 mm，用球头或圆角铣刀，常用五轴。走刀间距越小，表面越好，但加工时间显著增加、成本高。\n出处：FT 5 - Fräsen - Skript.pdf S.8, S.10；full.md 5.4 Anwendungen/Formenbau Schlichtbearbeitung；Garber_2025_11_06.txt（老师强调好表面很贵、密走刀耗时）"]
["Warum wird CAM-Simulation durchgeführt und was sind typische Grenzen?", "Frage (DE)：Warum wird CAM-Simulation durchgeführt und was sind typische Grenzen?\nAntwort (DE)：Zweck: NC-Programm und CAM-Programm prüfen, Werkzeugbahn und Materialabtrag visualisieren, Kollisionen und Crashs vermeiden, Fehler vor realer Maschine finden; Grenzen: reale Steuerung und Maschinendynamik nur vereinfacht abgebildet; Beschleunigen/Bremsen, Ecken, Werkzeugwechsel, KSS, Spannmittel, Bedienzeiten und Nebenzeiten können fehlen → simulierte Bearbeitungszeit oft ungenau, Simulation ersetzt keine reale Prozessabsicherung.\n中文题目：为什么要做CAM仿真？它的典型局限是什么？\n中文答案：用途：检查NC 和 CAM 程序，显示刀路和材料去除，避免碰撞、撞机，在真实机床加工前发现错误。局限：真实机床控制和动态只被简化表示；加减速、拐角、换刀、冷却液、夹具和辅助时间可能未完全包含，因此仿真加工时间常不准确，不能完全替代真实工艺验证。\n出处：Garber_2025_11_06.txt（CAM仿真、时间不准口头补充）；课件未定位到，主题关键词：CAM-Simulation, Kollisionsprüfung und Bearbeitungszeit"]
["Definieren Sie Tiefbohren und begründen Sie, warum hoher KSS-Druck nötig ist.", "Frage (DE)：Definieren Sie Tiefbohren und begründen Sie, warum hoher KSS-Druck nötig ist.\nAntwort (DE)：Definition: keine eindeutige Grenze, üblich ab Durchmesser-zu-Länge-Verhältnis 1:10 bzw. L/D ≈ 10; Unterschied zum Kurzbohren: KSS wird mit hohem Druck in die Bohrung gepumpt, meist innere KSS-Zufuhr; Grund: Späne müssen aus langer Bohrung herausgespült werden, sonst Verstopfen, Werkzeugbruch, schlechte Oberfläche und Genauigkeit; Einsatzgrenzen: Zerspanbarkeit des Werkstoffs, Stabilität von Werkzeug und Maschine.\n中文题目：定义深孔钻，并解释为什么需要高压冷却润滑液。\n中文答案：深孔钻没有绝对界限，通常从直径:深度=1:10，即 L/D≈10 起算。与短孔钻的区别是必须用高压冷却润滑液，通常通过内冷供入孔内。原因：长孔中的切屑必须被冲出，否则会堵塞、断刀、表面和精度变差。限制因素：材料可加工性、工具和机床稳定性。\n出处：FT 4 - Bohren - Skript.pdf S.24-S.26；full.md 4.3 Tiefbohren；Garber_2025_11_06.txt（老师口头强调深孔钻、冲屑、冷却润滑液）"]
["Nennen Sie die drei Tiefbohrverfahren und unterscheiden Sie sie über KSS-Zufuhr und KSS-Abfuhr.", "Frage (DE)：Nennen Sie die drei Tiefbohrverfahren und unterscheiden Sie sie über KSS-Zufuhr und KSS-Abfuhr.\nAntwort (DE)：Einlippen-Tiefbohrer: innere KSS-Zufuhr, äußere KSS-Abfuhr und Spanabfuhr; Ejektorverfahren: innere KSS-Zufuhr und innere Abfuhr, KSS gelangt zwischen Bohrrohr und Werkzeug in die Bohrung, keine aufwändige BOZA-Abdichtung wie bei BTA; BTA-Tiefbohrer: äußere KSS-Zufuhr zwischen Werkzeug/Bohrungswand, innere Abfuhr durch Spanmaul/Werkzeug; alle dienen v. a. der sicheren Spanabfuhr bei langen Bohrungen.\n中文题目：列出三种深孔钻方式，并用“供液、回液路径”区分。\n中文答案：单刃深孔钻：内供液，外部排出冷却液和切屑。Ejektor 方法：内供液、内排液；冷却液在钻杆和工具之间进入孔内，不需要像 BTA 那样复杂的 BOZA 密封。BTA 深孔钻：外供液，即冷却液从工具和孔壁之间进入；内排液，即切屑-冷却液混合物通过刀具内部排出。三者核心都是保证长孔内切屑排出。\n出处：FT 4 - Bohren - Skript.pdf S.26-S.29；full.md 4.3 Tiefbohren；Garber_2025_11_06.txt（老师口头提到深孔钻、冲屑）"]
["Nennen Sie die Unterschiede zwischen *Gleichlauffräsen* und *Gegenlauffräsen* und begründen Sie die Wahl.", "Frage (DE)：Nennen Sie die Unterschiede zwischen *Gleichlauffräsen* und *Gegenlauffräsen* und begründen Sie die Wahl.\nAntwort (DE)：Gegenlauffräsen: für spielbehaftete Vorschubachsen; Zahn gleitet zuerst, dann Spanbildung; hoher Freiflächenverschleiß, schlechtere Oberfläche. Gleichlauffräsen: Zahn sofort im Schnitt; bessere Oberfläche; höhere Gefahr des Einziehens bei Spiel; bei Magnetspannung Kraftrichtung/Einzug besonders beachten. Wahl: alte/spielbehaftete Maschine → eher Gegenlauf; spielfreie CNC/gute Spannung und Oberfläche wichtig → eher Gleichlauf.\n中文题目：列出顺铣与逆铣的区别，并说明如何选择。\n中文答案：逆铣：适合有反向间隙的进给轴；刀齿先滑擦再切削，后刀面磨损大、表面较差。顺铣：刀齿立即进入切削，表面较好；但有间隙时有被拉入风险；磁力夹持时要特别注意力方向与工件被拉动。选择：老机床、有间隙优先逆铣；无间隙CNC、夹紧可靠且重视表面质量时优先顺铣。\n出处：FT 5 - Fräsen - Skript.pdf, S.5; full.md, Abschnitt 5.2 Gleich- und Gegenlauf; Garber_2025_11_13.txt, Stichwort Gleichlauf, Gegenlauf und Magnetspannung"]
["Nennen Sie Vorteile des *Gewindefräsens* gegenüber *Gewindebohren*.", "Frage (DE)：Nennen Sie Vorteile des *Gewindefräsens* gegenüber *Gewindebohren*.\nAntwort (DE)：geringeres Drehmoment; Gewinde in einem Durchgang → geringere Hauptzeit; freier Spänefall; höhere Schnittgeschwindigkeit → bessere Oberfläche; ein Werkzeug für mehrere/alle Gewindedurchmesser; mehrere radiale Zustellungen möglich bei hohen Schnittkräften, großer Auskragung, dünnwandigen Bauteilen, gehärteten oder schwer zerspanbaren Werkstoffen (Austenit, Inconel, Titan).\n中文题目：列出螺纹铣相对螺纹攻丝的优点。\n中文答案：扭矩更小；一次走刀成形、主加工时间更短；排屑自由；可用更高切削速度，表面更好；一把刀可加工多个、所有螺纹直径；当切削力过大、刀具悬伸长、薄壁件、淬硬材料或难加工材料（奥氏体钢、Inconel、钛）时，可分多次径向进给。\n出处：FT 5 - Fräsen - Skript.pdf, S.6; full.md, Abschnitt 5.2 Gewindefräsen; Garber_2025_11_13.txt, Stichwort Gewindefräsen"]
["Was passiert, wenn Sie beim Gewindefräsen **nach oben** bzw. **nach unten** spiralförmig fahren?", "Frage (DE)：Was passiert, wenn Sie beim Gewindefräsen **nach oben** bzw. **nach unten** spiralförmig fahren?\nAntwort (DE)：bei gleicher Werkzeug- und Drehrichtung als Merksatz aus der Vorlesung: spiralförmig nach oben fahren → Rechtsgewinde; spiralförmig nach unten fahren → Linksgewinde; entscheidend ist die Helixrichtung der programmierten Bahn.\n中文题目：螺纹铣时如果螺旋轨迹向上或向下走，会发生什么？\n中文答案：按老师课上给的记忆口径：在相同刀具、转向设定下，螺旋向上走→右旋螺纹；螺旋向下走→左旋螺纹；本质看程序轨迹的螺旋方向。\n出处：Fräsverfahren.pdf, S.6 (Schraubfräsen und Gewindefräsen); full.md, Abschnitt Schraubfräsen und Gewindefräsen; Garber_2025_11_13.txt,口头补充 Rechtsgewinde und Linksgewinde"]
["Nennen Sie typische Fräswerkzeuge und je einen typischen Einsatzfall.", "Frage (DE)：Nennen Sie typische Fräswerkzeuge und je einen typischen Einsatzfall.\nAntwort (DE)：Walzenstirnfräser: Planfräsen und Eckfräsen, große Abtragsleistung; Scheibenfräser: Nuten und Schlitze; Schaftfräser: universell, Taschen, Konturen und Schruppen; Kopier- oder Gesenkfräser und Kugelfräser: Freiformflächen und Formenbau-Schlichten; Torusfräser: Formenbau-Schlichten; Messerkopf: große plane Oberflächen, z.B. Hydraulik-Steuerblock.\n中文题目：列出典型铣刀，并各给一个典型用途。\n中文答案：圆柱端面铣刀：平面、台阶或大切除量；盘形铣刀：槽、切缝；立铣刀：通用加工、型腔、轮廓、粗加工；仿形、模具铣刀或球头刀：自由曲面、模具精加工；圆角刀：模具精加工；面铣刀盘：大平面，如液压阀块表面。\n出处：FT 5 - Fräsen - Skript.pdf, S.7–9; full.md, Abschnitt 5.3 Fräswerkzeuge und 5.4 Anwendungen; Garber_2025_11_13.txt, Stichwort Fräswerkzeuge, Kugelfräser und Messerkopf"]
["Erklären Sie kurz *Profilfräsen* und nennen Sie Beispiele.", "Frage (DE)：Erklären Sie kurz *Profilfräsen* und nennen Sie Beispiele.\nAntwort (DE)：Form des Fräs-Werkzeugs bildet sich auf dem Werkstück ab; Spezialfräser oder Formfräser; wirtschaftlich vor allem bei wiederholten Formen/Serien; Beispiele: Schwalbenschwanz-Führung, T-Nuten; verwandter Punkt: mehrere Formfräser als Satzfräser.\n中文题目：简述成形铣，并举例。\n中文答案：成形铣是让铣刀本身的轮廓形状复制到工件上，通常用专用成形刀；适合重复形状、批量生产。例子：燕尾导轨、T形槽；相关补充：多个成形刀可组成成组铣刀。\n出处：Fräsverfahren.pdf, S.7; FT 5 - Fräsen - Skript.pdf, S.4; full.md, Abschnitt Profilfräsen, Ergänzung zum Profilfräsen; Garber_2025_11_13.txt, Stichwort Profilfräser"]
["Was ist ein *Satzfräser* und warum ist er in der Serienfertigung sinnvoll?", "Frage (DE)：Was ist ein *Satzfräser* und warum ist er in der Serienfertigung sinnvoll?\nAntwort (DE)：mehrere Formfräser zu einem Satz zusammengestellt, auf Fräsdorn mit Zwischenringen; mehrere Konturen und Flächen in einem Durchgang; kurze Hauptzeit, gute Wiederholgenauigkeit; hoher Rüstaufwand und Werkzeugaufwand lohnt sich bei Serienfertigung.\n中文题目：什么是成组铣刀？为什么适合批量生产？\n中文答案：成组铣刀是把多把成形铣刀通过刀杆和间隔环组合成一组；一次走刀可同时加工多个轮廓、表面；主时间短、重复性好；虽然装调和刀具成本高，但在批量生产中划算。\n出处：FT 5 - Fräsen - Skript.pdf, S.4; full.md, Abschnitt Ergänzung zum Profilfräsen und Satzfräser; Garber_2025_11_13.txt, Stichwort Satzfräser und Baukasten"]
["Im Formenbau beträgt der Bahnabstand beim Schlichten z.B. **0,1 mm**. Wie viele Bahnen brauchen Sie über **2 m** Breite (vereinfachend)?", "Frage (DE)：Im Formenbau beträgt der Bahnabstand beim Schlichten z.B. **0,1 mm**. Wie viele Bahnen brauchen Sie über **2 m** Breite (vereinfachend)?\nAntwort (DE)：2 m = 2000 mm; Anzahl Bahnen ≈ Breite / Bahnabstand = 2000 mm / 0,1 mm = 20 000 Bahnen; vereinfachend ohne Überlappung, Randkorrektur und Werkzeugradiuskorrektur; Aussage: sehr lange Bearbeitungszeit.\n中文题目：模具精加工走刀间距0.1mm，覆盖2m宽大约需要多少条走刀？\n中文答案：2m=2000mm；走刀数≈宽度、走刀间距=2000/0.1=20000条。这里忽略重叠、边界修正和刀具半径补偿；考点是说明模具自由曲面精加工时间极长。\n出处：FT 5 - Fräsen - Skript.pdf, S.8; full.md, Abschnitt Formenbau Schlichtbearbeitung; Garber_2025_11_13.txt, Stichwort 0,1 mm/20.000 Bahnen"]
["Welche Achszahl wählen Sie typischerweise für (a) Formenbau-Schlichten, (b) Hydraulik-Steuerblock – und warum?", "Frage (DE)：Welche Achszahl wählen Sie typischerweise für (a) Formenbau-Schlichten, (b) Hydraulik-Steuerblock – und warum?\nAntwort (DE)：(a) Formenbau-Schlichten: typischerweise 5-Achs-Bearbeitung; Ziel gute Oberfläche und Genauigkeit; Kugelfräser und Torusfräser, sehr kleine Bahnabstände; Maschine mit hoher Dämpfung, hohe Genauigkeit. (b) Hydraulik-Steuerblock: typischerweise 4-Achs-Maschine; hauptsächlich Bohrungen und Gewinde, Fräsen nur Oberflächen; geringe Oberflächenanforderung, einmal mit Messerkopf reicht; wirtschaftlicher als 5-Achs.\n中文题目：(a) 模具自由曲面精加工、(b) 液压阀块，通常选几轴机床？为什么？\n中文答案：(a) 模具精加工通常选5轴：为了好表面和高精度，常用球头、圆角刀，小走刀间距，并要求机床高阻尼高精度。(b) 液压阀块通常4轴够用：主要是孔和螺纹，铣削只加工表面，表面要求相对低，面铣刀扫一遍即可；比5轴经济。\n出处：FT 5 - Fräsen - Skript.pdf, S.8–9; full.md, Abschnitt Formenbau-Schlichtbearbeitung und Hydraulik-Steuerblock; Garber_2025_11_13.txt, Stichwort 3-, 4- und 5-Achs und Kosten"]
["Warum kann man Glas/Keramik nicht „normal“ fräsen, und wie hilft Ultraschall-angeregtes Fräsen?", "Frage (DE)：Warum kann man Glas/Keramik nicht „normal“ fräsen, und wie hilft Ultraschall-angeregtes Fräsen?\nAntwort (DE)：Glas und spröde Keramik: sprödes Verhalten, normale Zerspanung → Splittern und Ausbrechen; Ultraschallanregung axial am Werkzeug → Abtrag winziger Partikel, keine echte Spanbildung; geeignet nur für kleine Werkstücke, z.B. Zahnkronen; große Teile unwirtschaftlich/langsam.\n中文题目：为什么玻璃、陶瓷不能用常规方式铣？超声振动铣如何解决？\n中文答案：玻璃、脆性陶瓷很脆，常规切削会崩裂。轴向超声振动使材料以微小颗粒方式去除，基本不形成普通切屑；因此只适合小工件，例如牙冠，大件效率太低。\n出处：FT 5 - Fräsen - Skript.pdf, S.11; full.md, Abschnitt Glas/Keramik fräsen; Garber_2025_11_13.txt, Stichwort Ultraschall/Zahnkronen"]
["Definieren Sie *Rattern* und unterscheiden Sie fremderregte vs. selbsterregte Schwingung.", "Frage (DE)：Definieren Sie *Rattern* und unterscheiden Sie fremderregte vs. selbsterregte Schwingung.\nAntwort (DE)：Rattern: starke, zu vermeidende Schwingungen beim Drehen und Fräsen. Fremderregte Schwingung: äußere oder periodische Anregung bzw. Schnittkraftanregung nahe Maschineneigenfrequenz. Selbsterregte Schwingung/Rattern: Instabilität im Zerspanprozess, entsteht aus Störungen und Prozessrückkopplung, keine äußere periodische Anregung nötig; große Schwingamplituden → Oberfläche, Werkzeug und Maschine gefährdet.\n中文题目：定义颤振，并区分受迫振动与自激振动。\n中文答案：颤振是在车削、铣削中必须避免的强烈振动。受迫振动：外部或周期激励、切削力激励接近机床固有频率。自激振动、颤振：由切削过程不稳定和反馈引起，不需要外部周期激励；振幅大，会损害表面、刀具和机床。\n出处：FT 5 - Fräsen - Skript.pdf, S.12; full.md, Abschnitt 5.5 Rattern Grundlagen; Garber_2025_11_13.txt, Stichwort selbsterregt/fremderregt"]
["Wie ermittelt man experimentell die *Grenzspantiefe* (ap) beim Rattern?", "Frage (DE)：Wie ermittelt man experimentell die *Grenzspantiefe* (ap) beim Rattern?\nAntwort (DE)：Testschnitt mit ap steigend; Schwingamplitude messen. Grenzspantiefe = ap, ab dem schlagartig große Amplituden/Rattern auftreten.\n中文题目：如何通过试切确定颤振的临界切深 ap？\n中文答案：做切深、径向吃刀量ap逐渐增大的试切，并观察或测量振幅；达到临界切深前是稳定切削或只有小的受迫振动。\n出处：FT 5 - Fräsen - Skript.pdf, S.13; full.md, Abschnitt Ermittlung der Grenzspantiefe; Garber_2025_11_13.txt, Stichwort Testschnitt/Grenzspantiefe"]
["Warum sinkt beim HSC die spezifische Schnittkraft, aber die Leistung an der Schneide steigt dennoch oft?", "Frage (DE)：Warum sinkt beim HSC die spezifische Schnittkraft, aber die Leistung an der Schneide steigt dennoch oft?\nAntwort (DE)：kc bzw. F_S sinkt bei v_S steigend; Leistung P=F_S*v_S. Wegen stark steigendem v_S kann P trotz kleinerer Kraft steigen.\n中文题目：为什么HSC中比切削力下降，但刀刃功率却常常仍会上升？\n中文答案：HSC即高速切削；许多材料在切削速度vS升高时，比切削力kc下降，切削力FS也会明显下降；但功率P=FS·vS，速度增幅很大，因此即使力变小，功率仍可能略升。\n出处：FT 5 - Fräsen - Skript.pdf, S.14; full.md, Abschnitt 5.6 High Speed Cutting Grundlagen; Garber_2025_11_13.txt, Stichwort P=F·v"]
["Was macht man in der Praxis beim HSC, um Werkzeugverschleiß zu beherrschen?", "Frage (DE)：Was macht man in der Praxis beim HSC, um Werkzeugverschleiß zu beherrschen?\nAntwort (DE)：Spanendicke/Zustellung reduzieren; mehrere schnelle Bahnen statt tiefer Schnitt; stabile, gewuchtete Werkzeuge und passende Spindel. Bei großem Zerspanvolumen ggf. HPC statt extremes HSC.\n中文题目：实际HSC中如何控制刀具磨损？\n中文答案：实际做法：减小切屑厚度/切深，多次快速走刀；使用稳定、动平衡好的刀具和合适主轴；高切除率时可改用HPC。\n出处：FT 5 - Fräsen - Skript.pdf, S.15 und S.20; full.md, Abschnitt HSC Vorteile und Nachteile und HPC; Garber_2025_11_13.txt, Stichwort Verschleiß, Spanendicke und mehrere Bahnen"]
["Nennen Sie typische HSC-Anwendungen und Maschinenanforderungen.", "Frage (DE)：Nennen Sie typische HSC-Anwendungen und Maschinenanforderungen.\nAntwort (DE)：Anwendungen: Al-Integralbauteile (Zeitspanvolumen) und Formenbau-Schlichten (Oberfläche/Genauigkeit). Anforderungen: hohe Spindelleistung, n bis ca. 30000 min^-1, Vorschub >20-30 m/min, gute Dynamik/Wuchtguete.\n中文题目：列出HSC典型应用与机床要求。\n中文答案：典型应用：铝整体件，用来提高单位时间切除体积；模具、工具制造中的精加工，用来获得好表面和精度。\n出处：FT 5 - Fräsen - Skript.pdf, S.15, S.17–18; full.md, Abschnitt HSC Vorteile und Anwendung Integralbauteile/Schlichtbearbeitung; Garber_2025_11_13.txt, Stichwort HSC Anwendungen"]
["Warum ist beim HSC ein erhöhter Abschirmungsbedarf notwendig?", "Frage (DE)：Warum ist beim HSC ein erhöhter Abschirmungsbedarf notwendig?\nAntwort (DE)：extreme Drehzahlen und hohe Umfangsgeschwindigkeiten; kleinste Bruchstücke und Späne können sehr hohe Fluggeschwindigkeiten erreichen; Gefahr für Bediener/Maschinenraum; deshalb geschlossener Arbeitsraum, stabile Abschirmung, geprüfte und gewuchtete Werkzeuge.\n中文题目：为什么HSC需要更强的防护、屏蔽？\n中文答案：HSC转速和圆周速度极高，微小断片或切屑也可能以很高速度飞出，对操作者和机床空间有危险；因此需要封闭工作区、强防护罩、合格且动平衡的刀具。\n出处：FT 5 - Fräsen - Skript.pdf, S.19; full.md, Abschnitt HSC Sicherheit; Garber_2025_11_13.txt, Stichwort Sicherheit, Wikipedia und Übertreibung"]
["Vergleichen Sie *HPC* mit *HSC* (Ziel, Parameter, Ergebnisoberfläche).", "Frage (DE)：Vergleichen Sie *HPC* mit *HSC* (Ziel, Parameter, Ergebnisoberfläche).\nAntwort (DE)：HSC: sehr hohe v_S, kleine Spanungsdicke/Zustellung, gute Oberfläche, Schlichten; Grenze Verschleiß. HPC: max. Zeitspanvolumen, v_S niedriger, f_z/Vorschub hoch, viele Schneiden; hohe Kräfte, schlechte Oberfläche.\n中文题目：对比HPC与HSC（目标、参数、表面结果）。\n中文答案：HSC：高v_S、小切屑/小切深、好表面、用于精加工；HPC：最大切除率、v_S较低、f_z/进给高、多刃；力大、表面较差。\n出处：FT 5 - Fräsen - Skript.pdf, S.20; full.md, Abschnitt 5.7 High Performance Cutting; Garber_2025_11_13.txt, Stichwort HPC vs HSC"]
["Warum ist Hartfräsen problematisch, und welche Schneidstoffe werden verwendet? Warum ist Diamant bei Stahl kritisch?", "Frage (DE)：Warum ist Hartfräsen problematisch, und welche Schneidstoffe werden verwendet? Warum ist Diamant bei Stahl kritisch?\nAntwort (DE)：Problem: harter Stahl kaum plastisch verformbar, Riss-/Segmentspanbildung, hohe Temperatur/Kräfte. Schneidstoffe: Keramik, CBN, PKD/PCD. Diamant/PKD bei Stahl kritisch: C-Diffusion/chemischer Verschleiß in Eisen.\n中文题目：为什么硬铣困难？常用哪些刀具材料？为什么金刚石在钢上很危险？\n中文答案：硬铣问题：材料难塑性变形、裂纹/分段屑、高温高力；刀具材料：陶瓷、CBN、PKD/PCD；金刚石/PKD加工钢会因碳扩散/化学磨损而快磨损。\n出处：FT 5 - Fräsen - Skript.pdf, S.21; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.22 (Diffusionsverschleiß); full.md, Abschnitt Hartfräsen und Diffusionsverschleiß; Garber_2025_11_13.txt, Stichwort Diamant, Stahl und Diffusion"]
["Was bedeutet „Schleifen = Spanen mit geometrisch (theoretisch) unbestimmter Schneide“?", "Frage (DE)：Was bedeutet „Schleifen = Spanen mit geometrisch (theoretisch) unbestimmter Schneide“?\nAntwort (DE)：Schleifen = Spanen mit geometrisch unbestimmter Schneide: viele gebundene Körner, zufaellige Schneidengeometrie/Eingriff. Typisch: sehr hohe v_c, kleine Spanquerschnitte, oft negativer Spanwinkel, gute Oberfläche.\n中文题目：“磨削=几何（理论）不确定刃切削”是什么意思？\n中文答案：磨削属于切削、分离中的几何不确定刃加工；砂轮由大量结合磨粒组成，每颗磨粒相当于一个刃，但刃形、前角和实际参与切削的磨粒都不确定、呈统计分布。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.4；full.md Abschnitt # 8 Schleifen; 8.1 Schleifverfahren Kennzeichen"]
["Warum ist Innenrundschleifen kritisch?", "Frage (DE)：Warum ist Innenrundschleifen kritisch?\nAntwort (DE)：Innenrundschleifen: große Kontaktlaenge, lange Späne, Porenverstopfung, KSS-Zugang schlecht, Temperatur/Schleifbrandgefahr hoch. Scheibe kleiner waehlen: D_s ca. 0,6...0,8 D_WS.\n中文题目：为什么内圆磨削是关键、容易出问题的工艺？\n中文答案：内圆磨削中砂轮与工件内表面的接触弧长大，磨粒在接触区停留时间长，切屑更长且容易堵塞砂轮气孔；排屑和冷却比外圆磨困难，所以热负荷和磨削烧伤风险高。\n出处：Garber_2025_11_20.txt（老师强调 Innenrundschleifen 要记住和 critical）；FT 8 - Schleifen - Skript.pdf S.5；full.md Abschnitt # 8.1 Schleifverfahren Innenrundschleifen"]
["Was ist „Ausfeuern“ und warum macht man das am Ende?", "Frage (DE)：Was ist „Ausfeuern“ und warum macht man das am Ende?\nAntwort (DE)：Ausfeuern = nach Endmass ohne Zustellung weiterschleifen, bis keine Funken mehr entstehen. Zweck: elastische Verformung/Restabtrag abbauen, Endmass und Oberfläche verbessern.\n中文题目：什么是Ausfeuern（空磨、走火），为什么在最后做？\n中文答案：达到终尺寸后不再继续进刀，而是继续磨削到不再产生火花；这样可以消除弹性变形和残余切削造成的微小余量，使表面质量提高，并帮助达到最终尺寸、尺寸稳定。\n出处：Garber_2025_11_20.txt；课堂照片 IMG_20251120_124128.jpg（老师手写 und das Endmaß）；FT 8 - Schleifen - Skript.pdf S.6、S.9；full.md Abschnitt # 8.1 Schleifverfahren Ausfeuern"]
["Warum ist beim (Umfangs-)Längsschleifen ein Überlauf notwendig?", "Frage (DE)：Warum ist beim (Umfangs-)Längsschleifen ein Überlauf notwendig?\nAntwort (DE)：Überlauf am Werkstückende nötig, sonst Enden nicht voll auf Maß. Richtwert: ca. 1/3 b der Schleifscheibenbreite.\n中文题目：为什么（周边）纵向磨削必须有超程？\n中文答案：砂轮必须越过工件端部，否则工件两端不能被完整磨到尺寸；课件给出的经验值是超程约为砂轮宽度b的1/3。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.6；full.md Abschnitt # 8.1 Schleifverfahren Umfangs-Längsschleifen"]
["Was ist Schleifbrand? Nennen Sie typische Ursachen und Abhilfe.", "Frage (DE)：Was ist Schleifbrand? Nennen Sie typische Ursachen und Abhilfe.\nAntwort (DE)：Schleifbrand = thermische Oberflächenschaedigung. Folgen: Umhärtung, Eigenspannungen, Mikrorisse. Ursachen: v_c zu hoch, f zu klein, stumpfe Scheibe/Abrichter, schlechte KSS-Zufuhr. Abhilfe: v_c senken, f erhöhen, abrichten, KSS richtig zuführen.\n中文题目：什么是磨削烧伤？列出典型原因和对策。\n中文答案：磨削烧伤=表面热损伤；后果：组织变化、残余应力、微裂纹；原因：v_c过高、进给太小、砂轮/修整器钝、KSS差；对策：降v_c、增进给、修整、正确供KSS。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.11、S.15；full.md Abschnitt # 8.1 Schleifverfahren Verfahrensgrenzen; # 8.1 Schmierstoffe"]
["Was passiert, wenn man vc erhöht, vf aber gleich lässt?", "Frage (DE)：Was passiert, wenn man vc erhöht, vf aber gleich lässt?\nAntwort (DE)：v_c steigt, v_f gleich: Spangroesse/Spanquerschnitt sinkt, Kräfte sinken, Rauheit sinkt -> bessere Oberfläche. Grenze: Reiben/Furchen statt Schneiden, Temperatur/Schleifbrand.\n中文题目：如果提高vc但vf保持不变，会发生什么？\n中文答案：这对应“质量磨削”的趋势：砂轮速度提高、进给不变，单个磨粒切屑尺寸变小，力下降，功率大致不变，加工时间不变，粗糙度下降，目标是更好表面；若目标是缩短时间，则应考虑同时提高vf，转向高性能磨削。\n出处：Garber_2025_11_20.txt；课堂照片 IMG_20251120_122733.jpg、IMG_20251120_123036.jpg（vc hoch, Furchen, Leistung und Temperatur）；FT 8 - Schleifen - Skript.pdf S.4、S.11、S.14、S.30–31；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen; # 8.5 Einflussgrössen"]
["Was bedeutet der Härtegrad A…Z bei Schleifscheiben?", "Frage (DE)：Was bedeutet der Härtegrad A…Z bei Schleifscheiben?\nAntwort (DE)：Härtegrad A...Z = Bindungsstaerke, nicht Kornhaerte. Hart: Korn bricht spaet aus, Standzeit hoch, Schnittigkeit klein, Wärme hoch. Weich: Selbstschaerfung, mehr Verschleiß/Rautiefe.\n中文题目：砂轮硬度A…Z表示什么？\n中文答案：它表示结合剂比例、结合强度，而不是磨粒本身的硬度；字母从A到Z越靠后越硬：硬砂轮磨粒不易脱落，寿命更长但切削性差、发热大，需要修整。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.23、S.29–31；full.md Abschnitt # 8.3 Schleifmittel und Schleifscheiben Härtegrad; # 8.4 Abrichten"]
["Nennen Sie die Aufgaben von Poren in der Schleifscheibe.", "Frage (DE)：Nennen Sie die Aufgaben von Poren in der Schleifscheibe.\nAntwort (DE)：Poren = größter Raumanteil im Schleifkörpergefüge; Aufgaben: Spankammern, Aufnahme/Abfuhr von Spänen, KSS-Zugang und Kühlung, weniger Zusetzen. Struktur: offen wirkt weicher und rauer; dicht wirkt härter, formbeständiger und ergibt geringere Rautiefe.\n中文题目：砂轮中气孔的作用是什么？\n中文答案：气孔是砂轮组织中的重要空间，主要作用是作为容屑空间、接收并带走切屑、让冷却润滑液进入磨削区、改善冷却并减少堵塞；Porosität表示气孔比例，Struktur表示磨粒体积分数、磨粒间距。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.22、S.31；full.md Abschnitt # 8.3 Schleifkörpergefüge"]
["Nennen Sie typische Schleifmittel und ordnen Sie sie grob zu.", "Frage (DE)：Nennen Sie typische Schleifmittel und ordnen Sie sie grob zu.\nAntwort (DE)：Korund: Staehle. SiC: Guss, NE-Metalle, Keramik/harte spröde Werkstoffe. CBN: gehaertete Staehle. Diamant: Hartmetall, Keramik, Glas, NE-Werkstoffe.\n中文题目：列出典型磨料并粗略说明适用对象。\n中文答案：典型磨料有刚玉、氧化铝（NK、HK 和 EK，常用于钢和一般磨削）、碳化硅SiC（更硬更脆，适合铸铁、有色金属、陶瓷等硬脆材料）、CBN立方氮化硼（适合淬硬钢）、金刚石（最硬，适合硬质合金、陶瓷、玻璃、有色材料）。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.17–18、S.21；full.md Abschnitt # 8.3 Schleifmittel; Einsatz der Körnungen"]
["Vergleichen Sie Qualitätsschleifen und Hochleistungsschleifen (Trends).", "Frage (DE)：Vergleichen Sie Qualitätsschleifen und Hochleistungsschleifen (Trends).\nAntwort (DE)：Qualitaetsschleifen: v_c hoch, v_f gleich -> Spangroesse/Kräfte/Rauheit sinken, Zeit gleich. Hochleistungsschleifen: v_c und v_f hoch -> Zeit sinkt, Leistung steigt, Rauheit etwa gleich.\n中文题目：比较质量磨削和高性能磨削的趋势。\n中文答案：质量磨削的目标是更好表面：vc升高、vf不变、切屑尺寸下降、力下降、功率约不变、加工时间不变、粗糙度下降。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.12、S.14；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen"]
["Skizzieren Sie qualitativ, warum die Kontaktlänge beim Innenrundschleifen größer ist und was die Folge ist.", "Frage (DE)：Skizzieren Sie qualitativ, warum die Kontaktlänge beim Innenrundschleifen größer ist und was die Folge ist.\nAntwort (DE)：Innenrund: kleine Scheibe im Innenradius -> langer Kontaktbogen; Folgen: Spanlaenge/Porenverstopfung/Temperatur/Schleifbrand hoch, KSS-Zugang schlecht. Richtwert D_s=0,6...0,8 D_WS.\n中文题目：定性画图说明为什么内圆磨接触长度更大，以及后果是什么。\n中文答案：图中应画出小砂轮在内孔中与内壁形成较长接触弧，而外圆磨时砂轮只在外圆上形成短接触弧；应标注Ds=0.6~0.8DWS。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.5–6；full.md Abschnitt # 8.1 Innenrundschleifen; Umfangs-Längsschleifen"]
["Skizzieren Sie Seiten-Planschleifen vs Umfangs-Planschleifen und nennen Sie die Abhilfe.", "Frage (DE)：Skizzieren Sie Seiten-Planschleifen vs Umfangs-Planschleifen und nennen Sie die Abhilfe.\nAntwort (DE)：Seiten-Planschleifen: Seitenkontakt, kleine Spankammer, hohe Wärme/Schleifdruck, schlechtere Qualitaet; Abhilfe Spindelsturz. Umfangs-Planschleifen: Umfangskontakt, kurze Späne, bessere KSS-/Spanabfuhr, geringere Wärme.\n中文题目：画出端面平面磨和周边平面磨，并说明改进措施。\n中文答案：端面平面磨用砂轮侧面接触工件，容屑空间小、砂轮热负荷高、磨削压力大、质量差；改进措施是主轴倾斜（Spindelsturz）。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.7–8；full.md Abschnitt # 8.1 Schleifverfahren Planschleifen"]
["Gegeben Dw = 50 mm. Bestimmen Sie den zulässigen Ds-Bereich.", "Frage (DE)：Gegeben Dw = 50 mm. Bestimmen Sie den zulässigen Ds-Bereich.\nAntwort (DE)：Formel: Ds = 0,6…0,8 · DWS; mit Dw/DWS = 50 mm: Ds,min = 0,6·50 mm = 30 mm; Ds,max = 0,8·50 mm = 40 mm; Ergebnis: Ds = 30…40 mm; Einheit mm angeben; Begründung: Scheibe deutlich kleiner, sonst Kontaktlänge, Temperatur und Porenverstopfung zu groß.\n中文题目：已知Dw=50mm，求允许的砂轮直径Ds范围。\n中文答案：用公式Ds=0.6~0.8·DWS；若工件内径为50mm，则Ds,min=0.6×50=30mm，Ds,max=0.8×50=40mm，所以允许范围是30~40mm；必须写单位。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.5；full.md Abschnitt # 8.1 Innenrundschleifen"]
["Schleifscheibenbreite b = 30 mm. Wie groß ist der Überlauf (Richtwert)?", "Frage (DE)：Schleifscheibenbreite b = 30 mm. Wie groß ist der Überlauf (Richtwert)?\nAntwort (DE)：Richtwert: Überlauf ≈ 1/3 b; b = 30 mm → Überlauf ≈ 10 mm; Einheit mm; Zweck: Werkstückenden werden vollständig auf Maß geschliffen; bei fehlendem Überlauf bleiben Enden unterbearbeitet/nicht maßhaltig.\n中文题目：砂轮宽度b=30mm，超程经验值约为多少？\n中文答案：超程经验值约为1/3b，因此b=30mm时，Überlauf≈10mm；必须写单位；其作用是保证工件端部也被完整磨到尺寸；若无超程，端部会磨不到尺寸。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.6；full.md Abschnitt # 8.1 Umfangs-Längsschleifen"]
["Sie sollen entweder die Oberfläche verbessern oder die Hauptzeit verkürzen. Welches Konzept wählen Sie und warum?", "Frage (DE)：Sie sollen entweder die Oberfläche verbessern oder die Hauptzeit verkürzen. Welches Konzept wählen Sie und warum?\nAntwort (DE)：Oberfläche verbessern: Qualitaetsschleifen, v_c hoch und v_f gleich -> Spangroesse/Kräfte/Rauheit sinken. Hauptzeit senken: Hochleistungsschleifen, v_c und v_f hoch -> Zeit sinkt, Leistung steigt. Schleifbrandgrenze beachten.\n中文题目：如果目标分别是改善表面或缩短主时间，应选择哪种磨削理念？为什么？\n中文答案：改善表面选择质量磨削：提高vc但vf不变，使切屑尺寸变小、力下降、粗糙度降低，目标是表面质量；缩短主时间选择高性能磨削：同时提高vc和vf，使切屑尺寸和力大致不变，但功率升高、加工时间下降，目标是效率；若温度过高，应调整KSS、参数或修整，而不是盲目只提高vc。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.11–12、S.14–15；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen; Verfahrensgrenzen"]
["Nennen Sie die Hauptgruppen der Fertigungsverfahren nach DIN 8580.", "Frage (DE)：Nennen Sie die Hauptgruppen der Fertigungsverfahren nach DIN 8580.\nAntwort (DE)：Urformen; Umformen; Trennen; Fügen; Beschichten; Stoffeigenschaften ändern; Merkhilfe: 1–6 nach DIN 8580; in der Prüfung auswendig können.\n中文题目：请写出 DIN 8580 的制造方法六大主组。\n中文答案：原始成形；变形；分离、去除；连接；涂覆；改变材料性能；考试口径：六大主组要能默写。\n出处：FT 1 -  Einführung - Skript.pdf S.8；11 - Grundlagen Umformen - Skript.pdf S.5（DIN 8580/DIN 8582 对位）；full.md：1.2 Einteilung der Fertigungsverfahren nach DIN 8580；Garber_2025_11_27.txt（老师强调 auswendig）"]
["Skizzieren Sie die Fließkurve kf(φ) für Kaltumformung. Wo beginnt sie und warum nicht bei 0?", "Frage (DE)：Skizzieren Sie die Fließkurve kf(φ) für Kaltumformung. Wo beginnt sie und warum nicht bei 0?\nAntwort (DE)：Achsen: kf [N/mm²] über φ bzw. φh; Start bei Re bzw. Rp0,2/Streckgrenze, nicht bei Ursprung; unterhalb der Streckgrenze nur elastisch, keine bleibende Umformung; Kurve steigt mit φ wegen Kaltverfestigung; bei Kaltumformung hängt kf nur von φh und Werkstoff ab.\n中文题目：画冷成形的流动曲线 kf(φ)。它从哪里开始？为什么不是从0开始？\n中文答案：纵轴 kf[N/mm²]，横轴 φ 或 φh；曲线从 Re 或 Rp0,2（屈服或0.2%屈服）开始，不从原点开始。\n出处：11 - Grundlagen Umformen - Skript.pdf S.12；full.md：11.2 Fließspannung und Umformgrad/Kaltumformung；Garber_2025_11_27.txt（老师说明 Prüfung 中要画、起点不能画成0）"]
["Geben Sie die Näherungsformel der Fließkurve an und nennen Sie den Nachteil bei φ=0.", "Frage (DE)：Geben Sie die Näherungsformel der Fließkurve an und nennen Sie den Nachteil bei φ=0.\nAntwort (DE)：Kaltumformung: kf = kf1 · φ^n; kf1 = Materialkonstante bei φ=1; n = Verfestigungskoeffizient.\n中文题目：写出流动曲线的经验公式，并说明 φ=0 的缺陷。\n中文答案：冷成形经验式：kf = kf1·φ^n；kf1 是 φ=1 时的材料常数，n 是硬化指数。\n出处：11 - Grundlagen Umformen - Skript.pdf S.12–13；Formelblatt Fertigungstechnik.pdf（Umformende Verfahren）；full.md：11.2 Rechnen mit der Fließspannung；Garber_2025_11_27.txt（老师强调 φ=0 的陷阱）"]
["Warum ist der Härtegrad einer Diamantschleifscheibe oft höher als bei Korundscheiben?", "Frage (DE)：Warum ist der Härtegrad einer Diamantschleifscheibe oft höher als bei Korundscheiben?\nAntwort (DE)：Härtegrad = Bindungsstaerke. Diamantkoerner teuer/sehr hart -> sollen lange gehalten werden, daher oft hoher Härtegrad. Korund oft weicher wegen Selbstschaerfung.\n中文题目：为什么金刚石砂轮的硬度等级往往比刚玉砂轮更高？\n中文答案：砂轮“硬度等级”指结合剂比例、结合强度，不是磨粒本身硬度；硬度高会阻止钝化磨粒过早脱落，寿命更长但切削性较差。\n出处：FT 8 - Schleifen - Skript.pdf S.23、S.26；full.md：8.3 Schleifmittel und Schleifscheiben/Härtegrad；Garber_2025_11_27.txt（老师提示 Das könnte eine Prüfungsfrage sein）"]
["Was ist Abrichten und wozu dient es?", "Frage (DE)：Was ist Abrichten und wozu dient es?\nAntwort (DE)：Abrichten = Formen + Schärfen. Formen: Profil/Rundlauf/Geometrie. Schärfen: stumpfe Körner/Bindung entfernen, Topographie herstellen. Zweck: Formgenauigkeit, Rundlauf, stabile Schleifqualitaet.\n中文题目：什么是砂轮修整（Abrichten），它的目的是什么？\n中文答案：修整=“整形+修锐”；整形用于恢复砂轮几何形状、轮廓、圆跳动，修锐用于恢复切削能力和表面形貌，露出或去除钝化磨粒、结合剂。\n出处：FT 8 - Schleifen - Skript.pdf S.29；full.md：8.4 Abrichten；Garber_2025_11_27.txt（老师讲 Abrichten 用于高精度、系列稳定加工）"]
["Einteilung nach DIN 8582: Nennen Sie die Umform-Hauptgruppen und je ein Beispiel.", "Frage (DE)：Einteilung nach DIN 8582: Nennen Sie die Umform-Hauptgruppen und je ein Beispiel.\nAntwort (DE)：Druckumformen: Walzen/Gesenkformen/Durchdruecken. Zug-Druck: Tiefziehen/Durchziehen. Zugumformen: Laengen/Weiten. Biegeumformen: Biegen. Schubumformen: Verschieben/Verdrehen.\n中文题目：按 DIN 8582：写出变形加工的主分类，并各举1例。\n中文答案：压缩成形：自由锻、模锻、压印、挤压、轧制；拉压复合成形：拉拔、深拉、翻边、旋压、胀形、压弯鼓包。\n出处：11 - Grundlagen Umformen - Skript.pdf S.5；full.md：11.1 Einteilung der Verfahren nach DIN 8582；Garber_2025_11_27.txt（本节从 DIN 8580 过渡到 Umformen 分类）"]
["Welche Kennwerte lesen Sie im Spannungs–Dehnungs–Diagramm ab (mind. 5)?", "Frage (DE)：Welche Kennwerte lesen Sie im Spannungs–Dehnungs–Diagramm ab (mind. 5)?\nAntwort (DE)：σ = F/S0, ε = Δl/l0; E-Modul: E = Δσ/Δε im elastischen Bereich; Rp0,2 bzw. Re bzw. Streckgrenze; Rm bzw. Zugfestigkeit; Ag bzw. Gleichmaßdehnung bis Kraftmaximum; A bzw. Bruchdehnung; zusätzlich: elastischer Bereich, plastischer Bereich, Bruchpunkt.\n中文题目：应力-应变图能读出哪些关键参数（至少5个）？\n中文答案：工程应力 σ=F/S0，工程应变 ε=Δl/l0；弹性段斜率 E=Δσ/Δε。\n出处：11 - Grundlagen Umformen - Skript.pdf S.7、S.11；full.md：11.2 Das Spannungs-Dehnungs-Diagramm und Definitionen；Garber_2025_11_27.txt 与课堂照片 IMG_20251127_131357（老师手写 E, Rp0,2, Rm, Ag, A）"]
["Definieren Sie den Umformgrad φ und nennen Sie den Vorteil der logarithmischen Definition.", "Frage (DE)：Definieren Sie den Umformgrad φ und nennen Sie den Vorteil der logarithmischen Definition.\nAntwort (DE)：Umformgrad: phi=ln(l1/l0), bei Volumenkonstanz phi_l+phi_b+phi_h=0. Bei Querschnittsverringerung oft phi=ln(A0/A1). Vorteil: logarithmische Umformgrade sind additiv.\n中文题目：定义变形度 φ，并说明为什么用对数定义。\n中文答案：某一方向的变形度 φ=ln(l1/l0)；体积近似不变时 φl+φb+φh=0；横截面减小时常用正值 φ=ln(A0/A1)；它不同于工程应变 ε=Δl/l0。\n出处：11 - Grundlagen Umformen - Skript.pdf S.11、S.19–21；Formelblatt Fertigungstechnik.pdf（Umformgrad）；full.md：11.3 Volumenkonstanz und Additivität der Formänderung；Garber_2025_11_27.txt（老师用 100%+100%≠300% 说明对数变形可相加）"]
["Berechnen Sie den Umformgrad: l0=50 mm → l1=100 mm.", "Frage (DE)：Berechnen Sie den Umformgrad: l0=50 mm → l1=100 mm.\nAntwort (DE)：φ = ln(l1/l0) = ln(100 mm / 50 mm) = ln(2) = 0,693; dimensionslos.\n中文题目：计算变形度：长度 50 mm 拉到 100 mm。\n中文答案：φ=ln(l1/l0)=ln(100mm/50mm)=ln2=0.693；无量纲。\n出处：11 - Grundlagen Umformen - Skript.pdf S.11、S.21；Formelblatt Fertigungstechnik.pdf（Umformgrad）；full.md：11.3 Additivität der Formänderung；Garber_2025_11_27.txt（课堂板书用长度倍增解释）"]
["Definieren Sie Honen.", "Frage (DE)：Definieren Sie Honen.\nAntwort (DE)：Honen = Feinstschleifen mit geometrisch unbestimmter Schneide; Honsteine mit gebundenen Körnern. Anwendung: Bohrungen. Ziel: Maß-, Form- und Oberflächenverbesserung.\n中文题目：给出珩磨（Honen）的定义。\n中文答案：珩磨是一种精细磨削、几何不确定刃切削方法；磨粒固结在珩磨石中；主要用于孔的后加工。\n出处：FT 9 - Honen.pdf S.2–3；full.md：9 Honen: Definition Honen；Garber_2025_11_27.txt（老师讲 Honen 接在 Schleifen 后，属于几何不确定刃精加工）"]
["Nennen Sie den Aufbau einer Honahle und wie die Zustellung erfolgt.", "Frage (DE)：Nennen Sie den Aufbau einer Honahle und wie die Zustellung erfolgt.\nAntwort (DE)：Honahle: Honleisten/Honsteine, Steinhalter, Kardangelenk, Zustellstange/-kolben, Expansionskonus. Zustellung radial, hydraulisch oder mechanisch ueber Expansionskonus.\n中文题目：珩磨头（Honahle）主要结构是什么？径向进给如何实现？\n中文答案：结构、部件：珩磨头、珩磨条、珩磨石、万向节、进给活塞、活塞杆、进给杆、扩张锥、珩磨石支架；珩磨石结构类似砂轮，磨粒可为普通刚玉、白刚玉、SiC、金刚石。\n出处：FT 9 - Honen.pdf S.4；full.md：9 Honen/Honahlen；Garber_2025_11_27.txt（老师讲 Honwerkzeuge 与径向 Zustellung）"]
["Welche Oberflächenstruktur erzeugt Honen und wozu dient sie bei Zylinderlaufflächen?", "Frage (DE)：Welche Oberflächenstruktur erzeugt Honen und wozu dient sie bei Zylinderlaufflächen?\nAntwort (DE)：Honen erzeugt Kreuzschliff durch Hubbewegung V_h + Umfangsbewegung V_u. Zylinderlaufflaechen: Mikro-Riefen speichern Oel, Schmierfilm bleibt, Reibung/Verschleiß sinken.\n中文题目：珩磨会产生什么表面纹理？在缸孔、缸套上它的作用是什么？\n中文答案：珩磨通过往复运动 Vh 与圆周运动 Vu 叠加形成交叉网纹、交叉磨纹；Vc=√(Vh²+Vu²)，tan(α/2)=Vh/Vu。\n出处：FT 9 - Honen.pdf S.5–6；full.md：9 Honen, Struktur einer gehonten Oberfläche und Anwendungen；Garber_2025_11_27.txt（老师强调 Zylinderlaufflächen 与 Öl-Speicherung）"]
["Welche Fehler einer Bohrung können durch Honen korrigiert werden (mind. 3)?", "Frage (DE)：Welche Fehler einer Bohrung können durch Honen korrigiert werden (mind. 3)?\nAntwort (DE)：Korrigierbar: Krümmung, Welligkeit, Tonnenform, Unrundheit, Untermaß, Konizität; typische erreichbare Qualität: IT 4 bis IT 5, Ra bis ca. 0,02 µm; Honen ist überwiegend Endbearbeitung nach Bohren oder Schleifen.\n中文题目：珩磨能纠正哪些孔的误差（至少3个）？\n中文答案：可修正：孔弯曲、波纹、桶形、失圆、欠尺寸（孔偏小）、锥度；典型可达到 IT4–IT5，Ra 可达约 0.02 µm；珩磨通常作为钻削或磨削后的最终精加工。\n出处：FT 9 - Honen.pdf S.7；full.md：9 Honen/Erreichbare Genauigkeit und Rauheit；Garber_2025_11_27.txt（老师讲可通过 Honen 改善 Maß, Form und Oberfläche）"]
["Welche Fehler kann Honen nicht korrigieren und warum?", "Frage (DE)：Welche Fehler kann Honen nicht korrigieren und warum?\nAntwort (DE)：Nicht korrigierbar: Uebermass, Positions-/Lagefehler, Schraegstellung/Achsneigung. Grund: Honen traegt nur Material ab und folgt der vorhandenen Bohrungsachse.\n中文题目：珩磨不能纠正哪些误差？为什么？\n中文答案：不能修正：孔过大、孔位置误差、孔轴线倾斜、姿态误差（位置公差类）；原因：珩磨只能去除材料，不能补材料。\n出处：FT 9 - Honen.pdf S.7（仅列可修正误差，反向对照）；课件未定位到：课堂板书、口头补充；full.md：9 Honen/Erreichbare Genauigkeit und Rauheit；Garber_2025_11_27.txt 与课堂照片 IMG_20251127_123226（Durch Honen nicht korrigierbar: Übermaß, Position, Schrägstellung und Lagetoleranzen）"]
["Was kommt in der Prüfung *sicher* dran?", "Frage (DE)：Was kommt in der Prüfung *sicher* dran?\nAntwort (DE)：Sicherer Prüfungsblock laut Transkript: Grundlagen der Zerspanung; Grundlagen der Umformung; Umformverfahren Fließpressen, Tiefziehen, Schmieden; Drehen kommt immer; Zusätzlich laut Prüfungsinhalt: Stoßen, Hobeln, Läppen und Räumen nicht behandeln.\n中文题目：期末确定会考什么？\n中文答案：固定不考：插削、刨削、研磨、研抛、拉削。\n出处：Garber_2025_12_04.txt（考试范围口头说明）；Prüfungsinhalt.pdf S.1；full.md Abschnitt „Themen für die Prüfung Fertigungstechnik“."]
["Skizzieren Sie die Fließkurve und erklären Sie den Startpunkt.", "Frage (DE)：Skizzieren Sie die Fließkurve und erklären Sie den Startpunkt.\nAntwort (DE)：Skizze: kf über ϕh; Start nicht im Ursprung, sondern bei Re bzw. Rp0,2; danach kf steigt mit ϕ wegen Kaltverfestigung/Verfestigungsverhalten.\n中文题目：画出流动曲线并解释起点。\n中文答案：纵轴 kf、横轴 ϕh；曲线不从原点开始，而从 Re bzw. Rp0,2 附近开始。\n出处：Garber_2025_12_04.txt（老师强调 Fließkurve und Skizze）；11 - Grundlagen Umformen - Skript.pdf S.11–12；full.md Abschnitt „11.2 Fließspannung und Umformgrad; Kaltumformung“."]
["Wie lautet die Fließkurven-Gleichung und warum gilt sie nicht bei ϕ=0?", "Frage (DE)：Wie lautet die Fließkurven-Gleichung und warum gilt sie nicht bei ϕ=0?\nAntwort (DE)：Kaltumformung: k_f=k_f1*phi^n. Bei phi=0 ergibt Formel 0, real beginnt Fliessen erst bei Re/Rp0,2. Anfangskraft mit Re/Rp0,2, Endkraft mit k_fe.\n中文题目：流动曲线公式是什么？为什么 ϕ=0 时不能直接用？\n中文答案：冷成形公式 kf = kf1·ϕ^n，kf1 是 ϕ=1 时材料常数，n 是硬化指数；ϕ=0 会算出 kf=0，但实际塑性流动要到 Re bzw. Rp0,2 才开始；所以起始力用 Re bzw. Rp0,2，末端力才用 kfe。\n出处：Garber_2025_12_04.txt（老师强调 ϕ=0 不能套公式、起始用 Re）；11 - Grundlagen Umformen - Skript.pdf S.12–13；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Fließspannung beim Kaltumformen“."]
["Definieren Sie Umformgrad ϕ und erklären Sie ϕ ≠ ε.", "Frage (DE)：Definieren Sie Umformgrad ϕ und erklären Sie ϕ ≠ ε.\nAntwort (DE)：Umformgrad: ϕ = ln(l1/l0) bzw. richtungsbezogen ϕl, ϕb, ϕh; Dehnung: ε = Δl/l0 = (l1-l0)/l0; Unterschied: ϕ logarithmisch, additiv bei mehreren Umformschritten; ε technisch/linear, nicht additiv; Nicht verwechseln mit Spannung σ=F/A0 und Fließspannung kf=F/A.\n中文题目：定义变形程度 ϕ，并说明它为什么不等于工程应变 ε。\n中文答案：ϕ=ln(l1/l0)，三个方向可写 ϕl、ϕb、ϕh；ε=Δl/l0=(l1-l0)/l0；ϕ 是对数变形，多个工步可相加。\n出处：Garber_2025_12_04.txt（老师强调 ϕ 不是 Dehnung）；11 - Grundlagen Umformen - Skript.pdf S.11, S.19, S.21；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Definitionen; Volumenkonstanz“."]
["Was gilt für das Vorzeichen des Umformgrades?", "Frage (DE)：Was gilt für das Vorzeichen des Umformgrades?\nAntwort (DE)：ϕ = ln(x1/x0); Maß kleiner: x1/x0 < 1 ⇒ ϕ < 0; Maß größer: x1/x0 > 1 ⇒ ϕ > 0; Beim Stauchen: Höhenumformgrad ϕh negativ, Flächenumformgrad bzw. Querumformgrad positiv; Für Energie und Arbeit wird der Betrag |ϕ| verwendet.\n中文题目：变形程度 ϕ 的正负号如何判断？\n中文答案：ϕ=ln(变形后尺寸、初始尺寸)；尺寸变小，比例小于1，ϕ 为负；尺寸变大，比例大于1，ϕ 为正。\n出处：Garber_2025_12_04.txt（板书、老师强调正负号）；11 - Grundlagen Umformen - Skript.pdf S.19–20；full.md Abschnitt „Volumenkonstanz beim Umformen“."]
["Begründen Sie: ϕl + ϕb + ϕh = 0.", "Frage (DE)：Begründen Sie: ϕl + ϕb + ϕh = 0.\nAntwort (DE)：Volumenkonstanz: l1*b1*h1=l0*b0*h0. Daraus ln(l1/l0)+ln(b1/b0)+ln(h1/h0)=ln(1)=0 -> phi_l+phi_b+phi_h=0.\n中文题目：证明 ϕl+ϕb+ϕh=0。\n中文答案：成形计算中用体积守恒：l1b1h1=l0b0h0；两边除以初始体积后取 ln，乘积变和，得到 ln(l1/l0)+ln(b1/b0)+ln(h1/h0)=0，即三方向变形程度相加为0。\n出处：Garber_2025_12_04.txt（老师板书推导）；11 - Grundlagen Umformen - Skript.pdf S.19–20；full.md Abschnitt „Volumenkonstanz beim Umformen“."]
["Additivität: Ein Draht wird zweimal nacheinander mit ϕ=1 umgeformt. Wie groß ist ϕgesamt?", "Frage (DE)：Additivität: Ein Draht wird zweimal nacheinander mit ϕ=1 umgeformt. Wie groß ist ϕgesamt?\nAntwort (DE)：ϕgesamt = ϕ1 + ϕ2 = 1 + 1 = 2; Begründung: logarithmische Umformgrade sind additiv; technische Dehnungen ε sind nicht additiv; Prüfungstrick: bei mehreren Stufen immer ϕ addieren, nicht Längenverhältnisse und ε falsch addieren.\n中文题目：加和性：一根线材连续两次变形，每次 ϕ=1，总 ϕ 是多少？\n中文答案：总变形程度 ϕgesamt=1+1=2；原因：对数变形程度可以直接相加，工程应变 ε 不可以。\n出处：Garber_2025_12_04.txt（老师说几乎每次考试都问、重点强调 Additivität）；11 - Grundlagen Umformen - Skript.pdf S.21；full.md Abschnitt „Additivität der Formänderung“."]
["Zeigen Sie den Zusammenhang zwischen Flächen-Umformgrad und Hauptumformgrad beim Stauchen.", "Frage (DE)：Zeigen Sie den Zusammenhang zwischen Flächen-Umformgrad und Hauptumformgrad beim Stauchen.\nAntwort (DE)：A=b·l; ϕA = ln(A1/A0)=ln(b1·l1/(b0·l0))=ln(b1/b0)+ln(l1/l0)=ϕb+ϕl; Mit Volumenkonstanz: ϕb+ϕl+ϕh=0 ⇒ ϕA = -ϕh; Beim Fließpressen wird der Umformgrad häufig über Flächen bestimmt, weil Längen schwerer zu berechnen sind.\n中文题目：说明镦粗时面积变形程度与主变形程度的关系。\n中文答案：面积 A=b·l，所以 ϕA=ln(A1/A0)=ϕb+ϕl；由体积守恒 ϕb+ϕl+ϕh=0，因此 ϕA=-ϕh；挤压中常用面积比来算变形程度，因为长度不易算。\n出处：Garber_2025_12_04.txt（老师板书推导，并说明脚本中不一定直接写）；11 - Grundlagen Umformen - Skript.pdf S.19–20；12 - Fließpressen - Skript.pdf S.14；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitte „Volumenkonstanz“ und „Spannungszustand beim Kaltfließpressen“."]
["Was ist die ideelle Umformkraft beim Stauchen?", "Frage (DE)：Was ist die ideelle Umformkraft beim Stauchen?\nAntwort (DE)：Fid = A · kf; A = aktuelle Kontaktfläche bzw. Querschnittsfläche, kf = Fließspannung im betrachteten Zustand; Ideell = nur Werkstoffumformung, ohne Reibkraft, Tribologie und Werkzeugverluste; Für Anfang: A0·Re; für Ende: AE·kfe.\n中文题目：镦粗时理想成形力是什么？\n中文答案：Fid=A·kf，A 是当前接触、截面积，kf 是该状态的流动应力；ideell 表示只考虑材料塑性变形，不包括摩擦力和工具损失。\n出处：Garber_2025_12_04.txt（老师强调 Anfang/Ende 力算法）；11 - Grundlagen Umformen - Skript.pdf S.22, S.25；full.md Abschnitt „Umformkraft und Umformarbeit beim Stauchen“."]
["Begründen Sie: Für Kraft nicht mit kfm rechnen, für Arbeit schon.", "Frage (DE)：Begründen Sie: Für Kraft nicht mit kfm rechnen, für Arbeit schon.\nAntwort (DE)：Kraft: Momentanzustand/max. Endkraft massgebend -> A_E*k_fe, nicht k_fm. Arbeit: Integral ueber Prozess -> k_fm als Mittelwert zulaessig; W_id=V*k_fm*|phi|.\n中文题目：为什么力不能用平均流动应力 kfm，但功可以用？\n中文答案：力是瞬时承载问题，设备必须能承受末端最大力，所以末端用 AE·kfe，不能用平均值；功、能量是沿变形过程积分，kf 在过程中变化，可用 kfm=(kf0+kfe)/2 近似。\n出处：Garber_2025_12_04.txt（老师明确强调该陷阱）；11 - Grundlagen Umformen - Skript.pdf S.13, S.22；full.md Abschnitte „Rechnen mit der Fließspannung“ und „Umformkraft und Umformarbeit“."]
["Wie lautet die ideelle Umformarbeit und warum steht |ϕ|?", "Frage (DE)：Wie lautet die ideelle Umformarbeit und warum steht |ϕ|?\nAntwort (DE)：Wid = V · kfm · |ϕ|; V = nur umgeformtes Volumen; kfm = mittlere Fließspannung; ϕ = maßgebender Umformgrad. |ϕ|, weil Arbeit/Energie positiv ist; beim Stauchen kann ϕh negativ sein; Einheit: N/mm² · mm³ = N·mm; 1000 N·mm = 1 J.\n中文题目：理想成形功公式是什么？为什么要写 |ϕ|？\n中文答案：Wid=V·kfm·|ϕ|；V 只取被变形体积，kfm 是平均流动应力，ϕ 是主变形程度；因为能量、功永远为正，镦粗高度方向 ϕh 可能为负，所以取绝对值。\n出处：Garber_2025_12_04.txt（老师强调能量取绝对值、只算变形体积）；11 - Grundlagen Umformen - Skript.pdf S.22–23；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Umformenergie“."]
["Was ist die spezifische Umformarbeit wd und wann ist sie vorteilhaft?", "Frage (DE)：Was ist die spezifische Umformarbeit wd und wann ist sie vorteilhaft?\nAntwort (DE)：wd = Wid/V; Bedeutung: notwendige Umformarbeit pro Werkstückvolumen in Abhängigkeit vom Umformgrad; Einheit wie Spannung: N/mm² (= N·mm/mm³); Vorteil: wenn wd-Diagramm gegeben ist, wd bei ϕ direkt ablesen und Wid = V·wd rechnen; keine Näherung über kfm nötig.\n中文题目：什么是比成形功 wd？什么时候更有利？\n中文答案：wd=Wid/V，表示单位体积所需成形功，随 ϕ 变化，单位可写 N/mm²；若题目给 wd 曲线，直接按 ϕ 读 wd，再用 Wid=V·wd，避免再用 kfm 近似积分。\n出处：Garber_2025_12_04.txt（老师提示有 wd 曲线优先用）；11 - Grundlagen Umformen - Skript.pdf S.23, S.26；full.md Abschnitt „Spezifische Umformarbeit“."]
["Berechnen Sie die erforderliche Rohlinglänge (D0=12 mm, Kopf: D=18 mm, hk=10 mm, Schaft=50 mm).", "Frage (DE)：Berechnen Sie die erforderliche Rohlinglänge (D0=12 mm, Kopf: D=18 mm, hk=10 mm, Schaft=50 mm).\nAntwort (DE)：Volumenkonstanz nur für den Kopf/umgeformten Teil: A0·Lk = Akopf·hk; π·6²·Lk = π·9²·10 ⇒ Lk = 10·(9²/6²)=22,5 mm; Unverformter Schaft bleibt 50 mm; Rohlinglänge: Lges = 50 + 22,5 = 72,5 mm.\n中文题目：求所需毛坯长度（D0=12 mm，头部 D=18 mm，高 10 mm，杆部 50 mm）。\n中文答案：只对头部、被变形部分用体积守恒：π·6²·Lk=π·9²·10，得 Lk=22.5 mm；未变形杆部仍为 50 mm，所以毛坯总长 72.5 mm。\n出处：Garber_2025_12_04.txt（老师板书 Bolzen 例题、强调 nur umgeformtes Volumen）；11 - Grundlagen Umformen - Skript.pdf S.25–26；full.md Abschnitt „Aufgaben Grundlagen Umformen; Berechnung mit spezifischer Umformarbeit“."]
["Bestimmen Sie den Hauptumformgrad ϕh.", "Frage (DE)：Bestimmen Sie den Hauptumformgrad ϕh.\nAntwort (DE)：Nur umgeformter Kopf: h0 = 22,5 mm, h1 = 10 mm ⇒ ϕh = ln(h1/h0)=ln(10/22,5)= -0,8109 ≈ -0,81; Gleichwertig über Fläche: ϕA = ln(A1/A0)=ln(π·9²/(π·6²))=+0,8109; Zusammenhang: ϕA=-ϕh; Für Arbeit: |ϕ|=0,81.\n中文题目：求主变形程度 ϕh。\n中文答案：只看被变形的头部：h0=22.5 mm，h1=10 mm，所以 ϕh=ln(10/22.5)=-0.8109≈-0.81；用面积算为 +0.8109，且 ϕA=-ϕh；计算功时用 |ϕ|=0.81。\n出处：Garber_2025_12_04.txt（老师板书 ϕ=ln(10/22,5) 与面积法）；11 - Grundlagen Umformen - Skript.pdf S.19–20, S.25–26；12 - Fließpressen - Skript.pdf S.14；full.md Abschnitt „Volumenkonstanz; Aufgaben Grundlagen Umformen“."]
["Berechnen Sie F0 und FE.", "Frage (DE)：Berechnen Sie F0 und FE.\nAntwort (DE)：Daten: Re=260 N/mm^2, kf1=740 N/mm^2, n=0,216; Anfang: A0=pi*6^2=113,10 mm^2; F0=A0*Re=113,10*260=29,4 kN; Ende: AE=pi*9^2=254,47 mm^2; kfe=740*0,8109^0,216 ca. 707 N/mm^2.\n中文题目：计算起始成形力 F0 和末端成形力 FE。\n中文答案：C10E：Re=260 N/mm²，kf1=740 N/mm²，n=0.216；起始 A0=π·6²=113.10 mm²，F0=A0·Re≈29.4 kN；末端 AE=π·9²=254.47 mm²，kfe=740·0.8109^0.216≈707 N/mm²，FE≈180 kN。\n出处：Garber_2025_12_04.txt（老师板书 F0≈29,4 kN、FE≈180 kN）；11 - Grundlagen Umformen - Skript.pdf S.12–13, S.22, S.25；full.md Abschnitt „Rechnen mit der Fließspannung; Aufgaben Grundlagen Umformen“."]
["Berechnen Sie die gesamte ideelle Umformarbeit Wid.", "Frage (DE)：Berechnen Sie die gesamte ideelle Umformarbeit Wid.\nAntwort (DE)：Formel: Wid = V · kfm · |ϕ|; Nur umgeformtes Volumen: V = Kopfvolumen = π·9²·10 = 2544,7 mm³. kfm=(kf0+kfe)/2≈(Re+kfe)/2=(260+707)/2≈483,6 N/mm². |ϕ|=0,8109; Wid≈2544,7·483,6·0,8109=9,98·10^5 Nmm≈998 J≈1,0 kJ (je nach Rundung ca. 996–998 J).\n中文题目：计算总理想成形功 Wid。\n中文答案：公式 Wid=V·kfm·|ϕ|；体积只取被变形的头部：V=π·9²·10=2544.7 mm³；kfm≈(260+707)/2=483.6 N/mm²，|ϕ|=0.8109。\n出处：Garber_2025_12_04.txt（老师板书 Wid≈996 J、强调 nur umgeformtes Volumen）；11 - Grundlagen Umformen - Skript.pdf S.22–26；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Umformarbeit; Berechnung mit spezifischer Umformarbeit“."]
["Nennen Sie Schmierstoffe und begründen Sie die Wahl für Kalt- vs. Warmumformung.", "Frage (DE)：Nennen Sie Schmierstoffe und begründen Sie die Wahl für Kalt- vs. Warmumformung.\nAntwort (DE)：Schmierstoffe: Kaltumformung Oel, Seife, Emulsion, Phosphat-/Seifenschicht. Warmumformung/Schmieden: Festschmierstoff/Trennmittel, z.B. Graphit-Wasser/-Oel. Zweck: Reibung/Verschleiß senken, Werkzeug schuetzen.\n中文题目：列举润滑剂，并说明冷成形与热成形的选择理由。\n中文答案：Tribologie 是摩擦、润滑、磨损；润滑作用是降摩擦、降磨损、改善金属流动、保护模具。\n出处：Garber_2025_12_04.txt（老师举 Öl, Seife, Emulsion und Graphit 并解释冷热区别）；11 - Grundlagen Umformen - Skript.pdf S.24；13 - Schmieden - Skript.pdf S.10；full.md Abschnitte „Tribologie“ und „Trennmittel“."]
["Wovon hängt das Formänderungsvermögen bei Stählen ab?", "Frage (DE)：Wovon hängt das Formänderungsvermögen bei Stählen ab?\nAntwort (DE)：Abhaengig von: chemischer Zusammensetzung (C, P, Legierung), Gefuege (Korngroesse, Perlitanteil/-verteilung) und Wärmebehandlung. Guenstig: feinkoernig, ferritisch, weichgeglueht.\n中文题目：钢的成形能力取决于哪些因素？\n中文答案：取决于三类：化学成分（C、Ni, Cr, V, Mo、Mn、P；C、P 和合金含量越高，成形能力越差）。\n出处：Garber_2025_12_04.txt（老师提到材料、成形能力因素）；11 - Grundlagen Umformen - Skript.pdf S.18；full.md Abschnitt „Formänderungsvermögen“."]
["Ein Stab ist 1 m lang. Wie lang ist er nach Umformgrad ϕ=1?", "Frage (DE)：Ein Stab ist 1 m lang. Wie lang ist er nach Umformgrad ϕ=1?\nAntwort (DE)：ϕ = ln(l1/l0)=1 ⇒ l1/l0=e^1=e≈2,718; Bei l0=1 m: l1≈2,718 m.\n中文题目：一根 1 m 长的杆，变形程度 ϕ=1 后长度是多少？\n中文答案：由 ϕ=ln(l1/l0)=1 得 l1/l0=e≈2.718，所以 l1≈2.718 m。\n出处：Garber_2025_12_04.txt（老师口头举例 1 m → e m）；11 - Grundlagen Umformen - Skript.pdf S.11；full.md Abschnitt „Definitionen; Umformgrad“."]
["Warum darf man bei der Umformarbeit nur das *umgeformte Volumen* \\(V_u\\) verwenden?", "Frage (DE)：Warum darf man bei der Umformarbeit nur das *umgeformte Volumen* \\(V_u\\) verwenden?\nAntwort (DE)：Nur plastisch verformter Werkstoffbereich zählt; nicht umgeformte oder halb umgeformte Bereiche nicht mitrechnen; \\(W_{id}=w_d\\cdot V_u\\) bzw. \\(W_{id}=V_u\\cdot k_{fm}\\cdot\\varphi\\); sonst Energie und Kraft zu groß; Einheitenfalle: \\(N/mm²\\cdot mm^3=Nmm\\), \\(1000\\,Nmm=1\\,J\\).\n中文题目：为什么算成形功只能使用“实际发生变形的体积”\\(V_u\\)？\n中文答案：只有发生塑性变形的材料区域才消耗成形功；未变形或只被夹持、支承的部分不能算入体积；计算时先确定 \\(V_u\\)，再乘 \\(w_d\\) 或 \\(k_{fm}\\varphi\\)。\n出处：11 - Grundlagen Umformen - Skript.pdf, S.22–23（Umformarbeit/spezifische Umformarbeit）；12 - Fließpressen - Skript.pdf, S.20（Aufgabe Fließpressen）；full.md, Abschnitte „11.3 Volumenkonstanz, Umformkraft, Umformarbeit“ und „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书：老师强调 „nur umgeformtes Volumen“、未变形部分不计。"]
["Wie bestimmen Sie die ideelle Umformarbeit \\(W_{id}\\) mit der spezifischen Umformarbeit \\(w_d\\)?", "Frage (DE)：Wie bestimmen Sie die ideelle Umformarbeit \\(W_{id}\\) mit der spezifischen Umformarbeit \\(w_d\\)?\nAntwort (DE)：Schema: 1) Hauptumformgrad \\(\\varphi\\) bestimmen, 2) \\(w_d(\\varphi)\\) aus Diagramm ablesen, 3) nur \\(V_u\\) berechnen, 4) \\(W_{id}=w_d\\cdot V_u\\), 5) \\(W_{ges}=W_{id}/\\eta\\) falls Wirkungsgrad gegeben; \\(w_d\\) nicht nochmals mit \\(\\varphi\\) multiplizieren.\n中文题目：如何用比成形功 \\(w_d\\) 求理想成形功 \\(W_{id}\\)？\n中文答案：步骤：先算主变形程度 \\(\\varphi\\)，从图读出对应 \\(w_d\\)，只取实际变形体积 \\(V_u\\)，用 \\(W_{id}=w_d\\cdot V_u\\)；若题给效率，再用 \\(W_{ges}=W_{id}/\\eta\\)。\n出处：11 - Grundlagen Umformen - Skript.pdf, S.23 und S.26（spezifische Umformarbeit \\(w_d\\)）；12 - Fließpressen - Skript.pdf, S.20；full.md, Abschnitt „Berechnung mit spezifischer Umformarbeit“；Garber_2025_12_11.txt; 板书：课堂按 \\(\\varphi\nightarrow w_d\nightarrow V\nightarrow W\\) 演算并强调单位。"]
["Warum wird der Umformgrad beim Fließpressen über Flächen berechnet und wie lautet die Formel?", "Frage (DE)：Warum wird der Umformgrad beim Fließpressen über Flächen berechnet und wie lautet die Formel?\nAntwort (DE)：Beim Fliesspressen sind Laengen schwer bestimmbar, Querschnitte durch Matrize/Stempel klar. Formel ueber Flächen: phi=ln(A1/A0) bzw. als positiver Betrag; bei Napf Ringflaeche verwenden.\n中文题目：为什么 Fließpressen 的变形程度用面积计算？公式是什么？\n中文答案：因为流压件的高度、底厚或材料流动路径常不清楚，而截面积由模具、冲头尺寸直接确定；按本课记号用 \\(\\varphi=\\ln(A_1/A_0)\\)，取大截面除以小截面使主变形程度为正；杯形、空心件用环形面积。\n出处：12 - Fließpressen - Skript.pdf, S.14（Umformgrad über Flächen）；Formelblatt Fertigungstechnik.pdf（Umformgrad \\(\\ln(A_1/A_0)\\)）；full.md, Abschnitt „Spannungszustand beim Kaltfließpressen“；Garber_2025_12_11.txt; 板书：老师强调面积法比长度法稳。"]
["Vorwärtsfließpressen: \\(D_0=40\\,mm\\), \\(D_1=20\\,mm\\). Wie groß ist \\(\\varphi\\)?", "Frage (DE)：Vorwärtsfließpressen: \\(D_0=40\\,mm\\), \\(D_1=20\\,mm\\). Wie groß ist \\(\\varphi\\)?\nAntwort (DE)：Querschnittsverhältnis über Durchmesserquadrate: \\(\\varphi=\\ln\\left((D_0/D_1)^2; ight)=\\ln\\left((40/20)^2; ight)=\\ln 4=1{,}386\\); \\(\\pi/4\\) kürzt sich; Korrektur aus der Vorlesung: \\(D_0=40\\,mm\\) verwenden.\n中文题目：前向流压：\\(D_0=40\\,mm\\)、\\(D_1=20\\,mm\\)，\\(\\varphi\\) 等于多少？\n中文答案：用面积比，也就是直径平方比：\\(\\varphi=\\ln((40/20)^2)=\\ln4=1.386\\)；圆面积中的 \\(\\pi/4\\) 会约掉。\n出处：12 - Fließpressen - Skript.pdf, S.20（Aufgabe Fließpressen；原题图）；full.md, Abschnitt „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书照片：课堂更正 \\(D_0=40\\,mm\\)，并算出 \\(\\ln4=1{,}386\\)。"]
["Wie berücksichtigen Sie \\(\\eta=0{,}5\\) bei der Umformarbeit?", "Frage (DE)：Wie berücksichtigen Sie \\(\\eta=0{,}5\\) bei der Umformarbeit?\nAntwort (DE)：\\(\\eta=W_{id}/W_{ges}\\); daher \\(W_{ges}=W_{id}/\\eta\\); bei \\(\\eta=0{,}5\\): \\(W_{ges}=2\\,W_{id}\\); erst \\(W_{id}=w_d\\cdot V_u\\) in \\(Nmm\\) bzw. J bestimmen, dann Verlust und Wirkungsgrad berücksichtigen.\n中文题目：η=0.5 时在成形功计算中如何处理？\n中文答案：效率定义为理想功、总功，所以总功 \\(W_{ges}=W_{id}/\\eta\\)；若 \\(\\eta=0.5\\)，则总功是理想功的两倍；必须先算 \\(W_{id}=w_d\\cdot V_u\\)，再除以效率。\n出处：12 - Fließpressen - Skript.pdf, S.20（η=0,5）；11 - Grundlagen Umformen - Skript.pdf, S.22–23；full.md, Abschnitt „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书：老师讲 \\(W_{ges}=2\\cdot W_{id}\\)，并提醒 \\(Nmm\nightarrow J\\)。"]
["Nennen Sie die drei Varianten des „Durchdrückens“.", "Frage (DE)：Nennen Sie die drei Varianten des „Durchdrückens“.\nAntwort (DE)：Verjüngen: geringe Formänderung, Werkstück muss nicht geführt werden; Fließpressen: diskontinuierlich, meist Kaltumformung, überwiegend Al/Cu; Strangpressen: sehr lange Profile, Warmumformung, überwiegend Aluminium.\n中文题目：请列举 Durchdrücken 的三种变体。\n中文答案：三种是：Verjüngen（缩径，小变形、不必强制导向）、Fließpressen（流压，间歇式，常为冷成形，主要铝、铜）、Strangpressen（挤压长型材，热成形，主要铝）。\n出处：12 - Fließpressen - Skript.pdf, S.4（Verfahren des Durchdrückens）；full.md, Abschnitt „12.1 Grundlagen / Verfahren des Durchdrückens“；Garber_2025_12_11.txt：课堂按 Verjüngen–Fließpressen–Strangpressen 分类讲解。"]
["Was passiert, wenn die Formänderung beim Verjüngen zu groß wird?", "Frage (DE)：Was passiert, wenn die Formänderung beim Verjüngen zu groß wird?\nAntwort (DE)：Benötigte Presskraft steigt stark; Werkstück wird ohne ausreichende Führung instabil/seitlich ausweichen bzw. ausbauchen; Matrize/Werkzeugbelastung und Reibung steigen; Übergang zu stärker geführtem Fließpressen sinnvoll.\n中文题目：如果 Verjüngen 的变形量过大，会发生什么？\n中文答案：所需压力急剧上升，工件在约束不足时会侧向鼓出、失稳而不是稳定通过模孔；模具载荷和摩擦增大；因此大变形时要用更强导向和约束的 Fließpressen。\n出处：12 - Fließpressen - Skript.pdf, S.4（Verjüngen: geringe Formänderung, Werkstück muss nicht geführt werden；Fließpressen als stärker geführtes Durchdrücken）；full.md, Abschnitt „Verjüngen und Fließpressen“；Garber_2025_12_11.txt：老师口头解释变形过大时会侧向变形。"]
["Definieren Sie Vorwärts- und Rückwärtsfließpressen.", "Frage (DE)：Definieren Sie Vorwärts- und Rückwärtsfließpressen.\nAntwort (DE)：Vorwärtsfließpressen: Materialfluss in Richtung der Stempelbewegung; Varianten: Voll-, Hohl-, Napf-Vorwärtsfließpressen; Rückwärtsfließpressen: Materialfluss entgegen der Stempelbewegung/zum Stempel zurück; Varianten: Voll-, Hohl-, Napf-Rückwärtsfließpressen.\n中文题目：定义前向流压和后向流压。\n中文答案：前向流压：材料流动方向与冲头运动方向相同；有实心、空心、杯形前向流压；后向流压：材料向冲头相反方向、回流方向流动；有实心、空心、杯形后向流压。\n出处：12 - Fließpressen - Skript.pdf, S.5–8（Verfahrensübersicht, Vorwärts-/Rückwärts-Fließpressen）；full.md, Abschnitt „12.2 Fließpressen“；Garber_2025_12_11.txt：课堂用方向区分 Vorwärts und Rückwärts。"]
["Nennen Sie Varianten des Rückwärts-Fließpressens.", "Frage (DE)：Nennen Sie Varianten des Rückwärts-Fließpressens.\nAntwort (DE)：Voll-Rückwärts-Fließpressen; Hohl-Rückwärts-Fließpressen; Napf-Rückwärts-Fließpressen.\n中文题目：列举后向流压的变体。\n中文答案：后向流压包括：实心后向流压、空心后向流压、杯形后向流压；考试中不要把前向或横向流压混进来。\n出处：12 - Fließpressen - Skript.pdf, S.5 und S.8（Rückwärts-Fließpressen）；full.md, Abschnitt „Rückwärts-Fließpressen“；Garber_2025_12_11.txt：课堂点名这些 Rückwärts 变体。"]
["Was ist Querfließpressen?", "Frage (DE)：Was ist Querfließpressen?\nAntwort (DE)：Materialfluss quer zur Stempel-/Hauptpressrichtung; zur Herstellung seitlicher Ansätze, Flansche und Anschlüsse; Varianten im Skript: Voll-Quer-Fließpressen, Hohl-Quer-Fließpressen; starke Werkzeugbeanspruchung durch seitlichen/radialen Druck möglich.\n中文题目：什么是横向流压？\n中文答案：材料不是沿冲头主运动方向，而是横向流动，用来形成侧向凸台、法兰或接口；课件列出实心横向和空心横向流压；由于侧向、径向压力大，模具承受较高载荷。\n出处：12 - Fließpressen - Skript.pdf, S.5 und S.10（Quer-Fließpressen）；full.md, Abschnitt „Voll-QuerFließpressen“；Garber_2025_12_11.txt：课堂用 seitlicher Anschluss und 侧向结构解释。"]
["Warum sind beim Kaltfließpressen Werkzeugbelastung und Verschleiß so hoch?", "Frage (DE)：Warum sind beim Kaltfließpressen Werkzeugbelastung und Verschleiß so hoch?\nAntwort (DE)：Kaltfliesspressen: hohe axiale/radiale Druckspannungen, hohe Reibung, hohe Fließspannung durch Kaltverfestigung. Folge: hohe Werkzeugbelastung/Verschleiß; Werkzeug muss zäh, warm- und verschleissfest sein.\n中文题目：为什么冷流压时模具载荷和磨损很高？\n中文答案：冷流压中材料受很高的轴向和径向压应力，模具承受大的径向力；冷成形流动应力和加工硬化高，摩擦大，所以磨损高；可达到的变形程度受模具承载能力限制。\n出处：12 - Fließpressen - Skript.pdf, S.14–15（Spannungszustand, Werkzeugbelastung/Verschleiß）；full.md, Abschnitte „Spannungszustand beim Kaltfließpressen“ und „Anforderungen an die Werkzeuge“；Garber_2025_12_11.txt：课堂强调径向力导致摩擦和磨损。"]
["Nennen Sie Anforderungen an Fließpress-Werkzeuge.", "Frage (DE)：Nennen Sie Anforderungen an Fließpress-Werkzeuge.\nAntwort (DE)：Warmfestigkeit und Warmzähigkeit; Warmrissunempfindlichkeit; Temperaturwechselbeständigkeit.\n中文题目：请列举流压模具的要求。\n中文答案：要求包括：热强度和热韧性、抗热裂、耐温度交变、抗氧化和腐蚀、高耐磨性、使用中形状稳定；常用调质合金钢；原因是径向力、摩擦和磨损都很大。\n出处：12 - Fließpressen - Skript.pdf, S.15（Fließpress-Werkzeuge）；full.md, Abschnitt „Anforderungen an die Werkzeuge“；Garber_2025_12_11.txt：课堂将工具限制与最大变形程度联系起来。"]
["Was ist Strangpressen und welche Werkstoffe dominieren?", "Frage (DE)：Was ist Strangpressen und welche Werkstoffe dominieren?\nAntwort (DE)：Definition: Durchdrücken eines aufgeheizten Blockes mittels Stempel durch eine Matrize; Zweck: sehr lange Profile; Prozess: Warmumformung; dominierende Werkstoffe: ca. 80% Aluminiumwerkstoffe, ca. 10% Kupferwerkstoffe, ca. 10% Eisenwerkstoffe.\n中文题目：什么是 Strangpressen？主要材料是什么？\n中文答案：Strangpressen 是用冲头把加热的坯块压过模具，用于制造很长的型材，属于热成形；主要材料比例：约80%铝合金、约10%铜合金、约10%铁基材料。\n出处：12 - Fließpressen - Skript.pdf, S.4 und S.16（Strangpressen, Werkstoffe）；full.md, Abschnitt „Anwendung: Strangpressen“；Garber_2025_12_11.txt：课堂说明 Strangpressen 用于长型材、主要是铝。"]
["Begründen Sie das „Verfahrensfenster“ beim Strangpressen.", "Frage (DE)：Begründen Sie das „Verfahrensfenster“ beim Strangpressen.\nAntwort (DE)：Verfahrensfenster: zu kalt -> Fließspannung/Presskraft zu hoch; zu heiss -> Schmelzbeginn/lokale Ueberhitzung. Zulässig zwischen Presskraft- und Schmelzgrenze, abhaengig von T und A0/A1.\n中文题目：解释 Strangpressen 的“工艺窗口”。\n中文答案：温度低或面积比大时材料流动应力高，需要的压力超过设备能力；温度太高时又会接近、发生局部熔化或过热。\n出处：12 - Fließpressen - Skript.pdf, S.17（Verfahrensgrenzen und Verfahrensfenster）；full.md, Abschnitt „12.3 Strangpressen / Verfahrensgrenzen“；Garber_2025_12_11.txt：课堂强调高压下可能出现 Schmelzbeginn。"]
["Nennen Sie die zwei Hauptvarianten des Schmiedens.", "Frage (DE)：Nennen Sie die zwei Hauptvarianten des Schmiedens.\nAntwort (DE)：Nach Werkzeugen: Freiformschmieden und Gesenk(form)schmieden; Freiform: Werkzeug nicht an Werkstückform gebunden, Einzel-/Kleinserien, große Toleranzen, viel Nacharbeit.\n中文题目：请列举锻造的两大主要类型。\n中文答案：按工具分为自由锻和模锻；自由锻工具不对应最终形状，适合单件、小批量，公差大、后加工多；模锻工具带有工件形状，适合中大批量，精度更好但模具成本高。\n出处：13 - Schmieden - Skript.pdf, S.4（Einteilung nach Werkzeugen）；full.md, Abschnitt „13.1 Einteilung der Schmiedeverfahren / Nach Werkzeugen“；Garber_2025_12_11.txt：课堂在 Schmieden 入门处点名 Freiform und Gesenk。"]
["Unterschied offenes vs geschlossenes Gesenk (Stichworte)?", "Frage (DE)：Unterschied offenes vs geschlossenes Gesenk (Stichworte)?\nAntwort (DE)：Offenes Gesenk: geringer seitlicher Widerstand, Kavitäten evtl. unvollständig. Gratspalt: Widerstand/Druck hoch, Fuellung besser; Nachteil Kraft, Verschleiß, Grat/Materialverlust. Geschlossen: kein Grat, aber Rohlingmasse sehr genau.\n中文题目：开式模、带飞边槽模和闭式模有什么区别？\n中文答案：开式模侧向流动阻力小，反压不足时型腔可能填不满；带飞边槽会提高侧向流动阻力和内部压力，使填充更好，但力和磨损增加，还要切飞边并损失材料。\n出处：13 - Schmieden - Skript.pdf, S.15–16（Einteilung der Gesenke）；full.md, Abschnitt „13.4 Gesenkformschmieden / Einteilung der Gesenke“；Garber_2025_12_11.txt：课堂在 Schmieden 入门后对 Gesenk 进行了对位补全。"]
["Nennen Sie die Kienzle-Gleichung zur Schnittkraft und die Bedeutung der Größen.", "Frage (DE)：Nennen Sie die Kienzle-Gleichung zur Schnittkraft und die Bedeutung der Größen.\nAntwort (DE)：Kienzle: Fc=kc*A=kc*b*h; A=b*h=ap*f; h=f*sin(kappa); b=ap/sin(kappa). kc=kc1.1*(h/h0)^(-mc), h0=1 mm; auch Fc=kc1.1*b*h0*(h/h0)^(1-mc). Korrekturen: Kv, Kver, Kgamma, Ksch.\n中文题目：写出Kienzle切削力公式，并说明各量含义。\n中文答案：Kienzle：Fc=kc·A=kc·b·h；A=b·h=ap·f；h=f·sinκ；b=ap/sinκ；kc=kc1.1·(h/h0)^(-mc)，h0=1mm；修正系数：Kv、Kver、Kγ、Ksch。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf，S.23–25；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Kienzle/往届题4）；Garber_2025_12_18.txt（老师板书：Schnittkraft und Kienzle，auswendig）"]
["Wie lautet die Beziehung zwischen Schnittgeschwindigkeit, Drehzahl und Durchmesser beim Drehen?", "Frage (DE)：Wie lautet die Beziehung zwischen Schnittgeschwindigkeit, Drehzahl und Durchmesser beim Drehen?\nAntwort (DE)：vc = π · d · n; bei d in mm und n in min^-1: vc [m/min] = π · d[mm] · n[min^-1] / 1000; Umstellung: n = vc/(π · d); Einheiten sauber umrechnen.\n中文题目：车削中切削速度、转速和直径的关系式是什么？\n中文答案：vc=π·d·n；如果d用mm、n用min^-1，则vc[m/min]=π·d[mm]·n[min^-1]/1000；反算转速：n=vc/(πd)。\n出处：FT 3 - Drehen - Skript.pdf，S.22；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Drehen：Zusammenhänge zwischen Schnittgrößen）；Garber_2025_12_18.txt（老师板书：v = n · π · d，auswendig）"]
["Wie wird die Umformenergie und Umformarbeit näherungsweise berechnet?", "Frage (DE)：Wie wird die Umformenergie und Umformarbeit näherungsweise berechnet?\nAntwort (DE)：Ideelle Umformarbeit: Wid = V · kfm · φ; kfm = mittlere Fließspannung, näherungsweise (kf0 + kfe)/2; φ = Umformgrad, z.B. φ = ln(L1/L0) bzw. bei Fließpressen oft über Flächen; V Werkstückvolumen; Einheit: N/mm² · mm³ = Nmm.\n中文题目：成形能量、成形功如何近似计算？\n中文答案：理想成形功Wid=V·kfm·φ；kfm为平均流动应力，可近似(kf0+kfe)/2；φ为成形度。\n出处：11 - Grundlagen Umformen - Skript.pdf，S.22–23；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Umformende Verfahren：Umformenergie）；Garber_2025_12_18.txt（老师板书：Umformkraft und Umformenergie，optional）"]
["Definieren Sie Tiefziehen.", "Frage (DE)：Definieren Sie Tiefziehen.\nAntwort (DE)：Tiefziehen = Zug-Druck-Umformen eines Blechzuschnitts zu einem Hohlkörper oder eines Hohlkörpers zu einem Hohlkörper mit kleinerem Umfang; ohne beabsichtigte Veränderung der Blechdicke; Verfahren: mit Werkzeugen, mit Wirkmedien, mit Wirkenergie.\n中文题目：给出深拉的定义。\n中文答案：深拉是把板料成形为中空件，或把中空件成形为周长更小的中空件的拉-压复合成形；目标不是刻意改变板厚；工艺类别：工具深拉、介质深拉、能量深拉。\n出处：14 - Tiefziehen - Skript.pdf，S.3；full.md（14.1 Tiefziehen：Definition）；Garber_2025_12_18.txt（老师讲Tiefziehen定义和分类）"]
["Beschreiben Sie den Ablauf des Tiefziehprozesses (mit Werkzeugen).", "Frage (DE)：Beschreiben Sie den Ablauf des Tiefziehprozesses (mit Werkzeugen).\nAntwort (DE)：Ablauf: Ronde/Platine einlegen; Niederhalter auf Ronde/Ziehring; Niederhalterkraft aufbringen; Stempel formt Boden/Zarge, Werkstoff fliesst aus Flansch nach innen. Werkzeuge: Ziehring, Niederhalter, Stempel.\n中文题目：说明工具深拉的工艺流程。\n中文答案：1）放入圆片、板料；2）压边圈压在圆片和下方拉深环上。\n出处：14 - Tiefziehen - Skript.pdf，S.5–7；full.md（14.1 Ablauf des Tiefziehprozesses；14.2 Phase 1/2）；Garber_2025_12_18.txt（老师强调：Den frage ich ab）"]
["Warum braucht man einen Niederhalter beim Tiefziehen?", "Frage (DE)：Warum braucht man einen Niederhalter beim Tiefziehen?\nAntwort (DE)：Im Flansch entstehen tangentiale Druckspannungen; ohne Niederhalter wölbt sich das Blech aus → Falten/Wellen; Niederhalter hält den Flansch flach, unterdrückt Faltenbildung, darf Materialfluss aber nicht blockieren; richtige FN liegt im Verfahrensfenster.\n中文题目：为什么深拉需要压边圈？\n中文答案：法兰区会产生切向压应力；如果没有压边圈，板料会鼓起形成皱褶、波纹；压边圈用于压平法兰、抑制起皱，但不能完全阻止材料向内补料；压边力必须处在工艺窗口内。\n出处：14 - Tiefziehen - Skript.pdf，S.7–8、S.12–13；full.md（Faltenbildung ohne Niederhalter；Verfahrensgrenzen）；Garber_2025_12_18.txt（老师讲Niederhalter：zu klein Falten，zu groß Riss）"]
["Was passiert bei zu kleiner bzw. zu großer Niederhalterkraft?", "Frage (DE)：Was passiert bei zu kleiner bzw. zu großer Niederhalterkraft?\nAntwort (DE)：Zu kleine FN → Flansch nicht ausreichend gehalten → Faltenbildung und Wellen; Zu große FN → Reibung und Stempelkraft steigt, Material fließt schlechter nach → Zarge und Bodenbereich überlastet → Riss beziehungsweise Bodenreißer.\n中文题目：压边力过小或过大会发生什么？\n中文答案：压边力过小：法兰区压不住，产生皱褶、波纹；压边力过大：摩擦和冲头力增大，材料补料困难，筒壁、底部边缘受拉过载，出现裂纹、底部撕裂。\n出处：14 - Tiefziehen - Skript.pdf，S.12–13；full.md（14.3 Verfahrensgrenzen；Verfahrensfenster）；Garber_2025_12_18.txt（老师强调压边力过小、过大后果）"]
["Wo liegt die charakteristische Schwachstelle eines tiefgezogenen Bauteils und warum?", "Frage (DE)：Wo liegt die charakteristische Schwachstelle eines tiefgezogenen Bauteils und warum?\nAntwort (DE)：Am Rand des Bodens / im Bereich des Stempelradius; Ursache: Hauptumformung an Stempel- und Ziehringradien; dort Blechdickenabnahme und Verfestigung; Zarge überträgt Stempelkraft als Zugkraft → bei Überlastung Bodenreißer beziehungsweise Riss.\n中文题目：深拉件的典型薄弱区在哪里？为什么？\n中文答案：典型薄弱区在底部边缘、冲头圆角区域；原因是主要变形集中在冲头和拉深环圆角处，那里板厚减小并发生加工硬化。\n出处：14 - Tiefziehen - Skript.pdf，S.6、S.12–13；full.md（14.2 Phase 1：charakteristische Schwachstelle；往届题14：Am Rand des Bodens）；Garber_2025_12_18.txt（老师强调深拉件Schwachstelle）"]
