["Warum sinkt beim HSC die spezifische Schnittkraft, aber die Leistung an der Schneide steigt dennoch oft?","Frage (DE)：Warum sinkt beim HSC die spezifische Schnittkraft, aber die Leistung an der Schneide steigt dennoch oft?\nAntwort (DE)：kc bzw. F_S sinkt bei v_S steigend; Leistung P=F_S*v_S. Wegen stark steigendem v_S kann P trotz kleinerer Kraft steigen.\n中文题目：为什么HSC中比切削力下降，但刀刃功率却常常仍会上升？\n中文答案：kc 或切削力 F_S 会随着切削速度 v_S 增大而下降；但功率 P=F_S·v_S。由于 v_S 大幅增大，即使力变小，功率仍可能上升。\n出处：FT 5 - Fräsen - Skript.pdf, S.14; full.md, Abschnitt 5.6 High Speed Cutting Grundlagen; Garber_2025_11_13.txt, Stichwort P=F·v"]
["Was macht man in der Praxis beim HSC, um Werkzeugverschleiß zu beherrschen?","Frage (DE)：Was macht man in der Praxis beim HSC, um Werkzeugverschleiß zu beherrschen?\nAntwort (DE)：Spanendicke/Zustellung reduzieren; mehrere schnelle Bahnen statt tiefer Schnitt; stabile, gewuchtete Werkzeuge und passende Spindel. Bei großem Zerspanvolumen ggf. HPC statt extremes HSC.\n中文题目：实际HSC中如何控制刀具磨损？\n中文答案：减小切屑厚度或切深；采用多条快速刀路，而不是一次深切；使用稳定、动平衡好的刀具和合适主轴。若要求很大的单位时间切除体积，必要时用 HPC，而不是极端 HSC。\n出处：FT 5 - Fräsen - Skript.pdf, S.15 und S.20; full.md, Abschnitt HSC Vorteile und Nachteile und HPC; Garber_2025_11_13.txt, Stichwort Verschleiß, Spanendicke und mehrere Bahnen"]
["Nennen Sie typische HSC-Anwendungen und Maschinenanforderungen.","Frage (DE)：Nennen Sie typische HSC-Anwendungen und Maschinenanforderungen.\nAntwort (DE)：Anwendungen: Aluminium-Integralbauteile (Zeitspanvolumen) und Formenbau-Schlichten (Oberfläche/Genauigkeit). Anforderungen: hohe Spindelleistung, n bis ca. 30000 min^-1, Vorschub >20-30 m/min, gute Dynamik/Wuchtgüte.\n中文题目：列出HSC典型应用与机床要求。\n中文答案：应用：铝整体件，用于提高单位时间切除体积；模具制造中的精加工，用于获得好的表面和精度。机床要求：高主轴功率，转速 n 可到约 30000 min^-1，进给速度大于 20–30 m/min，良好的动态性能和动平衡质量。\n出处：FT 5 - Fräsen - Skript.pdf, S.15, S.17–18; full.md, Abschnitt HSC Vorteile und Anwendung Integralbauteile/Schlichtbearbeitung; Garber_2025_11_13.txt, Stichwort HSC Anwendungen"]
["Warum ist beim HSC ein erhöhter Abschirmungsbedarf notwendig?","Frage (DE)：Warum ist beim HSC ein erhöhter Abschirmungsbedarf notwendig?\nAntwort (DE)：extreme Drehzahlen und hohe Umfangsgeschwindigkeiten; kleinste Bruchstücke und Späne können sehr hohe Fluggeschwindigkeiten erreichen; Gefahr für Bediener/Maschinenraum; deshalb geschlossener Arbeitsraum, stabile Abschirmung, geprüfte und gewuchtete Werkzeuge.\n中文题目：为什么HSC需要更强的防护、屏蔽？\n中文答案：由于转速和圆周速度极高，极小的断片和切屑也可能达到很高的飞出速度，会危及操作者和机床空间。因此需要封闭工作区、稳定防护，并使用经过检验和动平衡的刀具。\n出处：FT 5 - Fräsen - Skript.pdf, S.19; full.md, Abschnitt HSC Sicherheit; Garber_2025_11_13.txt, Stichwort Sicherheit, Wikipedia und Übertreibung"]
["Vergleichen Sie *HPC* mit *HSC* (Ziel, Parameter, Ergebnisoberfläche).","Frage (DE)：Vergleichen Sie *HPC* mit *HSC* (Ziel, Parameter, Ergebnisoberfläche).\nAntwort (DE)：HSC: sehr hohe v_S, kleine Spanungsdicke/Zustellung, gute Oberfläche, Schlichten; Grenze Verschleiß. HPC: max. Zeitspanvolumen, v_S niedriger, f_z/Vorschub hoch, viele Schneiden; hohe Kräfte, schlechte Oberfläche.\n中文题目：对比HPC与HSC（目标、参数、表面结果）。\n中文答案：HSC：非常高的 v_S，小切屑厚度或小切深，表面好，常用于精加工；限制是刀具磨损。HPC：目标是最大单位时间切除体积，v_S 较低，f_z 或进给高，刀刃数多；切削力大，表面较差。\n出处：FT 5 - Fräsen - Skript.pdf, S.20; full.md, Abschnitt 5.7 High Performance Cutting; Garber_2025_11_13.txt, Stichwort HPC vs HSC"]
["Warum ist Hartfräsen problematisch, und welche Schneidstoffe werden verwendet? Warum ist Diamant bei Stahl kritisch?","Frage (DE)：Warum ist Hartfräsen problematisch, und welche Schneidstoffe werden verwendet? Warum ist Diamant bei Stahl kritisch?\nAntwort (DE)：Problem: harter Stahl kaum plastisch verformbar, Riss-/Segmentspanbildung, hohe Temperatur/Kräfte. Schneidstoffe: Keramik, CBN, PKD/PCD. Diamant/PKD bei Stahl kritisch: C-Diffusion/chemischer Verschleiß in Eisen.\n中文题目：为什么硬铣困难？常用哪些刀具材料？为什么金刚石在钢上很危险？\n中文答案：问题：硬钢几乎不能塑性变形，容易形成裂纹屑或分段屑，温度和力都高。刀具材料：陶瓷、CBN、PKD/PCD。金刚石或 PKD 加工钢时很关键，因为碳会向铁中扩散，产生化学磨损。\n出处：FT 5 - Fräsen - Skript.pdf, S.21; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.22 (Diffusionsverschleiß); full.md, Abschnitt Hartfräsen und Diffusionsverschleiß; Garber_2025_11_13.txt, Stichwort Diamant, Stahl und Diffusion"]
["Was bedeutet „Schleifen = Spanen mit geometrisch (theoretisch) unbestimmter Schneide“?","Frage (DE)：Was bedeutet „Schleifen = Spanen mit geometrisch (theoretisch) unbestimmter Schneide“?\nAntwort (DE)：Schleifen: Spanen mit sehr vielen Körnern, deren Schneiden geometrisch nicht eindeutig bestimmt sind; Kornform, Spanwinkel und Eingriff zufällig.\n中文题目：“磨削=几何（理论）不确定刃切削”是什么意思？\n中文答案：磨削是几何不确定刃切削：砂轮中有大量结合磨粒，切削刃几何形状和实际参与切削的位置是随机的。典型特点：很高的 v_c，很小的切屑截面，常为负前角，表面质量好。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.4；full.md Abschnitt # 8 Schleifen; 8.1 Schleifverfahren Kennzeichen"]
["Warum ist Innenrundschleifen kritisch?","Frage (DE)：Warum ist Innenrundschleifen kritisch?\nAntwort (DE)：Innenrundschleifen kritisch wegen großer Kontaktlänge, schlechter KSS-/Spanabfuhr, kleiner Scheibe und geringer Steifigkeit → Wärme/Schleifbrand/Verstopfen.\n中文题目：为什么内圆磨削是关键、容易出问题的工艺？\n中文答案：内圆磨削中接触长度大，切屑长，砂轮气孔容易堵塞，KSS 难以进入，温度和磨削烧伤风险高。砂轮应选得较小，经验值 D_s 约为 0.6–0.8 D_WS。\n出处：Garber_2025_11_20.txt（老师强调 Innenrundschleifen 要记住和 critical）；FT 8 - Schleifen - Skript.pdf S.5；full.md Abschnitt # 8.1 Schleifverfahren Innenrundschleifen"]
["Was ist „Ausfeuern“ und warum macht man das am Ende?","Frage (DE)：Was ist „Ausfeuern“ und warum macht man das am Ende?\nAntwort (DE)：Ausfeuern: ohne Zustellung bis Endmaß weiterschleifen, bis keine Funken mehr entstehen. Zweck: elastische Verformung/Restabtrag abbauen, Oberfläche und Maß verbessern.\n中文题目：什么是Ausfeuern（空磨、走火），为什么在最后做？\n中文答案：Ausfeuern 指达到最终尺寸后不再进刀，继续磨削，直到不再产生火花。目的：消除弹性变形和剩余去除量，改善最终尺寸和表面。\n出处：Garber_2025_11_20.txt；课堂照片 IMG_20251120_124128.jpg（老师手写 und das Endmaß）；FT 8 - Schleifen - Skript.pdf S.6、S.9；full.md Abschnitt # 8.1 Schleifverfahren Ausfeuern"]
["Warum ist beim (Umfangs-)Längsschleifen ein Überlauf notwendig?","Frage (DE)：Warum ist beim (Umfangs-)Längsschleifen ein Überlauf notwendig?\nAntwort (DE)：Überlauf sorgt dafür, dass die Schleifscheibe auch an den Enden vollständig schleift; ohne Überlauf bleiben Randbereiche unterbearbeitet/nicht maßhaltig.\n中文题目：为什么（周边）纵向磨削必须有超程？\n中文答案：工件端部必须有超程，否则端部不能完全磨到尺寸。经验值：超程约为砂轮宽度 b 的 1/3。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.6；full.md Abschnitt # 8.1 Schleifverfahren Umfangs-Längsschleifen"]
["Was ist Schleifbrand? Nennen Sie typische Ursachen und Abhilfe.","Frage (DE)：Was ist Schleifbrand? Nennen Sie typische Ursachen und Abhilfe.\nAntwort (DE)：Schleifbrand = thermische Oberflächenschädigung. Folgen: Umhärtung, Eigenspannungen, Mikrorisse. Ursachen: v_c zu hoch, f zu klein, stumpfe Scheibe/Abrichter, schlechte KSS-Zufuhr. Abhilfe: v_c senken, f erhöhen, abrichten, KSS richtig zuführen.\n中文题目：什么是磨削烧伤？列出典型原因和对策。\n中文答案：磨削烧伤是热引起的表面损伤。后果：重新硬化、残余应力、微裂纹。原因：v_c 过高，f 过小，砂轮或修整器钝，KSS 供给差。对策：降低 v_c，提高 f，修整砂轮，正确供给 KSS。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.11、S.15；full.md Abschnitt # 8.1 Schleifverfahren Verfahrensgrenzen; # 8.1 Schmierstoffe"]
["Was passiert, wenn man vc erhöht, vf aber gleich lässt?","Frage (DE)：Was passiert, wenn man vc erhöht, vf aber gleich lässt?\nAntwort (DE)：v_c steigt, v_f gleich: Spangröße/Spanquerschnitt sinkt, Kräfte sinken, Rauheit sinkt -> bessere Oberfläche. Grenze: Reiben/Furchen statt Schneiden, Temperatur/Schleifbrand.\n中文题目：如果提高vc但vf保持不变，会发生什么？\n中文答案：当 v_c 增大而 v_f 不变时，单颗磨粒的切屑尺寸或切屑截面减小，力下降，粗糙度下降，表面变好。限制：可能从切削变成摩擦或犁削，温度升高并产生磨削烧伤。\n出处：Garber_2025_11_20.txt；课堂照片 IMG_20251120_122733.jpg、IMG_20251120_123036.jpg（vc hoch, Furchen, Leistung und Temperatur）；FT 8 - Schleifen - Skript.pdf S.4、S.11、S.14、S.30–31；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen; # 8.5 Einflussgrössen"]
["Was bedeutet der Härtegrad A…Z bei Schleifscheiben?","Frage (DE)：Was bedeutet der Härtegrad A…Z bei Schleifscheiben?\nAntwort (DE)：Härtegrad A...Z = Bindungsstärke, nicht Kornhärte. Hart: Korn bricht spät aus, Standzeit hoch, Schnittigkeit klein, Wärme hoch. Weich: Selbstschärfung, mehr Verschleiß/Rautiefe.\n中文题目：砂轮硬度A…Z表示什么？\n中文答案：砂轮硬度 A...Z 表示结合强度，不是磨粒硬度。硬砂轮：磨粒较晚脱落，寿命高，但切削性小、发热高。软砂轮：自锐性好，但磨损和粗糙度更大。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.23、S.29–31；full.md Abschnitt # 8.3 Schleifmittel und Schleifscheiben Härtegrad; # 8.4 Abrichten"]
["Nennen Sie die Aufgaben von Poren in der Schleifscheibe.","Frage (DE)：Nennen Sie die Aufgaben von Poren in der Schleifscheibe.\nAntwort (DE)：Spanraum; KSS-Transport in die Zone; zu viele Poren → weniger Bindemittel → Kornhalt schlechter (Kompromiss).\n中文题目：砂轮中气孔的作用是什么？\n中文答案：气孔是砂轮组织中最大的空间部分。作用：作为容屑空间，容纳并排出切屑，使 KSS 进入并冷却，减少堵塞。结构影响：开放结构表现得更软、表面更粗；致密结构表现得更硬、形状保持性更好，并产生更小粗糙度。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.22、S.31；full.md Abschnitt # 8.3 Schleifkörpergefüge"]
["Nennen Sie typische Schleifmittel und ordnen Sie sie grob zu.","Frage (DE)：Nennen Sie typische Schleifmittel und ordnen Sie sie grob zu.\nAntwort (DE)：Korund: Stähle. SiC: Guss, NE-Metalle, Keramik/harte spröde Werkstoffe. CBN: gehärtete Stähle. Diamant: Hartmetall, Keramik, Glas, NE-Werkstoffe.\n中文题目：列出典型磨料并粗略说明适用对象。\n中文答案：刚玉：用于钢。SiC：用于铸铁、有色金属、陶瓷或硬脆材料。CBN：用于淬硬钢。金刚石：用于硬质合金、陶瓷、玻璃和有色材料。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.17–18、S.21；full.md Abschnitt # 8.3 Schleifmittel; Einsatz der Körnungen"]
["Vergleichen Sie Qualitätsschleifen und Hochleistungsschleifen (Trends).","Frage (DE)：Vergleichen Sie Qualitätsschleifen und Hochleistungsschleifen (Trends).\nAntwort (DE)：Qualitätsschleifen: v_c hoch, v_f gleich -> Spangröße/Kräfte/Rauheit sinken, Zeit gleich. Hochleistungsschleifen: v_c und v_f hoch -> Zeit sinkt, Leistung steigt, Rauheit etwa gleich.\n中文题目：比较质量磨削和高性能磨削的趋势。\n中文答案：质量磨削：v_c 高、v_f 不变，因此切屑尺寸、力和粗糙度下降，加工时间不变。高性能磨削：v_c 和 v_f 都高，因此时间下降、功率上升，粗糙度大致不变。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.12、S.14；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen"]
["Skizzieren Sie qualitativ, warum die Kontaktlänge beim Innenrundschleifen größer ist und was die Folge ist.","Frage (DE)：Skizzieren Sie qualitativ, warum die Kontaktlänge beim Innenrundschleifen größer ist und was die Folge ist.\nAntwort (DE)：Beim Innenrundschleifen ist Kontaktlänge größer als beim Außenrundschleifen → längere Späne, mehr Wärme, schlechtere KSS-/Spanabfuhr, Schleifbrandgefahr.\n中文题目：定性画图说明为什么内圆磨接触长度更大，以及后果是什么。\n中文答案：内圆磨：小砂轮位于内半径中，形成较长接触弧。后果：切屑长度、气孔堵塞、温度和磨削烧伤风险高，KSS 进入困难。经验值：D_s=0.6...0.8 D_WS。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.5–6；full.md Abschnitt # 8.1 Innenrundschleifen; Umfangs-Längsschleifen"]
["Skizzieren Sie Seiten-Planschleifen vs Umfangs-Planschleifen und nennen Sie die Abhilfe.","Frage (DE)：Skizzieren Sie Seiten-Planschleifen vs Umfangs-Planschleifen und nennen Sie die Abhilfe.\nAntwort (DE)：Seiten-Planschleifen: große Kontaktfläche, kleine Spankammer, hohe Wärme. Umfangs-Planschleifen: kürzerer Kontakt, bessere Span-/KSS-Abfuhr. Abhilfe bei Seite: Spindelsturz.\n中文题目：画出端面平面磨和周边平面磨，并说明改进措施。\n中文答案：侧面平面磨：侧面接触，容屑空间小，热量和磨削压力高，质量较差；对策是主轴倾斜 Spindelsturz。周边平面磨：周边接触，切屑短，KSS 和排屑更好，热量较低。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.7–8；full.md Abschnitt # 8.1 Schleifverfahren Planschleifen"]
["Gegeben Dw = 50 mm. Bestimmen Sie den zulässigen Ds-Bereich.","Frage (DE)：Gegeben Dw = 50 mm. Bestimmen Sie den zulässigen Ds-Bereich.\nAntwort (DE)：Ds = 0,6…0,8·Dw = 0,6…0,8·50 mm = 30…40 mm.\n中文题目：已知Dw=50mm，求允许的砂轮直径Ds范围。\n中文答案：公式：D_s=0.6...0.8·D_WS。若 D_w 或 D_WS=50 mm，则 D_s,min=0.6·50 mm=30 mm，D_s,max=0.8·50 mm=40 mm；结果 D_s=30...40 mm，并写单位 mm。理由：砂轮必须明显更小，否则接触长度、温度和气孔堵塞过大。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.5；full.md Abschnitt # 8.1 Innenrundschleifen"]
["Schleifscheibenbreite b = 30 mm. Wie groß ist der Überlauf (Richtwert)?","Frage (DE)：Schleifscheibenbreite b = 30 mm. Wie groß ist der Überlauf (Richtwert)?\nAntwort (DE)：Überlauf ≈ 1/3·b ≈ 1/3·30 mm = 10 mm.\n中文题目：砂轮宽度b=30mm，超程经验值约为多少？\n中文答案：经验值：超程约等于 1/3 b。b=30 mm 时，超程约 10 mm，并写单位 mm。目的：工件端部也能完全磨到尺寸；若没有超程，端部会欠加工或尺寸不合格。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.6；full.md Abschnitt # 8.1 Umfangs-Längsschleifen"]
["Sie sollen entweder die Oberfläche verbessern oder die Hauptzeit verkürzen. Welches Konzept wählen Sie und warum?","Frage (DE)：Sie sollen entweder die Oberfläche verbessern oder die Hauptzeit verkürzen. Welches Konzept wählen Sie und warum?\nAntwort (DE)：Oberfläche verbessern: Qualitätsschleifen (v_c hoch, v_f gleich) → Rauheit/Kräfte sinken. Hauptzeit verkürzen: Hochleistungsschleifen (v_c und v_f hoch) → Zeit sinkt, Leistung steigt.\n中文题目：如果目标分别是改善表面或缩短主时间，应选择哪种磨削理念？为什么？\n中文答案：若要改善表面，选质量磨削：提高 v_c、保持 v_f 不变，使切屑尺寸、力和粗糙度下降。若要缩短主时间，选高性能磨削：同时提高 v_c 和 v_f，使时间下降、功率上升。必须注意磨削烧伤边界。\n出处：Garber_2025_11_20.txt；FT 8 - Schleifen - Skript.pdf S.11–12、S.14–15；full.md Abschnitt # 8.1 Qualitäts- und Hochleistungsschleifen; Verfahrensgrenzen"]
["Skizzieren Sie die Fließkurve kf(φ) für Kaltumformung. Wo beginnt sie und warum nicht bei 0?","Frage (DE)：Skizzieren Sie die Fließkurve kf(φ) für Kaltumformung. Wo beginnt sie und warum nicht bei 0?\nAntwort (DE)：Achsen: k_f über φ. Start etwa bei R_e/R_p0,2, nicht bei 0: darunter nur elastisch, keine bleibende Umformung. Bei Kaltumformung steigt k_f wegen Verfestigung.\n中文题目：画冷成形的流动曲线 kf(φ)。它从哪里开始？为什么不是从0开始？\n中文答案：坐标轴：纵轴 kf [N/mm²]，横轴 ϕ 或 ϕh。曲线起点在 Re 或 Rp0.2/屈服极限附近，不在原点；低于屈服极限只有弹性变形，没有永久变形。曲线随 ϕ 增大而上升，因为发生冷作硬化；冷成形时 kf 只取决于 ϕh 和材料。\n出处：11 - Grundlagen Umformen - Skript.pdf S.12；full.md：11.2 Fließspannung und Umformgrad/Kaltumformung；Garber_2025_11_27.txt（老师说明 Prüfung 中要画、起点不能画成0）"]
["Geben Sie die Näherungsformel der Fließkurve an und nennen Sie den Nachteil bei φ=0.","Frage (DE)：Geben Sie die Näherungsformel der Fließkurve an und nennen Sie den Nachteil bei φ=0.\nAntwort (DE)：Kaltumformung: kf = kf1 · φ^n; kf1 = Materialkonstante bei φ=1; n = Verfestigungskoeffizient.\n中文题目：写出流动曲线的经验公式，并说明 φ=0 的缺陷。\n中文答案：冷成形近似公式：kf=kf1·ϕ^n。kf1 是 ϕ=1 时的材料常数；n 是硬化指数。\n出处：11 - Grundlagen Umformen - Skript.pdf S.12–13；Formelblatt Fertigungstechnik.pdf（Umformende Verfahren）；full.md：11.2 Rechnen mit der Fließspannung；Garber_2025_11_27.txt（老师强调 φ=0 的陷阱）"]
["Warum ist der Härtegrad einer Diamantschleifscheibe oft höher als bei Korundscheiben?","Frage (DE)：Warum ist der Härtegrad einer Diamantschleifscheibe oft höher als bei Korundscheiben?\nAntwort (DE)：Härtegrad = Bindungsstärke. Diamantkörner teuer/sehr hart -> sollen lange gehalten werden, daher oft hoher Härtegrad. Korund oft weicher wegen Selbstschärfung.\n中文题目：为什么金刚石砂轮的硬度等级往往比刚玉砂轮更高？\n中文答案：硬度等级表示结合强度。金刚石磨粒昂贵且很硬，应被较长时间保持住，所以常用较高硬度等级。刚玉砂轮为了自锐，往往选得较软。\n出处：FT 8 - Schleifen - Skript.pdf S.23、S.26；full.md：8.3 Schleifmittel und Schleifscheiben/Härtegrad；Garber_2025_11_27.txt（老师提示 Das könnte eine Prüfungsfrage sein）"]
["Was ist Abrichten und wozu dient es?","Frage (DE)：Was ist Abrichten und wozu dient es?\nAntwort (DE)：Gezieltes Abtragen/Abbrechen der obersten Körner → wieder scharfe Körner, definierte Topographie; wichtig für hohe Genauigkeit/Serienfertigung.\n中文题目：什么是砂轮修整（Abrichten），它的目的是什么？\n中文答案：修整 Abrichten = 整形 + 修锐。整形：恢复轮廓、圆跳动和几何形状。修锐：去除钝化磨粒或结合剂，重新形成表面形貌。目的：保证形状精度、圆跳动和稳定磨削质量。\n出处：FT 8 - Schleifen - Skript.pdf S.29；full.md：8.4 Abrichten；Garber_2025_11_27.txt（老师讲 Abrichten 用于高精度、系列稳定加工）"]
["Einteilung nach DIN 8582: Nennen Sie die Umform-Hauptgruppen und je ein Beispiel.","Frage (DE)：Einteilung nach DIN 8582: Nennen Sie die Umform-Hauptgruppen und je ein Beispiel.\nAntwort (DE)：Druckumformen: Walzen/Gesenkformen/Durchdrücken. Zug-Druck: Tiefziehen/Durchziehen. Zugumformen: Längen/Weiten. Biegeumformen: Biegen. Schubumformen: Verschieben/Verdrehen.\n中文题目：按 DIN 8582：写出变形加工的主分类，并各举1例。\n中文答案：压缩成形：轧制、模锻、Durchdrücken。拉压复合成形：深拉、拉拔通过。拉伸成形：拉长、扩径。弯曲成形：弯曲。剪切成形：错移、扭转。\n出处：11 - Grundlagen Umformen - Skript.pdf S.5；full.md：11.1 Einteilung der Verfahren nach DIN 8582；Garber_2025_11_27.txt（本节从 DIN 8580 过渡到 Umformen 分类）"]
["Welche Kennwerte lesen Sie im Spannungs–Dehnungs–Diagramm ab (mind. 5)?","Frage (DE)：Welche Kennwerte lesen Sie im Spannungs–Dehnungs–Diagramm ab (mind. 5)?\nAntwort (DE)：E-Modul, Rp0,2 (oder Re), Rm, Ag (Gleichmaßdehnung), A (Bruchdehnung).\n中文题目：应力-应变图能读出哪些关键参数（至少5个）？\n中文答案：σ=F/S0，ε=Δl/l0；弹性区中的 E 模量：E=Δσ/Δε；Rp0.2 或 Re，即屈服极限；Rm，即抗拉强度；Ag，即到最大力为止的均匀延伸率；A，即断后伸长率；另外还可标出弹性区、塑性区和断裂点。\n出处：11 - Grundlagen Umformen - Skript.pdf S.7、S.11；full.md：11.2 Das Spannungs-Dehnungs-Diagramm und Definitionen；Garber_2025_11_27.txt 与课堂照片 IMG_20251127_131357（老师手写 E, Rp0,2, Rm, Ag, A）"]
["Definieren Sie den Umformgrad φ und nennen Sie den Vorteil der logarithmischen Definition.","Frage (DE)：Definieren Sie den Umformgrad φ und nennen Sie den Vorteil der logarithmischen Definition.\nAntwort (DE)：φ = ln(l1/l0) = ln(A0/A1). Vorteil: Umformgrade addieren sich bei mehreren Umformschritten (log-additiv).\n中文题目：定义变形度 φ，并说明为什么用对数定义。\n中文答案：变形程度：phi=ln(l1/l0)；体积守恒时 phi_l+phi_b+phi_h=0。截面积减小时常用 phi=ln(A0/A1)。优点：对数变形程度可以相加。\n出处：11 - Grundlagen Umformen - Skript.pdf S.11、S.19–21；Formelblatt Fertigungstechnik.pdf（Umformgrad）；full.md：11.3 Volumenkonstanz und Additivität der Formänderung；Garber_2025_11_27.txt（老师用 100%+100%≠300% 说明对数变形可相加）"]
["Berechnen Sie den Umformgrad: l0=50 mm → l1=100 mm.","Frage (DE)：Berechnen Sie den Umformgrad: l0=50 mm → l1=100 mm.\nAntwort (DE)：φ = ln(100/50)=ln 2 ≈ 0,693.\n中文题目：计算变形度：长度 50 mm 拉到 100 mm。\n中文答案：φ=ln(l1/l0)=ln(100 mm / 50 mm)=ln(2)=0.693；无量纲。\n出处：11 - Grundlagen Umformen - Skript.pdf S.11、S.21；Formelblatt Fertigungstechnik.pdf（Umformgrad）；full.md：11.3 Additivität der Formänderung；Garber_2025_11_27.txt（课堂板书用长度倍增解释）"]
["Definieren Sie Honen.","Frage (DE)：Definieren Sie Honen.\nAntwort (DE)：Honen = Feinstschleifen mit geometrisch unbestimmter Schneide; Honsteine mit gebundenen Körnern. Anwendung: Bohrungen. Ziel: Maß-, Form- und Oberflächenverbesserung.\n中文题目：给出珩磨（Honen）的定义。\n中文答案：珩磨是几何不确定刃的精细磨削；珩磨石带有结合磨粒。应用：孔加工。目标：改善尺寸、形状和表面。\n出处：FT 9 - Honen.pdf S.2–3；full.md：9 Honen: Definition Honen；Garber_2025_11_27.txt（老师讲 Honen 接在 Schleifen 后，属于几何不确定刃精加工）"]
["Nennen Sie den Aufbau einer Honahle und wie die Zustellung erfolgt.","Frage (DE)：Nennen Sie den Aufbau einer Honahle und wie die Zustellung erfolgt.\nAntwort (DE)：Honahle: Honleisten/Honsteine, Steinhalter, Kardangelenk, Zustellstange/-kolben, Expansionskonus. Zustellung radial, hydraulisch oder mechanisch über Expansionskonus.\n中文题目：珩磨头（Honahle）主要结构是什么？径向进给如何实现？\n中文答案：珩磨头由珩磨条/珩磨石、珩磨石支架、万向节、进给杆或进给活塞、扩张锥组成。进给为径向进给，可通过液压或机械方式经扩张锥实现。\n出处：FT 9 - Honen.pdf S.4；full.md：9 Honen/Honahlen；Garber_2025_11_27.txt（老师讲 Honwerkzeuge 与径向 Zustellung）"]
["Welche Oberflächenstruktur erzeugt Honen und wozu dient sie bei Zylinderlaufflächen?","Frage (DE)：Welche Oberflächenstruktur erzeugt Honen und wozu dient sie bei Zylinderlaufflächen?\nAntwort (DE)：Honen erzeugt Kreuzschliff. Dient als Öltaschenstruktur, verbessert Schmierung und Einlaufverhalten von Zylinderlaufflächen.\n中文题目：珩磨会产生什么表面纹理？在缸孔、缸套上它的作用是什么？\n中文答案：珩磨通过往复运动 V_h 和圆周运动 V_u 形成交叉磨纹。用于缸孔表面时，微小沟纹可以储油，使润滑膜保留，从而降低摩擦和磨损。\n出处：FT 9 - Honen.pdf S.5–6；full.md：9 Honen, Struktur einer gehonten Oberfläche und Anwendungen；Garber_2025_11_27.txt（老师强调 Zylinderlaufflächen 与 Öl-Speicherung）"]
["Welche Fehler einer Bohrung können durch Honen korrigiert werden (mind. 3)?","Frage (DE)：Welche Fehler einer Bohrung können durch Honen korrigiert werden (mind. 3)?\nAntwort (DE)：Korrigierbar: Rundheits-, Zylinderform-, Maß-, Oberflächen- und geringe Geradheitsfehler. Nicht korrigierbar: grobe Lage-/Positionsfehler.\n中文题目：珩磨能纠正哪些孔的误差（至少3个）？\n中文答案：可修正的孔误差：弯曲、波纹、桶形、失圆、欠尺寸、锥度。典型可达到质量：IT4 到 IT5，Ra 可到约 0.02 µm；珩磨主要是钻削或磨削后的最终加工。\n出处：FT 9 - Honen.pdf S.7；full.md：9 Honen/Erreichbare Genauigkeit und Rauheit；Garber_2025_11_27.txt（老师讲可通过 Honen 改善 Maß, Form und Oberfläche）"]
["Welche Fehler kann Honen nicht korrigieren und warum?","Frage (DE)：Welche Fehler kann Honen nicht korrigieren und warum?\nAntwort (DE)：Nicht korrigierbar: Übermaß, Positions-/Lagefehler, Schrägstellung/Achsneigung. Grund: Honen trägt nur Material ab und folgt der vorhandenen Bohrungsachse.\n中文题目：珩磨不能纠正哪些误差？为什么？\n中文答案：不能修正：孔过大、位置/方位误差、倾斜或轴线倾斜。原因：珩磨只去除材料，并沿已有孔轴线工作。\n出处：FT 9 - Honen.pdf S.7（仅列可修正误差，反向对照）；课件未定位到：课堂板书、口头补充；full.md：9 Honen/Erreichbare Genauigkeit und Rauheit；Garber_2025_11_27.txt 与课堂照片 IMG_20251127_123226（Durch Honen nicht korrigierbar: Übermaß, Position, Schrägstellung und Lagetoleranzen）"]
["Was kommt in der Prüfung *sicher* dran?","Frage (DE)：Was kommt in der Prüfung *sicher* dran?\nAntwort (DE)：Sicher: Schneidkeil/Spanwinkel, Kienzle mit b und h, Umformgrad/Additivität, Tiefziehen/Verfahrensfenster, Schleifen/Schleifbrand; Formeln anwenden können.\n中文题目：期末确定会考什么？\n中文答案：根据记录，确定会考的模块：切削基础；成形基础；成形工艺中的流压、深拉、锻造；车削总会考。另外按考试内容：插削、刨削、研磨/抛光和拉削不处理。\n出处：Garber_2025_12_04.txt（考试范围口头说明）；Prüfungsinhalt.pdf S.1；full.md Abschnitt „Themen für die Prüfung Fertigungstechnik“."]
["Skizzieren Sie die Fließkurve und erklären Sie den Startpunkt.","Frage (DE)：Skizzieren Sie die Fließkurve und erklären Sie den Startpunkt.\nAntwort (DE)：Fließkurve: k_f über φ; bei Kaltumformung steigend durch Verfestigung. Start nahe R_e/R_p0,2, nicht bei 0, weil darunter nur elastische Verformung.\n中文题目：画出流动曲线并解释起点。\n中文答案：图示：kf 随 ϕh 变化；起点不在原点，而在 Re 或 Rp0.2 附近；之后 kf 随 ϕ 增大而上升，原因是冷作硬化/硬化行为。\n出处：Garber_2025_12_04.txt（老师强调 Fließkurve und Skizze）；11 - Grundlagen Umformen - Skript.pdf S.11–12；full.md Abschnitt „11.2 Fließspannung und Umformgrad; Kaltumformung“."]
["Wie lautet die Fließkurven-Gleichung und warum gilt sie nicht bei ϕ=0?","Frage (DE)：Wie lautet die Fließkurven-Gleichung und warum gilt sie nicht bei ϕ=0?\nAntwort (DE)：Fließkurve: k_f = k_f1 · φ^n. Bei φ = 0 ergibt die Näherung formal 0; physikalisch beginnt plastische Umformung erst bei R_e/R_p0,2.\n中文题目：流动曲线公式是什么？为什么 ϕ=0 时不能直接用？\n中文答案：冷成形：k_f=k_f1·phi^n。若 phi=0，公式给出 0，但实际流动要到 Re/Rp0.2 才开始。起始力用 Re/Rp0.2，末端力用 k_fe。\n出处：Garber_2025_12_04.txt（老师强调 ϕ=0 不能套公式、起始用 Re）；11 - Grundlagen Umformen - Skript.pdf S.12–13；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Fließspannung beim Kaltumformen“."]
["Definieren Sie Umformgrad ϕ und erklären Sie ϕ ≠ ε.","Frage (DE)：Definieren Sie Umformgrad ϕ und erklären Sie ϕ ≠ ε.\nAntwort (DE)：φ = logarithmische Formänderung: φ = ln(l_1/l_0) bzw. über Flächen. Sie ist additiv. ε = Δl/l_0 ist technische Dehnung und nicht additiv.\n中文题目：定义变形程度 ϕ，并说明它为什么不等于工程应变 ε。\n中文答案：变形程度：ϕ=ln(l1/l0)，或按方向写为 ϕl、ϕb、ϕh。工程应变：ε=Δl/l0=(l1-l0)/l0。区别：ϕ 是对数形式，多道成形可相加；ε 是技术/线性应变，不能相加。不要与应力 σ=F/A0 和流动应力 kf=F/A 混淆。\n出处：Garber_2025_12_04.txt（老师强调 ϕ 不是 Dehnung）；11 - Grundlagen Umformen - Skript.pdf S.11, S.19, S.21；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Definitionen; Volumenkonstanz“."]
["Was gilt für das Vorzeichen des Umformgrades?","Frage (DE)：Was gilt für das Vorzeichen des Umformgrades?\nAntwort (DE)：Vorzeichen hängt von Richtung ab: Verlängerung φ_l > 0, Verkürzung/Stauchen φ_h < 0. Für Umformarbeit nutzt man den Betrag |φ|.\n中文题目：变形程度 ϕ 的正负号如何判断？\n中文答案：ϕ=ln(x1/x0)。尺寸变小：x1/x0<1，所以 ϕ<0；尺寸变大：x1/x0>1，所以 ϕ>0。镦粗时，高度变形程度 ϕh 为负，面积变形程度或横向变形程度为正；能量和功计算使用绝对值 |ϕ|。\n出处：Garber_2025_12_04.txt（板书、老师强调正负号）；11 - Grundlagen Umformen - Skript.pdf S.19–20；full.md Abschnitt „Volumenkonstanz beim Umformen“."]
["Begründen Sie: ϕl + ϕb + ϕh = 0.","Frage (DE)：Begründen Sie: ϕl + ϕb + ϕh = 0.\nAntwort (DE)：Volumenkonstanz: φ_l + φ_b + φ_h = ln(l_1/l_0) + ln(b_1/b_0) + ln(h_1/h_0) = ln(V_1/V_0) = ln1 = 0.\n中文题目：证明 ϕl+ϕb+ϕh=0。\n中文答案：体积守恒：l1·b1·h1=l0·b0·h0。由此得到 ln(l1/l0)+ln(b1/b0)+ln(h1/h0)=ln(1)=0，因此 phi_l+phi_b+phi_h=0。\n出处：Garber_2025_12_04.txt（老师板书推导）；11 - Grundlagen Umformen - Skript.pdf S.19–20；full.md Abschnitt „Volumenkonstanz beim Umformen“."]
["Additivität: Ein Draht wird zweimal nacheinander mit ϕ=1 umgeformt. Wie groß ist ϕgesamt?","Frage (DE)：Additivität: Ein Draht wird zweimal nacheinander mit ϕ=1 umgeformt. Wie groß ist ϕgesamt?\nAntwort (DE)：Logarithmische Umformgrade addieren sich: φ_ges = φ_1 + φ_2 = 1 + 1 = 2. Nicht mit technischen Dehnungen ε addieren.\n中文题目：加和性：一根线材连续两次变形，每次 ϕ=1，总 ϕ 是多少？\n中文答案：ϕgesamt=ϕ1+ϕ2=1+1=2。理由：对数变形程度可以相加；工程应变 ε 不能相加。考试陷阱：多道次时加的是 ϕ，不要错误相加长度比或 ε。\n出处：Garber_2025_12_04.txt（老师说几乎每次考试都问、重点强调 Additivität）；11 - Grundlagen Umformen - Skript.pdf S.21；full.md Abschnitt „Additivität der Formänderung“."]
["Zeigen Sie den Zusammenhang zwischen Flächen-Umformgrad und Hauptumformgrad beim Stauchen.","Frage (DE)：Zeigen Sie den Zusammenhang zwischen Flächen-Umformgrad und Hauptumformgrad beim Stauchen.\nAntwort (DE)：ϕA = ln(A1/A0) = ln(b1/b0)+ln(l1/l0)=ϕb+ϕl = -ϕh.\n中文题目：说明镦粗时面积变形程度与主变形程度的关系。\n中文答案：A=b·l；ϕA=ln(A1/A0)=ln(b1·l1/(b0·l0))=ln(b1/b0)+ln(l1/l0)=ϕb+ϕl。由体积守恒 ϕb+ϕl+ϕh=0，可得 ϕA=-ϕh。流压中常用面积计算变形程度，因为长度更难确定。\n出处：Garber_2025_12_04.txt（老师板书推导，并说明脚本中不一定直接写）；11 - Grundlagen Umformen - Skript.pdf S.19–20；12 - Fließpressen - Skript.pdf S.14；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitte „Volumenkonstanz“ und „Spannungszustand beim Kaltfließpressen“."]
["Was ist die ideelle Umformkraft beim Stauchen?","Frage (DE)：Was ist die ideelle Umformkraft beim Stauchen?\nAntwort (DE)：Fid = A · kf; nur Werkstoffumformung, ohne Reibungskräfte.\n中文题目：镦粗时理想成形力是什么？\n中文答案：Fid=A·kf。A 是当前接触面积或截面积，kf 是该状态下的流动应力。Ideell 表示只考虑材料变形，不包括摩擦、摩擦学和工具损失。起始：A0·Re；末端：AE·kfe。\n出处：Garber_2025_12_04.txt（老师强调 Anfang/Ende 力算法）；11 - Grundlagen Umformen - Skript.pdf S.22, S.25；full.md Abschnitt „Umformkraft und Umformarbeit beim Stauchen“."]
["Begründen Sie: Für Kraft nicht mit kfm rechnen, für Arbeit schon.","Frage (DE)：Begründen Sie: Für Kraft nicht mit kfm rechnen, für Arbeit schon.\nAntwort (DE)：Für Kraft gilt momentane Fließspannung k_f bei aktueller Umformung; für Arbeit integriert man über den Weg, daher mittlere Fließspannung k_fm.\n中文题目：为什么力不能用平均流动应力 kfm，但功可以用？\n中文答案：力取决于瞬时状态或最大末端力，所以用 A_E·k_fe，不能用 k_fm。功是对整个过程积分，因此可以用平均值 k_fm；W_id=V·k_fm·|phi|。\n出处：Garber_2025_12_04.txt（老师明确强调该陷阱）；11 - Grundlagen Umformen - Skript.pdf S.13, S.22；full.md Abschnitte „Rechnen mit der Fließspannung“ und „Umformkraft und Umformarbeit“."]
["Wie lautet die ideelle Umformarbeit und warum steht |ϕ|?","Frage (DE)：Wie lautet die ideelle Umformarbeit und warum steht |ϕ|?\nAntwort (DE)：W_id = V · k_fm · |φ|. Betrag, weil Arbeit immer positiv ist, auch wenn ein Umformgrad je nach Richtung negativ notiert wird.\n中文题目：理想成形功公式是什么？为什么要写 |ϕ|？\n中文答案：Wid=V·kfm·|ϕ|。V 只取被变形体积；kfm 是平均流动应力；ϕ 是决定性的变形程度。写 |ϕ| 是因为功/能量为正，镦粗时 ϕh 可能为负。单位：N/mm²·mm³=N·mm；1000 N·mm=1 J。\n出处：Garber_2025_12_04.txt（老师强调能量取绝对值、只算变形体积）；11 - Grundlagen Umformen - Skript.pdf S.22–23；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Umformenergie“."]
["Was ist die spezifische Umformarbeit wd und wann ist sie vorteilhaft?","Frage (DE)：Was ist die spezifische Umformarbeit wd und wann ist sie vorteilhaft?\nAntwort (DE)：w_d = spezifische Umformarbeit = W/V. Vorteilhaft, wenn nur das umgeformte Volumen zählt; dann W = w_d · V_u.\n中文题目：什么是比成形功 wd？什么时候更有利？\n中文答案：wd=Wid/V。含义：单位工件体积所需成形功，取决于变形程度；单位与应力相同：N/mm² (=N·mm/mm³)。优点：若给出 wd 图，可按 ϕ 直接读取 wd，并用 Wid=V·wd 计算，不需要再用 kfm 近似。\n出处：Garber_2025_12_04.txt（老师提示有 wd 曲线优先用）；11 - Grundlagen Umformen - Skript.pdf S.23, S.26；full.md Abschnitt „Spezifische Umformarbeit“."]
["Berechnen Sie die erforderliche Rohlinglänge (D0=12 mm, Kopf: D=18 mm, hk=10 mm, Schaft=50 mm).","Frage (DE)：Berechnen Sie die erforderliche Rohlinglänge (D0=12 mm, Kopf: D=18 mm, hk=10 mm, Schaft=50 mm).\nAntwort (DE)：- Volumenkonstanz (nur Kopf): π·(6²)·Lk = π·(9²)·10 ⇒ Lk = 10·(9²/6²)=22,5 mm\n- Lges = 50 + 22,5 = 72,5 mm\n中文题目：求所需毛坯长度（D0=12 mm，头部 D=18 mm，高 10 mm，杆部 50 mm）。\n中文答案：体积守恒只用于头部/被变形部分：A0·Lk=Akopf·hk。π·6²·Lk=π·9²·10，所以 Lk=10·(9²/6²)=22.5 mm。未变形杆部仍为 50 mm；毛坯总长度 Lges=50+22.5=72.5 mm。\n出处：Garber_2025_12_04.txt（老师板书 Bolzen 例题、强调 nur umgeformtes Volumen）；11 - Grundlagen Umformen - Skript.pdf S.25–26；full.md Abschnitt „Aufgaben Grundlagen Umformen; Berechnung mit spezifischer Umformarbeit“."]
["Bestimmen Sie den Hauptumformgrad ϕh.","Frage (DE)：Bestimmen Sie den Hauptumformgrad ϕh.\nAntwort (DE)：Nur umgeformter Teil: h0=22,5 mm → h1=10 mm ⇒ ϕh = ln(10/22,5) = -0,81 (alternativ über Fläche: ln(A1/A0)=+0,81).\n中文题目：求主变形程度 ϕh。\n中文答案：只看被变形头部：h0=22.5 mm，h1=10 mm，所以 ϕh=ln(h1/h0)=ln(10/22.5)=-0.8109≈-0.81。等价面积法：ϕA=ln(A1/A0)=ln(π·9²/(π·6²))=+0.8109；关系：ϕA=-ϕh；计算功时用 |ϕ|=0.81。\n出处：Garber_2025_12_04.txt（老师板书 ϕ=ln(10/22,5) 与面积法）；11 - Grundlagen Umformen - Skript.pdf S.19–20, S.25–26；12 - Fließpressen - Skript.pdf S.14；full.md Abschnitt „Volumenkonstanz; Aufgaben Grundlagen Umformen“."]
["Berechnen Sie F0 und FE.","Frage (DE)：Berechnen Sie F0 und FE.\nAntwort (DE)：- Anfang: F0 = A0·Re, A0=π·6² ⇒ F0≈29,4 kN\n- Ende: FE = AE·kfe, AE=π·9²; kfe = kf1·|ϕ|^n ⇒ FE≈180 kN\n中文题目：计算起始成形力 F0 和末端成形力 FE。\n中文答案：数据：Re=260 N/mm²，kf1=740 N/mm²，n=0.216。起始：A0=pi·6²=113.10 mm²；F0=A0·Re=113.10·260=29.4 kN。末端：AE=pi·9²=254.47 mm²；kfe=740·0.8109^0.216≈707 N/mm²。\n出处：Garber_2025_12_04.txt（老师板书 F0≈29,4 kN、FE≈180 kN）；11 - Grundlagen Umformen - Skript.pdf S.12–13, S.22, S.25；full.md Abschnitt „Rechnen mit der Fließspannung; Aufgaben Grundlagen Umformen“."]
["Berechnen Sie die gesamte ideelle Umformarbeit Wid.","Frage (DE)：Berechnen Sie die gesamte ideelle Umformarbeit Wid.\nAntwort (DE)：- kfm=(Re+kfe)/2\n- V = π·9²·10 mm³ (nur Kopf!)\n- Wid = V · kfm · |ϕ| ⇒ ≈ 0,996 kJ (≈ 996 J)\n中文题目：计算总理想成形功 Wid。\n中文答案：公式：Wid=V·kfm·|ϕ|。只取被变形体积：V=头部体积=π·9²·10=2544.7 mm³。kfm=(kf0+kfe)/2≈(Re+kfe)/2=(260+707)/2≈483.6 N/mm²。|ϕ|=0.8109；Wid≈2544.7·483.6·0.8109=9.98·10^5 Nmm≈998 J≈1.0 kJ（按取整约 996–998 J）。\n出处：Garber_2025_12_04.txt（老师板书 Wid≈996 J、强调 nur umgeformtes Volumen）；11 - Grundlagen Umformen - Skript.pdf S.22–26；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt „Umformarbeit; Berechnung mit spezifischer Umformarbeit“."]
["Nennen Sie Schmierstoffe und begründen Sie die Wahl für Kalt- vs. Warmumformung.","Frage (DE)：Nennen Sie Schmierstoffe und begründen Sie die Wahl für Kalt- vs. Warmumformung.\nAntwort (DE)：Kaltumformung: Öle, Phosphate/Seifen, feste Schmierstoffe → Reibung/Werkzeuglast senken. Warmumformung: Graphit/Glas, temperaturbeständig.\n中文题目：列举润滑剂，并说明冷成形与热成形的选择理由。\n中文答案：润滑剂：冷成形用油、皂、乳化液、磷化/皂化层。热成形/锻造用固体润滑剂或脱模剂，例如石墨-水或石墨-油。目的：降低摩擦和磨损，保护工具。\n出处：Garber_2025_12_04.txt（老师举 Öl, Seife, Emulsion und Graphit 并解释冷热区别）；11 - Grundlagen Umformen - Skript.pdf S.24；13 - Schmieden - Skript.pdf S.10；full.md Abschnitte „Tribologie“ und „Trennmittel“."]
["Wovon hängt das Formänderungsvermögen bei Stählen ab?","Frage (DE)：Wovon hängt das Formänderungsvermögen bei Stählen ab?\nAntwort (DE)：chem. Zusammensetzung; C-Gehalt; Legierung (Ni/Cr/Va/Mo/Mn); P-Gehalt (↑ ⇒ Vermögen ↓).\n中文题目：钢的成形能力取决于哪些因素？\n中文答案：取决于：化学成分（C、P、合金元素）、组织（晶粒大小、珠光体比例/分布）和热处理。有利状态：细晶粒、铁素体组织、软退火。\n出处：Garber_2025_12_04.txt（老师提到材料、成形能力因素）；11 - Grundlagen Umformen - Skript.pdf S.18；full.md Abschnitt „Formänderungsvermögen“."]
["Ein Stab ist 1 m lang. Wie lang ist er nach Umformgrad ϕ=1?","Frage (DE)：Ein Stab ist 1 m lang. Wie lang ist er nach Umformgrad ϕ=1?\nAntwort (DE)：ϕ = ln(l1/l0)=1 ⇒ l1/l0=e^1=e≈2,718; Bei l0=1 m: l1≈2,718 m.\n中文题目：一根 1 m 长的杆，变形程度 ϕ=1 后长度是多少？\n中文答案：由 ϕ=ln(l1/l0)=1 得 l1/l0=e^1=e≈2.718。若 l0=1 m，则 l1≈2.718 m。\n出处：Garber_2025_12_04.txt（老师口头举例 1 m → e m）；11 - Grundlagen Umformen - Skript.pdf S.11；full.md Abschnitt „Definitionen; Umformgrad“."]
["Warum darf man bei der Umformarbeit nur das *umgeformte Volumen* \\(V_u\\) verwenden?","Frage (DE)：Warum darf man bei der Umformarbeit nur das *umgeformte Volumen* \\(V_u\\) verwenden?\nAntwort (DE)：Nur V_u verwenden, weil nur dieser Werkstoff plastisch umgeformt wird; nicht umgeformtes Volumen leistet keine Umformarbeit. W = w_d · V_u.\n中文题目：为什么算成形功只能使用“实际发生变形的体积”\\(V_u\\)？\n中文答案：只计算发生塑性变形的材料区域；未变形或半变形区域不计入。Wid=wd·Vu 或 Wid=Vu·kfm·ϕ；否则能量和力会算得过大。单位陷阱：N/mm²·mm³=Nmm，1000 Nmm=1 J。\n出处：11 - Grundlagen Umformen - Skript.pdf, S.22–23（Umformarbeit/spezifische Umformarbeit）；12 - Fließpressen - Skript.pdf, S.20（Aufgabe Fließpressen）；full.md, Abschnitte „11.3 Volumenkonstanz, Umformkraft, Umformarbeit“ und „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书：老师强调 „nur umgeformtes Volumen“、未变形部分不计。"]
["Wie bestimmen Sie die ideelle Umformarbeit \\(W_{id}\\) mit der spezifischen Umformarbeit \\(w_d\\)?","Frage (DE)：Wie bestimmen Sie die ideelle Umformarbeit \\(W_{id}\\) mit der spezifischen Umformarbeit \\(w_d\\)?\nAntwort (DE)：Mit spezifischer Umformarbeit: W_id = w_d · V_u. w_d in N/mm² und V in mm³ ergibt Nmm; 1 Nmm = 10^-3 J.\n中文题目：如何用比成形功 \\(w_d\\) 求理想成形功 \\(W_{id}\\)？\n中文答案：步骤：1）确定主变形程度 ϕ；2）从图中读取 wd(ϕ)；3）只计算 Vu；4）Wid=wd·Vu；5）若给出效率，则 Wges=Wid/η。注意：wd 不要再额外乘 ϕ。\n出处：11 - Grundlagen Umformen - Skript.pdf, S.23 und S.26（spezifische Umformarbeit \\(w_d\\)）；12 - Fließpressen - Skript.pdf, S.20；full.md, Abschnitt „Berechnung mit spezifischer Umformarbeit“；Garber_2025_12_11.txt; 板书：课堂按 \\(\\varphi\nightarrow w_d\nightarrow V\nightarrow W\\) 演算并强调单位。"]
["Warum wird der Umformgrad beim Fließpressen über Flächen berechnet und wie lautet die Formel?","Frage (DE)：Warum wird der Umformgrad beim Fließpressen über Flächen berechnet und wie lautet die Formel?\nAntwort (DE)：Wegen Volumenkonstanz sind Flächen einfacher als Längen: φ = ln(A_0/A_1) bzw. Betrag. Bei mehreren Stufen sind logarithmische φ additiv.\n中文题目：为什么 Fließpressen 的变形程度用面积计算？公式是什么？\n中文答案：流压中长度难以确定，而模具/冲头决定的截面清楚。面积公式：phi=ln(A1/A0)，或取正的绝对值；杯形件用环形面积。\n出处：12 - Fließpressen - Skript.pdf, S.14（Umformgrad über Flächen）；Formelblatt Fertigungstechnik.pdf（Umformgrad \\(\\ln(A_1/A_0)\\)）；full.md, Abschnitt „Spannungszustand beim Kaltfließpressen“；Garber_2025_12_11.txt; 板书：老师强调面积法比长度法稳。"]
["Vorwärtsfließpressen: \\(D_0=40\\,mm\\), \\(D_1=20\\,mm\\). Wie groß ist \\(\\varphi\\)?","Frage (DE)：Vorwärtsfließpressen: \\(D_0=40\\,mm\\), \\(D_1=20\\,mm\\). Wie groß ist \\(\\varphi\\)?\nAntwort (DE)：φ = ln(A_0/A_1) = ln((π/4 · 40²)/(π/4 · 20²)) = ln(4) ≈ 1,386.\n中文题目：前向流压：\\(D_0=40\\,mm\\)、\\(D_1=20\\,mm\\)，\\(\\varphi\\) 等于多少？\n中文答案：通过直径平方计算截面积比：ϕ=ln((D0/D1)^2)=ln((40/20)^2)=ln4=1.386；π/4 会约掉。课堂更正：使用 D0=40 mm。\n出处：12 - Fließpressen - Skript.pdf, S.20（Aufgabe Fließpressen；原题图）；full.md, Abschnitt „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书照片：课堂更正 \\(D_0=40\\,mm\\)，并算出 \\(\\ln4=1{,}386\\)。"]
["Wie berücksichtigen Sie \\(\\eta=0{,}5\\) bei der Umformarbeit?","Frage (DE)：Wie berücksichtigen Sie \\(\\eta=0{,}5\\) bei der Umformarbeit?\nAntwort (DE)：Bei η = 0,5: reale Arbeit/Energie = ideale Arbeit / η = 2 · W_id. η steht im Nenner, nicht multiplizieren.\n中文题目：η=0.5 时在成形功计算中如何处理？\n中文答案：η=Wid/Wges，因此 Wges=Wid/η。若 η=0.5，则 Wges=2·Wid。先求 Wid=wd·Vu，单位为 Nmm 或 J，然后再考虑损失和效率。\n出处：12 - Fließpressen - Skript.pdf, S.20（η=0,5）；11 - Grundlagen Umformen - Skript.pdf, S.22–23；full.md, Abschnitt „Aufgabe Fließpressen“；Garber_2025_12_11.txt; 板书：老师讲 \\(W_{ges}=2\\cdot W_{id}\\)，并提醒 \\(Nmm\nightarrow J\\)。"]
["Nennen Sie die drei Varianten des „Durchdrückens“.","Frage (DE)：Nennen Sie die drei Varianten des „Durchdrückens“.\nAntwort (DE)：Verjüngen – Fließpressen – Strangpressen.\n中文题目：请列举 Durchdrücken 的三种变体。\n中文答案：Verjüngen：小变形，工件不必被强制导向。Fließpressen：间歇式，通常为冷成形，主要用于铝/铜。Strangpressen：制造很长的型材，热成形，主要用于铝。\n出处：12 - Fließpressen - Skript.pdf, S.4（Verfahren des Durchdrückens）；full.md, Abschnitt „12.1 Grundlagen / Verfahren des Durchdrückens“；Garber_2025_12_11.txt：课堂按 Verjüngen–Fließpressen–Strangpressen 分类讲解。"]
["Was passiert, wenn die Formänderung beim Verjüngen zu groß wird?","Frage (DE)：Was passiert, wenn die Formänderung beim Verjüngen zu groß wird?\nAntwort (DE)：Zu großer Umformgrad überschreitet Formänderungsvermögen → Risse/Bruch; deshalb mehrere Stufen oder Zwischenglühen nötig.\n中文题目：如果 Verjüngen 的变形量过大，会发生什么？\n中文答案：所需压力会强烈上升；若没有足够导向，工件会失稳、侧向偏移或鼓出；模具载荷和摩擦上升。因此应转为导向更强的流压工艺。\n出处：12 - Fließpressen - Skript.pdf, S.4（Verjüngen: geringe Formänderung, Werkstück muss nicht geführt werden；Fließpressen als stärker geführtes Durchdrücken）；full.md, Abschnitt „Verjüngen und Fließpressen“；Garber_2025_12_11.txt：老师口头解释变形过大时会侧向变形。"]
["Definieren Sie Vorwärts- und Rückwärtsfließpressen.","Frage (DE)：Definieren Sie Vorwärts- und Rückwärtsfließpressen.\nAntwort (DE)：Vorwärts: Materialfluss gleich Stempelbewegung; Rückwärts: Materialfluss entgegen Stempelbewegung (Becherbildung typisch).\n中文题目：定义前向流压和后向流压。\n中文答案：前向流压：材料流动方向与冲头运动方向相同；变体包括实心、空心、杯形前向流压。后向流压：材料流动方向与冲头运动方向相反，向冲头方向回流；变体包括实心、空心、杯形后向流压。\n出处：12 - Fließpressen - Skript.pdf, S.5–8（Verfahrensübersicht, Vorwärts-/Rückwärts-Fließpressen）；full.md, Abschnitt „12.2 Fließpressen“；Garber_2025_12_11.txt：课堂用方向区分 Vorwärts und Rückwärts。"]
["Nennen Sie Varianten des Rückwärts-Fließpressens.","Frage (DE)：Nennen Sie Varianten des Rückwärts-Fließpressens.\nAntwort (DE)：Voll-Rückwärts; Napf-Rückwärts; Hohl-Rückwärts.\n中文题目：列举后向流压的变体。\n中文答案：后向流压变体：实心后向流压、空心后向流压、杯形后向流压。\n出处：12 - Fließpressen - Skript.pdf, S.5 und S.8（Rückwärts-Fließpressen）；full.md, Abschnitt „Rückwärts-Fließpressen“；Garber_2025_12_11.txt：课堂点名这些 Rückwärts 变体。"]
["Was ist Querfließpressen?","Frage (DE)：Was ist Querfließpressen?\nAntwort (DE)：Material fließt quer zur Hauptstempelrichtung; typisch für seitliche Ansätze/Anschlüsse.\n中文题目：什么是横向流压？\n中文答案：横向流压：材料流动方向横向于冲头/主压制方向；用于制造侧向凸台、法兰和连接部。课件中的变体：实心横向流压、空心横向流压；由于侧向/径向压力，工具可能承受很大载荷。\n出处：12 - Fließpressen - Skript.pdf, S.5 und S.10（Quer-Fließpressen）；full.md, Abschnitt „Voll-QuerFließpressen“；Garber_2025_12_11.txt：课堂用 seitlicher Anschluss und 侧向结构解释。"]
["Warum sind beim Kaltfließpressen Werkzeugbelastung und Verschleiß so hoch?","Frage (DE)：Warum sind beim Kaltfließpressen Werkzeugbelastung und Verschleiß so hoch?\nAntwort (DE)：Kaltfließpressen hat hohe Umformgrade und Reibung bei Raumtemperatur; Fließspannung steigt durch Verfestigung → hohe Werkzeugkräfte und Verschleiß.\n中文题目：为什么冷流压时模具载荷和磨损很高？\n中文答案：冷流压中存在很高的轴向和径向压应力、高摩擦，以及由冷作硬化造成的高流动应力。结果：工具载荷和磨损高；工具必须有韧性、热强度和耐磨性。\n出处：12 - Fließpressen - Skript.pdf, S.14–15（Spannungszustand, Werkzeugbelastung/Verschleiß）；full.md, Abschnitte „Spannungszustand beim Kaltfließpressen“ und „Anforderungen an die Werkzeuge“；Garber_2025_12_11.txt：课堂强调径向力导致摩擦和磨损。"]
["Nennen Sie Anforderungen an Fließpress-Werkzeuge.","Frage (DE)：Nennen Sie Anforderungen an Fließpress-Werkzeuge.\nAntwort (DE)：Warmfestigkeit und Warmzähigkeit; Warmrissunempfindlichkeit; Temperaturwechselbeständigkeit.\n中文题目：请列举流压模具的要求。\n中文答案：流压工具要求：热强度和热韧性；对热裂纹不敏感；耐温度交变。\n出处：12 - Fließpressen - Skript.pdf, S.15（Fließpress-Werkzeuge）；full.md, Abschnitt „Anforderungen an die Werkzeuge“；Garber_2025_12_11.txt：课堂将工具限制与最大变形程度联系起来。"]
["Was ist Strangpressen und welche Werkstoffe dominieren?","Frage (DE)：Was ist Strangpressen und welche Werkstoffe dominieren?\nAntwort (DE)：Durchdrücken eines aufgeheizten Blockes durch Matrize; ca. 80% Al, 10% Cu, 10% Fe.\n中文题目：什么是 Strangpressen？主要材料是什么？\n中文答案：定义：用冲头把加热坯块压过模具。目的：制造很长的型材。过程：热成形。主要材料：约 80% 铝材料，约 10% 铜材料，约 10% 铁材料。\n出处：12 - Fließpressen - Skript.pdf, S.4 und S.16（Strangpressen, Werkstoffe）；full.md, Abschnitt „Anwendung: Strangpressen“；Garber_2025_12_11.txt：课堂说明 Strangpressen 用于长型材、主要是铝。"]
["Begründen Sie das „Verfahrensfenster“ beim Strangpressen.","Frage (DE)：Begründen Sie das „Verfahrensfenster“ beim Strangpressen.\nAntwort (DE)：Verfahrensfenster: zu kalt -> Fließspannung/Presskraft zu hoch; zu heiß -> Schmelzbeginn/lokale Überhitzung. Zulässig zwischen Presskraft- und Schmelzgrenze, abhängig von T und A0/A1.\n中文题目：解释 Strangpressen 的“工艺窗口”。\n中文答案：工艺窗口：温度太低时流动应力/压力过高；温度太高时会开始熔化或局部过热。允许范围位于压力极限和熔化极限之间，并取决于温度 T 和面积比 A0/A1。\n出处：12 - Fließpressen - Skript.pdf, S.17（Verfahrensgrenzen und Verfahrensfenster）；full.md, Abschnitt „12.3 Strangpressen / Verfahrensgrenzen“；Garber_2025_12_11.txt：课堂强调高压下可能出现 Schmelzbeginn。"]
["Nennen Sie die zwei Hauptvarianten des Schmiedens.","Frage (DE)：Nennen Sie die zwei Hauptvarianten des Schmiedens.\nAntwort (DE)：Freiformschmieden; Gesenk(form)schmieden.\n中文题目：请列举锻造的两大主要类型。\n中文答案：按工具分为自由锻和模锻/型模锻。自由锻：工具形状不对应工件形状，适合单件/小批量，公差大，后加工多。\n出处：13 - Schmieden - Skript.pdf, S.4（Einteilung nach Werkzeugen）；full.md, Abschnitt „13.1 Einteilung der Schmiedeverfahren / Nach Werkzeugen“；Garber_2025_12_11.txt：课堂在 Schmieden 入门处点名 Freiform und Gesenk。"]
["Unterschied offenes vs geschlossenes Gesenk (Stichworte)?","Frage (DE)：Unterschied offenes vs geschlossenes Gesenk (Stichworte)?\nAntwort (DE)：Offenes Gesenk: geringer seitlicher Widerstand, Kavitäten evtl. unvollständig. Gratspalt: Widerstand/Druck hoch, Füllung besser; Nachteil Kraft, Verschleiß, Grat/Materialverlust. Geschlossen: kein Grat, aber Rohlingmasse sehr genau.\n中文题目：开式模、带飞边槽模和闭式模有什么区别？\n中文答案：开式模：侧向阻力小，型腔可能填不满。飞边槽：阻力和压力高，填充更好；缺点是力大、磨损大、有飞边和材料损失。闭式模：无飞边，但毛坯质量必须非常精确。\n出处：13 - Schmieden - Skript.pdf, S.15–16（Einteilung der Gesenke）；full.md, Abschnitt „13.4 Gesenkformschmieden / Einteilung der Gesenke“；Garber_2025_12_11.txt：课堂在 Schmieden 入门后对 Gesenk 进行了对位补全。"]
["Nennen Sie die Kienzle-Gleichung zur Schnittkraft und die Bedeutung der Größen.","Frage (DE)：Nennen Sie die Kienzle-Gleichung zur Schnittkraft und die Bedeutung der Größen.\nAntwort (DE)：Kienzle: Fc=kc*A=kc*b*h; A=b*h=ap*f; h=f*sin(kappa); b=ap/sin(kappa). kc=kc1.1*(h/h0)^(-mc), h0=1 mm; auch Fc=kc1.1*b*h0*(h/h0)^(1-mc). Korrekturen: Kv, Kver, Kgamma, Ksch.\n中文题目：写出Kienzle切削力公式，并说明各量含义。\n中文答案：Kienzle：Fc=kc·A=kc·b·h；A=b·h=ap·f；h=f·sin(kappa)；b=ap/sin(kappa)。kc=kc1.1·(h/h0)^(-mc)，h0=1 mm；也可写 Fc=kc1.1·b·h0·(h/h0)^(1-mc)。修正因子：Kv、Kver、Kgamma、Ksch。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf，S.23–25；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Kienzle/往届题4）；Garber_2025_12_18.txt（老师板书：Schnittkraft und Kienzle，auswendig）"]
["Wie lautet die Beziehung zwischen Schnittgeschwindigkeit, Drehzahl und Durchmesser beim Drehen?","Frage (DE)：Wie lautet die Beziehung zwischen Schnittgeschwindigkeit, Drehzahl und Durchmesser beim Drehen?\nAntwort (DE)：(v_c = \\pi \\cdot d \\cdot n) (mit (d) in m, (n) in 1/s bzw. 1/min passend umrechnen)\n中文题目：车削中切削速度、转速和直径的关系式是什么？\n中文答案：vc=π·d·n。若 d 用 mm、n 用 min^-1，则 vc [m/min]=π·d[mm]·n[min^-1]/1000。变形为 n=vc/(π·d)，注意单位换算。\n出处：FT 3 - Drehen - Skript.pdf，S.22；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Drehen：Zusammenhänge zwischen Schnittgrößen）；Garber_2025_12_18.txt（老师板书：v = n · π · d，auswendig）"]
["Wie wird die Umformenergie und Umformarbeit näherungsweise berechnet?","Frage (DE)：Wie wird die Umformenergie und Umformarbeit näherungsweise berechnet?\nAntwort (DE)：Näherung: W_id = V · k_fm · |φ|; real mit Wirkungsgrad: W = W_id/η. V = umgeformtes Volumen, k_fm = mittlere Fließspannung.\n中文题目：成形能量、成形功如何近似计算？\n中文答案：理想成形功：Wid=V·kfm·φ。kfm 是平均流动应力，可近似为 (kf0+kfe)/2；φ 是变形程度，例如 φ=ln(L1/L0)，流压中常用面积计算；V 是工件体积。单位：N/mm²·mm³=Nmm。\n出处：11 - Grundlagen Umformen - Skript.pdf，S.22–23；Formelblatt Fertigungstechnik.pdf，S.1；full.md（Umformende Verfahren：Umformenergie）；Garber_2025_12_18.txt（老师板书：Umformkraft und Umformenergie，optional）"]
["Definieren Sie Tiefziehen.","Frage (DE)：Definieren Sie Tiefziehen.\nAntwort (DE)：Zug-Druck-Umformen eines Blechzuschnitts zu Hohlkörpern ohne beabsichtigte Änderung der Blechdicke.\n中文题目：给出深拉的定义。\n中文答案：深拉是把板料拉压成形为空心件，或把空心件成形为周长更小的空心件；不刻意改变板厚。工艺类型：用工具、用作用介质、用作用能量。\n出处：14 - Tiefziehen - Skript.pdf，S.3；full.md（14.1 Tiefziehen：Definition）；Garber_2025_12_18.txt（老师讲Tiefziehen定义和分类）"]
["Beschreiben Sie den Ablauf des Tiefziehprozesses (mit Werkzeugen).","Frage (DE)：Beschreiben Sie den Ablauf des Tiefziehprozesses (mit Werkzeugen).\nAntwort (DE)：Ablauf: Ronde/Platine einlegen; Niederhalter auf Ronde/Ziehring; Niederhalterkraft aufbringen; Stempel formt Boden/Zarge, Werkstoff fließt aus Flansch nach innen. Werkzeuge: Ziehring, Niederhalter, Stempel.\n中文题目：说明工具深拉的工艺流程。\n中文答案：流程：放入圆片/板坯；压边圈压在圆片/拉深环上；施加压边力；冲头形成底部和筒壁，材料从法兰区向内流动。工具：拉深环、压边圈、冲头。\n出处：14 - Tiefziehen - Skript.pdf，S.5–7；full.md（14.1 Ablauf des Tiefziehprozesses；14.2 Phase 1/2）；Garber_2025_12_18.txt（老师强调：Den frage ich ab）"]
["Warum braucht man einen Niederhalter beim Tiefziehen?","Frage (DE)：Warum braucht man einen Niederhalter beim Tiefziehen?\nAntwort (DE)：Niederhalter verhindert Falten im Flansch und steuert Materialfluss. Zu klein → Falten; zu groß → Nachfließen behindert, Rissgefahr.\n中文题目：为什么深拉需要压边圈？\n中文答案：法兰区产生切向压应力；没有压边圈时板料会拱起，形成皱褶/波纹。压边圈保持法兰平整并抑制起皱，但不能阻断材料流动；正确的 FN 位于工艺窗口内。\n出处：14 - Tiefziehen - Skript.pdf，S.7–8、S.12–13；full.md（Faltenbildung ohne Niederhalter；Verfahrensgrenzen）；Garber_2025_12_18.txt（老师讲Niederhalter：zu klein Falten，zu groß Riss）"]
["Was passiert bei zu kleiner bzw. zu großer Niederhalterkraft?","Frage (DE)：Was passiert bei zu kleiner bzw. zu großer Niederhalterkraft?\nAntwort (DE)：Zu klein: Falten/Wellen im Flansch. Zu groß: Nachfließen behindert, Reibung/Ziehkraft steigt → Riss bzw. Bodenreißer.\n中文题目：压边力过小或过大会发生什么？\n中文答案：FN 太小：法兰没有被充分压住，产生皱褶和波纹。FN 太大：摩擦和冲头力上升，材料更难补流，筒壁和底部区域过载，产生裂纹或底部撕裂。\n出处：14 - Tiefziehen - Skript.pdf，S.12–13；full.md（14.3 Verfahrensgrenzen；Verfahrensfenster）；Garber_2025_12_18.txt（老师强调压边力过小、过大后果）"]
["Wo liegt die charakteristische Schwachstelle eines tiefgezogenen Bauteils und warum?","Frage (DE)：Wo liegt die charakteristische Schwachstelle eines tiefgezogenen Bauteils und warum?\nAntwort (DE)：Schwachstelle am Boden-/Stempelradius. Dort wird die Ziehkraft über die Zarge übertragen; bei hoher Zugspannung/Verfestigung entsteht Bodenreißer.\n中文题目：深拉件的典型薄弱区在哪里？为什么？\n中文答案：典型薄弱处在底部边缘/冲头圆角区域。原因：主要变形发生在冲头和拉深环圆角处，那里板厚减小并硬化；筒壁把冲头力作为拉力传递，过载时发生底部撕裂或裂纹。\n出处：14 - Tiefziehen - Skript.pdf，S.6、S.12–13；full.md（14.2 Phase 1：charakteristische Schwachstelle；往届题14：Am Rand des Bodens）；Garber_2025_12_18.txt（老师强调深拉件Schwachstelle）"]
["Skizzieren und erläutern Sie das Verfahrensfenster der Niederhalterkraft über dem Ziehverhältnis β.","Frage (DE)：Skizzieren und erläutern Sie das Verfahrensfenster der Niederhalterkraft über dem Ziehverhältnis β.\nAntwort (DE)：Diagramm: x=Ziehverh?ltnis beta, y=Niederhalterkraft. Unten Faltenbildung, oben Bodenreißer/Riss, dazwischen Fenster. Mit beta steigend: Mindest-F_N steigt, max. F_N sinkt; bei beta_max Fenster zu.\n中文题目：画出并解释压边力随拉深比β变化的工艺窗口。\n中文答案：图：x 轴为拉深比 beta，y 轴为压边力。下方边界为起皱，上方边界为底部撕裂/裂纹，中间为工艺窗口。随着 beta 增大，最小 F_N 上升，最大 F_N 下降；到 beta_max 时窗口关闭。\n出处：14 - Tiefziehen - Skript.pdf，S.12–13；full.md（14.3 Verfahrensfenster für die Niederhalterkraft；往届题14）；Garber_2025_12_18.txt（老师板书并解释上支下降、下支上升）"]
["Was ist „Zunder“ und welche Probleme verursacht er beim Schmieden?","Frage (DE)：Was ist „Zunder“ und welche Probleme verursacht er beim Schmieden?\nAntwort (DE)：Zunder = Oxidschicht auf heißem Stahl. Probleme: schlechte Oberfläche, harte Oxide werden eingearbeitet, Werkzeugverschleiss hoch, Materialverlust bis ca. 3%.\n中文题目：什么是锻造中的氧化皮？它会造成哪些问题？\n中文答案：氧化皮是热钢表面的氧化层。问题：表面差，硬氧化物会被压入工件，工具磨损高，材料损失可达约 3%。\n出处：13 - Schmieden - Skript.pdf，S.5、S.9；full.md（13.2 Grundlagen des Schmiedens：Zunderbildung）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_123338、IMG_20251218_123519（Zunderbildung）"]
["Nennen Sie Maßnahmen gegen Verzunderung.","Frage (DE)：Nennen Sie Maßnahmen gegen Verzunderung.\nAntwort (DE)：Kurze Warmzeiten, z.B. induktives Erwärmen; geringere Umformtemperaturen, nur begrenzt umsetzbar; Beschichtung der Rohlinge vor dem Erwärmen.\n中文题目：列举减轻锻造氧化皮、氧化损失的措施。\n中文答案：措施：缩短加热/保温时间，例如感应加热；尽量降低成形温度，但实施受限；加热前对毛坯涂层。\n出处：13 - Schmieden - Skript.pdf，S.9；full.md（Zunderbildung；往届题17/15：Maßnahmen gegen Verzunderung）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_123338、IMG_20251218_123519（老师高亮kurze Warmzeiten und Beschichtung）"]
["Warum füllt ein Gesenk mit Gratspalt Kavitäten besser als ein offenes Gesenk?","Frage (DE)：Warum füllt ein Gesenk mit Gratspalt Kavitäten besser als ein offenes Gesenk?\nAntwort (DE)：Offenes Gesenk: geringer seitlicher Fließwiderstand, fehlender Gegendruck → Material fließt seitlich weg, Kavitäten ggf. nicht gefüllt.\n中文题目：为什么带飞边槽的模锻比开放模更容易充满型腔？\n中文答案：开式模：侧向流动阻力小，缺少反压力，材料向侧面流走，型腔可能填不满。\n出处：13 - Schmieden - Skript.pdf，S.15；full.md（13.4 Gesenkformschmieden：Offenes Gesenk / Gesenk mit Gratspalt）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_124841（老师板书Spalten）"]
["Nennen Sie Nachteile eines Gesenks mit Gratspalt.","Frage (DE)：Nennen Sie Nachteile eines Gesenks mit Gratspalt.\nAntwort (DE)：- höhere Kraft → mehr Werkzeugverschleiß\n- Grat abtrennen = zusätzlicher Arbeitsschritt\n- Materialverlust durch Grat\n中文题目：列举带飞边槽模锻的缺点。\n中文答案：飞边槽使模具承受更高力，工具磨损更大；切除飞边是额外工序；飞边造成材料损失。因此虽然充型更好，但有经济和技术缺点。\n出处：13 - Schmieden - Skript.pdf，S.15；full.md（Gesenk mit Gratspalt：Nachteile）；Garber_2025_12_18.txt; 课堂照片IMG_20251218_124841"]
["Was bedeutet Kalibrieren beim Schmieden und warum erreicht man hohe Genauigkeit?","Frage (DE)：Was bedeutet Kalibrieren beim Schmieden und warum erreicht man hohe Genauigkeit?\nAntwort (DE)：Kalibrieren = kaltes Nachformen nach Warmumformung. Geringe Umformgrade, endkonturnah; keine Wärmeausdehnung/Schrumpfung/Zunder -> hohe Oberfläche und Maßgenauigkeit, bis ca. IT8.\n中文题目：锻造中的校准（Kalibrieren）是什么意思？为什么精度高？\n中文答案：校准是热成形后的冷态后成形。变形量小，接近最终轮廓；没有热膨胀、收缩和氧化皮，所以表面和尺寸精度高，可达约 IT8。\n出处：13 - Schmieden - Skript.pdf，S.5、S.18、S.22；full.md（Kaltschmieden：Prägen und Kalibrieren；Stadienfolge；Toleranzen）；Garber_2025_12_18.txt; 课堂照片IMG_20251219_125050（老师板书Kalibrieren）"]
["Warum sind Hinterschneidungen problematisch, und wozu dient die Aushebeschräge?","Frage (DE)：Warum sind Hinterschneidungen problematisch, und wozu dient die Aushebeschräge?\nAntwort (DE)：Hinterschneidungen verhindern Entformen/Ausheben aus dem Gesenk. Aushebeschräge ermöglicht Entformen und reduziert Werkzeug-/Werkstückschäden.\n中文题目：为什么倒扣对模锻不利？脱模斜度有什么作用？\n中文答案：倒扣使脱模困难，需要分体或活动模具，因此昂贵且复杂。脱模斜度便于顶出，防止卡住并降低工具载荷。\n出处：13 - Schmieden - Skript.pdf，S.22–23；full.md（Konstruktive Randbedingungen：keine Hinterschneidungen，Aushebeschrägen；Geteilte Gesenke）；Garber_2025_12_18.txt; 课堂照片IMG_20251219_125132（Hinterschneidung und Aushebeschräge）"]
["Warum ist Tiefziehen ein Zug-Druck-Umformen?","Frage (DE)：Warum ist Tiefziehen ein Zug-Druck-Umformen?\nAntwort (DE)：Im Flansch herrschen tangentiale Druckspannungen, in der Zarge Zugspannungen; Kombination aus Zug und Druck formt das Blech zum Napf.\n中文题目：为什么深拉属于拉-压复合成形？\n中文答案：拉：冲头力通过底部/筒壁作为拉应力传递。压：法兰向内流向更小周长，产生切向压应力；没有压边圈会起皱。\n出处：14 - Tiefziehen - Skript.pdf，S.3、S.7–8；full.md（Definition；Phase 2：radial gestreckt/tangential gestaucht；Faltenbildung）；Garber_2025_12_18.txt（老师讲Tiefziehen受力与Faltenbildung）"]
["Geben Sie die Kienzle-Schnittkraftformel für \\(F_c\\) an.","Frage (DE)：Geben Sie die Kienzle-Schnittkraftformel für \\(F_c\\) an.\nAntwort (DE)：(F_c = K_{c1,1}\\cdot b \\cdot h \\cdot (\\frac{h}{h_0})^{-m_c}\\cdot k_{ver}\\cdot k_v\\cdot k_{sch}\\cdot k_\\gamma) (Formvarianten äquivalent).\n中文题目：写出 Kienzle 切削力公式 \\(F_c\\)。\n中文答案：Fc=kc1,1·b·h·(h/h0)^(-mc)·kv·kver·kγ·ksch。等价形式：Fc=kc1,1·b·h0·(h/h0)^(1-mc)·kv·kver·kγ·ksch；b、h、h0 用 mm，kc1,1 用 N/mm²，结果为 N。\n出处：Garber_2026_01_08.txt（课堂强调：期末会有 Schnittkraft 计算）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.23–25；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Formelblatt und Kienzle）"]
["Was ist \\(h_0\\) und warum ist \\(h_0 = 1\\,\\text{mm}\\)?","Frage (DE)：Was ist \\(h_0\\) und warum ist \\(h_0 = 1\\,\\text{mm}\\)?\nAntwort (DE)：h_0 = Bezugs-Spanungsdicke in Kienzle; normiert auf 1 mm, damit (h/h_0) dimensionslos ist und k_c1,1 tabellierbar bleibt.\n中文题目：\\(h_0\\) 是什么？为什么取 1 mm？\n中文答案：h0 是 Kienzle 直线的参考切屑厚度/基准厚度；h0=1 mm，因为 kc1,1 是针对 b=1 mm 且 h=1 mm 定义的；(h/h0) 必须是无量纲。\n出处：Garber_2026_01_08.txt（板书：h0 = 1 mm!）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.23–24；full.md（Formelblatt Fertigungstechnik）"]
["Wofür stehen \\(k_{ver}, k_v, k_{sch}, k_\\gamma\\)?","Frage (DE)：Wofür stehen \\(k_{ver}, k_v, k_{sch}, k_\\gamma\\)?\nAntwort (DE)：(k_{ver}): Verschleiß；(k_v): Schnittgeschwindigkeit；(k_{sch}): Schneidstoff；(k_\\gamma): Spanwinkel.\n中文题目：四个修正因子分别表示什么？\n中文答案：kver 表示磨损状态；kv 表示切削速度；ksch 表示刀具材料；kgamma 表示前角。它们都是 Kienzle 切削力公式中的修正因子。\n出处：Garber_2026_01_08.txt（板书列出四个 k 因子）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.24–25；full.md（Kienzle/公式表）"]
["Skizzieren Sie den Rechenweg zur Berechnung von \\(F_c\\) (Punkteschema).","Frage (DE)：Skizzieren Sie den Rechenweg zur Berechnung von \\(F_c\\) (Punkteschema).\nAntwort (DE)：1) f, a_p, κ bestimmen; 2) h = f · sinκ, b = a_p/sinκ, A = b · h; 3) k_c1,1 und 1-m_c aus Tabelle; 4) Kienzle einsetzen; 5) Korrekturfaktoren/Einheit N.\n中文题目：写出计算 \\(F_c\\) 的标准步骤。\n中文答案：1）确定几何：A=ap·f=b·h，h=f·sinκ，b=ap/sinκ；2）查表得到 kc1,1 和 1-mc 或 mc；3）h0=1 mm，所有长度用 mm；4）代入 Kienzle 公式；5）应用修正因子。\n出处：Garber_2026_01_08.txt（课堂例题：Schnittkraft 至少会算一次，板书含 Drehmoment）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.21–26；FT 3 - Drehen - Skript.pdf, S.22–24；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Drehen und Kienzle）"]
["Was bedeutet „Additivität des Umformgrades“?","Frage (DE)：Was bedeutet „Additivität des Umformgrades“?\nAntwort (DE)：Logarithmische Umformgrade sind additiv: φ_ges = φ_1 + φ_2 + ...; gilt für mehrere Umformschritte, nicht für technische Dehnung ε.\n中文题目：“变形程度可加性”是什么意思？\n中文答案：对数形变或变形程度可以相加：ϕges=ϕ1+ϕ2+...；适用于连续的多个成形步骤；工程应变 ε 不能简单相加。\n出处：Garber_2026_01_08.txt（板书：Additivität des Umformgrades）；11 - Grundlagen Umformen - Skript.pdf, S.21；full.md（Additivität der Formänderung）"]
["Berechnen Sie \\(\\varphi_{ges}\\) für \\(\\varphi_1=0{,}6\\) und \\(\\varphi_2=0{,}3\\).","Frage (DE)：Berechnen Sie \\(\\varphi_{ges}\\) für \\(\\varphi_1=0{,}6\\) und \\(\\varphi_2=0{,}3\\).\nAntwort (DE)：(\\varphi_{ges}=0{,}6+0{,}3=0{,}9).\n中文题目：若 \\(\\varphi_1=0.6\\)、\\(\\varphi_2=0.3\\)，求总变形程度。\n中文答案：ϕges=ϕ1+ϕ2=0.6+0.3=0.9；无单位；不要相乘。\n出处：Garber_2026_01_08.txt（课堂、往届题第10题口径）；11 - Grundlagen Umformen - Skript.pdf, S.21；full.md（Prüfungsaufgabe/Umformgrad）"]
["Warum ist \\(\\beta_{ges}\\) ohne Zwischen-Glühen begrenzt?","Frage (DE)：Warum ist \\(\\beta_{ges}\\) ohne Zwischen-Glühen begrenzt?\nAntwort (DE)：Jeder Zug verfestigt das Blech; Umformbarkeit sinkt, Ziehkraft/Zargenspannung steigt → Gefahr Bodenreißer. Zwischenglühen baut Verfestigung ab.\n中文题目：为什么不进行中间退火时总深拉比有限？\n中文答案：每次拉深都会增加冷作硬化，成形能力下降；筒壁必须传递冲头力，存在底部撕裂或裂纹风险；中间退火或再结晶退火可以消除硬化，提高后续成形能力。\n出处：Garber_2026_01_08.txt（课堂说明 ohne Glühen 的限制）；14 - Tiefziehen - Skript.pdf, S.11–13；11 - Grundlagen Umformen - Skript.pdf, S.12、S.18；full.md（Tiefziehen/Umformen）"]
["Begründen Sie, warum das Verfahrensfenster „dreieckig“ verläuft.","Frage (DE)：Begründen Sie, warum das Verfahrensfenster „dreieckig“ verläuft.\nAntwort (DE)：Mit beta steigend: Ziehkraft/Umformarbeit steigt, zulässige Zusatzkraft sinkt; zugleich braucht man mehr Niederhalterkraft gegen Falten. Untere Grenze Falten, obere Bodenreißer -> dreieckiges Fenster.\n中文题目：解释为什么压边力工艺窗口呈“三角形”。\n中文答案：随着 beta 增大，拉深力/成形功上升，可允许的附加力下降；同时为了防止起皱，需要更大的压边力。下边界是起皱，上边界是底部撕裂，因此形成三角形窗口。\n出处：Garber_2026_01_08.txt（课堂解释三角形窗口）；14 - Tiefziehen - Skript.pdf, S.13；full.md（Verfahrensfenster für die Niederhalterkraft）"]
["Nennen Sie die vier Anteile der Ziehkraft \\(F_Z\\).","Frage (DE)：Nennen Sie die vier Anteile der Ziehkraft \\(F_Z\\).\nAntwort (DE)：(F_Z = F_{id} + F_{RR} + F_{RN} + F_B).\n中文题目：写出拉深力 \\(F_Z\\) 的四个组成。\n中文答案：FZ=Fid+FRR+FRN+FB。Fid：理想成形力；FRR：拉深环圆角处摩擦；FRN：拉深环和压边圈之间摩擦；FB：弯曲/反弯力。\n出处：Garber_2026_01_08.txt（Tiefziehen 复习口径）；14 - Tiefziehen - Skript.pdf, S.14；full.md（14.3 Ziehkraft）"]
["Was sind die Folgen einer zu kleinen bzw. zu großen Ziehkantenrundung \\(R_R\\)?","Frage (DE)：Was sind die Folgen einer zu kleinen bzw. zu großen Ziehkantenrundung \\(R_R\\)?\nAntwort (DE)：zu klein → zusätzliche Dehnung/Bruchgefahr；zu groß → Niederhalter wirkt schlechter → Faltenbildung.\n中文题目：模具拉深圆角 \\(R_R\\) 太小或太大会怎样？\n中文答案：RR 太小：板料受到额外拉伸/弯曲，力更高，裂纹或断裂风险更高。RR 太大：拉深末期压边圈作用变差，法兰可能偏移并起皱。小拉深深度可选择较小 RR。\n出处：Garber_2026_01_08.txt（课堂、板书：Ziehkantenrundung）；14 - Tiefziehen - Skript.pdf, S.15；full.md（14.3 Ziehkantenrundung）"]
["Warum ist Gegenlauffräsen hinsichtlich Verschleiß und Oberfläche oft ungünstig?","Frage (DE)：Warum ist Gegenlauffräsen hinsichtlich Verschleiß und Oberfläche oft ungünstig?\nAntwort (DE)：Gegenlauf: Spandicke startet bei 0 → erst Reiben/Drücken statt Schneiden; Temperatur/Verschleiß steigen, Oberfläche schlechter.\n中文题目：为什么逆铣在磨损和表面质量方面通常不利？\n中文答案：逆铣时切屑厚度从 0 开始；刀齿先在表面滑擦，然后才开始形成切屑。摩擦和挤压代替切削，导致高后刀面磨损、更高热量和较差表面；只有在进给轴有间隙时才有优势。\n出处：Garber_2026_01_08.txt（课堂问：Warum Gegenlauffräsen ungünstig）；FT 5 - Fräsen - Skript.pdf, S.5；Fräsverfahren.pdf, Abschnitt Gleich- und Gegenlauf；full.md（5.2 Besonderheiten beim Fräsen）"]
["Begründen Sie die Spanwinkelwahl für Schlichten vs. Schruppen.","Frage (DE)：Begründen Sie die Spanwinkelwahl für Schlichten vs. Schruppen.\nAntwort (DE)：Schlichten: großer/positiver γ → leichter Spanfluss, gute Oberfläche. Schruppen: kleiner/negativer γ → stabiler Keil für hohe Kräfte, aber mehr Wärme.\n中文题目：说明精加工和粗加工时前角如何选择，并给出理由。\n中文答案：精加工：大正前角 gamma，有利于流屑、切削力小、表面好，但刀楔较弱。粗加工：小前角或负前角，刀楔稳定，力和寿命高，但更容易形成撕裂屑。\n出处：Garber_2026_01_08.txt（课堂：Schlichten und Schruppen 的 Spanwinkel 选择）；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.10–13；full.md（Wahl der Keilwinkel）"]
["Welcher Schneidstoff eignet sich für gehärteten Stahl (z.B. HRC ~65) und warum?","Frage (DE)：Welcher Schneidstoff eignet sich für gehärteten Stahl (z.B. HRC ~65) und warum?\nAntwort (DE)：Für gehärteten Stahl: CBN, ggf. Keramik. Grund: hohe Warmhärte/Verschleißfestigkeit. Diamant/PKD bei Stahl kritisch wegen Diffusion/Reaktion mit Fe.\n中文题目：加工淬硬钢（如 HRC≈65）应选什么刀具材料？为什么？\n中文答案：适合：CBN，必要时陶瓷也可用于淬硬钢/硬加工。原因：高硬度、高热硬性和高耐磨性。PKD/金刚石加工钢时很关键，因为碳扩散/化学磨损。\n出处：Garber_2026_01_08.txt（课堂：Hartbearbeitung und Schneidstoff）；FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf, S.4–7；FT 5 - Fräsen - Skript.pdf, S.21；full.md（Schneidstoffe/Hartfräsen）"]
["Was beeinflusst Freiflächenverschleiß stärker: Oberfläche oder Maßhaltigkeit? Begründen.","Frage (DE)：Was beeinflusst Freiflächenverschleiß stärker: Oberfläche oder Maßhaltigkeit? Begründen.\nAntwort (DE)：Freiflächenverschleiß beeinflusst Maßhaltigkeit stärker: Schneide wandert durch SV → Maßfehler; Oberfläche kann betroffen sein, aber nicht so direkt.\n中文题目：后刀面磨损更影响表面还是尺寸精度？说明原因。\n中文答案：影响更强的是尺寸精度。后刀面磨损产生 VB 和切削刃偏移 SV；若不补偿，会产生尺寸误差。表面也可能变差，但相对次要。\n出处：Garber_2026_01_08.txt（往届题第3题、课堂强调）；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（Freiflächenverschleiß/Prüfungsaufgabe）"]
["Wie berechnen Sie den Umformgrad beim Rückwärtsfließpressen über Flächenverhältnis?","Frage (DE)：Wie berechnen Sie den Umformgrad beim Rückwärtsfließpressen über Flächenverhältnis?\nAntwort (DE)：Rückwärtsfließpressen über Flächen: phi=|ln(A1/A0)| bzw. positiv ln(A0/A1). Beim Napf: A0=pi*D0^2/4, A1=pi*(D0^2-Di^2)/4 als Ringquerschnitt.\n中文题目：后向挤压如何用面积比计算变形程度 \\(\\varphi\\)？\n中文答案：后向流压用面积计算：phi=|ln(A1/A0)|，或写成正值 ln(A0/A1)。杯形件：A0=pi·D0²/4，A1=pi·(D0²-Di²)/4，即环形截面。\n出处：Garber_2026_01_08.txt（板书：Napf-Rückwärtsfließpressen，面积比，负号取正值）；12 - Fließpressen - Skript.pdf, S.14–15；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（12.2 Fließpressen und Prüfungsaufgabe）"]
["Verfahrenswahl: Kranhaken – warum Schmieden?","Frage (DE)：Verfahrenswahl: Kranhaken – warum Schmieden?\nAntwort (DE)：Schmieden wegen hoher Festigkeit/Zähigkeit und günstigem Faserverlauf; Kranhaken ist sicherheitsrelevant und dynamisch belastet.\n中文题目：工艺选择：起重钩为什么应选锻造？\n中文答案：起重钩应锻造：它是安全相关件，需要高强度/高韧性；纤维流线沿载荷方向更有利，动态载荷性能更好，且铸造缺陷/孔隙更少。批量生产时：模锻 + 后加工。\n出处：Garber_2026_01_08.txt（往届题第11题、课堂口径）；13 - Schmieden - Skript.pdf, S.20–22；full.md（13.5 Faserverlauf und Prüfungsaufgabe）"]
["Berechnen Sie die Hauptzeit \\(T_h\\) beim Drehen (Formel + Einheitenhinweise).","Frage (DE)：Berechnen Sie die Hauptzeit \\(T_h\\) beim Drehen (Formel + Einheitenhinweise).\nAntwort (DE)：\\(T_h=L\\cdot i/(n\\cdot f)\\); \\(L\\): Vorschublänge inkl; Anlaufweg und Überlaufweg, beim Plandrehen \\(L=d/2+l_a+l_u\\); \\(i\\): Durchgänge; \\(f\\): mm/U.\n中文题目：车削主时间 \\(T_h\\) 怎么算？单位如何避免出错？\n中文答案：Th=L·i/(n·f)。L 是进给长度，包括起刀路程和超程；端面车削时 L=d/2+la+lu。i 是走刀次数；f 的单位为 mm/U。\n出处：Garber_2026_01_08.txt（板书例题：L=8 m、f=2 mm、单位陷阱）；FT 3 - Drehen - Skript.pdf, S.19、S.22；Drehverfahren.pdf（Hauptzeit/Definitionen）；Formelblatt Fertigungstechnik.pdf, Foliennummer 1；full.md（3.4 Hauptzeit）"]
["Warum ist beim Innenrundschleifen eine „zu große“ Schleifscheibe kritisch?","Frage (DE)：Warum ist beim Innenrundschleifen eine „zu große“ Schleifscheibe kritisch?\nAntwort (DE)：Zu große Schleifscheibe -> Kontaktlänge groß, lange Späne, Poren verstopfen, KSS schlecht, Temperatur/Schleifbrand hoch. Richtwert: D_s=0,6...0,8 D_WS.\n中文题目：内圆磨时砂轮过大为什么危险？\n中文答案：砂轮过大时接触长度大，切屑长，气孔堵塞，KSS 进入差，温度和磨削烧伤风险高。经验值：D_s=0.6...0.8 D_WS。\n出处：Garber_2026_01_08.txt（往届题第7题、课堂说明）；FT 8 - Schleifen - Skript.pdf, S.5；07_Vorbereitung_Schleifen.pdf, Schleifverfahren/Innenrundschleifen；full.md（8.1 Innenrundschleifen）"]
["Ein Werkstück wird in zwei Schritten umgeformt. Schritt 1: φ1, Schritt 2: φ2. Wie groß ist der Gesamt-Umformgrad φ_ges?","Frage (DE)：Ein Werkstück wird in zwei Schritten umgeformt. Schritt 1: φ1, Schritt 2: φ2. Wie groß ist der Gesamt-Umformgrad φ_ges?\nAntwort (DE)：φ_ges = φ_1 + φ_2; gilt für logarithmische Umformgrade. Nicht multiplizieren und nicht technische Dehnung ε addieren.\n中文题目：工件分两步成形：第1步 φ1，第2步 φ2，总变形程度 φ_ges 多大？\n中文答案：φges=φ1+φ2；这适用于对数变形程度或形变；普通工程应变 ε 不能相加。\n出处：Garber_2026_01_15.txt（老师强调：geschenkter Punkt/kommt praktisch immer）; 11 - Grundlagen Umformen - Skript.pdf S.21 Additivität der Formänderung; full.md: Additivität der Formänderung"]
["Beschreiben Sie die Berechnung der Schnittkraft nach Kienzle ohne Korrekturfaktoren. Welche Zwischengrößen sind punktrelevant?","Frage (DE)：Beschreiben Sie die Berechnung der Schnittkraft nach Kienzle ohne Korrekturfaktoren. Welche Zwischengrößen sind punktrelevant?\nAntwort (DE)：1) f=v_f/n; 2) A=a_p*f=b*h; 3) h=f*sin(kappa), b=a_p/sin(kappa); 4) k_c1.1 und 1-m_c aus Tabelle; 5) F_c=k_c1.1*b*h0*(h/h0)^(1-m_c), h0=1 mm. Punkte: b, h, Werkstoffzeile, Einheit N.\n中文题目：说明不用修正系数时如何按 Kienzle 计算切削力；哪些中间量是给分点？\n中文答案：1）f=v_f/n；2）A=a_p·f=b·h；3）h=f·sin(kappa)，b=a_p/sin(kappa)；4）从表中查 k_c1.1 和 1-m_c；5）F_c=k_c1.1·b·h0·(h/h0)^(1-m_c)，h0=1 mm。给分点：b、h、材料表行、单位 N。\n出处：Garber_2026_01_15.txt（老师强调 b/h 是给分点）; FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.22–26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Drehen Spangeometrie + Kienzle-Formel"]
["Nennen Sie die Spanformen (Fließspan, Scherspan und Reißspan) und ordnen Sie eine typische Oberflächenqualität zu.","Frage (DE)：Nennen Sie die Spanformen (Fließspan, Scherspan und Reißspan) und ordnen Sie eine typische Oberflächenqualität zu.\nAntwort (DE)：Reißspan/Bröckelspan: spröde Werkstoffe/niedrige v_c, raue Oberfläche. Scherspan/Lamellenspan: duktil, mittlere v_c, mittlere Oberfläche. Fließspan: hohe v_c, großer gamma, beste Oberfläche, aber lange Späne.\n中文题目：列出流屑、剪切屑、崩碎屑，并说明典型表面质量。\n中文答案：撕裂屑/崩碎屑：脆性材料或低 v_c，表面粗糙。剪切屑/层状屑：延性材料、中等 v_c，中等表面。流屑：高 v_c、大 gamma，表面最好，但切屑长。\n出处：Garber_2026_01_15.txt; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.10–13; full.md: Spanformen"]
["Wie berechnen Sie die Hauptzeit t_h beim Drehen? Was ist bei Anfahrweg und Überlaufweg zu beachten?","Frage (DE)：Wie berechnen Sie die Hauptzeit t_h beim Drehen? Was ist bei Anfahrweg und Überlaufweg zu beachten?\nAntwort (DE)：Standard: t_h = L·i/(n·f); Gewindedrehen: t_h = L·i·g/(n·p); L = l + l_a + l_u; beim Plandrehen l = d/2; bei Werkstück ohne Bund Anfahrweg und Überlaufweg berücksichtigen.\n中文题目：车削主时间 t_h 如何计算？进刀、超程需要注意什么？\n中文答案：标准公式：t_h=L·i/(n·f)。螺纹车削：t_h=L·i·g/(n·p)。L=l+la+lu；端面车削时 l=d/2；无台肩工件要考虑起刀路程和超程。\n出处：Garber_2026_01_15.txt; FT 3 - Drehen - Skript.pdf S.19, S.22; Formelblatt Fertigungstechnik.pdf S.1; full.md: Hauptzeit beim Drehen/Anfahrweg und Überlaufweg"]
["Beim Schlichten ist eine Rillentiefe t zulässig. Gegeben Eckenradius Rε. Wie bestimmen Sie den maximalen Vorschub f?","Frage (DE)：Beim Schlichten ist eine Rillentiefe t zulässig. Gegeben Eckenradius Rε. Wie bestimmen Sie den maximalen Vorschub f?\nAntwort (DE)：Rillentiefe-Geometrie: t = Rε − sqrt(Rε² − (f/2)²); umgestellt: f = sqrt(8·Rε·t − 4·t²) = 2·sqrt(2·Rε·t − t²); Näherung bei t << Rε: t ≈ f²/(8·Rε); Einheitenfalle: t z.B. 0,03 mm einsetzen, nicht 30 µm als 30 mm.\n中文题目：精加工允许沟纹深度 t，已知刀尖圆角半径 Rε，如何求最大进给 f？\n中文答案：沟纹深度几何：t=Rε−sqrt(Rε²−(f/2)²)。变形得 f=sqrt(8·Rε·t−4·t²)=2·sqrt(2·Rε·t−t²)。当 t<<Rε 时近似 t≈f²/(8·Rε)。单位陷阱：例如 t=0.03 mm，不要把 30 µm 当成 30 mm。\n出处：Garber_2026_01_15.txt（老师说明公式在 Formelsammlung）; FT 3 - Drehen - Skript.pdf S.13–15; Formelblatt Fertigungstechnik.pdf S.1; full.md: Rillentiefe beim Längsrunddrehen"]
["Gegeben v_c und Durchmesser d. Wie berechnen Sie die Drehzahl n?","Frage (DE)：Gegeben v_c und Durchmesser d. Wie berechnen Sie die Drehzahl n?\nAntwort (DE)：v_c = π·d·n / 1000 ⇒ n = 1000·v_c /(π·d) (d in mm, v_c in m/min).\n中文题目：已知切削速度 v_c 和直径 d，如何计算转速 n？\n中文答案：vc=π·d·n。若 d 用 mm、vc 用 m/min，则 vc=π·d·n/1000，所以 n=1000·vc/(π·d)，结果单位 min^-1。横向/端面车削时 d 在加工中变化：n 恒定时，越靠近中心 vc 越小；恒定 vc 也只能到最大转速为止。\n出处：Garber_2026_01_15.txt; FT 3 - Drehen - Skript.pdf S.18, S.22; Drehverfahren.pdf Quer-Plandrehen; full.md: Zusammenhänge zwischen Schnittgrößen"]
["Was ist Kolkverschleiß und wie wirkt er sich auf Genauigkeit und Oberfläche aus?","Frage (DE)：Was ist Kolkverschleiß und wie wirkt er sich auf Genauigkeit und Oberfläche aus?\nAntwort (DE)：Kolkverschleiß = Mulde auf Spanfläche hinter Schneide; Ursache Reibung + Diffusion bei hoher T. Wirkung: Spanablauf/Spanwinkel verändert, Schneide geschwächt, Bruchgefahr; Maßhaltigkeit weniger direkt als bei Freiflächenverschleiß.\n中文题目：什么是月牙洼磨损？它对尺寸精度和表面有什么影响？\n中文答案：月牙洼磨损是在刃口后方前刀面上的凹坑；原因是高温下的摩擦和扩散。影响：改变切屑流动和前角，使切削刃变弱并增加断裂风险；对尺寸精度的直接影响小于后刀面磨损。\n出处：Garber_2026_01_15.txt（老师问到影响精度口径）; FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Kolkverschleiß"]
["Ordnen Sie HSS, Hartmetall, Keramik, CBN und PKD qualitativ nach Schnittgeschwindigkeit und Zähigkeit.","Frage (DE)：Ordnen Sie HSS, Hartmetall, Keramik, CBN und PKD qualitativ nach Schnittgeschwindigkeit und Zähigkeit.\nAntwort (DE)：Schnittgeschwindigkeit/Warmhärte: HSS < Hartmetall < Keramik < CBN/PKD. Zähigkeit umgekehrt: HSS hoch, Keramik spröde. Hohe Warmhärte erlaubt hohe v_c; Zähigkeit wichtig bei Stoß/Rattern/unterbrochenem Schnitt.\n中文题目：定性排列 HSS、硬质合金、陶瓷、CBN、PKD 的切削速度能力与韧性。\n中文答案：切削速度/热硬性：HSS < 硬质合金 < 陶瓷 < CBN/PKD。韧性大致相反：HSS 高，陶瓷脆。高热硬性允许高 v_c；韧性在冲击、颤振和断续切削中很重要。\n出处：Garber_2026_01_15.txt; FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.4–7; full.md: Schneidstoffe Härte und Festigkeit/Warmhärte"]
["Was bedeutet Rattern und was ist die Grenzspanntiefe?","Frage (DE)：Was bedeutet Rattern und was ist die Grenzspanntiefe?\nAntwort (DE)：Rattern = selbsterregte instabile Schwingung beim Drehen/Fräsen. Grenzspantiefe = ap, ab dem im Testschnitt schlagartig große Amplituden auftreten; darunter stabil, darüber instabil. Abhilfe: ap/Spanquerschnitt senken, Steifigkeit/Dämpfung erhöhen.\n中文题目：什么是颤振 Rattern？什么是临界切深（题干写 Grenzspanntiefe，课件写 Grenzspantiefe）？\n中文答案：颤振是车削/铣削中的自激不稳定振动。临界切深是试切中从某个 ap 开始振幅突然变大的切深；低于它稳定，高于它不稳定。对策：降低 ap/切屑截面，提高刚度/阻尼。\n出处：Garber_2026_01_15.txt; FT 5 - Fräsen - Skript.pdf S.12–13; full.md: Rattern/Ermittlung der Grenzspantiefe"]
["Begründen Sie, warum Umfangsplanschleifen gegenüber Seitenplanschleifen oft Vorteile hat.","Frage (DE)：Begründen Sie, warum Umfangsplanschleifen gegenüber Seitenplanschleifen oft Vorteile hat.\nAntwort (DE)：Umfangs-Planschleifen besser: kurze Kontaktzeit, kurze Späne, geringere Wärme, bessere KSS-/Spanabfuhr, Selbstreinigung durch Fliehkraft. Seiten-Planschleifen: kleine Spankammer, hoher Druck/Wärme; Abhilfe Spindelsturz.\n中文题目：说明为什么周边平面磨（Umfangsplanschleifen）通常比侧面平面磨（Seitenplanschleifen）有优势。\n中文答案：周边平面磨更好：接触时间短，切屑短，热量低，KSS 和排屑更好，离心力有自清洁作用。侧面平面磨：容屑空间小，压力和热量高；对策是主轴倾斜。\n出处：Garber_2026_01_15.txt; FT 8 - Schleifen - Skript.pdf S.7–8; 07_Vorbereitung_Schleifen.pdf S.3–5; full.md: Planschleifen/Umfangs-Planschleifen"]
["Erklären Sie das Verfahrensfenster der Niederhalterkraft beim Tiefziehen (zu klein/zu groß).","Frage (DE)：Erklären Sie das Verfahrensfenster der Niederhalterkraft beim Tiefziehen (zu klein/zu groß).\nAntwort (DE)：Verfahrensfenster: y=F_NH, x=beta. Zu klein -> Falten im Flansch. Zu groß -> Nachfließen behindert, Zugspannung/Stempelkraft hoch -> Bodenreißer. Fenster dazwischen; bei beta_max geschlossen.\n中文题目：解释深拉压边力的工艺窗口：压边力太小、太大分别会怎样？\n中文答案：工艺窗口：y 轴为 F_NH，x 轴为 beta。压边力太小会在法兰起皱；太大则阻碍材料补流，使拉应力/冲头力升高并导致底部撕裂。两者之间是窗口；到 beta_max 时窗口关闭。\n出处：Garber_2026_01_15.txt; 14 - Tiefziehen - Skript.pdf S.6, S.12–13; full.md: Verfahrensfenster für die Niederhalterkraft/Der Tiefziehvorgang Phase 1"]
["Wann ist hydromechanisches Tiefziehen sinnvoll?","Frage (DE)：Wann ist hydromechanisches Tiefziehen sinnvoll?\nAntwort (DE)：Hydromechanisches Tiefziehen: für komplizierte Formen/schwierige Materialnachführung. Öl/Wirkmedium stützt Blech und verteilt Druck; beta bis ca. 2,4. Voraussetzung: Abdichtung; Nachteil Anlagen-/Dichtaufwand.\n中文题目：什么时候适合使用液压辅助深拉？\n中文答案：液压辅助深拉适用于复杂形状或材料补流困难的零件。油/作用介质支撑板料并分布压力；beta 可到约 2.4。前提是密封；缺点是设备和密封成本高。\n出处：Garber_2026_01_15.txt; 14 - Tiefziehen - Skript.pdf S.20; full.md: Hydromechanisches Tiefziehen"]
["Skizzieren und beschreiben Sie eine Fließkurve und geben Sie die Näherungsformel an.","Frage (DE)：Skizzieren und beschreiben Sie eine Fließkurve und geben Sie die Näherungsformel an.\nAntwort (DE)：Fließkurve: k_f über phi_h, bei Kaltumformung steigend wegen Verfestigung; Start etwa Re. Näherung: k_f=k_f1*phi^n. Für Arbeit oft k_fm=(k_f0+k_fe)/2.\n中文题目：画出、描述冷成形流动曲线，并写出近似公式。\n中文答案：流动曲线：纵轴 k_f，横轴 phi_h；冷成形时因加工硬化而上升，起点约在 Re。近似公式：k_f=k_f1·phi^n。计算功时常用 k_fm=(k_f0+k_fe)/2。\n出处：Garber_2026_01_15.txt; 11 - Grundlagen Umformen - Skript.pdf S.12–14; full.md: Kaltumformung/Rechnen mit der Fließspannung/Warmumformung"]
["Wie berechnen Sie die Umformarbeit (Energie) aus spezifischer Umformarbeit? Achten Sie auf Einheiten.","Frage (DE)：Wie berechnen Sie die Umformarbeit (Energie) aus spezifischer Umformarbeit? Achten Sie auf Einheiten.\nAntwort (DE)：- W = w_d · V\n- N/mm² · mm³ = N·mm → J (1 N·mm = 10⁻³ J)\n- ggf. Wirkungsgrad: W_real = W/η.\n中文题目：如何用比成形功 w_d 计算成形能量？注意单位。\n中文答案：用比成形功 wd：W=wd·V。也可用理想公式：Wid=V·kfm·φ。若有效率 η：Wreal=Wid/η 或 W/η。单位：wd 或 kf 为 N/mm²，V 为 mm³，因此为 N·mm；1 N·mm=10^-3 J。\n出处：Garber_2026_01_15.txt; 11 - Grundlagen Umformen - Skript.pdf S.22–23, S.26; Formelblatt Fertigungstechnik.pdf S.1; full.md: Umformkraft und Umformarbeit/Spezifische Umformarbeit"]
["Nennen Sie Maßnahmen zur Verringerung der Zunderbildung beim Schmieden.","Frage (DE)：Nennen Sie Maßnahmen zur Verringerung der Zunderbildung beim Schmieden.\nAntwort (DE)：- kurze Warmzeiten (z.B. induktiv)\n- geringere Umformtemperaturen (begrenzt)\n- Beschichtung der Rohlinge vor dem Erwärmen\n- Schutzgas (aufwändig, selten).\n中文题目：列举减少锻造氧化皮形成的措施。\n中文答案：减少氧化皮：缩短加热时间/采用感应加热；尽可能降低温度；对毛坯涂层；使用保护气氛。目标：减少氧化、表面缺陷、磨损和材料损失。\n出处：Garber_2026_01_15.txt; 13 - Schmieden - Skript.pdf S.9; full.md: Zunderbildung"]
["Was sind Prägen und Kalibrieren (im Kontext Kaltschmieden) und warum nutzt man sie?","Frage (DE)：Was sind Prägen und Kalibrieren (im Kontext Kaltschmieden) und warum nutzt man sie?\nAntwort (DE)：Prägen: Kaltschmieden kleiner Formänderung für Kontur/Relief/Oberfläche, z.B. Münze. Kalibrieren: kalt maßgenau nachdrücken. Nutzen: Genauigkeit/Oberfläche hoch, keine Zunder/Schwindung; Nachteil hohe Kräfte.\n中文题目：什么是压印 Prägen 和校准 Kalibrieren？为什么使用它们？\n中文答案：压印：小变形冷锻，用于轮廓、浮雕或表面，例如硬币。校准：冷态精确压准尺寸。作用：精度和表面高，没有氧化皮/收缩；缺点是力很高。\n出处：Garber_2026_01_15.txt; 13 - Schmieden - Skript.pdf S.5, S.18, S.22; full.md: Nach Temperatur/Stadienfolge/Randbedingungen und Kostenverteilung"]
["Begründen Sie die Verfahrenswahl „Schmieden + Nachbearbeitung“ vs. „komplett Drehen“.","Frage (DE)：Begründen Sie die Verfahrenswahl „Schmieden + Nachbearbeitung“ vs. „komplett Drehen“.\nAntwort (DE)：Schmieden + Nachbearbeitung: Serie, hohe Festigkeit/dynamische Last; Faserverlauf günstig, Materialverlust/Spanvolumen/Zeit klein. Nachteile: Gesenk/Presse/Rüstkosten. Komplett Drehen: flexibel für Einzelteile, aber mehr Späne, längere Zeit, Faser unterbrochen.\n中文题目：说明为什么选择“锻造+后加工”或“完全车削”。\n中文答案：锻造 + 后加工：适合批量、高强度/动态载荷；纤维流线有利，材料损失、切屑体积和时间小。缺点：模具、压力机和换装成本高。完全车削：适合单件，灵活，但切屑多、时间长、纤维被切断。\n出处：Garber_2026_01_15.txt; FT 1 -  Einführung - Skript.pdf S.16–17; 13 - Schmieden - Skript.pdf S.20–22; full.md: Kriterien bei der Verfahrensauswahl/Faserverlauf/Charakteristika des Schmiedens"]
["Nennen Sie Formen der Fertigungsorganisation.","Frage (DE)：Nennen Sie Formen der Fertigungsorganisation.\nAntwort (DE)：Werkstattfertigung; Fließfertigung; Fertigungssegmentierung/Fertigungsraum; Fertigungsinsel.\n中文题目：列出生产组织形式。\n中文答案：车间式生产；流水线生产；生产分段/生产区域；生产岛。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Werkstattfertigung vs. Fließfertigung?","Frage (DE)：Werkstattfertigung vs. Fließfertigung?\nAntwort (DE)：Werkstattfertigung: flexibel, aber viele Transporte/Zwischenlager. Fließfertigung: schnell und kostengünstig, aber unflexibel.\n中文题目：比较车间式生产和流水线生产。\n中文答案：车间式生产灵活，但运输和中间库存多。流水线生产快、成本低，但不灵活。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Was ist eine Fertigungsinsel?","Frage (DE)：Was ist eine Fertigungsinsel?\nAntwort (DE)：Kleine selbständige Einheit; mehrere Verfahren/Maschinen vor Ort; wenig Transport; Mitarbeiter flexibel und selbstorganisiert.\n中文题目：什么是生产岛？\n中文答案：小型自主生产单元；多种工艺/机器集中在现场；运输少；员工灵活并自组织。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Vorteil einer Fertigungsinsel?","Frage (DE)：Vorteil einer Fertigungsinsel?\nAntwort (DE)：Flexibler bei neuen Produkten/Varianten; kürzere Wege; weniger Logistik.\n中文题目：生产岛有什么优点？\n中文答案：面对新产品或变型更灵活；路径更短；物流更少。\n出处：Fertigungsorganisation - Zusatzkarte."]
["Problem der variantenreichen Serienproduktion?","Frage (DE)：Problem der variantenreichen Serienproduktion?\nAntwort (DE)：Unterschiedliche Bauteile müssen optimal durch die Fertigung geschleust werden; Ziel: maximale Produktivität und Auslastung.\n中文题目：多品种系列生产的问题是什么？\n中文答案：不同零件必须以最优方式通过生产流程；目标是最大化生产率和设备/人员利用率。\n出处：Fertigungsorganisation - Zusatzkarte."]
</script>

  <script>
    const STORAGE_KEY = "garber1-progress-v2";
    const REMOVED_LEGACY_NUMBERS = [18, 19, 21, 124, 182, 196, 211, 213, 221];
    const QUIZ_SIZE = 20;
    const STUDY_MODES = {
      sequence: "顺序刷题",
      shuffle: "乱序刷题",
      quiz: "20题测验",
      wrong: "错题库"
    };
    const VALID_CHOICES = new Set(["unknown", "unsure", "known"]);
    const raw = document.getElementById("sourceData").textContent.trim();

    const state = {
      cards: parseDeck(raw),
      order: [],
      index: 0,
      flipped: false,
      pendingChoice: null,
      mode: "sequence",
      lang: "both",
      progress: loadProgress(),
      query: ""
    };

    const el = {
      deckCount: document.getElementById("deckCount"),
      counter: document.getElementById("counter"),
      progressBar: document.getElementById("progressBar"),
      cardInner: document.getElementById("cardInner"),
      questionDe: document.getElementById("questionDe"),
      questionZh: document.getElementById("questionZh"),
      answerGrid: document.getElementById("answerGrid"),
      frontStatus: document.getElementById("frontStatus"),
      backStatus: document.getElementById("backStatus"),
      frontTag: document.getElementById("frontTag"),
      backTag: document.getElementById("backTag"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      answerNextBtn: document.getElementById("answerNextBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      resetBtn: document.getElementById("resetBtn"),
      searchInput: document.getElementById("searchInput"),
      cardList: document.getElementById("cardList"),
      visibleCount: document.getElementById("visibleCount"),
      statSeen: document.getElementById("statSeen"),
      statGood: document.getElementById("statGood"),
      statAgain: document.getElementById("statAgain"),
      statLeft: document.getElementById("statLeft")
    };

    state.order = buildOrder(state.mode);
    bindEvents();
    render();

    function parseDeck(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map((line, index) => {
          const pair = parsePair(line, index);
          const sections = splitSections(pair[1] || "");
          const extras = Object.entries(sections)
            .filter(([key]) => !["Frage (DE)", "Antwort (DE)", "中文题目", "中文答案", "出处", "????", "??"].includes(key))
            .map(([key, value]) => ({ label: key, value }));

          const legacyNumber = legacyCardNumber(index);

          return {
            id: `card-${legacyNumber}`,
            number: legacyNumber,
            deckIndex: index + 1,
            front: pretty(pair[0] || ""),
            questionDe: pretty(sections["Frage (DE)"] || pair[0] || ""),
            answerDe: pretty(sections["Antwort (DE)"] || ""),
            questionZh: pretty(sections["中文题目"] || sections["????"] || ""),
            answerZh: pretty(sections["中文答案"] || sections["????"] || ""),
            source: pretty(sections["出处"] || sections["??"] || ""),
            extras: extras.map(extra => ({ label: extra.label, value: pretty(extra.value) })),
            family: inferFamily(pair[0] || pair[1] || "")
          };
        });
    }

    function parsePair(line, index) {
      try {
        return JSON.parse(line);
      } catch (jsonError) {
        const loose = line.match(/^\["([\s\S]*?)",\s*"([\s\S]*)"\]$/);
        if (loose) {
          return [decodeLooseString(loose[1]), decodeLooseString(loose[2])];
        }
        console.error("??????", index + 1, jsonError, line);
        return [`Karte ${index + 1}`, line];
      }
    }

    function decodeLooseString(value) {
      return String(value)
        .replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
        .replace(/\\n/g, "\n")
        .replace(/\\r/g, "\r")
        .replace(/\\"/g, "\"");
    }

    function legacyCardNumber(index) {
      let number = index + 1;
      REMOVED_LEGACY_NUMBERS.forEach(removed => {
        if (number >= removed) number += 1;
      });
      return number;
    }

    function splitSections(text) {
      const sections = {};
      let current = "";
      text.replace(/\\n/g, "\n").split(/\r?\n/).forEach(rawLine => {
        const line = rawLine.trim();
        if (!line) return;
        const match = line.match(/^(.+?)[\uFF1A:](.*)$/u);
        if (match && isSectionLabel(match[1].trim())) {
          current = match[1].trim();
          sections[current] = match[2].trim();
        } else if (current) {
          sections[current] += `\n${line}`;
        }
      });
      return sections;
    }

    function isSectionLabel(label) {
      return [
        "Frage (DE)",
        "Antwort (DE)",
        "中文题目",
        "中文答案",
        "出处",
        "Prüfungshinweis (txt)",
        "Hinweis (DE)",
        "Typische Beispiele (DE)",
        "Zahlen (DE, aus Folie)"
      ].includes(label);
    }

    function inferFamily(text) {
      if (/Honen|Honahle|Honleisten|Honsteine|Kreuzschliff|Ziehschleifen/i.test(text)) {
        return "FT9";
      }
      if (/Schleifen|Schleif|Schleifscheibe|Schleifbrand|Ausfeuern|Innenrund|Planschleifen|Korn|Korund|CBN|Diamant|Poren|Härtegrad/i.test(text)) {
        return "FT8";
      }
      if (/Tiefziehen|Niederhalter|Ziehverh|Ziehkraft|Bodenrei|Faltenbildung/i.test(text)) {
        return "FT14";
      }
      if (/Schmieden|Gesenkschmieden|Prägen|Presskraft|Grat/i.test(text)) {
        return "FT13";
      }
      if (/Fließpressen|Umformgrad|Umformkraft|Umformarbeit|Fließspannung/i.test(text)) {
        return "FT12";
      }
      if (/Umformen|umformende|Serienfertigung|Werkstoffzusammenhalt|Umformverfahren/i.test(text)) {
        return "FT11";
      }
      if (/Schruppen|Schlichten|Fräsen|Bahnabstand|CAM|Simulation|Kugel|Torusfräser/i.test(text)) {
        return "FT5";
      }
      if (/Bohren|Bohr|Aufbohren|Vollbohren|Senken|Reiben|Spiralbohrer|Wendeplattenbohrer|Spitzenwinkel|Spannut|Querschneide|Punch|Tap|Werkzeugaufnahme|Schrumpffutter|Dehnspann|Spannschraube|Zahnvorschub/i.test(text)) {
        return "FT4";
      }
      if (/Dreh|Rohling|Längs|Plandrehen|Rillentiefe|Schneidenradius|Hauptzeit|Kienzle|Schnittkraft|Drehmoment|Zustell|Vorschublänge|Eilgang/i.test(text)) {
        return "FT3";
      }
      if (/Scher|Span|Schneid|Werkzeug|Keil|Schnittgeschwindigkeit|Rauheit|Ra|Rz|Zerspan|Verschleiß|Aufbau|Diffusion|Kolk|VB|SV|KT|KM|α|β|γ/i.test(text)) {
        return "FT2";
      }
      return "FT1";
    }

    function pretty(text) {
      return String(text)
        .replace(/\\\((.*?)\\\)/g, "$1")
        .replace(/[^\S\r\n]+/g, " ")
        .replace(/[ \t]*\n[ \t]*/g, "\n")
        .trim();
    }

    function bindEvents() {
      el.prevBtn.addEventListener("click", () => move(-1));
      el.nextBtn.addEventListener("click", () => move(1));
      el.answerNextBtn.addEventListener("click", advanceAfterAnswer);
      el.shuffleBtn.addEventListener("click", restartCurrentMode);
