<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Garber1</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #1f2523;
      --muted: #68746f;
      --line: #dce3df;
      --green: #26735c;
      --green-strong: #145f49;
      --amber: #b76b12;
      --red: #b2473a;
      --blue: #2f6f9f;
      --shadow: 0 24px 70px rgba(31, 37, 35, .10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .55), rgba(255, 255, 255, 0) 36%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: var(--radius);
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, color .16s ease;
    }

    button:hover {
      border-color: #aebbb5;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    button.primary:hover {
      background: var(--green-strong);
      border-color: var(--green-strong);
    }

    button.icon {
      width: 42px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 19px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245, 247, 246, .92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: #e8f0ec;
      border: 1px solid #cedbd5;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .mark svg {
      width: 34px;
      height: 34px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      height: 40px;
    }

    .segmented button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      padding: 0 12px;
      color: var(--muted);
      background: transparent;
    }

    .segmented button.active {
      background: #e5eee9;
      color: var(--green-strong);
    }

    .layout {
      width: min(1180px, calc(100% - 32px));
      margin: 26px auto 36px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 22px;
      align-items: start;
    }

    .study {
      display: grid;
      gap: 16px;
    }

    .progress-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: #e0e7e3;
      overflow: hidden;
      border: 1px solid #d4ddd8;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), #2f6f9f);
      transition: width .22s ease;
    }

    .counter {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .card-inner {
      position: relative;
    }

    .face {
      position: relative;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .face.back {
      display: none;
    }

    .card-inner:not(.flipped) .back,
    .card-inner.flipped .front {
      display: none;
      pointer-events: none;
    }

    .card-inner.flipped .back {
      display: flex;
      pointer-events: auto;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #edf4f0;
      color: var(--green-strong);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      text-align: right;
    }

    .card-body {
      flex: 1;
      display: grid;
      grid-template-rows: auto;
      gap: 18px;
      padding: 28px;
    }

    .question {
      display: grid;
      align-content: center;
      gap: 18px;
      min-height: clamp(150px, 28vh, 260px);
    }

    .question h2 {
      margin: 0;
      font-size: clamp(24px, 4.2vw, 42px);
      line-height: 1.16;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .question .zh {
      color: var(--muted);
      font-size: 20px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .answer-grid {
      display: grid;
      gap: 16px;
    }

    .section {
      border-left: 4px solid #cbd9d2;
      padding: 1px 0 1px 14px;
    }

    .section.answer-de {
      border-color: var(--green);
    }

    .section.answer-zh {
      border-color: var(--blue);
    }

    .section.extra {
      border-color: var(--amber);
    }

    .label {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .section p {
      margin: 0;
      font-size: 17px;
      line-height: 1.62;
      overflow-wrap: anywhere;
    }

    .section p br,
    .zh br {
      content: "";
      display: block;
      margin-top: 6px;
    }

    .math-var {
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      font-style: italic;
      white-space: nowrap;
    }

    .math-var sub,
    .math-var sup,
    .section sup,
    .question sup,
    .zh sup {
      line-height: 0;
    }

    .math-sqrt {
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      white-space: nowrap;
    }

    .source {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 2px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .answer-actions {
      display: flex;
      justify-content: center;
    }

    .answer-actions button {
      min-width: 160px;
    }

    .self-check {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .self-check button {
      min-width: 0;
      min-height: 48px;
      padding-inline: 10px;
      font-weight: 750;
    }

    .choice-unknown {
      color: #fff;
      background: var(--red);
      border-color: var(--red);
    }

    .choice-unsure {
      color: #fff;
      background: #202523;
      border-color: #202523;
    }

    .choice-known {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .mode-switch button.active {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    .side {
      display: grid;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 12px 40px rgba(31, 37, 35, .06);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 40px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    .search:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(38, 115, 92, .14);
    }

    .list {
      max-height: 506px;
      overflow: auto;
      padding: 8px;
    }

    .list-item {
      width: 100%;
      display: grid;
      gap: 6px;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius);
      padding: 10px;
      min-height: auto;
    }

    .list-item:hover,
    .list-item.active {
      transform: none;
      background: #f2f6f4;
      border-color: #d4ddd8;
    }

    .list-title {
      color: var(--ink);
      font-size: 14px;
      line-height: 1.32;
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    .list-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 14px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fbfcfb;
    }

    .stat strong {
      display: block;
      font-size: 23px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 940px) {
      .topbar-inner {
        min-height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .list {
        max-height: 280px;
      }
    }

    @media (max-width: 620px) {
      .topbar-inner,
      .layout {
        width: min(100% - 20px, 1180px);
      }

      .toolbar,
      .segmented {
        width: 100%;
      }

      .segmented button {
        flex: 1;
        padding-inline: 8px;
      }

      .progress-row,
      .controls {
        grid-template-columns: 1fr;
      }

      .card-body {
        padding: 20px;
      }

      .question {
        min-height: 150px;
      }

      .question h2 {
        font-size: 28px;
      }

      .question .zh {
        font-size: 18px;
      }

      .self-check,
      .mode-switch {
        grid-template-columns: 1fr;
      }
    }

    @media (max-height: 560px) {
      .topbar,
      .progress-row {
        display: none;
      }

      .layout {
        margin-top: 0;
        margin-bottom: 16px;
      }

      .card-head {
        padding: 10px 20px;
      }

      .card-body {
        gap: 12px;
        padding: 14px 24px;
      }

      .question {
        gap: 12px;
        min-height: 120px;
      }

      .question h2 {
        font-size: clamp(24px, 3.7vw, 38px);
        line-height: 1.12;
      }

      .question .zh {
        font-size: 18px;
      }

      .answer-grid {
        gap: 10px;
      }

      .section p {
        font-size: 15px;
        line-height: 1.45;
      }

      .source {
        font-size: 12px;
        padding-top: 8px;
      }

      .face.front .controls {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" fill="none" role="img">
              <path d="M10 45h44" stroke="#145f49" stroke-width="3" stroke-linecap="round"/>
              <path d="M17 43l20-23 9 23H17z" fill="#d9e8e1" stroke="#145f49" stroke-width="3" stroke-linejoin="round"/>
              <path d="M37 20c8 4 13 9 15 16" stroke="#2f6f9f" stroke-width="3" stroke-linecap="round"/>
              <path d="M24 43l13-23" stroke="#b76b12" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h1>Garber1</h1>
            <p class="subtitle"><span id="deckCount">0</span> 张 Fertigungstechnik 复习卡</p>
          </div>
        </div>
        <div class="toolbar">
          <div class="segmented" aria-label="语言">
            <button data-lang="de">DE</button>
            <button data-lang="zh">中文</button>
            <button data-lang="both" class="active">双语</button>
          </div>
          <button id="shuffleBtn" class="icon" type="button" title="重开当前模式" aria-label="重开当前模式">↻</button>
          <button id="resetBtn" class="icon" type="button" title="重置进度" aria-label="重置进度">×</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="study" aria-live="polite">
        <div class="progress-row">
          <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
          <div class="counter" id="counter">1 / 1</div>
        </div>

        <div class="flashcard">
          <div class="card-inner" id="cardInner">
            <article class="face front">
              <div class="card-head">
                <span class="pill" id="frontTag">Frage</span>
                <span class="status" id="frontStatus">未复习</span>
              </div>
              <div class="card-body">
                <div class="question">
                  <h2 id="questionDe"></h2>
                  <div class="zh" id="questionZh"></div>
                </div>
                <div class="self-check">
                  <button class="choice-unknown" data-choice="unknown" type="button">不知道</button>
                  <button class="choice-unsure" data-choice="unsure" type="button">不熟练</button>
                  <button class="choice-known" data-choice="known" type="button">知道</button>
                </div>
                <div class="controls">
                  <button id="prevBtn" class="icon" type="button" title="上一张" aria-label="上一张">←</button>
                  <button id="nextBtn" class="icon" type="button" title="下一张" aria-label="下一张">→</button>
                </div>
              </div>
            </article>

            <article class="face back">
              <div class="card-head">
                <span class="pill" id="backTag">Antwort</span>
                <span class="status" id="backStatus">未复习</span>
              </div>
              <div class="card-body">
                <div class="answer-grid" id="answerGrid"></div>
                <div class="answer-actions">
                  <button id="answerNextBtn" class="primary" type="button">下一题</button>
                </div>
              </div>
            </article>
          </div>
        </div>
      </section>

      <aside class="side">
        <section class="panel">
          <div class="panel-head">
            <h2>卡片</h2>
            <span class="counter" id="visibleCount">0</span>
          </div>
          <div class="mode-switch">
            <button data-mode="sequence" class="active" type="button">顺序刷题</button>
            <button data-mode="shuffle" type="button">乱序刷题</button>
            <button data-mode="quiz" type="button">20题测验</button>
            <button data-mode="wrong" type="button">错题库</button>
          </div>
          <div style="padding: 14px; border-bottom: 1px solid var(--line);">
            <input id="searchInput" class="search" type="search" placeholder="搜索题目、答案、出处">
          </div>
          <div class="list" id="cardList"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>进度</h2>
          </div>
          <div class="stats">
            <div class="stat"><strong id="statSeen">0</strong><span>已看过</span></div>
            <div class="stat"><strong id="statGood">0</strong><span>知道</span></div>
            <div class="stat"><strong id="statAgain">0</strong><span>错题库</span></div>
            <div class="stat"><strong id="statLeft">0</strong><span>未完成</span></div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script id="sourceData" type="text/plain">
["Nennen Sie die 6 Hauptgruppen der Fertigungsverfahren nach DIN 8580.","Frage (DE)：Nennen Sie die 6 Hauptgruppen der Fertigungsverfahren nach DIN 8580.\nAntwort (DE)：Urformen; Umformen; Trennen; Fügen; Beschichten; Stoffeigenschaften ändern.\n中文题目：请写出 DIN 8580 的六大制造主组。\n中文答案：原始成形；成形；分离、去除；连接；涂覆；改变材料性能。\n出处：FT 1 -  Einführung - Skript.pdf S.4; Prüfungsinhalt.pdf S.1 (Nicht in Prüfung); full.md (Abschnitt: Einteilung DIN 8580, Seitenzahl im md nicht relevant); Garber_2025_10_02.txt (Prüfungshinweise)"]
["Erklären Sie kurz den Unterschied zwischen Urformen, Umformen und Trennen.","Frage (DE)：Erklären Sie kurz den Unterschied zwischen Urformen, Umformen und Trennen.\nAntwort (DE)：Urformen: formloser Stoff → Werkstück, Stoffzusammenhalt entsteht. Umformen: plastische Formänderung, Masse und Stoffzusammenhalt bleiben. Trennen: Stoffzusammenhalt örtlich aufgehoben, Späne/Teilchen abgetrennt → Masse sinkt.\n中文题目：简述 Urformen、Umformen、Trennen 的区别。\n中文答案：原始成形：无定形材料变成工件，材料结合被建立。成形：塑性改变形状，质量和材料结合保持。分离：局部破坏材料结合，切屑或颗粒被分离，质量减少。\n出处：FT 1 -  Einführung - Skript.pdf S.5–7; full.md (Abschnitte: Urformen, Umformen und Trennen); Garber_2025_10_02.txt (Einführung)"]
["Nennen Sie die Untergruppen des Umformens nach Art der Spannungseinwirkung und je ein Beispiel.","Frage (DE)：Nennen Sie die Untergruppen des Umformens nach Art der Spannungseinwirkung und je ein Beispiel.\nAntwort (DE)：Druckumformen (Walzen); Zugdruckumformen (Tiefziehen); Zugumformen (Längen); Biegeumformen (Abkanten); Schubumformen (Verdrehen, Feder winden).\n中文题目：按“应力方式”列出 Umformen 的子类并各给一例。\n中文答案：压缩成形（轧制）；拉压复合成形（深拉）；拉伸成形（拉长）；弯曲成形（折弯）；剪切、扭转成形（扭转、绕制弹簧）。\n出处：FT 1 -  Einführung - Skript.pdf S.6; full.md (Abschnitt: Umformen – Spannungseinwirkung)"]
["Nennen Sie wichtige Untergruppen der Hauptgruppe „Trennen“ nach DIN 8580.","Frage (DE)：Nennen Sie wichtige Untergruppen der Hauptgruppe „Trennen“ nach DIN 8580.\nAntwort (DE)：Zerteilen; Spanen (geom. bestimmte / unbestimmte Schneide); Abtragen; Zerlegen; Reinigen; Evakuieren.\n中文题目：列出 DIN 8580 中 Trennen 的重要子分组。\n中文答案：分割；几何确定刃切削；几何不确定刃切削；去除；拆解；清洗；抽空。\n出处：FT 1 -  Einführung - Skript.pdf S.7 (Definition+Untergruppen) und S.4 (Übersicht); full.md (Abschnitt: Trennen – Untergruppen)"]
["Nennen Sie die Kriteriengruppen bei der Verfahrensauswahl (nach Westkämper und Warnecke).","Frage (DE)：Nennen Sie die Kriteriengruppen bei der Verfahrensauswahl (nach Westkämper und Warnecke).\nAntwort (DE)：produktbezogen; verfahrensbezogen; wirtschaftlich; umwelttechnisch & sozial.\n中文题目：按 Westkämper und Warnecke，工艺选择的 kriteriy 分哪四大类？\n中文答案：产品相关；工艺相关；经济性；环境与社会。例子：材料和质量要求；材料、能量消耗；投资和摊销；劳动安全和环保。\n出处：FT 1 -  Einführung - Skript.pdf S.12; full.md (Abschnitt: Kriterien bei der Verfahrensauswahl)"]
["Begründen Sie: Warum hängt die Verfahrenswahl stark von der Stückzahl ab?","Frage (DE)：Begründen Sie: Warum hängt die Verfahrenswahl stark von der Stückzahl ab?\nAntwort (DE)：Bei Serien amortisieren sich teure Werkzeuge/Formen/Automatisierung → Stückkosten sinken. Bei Einzelteilen sind flexible Verfahren mit geringen Rüstkosten günstiger.\n中文题目：解释：为什么“产量、件数”会强烈影响工艺选择？\n中文答案：大批量时，昂贵模具、专用工具和自动化可通过数量摊薄，单位成本下降。单件或小批量时，更适合灵活、低模具和低换装成本的工艺。\n出处：FT 1 -  Einführung - Skript.pdf S.12 (wirtschaftlich: Investition und Amortisation und Stückleistung); full.md (Kriterien Verfahrensauswahl); Garber_2025_10_02.txt (Beispiele/Einordnung, keine feste Page)"]
["Warum ist die Werkstoffausnutzung bei spanenden Verfahren oft schlechter als bei Urformen und Umformen?","Frage (DE)：Warum ist die Werkstoffausnutzung bei spanenden Verfahren oft schlechter als bei Urformen und Umformen?\nAntwort (DE)：Spanen trennt Material als Späne ab → Masseverlust und oft nur 40-50% Werkstoffausnutzung; Ur-/Umformen erzeugen Form näher am Endteil.\n中文题目：为什么切削（Spanen）往往比 Urformen und Umformen 的材料利用率更差？\n中文答案：切削会产生切屑和去除量，导致质量损失；材料利用率通常只有约40–50%，单位质量能耗也较高。参考值：铸造约90%，烧结约95%，流压约85%。\n出处：FT 1 -  Einführung - Skript.pdf S.13 (Werkstoffausnutzung und Energiebedarf); full.md (Energie- und Ressourceneffizienz)"]
["Welche Tendenz gilt allgemein: Umformen vs spanende Verfahren hinsichtlich Genauigkeit (ISO-IT)?","Frage (DE)：Welche Tendenz gilt allgemein: Umformen vs spanende Verfahren hinsichtlich Genauigkeit (ISO-IT)?\nAntwort (DE)：Spanen meist genauer: kleinere IT-Werte; Umformen tendenziell gröber, wird durch Kalibrieren/Nachbearbeitung besser. Schleifen besonders genau.\n中文题目：一般趋势：Umformen 与 Spanen 在精度（ISO-IT）上如何比较？\n中文答案：IT 数值越小，精度越高。切削加工通常比成形能达到更小的 IT；磨削尤其精密。成形可通过特殊措施提高精度。\n出处：FT 1 -  Einführung - Skript.pdf S.14–15 (ISO-Toleranzen, erreichbare IT); full.md (ISO-Toleranzen)"]
["Was bedeuten die Rauheitskennwerte Ra und Rz?","Frage (DE)：Was bedeuten die Rauheitskennwerte Ra und Rz?\nAntwort (DE)：Ra = arithm. Mittelwert der Profilordinaten; Rz = gemittelte Rautiefe (mittlere Höhe über mehrere Einzelmessstrecken).\n中文题目：Ra 与 Rz 各表示什么？\n中文答案：Ra 是轮廓偏差绝对值的算术平均值。Rz 是平均粗糙深度，即峰谷高度差的平均值；Rz 对峰和谷更敏感。\n出处：FT 1 -  Einführung - Skript.pdf S.16 (DIN EN ISO 4287); full.md (Rauheitskenngrößen); ft1_p17.png (Grafik/Beispiele, falls genutzt)"]
["Was ist die Scherzone und Scherebene und was bedeutet „Spanstauchung (h1 > h)“?","Frage (DE)：Was ist die Scherzone und Scherebene und was bedeutet „Spanstauchung (h1 > h)“?\nAntwort (DE)：In der Scherzone wird Material plastisch abgeschert/umgeformt; Spanstauchung: Span wird dicker → mehr Umformarbeit/Energie nötig.\n中文题目：什么是剪切区、剪切面？“切屑压缩（h1>h）”意味着什么？\n中文答案：剪切区、剪切面是刀刃前材料发生塑性剪切的区域。切屑压缩指切屑厚度大于未切削层厚度 h1>h；压缩越大，变形功、能量和热越多。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.4; full.md (Spanbildung und Spanstauchung)"]
["Es gilt α + β + γ = 90°. Gegeben: α = 10°, β = 70°. Berechnen Sie γ.","Frage (DE)：Es gilt α + β + γ = 90°. Gegeben: α = 10°, β = 70°. Berechnen Sie γ.\nAntwort (DE)：γ = 90° − 10° − 70° = 10°.\n中文题目：已知 α+β+γ=90°，α=10°、β=70°，求 γ。\n中文答案：γ=90°−α−β=90°−10°−70°=10°。关系 α+β+γ=90° 在负前角时也成立。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.4–5 (α+β+γ=90°); full.md (Definitionen Schneidkeil); Garber_2025_10_02.txt (Hinweis: auch bei negativem γ gilt die Beziehung)"]
["Skizzieren Sie den Schneidkeil in der Keilmessebene und beschriften Sie: Spanfläche, Freifläche, α, β, γ.","Frage (DE)：Skizzieren Sie den Schneidkeil in der Keilmessebene und beschriften Sie: Spanfläche, Freifläche, α, β, γ.\nAntwort (DE)：In der Keilmessebene: Spanfläche = Span läuft ab; Freifläche = zur erzeugten Schnittfläche. α = Freiwinkel, β = Keilwinkel, γ = Spanwinkel; α+β+γ=90°.\n中文题目：在 Keilmessebene 画出刀具楔形，并标注：Spanfläche、Freifläche、α、β、γ。\n中文答案：在楔形测量平面中：前刀面是切屑流过的面；后刀面朝向已加工表面。α 为后角，β 为楔角，γ 为前角；α+β+γ=90°。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.5 (Winkel) und S.7 (Flächendefinitionen); full.md (Schneidkeil und Flächen); Garber_2025_10_02.txt (häufige Fehler bei Beschriftung)"]
["Wie ist der Spanwinkel γ richtig definiert (häufiger Fehler)?","Frage (DE)：Wie ist der Spanwinkel γ richtig definiert (häufiger Fehler)?\nAntwort (DE)：γ ist der Winkel zwischen Spanfläche des Werkzeugs und der Senkrechten/Normalen in der Keilmessebene; nicht zwischen Spanfläche und Span.\n中文题目：γ（前角）的正确定义是什么（常见错误点）？\n中文答案：γ 是楔形测量平面中前刀面与法线之间的角，不是前刀面与切屑本身的角。前刀面和后刀面都是刀具表面。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.5 (Definitionen) und S.7 (Spanfläche=Werkzeugfläche); full.md (Spanwinkel); Garber_2025_10_02.txt (Dozent nennt den typischen Fehler explizit)"]
["Skizzieren Sie einen Schneidkeil mit negativem Spanwinkel (γ < 0) und nennen Sie die Wirkung.","Frage (DE)：Skizzieren Sie einen Schneidkeil mit negativem Spanwinkel (γ < 0) und nennen Sie die Wirkung.\nAntwort (DE)：γ < 0: Spanfläche zurückgeneigt; Schneidkeil stabiler. Wirkung: höhere Kräfte/Wärme/Leistung, gut für Schruppen/unterbrochenen Schnitt, Oberfläche schlechter.\n中文题目：画出 γ<0 的负前角刀具楔形，并说明影响。\n中文答案：γ<0 表示前刀面相对法线向后倾；仍满足 α+β+γ=90°。作用：刀楔更稳定，适合粗加工和裂断切屑；缺点是切削力、功率和热增加。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.11 (kleiner oder negativer Spanwinkel) und S.9 (Reißspan-Bedingungen); full.md (Wahl der Keilwinkel); Garber_2025_10_02.txt (Skizze zu γ<0 wird betont)"]
["Begründen Sie den Zielkonflikt: großer Spanwinkel vs kleiner oder negativer Spanwinkel.","Frage (DE)：Begründen Sie den Zielkonflikt: großer Spanwinkel vs kleiner oder negativer Spanwinkel.\nAntwort (DE)：Großer γ: geringere Kräfte, Fließspan/gute Oberfläche, aber schwächerer Keil/Verschleiß. Kleiner/negativer γ: stabiler Keil, aber höhere Kräfte/Wärme und rauere Oberfläche.\n中文题目：解释：大前角 vs 小前角或负前角的矛盾权衡。\n中文答案：大前角有利于流屑、好表面和低切削力，但刀楔变弱且散热较差。小前角或负前角使刀楔更稳、寿命更高，但力和热更大，表面更容易粗糙。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.11 (Wahl der Keilwinkel) sowie S.9–10 (Spanformen und Oberfläche); full.md (Wahl der Keilwinkel)"]
["Nennen Sie Werkzeugebene, Keilmessebene und Arbeitsebene und was man darin betrachtet.","Frage (DE)：Nennen Sie Werkzeugebene, Keilmessebene und Arbeitsebene und was man darin betrachtet.\nAntwort (DE)：Werkzeugebene: Blick von oben, senkrecht zur Schnittrichtung. Keilmessebene: Seitenansicht, dort α/β/γ. Arbeitsebene: Schnittrichtung + Vorschubrichtung. Schneidebene: Hauptschneide + Schnittrichtung.\n中文题目：说出 Werkzeugebene、Keilmessebene、Arbeitsebene，并说明各自看什么。\n中文答案：刀具平面用于从上方看刀具，垂直于切削方向。楔形测量平面是侧视图，用来量 α、β、γ。工作平面包含切削方向和进给方向。切削平面包含主切削刃和切削方向。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.8; full.md (Bezugssysteme)"]
["Verfahrenswahl: Schmieden- und Umformen-Kette vs Gießen – welcher Vorteil und Nachteil?","Frage (DE)：Verfahrenswahl: Schmieden- und Umformen-Kette vs Gießen – welcher Vorteil und Nachteil?\nAntwort (DE)：Schmieden/Umformen: bessere Festigkeit/Faserverlauf/Qualität, aber mehr Schritte, Kosten und Termine. Gießen: kürzere Kette, oft billiger/schneller, aber Eigenschaften/Genauigkeit schlechter und Nachbearbeitung nötig.\n中文题目：工艺选择：锻造、成形链 vs 铸造链，各自优缺点？\n中文答案：锻造、成形链通常强度、纤维流线和质量更好，但工序更多，成本和周期更高。铸造流程短，常更便宜更快，但性能和精度可能较差，常需后加工。\n出处：FT 1 -  Einführung - Skript.pdf S.11 (Verfahrenskette-Vergleich) und S.12 (Kriterien); full.md (Verfahrenskette); Garber_2025_10_02.txt (Diskussion Qualität vs Kosten)"]
["Was passiert bei spröden Werkstoffen bzw. bei kleinen oder negativen Spanwinkeln und niedriger Schnittgeschwindigkeit – welche Spanform entsteht typischerweise und welche Oberfläche?","Frage (DE)：Was passiert bei spröden Werkstoffen bzw. bei kleinen oder negativen Spanwinkeln und niedriger Schnittgeschwindigkeit – welche Spanform entsteht typischerweise und welche Oberfläche?\nAntwort (DE)：Typisch Reißspan/Bröckelspan. Bedingungen: spröde Werkstoffe oder zähe Werkstoffe bei niedriger v_c und kleinem/negativem γ. Ergebnis: raue Oberfläche, geringe Umformarbeit und eher geringe Schnittkräfte.\n中文题目：脆性材料或“小前角或负前角 + 低切削速度”时，通常形成哪种切屑？表面如何？\n中文答案：通常形成裂断屑或崩碎屑。条件：脆性材料，或韧性材料在低切速、小前角或负前角下加工。结果：表面粗糙，变形功较小，切削力相对较低。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.9 (Reißspan und Bröckelspan) und S.11 (klein oder negativ γ); full.md (Reißspan); Garber_2025_10_02.txt (Dozent erwähnt spröde Werkstoffe → Bruchspan)"]
["Nennen Sie die drei Spanformen und ordnen Sie typische Merkmale sowie Schnittgeschwindigkeiten zu.","Frage (DE)：Nennen Sie die drei Spanformen und ordnen Sie typische Merkmale sowie Schnittgeschwindigkeiten zu.\nAntwort (DE)：Reiß-/Bröckelspan: niedrige v_c, spröde/kleiner γ, raue Oberfläche. Scher-/Lamellenspan: mittlere v_c, duktil, mittlere Oberfläche. Fließspan: hohe v_c, großer γ, beste Oberfläche, aber lange Späne.\n中文题目：列出三种切屑形态，并说明典型特征与大致切削速度范围。\n中文答案：裂断屑、崩碎屑：低切速、脆性材料或小前角，表面粗糙。剪切屑、层片屑：中等切速、延性材料，表面中等。流屑：高切速、大前角，表面最好，但切屑长。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.9–11；full.md, Abschnitt 2.1 Spanformen；Garber_2025_10_09.txt（老师强调Spanformen为必会点）。"]
["Begründen Sie: Warum begünstigt ein großer Spanwinkel γ Fließspäne und gute Oberflächen?","Frage (DE)：Begründen Sie: Warum begünstigt ein großer Spanwinkel γ Fließspäne und gute Oberflächen?\nAntwort (DE)：Großer γ erleichtert Scherung und Spanablauf, senkt Stauchung/Reibung/Kräfte und begünstigt kontinuierlichen Fließspan; dadurch wird die Oberfläche glatter.\n中文题目：解释：为什么大前角γ更容易形成流屑并获得更好表面？\n中文答案：大前角使剪切和排屑更容易，降低切屑压缩、摩擦和切削力，促进连续流屑，因此表面更光滑。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.11–12；full.md, Abschnitt 2.1 Wahl der Keilwinkel；Garber_2025_10_09.txt（课堂强调γ对Spanform/Oberfläche的影响）。"]
["Skizzieren und benennen Sie: Freiwinkel α, Keilwinkel β, Spanwinkel γ. Welche Beziehung gilt?","Frage (DE)：Skizzieren und benennen Sie: Freiwinkel α, Keilwinkel β, Spanwinkel γ. Welche Beziehung gilt?\nAntwort (DE)：α = Freiwinkel, β = Keilwinkel, γ = Spanwinkel. Beziehung in der Keilmessebene: α + β + γ = 90°.\n中文题目：画、写出后角α、楔角β、前角γ，并给出关系式。\n中文答案：α 是后刀面上的后角；β 是前刀面和后刀面之间的楔角；γ 是前刀面上的前角。关系：α+β+γ=90°。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.6–8；full.md, Abschnitt 2.1 Definitionen des Schneidkeils/Flächen；Garber_2025_10_09.txt（课堂强调角度定义和关系）。"]
["Verfahrenswahl: Für hohe Zerspanleistung (Schruppen) – eher großer oder kleiner oder negativer γ? Begründen.","Frage (DE)：Verfahrenswahl: Für hohe Zerspanleistung (Schruppen) – eher großer oder kleiner oder negativer γ? Begründen.\nAntwort (DE)：Für Schruppen eher kleiner/negativer γ: stabiler Schneidkeil trägt hohe Kräfte. Nachteil: höhere Schnittkräfte/Leistung/Wärme, schlechtere Oberfläche.\n中文题目：工艺选择：为了高去除率粗加工（Schruppen），γ应选大还是小、负？说明理由。\n中文答案：粗加工更适合小前角或负前角：刀楔稳定，可承受较大切削力，寿命较好。缺点是切削力和热更高，表面较差。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.12；full.md, Abschnitt 2.1 Wahl der Keilwinkel；Garber_2025_10_09.txt（课堂强调Schruppen/Schlichten与γ选择）。"]
["Was ist die Zustellbewegung?","Frage (DE)：Was ist die Zustellbewegung?\nAntwort (DE)：- Nebenbewegung; bestimmt die Spandicke (Zustellung)\n中文题目：什么是Zustellbewegung（切入或进刀运动）？\n中文答案：切入运动用于设定切深 a_p，通常垂直于加工表面。车削中 a_p 是径向量，并与进给 f 一起决定切削截面积 A=a_p·f。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.16；full.md, Abschnitt 2.1 Haupt- und Nebenbewegungen；Garber_2025_10_09.txt（课堂讲过运动定义）。"]
["Definieren Sie Freiflächenverschleiß und VB. Nennen Sie typische zulässige VB-Werte beim Drehen.","Frage (DE)：Definieren Sie Freiflächenverschleiß und VB. Nennen Sie typische zulässige VB-Werte beim Drehen.\nAntwort (DE)：Freiflächenverschleiß = Verschleiß an Freifläche/Haupt- und Nebenschneide durch Reibung. VB = Verschleißmarkenbreite. Typische Grenzwerte Drehen: Schruppen groß 1,0–1,5 mm; Schruppen klein 0,8–1,0 mm; Fein 0,1–0,2 mm; Schlichten 0,2–0,3 mm.\n中文题目：定义后刀面磨损和VB，并给出车削时典型允许VB值。\n中文答案：后刀面磨损是后刀面及主、副切削刃附近因摩擦产生的磨损。VB 是磨损带宽。车削典型限值：粗车大工件 1.0–1.5 mm；粗车小工件 0.8–1.0 mm；精加工 0.1–0.2 mm；光车 0.2–0.3 mm。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24；full.md, Abschnitt 2.2 Freiflächenverschleiß；Garber_2025_10_09.txt（课堂强调VB/SV与换刀判据）。"]
["Berechnen Sie den Schneidenversatz: α = 6°, γ = 10°, VB = 0,30 mm.","Frage (DE)：Berechnen Sie den Schneidenversatz: α = 6°, γ = 10°, VB = 0,30 mm.\nAntwort (DE)：SV = VB·tanα /(1−tanα·tanγ) = 0,30·tan6° /(1−tan6°·tan10°) ≈ 0,032 mm. Bewertung immer gegen Toleranz.\n中文题目：计算刀尖后退量：α=6°，γ=10°，VB=0.30 mm。\n中文答案：SV=VB·tanα/(1−tanα·tanγ)=0.30·tan6°/(1−tan6°·tan10°)≈0.032 mm。是否允许要与公差比较。\n出处：Formelblatt Fertigungstechnik.pdf, S.1；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24（SV/VB定义）；full.md, Formelblatt + Abschnitt 2.2 Freiflächenverschleiß；Garber_2025_10_09.txt（课堂推导并强调公式要会）。"]
["Warum ist der Schneidenversatz SV wichtiger als nur VB?","Frage (DE)：Warum ist der Schneidenversatz SV wichtiger als nur VB?\nAntwort (DE)：VB ist sichtbare Verschleißmarke; SV verschiebt die Schneide und verursacht Maß-/Formfehler. Wechselkriterium: SV im Vergleich zur Toleranz.\n中文题目：为什么刀尖后退量SV比只看VB更重要？\n中文答案：VB 只表示可见磨损带；SV 表示有效切削刃位置的偏移。SV 会直接造成尺寸和形状误差，必须与公差比较。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.24；Formelblatt Fertigungstechnik.pdf, S.1；full.md, Abschnitt 2.2 Freiflächenverschleiß；Garber_2025_10_09.txt（课堂强调SV比只看VB更贴近尺寸精度、公差）。"]
["Nennen Sie Bedingungen, Folgen und Gegenmaßnahmen der Aufbauschneidenbildung.","Frage (DE)：Nennen Sie Bedingungen, Folgen und Gegenmaßnahmen der Aufbauschneidenbildung.\nAntwort (DE)：Bedingungen: hoher Druck/Temperatur, mittlere v_c, ungünstige Werkstoffpaarung (z.B. Stahl+HSS). Folgen: Aufschweißung reißt ab, Oberfläche rau, Verschleiß steigt. Gegenmaßnahmen: geeigneter Schneidstoff/Beschichtung, v_c-Bereich vermeiden, KSS, glatte Spanfläche.\n中文题目：列出积屑瘤形成的条件、后果和对策。\n中文答案：条件：高压高温、中等切速、不利材料配对（如钢+HSS）。后果：焊附物反复撕脱，表面粗糙，磨损增加。对策：合适刀具材料和涂层，避开危险切速区，使用 KSS，保持前刀面光滑。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.20；full.md, Abschnitt 2.2 Aufbauschneidenbildung；Garber_2025_10_09.txt（课堂强调中等速度、高温和材料配对）。"]
["Was ist Diffusionsverschleiß und wie kann man ihn reduzieren?","Frage (DE)：Was ist Diffusionsverschleiß und wie kann man ihn reduzieren?\nAntwort (DE)：- bei hohen Temperaturen: Atomaustausch zwischen Schneidstoff und Span → Schneidstoff wird weicher\n- reduzieren: kühlen, vc senken, geeigneten Schneidstoff wählen\n中文题目：什么是扩散磨损？如何降低？\n中文答案：扩散磨损是在高温下刀具材料与工件材料发生原子交换。降低方法：降低温度或切速，选择合适刀具材料和涂层，使用 KSS；金刚石、PKD 加工钢因碳扩散很危险。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.22；full.md, Abschnitt 2.2 Diffusionsverschleiß；Garber_2025_10_09.txt（课堂强调高温、约>1000°C量级和降温对策）。"]
["Nennen Sie Maßnahmen zur Verringerung des Reibungsverschleißes.","Frage (DE)：Nennen Sie Maßnahmen zur Verringerung des Reibungsverschleißes.\nAntwort (DE)：- Schnittgeschwindigkeit reduzieren\n- Kühlschmierstoffe einsetzen (kühlen + schmieren)\n- harte/glatte Beschichtungen\n中文题目：列举降低摩擦磨损的措施。\n中文答案：使用 KSS；采用硬且光滑的涂层；降低 v_c 或温度；选择合适几何形状、前角和良好排屑。目标是降低前刀面和后刀面摩擦。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.19；full.md, Abschnitt 2.2 Reibungsverschleiß + Prüfungsbeispiel；Garber_2025_10_09.txt（课堂强调vc、KSS、Beschichtung）。"]
["Gegeben: KT = 0,12 mm, KM = 0,30 mm. Bestimmen Sie K und beurteilen Sie die Zulässigkeit.","Frage (DE)：Gegeben: KT = 0,12 mm, KM = 0,30 mm. Bestimmen Sie K und beurteilen Sie die Zulässigkeit.\nAntwort (DE)：K = K_T/K_M = 0,12/0,30 = 0,40. Grenzwert meist K≤0,4; daher gerade noch zulässig/Grenzfall.\n中文题目：已知KT=0.12 mm，KM=0.30 mm，求K并判断是否允许。\n中文答案：K=K_T/K_M=0.12/0.30=0.40。常用限值 K≤0.4，因此刚好允许，是边界情况。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.26；Formelblatt Fertigungstechnik.pdf, S.1；full.md, Abschnitt 2.2 Kolkverschleiß；Garber_2025_10_09.txt（课堂强调K=KT/KM和Grenzwert 0,4）。"]
["Nennen Sie typische Ursachen für Absplittern und Bruch der Schneidkante.","Frage (DE)：Nennen Sie typische Ursachen für Absplittern und Bruch der Schneidkante.\nAntwort (DE)：- übermäßige Vibration\n- hoher Verschleiß / Überlast\n- harte Einschlüsse im Werkstoff (z.B. Carbide, Sand)\n中文题目：列举刀刃崩刃、断裂的典型原因。\n中文答案：原因：过载或切削力过高；颤振、振动；磨损过度；硬质夹杂或断续切削；刀具材料选择错误或热冲击。\n出处：FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf, S.23；FT 3 - Drehen - Skript.pdf, S.17；full.md, Abschnitt 2.2 Verformung und Absplittern + Drehen Fehler am Werkzeug；Garber_2025_10_09.txt（课堂讲过断裂、崩刃原因）。"]
["Welche Formel müssen Sie für die Prüfung auswendig können (Kienzle) und welche Größen brauchen Sie dafür?","Frage (DE)：Welche Formel müssen Sie für die Prüfung auswendig können (Kienzle) und welche Größen brauchen Sie dafür?\nAntwort (DE)：Kienzle: F_c = k_c1,1 · b · h_0 · K_v · K_ver · K_γ · K_sch · (h/h_0)^(1−m_c). Ohne Korrekturen K=1. Größen: b, h, h_0=1 mm, k_c1,1, 1−m_c; h=f·sinκ, b=a_p/sinκ.\n中文题目：期末必须背的 Kienzle 公式是哪条？需要哪些量？\n中文答案：Kienzle 公式：F_c=k_c1,1·b·h_0·K_v·K_ver·K_γ·K_sch·(h/h_0)^(1−m_c)。无修正时各 K=1。需要 b、h、h_0=1 mm、k_c1,1、1−m_c；其中 h=f·sinκ，b=a_p/sinκ。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.23–25；full.md：Kienzle 和往届题“vollständige Kienzle-Formel”；Garber_2025_10_16.txt：老师强调 Kienzle 为必须背的考试公式。"]
["Nennen und erklären Sie kurz Fc, Ff, Fp. Warum ist Fp kritisch?","Frage (DE)：Nennen und erklären Sie kurz Fc, Ff, Fp. Warum ist Fp kritisch?\nAntwort (DE)：F_c Schnittkraft: gegen Schnittbewegung, für P_c=F_c·v_c. F_f Vorschubkraft: gegen Vorschub. F_p Passivkraft: seitliches Wegdrücken ohne aktive Bewegung; kritisch für Durchbiegung, Maß- und Formfehler.\n中文题目：列出并解释 Fc、Ff、Fp。为什么 Fp 很关键？\n中文答案：F_c 是切削力，反切削运动方向，用于 P_c=F_c·v_c。F_f 是进给力，反进给方向。F_p 是被动力、径向力，会侧向推开刀具或工件；因会导致挠曲、尺寸和形状误差，所以关键。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.20；FT 3 - Drehen - Skript.pdf S.16（Passivkraft 过大导致工件误差）；full.md：2.6 Zerspankraft。"]
["Wie beeinflusst der Einstellwinkel \\(\\kappa\\) die Passivkraft-Komponente?","Frage (DE)：Wie beeinflusst der Einstellwinkel \\(\\kappa\\) die Passivkraft-Komponente?\nAntwort (DE)：Kleiner κ → größerer F_p-Anteil und mehr seitliche Verformung. Beispiele: κ=90° → F_p=0; κ=60° → F_p=0,5F_N; κ=45° → F_p=0,71F_N.\n中文题目：主偏角 κ 如何影响被动力分量？\n中文答案：κ 越小，F_p 分量越大，侧向变形越明显。例：κ=90° 时 F_p=0；κ=60° 时 F_p=0.5F_N；κ=45° 时 F_p=0.71F_N。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.21–22；full.md：2.6 Zerspankraft und Einstellwinkel。"]
["Leiten und Nennen Sie b, h und A beim Längsdrehen in Abhängigkeit von \\(a_p, f, \\kappa\\).","Frage (DE)：Leiten und Nennen Sie b, h und A beim Längsdrehen in Abhängigkeit von \\(a_p, f, \\kappa\\).\nAntwort (DE)：- (b = a_p/\\sin\\kappa)\n- (h = f\\cdot \\sin\\kappa)\n- (A=b\\cdot h = a_p\\cdot f)\n中文题目：推、写出车削 b、h、A 与 a_p、f、κ 的关系。\n中文答案：纵车中：h=f·sinκ；b=a_p/sinκ；A=b·h=a_p·f。κ 增大时 h 增大、b 减小。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.22；Formelblatt Fertigungstechnik.pdf S.1；full.md：Drehen/Spangeometrie；Garber_2025_10_16.txt：板书推导 b,h,A。"]
["Warum hängt die spezifische Schnittkraft \\(k_c\\) fast nicht von b, sondern vor allem von h ab? (Kronenberg)","Frage (DE)：Warum hängt die spezifische Schnittkraft \\(k_c\\) fast nicht von b, sondern vor allem von h ab? (Kronenberg)\nAntwort (DE)：Kronenberg: k_c hängt stark von Spanungsdicke h ab; b ändert vor allem den Querschnitt linear. Größeres h → k_c sinkt, aber F_c kann steigen.\n中文题目：为什么 k_c 几乎不随 b 变、主要随 h 变？\n中文答案：按 Kronenberg 尺寸效应：F_c 随 b 近似成比例增加，所以 k_c 对 b 几乎不变。h 很小时，摩擦、刃口圆角和预压缩相对更重要，使 k_c 明显升高。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.23–24；full.md：2.6 Zerspankraft/Kronenberg；Garber_2025_10_16.txt：老师讲解 Kronenberg 逻辑。"]
["Was ist \\(h_0\\) und warum steht \\(h/h_0\\) in der Formel?","Frage (DE)：Was ist \\(h_0\\) und warum steht \\(h/h_0\\) in der Formel?\nAntwort (DE)：h_0 ist Bezugsdicke 1 mm; (h/h_0) macht die Potenz dimensionslos und beschreibt den Größeneinfluss der Spanungsdicke in Kienzle.\n中文题目：h_0 是多少？为什么用 h/h_0？\n中文答案：h_0 是参考切屑厚度，通常为 1 mm。h/h_0 使指数项无量纲；k_c1,1 是 h_0=1 mm 时的表格值。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.23–25；full.md：Kienzle 公式、往届题；Garber_2025_10_16.txt：老师强调 h_0=1 mm。"]
["Aufgabe a) Längsrunddrehen: \\(\\kappa=60^\\circ\\), \\(f=0{,}5\\,\\text{mm}\\), \\(a_p=4\\,\\text{mm}\\), Werkstoff S355J2. Berechnen Sie \\(F_c\\) ohne Korrekturfaktoren.","Frage (DE)：Aufgabe a) Längsrunddrehen: \\(\\kappa=60^\\circ\\), \\(f=0{,}5\\,\\text{mm}\\), \\(a_p=4\\,\\text{mm}\\), Werkstoff S355J2. Berechnen Sie \\(F_c\\) ohne Korrekturfaktoren.\nAntwort (DE)：b=4/sin60°=4,619 mm; h=0,5·sin60°=0,433 mm; A=2,0 mm². S355J2: k_c1,1=1499 N/mm², 1−m_c=0,71. F_c=1499·4,619·1·(0,433/1)^0,71≈3822 N=3,82 kN.\n中文题目：题 a：κ=60°，f=0.5 mm，a_p=4 mm，材料 S355J2。忽略修正系数，求 F_c。\n中文答案：b=4/sin60°=4.619 mm；h=0.5·sin60°=0.433 mm；A=2.0 mm²。S355J2：k_c1,1=1499 N/mm²，1−m_c=0.71。F_c=1499·4.619·1·(0.433/1)^0.71≈3822 N=3.82 kN。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.25–26；full.md：Kienzle 计算往届题；Garber_2025_10_16.txt 与板书结果 F_c≈3822 N。"]
["Aufgabe b) Wird \\(F_c\\) größer oder kleiner bei \\(\\kappa=80^\\circ\\) (ohne Rechnung begründen)?","Frage (DE)：Aufgabe b) Wird \\(F_c\\) größer oder kleiner bei \\(\\kappa=80^\\circ\\) (ohne Rechnung begründen)?\nAntwort (DE)：F_c wird kleiner. Bei κ=80° bleibt A gleich, h steigt und b sinkt; wegen größerer h sinkt k_c. Kontrollwert: F_c≈3682 N < 3822 N.\n中文题目：题 b：κ 改为 80°，F_c 变大还是变小？先不算，先解释。\n中文答案：F_c 变小。κ=80° 时 A 不变，但 h 增大、b 减小；h 增大使 k_c 下降。校核值：F_c≈3682 N，小于 3822 N。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.21–23, S.26；full.md：Drehen/Spangeometrie 与 Kienzle 题型；Garber_2025_10_16.txt：老师强调“先判断再计算”。"]
["Aufgabe c) \\(\\kappa=80^\\circ\\): Wie ändert sich \\(F_c\\) bei stark verschlissenem Werkzeug, \\(v_c=120\\,\\text{m/min}\\), \\(\\gamma=12^\\circ\\)?","Frage (DE)：Aufgabe c) \\(\\kappa=80^\\circ\\): Wie ändert sich \\(F_c\\) bei stark verschlissenem Werkzeug, \\(v_c=120\\,\\text{m/min}\\), \\(\\gamma=12^\\circ\\)?\nAntwort (DE)：Aus b): F_c0≈3682 N. K_v=1−0,0003·120=0,964; K_γ=1−(12−6)/100=0,94; stark verschlissen K_ver≈1,3–1,5. Mit K_ver=1,5 und K_sch=1: F_c≈3682·0,964·0,94·1,5≈5,0 kN.\n中文题目：题 c：κ=80°，强磨损、v_c=120 m/min、γ=12° 时，F_c 如何变化？\n中文答案：由 b) 得 F_c0≈3682 N。K_v=1−0.0003·120=0.964；K_γ=1−(12−6)/100=0.94；强磨损 K_ver≈1.3–1.5。取 K_ver=1.5、K_sch=1 时，F_c≈3682·0.964·0.94·1.5≈5.0 kN。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.24–26；full.md：Kienzle 公式与修正系数；Garber_2025_10_16.txt：老师讲 Korrekturfaktoren 和板书计算。"]
["Nennen Sie die wichtigsten Anforderungen an Schneidstoffe.","Frage (DE)：Nennen Sie die wichtigsten Anforderungen an Schneidstoffe.\nAntwort (DE)：- Härte (>> Werkstück)\n- Warmhärte/Warmfestigkeit\n- Verschleißfestigkeit\n- Wärmeleitfähigkeit\n- Zähigkeit/Bruchfestigkeit\n- Thermoschockbeständigkeit\n- Chemische Stabilität\n中文题目：列出刀具材料的主要要求。\n中文答案：要求：高硬度和热硬性；韧性；耐磨性；抗扩散、抗氧化的化学稳定性；抗热冲击；合适摩擦特性、可涂层性和经济性。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.4, S.7；full.md：2.3 Schneidstoffe；Garber_2025_10_16.txt：老师讲 Schneidstoff-Anforderungen 与 Warmhärte。"]
["Wo liegen HSS, Hartmetall, Keramik, CBN, PKD und Diamant im Diagramm Härte↔Zähigkeit?","Frage (DE)：Wo liegen HSS, Hartmetall, Keramik, CBN, PKD und Diamant im Diagramm Härte↔Zähigkeit?\nAntwort (DE)：Qualitativ: HSS = zäh, aber geringe Warmhärte/v_c; Hartmetall = mittig, härter und weniger zäh; Keramik = sehr hart/warmfest, spröde; CBN/PKD/Diamant = superhart, sehr geringe Zähigkeit. CBN für harte Eisenwerkstoffe; PKD/Diamant eher NE/abrasiv.\n中文题目：在“硬度-韧性”图上，HSS、硬质合金、陶瓷、CBN、PKD 和金刚石在哪里？\n中文答案：定性：HSS 韧性高但热硬性和切速低；硬质合金居中，更硬但韧性较低；陶瓷很硬、热硬性高但脆；CBN、PKD、金刚石超硬但韧性很低。CBN 用于硬铁基材料；PKD、金刚石多用于非铁和磨蚀性材料。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.5, S.7；full.md：往届题“Skizzieren Sie ... Schneidstoffe”；Garber_2025_10_16.txt：老师强调该图会考位置。"]
["Warum beschichtet man Zerspanwerkzeuge? (Aufgaben)","Frage (DE)：Warum beschichtet man Zerspanwerkzeuge? (Aufgaben)\nAntwort (DE)：Beschichtungen senken Reibung/Verschleiß, erhöhen Warmhärte/Oxidationsschutz, verbessern Standzeit und erlauben höhere Schnittwerte.\n中文题目：为什么要给刀具涂层？主要作用是什么？\n中文答案：涂层降低摩擦和磨损，防扩散、氧化和热负荷，提高刀具寿命并允许更高切速。多层涂层可组合多种作用。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.8, S.15；full.md：2.4 Beschichtungen；Garber_2025_10_16.txt：老师说明涂层例子、颜色不作为背诵重点。"]
["Vergleichen Sie CVD und PVD in 4 Punkten.","Frage (DE)：Vergleichen Sie CVD und PVD in 4 Punkten.\nAntwort (DE)：CVD: hohe Temperatur, dicke/haftfeste Schichten, auch Innenflächen, Gefahr Substratbeeinflussung. PVD: niedrigere Temperatur, dünnere Schichten, scharfe Kanten, Sichtlinienprozess.\n中文题目：用 4 点对比 CVD 与 PVD。\n中文答案：CVD：800–1100°C，气体化学反应沉积，涂覆较均匀，不适合 HSS，多为单层。PVD：低于650°C，靶材物理沉积，视线法，适合 HSS，可做多层。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.9–10；full.md：2.4 Beschichtungen, CVD und PVD；Garber_2025_10_16.txt：老师讲 CVD und PVD 区别。"]
["Nennen Sie die 3 Hauptaufgaben von Kühlschmierstoffen.","Frage (DE)：Nennen Sie die 3 Hauptaufgaben von Kühlschmierstoffen.\nAntwort (DE)：- Wärme abführen (kühlen)\n- Reibung vermindern (schmieren)\n- Späne transportieren/wegspülen\n中文题目：列出切削液的 3 个核心任务。\n中文答案：KSS 作用：冷却、带走热量；润滑、降低摩擦；排屑和清洗。附加作用是防腐。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.17–18；full.md：2.5 Kühlschmierstoffe；Garber_2025_10_16.txt：老师重复强调 KSS 三项任务。"]
["Was kühlt besser, was schmiert besser – Wasser oder Öl (KSS)?","Frage (DE)：Was kühlt besser, was schmiert besser – Wasser oder Öl (KSS)?\nAntwort (DE)：Wasser kühlt besser (hohe Wärmekapazität), Öl schmiert besser. Emulsionen kombinieren beides: Wasseranteil für Kühlung, Ölanteil für Schmierung.\n中文题目：水和油：哪个更擅长冷却？哪个更擅长润滑？\n中文答案：水冷却更好，因为热容量高；油润滑更好。乳化液折中：水相负责冷却，油相负责润滑。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.17–18；FT 8 - Schleifen - Skript.pdf S.15；full.md：Kühlschmierstoffe/Schmierstoffe；Garber_2025_10_16.txt：老师口头强调水冷却、油润滑及乳化比例。"]
["Nennen Sie den Zusammenhang zwischen Vorschub *f*, Schneidenradius *R* und Rillentiefe *h* beim Längsrunddrehen.","Frage (DE)：Nennen Sie den Zusammenhang zwischen Vorschub *f*, Schneidenradius *R* und Rillentiefe *h* beim Längsrunddrehen.\nAntwort (DE)：- Geometrie: (R^2 = (f/2)^2 + (R-h)^2)\n- Äquivalent: (h = R - \\sqrt{R^2-(f/2)^2})\n中文题目：请写出纵向外圆车削中进给 f、刀尖半径 R 与沟纹深度、理论表面波纹深度 h 的关系。\n中文答案：沟纹深度 t=R−√(R²−(f/2)²)；当 t<<R 时近似 t≈f²/(8R)。f 增大使 t 明显增大；R 增大使 t 降低。\n出处：FT 3 - Drehen - Skript.pdf S.13, S.15；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"Drehen; Rillentiefe beim Längsrunddrehen\"；Garber_2025_10_23.txt（老师强调 Rillentiefe–Vorschub–Schneidenradius 为考试必须会的关系）。"]
["Berechnen Sie den maximal zulässigen Vorschub *f*, wenn *R* und *h* vorgegeben sind.","Frage (DE)：Berechnen Sie den maximal zulässigen Vorschub *f*, wenn *R* und *h* vorgegeben sind.\nAntwort (DE)：- Umstellen: (f=\\sqrt{8Rh-4h^2})\n- Einheit konsequent (z.B. alles in mm)\n中文题目：已知刀尖半径 R 和允许沟纹深度 h，计算最大允许进给 f。\n中文答案：变形得：f=√(8·R·h−4·h²)=2√(2Rh−h²)。当 h<<R 时 f≈√(8Rh)。所有单位统一用 mm。\n出处：Formelblatt Fertigungstechnik.pdf S.1；FT 3 - Drehen - Skript.pdf S.13, S.15, S.23；full.md Abschnitt \"Formelblatt Fertigungstechnik; Drehen\"；Garber_2025_10_23.txt（老师强调单位统一，µm↔mm 是常见错误）。"]
["Gefordert ist \\(h=4\\,\\mu m\\), Werkzeugradius \\(R=2\\,mm\\). Welcher Vorschub *f* ist erforderlich?","Frage (DE)：Gefordert ist \\(h=4\\,\\mu m\\), Werkzeugradius \\(R=2\\,mm\\). Welcher Vorschub *f* ist erforderlich?\nAntwort (DE)：h=4 µm=0,004 mm; R=2 mm. f=√(8·2·0,004−4·0,004²)≈0,253 mm/U.\n中文题目：要求 h=4 µm，刀尖半径 R=2 mm，求所需进给 f。\n中文答案：h=4 µm=0.004 mm；R=2 mm。f=√(8·2·0.004−4·0.004²)≈0.253 mm/转。\n出处：FT 3 - Drehen - Skript.pdf S.23 Aufgabe 1b；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"Aufgaben zum Drehen; Aufgabe 1b\"；Garber_2025_10_23.txt（老师用此例强调 µm→mm）。"]
["Warum nimmt man nicht immer einen großen Schneidenradius *R*, obwohl dadurch die Rillentiefe kleiner wird?","Frage (DE)：Warum nimmt man nicht immer einen großen Schneidenradius *R*, obwohl dadurch die Rillentiefe kleiner wird?\nAntwort (DE)：Großer R senkt zwar die Rillentiefe, erreicht aber kleine Radien, Schultern und enge Konturen schlecht; Kontaktlänge/Kräfte steigen, Maß-/Formprobleme möglich. Praxis: große Flächen mit großem R, Ecken mit kleinerem R; alternativ f senken.\n中文题目：既然较大的刀尖半径 R 能减小沟纹深度，为什么不总是用大 R？\n中文答案：大 R 虽降低沟纹深度，但难加工小圆角、台肩和狭窄轮廓；接触长度和力可能增加，引起尺寸、形状问题。实际做法：大平面用大 R，角落用小 R；也可降低 f。\n出处：FT 3 - Drehen - Skript.pdf S.13, S.15, S.16；Drehverfahren.pdf Abschnitt \"Längs-Runddrehen; Profildrehen\"（页码未定位）；full.md Abschnitt \"Drehen; Genauigkeit und Oberfläche\"；Garber_2025_10_23.txt（老师口头强调大 R 与尖角、换刀、降 f 的取舍）。"]
["Wie kann man den Zusammenhang zwischen *f*, *R* und *h* ohne Rechnung nutzen?","Frage (DE)：Wie kann man den Zusammenhang zwischen *f*, *R* und *h* ohne Rechnung nutzen?\nAntwort (DE)：Faustregel aus t≈f²/(8R): f hat quadratischen Einfluss, R nur linearen. Halber Vorschub → etwa 1/4 Rillentiefe; doppelter R → etwa 1/2 Rillentiefe.\n中文题目：不通过计算，如何使用 f、R、h 的关系？\n中文答案：由 t≈f²/(8R) 可知：f 是平方影响，R 是线性影响。进给减半，沟纹深度约变为四分之一；R 加倍，沟纹深度约减半。\n出处：FT 3 - Drehen - Skript.pdf S.15；full.md Abschnitt \"3.2 Genauigkeit beim Drehen; Rillentiefe\"；Garber_2025_10_23.txt（老师说明可用图表、曲线判断关系）。"]
["Geben Sie die „Mitternachtsformel“ für die Schnittgeschwindigkeit an und erläutern Sie die Einheit.","Frage (DE)：Geben Sie die „Mitternachtsformel“ für die Schnittgeschwindigkeit an und erläutern Sie die Einheit.\nAntwort (DE)：Schnittgeschwindigkeit: v_c = π·d·n. Wenn d in mm und v_c in m/min: v_c = π·d·n/1000; daher n = 1000·v_c/(π·d).\n中文题目：写出切削速度公式，并说明单位如何处理。\n中文答案：切削速度公式：v_c=π·d·n。若 d 用 mm、v_c 用 m/min，则 v_c=π·d·n/1000，所以 n=1000·v_c/(π·d)。\n出处：FT 3 - Drehen - Skript.pdf S.22；Drehverfahren.pdf Abschnitt \"Quer-Plandrehen\"（页码未定位）；full.md Abschnitt \"Zusammenhänge zwischen Schnittgrößen\"；Garber_2025_10_23.txt（老师强调 m/min、mm/min、min/s 的单位自检）。"]
["Wie hängen Schnittkraft *Fc*, Drehmoment *M* und Leistung *Pc* zusammen? Nennen Sie einen typischen Fehler.","Frage (DE)：Wie hängen Schnittkraft *Fc*, Drehmoment *M* und Leistung *Pc* zusammen? Nennen Sie einen typischen Fehler.\nAntwort (DE)：Drehmoment: M = F_c·d/2. Leistung: P_c = F_c·v_c = 2π·n·M. Fehler: v_c für W in m/s verwenden und d als Radius/Einheit korrekt einsetzen.\n中文题目：Fc、M、Pc 之间如何关联？常见错误是什么？\n中文答案：扭矩：M=F_c·d/2。功率：P_c=F_c·v_c=2π·n·M。常见错误：算 W 时 v_c 要用 m/s，并正确使用半径和单位。\n出处：FT 3 - Drehen - Skript.pdf S.22；full.md Abschnitt \"Zusammenhänge zwischen Schnittgrößen\"；Garber_2025_10_23.txt（老师特别强调 Drehmoment 的力臂是 d/2）。"]
["Geben Sie die Formel für die Hauptzeit *th* beim Drehen an und erklären Sie kurz die Bedeutung von \\(n\\cdot f\\).","Frage (DE)：Geben Sie die Formel für die Hauptzeit *th* beim Drehen an und erklären Sie kurz die Bedeutung von \\(n\\cdot f\\).\nAntwort (DE)：Hauptzeit Drehen: t_h = L·i/(n·f). L = Vorschublänge je Durchgang, i = Durchgänge, n·f = Vorschubgeschwindigkeit in mm/min.\n中文题目：写出车削主时间 th 的公式，并解释 n·f 的意义。\n中文答案：车削主时间：t_h=L·i/(n·f)。L 是每刀进给长度，i 是走刀次数，n·f 是进给速度，单位 mm/min。\n出处：FT 3 - Drehen - Skript.pdf S.22；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"Hauptzeit beim Drehen\"；Garber_2025_10_23.txt（老师说明主时间题可能考，考试会给公式、数据但要会代入）。"]
["Was gehört in die Vorschublänge *L* bei der Hauptzeitberechnung? Wann gibt es keinen Überlaufweg?","Frage (DE)：Was gehört in die Vorschublänge *L* bei der Hauptzeitberechnung? Wann gibt es keinen Überlaufweg?\nAntwort (DE)：L = Bearbeitungslänge + Anfahrweg + Überlaufweg. Kein Überlauf, wenn ein Bund/Absatz den Weg begrenzt; dann nur bis zur Kontur fahren.\n中文题目：主时间计算中的进给长度 L 包括什么？什么时候没有越程 lu？\n中文答案：进给长度 L 包含加工长度、进刀路程 l_a 和超程 l_u。若在台肩、挡肩处或刀具不能越过端部，则没有超程。\n出处：FT 3 - Drehen - Skript.pdf S.19, S.22, S.23；full.md Abschnitt \"Anfahrweg und Überlaufweg\"；Garber_2025_10_23.txt（老师强调 Bund 和台阶处不能取 Überlauf）。"]
["Rohling Ø80 mm → Ziel Ø60 (L=120mm) und Ø30 (L=60mm), max. Zustellung \\(a_p=5mm\\), \\(n=400\\,min^{-1}\\), \\(f=0{,}5\\,mm/U\\), Anlauf+Überlauf je 5 mm. Berechnen Sie *th*.","Frage (DE)：Rohling Ø80 mm → Ziel Ø60 (L=120mm) und Ø30 (L=60mm), max. Zustellung \\(a_p=5mm\\), \\(n=400\\,min^{-1}\\), \\(f=0{,}5\\,mm/U\\), Anlauf+Überlauf je 5 mm. Berechnen Sie *th*.\nAntwort (DE)：a_p radial: Ø80→Ø60: Δr=10 mm → i=2; Ø60→Ø30: Δr=15 mm → i=3. L1=120+5+5=130 mm; L2=60+5=65 mm (kein Überlauf am Bund). L_ges=2·130+3·65=455 mm. n·f=400·0,5=200 mm/min. t_h=455/200=2,275 min≈137 s.\n中文题目：毛坯 Ø80，加工到 Ø60（长120mm）和 Ø30（长60mm），最大切深 ap=5mm，n=400 min⁻¹，f=0.5 mm 和转，引入、越程各 5mm，求主时间 th。\n中文答案：a_p 是径向切深：Ø80→Ø60，半径减 10 mm，所以 2 刀；Ø60→Ø30，半径减 15 mm，所以 3 刀。L1=120+5+5=130 mm；L2=60+5=65 mm（台肩无超程）。总路程 L_ges=2·130+3·65=455 mm。n·f=400·0.5=200 mm/min。t_h=455/200=2.275 min≈137 s。\n出处：FT 3 - Drehen - Skript.pdf S.19, S.22, S.23；full.md Abschnitt \"Aufgaben zum Drehen; Aufgabe 1\"；Garber_2025_10_23.txt（老师强调 ap 为半径向，Ø80→Ø60 是 2 刀不是 4 刀；总路程 455mm）。"]
["Unterscheiden Sie Hauptzeit und Nebenzeit. Was ist „Eilgang“?","Frage (DE)：Unterscheiden Sie Hauptzeit und Nebenzeit. Was ist „Eilgang“?\nAntwort (DE)：Hauptzeit = Zeit mit tatsächlicher Spanbildung. Nebenzeit = Spannen, Messen, Positionieren, Werkzeugwechsel, Rücklauf usw. Eilgang = schnelle Maschinenbewegung ohne Schnitt.\n中文题目：区分主时间和辅助时间；Eilgang（快速移动）是什么？\n中文答案：主时间是真正切削成屑的时间。辅助时间包括装夹、测量、定位、换刀、回程等。快速移动 Eilgang 是无切削的高速机床运动。\n出处：FT 3 - Drehen - Skript.pdf S.20, S.21；full.md Abschnitt \"Zykluszeit und Nebenzeiten\"；Garber_2025_10_23.txt（老师讲 Zykluszeit und Nebenzeit 和空走 Eilgang）。"]
["Geben Sie die Kienzle-Gleichung zur Schnittkraftberechnung an (mit Tabellenwerten).","Frage (DE)：Geben Sie die Kienzle-Gleichung zur Schnittkraftberechnung an (mit Tabellenwerten).\nAntwort (DE)：A=a_p·f=b·h; h=f·sinκ; b=a_p/sinκ. Kienzle: F_c=k_c1,1·b·h_0·(h/h_0)^(1−m_c); mit Korrektur: ·K_v·K_ver·K_γ·K_sch. Tabellenwerte: k_c1,1 und 1−m_c; Ergebnis in N.\n中文题目：写出 Kienzle 切削力计算公式（含表格参数）。\n中文答案：A=a_p·f=b·h；h=f·sinκ；b=a_p/sinκ。Kienzle：F_c=k_c1,1·b·h_0·(h/h_0)^(1−m_c)；带修正时再乘 K_v、K_ver、K_γ、K_sch。表中读取 k_c1,1 和 1−m_c，结果单位 N。\n出处：FT 2 - Grundlagen der Zerspanung Teil 2 - Skript.pdf S.22-S.26；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"Prüfungsaufgabe Kienzle; Schnittkraftberechnung\"；Garber_2025_10_23.txt（老师明确说 Schnittkraftbestimmung und Kienzle 经常、一定会考）。"]
["Nennen Sie den Unterschied zwischen Bohren ins Volle und Aufbohren und begründen Sie, warum Aufbohren genauer ist.","Frage (DE)：Nennen Sie den Unterschied zwischen Bohren ins Volle und Aufbohren und begründen Sie, warum Aufbohren genauer ist.\nAntwort (DE)：Bohren ins Volle: Werkzeug startet ohne Vorbohrung im Vollmaterial. Aufbohren: vorhandene Bohrung wird vergrößert. Aufbohren genauer, weil der kritische Zentrumsschnitt mit v_c≈0 weitgehend entfällt → geringere Axialkräfte, bessere Maßgenauigkeit/Oberfläche.\n中文题目：说明“实心钻孔”和“扩孔”的区别，并解释为什么扩孔更精确。\n中文答案：实心钻孔：无预孔，刀具直接进入实料。扩孔：已有孔再扩大。扩孔更精确，因为中心处 v_c≈0 的关键切削区基本被避开，轴向力更小，尺寸精度和表面更好。\n出处：Garber_2025_10_30.txt（老师讲 Bohren und Aufbohren 与中心速度为0的机制）；FT 4 - Bohren - Skript.pdf S.5；full.md Abschnitt \"4.1 Einleitung - Erreichbare Genauigkeiten - Vollbohren und Aufbohren"]
["Nennen Sie erreichbare ISO-Toleranz (IT) und Rautiefe Rz für Vollbohren, Aufbohren, Senken und Reiben.","Frage (DE)：Nennen Sie erreichbare ISO-Toleranz (IT) und Rautiefe Rz für Vollbohren, Aufbohren, Senken und Reiben.\nAntwort (DE)：Richtwerte: Vollbohren IT12, Rz≈40 µm; Aufbohren IT10, Rz≈4 µm; Senken IT9, Rz≈8 µm; Reiben IT6, Rz≈2 µm. Rz, nicht Ra.\n中文题目：列出实心钻孔、扩孔、沉孔、铰孔可达到的 ISO 公差等级 IT 与粗糙度 Rz。\n中文答案：参考值：实心钻孔 IT12，Rz≈40 µm；扩孔 IT10，Rz≈4 µm；沉孔 IT9，Rz≈8 µm；铰孔 IT6，Rz≈2 µm。注意是 Rz，不是 Ra。\n出处：Garber_2025_10_30.txt（老师围绕 Bohrverfahren 表格讲解）；FT 4 - Bohren - Skript.pdf S.5；full.md Abschnitt \"Erreichbare Genauigkeiten - Vollbohren und Aufbohren"]
["Begründen Sie die schlechtere Oberfläche und Genauigkeit beim Bohren ins Volle.","Frage (DE)：Begründen Sie die schlechtere Oberfläche und Genauigkeit beim Bohren ins Volle.\nAntwort (DE)：v_c=π·d·n; im Bohrerzentrum ist d=0, also v_c=0. Die Querschneide drückt/verdrängt statt sauber zu schneiden → hohe Axialkraft, schlechtere Oberfläche und Maßgenauigkeit.\n中文题目：解释为什么实心钻孔的表面质量和精度较差。\n中文答案：v_c=π·d·n；钻头中心 d=0，所以 v_c=0。横刃处主要挤压、排挤材料而不是清洁切削，因此轴向力高，表面和尺寸精度较差。\n出处：Garber_2025_10_30.txt（老师强调 Bohren ins Volle 的中心不切削问题）；FT 4 - Bohren - Skript.pdf S.5；FT 3 - Drehen - Skript.pdf S.22（v_c = π·n·d）；full.md Abschnitt \"4.1 Einleitung"]
["Skizzieren und benennen Sie am Spiralbohrer: Hauptschneiden, Spanfläche, Freifläche und Querschneide.","Frage (DE)：Skizzieren und benennen Sie am Spiralbohrer: Hauptschneiden, Spanfläche, Freifläche und Querschneide.\nAntwort (DE)：Zu beschriften: zwei Hauptschneiden an der Spitze; Spanfläche/Spannut für Spanablauf; Freifläche hinter der Schneide; Querschneide im Zentrum, kritisch wegen v_c≈0.\n中文题目：在麻花钻上画出、标出：主切削刃、前刀面、后刀面和横刃。\n中文答案：需标注：钻尖两条主切削刃；前刀面、排屑槽用于排屑；切削刃后方的后刀面；中心横刃，因 v_c≈0 很关键。\n出处：Garber_2025_10_30.txt（老师让识别 Bohrergeometrie）；FT 4 - Bohren - Skript.pdf S.6-S.8, S.10-S.11；FT 2 - Grundlagen der Zerspanung Teil 1 - Skript.pdf S.6-S.8（Spanfläche und Freifläche 定义）；full.md Abschnitt \"4.2 Bohrwerkzeuge - Spiral- oder Wendelbohrer; Geometrie"]
["Warum braucht der Spiralbohrer einen Kompromiss zwischen Kern und Spannut?","Frage (DE)：Warum braucht der Spiralbohrer einen Kompromiss zwischen Kern und Spannut?\nAntwort (DE)：Großer Kern: stabiler, aber kleine Spannut/schlechte Spanabfuhr. Große Spannut: gute Span-/KSS-Abfuhr, aber schwacher Kern. Kompromiss Stabilität gegen Spanraum.\n中文题目：为什么麻花钻的钻芯和排屑槽必须折中设计？\n中文答案：钻芯大：稳定、抗断和传递扭矩好，但排屑槽小，排屑和 KSS 差。排屑槽大：排屑好，但钻芯小、刚度低。因此必须折中。\n出处：Garber_2025_10_30.txt（老师讲 Kern-Spannut 折中）；FT 4 - Bohren - Skript.pdf S.10；full.md Abschnitt \"4.2 Bohrwerkzeuge - Aufbau des Spiralbohrers"]
["Welche Funktion hat der Spitzenwinkel, und warum ist er ein Kompromiss?","Frage (DE)：Welche Funktion hat der Spitzenwinkel, und warum ist er ein Kompromiss?\nAntwort (DE)：Er beeinflusst Zentrierung, Führung und Bohrungsgrund. Kleiner Winkel: bessere Führung, größerer Restkegel; größerer Winkel: stabiler, aber schlechtere Zentrierung.\n中文题目：顶角的作用是什么？为什么它是一个折中？\n中文答案：顶角影响定心、稳定性和孔底形状。顶角小：导向更好，但孔底锥形残余更大。顶角大、较钝：尖端更短更稳定，但自定心较差。\n出处：Garber_2025_10_30.txt（老师讲 Spitzenwinkel 的折中）；FT 4 - Bohren - Skript.pdf S.10；full.md Abschnitt \"Aufbau des Spiralbohrers - Spitzenwinkel"]
["Nennen Sie Vorteile und typische Einsatzgrenzen von Wendeplattenbohrern.","Frage (DE)：Nennen Sie Vorteile und typische Einsatzgrenzen von Wendeplattenbohrern.\nAntwort (DE)：Vorteile: wirtschaftlich ab ca. Ø12 mm, schneller Plattenwechsel, seriengeeignet. Grenzen: kleine Durchmesser/Zentrumsschnitt; Vollbohren nur mit geeigneter Plattengeometrie.\n中文题目：列出可转位钻的优点和典型适用限制。\n中文答案：优点：约 Ø12 mm 起经济，换刃快，适合批量。限制：只有刀片几何能覆盖中心、横刃区域时才适合实心钻孔；小直径和中心切削很关键。\n出处：Garber_2025_10_30.txt（老师讲 Wendeplattenbohrer 是否能 Vollbohren 的判断）；FT 4 - Bohren - Skript.pdf S.13；full.md Abschnitt \"4.2 Bohrwerkzeuge - Wendeplattenbohrer"]
["Wozu dient Senken, und welche Senker-Typen gibt es?","Frage (DE)：Wozu dient Senken, und welche Senker-Typen gibt es?\nAntwort (DE)：- Zweck: Schraubenkopfsenkung / Bohrung oben erweitern / Kanten/Fasen\n- Typen: Spitzsenker, Zapfsenker (mit Führungszapfen), Form-/Profilsenker\n中文题目：沉孔、锪孔的目的是什么？有哪些沉孔刀类型？\n中文答案：沉孔、锪孔用于加工垂直于旋转轴线的平面或与轴线对称的锥面，如螺钉头沉孔、倒角。类型：尖沉头刀、带导向柱的柱形沉头刀、成形或轮廓沉头刀。\n出处：Garber_2025_10_30.txt（老师讲 Senken 分类和用途）；FT 4 - Bohren - Skript.pdf S.14；05_FT_Bohrverfahren.pdf Thema \"Plansenken; Profilbohren\"；full.md Abschnitt \"Bohrverfahren - Senken; Senkwerkzeuge"]
["Was verbessert Reiben - und was kann Reiben nicht verbessern? (Nennen Sie auch typische Reibzugabe.)","Frage (DE)：Was verbessert Reiben - und was kann Reiben nicht verbessern? (Nennen Sie auch typische Reibzugabe.)\nAntwort (DE)：- verbessert: Passgenauigkeit (IT6–IT7), Oberfläche, Formtoleranz\n- Reibzugabe: 0,1–0,5 mm\n- kann NICHT verbessern: Lagegenauigkeit/Position der Bohrung\n中文题目：铰孔能改善什么？不能改善什么？并说明典型铰余量。\n中文答案：铰孔把预钻孔加工到配合尺寸。能改善尺寸、配合精度、表面和形状；典型 IT6–IT7，铰余量约 0.1–0.5 mm，一次通过。不能纠正孔的位置误差。\n出处：Garber_2025_10_30.txt（老师强调 Reiben 能改善与不能改善的边界）；FT 4 - Bohren - Skript.pdf S.15；05_FT_Bohrverfahren.pdf Abschnitt \"Reiben\"；full.md Abschnitt \"Reiben"]
["Vergleichen Sie Spannschraube, Schrumpffutter und (Hydro-)Dehnspannfutter (Präzision und Handhabung).","Frage (DE)：Vergleichen Sie Spannschraube, Schrumpffutter und (Hydro-)Dehnspannfutter (Präzision und Handhabung).\nAntwort (DE)：Spannschraube: einfach/günstig, aber schlechter Rundlauf. Schrumpffutter: sehr präzise und steif, aber Wärmegerät nötig. Hydro-Dehnspannfutter: sehr präzise, gute Dämpfung/Handhabung, teuer.\n中文题目：比较侧向紧固螺钉刀柄、热缩刀柄和液压胀紧刀柄（精度、操作）。\n中文答案：侧向紧固螺钉：简单便宜，但单侧夹紧导致跳动较差。热缩刀柄：精度和扭矩传递很好，但需要加热、冷却和设备。液压胀紧刀柄：精度高、阻尼好、操作方便，但贵。\n出处：Garber_2025_10_30.txt（老师讲 Werkzeugaufnahme 对精度影响）；FT 4 - Bohren - Skript.pdf S.20-S.23；full.md Abschnitt \"Futter mit Spannschraube und Schrumpffutter; (Hydro-) Dehnspannfutter; Vergleich von Werkzeugaufnahmen"]
["Definieren Sie Zahnvorschub f_z und geben Sie den Zusammenhang zu f an. Was sagt f_z physikalisch aus?","Frage (DE)：Definieren Sie Zahnvorschub f_z und geben Sie den Zusammenhang zu f an. Was sagt f_z physikalisch aus?\nAntwort (DE)：- Zusammenhang: (f = f_z \\cdot z) (z = Schneidenzahl)\n- Bedeutung: Belastung/Spanabnahme pro Schneide\n中文题目：定义齿进给 f_z，写出它与 f 的关系，并说明物理意义。\n中文答案：f_z 是每齿进给，即每个切削刃的进给量，单位 mm/齿。关系：f=f_z·z，f 是每转进给。物理意义：每个切削刃承担的负载或切屑量。\n出处：Garber_2025_10_30.txt（老师强调 Zahnvorschub 与 Gesamtvorschub 的区别）；Formelblatt Fertigungstechnik.pdf S.1；FT 4 - Bohren - Skript.pdf S.30；full.md Abschnitt \"Formelblatt Fertigungstechnik - Vollbohren; Aufbohren"]
["Berechnen Sie Drehzahl n, Vorschub f, Hauptzeit T_H und Kosten bei 100 €/h. Gegeben: i=300, d=12 mm, L=50 mm, v_c=150 m/min, f_z=0,1 mm, z=2.","Frage (DE)：Berechnen Sie Drehzahl n, Vorschub f, Hauptzeit T_H und Kosten bei 100 €/h. Gegeben: i=300, d=12 mm, L=50 mm, v_c=150 m/min, f_z=0,1 mm, z=2.\nAntwort (DE)：n=150/(π·0,012)=3979 min^(-1)≈3980. f=f_z·z=0,1·2=0,2 mm/U. L·i=50·300=15000 mm. T_H=15000/(3979·0,2)=18,85 min. Kosten=18,85/60·100≈31,4 €.\n中文题目：计算转速 n、每转进给 f、主时间 T_H 和 100 €/h 下的成本。\n中文答案：n=150/(π·0.012)=3979 min^(-1)≈3980。f=f_z·z=0.1·2=0.2 mm/转。L·i=50·300=15000 mm。T_H=15000/(3979·0.2)=18.85 min。成本=18.85/60·100≈31.4 €。\n出处：Garber_2025_10_30.txt（老师明确此类 Hauptzeit und Kosten 计算是考试口径并强调只算 Hauptzeit）；FT 4 - Bohren - Skript.pdf S.30；FT 3 - Drehen - Skript.pdf S.22；Formelblatt Fertigungstechnik.pdf S.1；full.md Abschnitt \"4.4 Hauptzeitberechnung"]
["Begründen Sie, warum die Kosten aus T_H bei Einzelteilen stark unterschätzt werden.","Frage (DE)：Begründen Sie, warum die Kosten aus T_H bei Einzelteilen stark unterschätzt werden.\nAntwort (DE)：T_H enthält nur Zerspanzeit. Nicht enthalten: Rüsten, Spannen, Messen, Werkzeugwechsel, Positionieren, Nebenzeiten; bei Einzelteilen oft dominierend.\n中文题目：说明为什么用主时间 T_H 算单件成本会严重低估。\n中文答案：T_H 只包含真正切削时间。不包含准备、装夹、定位、换刀、测量、清理、搬运和编程。单件生产中辅助和准备时间常更大，所以用 T_H 算成本会严重低估。\n出处：Garber_2025_10_30.txt（老师口头强调只算 Hauptzeit 会低估真实成本）；FT 3 - Drehen - Skript.pdf S.20-S.21；FT 4 - Bohren - Skript.pdf S.30；full.md Abschnitt \"3.4 Hauptzeit und Fertigungskosten; 4.4 Hauptzeitberechnung"]
["Erklären Sie das Punch-Tap-Verfahren (Ablauf) und nennen Sie Vorteile und Nachteile sowie geeignete Werkstoffe.","Frage (DE)：Erklären Sie das Punch-Tap-Verfahren (Ablauf) und nennen Sie Vorteile und Nachteile sowie geeignete Werkstoffe.\nAntwort (DE)：Punch-Tap: Werkzeug erzeugt beim Eintauchen zwei spiralförmige Nuten; Gewindeschneiden tauchen durch diese ein; ca. 1/2 Umdrehung schneidet/formt das Gewinde; danach Rückzug durch die Nuten. Vorteil sehr schnell; Nachteil zwei Unterbrechungen; geeignet für duktile Werkstoffe.\n中文题目：解释 Punch-Tap 和螺旋螺纹成形工艺的流程，并列出优缺点和适用材料。\n中文答案：Punch-Tap：刀具进入时先形成两条螺旋槽；螺纹刃通过槽进入；约半圈完成螺纹切削或成形；再通过槽退出。优点是很快；缺点是螺纹有两处中断；适合延性材料。\n出处：Garber_2025_10_30.txt（老师讲 Punch-Tap 流程、速度和材料限制）；FT 4 - Bohren - Skript.pdf S.31；full.md Abschnitt \"4.5 Neues Verfahren: Punch Tap"]
["Warum sind umformende Verfahren besonders für die Serienfertigung geeignet?","Frage (DE)：Warum sind umformende Verfahren besonders für die Serienfertigung geeignet?\nAntwort (DE)：Kurze Stückzeiten, hohe Ausbringung, gute Werkstoffausnutzung und Festigkeit; teure Werkzeuge lohnen sich erst bei großen Stückzahlen.\n中文题目：为什么成形工艺特别适合批量生产？\n中文答案：单件时间短、可秒级生产；材料利用率高；纤维或材料连续性好，机械性能好；尺寸和形状精度好。缺点是工具、模具昂贵，所以主要适合大批量。\n出处：11 - Grundlagen Umformen - Skript.pdf S.4-S.6；full.md 11.1 Umformende Verfahren；Garber_2025_11_06.txt（老师口头强调秒级节拍、系列生产）"]
["Nennen Sie Definition und grundlegenden Ablauf des Tiefziehens.","Frage (DE)：Nennen Sie Definition und grundlegenden Ablauf des Tiefziehens.\nAntwort (DE)：Tiefziehen = Zug-Druck-Umformen eines Blechzuschnitts zu einem Hohlkörper ohne beabsichtigte Blechdickenänderung. Ablauf: Platine/Ronde einlegen, Niederhalter schließt, Niederhalterkraft, Stempel zieht durch Ziehring.\n中文题目：请给出深拉的定义与基本步骤。\n中文答案：深拉是把板料在拉压复合应力下成形为空心件，通常不刻意改变板厚。步骤：放入板坯或圆片，压边圈压住，施加压边力，冲头通过拉深环完成成形。\n出处：14 - Tiefziehen - Skript.pdf S.3, S.5；full.md 14.1 Tiefziehen；Garber_2025_11_06.txt（老师明确把Tiefziehen列为考试内容）"]
["Was passiert, wenn die Niederhalterkraft beim Tiefziehen zu klein oder zu groß ist?","Frage (DE)：Was passiert, wenn die Niederhalterkraft beim Tiefziehen zu klein oder zu groß ist?\nAntwort (DE)：Zu klein: Faltenbildung im Flansch. Zu groß: Nachfließen behindert, Stempelkraft/Zugspannung steigt → Riss bzw. Bodenreißer.\n中文题目：深拉时压边力太小或太大会发生什么？\n中文答案：压边力太小：法兰切向受压失稳，起皱。压边力太大：材料补流受阻，拉深力、冲头力和拉应力升高，导致底裂。两者之间是工艺窗口。\n出处：14 - Tiefziehen - Skript.pdf S.12-S.13；full.md 14.3 Verfahrensgrenzen/Verfahrensfenster；Garber_2025_11_06.txt（老师口头强调卡住、力太大、Bodenreißer 和裂）"]
["Begründen Sie kurz: Warum kommt es zu Faltenbildung bzw. Bodenreißer beim Tiefziehen?","Frage (DE)：Begründen Sie kurz: Warum kommt es zu Faltenbildung bzw. Bodenreißer beim Tiefziehen?\nAntwort (DE)：Falten: Flansch fließt nach innen → tangentiale Druckspannung; bei zu kleiner Niederhalterkraft instabil. Bodenreißer: Ziehkraft/Zugspannung in Zarge zu groß.\n中文题目：简要解释：为什么会起皱或出现底裂（Bodenreißer）？\n中文答案：起皱：法兰向内流向更小圆周，产生切向压应力；压边力不足时失稳。底裂：拉深力通过筒壁传递；当拉应力超过 R_m 或材料流动受阻时，在底部圆角附近开裂。\n出处：14 - Tiefziehen - Skript.pdf S.6-S.8, S.12-S.13；full.md 14.2-14.3；Garber_2025_11_06.txt（老师口头强调失败机制）"]
["Definieren Sie das Ziehverhältnis β im Erstzug und im Weiterzug (inkl. typische Grenzwerte).","Frage (DE)：Definieren Sie das Ziehverhältnis β im Erstzug und im Weiterzug (inkl. typische Grenzwerte).\nAntwort (DE)：(\\beta_1 = d_0/d_1), maximal typ. ≈ 2 (Erstzug).\n中文题目：定义首次拉深与再拉深的拉深比 β（含典型上限）。\n中文答案：首次拉深：β_1=d_0/d_1，最大约 2。再拉深：β_2=d_1/d_2，最大约 1.6。总拉深比：β_ges=β_1·β_2·...·β_n；不退火时最大约 6.5。\n出处：14 - Tiefziehen - Skript.pdf S.11；Formelblatt Fertigungstechnik.pdf（Tiefziehen Ziehverhältnis）；full.md 14.2 Tiefziehen - Ziehverhältnis"]
["Nennen Sie die Anteile der Ziehkraft FZ und eine typische Näherungsformel.","Frage (DE)：Nennen Sie die Anteile der Ziehkraft FZ und eine typische Näherungsformel.\nAntwort (DE)：FZ = Fid + FRR + FRN + FB; Näherung: FZ = U·s·Rm·n; Einfluss: Werkstoff, Schmierung, Werkzeuggeometrie, Umformparameter.\n中文题目：写出拉深力 FZ 的组成与一个常用近似公式。\n中文答案：拉深力组成：F_Z=F_id+F_RR+F_RN+F_B，分别为理想成形力、拉深环圆角摩擦、拉深环与压边圈间摩擦、弯曲力。近似公式：F_Z=U·s·R_m·n。\n出处：14 - Tiefziehen - Skript.pdf S.14；full.md 14.3 Ziehkraft；Formelblatt Fertigungstechnik.pdf（Umformende Verfahren und Tiefziehen）"]
["Erklären Sie das Grundprinzip des Fließpressens: Wohin fließt das Material beim Pressen?","Frage (DE)：Erklären Sie das Grundprinzip des Fließpressens: Wohin fließt das Material beim Pressen?\nAntwort (DE)：Werkstoff wird mit Stempel durch Düse/Spalt gepresst; wegen Volumenkonstanz fließt er in freie bzw. widerstandsarme Räume: vorwärts, rückwärts oder quer.\n中文题目：解释流压基本原理：压下去后材料往哪里流？\n中文答案：流压：工件被冲头压过模口、孔或间隙。由于体积近似不变，材料流向模具中自由或阻力较小的区域；方向取决于正向、反向或横向流压。\n出处：12 - Fließpressen - Skript.pdf S.5, S.12, S.15；11 - Grundlagen Umformen - Skript.pdf S.19-S.20；full.md 12.2 Fließpressen；Garber_2025_11_06.txt（老师口头示意材料被压后向可流方向长出来、秒级）"]
["Wie wird der Umformgrad φ beim Fließpressen typischerweise bestimmt?","Frage (DE)：Wie wird der Umformgrad φ beim Fließpressen typischerweise bestimmt?\nAntwort (DE)：Meist über Flächen wegen Volumenkonstanz: φ = ln(A_0/A_1) bzw. Betrag. Logarithmischer Umformgrad ist bei mehreren Schritten additiv.\n中文题目：流压时通常如何定义、计算变形程度 φ？\n中文答案：变形程度 φ 通常用截面积计算：φ=ln(A_1/A_0)，或按题目定义取正的绝对值。优点：对数变形量可以相加。\n出处：12 - Fließpressen - Skript.pdf S.14-S.15；11 - Grundlagen Umformen - Skript.pdf S.20-S.21；Formelblatt Fertigungstechnik.pdf（Umformgrad）；full.md 12.2 Spannungszustand beim Kaltfließpressen"]
["Geben Sie eine einfache Beziehung für ideelle Umformkraft und ideelle Umformarbeit an.","Frage (DE)：Geben Sie eine einfache Beziehung für ideelle Umformkraft und ideelle Umformarbeit an.\nAntwort (DE)：Fid = A·kf; Wid = V·kfm·φ (ideell, ohne Reibung).\n中文题目：写出理想成形力与理想成形功的最基本关系。\n中文答案：理想成形力：F_id=A·k_f。理想成形功：W_id=V·k_fm·φ 或 V·k_fm·|φ|。实际过程还要考虑摩擦和效率。\n出处：11 - Grundlagen Umformen - Skript.pdf S.22-S.23；Formelblatt Fertigungstechnik.pdf（Umformenergie）；full.md 11.3 Umformkraft und Umformarbeit"]
["Warum entsteht beim Gesenkschmieden ein Grat und was sind die Nachteile?","Frage (DE)：Warum entsteht beim Gesenkschmieden ein Grat und was sind die Nachteile?\nAntwort (DE)：Grat erhöht seitlichen Fließwiderstand und Druck → Kavität füllt besser. Nachteile: höhere Kraft/Verschleiß, Entgraten nötig, Materialverlust.\n中文题目：模锻为什么会产生飞边（Grat），缺点是什么？\n中文答案：飞边、飞边槽提高侧向流动阻力，使内部压力升高，从而更好填满型腔。缺点：力大、模具磨损、需去飞边、材料损失。闭式模具避免飞边，但要求坯料质量非常精确。\n出处：13 - Schmieden - Skript.pdf S.15-S.16；full.md 13.4 Gesenkformschmieden；Garber_2025_11_06.txt（老师展示边上流出再切掉）"]
["Begründen Sie: Warum braucht Prägen trotz kleinem Hub sehr hohe Kräfte?","Frage (DE)：Begründen Sie: Warum braucht Prägen trotz kleinem Hub sehr hohe Kräfte?\nAntwort (DE)：Prägen braucht hohe Flächenpressung, damit feine Konturen vollständig plastisch abgebildet werden; Kontaktfläche/Details und Kaltverfestigung erhöhen Kraft trotz kleinem Hub.\n中文题目：解释：为什么压印、压币行程很小但需要很大的力？\n中文答案：压印是行程很小的冷锻，但细小轮廓需要极高面压。接触细节和冷作硬化导致力很高；工具必须很硬且制造复杂。\n出处：13 - Schmieden - Skript.pdf S.5（Kaltschmieden: Prägen und Kalibrieren, hohe Kräfte）；full.md 13.1 Nach Temperatur；Garber_2025_11_06.txt（Prägen/Presskraft口头补充，页码未定位）"]
["Rechnen Sie grob um: 1000 kN entsprechen etwa wie vielen Tonnen Gewichtskraft?","Frage (DE)：Rechnen Sie grob um: 1000 kN entsprechen etwa wie vielen Tonnen Gewichtskraft?\nAntwort (DE)：1000 kN = 1 000 000 N; m = F/g ≈ 101 900 kg ≈ 102 t. Daumenregel: 10 kN ≈ 1 t.\n中文题目：粗略换算：1000 kN 约等于多少吨的重量力？\n中文答案：1000 kN=1,000,000 N。m=F/g≈1,000,000/9.81≈102,000 kg≈102 t。经验规则：10 kN≈1 吨力，所以 1000 kN≈100 吨力。\n出处：Garber_2025_11_06.txt（Presskraft单位换算口头强调）；课件未定位到，主题关键词：Presskraft, kN und t"]
["Nennen Sie den Unterschied zwischen Schruppen und Schlichten und den Einfluss des Bahnabstands auf Oberfläche und Zeit.","Frage (DE)：Nennen Sie den Unterschied zwischen Schruppen und Schlichten und den Einfluss des Bahnabstands auf Oberfläche und Zeit.\nAntwort (DE)：Schruppen: hoher Materialabtrag, große Kräfte, große Zustellung. Schlichten: kleine Zustellung/Aufmaß, gute Oberfläche/Genauigkeit. Kleiner Bahnabstand → bessere Oberfläche, aber längere Zeit.\n中文题目：说出粗加工与精加工的区别，并说明走刀间距对表面与时间的影响。\n中文答案：粗加工追求高材料去除率，力大，需要高刚性和功率。精加工切深、余量小，目标是表面和精度。走刀间距越小，表面越好，但时间和成本显著增加。\n出处：FT 5 - Fräsen - Skript.pdf S.8, S.10；full.md 5.4 Anwendungen/Formenbau Schlichtbearbeitung；Garber_2025_11_06.txt（老师强调好表面很贵、密走刀耗时）"]
["Warum wird CAM-Simulation durchgeführt und was sind typische Grenzen?","Frage (DE)：Warum wird CAM-Simulation durchgeführt und was sind typische Grenzen?\nAntwort (DE)：CAM-Simulation prüft NC-Bahn, Materialabtrag und Kollisionen vor der Maschine. Grenzen: Maschinen-/Steuerungsdynamik, KSS, Nebenzeiten und reale Kräfte nur vereinfacht; Zeit oft ungenau.\n中文题目：为什么要做CAM仿真？它的典型局限是什么？\n中文答案：CAM 仿真用于在上机前检查 NC 程序、刀路、材料去除和碰撞。局限：机床动态、加减速、夹具、KSS、换刀和辅助时间常被简化，所以时间常不准。\n出处：Garber_2025_11_06.txt（CAM仿真、时间不准口头补充）；课件未定位到，主题关键词：CAM-Simulation, Kollisionsprüfung und Bearbeitungszeit"]
["Definieren Sie Tiefbohren und begründen Sie, warum hoher KSS-Druck nötig ist.","Frage (DE)：Definieren Sie Tiefbohren und begründen Sie, warum hoher KSS-Druck nötig ist.\nAntwort (DE)：Tiefbohren: etwa L/D ≥ 10. Hoher KSS-Druck spült Späne aus langer Bohrung, kühlt und verhindert Verstopfen/Werkzeugbruch.\n中文题目：定义深孔钻，并解释为什么需要高压冷却润滑液。\n中文答案：深孔钻通常从 L/D≈10 起算。需要高压 KSS，常用内冷，用于冷却并尤其把长孔切屑冲出；否则会堵塞、断刀、表面和精度变差。\n出处：FT 4 - Bohren - Skript.pdf S.24-S.26；full.md 4.3 Tiefbohren；Garber_2025_11_06.txt（老师口头强调深孔钻、冲屑、冷却润滑液）"]
["Nennen Sie die drei Tiefbohrverfahren und unterscheiden Sie sie über KSS-Zufuhr und KSS-Abfuhr.","Frage (DE)：Nennen Sie die drei Tiefbohrverfahren und unterscheiden Sie sie über KSS-Zufuhr und KSS-Abfuhr.\nAntwort (DE)：Einlippen: innere Zufuhr, äußere Abfuhr; Ejektor: innere Zufuhr und innere Abfuhr; BTA: äußere Zufuhr, innere Abfuhr.\n中文题目：列出三种深孔钻方式，并用“供液、回液路径”区分。\n中文答案：单刃深孔钻：内供液，外部排出切屑和 KSS。Ejektor 法：内供液、内排液。BTA：KSS 从孔壁和刀具间外部供入，切屑和液体从刀具内部排出。\n出处：FT 4 - Bohren - Skript.pdf S.26-S.29；full.md 4.3 Tiefbohren；Garber_2025_11_06.txt（老师口头提到深孔钻、冲屑）"]
["Nennen Sie die Unterschiede zwischen *Gleichlauffräsen* und *Gegenlauffräsen* und begründen Sie die Wahl.","Frage (DE)：Nennen Sie die Unterschiede zwischen *Gleichlauffräsen* und *Gegenlauffräsen* und begründen Sie die Wahl.\nAntwort (DE)：Gegenlauffräsen: für spielbehaftete Achsen; Zahn gleitet zuerst, Oberfläche schlechter, Freiflächenverschleiß höher. Gleichlauffräsen: Zahn sofort im Schnitt, bessere Oberfläche, aber Einzugsgefahr bei Spiel. Wahl: alte Maschine eher Gegenlauf, spielfreie CNC eher Gleichlauf.\n中文题目：列出顺铣与逆铣的区别，并说明如何选择。\n中文答案：逆铣适合有反向间隙的进给轴；刀齿先滑擦再切削，表面较差，后刀面磨损较大。顺铣刀齿立即进入切削，表面较好，但有间隙时有被拉入风险。选择：老机床偏逆铣，无间隙 CNC 偏顺铣。\n出处：FT 5 - Fräsen - Skript.pdf, S.5; full.md, Abschnitt 5.2 Gleich- und Gegenlauf; Garber_2025_11_13.txt, Stichwort Gleichlauf, Gegenlauf und Magnetspannung"]
["Nennen Sie Vorteile des *Gewindefräsens* gegenüber *Gewindebohren*.","Frage (DE)：Nennen Sie Vorteile des *Gewindefräsens* gegenüber *Gewindebohren*.\nAntwort (DE)：Gewindefräsen: geringeres Drehmoment, freier Spänefall, höhere v_c und bessere Oberfläche, ein Werkzeug für mehrere Durchmesser, radiale Zustellungen möglich. Vorteil bei dünnwandigen, gehärteten oder schwer zerspanbaren Werkstoffen.\n中文题目：列出螺纹铣相对螺纹攻丝的优点。\n中文答案：螺纹铣扭矩较小、排屑自由、可用更高切速且表面更好，一把刀可加工多个直径，可分多次径向进给。适合薄壁、淬硬或难加工材料。\n出处：FT 5 - Fräsen - Skript.pdf, S.6; full.md, Abschnitt 5.2 Gewindefräsen; Garber_2025_11_13.txt, Stichwort Gewindefräsen"]
["Was passiert, wenn Sie beim Gewindefräsen **nach oben** bzw. **nach unten** spiralförmig fahren?","Frage (DE)：Was passiert, wenn Sie beim Gewindefräsen **nach oben** bzw. **nach unten** spiralförmig fahren?\nAntwort (DE)：Merksatz bei gleicher Werkzeug-/Drehrichtung: spiralförmig nach oben → Rechtsgewinde; spiralförmig nach unten → Linksgewinde. Entscheidend ist die Helixrichtung der programmierten Bahn.\n中文题目：螺纹铣时如果螺旋轨迹向上或向下走，会发生什么？\n中文答案：在相同刀具和转向设定下，记忆口径：螺旋向上走形成右旋螺纹；螺旋向下走形成左旋螺纹。关键是程序轨迹的螺旋方向。\n出处：Fräsverfahren.pdf, S.6 (Schraubfräsen und Gewindefräsen); full.md, Abschnitt Schraubfräsen und Gewindefräsen; Garber_2025_11_13.txt,口头补充 Rechtsgewinde und Linksgewinde"]
["Nennen Sie typische Fräswerkzeuge und je einen typischen Einsatzfall.","Frage (DE)：Nennen Sie typische Fräswerkzeuge und je einen typischen Einsatzfall.\nAntwort (DE)：Walzenstirnfräser: Plan-/Eckfräsen. Scheibenfräser: Nuten/Schlitze. Schaftfräser: Taschen/Konturen. Kugel-/Gesenkfräser und Torusfräser: Freiformflächen/Formenbau-Schlichten. Messerkopf: große plane Flächen.\n中文题目：列出典型铣刀，并各给一个典型用途。\n中文答案：圆柱端面铣刀：平面、台阶铣。盘形铣刀：槽和切缝。立铣刀：型腔和轮廓。球头、模具铣刀和圆角刀：自由曲面、模具精加工。面铣刀盘：大平面。\n出处：FT 5 - Fräsen - Skript.pdf, S.7–9; full.md, Abschnitt 5.3 Fräswerkzeuge und 5.4 Anwendungen; Garber_2025_11_13.txt, Stichwort Fräswerkzeuge, Kugelfräser und Messerkopf"]
["Erklären Sie kurz *Profilfräsen* und nennen Sie Beispiele.","Frage (DE)：Erklären Sie kurz *Profilfräsen* und nennen Sie Beispiele.\nAntwort (DE)：Profilfräsen: Werkzeugprofil bildet sich im Werkstück ab; meist Spezial-/Formfräser. Beispiele: Schwalbenschwanzführung, T-Nut; wirtschaftlich bei wiederholten Profilen/Serie.\n中文题目：简述成形铣，并举例。\n中文答案：成形铣是刀具轮廓复制到工件上，通常用专用成形刀。例：燕尾导轨、T 形槽；适合重复轮廓和批量生产。\n出处：Fräsverfahren.pdf, S.7; FT 5 - Fräsen - Skript.pdf, S.4; full.md, Abschnitt Profilfräsen, Ergänzung zum Profilfräsen; Garber_2025_11_13.txt, Stichwort Profilfräser"]
["Was ist ein *Satzfräser* und warum ist er in der Serienfertigung sinnvoll?","Frage (DE)：Was ist ein *Satzfräser* und warum ist er in der Serienfertigung sinnvoll?\nAntwort (DE)：Satzfräser = mehrere Formfräser auf einem Fräsdorn mit Zwischenringen. Mehrere Konturen in einem Durchgang → kurze Hauptzeit und gute Wiederholgenauigkeit; hoher Rüst-/Werkzeugaufwand lohnt bei Serie.\n中文题目：什么是成组铣刀？为什么适合批量生产？\n中文答案：成组铣刀是多把成形铣刀通过刀杆和间隔环组合。一次走刀加工多个轮廓，主时间短、重复精度好；装调和刀具成本高，但批量时划算。\n出处：FT 5 - Fräsen - Skript.pdf, S.4; full.md, Abschnitt Ergänzung zum Profilfräsen und Satzfräser; Garber_2025_11_13.txt, Stichwort Satzfräser und Baukasten"]
["Im Formenbau beträgt der Bahnabstand beim Schlichten z.B. **0,1 mm**. Wie viele Bahnen brauchen Sie über **2 m** Breite (vereinfachend)?","Frage (DE)：Im Formenbau beträgt der Bahnabstand beim Schlichten z.B. **0,1 mm**. Wie viele Bahnen brauchen Sie über **2 m** Breite (vereinfachend)?\nAntwort (DE)：2 m = 2000 mm. Bahnen ≈ 2000/0,1 = 20 000. Aussage: sehr kleiner Bahnabstand erzeugt sehr lange Bearbeitungszeit.\n中文题目：模具精加工走刀间距0.1mm，覆盖2m宽大约需要多少条走刀？\n中文答案：2 m=2000 mm。走刀数约为 2000/0.1=20,000 条。考点：很小的走刀间距会导致极长加工时间。\n出处：FT 5 - Fräsen - Skript.pdf, S.8; full.md, Abschnitt Formenbau Schlichtbearbeitung; Garber_2025_11_13.txt, Stichwort 0,1 mm/20.000 Bahnen"]
["Welche Achszahl wählen Sie typischerweise für (a) Formenbau-Schlichten, (b) Hydraulik-Steuerblock – und warum?","Frage (DE)：Welche Achszahl wählen Sie typischerweise für (a) Formenbau-Schlichten, (b) Hydraulik-Steuerblock – und warum?\nAntwort (DE)：(a) Formenbau-Schlichten: typ. 5-Achs, wegen Freiformflächen, Kugel-/Torusfräser, kleiner Bahnabstände, hoher Oberfläche/Genauigkeit. (b) Hydraulik-Steuerblock: typ. 4-Achs, vor allem Bohrungen/Gewinde und einfache Flächen; wirtschaftlicher.\n中文题目：(a) 模具自由曲面精加工、(b) 液压阀块，通常选几轴机床？为什么？\n中文答案：(a) 模具精加工通常 5 轴，因为有自由曲面、球头或圆角刀、小走刀间距和高表面、精度要求。(b) 液压阀块通常 4 轴，因为主要是孔、螺纹和简单平面，更经济。\n出处：FT 5 - Fräsen - Skript.pdf, S.8–9; full.md, Abschnitt Formenbau-Schlichtbearbeitung und Hydraulik-Steuerblock; Garber_2025_11_13.txt, Stichwort 3-, 4- und 5-Achs und Kosten"]
["Warum kann man Glas/Keramik nicht „normal“ fräsen, und wie hilft Ultraschall-angeregtes Fräsen?","Frage (DE)：Warum kann man Glas/Keramik nicht „normal“ fräsen, und wie hilft Ultraschall-angeregtes Fräsen?\nAntwort (DE)：Glas/Keramik sind spröde: normales Fräsen führt zu Splittern/Ausbrechen. Ultraschallanregung trägt kleinste Partikel ab statt normale Späne zu bilden; geeignet für kleine Teile, z.B. Zahnkronen, nicht wirtschaftlich für große Teile.\n中文题目：为什么玻璃、陶瓷不能用常规方式铣？超声振动铣如何解决？\n中文答案：玻璃、陶瓷很脆，常规铣削会崩裂。超声振动使材料以微小颗粒方式去除，而不是形成普通切屑；适合牙冠等小件，不适合大件。\n出处：FT 5 - Fräsen - Skript.pdf, S.11; full.md, Abschnitt Glas/Keramik fräsen; Garber_2025_11_13.txt, Stichwort Ultraschall/Zahnkronen"]
["Definieren Sie *Rattern* und unterscheiden Sie fremderregte vs. selbsterregte Schwingung.","Frage (DE)：Definieren Sie *Rattern* und unterscheiden Sie fremderregte vs. selbsterregte Schwingung.\nAntwort (DE)：Rattern = starke, unerwünschte Schwingung beim Drehen/Fräsen. Fremderregt: äußere/periodische Anregung nahe Eigenfrequenz. Selbsterregt: Instabilität durch Zerspanprozess und Rückkopplung, ohne äußere periodische Anregung; schadet Oberfläche, Werkzeug, Maschine.\n中文题目：定义颤振，并区分受迫振动与自激振动。\n中文答案：颤振是车削、铣削中的强烈有害振动。受迫振动来自外部或周期激励，接近固有频率。自激振动由切削过程和反馈不稳定引起，不需要外部周期激励；会损害表面、刀具和机床。\n出处：FT 5 - Fräsen - Skript.pdf, S.12; full.md, Abschnitt 5.5 Rattern Grundlagen; Garber_2025_11_13.txt, Stichwort selbsterregt/fremderregt"]
["Wie ermittelt man experimentell die *Grenzspantiefe* (ap) beim Rattern?","Frage (DE)：Wie ermittelt man experimentell die *Grenzspantiefe* (ap) beim Rattern?\nAntwort (DE)：Testschnitt mit schrittweise steigendem a_p; Schwingamplitude messen. Grenzspantiefe = a_p, ab dem Amplitude/Rattern schlagartig stark zunimmt.\n中文题目：如何通过试切确定颤振的临界切深 ap？\n中文答案：通过试切逐步增大 a_p，并测量振动幅值。临界切深就是从该 a_p 开始振幅或颤振突然明显增大的切深。\n出处：FT 5 - Fräsen - Skript.pdf, S.13; full.md, Abschnitt Ermittlung der Grenzspantiefe; Garber_2025_11_13.txt, Stichwort Testschnitt/Grenzspantiefe"]
